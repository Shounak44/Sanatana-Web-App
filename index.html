<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SANĀTANA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --saffron: #E8871E;
  --saffron2: #F4A336;
  --gold: #C9A84C;
  --gold2: #E2C97E;
  --deep: #080604;
  --deep2: #0F0B05;
  --card: #110D07;
  --card2: #17110A;
  --border: #251A0A;
  --border2: #33240E;
  --muted: #6B5535;
  --muted2: #8A7050;
  --text: #EDE0C4;
  --text2: #C8B896;
}

body {
  background: var(--deep);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.4;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── HEADER ── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  display: flex; align-items: center; gap: 14px;
  background: linear-gradient(to bottom, #0D0802, var(--deep));
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
}
.header-om {
  width: 38px; height: 38px;
  background: radial-gradient(circle, rgba(232,135,30,0.15), transparent 70%);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--saffron);
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.8; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.06); }
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: 17px; color: var(--gold2);
  letter-spacing: 3px; line-height: 1;
}
.header-sub {
  color: var(--muted); font-size: 9px;
  letter-spacing: 3px; margin-top: 4px;
  font-family: 'Cinzel', serif;
}
.header-right { margin-left: auto; text-align: right; }
.header-count { color: var(--muted); font-size: 10px; letter-spacing: 1px; font-family: 'Cinzel', serif; }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: rgba(8,6,4,0.95);
  position: sticky; top: 67px; z-index: 9;
  backdrop-filter: blur(12px);
}
.tab-btn {
  flex: 1; padding: 13px 0;
  background: none; border: none;
  color: var(--muted); font-size: 10px;
  letter-spacing: 2.5px; cursor: pointer;
  border-bottom: 1.5px solid transparent;
  transition: color 0.25s, border-color 0.25s;
  font-family: 'Cinzel', serif;
}
.tab-btn.active { color: var(--saffron); border-bottom-color: var(--saffron); }

/* ── CONTENT ── */
.content { padding: 24px 18px 80px; max-width: 620px; margin: 0 auto; position: relative; z-index: 1; }
.page { display: none; animation: fadeIn 0.35s ease-out; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.section-title {
  font-family: 'Cinzel', serif;
  font-size: 22px; color: var(--gold2);
  letter-spacing: 1px; margin-bottom: 4px;
}
.section-sub {
  color: var(--muted2); font-size: 12px;
  letter-spacing: 1px; margin-bottom: 22px;
  font-family: 'Cinzel', serif;
}

/* ── DAILY CARD ── */
.daily-card {
  background: linear-gradient(145deg, #161009, #0F0B06);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 18px; padding: 24px 22px;
  box-shadow: 0 0 60px rgba(232,135,30,0.04), inset 0 1px 0 rgba(201,168,76,0.1);
  margin-bottom: 14px; position: relative; overflow: hidden;
}
.daily-card::before {
  content: 'ॐ';
  position: absolute; right: -10px; top: -20px;
  font-size: 120px; color: rgba(201,168,76,0.04);
  pointer-events: none; line-height: 1;
}
.daily-meta {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 22px;
}
.daily-ref {
  font-family: 'Cinzel', serif;
  color: var(--saffron); font-size: 11px; letter-spacing: 2px;
  margin-bottom: 5px;
}
.daily-ch { color: var(--gold2); font-size: 14px; font-style: italic; }
.daily-date-badge {
  background: rgba(232,135,30,0.08);
  border: 1px solid rgba(232,135,30,0.18);
  border-radius: 20px; padding: 4px 12px;
  color: var(--muted2); font-size: 10px;
  font-family: 'Cinzel', serif; letter-spacing: 1px;
  white-space: nowrap;
}
.divider-line {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(201,168,76,0.18), transparent);
  margin: 16px 0;
}
.verse-block { margin-bottom: 18px; }
.block-label {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 3px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.block-label::after {
  content: ''; flex: 1; height: 1px;
  background: currentColor; opacity: 0.15;
}
.label-skt { color: var(--saffron); }
.label-trn { color: var(--gold); }
.label-mng { color: var(--muted2); }
.verse-sanskrit {
  font-size: 16px; line-height: 2;
  color: var(--text); white-space: pre-line;
  padding-left: 16px;
  border-left: 2px solid rgba(232,135,30,0.4);
}
.verse-roman {
  font-size: 14px; line-height: 2;
  color: var(--text2); white-space: pre-line;
  font-style: italic; padding-left: 16px;
  border-left: 2px solid rgba(201,168,76,0.3);
}
.verse-meaning {
  font-size: 15px; line-height: 1.9;
  color: #B8A882;
}
.daily-note {
  text-align: center; color: var(--muted);
  font-size: 11px; letter-spacing: 1px;
  font-family: 'Cinzel', serif;
}



/* ── VERSE CARDS ── */
.verse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
  cursor: pointer; margin-bottom: 10px;
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
}
.verse-card:hover { background: var(--card2); border-color: var(--border2); }
.verse-card.open {
  border-color: rgba(201,168,76,0.35);
  box-shadow: 0 0 28px rgba(201,168,76,0.07);
  background: var(--card2);
}
.verse-card-header {
  display: flex; justify-content: space-between; align-items: center;
}
.verse-num {
  font-family: 'Cinzel', serif;
  color: var(--saffron); font-size: 12px; letter-spacing: 1.5px;
  display: flex; align-items: center; gap: 8px;
}
.verse-arrow {
  color: var(--muted2); font-size: 14px;
  transition: transform 0.25s;
}
.verse-card.open .verse-arrow { transform: rotate(180deg); color: var(--gold); }
.verse-preview {
  color: var(--muted2); font-size: 13px;
  margin-top: 7px; line-height: 1.6;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-style: italic;
}
.verse-detail { margin-top: 18px; display: none; }
.verse-card.open .verse-detail { display: block; }

/* ── CHAPTER GRID ── */
.chapter-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.chapter-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 14px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
}
.chapter-card::after {
  content: attr(data-num);
  position: absolute; right: -4px; bottom: -12px;
  font-family: 'Cinzel', serif; font-size: 54px;
  color: rgba(201,168,76,0.04); line-height: 1;
  pointer-events: none;
}
.chapter-card:hover {
  border-color: rgba(201,168,76,0.3);
  background: var(--card2);
  transform: translateY(-1px);
}
.chapter-num {
  font-family: 'Cinzel', serif;
  color: var(--saffron); font-size: 9px;
  letter-spacing: 2.5px; margin-bottom: 6px;
}
.chapter-name { color: var(--text2); font-size: 12px; line-height: 1.5; margin-bottom: 6px; font-style: italic; }
.chapter-info { display: flex; justify-content: space-between; align-items: center; }
.chapter-count { color: var(--muted); font-size: 10px; font-family: 'Cinzel', serif; }

/* ── CATEGORY (Sanatana sections) ── */
.cat-group { margin-bottom: 26px; }
.cat-group-title {
  font-family: 'Cinzel', serif; font-size: 11px;
  color: var(--saffron); letter-spacing: 3px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.cat-group-title::after { content:''; flex:1; height:1px; background: var(--border2); }
.cat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 18px;
  margin-bottom: 9px; cursor: pointer;
  display: flex; align-items: center; gap: 16px;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
}
.cat-card.locked { cursor: default; opacity: 0.62; }
.cat-card:not(.locked):hover { border-color: rgba(201,168,76,0.35); background: var(--card2); transform: translateY(-1px); }
.cat-glyph {
  width: 44px; height: 44px; flex-shrink: 0;
  border-radius: 12px;
  background: radial-gradient(circle, rgba(232,135,30,0.14), transparent 75%);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--gold2);
}
.cat-body { flex: 1; }
.cat-name { font-size: 17px; color: var(--text); letter-spacing: 0.5px; }
.cat-desc { font-size: 12.5px; color: var(--muted2); margin-top: 3px; font-style: italic; line-height: 1.4; }
.cat-status {
  font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: 1.5px; flex-shrink: 0;
}
.cat-status.live { color: var(--saffron); }
.soon-badge {
  background: rgba(107,85,53,0.15);
  border: 1px solid rgba(107,85,53,0.4);
  border-radius: 12px; padding: 4px 10px;
  color: var(--muted2); font-size: 9px;
  font-family: 'Cinzel', serif; letter-spacing: 1.5px;
  white-space: nowrap;
}

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 20px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
.search-input {
  width: 100%; background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 16px 13px 40px;
  color: var(--text); font-size: 14px; outline: none;
  font-family: 'Cormorant Garamond', serif;
  transition: border-color 0.2s; letter-spacing: 0.3px;
}
.search-input:focus { border-color: rgba(201,168,76,0.4); }
.search-input::placeholder { color: var(--muted); font-style: italic; }

/* ── BACK BTN ── */
.back-btn {
  background: none; border: none; color: var(--saffron);
  cursor: pointer; font-size: 10px; padding: 0;
  margin-bottom: 20px; letter-spacing: 2px;
  font-family: 'Cinzel', serif; display: flex;
  align-items: center; gap: 6px; transition: color 0.2s;
}
.back-btn:hover { color: var(--gold2); }

.footer-note {
  text-align: center; color: var(--muted);
  font-size: 11px; margin-top: 30px;
  font-family: 'Cinzel', serif; letter-spacing: 1px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-om">ॐ</div>
  <div class="header-text">
    <div class="header-title">SANĀTANA</div>
    <div class="header-sub">SANĀTANA DHARMA</div>
  </div>
  <div class="header-right">
    <div class="header-count" id="header-count">SACRED TEXTS</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn" onclick="showTab('daily')">DAILY</button>
  <button class="tab-btn" onclick="showTab('browse')">BROWSE</button>
</div>

<div class="content">

  <!-- ── DAILY TAB ── -->
  <div class="page" id="page-daily">
    <div style="margin-bottom:22px">
      <h2 class="section-title">Today's Verse</h2>
      <p class="section-sub" id="daily-date-label"></p>
    </div>
    <div class="daily-card">
      <div class="daily-meta">
        <div>
          <div class="daily-ref" id="daily-ref"></div>
          <div class="daily-ch" id="daily-ch"></div>
        </div>
        <div class="daily-date-badge" id="daily-badge"></div>
      </div>
      <div class="verse-block">
        <div class="block-label label-skt">SANSKRIT</div>
        <p class="verse-sanskrit" id="daily-skt"></p>
      </div>
      <div class="divider-line"></div>
      <div class="verse-block">
        <div class="block-label label-trn">TRANSLITERATION</div>
        <p class="verse-roman" id="daily-roman"></p>
      </div>
      <div class="divider-line"></div>
      <div class="verse-block">
        <div class="block-label label-mng">MEANING</div>
        <p class="verse-meaning" id="daily-meaning"></p>
      </div>
    </div>
    <p class="daily-note">A new verse reveals itself each day ✦</p>
  </div>

  <!-- ── BROWSE TAB ── -->
  <div class="page" id="page-browse">

    <!-- LEVEL 0: Sanatana categories -->
    <div id="browse-categories">
      <h2 class="section-title">The Library</h2>
      <p class="section-sub">SHĀSTRAS OF SANĀTANA DHARMA</p>
      <div id="category-list"></div>
    </div>

    <!-- LEVEL 1: chapters / sub-texts inside a category -->
    <div id="browse-chapters" style="display:none">
      <button class="back-btn" onclick="backToCategories()">← LIBRARY</button>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="search-input"
          placeholder="Search verses by meaning or keyword..."
          oninput="doSearch(this.value)">
      </div>
      <div id="search-results" style="display:none"></div>
      <div id="chapter-list-wrap">
        <h2 class="section-title" id="cat-header-title"></h2>
        <p class="section-sub" id="cat-header-sub"></p>
        <div class="chapter-grid" id="chapter-grid"></div>
      </div>
    </div>

    <!-- LEVEL 2: verses inside a chapter -->
    <div id="browse-verses" style="display:none">
      <button class="back-btn" id="verses-back-btn">← BACK</button>
      <div id="chapter-header"></div>
      <div id="verses-list"></div>
    </div>

  </div>

</div>

<script>

const VERSES = [{"c": 1, "v": 1, "s": "\u0927\u0943\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930 \u0909\u0935\u093e\u091a\n\n\u0927\u0930\u094d\u092e\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0947 \u0915\u0941\u0930\u0941\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0947 \u0938\u092e\u0935\u0947\u0924\u093e \u092f\u0941\u092f\u0941\u0924\u094d\u0938\u0935\u0903\u0964\n\n\u092e\u093e\u092e\u0915\u093e\u0903 \u092a\u093e\u0923\u094d\u0921\u0935\u093e\u0936\u094d\u091a\u0948\u0935 \u0915\u093f\u092e\u0915\u0941\u0930\u094d\u0935\u0924 \u0938\u091e\u094d\u091c\u092f\u0964\u09641.1\u0964\u0964", "r": "dh\u1e5bitar\u0101\u015bhtra uv\u0101cha\ndharma-k\u1e63hetre kuru-k\u1e63hetre samavet\u0101 yuyutsava\u1e25\nm\u0101mak\u0101\u1e25 p\u0101\u1e47\u1e0dav\u0101\u015bhchaiva kimakurvata sa\u00f1jaya", "t": "Dhritarashtra said, \"What did my people and the sons of Pandu do when they had assembled together, eager for battle, on the holy plain of Kurukshetra, O Sanjaya?\""}, {"c": 1, "v": 2, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u0924\u0941 \u092a\u093e\u0923\u094d\u0921\u0935\u093e\u0928\u0940\u0915\u0902 \u0935\u094d\u092f\u0942\u0922\u0902 \u0926\u0941\u0930\u094d\u092f\u094b\u0927\u0928\u0938\u094d\u0924\u0926\u093e\u0964\n\n\u0906\u091a\u093e\u0930\u094d\u092f\u092e\u0941\u092a\u0938\u0919\u094d\u0917\u092e\u094d\u092f \u0930\u093e\u091c\u093e \u0935\u091a\u0928\u092e\u092c\u094d\u0930\u0935\u0940\u0924\u094d\u0964\u09641.2\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nd\u1e5bi\u1e63h\u1e6dv\u0101 tu p\u0101\u1e47\u1e0dav\u0101n\u012bka\u1e41 vy\u016b\u1e0dha\u1e41 duryodhanastad\u0101\n\u0101ch\u0101ryamupasa\u1e45gamya r\u0101j\u0101 vachanamabrav\u012bt", "t": "Sanjaya said: Having seen the army of the Pandavas drawn up in battle array, King Duryodhana approached his teacher, Drona, and spoke these words."}, {"c": 1, "v": 3, "s": "\u092a\u0936\u094d\u092f\u0948\u0924\u093e\u0902 \u092a\u093e\u0923\u094d\u0921\u0941\u092a\u0941\u0924\u094d\u0930\u093e\u0923\u093e\u092e\u093e\u091a\u093e\u0930\u094d\u092f \u092e\u0939\u0924\u0940\u0902 \u091a\u092e\u0942\u092e\u094d\u0964\n\n\u0935\u094d\u092f\u0942\u0922\u093e\u0902 \u0926\u094d\u0930\u0941\u092a\u0926\u092a\u0941\u0924\u094d\u0930\u0947\u0923 \u0924\u0935 \u0936\u093f\u0937\u094d\u092f\u0947\u0923 \u0927\u0940\u092e\u0924\u093e\u0964\u09641.3\u0964\u0964", "r": "pa\u015bhyait\u0101\u1e41 p\u0101\u1e47\u1e0du-putr\u0101\u1e47\u0101m \u0101ch\u0101rya mahat\u012b\u1e41 cham\u016bm\nvy\u016b\u1e0dh\u0101\u1e41 drupada-putre\u1e47a tava \u015bhi\u1e63hye\u1e47a dh\u012bmat\u0101", "t": "Behold, O Teacher! This mighty army of the sons of Pandu, arrayed by the son of Drupada, thy wise disciple."}, {"c": 1, "v": 4, "s": "\u0905\u0924\u094d\u0930 \u0936\u0942\u0930\u093e \u092e\u0939\u0947\u0937\u094d\u0935\u093e\u0938\u093e \u092d\u0940\u092e\u093e\u0930\u094d\u091c\u0941\u0928\u0938\u092e\u093e \u092f\u0941\u0927\u093f\u0964\n\n\u092f\u0941\u092f\u0941\u0927\u093e\u0928\u094b \u0935\u093f\u0930\u093e\u091f\u0936\u094d\u091a \u0926\u094d\u0930\u0941\u092a\u0926\u0936\u094d\u091a \u092e\u0939\u093e\u0930\u0925\u0903\u0964\u09641.4\u0964\u0964", "r": "atra \u015bh\u016br\u0101 mahe\u1e63hv\u0101s\u0101 bh\u012bm\u0101rjuna-sam\u0101 yudhi\nyuyudh\u0101no vir\u0101\u1e6da\u015bhcha drupada\u015bhcha mah\u0101-ratha\u1e25", "t": "Here are heroes, mighty archers, equal in battle to Bhima and Arjuna, Yuyudhana (Satyaki), Virata, and Drupada\u2014all mighty warriors."}, {"c": 1, "v": 5, "s": "\u0927\u0943\u0937\u094d\u091f\u0915\u0947\u0924\u0941\u0936\u094d\u091a\u0947\u0915\u093f\u0924\u093e\u0928\u0903 \u0915\u093e\u0936\u093f\u0930\u093e\u091c\u0936\u094d\u091a \u0935\u0940\u0930\u094d\u092f\u0935\u093e\u0928\u094d\u0964\n\n\u092a\u0941\u0930\u0941\u091c\u093f\u0924\u094d\u0915\u0941\u0928\u094d\u0924\u093f\u092d\u094b\u091c\u0936\u094d\u091a \u0936\u0948\u092c\u094d\u092f\u0936\u094d\u091a \u0928\u0930\u092a\u0941\u0919\u094d\u0917\u0935\u0903\u0964\u09641.5\u0964\u0964", "r": "dh\u1e5bi\u1e63h\u1e6daketu\u015bhchekit\u0101na\u1e25 k\u0101\u015bhir\u0101ja\u015bhcha v\u012bryav\u0101n\npurujit kuntibhoja\u015bhcha \u015bhaibya\u015bhcha nara-pu\u1e45gava\u1e25\nyudh\u0101manyu\u015bhcha vikr\u0101nta uttamauj\u0101\u015bhcha v\u012bryav\u0101n", "t": "Dhrishtaketu, Chekitana, the valiant king of Kasi, Purujit, Kuntibhoja, and Saibya\u2014the best of men."}, {"c": 1, "v": 6, "s": "\u092f\u0941\u0927\u093e\u092e\u0928\u094d\u092f\u0941\u0936\u094d\u091a \u0935\u093f\u0915\u094d\u0930\u093e\u0928\u094d\u0924 \u0909\u0924\u094d\u0924\u092e\u094c\u091c\u093e\u0936\u094d\u091a \u0935\u0940\u0930\u094d\u092f\u0935\u093e\u0928\u094d\u0964\n\n\u0938\u094c\u092d\u0926\u094d\u0930\u094b \u0926\u094d\u0930\u094c\u092a\u0926\u0947\u092f\u093e\u0936\u094d\u091a \u0938\u0930\u094d\u0935 \u090f\u0935 \u092e\u0939\u093e\u0930\u0925\u093e\u0903\u0964\u09641.6\u0964\u0964", "r": "saubhadro draupadey\u0101\u015bhcha sarva eva mah\u0101-rath\u0101\u1e25", "t": "The strong Yudhamanyu and the brave Uttamaujas, the son of Subhadra (Abhimanyu, the son of Subhadra and Arjuna), and the sons of Draupadi, all of them great charioteers (great heroes).\""}, {"c": 1, "v": 7, "s": "\u0905\u0938\u094d\u092e\u093e\u0915\u0902 \u0924\u0941 \u0935\u093f\u0936\u093f\u0937\u094d\u091f\u093e \u092f\u0947 \u0924\u093e\u0928\u094d\u0928\u093f\u092c\u094b\u0927 \u0926\u094d\u0935\u093f\u091c\u094b\u0924\u094d\u0924\u092e\u0964\n\n\u0928\u093e\u092f\u0915\u093e \u092e\u092e \u0938\u0948\u0928\u094d\u092f\u0938\u094d\u092f \u0938\u0902\u091c\u094d\u091e\u093e\u0930\u094d\u0925\u0902 \u0924\u093e\u0928\u094d\u092c\u094d\u0930\u0935\u0940\u092e\u093f \u0924\u0947\u0964\u09641.7\u0964\u0964", "r": "asm\u0101ka\u1e41 tu vi\u015bhi\u1e63h\u1e6d\u0101 ye t\u0101nnibodha dwijottama\nn\u0101yak\u0101 mama sainyasya sanj\u00f1\u0101rtha\u1e41 t\u0101nbrav\u012bmi te", "t": "Know also, O best among the twice-born! the names of those who are the most distinguished amongst ourselves, the leaders of my army; these I name to you for your information."}, {"c": 1, "v": 8, "s": "\u092d\u0935\u093e\u0928\u094d\u092d\u0940\u0937\u094d\u092e\u0936\u094d\u091a \u0915\u0930\u094d\u0923\u0936\u094d\u091a \u0915\u0943\u092a\u0936\u094d\u091a \u0938\u092e\u093f\u0924\u093f\u091e\u094d\u091c\u092f\u0903\u0964\n\n\u0905\u0936\u094d\u0935\u0924\u094d\u0925\u093e\u092e\u093e \u0935\u093f\u0915\u0930\u094d\u0923\u0936\u094d\u091a \u0938\u094c\u092e\u0926\u0924\u094d\u0924\u093f\u0938\u094d\u0924\u0925\u0948\u0935 \u091a\u0964\u09641.8\u0964\u0964", "r": "bhav\u0101nbh\u012b\u1e63hma\u015bhcha kar\u1e47a\u015bhcha k\u1e5bipa\u015bhcha samiti\u00f1jaya\u1e25\na\u015bhvatth\u0101m\u0101 vikar\u1e47a\u015bhcha saumadattis tathaiva cha", "t": "\"Thou thyself, Bhishma, Karna, Kripa, the victorious in war, Asvatthama, Vikarna, and Bhurisrava, the son of Somadatta\u2014all these are ready for battle.\""}, {"c": 1, "v": 9, "s": "\u0905\u0928\u094d\u092f\u0947 \u091a \u092c\u0939\u0935\u0903 \u0936\u0942\u0930\u093e \u092e\u0926\u0930\u094d\u0925\u0947 \u0924\u094d\u092f\u0915\u094d\u0924\u091c\u0940\u0935\u093f\u0924\u093e\u0903\u0964\n\n\u0928\u093e\u0928\u093e\u0936\u0938\u094d\u0924\u094d\u0930\u092a\u094d\u0930\u0939\u0930\u0923\u093e\u0903 \u0938\u0930\u094d\u0935\u0947 \u092f\u0941\u0926\u094d\u0927\u0935\u093f\u0936\u093e\u0930\u0926\u093e\u0903\u0964\u09641.9\u0964\u0964", "r": "anye cha bahava\u1e25 \u015bh\u016br\u0101 madarthe tyaktaj\u012bvit\u0101\u1e25\nn\u0101n\u0101-\u015bhastra-prahara\u1e47\u0101\u1e25 sarve yuddha-vi\u015bh\u0101rad\u0101\u1e25", "t": "And also many other heroes, ready to give up their lives for my sake, armed with various weapons and missiles, all well-skilled in battle."}, {"c": 1, "v": 10, "s": "\u0905\u092a\u0930\u094d\u092f\u093e\u092a\u094d\u0924\u0902 \u0924\u0926\u0938\u094d\u092e\u093e\u0915\u0902 \u092c\u0932\u0902 \u092d\u0940\u0937\u094d\u092e\u093e\u092d\u093f\u0930\u0915\u094d\u0937\u093f\u0924\u092e\u094d\u0964\n\n\u092a\u0930\u094d\u092f\u093e\u092a\u094d\u0924\u0902 \u0924\u094d\u0935\u093f\u0926\u092e\u0947\u0924\u0947\u0937\u093e\u0902 \u092c\u0932\u0902 \u092d\u0940\u092e\u093e\u092d\u093f\u0930\u0915\u094d\u0937\u093f\u0924\u092e\u094d\u0964\u09641.10\u0964\u0964", "r": "apary\u0101pta\u1e41 tadasm\u0101ka\u1e41 bala\u1e41 bh\u012b\u1e63hm\u0101bhirak\u1e63hitam\npary\u0101pta\u1e41 tvidamete\u1e63h\u0101\u1e41 bala\u1e41 bh\u012bm\u0101bhirak\u1e63hitam", "t": "Our army, marshalled by Bhishma, is insufficient, whereas theirs, marshalled by Bhima, is sufficient."}, {"c": 1, "v": 11, "s": "\u0905\u092f\u0928\u0947\u0937\u0941 \u091a \u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u092f\u0925\u093e\u092d\u093e\u0917\u092e\u0935\u0938\u094d\u0925\u093f\u0924\u093e\u0903\u0964\n\n\u092d\u0940\u0937\u094d\u092e\u092e\u0947\u0935\u093e\u092d\u093f\u0930\u0915\u094d\u0937\u0928\u094d\u0924\u0941 \u092d\u0935\u0928\u094d\u0924\u0903 \u0938\u0930\u094d\u0935 \u090f\u0935 \u0939\u093f\u0964\u09641.11\u0964\u0964", "r": "ayane\u1e63hu cha sarve\u1e63hu yath\u0101-bh\u0101gamavasthit\u0101\u1e25\nbh\u012b\u1e63hmamev\u0101bhirak\u1e63hantu bhavanta\u1e25 sarva eva hi", "t": "Therefore, do all of you, stationed in your respective positions in the several divisions of the army, protect Bhishma alone."}, {"c": 1, "v": 12, "s": "\u0924\u0938\u094d\u092f \u0938\u0902\u091c\u0928\u092f\u0928\u094d\u0939\u0930\u094d\u0937\u0902 \u0915\u0941\u0930\u0941\u0935\u0943\u0926\u094d\u0927\u0903 \u092a\u093f\u0924\u093e\u092e\u0939\u0903\u0964\n\n\u0938\u093f\u0902\u0939\u0928\u093e\u0926\u0902 \u0935\u093f\u0928\u0926\u094d\u092f\u094b\u091a\u094d\u091a\u0948\u0903 \u0936\u0919\u094d\u0916\u0902 \u0926\u0927\u094d\u092e\u094c \u092a\u094d\u0930\u0924\u093e\u092a\u0935\u093e\u0928\u094d\u0964\u09641.12\u0964\u0964", "r": "tasya sa\u00f1janayan har\u1e63ha\u1e41 kuru-v\u1e5biddha\u1e25 pit\u0101maha\u1e25\nsi\u1e41ha-n\u0101da\u1e41 vinadyochchai\u1e25 \u015bha\u1e45kha\u1e41 dadhmau prat\u0101pav\u0101n", "t": "His glorious grandsire, the oldest of the Kauravas, roared like a lion to cheer Duryodhana and blew his conch."}, {"c": 1, "v": 13, "s": "\u0924\u0924\u0903 \u0936\u0919\u094d\u0916\u093e\u0936\u094d\u091a \u092d\u0947\u0930\u094d\u092f\u0936\u094d\u091a \u092a\u0923\u0935\u093e\u0928\u0915\u0917\u094b\u092e\u0941\u0916\u093e\u0903\u0964\n\n\u0938\u0939\u0938\u0948\u0935\u093e\u092d\u094d\u092f\u0939\u0928\u094d\u092f\u0928\u094d\u0924 \u0938 \u0936\u092c\u094d\u0926\u0938\u094d\u0924\u0941\u092e\u0941\u0932\u094b\u093d\u092d\u0935\u0924\u094d\u0964\u09641.13\u0964\u0964", "r": "tata\u1e25 \u015bha\u1e45kh\u0101\u015bhcha bherya\u015bhcha pa\u1e47av\u0101naka-gomukh\u0101\u1e25\nsahasaiv\u0101bhyahanyanta sa \u015bhabdastumulo \u2019bhavat", "t": "Then, suddenly, conches, kettledrums, tabors, drums, and cow horns blared forth from the Kaurava side, and the sound was tremendous."}, {"c": 1, "v": 14, "s": "\u0924\u0924\u0903 \u0936\u094d\u0935\u0947\u0924\u0948\u0930\u094d\u0939\u092f\u0948\u0930\u094d\u092f\u0941\u0915\u094d\u0924\u0947 \u092e\u0939\u0924\u093f \u0938\u094d\u092f\u0928\u094d\u0926\u0928\u0947 \u0938\u094d\u0925\u093f\u0924\u094c\u0964\n\n\u092e\u093e\u0927\u0935\u0903 \u092a\u093e\u0923\u094d\u0921\u0935\u0936\u094d\u091a\u0948\u0935 \u0926\u093f\u0935\u094d\u092f\u094c \u0936\u0919\u094d\u0916\u094c \u092a\u094d\u0930\u0926\u0927\u094d\u092e\u0924\u0941\u0903\u0964\u09641.14\u0964\u0964", "r": "tata\u1e25 \u015bhvetairhayairyukte mahati syandane sthitau\nm\u0101dhava\u1e25 p\u0101\u1e47\u1e0dava\u015bhchaiva divyau \u015bha\u1e45khau pradadhmatu\u1e25", "t": "Then, Madhava (Krishna) and the son of Pandu (Arjuna), seated in the magnificent chariot yoked with white horses, blew divine conches."}, {"c": 1, "v": 15, "s": "\u092a\u093e\u091e\u094d\u091a\u091c\u0928\u094d\u092f\u0902 \u0939\u0943\u0937\u0940\u0915\u0947\u0936\u094b \u0926\u0947\u0935\u0926\u0924\u094d\u0924\u0902 \u0927\u0928\u0902\u091c\u092f\u0903\u0964\n\n\u092a\u094c\u0923\u094d\u0921\u094d\u0930\u0902 \u0926\u0927\u094d\u092e\u094c \u092e\u0939\u093e\u0936\u0919\u094d\u0916\u0902 \u092d\u0940\u092e\u0915\u0930\u094d\u092e\u093e \u0935\u0943\u0915\u094b\u0926\u0930\u0903\u0964\u09641.15\u0964\u0964", "r": "p\u0101\u00f1chajanya\u1e41 h\u1e5bi\u1e63h\u012bke\u015bho devadatta\u1e41 dhana\u00f1jaya\u1e25\npau\u1e47\u1e0dra\u1e41 dadhmau mah\u0101-\u015bha\u1e45kha\u1e41 bh\u012bma-karm\u0101 v\u1e5bikodara\u1e25", "t": "Hrishikesha blew the Panchajanya, Arjuna blew the Devadatta, and Bhima, the wolf-bellied doer of terrible deeds, blew the great conch Paundra."}, {"c": 1, "v": 16, "s": "\u0905\u0928\u0928\u094d\u0924\u0935\u093f\u091c\u092f\u0902 \u0930\u093e\u091c\u093e \u0915\u0941\u0928\u094d\u0924\u0940\u092a\u0941\u0924\u094d\u0930\u094b \u092f\u0941\u0927\u093f\u0937\u094d\u0920\u093f\u0930\u0903\u0964\n\n\u0928\u0915\u0941\u0932\u0903 \u0938\u0939\u0926\u0947\u0935\u0936\u094d\u091a \u0938\u0941\u0918\u094b\u0937\u092e\u0923\u093f\u092a\u0941\u0937\u094d\u092a\u0915\u094c\u0964\u09641.16\u0964\u0964", "r": "anantavijaya\u1e41 r\u0101j\u0101 kunt\u012b-putro yudhi\u1e63h\u1e6dhira\u1e25\nnakula\u1e25 sahadeva\u015bhcha sugho\u1e63ha-ma\u1e47ipu\u1e63hpakau", "t": "King Yudhishthira, the son of Kunti, blew the Anantavijaya; Nakula and Sahadeva blew the Sughosha and the Manipushpaka."}, {"c": 1, "v": 17, "s": "\u0915\u093e\u0936\u094d\u092f\u0936\u094d\u091a \u092a\u0930\u092e\u0947\u0937\u094d\u0935\u093e\u0938\u0903 \u0936\u093f\u0916\u0923\u094d\u0921\u0940 \u091a \u092e\u0939\u093e\u0930\u0925\u0903\u0964\n\n\u0927\u0943\u0937\u094d\u091f\u0926\u094d\u092f\u0941\u092e\u094d\u0928\u094b \u0935\u093f\u0930\u093e\u091f\u0936\u094d\u091a \u0938\u093e\u0924\u094d\u092f\u0915\u093f\u0936\u094d\u091a\u093e\u092a\u0930\u093e\u091c\u093f\u0924\u0903\u0964\u09641.17\u0964\u0964", "r": "k\u0101\u015bhya\u015bhcha parame\u1e63hv\u0101sa\u1e25 \u015bhikha\u1e47\u1e0d\u012b cha mah\u0101-ratha\u1e25\ndh\u1e5bi\u1e63h\u1e6dadyumno vir\u0101\u1e6da\u015bhcha s\u0101tyaki\u015bh ch\u0101par\u0101jita\u1e25", "t": "The king of Kasi, an excellent archer, Sikhandi, the mighty car-warrior, Dhrishtadyumna, Virata, and Satyaki, the unconquered."}, {"c": 1, "v": 18, "s": "\u0926\u094d\u0930\u0941\u092a\u0926\u094b \u0926\u094d\u0930\u094c\u092a\u0926\u0947\u092f\u093e\u0936\u094d\u091a \u0938\u0930\u094d\u0935\u0936\u0903 \u092a\u0943\u0925\u093f\u0935\u0940\u092a\u0924\u0947\u0964\n\n\u0938\u094c\u092d\u0926\u094d\u0930\u0936\u094d\u091a \u092e\u0939\u093e\u092c\u093e\u0939\u0941\u0903 \u0936\u0919\u094d\u0916\u093e\u0928\u094d\u0926\u0927\u094d\u092e\u0941\u0903 \u092a\u0943\u0925\u0915\u094d\u092a\u0943\u0925\u0915\u094d\u0964\u09641.18\u0964\u0964", "r": "drupado draupadey\u0101\u015bhcha sarva\u015bha\u1e25 p\u1e5bithiv\u012b-pate\nsaubhadra\u015bhcha mah\u0101-b\u0101hu\u1e25 \u015bha\u1e45kh\u0101ndadhmu\u1e25 p\u1e5bithak p\u1e5bithak", "t": "Drupada and the sons of Draupadi, O Lord of the Earth, and the son of Subhadra, the mighty-armed, blew their conches each separately."}, {"c": 1, "v": 19, "s": "\u0938 \u0918\u094b\u0937\u094b \u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u093e\u0923\u093e\u0902 \u0939\u0943\u0926\u092f\u093e\u0928\u093f \u0935\u094d\u092f\u0926\u093e\u0930\u092f\u0924\u094d\u0964\n\n\u0928\u092d\u0936\u094d\u091a \u092a\u0943\u0925\u093f\u0935\u0940\u0902 \u091a\u0948\u0935 \u0924\u0941\u092e\u0941\u0932\u094b \u0935\u094d\u092f\u0928\u0941\u0928\u093e\u0926\u092f\u0928\u094d\u0964\u09641.19\u0964\u0964", "r": "sa gho\u1e63ho dh\u0101rtar\u0101\u1e63h\u1e6dr\u0101\u1e47\u0101\u1e41 h\u1e5biday\u0101ni vyad\u0101rayat\nnabha\u015bhcha p\u1e5bithiv\u012b\u1e41 chaiva tumulo nun\u0101dayan", "t": "The tumultuous sound rent the hearts of Dhritarashtra's party, reverberating through both heaven and earth."}, {"c": 1, "v": 20, "s": "\u0905\u0925 \u0935\u094d\u092f\u0935\u0938\u094d\u0925\u093f\u0924\u093e\u0928\u094d \u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u093e\u0928\u094d\u0915\u092a\u093f\u0927\u094d\u0935\u091c\u0903\u0964\n\n\u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u0947 \u0936\u0938\u094d\u0924\u094d\u0930\u0938\u0902\u092a\u093e\u0924\u0947 \u0927\u0928\u0941\u0930\u0941\u0926\u094d\u092f\u092e\u094d\u092f \u092a\u093e\u0923\u094d\u0921\u0935\u0903\u0964\u09641.20\u0964\u0964", "r": "atha vyavasthit\u0101n d\u1e5bi\u1e63h\u1e6dv\u0101 dh\u0101rtar\u0101\u1e63h\u1e6dr\u0101n kapi-dhwaja\u1e25\nprav\u1e5bitte \u015bhastra-samp\u0101te dhanurudyamya p\u0101\u1e47\u1e0dava\u1e25\nh\u1e5bi\u1e63h\u012bke\u015bha\u1e41 tad\u0101 v\u0101kyam idam \u0101ha mah\u012b-pate", "t": "Then, seeing the people of Dhritarashtra's party standing arrayed and the discharge of weapons about to begin, Arjuna, the son of Pandu whose ensign was a monkey, took up his bow and said the following to Krishna, O Lord of the Earth."}, {"c": 1, "v": 21, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0939\u0943\u0937\u0940\u0915\u0947\u0936\u0902 \u0924\u0926\u093e \u0935\u093e\u0915\u094d\u092f\u092e\u093f\u0926\u092e\u093e\u0939 \u092e\u0939\u0940\u092a\u0924\u0947\u0964\n\n\u0938\u0947\u0928\u092f\u094b\u0930\u0941\u092d\u092f\u094b\u0930\u094d\u092e\u0927\u094d\u092f\u0947 \u0930\u0925\u0902 \u0938\u094d\u0925\u093e\u092a\u092f \u092e\u0947\u093d\u091a\u094d\u092f\u0941\u0924\u0964\u09641.21\u0964\u0964", "r": "arjuna uv\u0101cha\nsenayor ubhayor madhye ratha\u1e41 sth\u0101paya me \u2019chyuta", "t": "Arjuna said, \"O Krishna, place my chariot in the middle between the two armies, so that I may behold those who stand here, desirous to fight, and know with whom I must fight when the battle is about to commence.\""}, {"c": 1, "v": 22, "s": "\u092f\u093e\u0935\u0926\u0947\u0924\u093e\u0928\u094d\u0928\u093f\u0930\u0940\u0915\u094d\u0937\u0947\u093d\u0939\u0902 \u092f\u094b\u0926\u094d\u0927\u0941\u0915\u093e\u092e\u093e\u0928\u0935\u0938\u094d\u0925\u093f\u0924\u093e\u0928\u094d\u0964\n\n\u0915\u0948\u0930\u094d\u092e\u092f\u093e \u0938\u0939 \u092f\u094b\u0926\u094d\u0927\u0935\u094d\u092f\u092e\u0938\u094d\u092e\u093f\u0928\u094d\u0930\u0923\u0938\u092e\u0941\u0926\u094d\u092f\u092e\u0947\u0964\u09641.22\u0964\u0964", "r": "y\u0101vadet\u0101n nir\u012bk\u1e63he \u2019ha\u1e41 yoddhu-k\u0101m\u0101n avasthit\u0101n\nkairmay\u0101 saha yoddhavyam asmin ra\u1e47a-samudyame", "t": "Arjuna said, \"O Krishna, place my chariot in the middle between the two armies, so that I may behold those who stand here, desirous to fight, and know with whom I must fight when the battle is about to commence.\""}, {"c": 1, "v": 23, "s": "\u092f\u094b\u0924\u094d\u0938\u094d\u092f\u092e\u093e\u0928\u093e\u0928\u0935\u0947\u0915\u094d\u0937\u0947\u093d\u0939\u0902 \u092f \u090f\u0924\u0947\u093d\u0924\u094d\u0930 \u0938\u092e\u093e\u0917\u0924\u093e\u0903\u0964\n\n\u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u0938\u094d\u092f \u0926\u0941\u0930\u094d\u092c\u0941\u0926\u094d\u0927\u0947\u0930\u094d\u092f\u0941\u0926\u094d\u0927\u0947 \u092a\u094d\u0930\u093f\u092f\u091a\u093f\u0915\u0940\u0930\u094d\u0937\u0935\u0903\u0964\u09641.23\u0964\u0964", "r": "yotsyam\u0101n\u0101n avek\u1e63he \u2019ha\u1e41 ya ete \u2019tra sam\u0101gat\u0101\u1e25\ndh\u0101rtar\u0101\u1e63h\u1e6drasya durbuddher yuddhe priya-chik\u012br\u1e63hava\u1e25", "t": "For I desire to observe those who are assembled here to fight, wishing to please in battle the evil-minded Duryodhana\u2014the son of Dhritarashtra."}, {"c": 1, "v": 24, "s": "\u0938\u0902\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u090f\u0935\u092e\u0941\u0915\u094d\u0924\u094b \u0939\u0943\u0937\u0940\u0915\u0947\u0936\u094b \u0917\u0941\u0921\u093e\u0915\u0947\u0936\u0947\u0928 \u092d\u093e\u0930\u0924\u0964\n\n\u0938\u0947\u0928\u092f\u094b\u0930\u0941\u092d\u092f\u094b\u0930\u094d\u092e\u0927\u094d\u092f\u0947 \u0938\u094d\u0925\u093e\u092a\u092f\u093f\u0924\u094d\u0935\u093e \u0930\u0925\u094b\u0924\u094d\u0924\u092e\u092e\u094d\u0964\u09641.24\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nevam ukto h\u1e5bi\u1e63h\u012bke\u015bho gu\u1e0d\u0101ke\u015bhena bh\u0101rata\nsenayor ubhayor madhye sth\u0101payitv\u0101 rathottamam", "t": "Sanjaya said, Thus addressed by Arjuna, Krishna stationed the best of chariots, O Dhritarashtra, in the midst of the two armies."}, {"c": 1, "v": 25, "s": "\u092d\u0940\u0937\u094d\u092e\u0926\u094d\u0930\u094b\u0923\u092a\u094d\u0930\u092e\u0941\u0916\u0924\u0903 \u0938\u0930\u094d\u0935\u0947\u0937\u093e\u0902 \u091a \u092e\u0939\u0940\u0915\u094d\u0937\u093f\u0924\u093e\u092e\u094d\u0964\n\n\u0909\u0935\u093e\u091a \u092a\u093e\u0930\u094d\u0925 \u092a\u0936\u094d\u092f\u0948\u0924\u093e\u0928\u094d\u0938\u092e\u0935\u0947\u0924\u093e\u0928\u094d\u0915\u0941\u0930\u0942\u0928\u093f\u0924\u093f\u0964\u09641.25\u0964\u0964", "r": "bh\u012b\u1e63hma-dro\u1e47a-pramukhata\u1e25 sarve\u1e63h\u0101\u1e41 cha mah\u012b-k\u1e63hit\u0101m\nuv\u0101cha p\u0101rtha pa\u015bhyait\u0101n samavet\u0101n kur\u016bn iti", "t": "In front of Bhishma and Drona, and all the rulers of the earth, he said: \"O Arjuna, son of Pritha, behold these Kurus gathered together.\""}, {"c": 1, "v": 26, "s": "\u0924\u0924\u094d\u0930\u093e\u092a\u0936\u094d\u092f\u0924\u094d\u0938\u094d\u0925\u093f\u0924\u093e\u0928\u094d\u092a\u093e\u0930\u094d\u0925\u0903 \u092a\u093f\u0924\u0943\u093c\u0928\u0925 \u092a\u093f\u0924\u093e\u092e\u0939\u093e\u0928\u094d\u0964\n\n\u0906\u091a\u093e\u0930\u094d\u092f\u093e\u0928\u094d\u092e\u093e\u0924\u0941\u0932\u093e\u0928\u094d\u092d\u094d\u0930\u093e\u0924\u0943\u093c\u0928\u094d\u092a\u0941\u0924\u094d\u0930\u093e\u0928\u094d\u092a\u094c\u0924\u094d\u0930\u093e\u0928\u094d\u0938\u0916\u0940\u0902\u0938\u094d\u0924\u0925\u093e\u0964\u09641.26\u0964\u0964", "r": "tatr\u0101pa\u015bhyat sthit\u0101n p\u0101rtha\u1e25 pit\u1e5d\u012bn atha pit\u0101mah\u0101n\n\u0101ch\u0101ry\u0101n m\u0101tul\u0101n bhr\u0101t\u1e5d\u012bn putr\u0101n pautr\u0101n sakh\u012b\u1e41s tath\u0101\n\u015bhva\u015bhur\u0101n suh\u1e5bida\u015bh chaiva senayor ubhayor api", "t": "Then, Arjuna (son of Pritha) saw there (in the armies) stationed fathers, grandfathers, teachers, maternal uncles, brothers, sons, grandsons, and friends."}, {"c": 1, "v": 27, "s": "\u0936\u094d\u0935\u0936\u0941\u0930\u093e\u0928\u094d\u0938\u0941\u0939\u0943\u0926\u0936\u094d\u091a\u0948\u0935 \u0938\u0947\u0928\u092f\u094b\u0930\u0941\u092d\u092f\u094b\u0930\u092a\u093f\u0964\n\n\u0924\u093e\u0928\u094d\u0938\u092e\u0940\u0915\u094d\u0937\u094d\u092f \u0938 \u0915\u094c\u0928\u094d\u0924\u0947\u092f\u0903 \u0938\u0930\u094d\u0935\u093e\u0928\u094d\u092c\u0928\u094d\u0927\u0942\u0928\u0935\u0938\u094d\u0925\u093f\u0924\u093e\u0928\u094d\u0964\u09641.27\u0964\u0964", "r": "t\u0101n sam\u012bk\u1e63hya sa kaunteya\u1e25 sarv\u0101n bandh\u016bn avasthit\u0101n\nk\u1e5bipay\u0101 paray\u0101vi\u1e63h\u1e6do vi\u1e63h\u012bdann idam abrav\u012bt", "t": "He saw fathers-in-law and friends in both the armies. The son of Kunti, Arjuna, seeing all those kinsmen thus standing arrayed, spoke sorrowfully, deeply filled with pity."}, {"c": 1, "v": 28, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0915\u0943\u092a\u092f\u093e \u092a\u0930\u092f\u093e\u093d\u093d\u0935\u093f\u0937\u094d\u091f\u094b \u0935\u093f\u0937\u0940\u0926\u0928\u094d\u0928\u093f\u0926\u092e\u092c\u094d\u0930\u0935\u0940\u0924\u094d\u0964\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u0947\u092e\u0902 \u0938\u094d\u0935\u091c\u0928\u0902 \u0915\u0943\u0937\u094d\u0923 \u092f\u0941\u092f\u0941\u0924\u094d\u0938\u0941\u0902 \u0938\u092e\u0941\u092a\u0938\u094d\u0925\u093f\u0924\u092e\u094d\u0964\u09641.28\u0964\u0964", "r": "arjuna uv\u0101cha\nd\u1e5bi\u1e63h\u1e6dvema\u1e41 sva-jana\u1e41 k\u1e5bi\u1e63h\u1e47a yuyutsu\u1e41 samupasthitam", "t": "Arjuna said, \"O Krishna, seeing my kinsmen arrayed here, eager to fight,"}, {"c": 1, "v": 29, "s": "\u0938\u0940\u0926\u0928\u094d\u0924\u093f \u092e\u092e \u0917\u093e\u0924\u094d\u0930\u093e\u0923\u093f \u092e\u0941\u0916\u0902 \u091a \u092a\u0930\u093f\u0936\u0941\u0937\u094d\u092f\u0924\u093f\u0964\n\n\u0935\u0947\u092a\u0925\u0941\u0936\u094d\u091a \u0936\u0930\u0940\u0930\u0947 \u092e\u0947 \u0930\u094b\u092e\u0939\u0930\u094d\u0937\u0936\u094d\u091a \u091c\u093e\u092f\u0924\u0947\u0964\u09641.29\u0964\u0964", "r": "s\u012bdanti mama g\u0101tr\u0101\u1e47i mukha\u1e41 cha pari\u015bhu\u1e63hyati\nvepathu\u015bh cha \u015bhar\u012bre me roma-har\u1e63ha\u015bh cha j\u0101yate", "t": "My limbs fail, my mouth is parched, my body quivers, and my hair stands on end."}, {"c": 1, "v": 30, "s": "\u0917\u093e\u0923\u094d\u0921\u0940\u0935\u0902 \u0938\u094d\u0930\u0902\u0938\u0924\u0947 \u0939\u0938\u094d\u0924\u093e\u0924\u094d\u0924\u094d\u0935\u0915\u094d\u091a\u0948\u0935 \u092a\u0930\u093f\u0926\u0939\u094d\u092f\u0924\u0947\u0964\n\n\u0928 \u091a \u0936\u0915\u094d\u0928\u094b\u092e\u094d\u092f\u0935\u0938\u094d\u0925\u093e\u0924\u0941\u0902 \u092d\u094d\u0930\u092e\u0924\u0940\u0935 \u091a \u092e\u0947 \u092e\u0928\u0903\u0964\u09641.30\u0964\u0964", "r": "g\u0101\u1e47\u1e0d\u012bva\u1e41 sra\u1e41sate hast\u0101t tvak chaiva paridahyate\nna cha \u015bhaknomy avasth\u0101tu\u1e41 bhramat\u012bva cha me mana\u1e25", "t": "The Gandiva slips from my hand, and my skin burns all over; I am unable to stand, and my mind is reeling, as it were."}, {"c": 1, "v": 31, "s": "\u0928\u093f\u092e\u093f\u0924\u094d\u0924\u093e\u0928\u093f \u091a \u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0935\u093f\u092a\u0930\u0940\u0924\u093e\u0928\u093f \u0915\u0947\u0936\u0935\u0964\n\n\u0928 \u091a \u0936\u094d\u0930\u0947\u092f\u094b\u093d\u0928\u0941\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0939\u0924\u094d\u0935\u093e \u0938\u094d\u0935\u091c\u0928\u092e\u093e\u0939\u0935\u0947\u0964\u09641.31\u0964\u0964", "r": "nimitt\u0101ni cha pa\u015bhy\u0101mi vipar\u012bt\u0101ni ke\u015bhava\nna cha \u015bhreyo \u2019nupa\u015bhy\u0101mi hatv\u0101 sva-janam \u0101have", "t": "And I see ill omens, O Kesava. I do not see any good in slaying my kinsmen in battle."}, {"c": 1, "v": 32, "s": "\u0928 \u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0947 \u0935\u093f\u091c\u092f\u0902 \u0915\u0943\u0937\u094d\u0923 \u0928 \u091a \u0930\u093e\u091c\u094d\u092f\u0902 \u0938\u0941\u0916\u093e\u0928\u093f \u091a\u0964\n\n\u0915\u093f\u0902 \u0928\u094b \u0930\u093e\u091c\u094d\u092f\u0947\u0928 \u0917\u094b\u0935\u093f\u0928\u094d\u0926 \u0915\u093f\u0902 \u092d\u094b\u0917\u0948\u0930\u094d\u091c\u0940\u0935\u093f\u0924\u0947\u0928 \u0935\u093e\u0964\u09641.32\u0964\u0964", "r": "na k\u0101\u1e45k\u1e63he vijaya\u1e41 k\u1e5bi\u1e63h\u1e47a na cha r\u0101jya\u1e41 sukh\u0101ni cha\nki\u1e41 no r\u0101jyena govinda ki\u1e41 bhogair j\u012bvitena v\u0101", "t": "I desire not victory, O Krishna, nor kingdom, nor pleasures.\nWhat use is dominion to us, O Krishna, or pleasures or even life?"}, {"c": 1, "v": 33, "s": "\u092f\u0947\u0937\u093e\u092e\u0930\u094d\u0925\u0947 \u0915\u093e\u0919\u094d\u0915\u094d\u0937\u093f\u0924\u0902 \u0928\u094b \u0930\u093e\u091c\u094d\u092f\u0902 \u092d\u094b\u0917\u093e\u0903 \u0938\u0941\u0916\u093e\u0928\u093f \u091a\u0964\n\n\u0924 \u0907\u092e\u0947\u093d\u0935\u0938\u094d\u0925\u093f\u0924\u093e \u092f\u0941\u0926\u094d\u0927\u0947 \u092a\u094d\u0930\u093e\u0923\u093e\u0902\u0938\u094d\u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0927\u0928\u093e\u0928\u093f \u091a\u0964\u09641.33\u0964\u0964", "r": "ye\u1e63h\u0101m arthe k\u0101\u1e45k\u1e63hita\u1e41 no r\u0101jya\u1e41 bhog\u0101\u1e25 sukh\u0101ni cha\nta ime \u2019vasthit\u0101 yuddhe pr\u0101\u1e47\u0101\u1e41s tyaktv\u0101 dhan\u0101ni cha", "t": "Those for whose sake we desire kingdom, enjoyments, and pleasures stand here in battle, having renounced life and wealth."}, {"c": 1, "v": 34, "s": "\u0906\u091a\u093e\u0930\u094d\u092f\u093e\u0903 \u092a\u093f\u0924\u0930\u0903 \u092a\u0941\u0924\u094d\u0930\u093e\u0938\u094d\u0924\u0925\u0948\u0935 \u091a \u092a\u093f\u0924\u093e\u092e\u0939\u093e\u0903\u0964\n\n\u092e\u093e\u0924\u0941\u0932\u093e\u0903 \u0936\u094d\u091a\u0936\u0941\u0930\u093e\u0903 \u092a\u094c\u0924\u094d\u0930\u093e\u0903 \u0936\u094d\u092f\u093e\u0932\u093e\u0903 \u0938\u092e\u094d\u092c\u0928\u094d\u0927\u093f\u0928\u0938\u094d\u0924\u0925\u093e\u0964\u09641.34\u0964\u0964", "r": "\u0101ch\u0101ry\u0101\u1e25 pitara\u1e25 putr\u0101s tathaiva cha pit\u0101mah\u0101\u1e25\nm\u0101tul\u0101\u1e25 \u015bhva\u015bhur\u0101\u1e25 pautr\u0101\u1e25 \u015bhy\u0101l\u0101\u1e25 sambandhinas tath\u0101", "t": "Teachers, fathers, sons, and grandfathers, maternal uncles, fathers-in-law, grandsons, brothers-in-law, and other relatives\u2014"}, {"c": 1, "v": 35, "s": "\u090f\u0924\u093e\u0928\u094d\u0928 \u0939\u0928\u094d\u0924\u0941\u092e\u093f\u091a\u094d\u091b\u093e\u092e\u093f \u0918\u094d\u0928\u0924\u094b\u093d\u092a\u093f \u092e\u0927\u0941\u0938\u0942\u0926\u0928\u0964\n\n\u0905\u092a\u093f \u0924\u094d\u0930\u0948\u0932\u094b\u0915\u094d\u092f\u0930\u093e\u091c\u094d\u092f\u0938\u094d\u092f \u0939\u0947\u0924\u094b\u0903 \u0915\u093f\u0902 \u0928\u0941 \u092e\u0939\u0940\u0915\u0943\u0924\u0947\u0964\u09641.35\u0964\u0964", "r": "et\u0101n na hantum ichchh\u0101mi ghnato \u2019pi madhus\u016bdana\napi trailokya-r\u0101jyasya heto\u1e25 ki\u1e41 nu mah\u012b-k\u1e5bite", "t": "These I do not wish to kill, O Krishna, even though they kill me, for the sake of dominion over the three worlds; leave alone killing them for the sake of the earth.\""}, {"c": 1, "v": 36, "s": "\u0928\u093f\u0939\u0924\u094d\u092f \u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u093e\u0928\u094d\u0928\u0903 \u0915\u093e \u092a\u094d\u0930\u0940\u0924\u093f\u0903 \u0938\u094d\u092f\u093e\u091c\u094d\u091c\u0928\u093e\u0930\u094d\u0926\u0928\u0964\n\n\u092a\u093e\u092a\u092e\u0947\u0935\u093e\u0936\u094d\u0930\u092f\u0947\u0926\u0938\u094d\u092e\u093e\u0928\u094d\u0939\u0924\u094d\u0935\u0948\u0924\u093e\u0928\u093e\u0924\u0924\u093e\u092f\u093f\u0928\u0903\u0964\u09641.36\u0964\u0964", "r": "nihatya dh\u0101rtar\u0101\u1e63h\u1e6dr\u0101n na\u1e25 k\u0101 pr\u012bti\u1e25 sy\u0101j jan\u0101rdana\np\u0101pam ev\u0101\u015bhrayed asm\u0101n hatvait\u0101n \u0101tat\u0101yina\u1e25", "t": "By killing these sons of Dhritarashtra, what pleasure could be ours, O Janardana? Only sin would accrue to us from killing these felons."}, {"c": 1, "v": 37, "s": "\u0924\u0938\u094d\u092e\u093e\u0928\u094d\u0928\u093e\u0930\u094d\u0939\u093e \u0935\u092f\u0902 \u0939\u0928\u094d\u0924\u0941\u0902 \u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u093e\u0928\u094d\u0938\u094d\u0935\u092c\u093e\u0928\u094d\u0927\u0935\u093e\u0928\u094d\u0964\n\n\u0938\u094d\u0935\u091c\u0928\u0902 \u0939\u093f \u0915\u0925\u0902 \u0939\u0924\u094d\u0935\u093e \u0938\u0941\u0916\u093f\u0928\u0903 \u0938\u094d\u092f\u093e\u092e \u092e\u093e\u0927\u0935\u0964\u09641.37\u0964\u0964", "r": "tasm\u0101n n\u0101rh\u0101 vaya\u1e41 hantu\u1e41 dh\u0101rtar\u0101\u1e63h\u1e6dr\u0101n sa-b\u0101ndhav\u0101n \nsva-jana\u1e41 hi katha\u1e41 hatv\u0101 sukhina\u1e25 sy\u0101ma m\u0101dhava", "t": "Therefore, we should not kill the sons of Dhritarashtra, our relatives; for how can we be happy by killing our own kin, O Madhava (Krishna)?"}, {"c": 1, "v": 38, "s": "\u092f\u0926\u094d\u092f\u092a\u094d\u092f\u0947\u0924\u0947 \u0928 \u092a\u0936\u094d\u092f\u0928\u094d\u0924\u093f \u0932\u094b\u092d\u094b\u092a\u0939\u0924\u091a\u0947\u0924\u0938\u0903\u0964\n\n\u0915\u0941\u0932\u0915\u094d\u0937\u092f\u0915\u0943\u0924\u0902 \u0926\u094b\u0937\u0902 \u092e\u093f\u0924\u094d\u0930\u0926\u094d\u0930\u094b\u0939\u0947 \u091a \u092a\u093e\u0924\u0915\u092e\u094d\u0964\u09641.38\u0964\u0964", "r": "yady apy ete na pa\u015bhyanti lobhopahata-chetasa\u1e25\nkula-k\u1e63haya-k\u1e5bita\u1e41 do\u1e63ha\u1e41 mitra-drohe cha p\u0101takam", "t": "Though they, with intelligence overpowered by greed, see no evil in the destruction of families and no sin in hostility to friends,"}, {"c": 1, "v": 39, "s": "\u0915\u0925\u0902 \u0928 \u091c\u094d\u091e\u0947\u092f\u092e\u0938\u094d\u092e\u093e\u092d\u093f\u0903 \u092a\u093e\u092a\u093e\u0926\u0938\u094d\u092e\u093e\u0928\u094d\u0928\u093f\u0935\u0930\u094d\u0924\u093f\u0924\u0941\u092e\u094d\u0964\n\n\u0915\u0941\u0932\u0915\u094d\u0937\u092f\u0915\u0943\u0924\u0902 \u0926\u094b\u0937\u0902 \u092a\u094d\u0930\u092a\u0936\u094d\u092f\u0926\u094d\u092d\u093f\u0930\u094d\u091c\u0928\u093e\u0930\u094d\u0926\u0928\u0964\u09641.39\u0964\u0964", "r": "katha\u1e41 na j\u00f1eyam asm\u0101bhi\u1e25 p\u0101p\u0101d asm\u0101n nivartitum\nkula-k\u1e63haya-k\u1e5bita\u1e41 do\u1e63ha\u1e41 prapa\u015bhyadbhir jan\u0101rdana", "t": "Why should we not, who clearly see the evil in the destruction of families, learn to turn away from this sin, O Janardana (Krishna)?"}, {"c": 1, "v": 40, "s": "\u0915\u0941\u0932\u0915\u094d\u0937\u092f\u0947 \u092a\u094d\u0930\u0923\u0936\u094d\u092f\u0928\u094d\u0924\u093f \u0915\u0941\u0932\u0927\u0930\u094d\u092e\u093e\u0903 \u0938\u0928\u093e\u0924\u0928\u093e\u0903\u0964\n\n\u0927\u0930\u094d\u092e\u0947 \u0928\u0937\u094d\u091f\u0947 \u0915\u0941\u0932\u0902 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u092e\u0927\u0930\u094d\u092e\u094b\u093d\u092d\u093f\u092d\u0935\u0924\u094d\u092f\u0941\u0924\u0964\u09641.40\u0964\u0964", "r": "kula-k\u1e63haye pra\u1e47a\u015bhyanti kula-dharm\u0101\u1e25 san\u0101tan\u0101\u1e25\ndharme na\u1e63h\u1e6de kula\u1e41 k\u1e5bitsnam adharmo \u2019bhibhavaty uta", "t": "In the destruction of a family, the immemorial religious rites of that family perish; on the destruction of spirituality, impiety indeed, overwhelms the whole family."}, {"c": 1, "v": 41, "s": "\u0905\u0927\u0930\u094d\u092e\u093e\u092d\u093f\u092d\u0935\u093e\u0924\u094d\u0915\u0943\u0937\u094d\u0923 \u092a\u094d\u0930\u0926\u0941\u0937\u094d\u092f\u0928\u094d\u0924\u093f \u0915\u0941\u0932\u0938\u094d\u0924\u094d\u0930\u093f\u092f\u0903\u0964\n\n\u0938\u094d\u0924\u094d\u0930\u0940\u0937\u0941 \u0926\u0941\u0937\u094d\u091f\u093e\u0938\u0941 \u0935\u093e\u0930\u094d\u0937\u094d\u0923\u0947\u092f \u091c\u093e\u092f\u0924\u0947 \u0935\u0930\u094d\u0923\u0938\u0919\u094d\u0915\u0930\u0903\u0964\u09641.41\u0964\u0964", "r": "adharm\u0101bhibhav\u0101t k\u1e5bi\u1e63h\u1e47a pradu\u1e63hyanti kula-striya\u1e25\nstr\u012b\u1e63hu du\u1e63h\u1e6d\u0101su v\u0101r\u1e63h\u1e47eya j\u0101yate var\u1e47a-sa\u1e45kara\u1e25", "t": "O Krishna, by the prevalence of impiety, the women of the family become corrupt; and, when women are corrupted, O Varshenya (descendant of Vrishni), intermingling of castes arises."}, {"c": 1, "v": 42, "s": "\u0938\u0919\u094d\u0915\u0930\u094b \u0928\u0930\u0915\u093e\u092f\u0948\u0935 \u0915\u0941\u0932\u0918\u094d\u0928\u093e\u0928\u093e\u0902 \u0915\u0941\u0932\u0938\u094d\u092f \u091a\u0964\n\n\u092a\u0924\u0928\u094d\u0924\u093f \u092a\u093f\u0924\u0930\u094b \u0939\u094d\u092f\u0947\u0937\u093e\u0902 \u0932\u0941\u092a\u094d\u0924\u092a\u093f\u0923\u094d\u0921\u094b\u0926\u0915\u0915\u094d\u0930\u093f\u092f\u093e\u0903\u0964\u09641.42\u0964\u0964", "r": "sa\u1e45karo narak\u0101yaiva kula-ghn\u0101n\u0101\u1e41 kulasya cha\npatanti pitaro hy e\u1e63h\u0101\u1e41 lupta-pi\u1e47\u1e0dodaka-kriy\u0101\u1e25", "t": "Confusion of castes leads to hell for the slayers of the family, for their forebears fall, deprived of the offerings of rice-balls and libations of water."}, {"c": 1, "v": 43, "s": "\u0926\u094b\u0937\u0948\u0930\u0947\u0924\u0948\u0903 \u0915\u0941\u0932\u0918\u094d\u0928\u093e\u0928\u093e\u0902 \u0935\u0930\u094d\u0923\u0938\u0919\u094d\u0915\u0930\u0915\u093e\u0930\u0915\u0948\u0903\u0964\n\n\u0909\u0924\u094d\u0938\u093e\u0926\u094d\u092f\u0928\u094d\u0924\u0947 \u091c\u093e\u0924\u093f\u0927\u0930\u094d\u092e\u093e\u0903 \u0915\u0941\u0932\u0927\u0930\u094d\u092e\u093e\u0936\u094d\u091a \u0936\u093e\u0936\u094d\u0935\u0924\u093e\u0903\u0964\u09641.43\u0964\u0964", "r": "do\u1e63hair etai\u1e25 kula-ghn\u0101n\u0101\u1e41 var\u1e47a-sa\u1e45kara-k\u0101rakai\u1e25\nuts\u0101dyante j\u0101ti-dharm\u0101\u1e25 kula-dharm\u0101\u015bh cha \u015bh\u0101\u015bhvat\u0101\u1e25", "t": "By these evil deeds of the destroyers of the family, which cause confusion of castes, the eternal religious rites of the caste and the family are destroyed."}, {"c": 1, "v": 44, "s": "\u0909\u0924\u094d\u0938\u0928\u094d\u0928\u0915\u0941\u0932\u0927\u0930\u094d\u092e\u093e\u0923\u093e\u0902 \u092e\u0928\u0941\u0937\u094d\u092f\u093e\u0923\u093e\u0902 \u091c\u0928\u093e\u0930\u094d\u0926\u0928\u0964\n\n\u0928\u0930\u0915\u0947\u093d\u0928\u093f\u092f\u0924\u0902 \u0935\u093e\u0938\u094b \u092d\u0935\u0924\u0940\u0924\u094d\u092f\u0928\u0941\u0936\u0941\u0936\u094d\u0930\u0941\u092e\u0964\u09641.44\u0964\u0964", "r": "utsanna-kula-dharm\u0101\u1e47\u0101\u1e41 manu\u1e63hy\u0101\u1e47\u0101\u1e41 jan\u0101rdana\nnarake \u2018niyata\u1e41 v\u0101so bhavat\u012btyanu\u015bhu\u015bhruma", "t": "We have heard, O Janardana, that those men in whose families the religious practices have been destroyed are inevitably destined to dwell in hell for an unknown period."}, {"c": 1, "v": 45, "s": "\u0905\u0939\u094b \u092c\u0924 \u092e\u0939\u0924\u094d\u092a\u093e\u092a\u0902 \u0915\u0930\u094d\u0924\u0941\u0902 \u0935\u094d\u092f\u0935\u0938\u093f\u0924\u093e \u0935\u092f\u092e\u094d\u0964\n\n\u092f\u0926\u094d\u0930\u093e\u091c\u094d\u092f\u0938\u0941\u0916\u0932\u094b\u092d\u0947\u0928 \u0939\u0928\u094d\u0924\u0941\u0902 \u0938\u094d\u0935\u091c\u0928\u092e\u0941\u0926\u094d\u092f\u0924\u093e\u0903\u0964\u09641.45\u0964\u0964", "r": "aho bata mahat p\u0101pa\u1e41 kartu\u1e41 vyavasit\u0101 vayam\nyad r\u0101jya-sukha-lobhena hantu\u1e41 sva-janam udyat\u0101\u1e25", "t": "Alas! We are involved in a great sin, for we are prepared to kill our kinsmen, out of greed for the pleasures of a kingdom."}, {"c": 1, "v": 46, "s": "\u092f\u0926\u093f \u092e\u093e\u092e\u092a\u094d\u0930\u0924\u0940\u0915\u093e\u0930\u092e\u0936\u0938\u094d\u0924\u094d\u0930\u0902 \u0936\u0938\u094d\u0924\u094d\u0930\u092a\u093e\u0923\u092f\u0903\u0964\n\n\u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u093e \u0930\u0923\u0947 \u0939\u0928\u094d\u092f\u0941\u0938\u094d\u0924\u0928\u094d\u092e\u0947 \u0915\u094d\u0937\u0947\u092e\u0924\u0930\u0902 \u092d\u0935\u0947\u0924\u094d\u0964\u09641.46\u0964\u0964", "r": "yadi m\u0101m aprat\u012bk\u0101ram a\u015bhastra\u1e41 \u015bhastra-p\u0101\u1e47aya\u1e25\ndh\u0101rtar\u0101\u1e63h\u1e6dr\u0101 ra\u1e47e hanyus tan me k\u1e63hematara\u1e41 bhavet", "t": "If the sons of Dhritarashtra, with weapons in hand, should slay me in battle, unresisting and unarmed, that would be better for me."}, {"c": 1, "v": 47, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u090f\u0935\u092e\u0941\u0915\u094d\u0924\u094d\u0935\u093e\u093d\u0930\u094d\u091c\u0941\u0928\u0903 \u0938\u0902\u0916\u094d\u092f\u0947 \u0930\u0925\u094b\u092a\u0938\u094d\u0925 \u0909\u092a\u093e\u0935\u093f\u0936\u0924\u094d\u0964\n\n\u0935\u093f\u0938\u0943\u091c\u094d\u092f \u0938\u0936\u0930\u0902 \u091a\u093e\u092a\u0902 \u0936\u094b\u0915\u0938\u0902\u0935\u093f\u0917\u094d\u0928\u092e\u093e\u0928\u0938\u0903\u0964\u09641.47\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nevam uktv\u0101rjuna\u1e25 sa\u1e45khye rathopastha up\u0101vi\u015bhat\nvis\u1e5bijya sa-\u015bhara\u1e41 ch\u0101pa\u1e41 \u015bhoka-sa\u1e41vigna-m\u0101nasa\u1e25", "t": "Sanjaya said, Having thus spoken in the midst of the battlefield, Arjuna cast away his bow and arrow and, his mind overwhelmed with sorrow, sat down on the seat of the chariot."}, {"c": 2, "v": 1, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u0924\u0902 \u0924\u0925\u093e \u0915\u0943\u092a\u092f\u093e\u093d\u0935\u093f\u0937\u094d\u091f\u092e\u0936\u094d\u0930\u0941\u092a\u0942\u0930\u094d\u0923\u093e\u0915\u0941\u0932\u0947\u0915\u094d\u0937\u0923\u092e\u094d\u0964\n\n\u0935\u093f\u0937\u0940\u0926\u0928\u094d\u0924\u092e\u093f\u0926\u0902 \u0935\u093e\u0915\u094d\u092f\u092e\u0941\u0935\u093e\u091a \u092e\u0927\u0941\u0938\u0942\u0926\u0928\u0903\u0964\u09642.1\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nta\u1e41 tath\u0101 k\u1e5bipay\u0101vi\u1e63h\u1e6dama\u015bhru p\u016br\u1e47\u0101kulek\u1e63ha\u1e47am\nvi\u1e63h\u012bdantamida\u1e41 v\u0101kyam uv\u0101cha madhus\u016bdana\u1e25", "t": "Sanjaya said: To him, who was thus overcome with pity, despondent, with eyes full of tears and agitated, Madhusudana (the destroyer of Madhu) or Krishna spoke these words."}, {"c": 2, "v": 2, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0915\u0941\u0924\u0938\u094d\u0924\u094d\u0935\u093e \u0915\u0936\u094d\u092e\u0932\u092e\u093f\u0926\u0902 \u0935\u093f\u0937\u092e\u0947 \u0938\u092e\u0941\u092a\u0938\u094d\u0925\u093f\u0924\u092e\u094d\u0964\n\n\u0905\u0928\u093e\u0930\u094d\u092f\u091c\u0941\u0937\u094d\u091f\u092e\u0938\u094d\u0935\u0930\u094d\u0917\u094d\u092f\u092e\u0915\u0940\u0930\u094d\u0924\u093f\u0915\u0930\u092e\u0930\u094d\u091c\u0941\u0928\u0964\u09642.2\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nkutastv\u0101 ka\u015bhmalamida\u1e41 vi\u1e63hame samupasthitam\nan\u0101rya-ju\u1e63h\u1e6damaswargyam ak\u012brti-karam arjuna", "t": "The Blessed Lord said, \"From whence has this perilous strait come upon you, this dejection which is unworthy of you, disgraceful, and which will close the gates of heaven upon you, O Arjuna?\""}, {"c": 2, "v": 3, "s": "\u0915\u094d\u0932\u0948\u092c\u094d\u092f\u0902 \u092e\u093e \u0938\u094d\u092e \u0917\u092e\u0903 \u092a\u093e\u0930\u094d\u0925 \u0928\u0948\u0924\u0924\u094d\u0924\u094d\u0935\u092f\u094d\u092f\u0941\u092a\u092a\u0926\u094d\u092f\u0924\u0947\u0964\n\n\u0915\u094d\u0937\u0941\u0926\u094d\u0930\u0902 \u0939\u0943\u0926\u092f\u0926\u094c\u0930\u094d\u092c\u0932\u094d\u092f\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u094b\u0924\u094d\u0924\u093f\u0937\u094d\u0920 \u092a\u0930\u0928\u094d\u0924\u092a\u0964\u09642.3\u0964\u0964", "r": "klaibya\u1e41 m\u0101 sma gama\u1e25 p\u0101rtha naitat tvayyupapadyate\nk\u1e63hudra\u1e41 h\u1e5bidaya-daurbalya\u1e41 tyaktvotti\u1e63h\u1e6dha parantapa", "t": "Do not yield to impotence, O Arjuna, son of Pritha. It does not befit you. Cast off this mean weakness of the heart! Stand up, O conqueror of foes!"}, {"c": 2, "v": 4, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0915\u0925\u0902 \u092d\u0940\u0937\u094d\u092e\u092e\u0939\u0902 \u0938\u0902\u0916\u094d\u092f\u0947 \u0926\u094d\u0930\u094b\u0923\u0902 \u091a \u092e\u0927\u0941\u0938\u0942\u0926\u0928\u0964\n\n\u0907\u0937\u0941\u092d\u093f\u0903 \u092a\u094d\u0930\u0924\u093f\u092f\u094b\u0924\u094d\u0938\u094d\u092f\u093e\u092e\u093f \u092a\u0942\u091c\u093e\u0930\u094d\u0939\u093e\u0935\u0930\u093f\u0938\u0942\u0926\u0928\u0964\u09642.4\u0964\u0964", "r": "arjuna uv\u0101cha\nkatha\u1e41 bh\u012b\u1e63hmam aha\u1e41 sankhye dro\u1e47a\u1e41 cha madhus\u016bdana\ni\u1e63hubhi\u1e25 pratiyotsy\u0101mi p\u016bj\u0101rh\u0101vari-s\u016bdana", "t": "Arjuna said, \"O Madhusudana, how can I fight in battle with arrows against Bhishma and Drona, who are worthy of being worshipped, O destroyer of enemies?\""}, {"c": 2, "v": 5, "s": "\u0917\u0941\u0930\u0942\u0928\u0939\u0924\u094d\u0935\u093e \u0939\u093f \u092e\u0939\u093e\u0928\u0941\u092d\u093e\u0935\u093e\u0928\u094d\n\n\u0936\u094d\u0930\u0947\u092f\u094b \u092d\u094b\u0915\u094d\u0924\u0941\u0902 \u092d\u0948\u0915\u094d\u0937\u094d\u092f\u092e\u092a\u0940\u0939 \u0932\u094b\u0915\u0947\u0964\n\n\u0939\u0924\u094d\u0935\u093e\u0930\u094d\u0925\u0915\u093e\u092e\u093e\u0902\u0938\u094d\u0924\u0941 \u0917\u0941\u0930\u0942\u0928\u093f\u0939\u0948\u0935\n\n\u092d\u0941\u091e\u094d\u091c\u0940\u092f \u092d\u094b\u0917\u093e\u0928\u094d \u0930\u0941\u0927\u093f\u0930\u092a\u094d\u0930\u0926\u093f\u0917\u094d\u0927\u093e\u0928\u094d\u0964\u09642.5\u0964\u0964", "r": "gur\u016bnahatv\u0101 hi mah\u0101nubh\u0101v\u0101n\n\u015bhreyo bhoktu\u1e41 bhaik\u1e63hyamap\u012bha loke\nhatv\u0101rtha-k\u0101m\u0101\u1e41stu gur\u016bnihaiva\nbhu\u00f1j\u012bya bhog\u0101n rudhira-pradigdh\u0101n", "t": "Better it is, indeed, in this world to accept alms than to slay the most noble teachers. But if I were to kill them, even in this world, all my enjoyments of wealth and fulfilled desires would be stained with their blood."}, {"c": 2, "v": 6, "s": "\u0928 \u091a\u0948\u0924\u0926\u094d\u0935\u093f\u0926\u094d\u092e\u0903 \u0915\u0924\u0930\u0928\u094d\u0928\u094b \u0917\u0930\u0940\u092f\u094b\n\n\u092f\u0926\u094d\u0935\u093e \u091c\u092f\u0947\u092e \u092f\u0926\u093f \u0935\u093e \u0928\u094b \u091c\u092f\u0947\u092f\u0941\u0903\u0964\n\n\u092f\u093e\u0928\u0947\u0935 \u0939\u0924\u094d\u0935\u093e \u0928 \u091c\u093f\u091c\u0940\u0935\u093f\u0937\u093e\u092e\n\n\u0938\u094d\u0924\u0947\u093d\u0935\u0938\u094d\u0925\u093f\u0924\u093e\u0903 \u092a\u094d\u0930\u092e\u0941\u0916\u0947 \u0927\u093e\u0930\u094d\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u093e\u0903\u0964\u09642.6\u0964\u0964", "r": "na chaitadvidma\u1e25 kataranno gar\u012byo\nyadv\u0101 jayema yadi v\u0101 no jayeyu\u1e25\ny\u0101neva hatv\u0101 na jij\u012bvi\u1e63h\u0101mas\nte \u2019vasthit\u0101\u1e25 pramukhe dh\u0101rtar\u0101\u1e63h\u1e6dr\u0101\u1e25", "t": "I can hardly tell which would be better, that we should conquer them or that they should conquer us. Even the sons of Dhritarashtra, whom we do not wish to slay, stand facing us."}, {"c": 2, "v": 7, "s": "\u0915\u093e\u0930\u094d\u092a\u0923\u094d\u092f\u0926\u094b\u0937\u094b\u092a\u0939\u0924\u0938\u094d\u0935\u092d\u093e\u0935\u0903\n\n\u092a\u0943\u091a\u094d\u091b\u093e\u092e\u093f \u0924\u094d\u0935\u093e\u0902 \u0927\u0930\u094d\u092e\u0938\u0902\u092e\u0942\u0922\u091a\u0947\u0924\u093e\u0903\u0964\n\n\u092f\u091a\u094d\u091b\u094d\u0930\u0947\u092f\u0903 \u0938\u094d\u092f\u093e\u0928\u094d\u0928\u093f\u0936\u094d\u093f\u091a\u0924\u0902 \u092c\u094d\u0930\u0942\u0939\u093f \u0924\u0928\u094d\u092e\u0947\n\n\u0936\u093f\u0937\u094d\u092f\u0938\u094d\u0924\u0947\u093d\u0939\u0902 \u0936\u093e\u0927\u093f \u092e\u093e\u0902 \u0924\u094d\u0935\u093e\u0902 \u092a\u094d\u0930\u092a\u0928\u094d\u0928\u092e\u094d\u0964\u09642.7\u0964\u0964", "r": "k\u0101rpa\u1e47ya-do\u1e63hopahata-svabh\u0101va\u1e25\np\u1e5bichchh\u0101mi tv\u0101\u1e41 dharma-samm\u016b\u1e0dha-chet\u0101\u1e25\nyach-chhreya\u1e25 sy\u0101nni\u015bhchita\u1e41 br\u016bhi tanme\n\u015bhi\u1e63hyaste \u2019ha\u1e41 \u015bh\u0101dhi m\u0101\u1e41 tv\u0101\u1e41 prapannam", "t": "My heart is overpowered by the taint of pity; my mind is confused as to my duty. I ask Thee: Tell me decisively what is good for me. I am Thy disciple; instruct me, who has taken refuge in Thee."}, {"c": 2, "v": 8, "s": "\u0928 \u0939\u093f \u092a\u094d\u0930\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u092e\u092e\u093e\u092a\u0928\u0941\u0926\u094d\u092f\u093e\n\n\u0926\u094d\u092f\u091a\u094d\u091b\u094b\u0915\u092e\u0941\u091a\u094d\u091b\u094b\u0937\u0923\u092e\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093e\u092e\u094d\u0964\n\n\u0905\u0935\u093e\u092a\u094d\u092f \u092d\u0942\u092e\u093e\u0935\u0938\u092a\u0924\u094d\u0928\u092e\u0943\u0926\u094d\u0927\u092e\u094d\n\n\u0930\u093e\u091c\u094d\u092f\u0902 \u0938\u0941\u0930\u093e\u0923\u093e\u092e\u092a\u093f \u091a\u093e\u0927\u093f\u092a\u0924\u094d\u092f\u092e\u094d\u0964\u09642.8\u0964\u0964", "r": "na hi prapa\u015bhy\u0101mi mam\u0101panudy\u0101d\nyach-chhokam uchchho\u1e63ha\u1e47am-indriy\u0101\u1e47\u0101m\nav\u0101pya bh\u016bm\u0101v-asapatnam\u1e5biddha\u1e41\nr\u0101jya\u1e41 sur\u0101\u1e47\u0101mapi ch\u0101dhipatyam", "t": "I do not see that this sorrow that burns up my senses would be removed, even if I were to attain prosperous and unrivaled dominion on earth or lordship over the gods."}, {"c": 2, "v": 9, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u090f\u0935\u092e\u0941\u0915\u094d\u0924\u094d\u0935\u093e \u0939\u0943\u0937\u0940\u0915\u0947\u0936\u0902 \u0917\u0941\u0921\u093e\u0915\u0947\u0936\u0903 \u092a\u0930\u0928\u094d\u0924\u092a\u0964\n\n\u0928 \u092f\u094b\u0924\u094d\u0938\u094d\u092f \u0907\u0924\u093f \u0917\u094b\u0935\u093f\u0928\u094d\u0926\u092e\u0941\u0915\u094d\u0924\u094d\u0935\u093e \u0924\u0942\u0937\u094d\u0923\u0940\u0902 \u092c\u092d\u0942\u0935 \u0939\u0964\u09642.9\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nevam-uktv\u0101 h\u1e5bi\u1e63h\u012bke\u015bha\u1e41 gu\u1e0d\u0101ke\u015bha\u1e25 parantapa\nna yotsya iti govindam uktv\u0101 t\u016b\u1e63h\u1e47\u012b\u1e41 babh\u016bva ha", "t": "Sanjaya said: Having spoken thus to Hrishikesha, the Lord of the senses, Arjuna, the conqueror of sleep and destroyer of foes, said, \"I will not fight,\" and became silent."}, {"c": 2, "v": 10, "s": "\u0924\u092e\u0941\u0935\u093e\u091a \u0939\u0943\u0937\u0940\u0915\u0947\u0936\u0903 \u092a\u094d\u0930\u0939\u0938\u0928\u094d\u0928\u093f\u0935 \u092d\u093e\u0930\u0924\u0964\n\n\u0938\u0947\u0928\u092f\u094b\u0930\u0941\u092d\u092f\u094b\u0930\u094d\u092e\u0927\u094d\u092f\u0947 \u0935\u093f\u0937\u0940\u0926\u0928\u094d\u0924\u092e\u093f\u0926\u0902 \u0935\u091a\u0903\u0964\u09642.10\u0964\u0964", "r": "tam-uv\u0101cha h\u1e5bi\u1e63h\u012bke\u015bha\u1e25 prahasanniva bh\u0101rata\nsenayorubhayor-madhye vi\u1e63h\u012bdantam-ida\u1e41 vacha\u1e25", "t": "To him who was despondent in the midst of the two armies, Krishna, smiling, O Bharata, spoke these words."}, {"c": 2, "v": 11, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0905\u0936\u094b\u091a\u094d\u092f\u093e\u0928\u0928\u094d\u0935\u0936\u094b\u091a\u0938\u094d\u0924\u094d\u0935\u0902 \u092a\u094d\u0930\u091c\u094d\u091e\u093e\u0935\u093e\u0926\u093e\u0902\u0936\u094d\u091a \u092d\u093e\u0937\u0938\u0947\u0964\n\n\u0917\u0924\u093e\u0938\u0942\u0928\u0917\u0924\u093e\u0938\u0942\u0902\u0936\u094d\u091a \u0928\u093e\u0928\u0941\u0936\u094b\u091a\u0928\u094d\u0924\u093f \u092a\u0923\u094d\u0921\u093f\u0924\u093e\u0903\u0964\u09642.11\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\na\u015bhochy\u0101n-anva\u015bhochas-tva\u1e41 praj\u00f1\u0101-v\u0101d\u0101n\u015bh cha bh\u0101\u1e63hase\ngat\u0101s\u016bn-agat\u0101s\u016bn\u015bh-cha n\u0101nu\u015bhochanti pa\u1e47\u1e0dit\u0101\u1e25", "t": "The Blessed Lord said, \"You have grieved for those who should not be grieved for; yet, you speak words of wisdom. The wise grieve neither for the living nor for the dead.\""}, {"c": 2, "v": 12, "s": "\u0928 \u0924\u094d\u0935\u0947\u0935\u093e\u0939\u0902 \u091c\u093e\u0924\u0941 \u0928\u093e\u0938\u0902 \u0928 \u0924\u094d\u0935\u0902 \u0928\u0947\u092e\u0947 \u091c\u0928\u093e\u0927\u093f\u092a\u093e\u0903\u0964\n\n\u0928 \u091a\u0948\u0935 \u0928 \u092d\u0935\u093f\u0937\u094d\u092f\u093e\u092e\u0903 \u0938\u0930\u094d\u0935\u0947 \u0935\u092f\u092e\u0924\u0903 \u092a\u0930\u092e\u094d\u0964\u09642.12\u0964\u0964", "r": "na tvev\u0101ha\u1e41 j\u0101tu n\u0101sa\u1e41 na tva\u1e41 neme jan\u0101dhip\u0101\u1e25\nna chaiva na bhavi\u1e63hy\u0101ma\u1e25 sarve vayamata\u1e25 param", "t": "Nor, at any time, was I not, nor thou, nor these rulers of men; nor, verily, shall we ever cease to be hereafter."}, {"c": 2, "v": 13, "s": "\u0926\u0947\u0939\u093f\u0928\u094b\u093d\u0938\u094d\u092e\u093f\u0928\u094d\u092f\u0925\u093e \u0926\u0947\u0939\u0947 \u0915\u094c\u092e\u093e\u0930\u0902 \u092f\u094c\u0935\u0928\u0902 \u091c\u0930\u093e\u0964\n\n\u0924\u0925\u093e \u0926\u0947\u0939\u093e\u0928\u094d\u0924\u0930\u092a\u094d\u0930\u093e\u092a\u094d\u0924\u093f\u0930\u094d\u0927\u0940\u0930\u0938\u094d\u0924\u0924\u094d\u0930 \u0928 \u092e\u0941\u0939\u094d\u092f\u0924\u093f\u0964\u09642.13\u0964\u0964", "r": "dehino \u2019smin yath\u0101 dehe kaum\u0101ra\u1e41 yauvana\u1e41 jar\u0101\ntath\u0101 deh\u0101ntara-pr\u0101ptir dh\u012bras tatra na muhyati", "t": "Just as the embodied soul passes through childhood, youth, and old age in this body, so too does it pass into another body; the steadfast one does not grieve over this."}, {"c": 2, "v": 14, "s": "\u092e\u093e\u0924\u094d\u0930\u093e\u0938\u094d\u092a\u0930\u094d\u0936\u093e\u0938\u094d\u0924\u0941 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0936\u0940\u0924\u094b\u0937\u094d\u0923\u0938\u0941\u0916\u0926\u0941\u0903\u0916\u0926\u093e\u0903\u0964\n\n\u0906\u0917\u092e\u093e\u092a\u093e\u092f\u093f\u0928\u094b\u093d\u0928\u093f\u0924\u094d\u092f\u093e\u0938\u094d\u0924\u093e\u0902\u0938\u094d\u0924\u093f\u0924\u093f\u0915\u094d\u0937\u0938\u094d\u0935 \u092d\u093e\u0930\u0924\u0964\u09642.14\u0964\u0964", "r": "m\u0101tr\u0101-spar\u015bh\u0101s tu kaunteya \u015bh\u012bto\u1e63h\u1e47a-sukha-du\u1e25kha-d\u0101\u1e25\n\u0101gam\u0101p\u0101yino \u2019nity\u0101s tans-titik\u1e63hasva bh\u0101rata", "t": "The contact of the senses with the objects, O son of Kunti, which causes heat and cold, pleasure and pain, has a beginning and an end; they are impermanent; endure them bravely, O Arjuna."}, {"c": 2, "v": 15, "s": "\u092f\u0902 \u0939\u093f \u0928 \u0935\u094d\u092f\u0925\u092f\u0928\u094d\u0924\u094d\u092f\u0947\u0924\u0947 \u092a\u0941\u0930\u0941\u0937\u0902 \u092a\u0941\u0930\u0941\u0937\u0930\u094d\u0937\u092d\u0964\n\n\u0938\u092e\u0926\u0941\u0903\u0916\u0938\u0941\u0916\u0902 \u0927\u0940\u0930\u0902 \u0938\u094b\u093d\u092e\u0943\u0924\u0924\u094d\u0935\u093e\u092f \u0915\u0932\u094d\u092a\u0924\u0947\u0964\u09642.15\u0964\u0964", "r": "ya\u1e41 hi na vyathayantyete puru\u1e63ha\u1e41 puru\u1e63har\u1e63habha\nsama-du\u1e25kha-sukha\u1e41 dh\u012bra\u1e41 so \u2019m\u1e5bitatv\u0101ya kalpate", "t": "That firm man, whom surely these afflictions do not, O chief among men, to whom pleasure and pain are the same, is fit for attaining immortality."}, {"c": 2, "v": 16, "s": "\u0928\u093e\u0938\u0924\u094b \u0935\u093f\u0926\u094d\u092f\u0924\u0947 \u092d\u093e\u0935\u094b \u0928\u093e\u092d\u093e\u0935\u094b \u0935\u093f\u0926\u094d\u092f\u0924\u0947 \u0938\u0924\u0903\u0964\n\n\u0909\u092d\u092f\u094b\u0930\u092a\u093f \u0926\u0943\u0937\u094d\u091f\u094b\u093d\u0928\u094d\u0924\u0938\u094d\u0924\u094d\u0935\u0928\u092f\u094b\u0938\u094d\u0924\u0924\u094d\u0924\u094d\u0935\u0926\u0930\u094d\u0936\u093f\u092d\u093f\u0903\u0964\u09642.16\u0964\u0964", "r": "n\u0101sato vidyate bh\u0101vo n\u0101bh\u0101vo vidyate sata\u1e25\nubhayorapi d\u1e5bi\u1e63h\u1e6do \u2019nta stvanayos tattva-dar\u015bhibhi\u1e25", "t": "The unreal has no being; there is no non-being of the real; the truth about both has been seen by the knowers of the truth (or the seers of the essence)."}, {"c": 2, "v": 17, "s": "\u0905\u0935\u093f\u0928\u093e\u0936\u093f \u0924\u0941 \u0924\u0926\u094d\u0935\u093f\u0926\u094d\u0927\u093f \u092f\u0947\u0928 \u0938\u0930\u094d\u0935\u092e\u093f\u0926\u0902 \u0924\u0924\u092e\u094d\u0964\n\n\u0935\u093f\u0928\u093e\u0936\u092e\u0935\u094d\u092f\u092f\u0938\u094d\u092f\u093e\u0938\u094d\u092f \u0928 \u0915\u0936\u094d\u091a\u093f\u0924\u094d \u0915\u0930\u094d\u0924\u0941\u092e\u0930\u094d\u0939\u0924\u093f\u0964\u09642.17\u0964\u0964", "r": "avin\u0101\u015bhi tu tadviddhi yena sarvam ida\u1e41 tatam\nvin\u0101\u015bham avyayasy\u0101sya na ka\u015bhchit kartum arhati", "t": "Know that to be indestructible, by which all this is pervaded. No one can cause the destruction of that, the Imperishable."}, {"c": 2, "v": 18, "s": "\u0905\u0928\u094d\u0924\u0935\u0928\u094d\u0924 \u0907\u092e\u0947 \u0926\u0947\u0939\u093e \u0928\u093f\u0924\u094d\u092f\u0938\u094d\u092f\u094b\u0915\u094d\u0924\u093e\u0903 \u0936\u0930\u0940\u0930\u093f\u0923\u0903\u0964\n\n\u0905\u0928\u093e\u0936\u093f\u0928\u094b\u093d\u092a\u094d\u0930\u092e\u0947\u092f\u0938\u094d\u092f \u0924\u0938\u094d\u092e\u093e\u0926\u094d\u092f\u0941\u0927\u094d\u092f\u0938\u094d\u0935 \u092d\u093e\u0930\u0924\u0964\u09642.18\u0964\u0964", "r": "antavanta ime deh\u0101 nityasyokt\u0101\u1e25 \u015bhar\u012bri\u1e47a\u1e25\nan\u0101\u015bhino \u2019prameyasya tasm\u0101d yudhyasva bh\u0101rata", "t": "These bodies of the embodied Self, which are eternal, indestructible, and immeasurable, are said to have an end. Therefore, fight, O Arjuna."}, {"c": 2, "v": 19, "s": "\u092f \u090f\u0928\u0902 \u0935\u0947\u0924\u094d\u0924\u093f \u0939\u0928\u094d\u0924\u093e\u0930\u0902 \u092f\u0936\u094d\u091a\u0948\u0928\u0902 \u092e\u0928\u094d\u092f\u0924\u0947 \u0939\u0924\u092e\u094d\u0964\n\n\u0909\u092d\u094c \u0924\u094c \u0928 \u0935\u093f\u091c\u093e\u0928\u0940\u0924\u094b \u0928\u093e\u092f\u0902 \u0939\u0928\u094d\u0924\u093f \u0928 \u0939\u0928\u094d\u092f\u0924\u0947\u0964\u09642.19\u0964\u0964", "r": "ya ena\u1e41 vetti hant\u0101ra\u1e41 ya\u015bh chaina\u1e41 manyate hatam\nubhau tau na vij\u0101n\u012bto n\u0101ya\u1e41 hanti na hanyate", "t": "He who takes the Self to be the slayer and he who thinks it is slain, neither of them knows. It does not slay, nor is it slain."}, {"c": 2, "v": 20, "s": "\u0928 \u091c\u093e\u092f\u0924\u0947 \u092e\u094d\u0930\u093f\u092f\u0924\u0947 \u0935\u093e \u0915\u0926\u093e\u091a\u093f\n\n\u0928\u094d\u0928\u093e\u092f\u0902 \u092d\u0942\u0924\u094d\u0935\u093e \u092d\u0935\u093f\u0924\u093e \u0935\u093e \u0928 \u092d\u0942\u092f\u0903\u0964\n\n\u0905\u091c\u094b \u0928\u093f\u0924\u094d\u092f\u0903 \u0936\u093e\u0936\u094d\u0935\u0924\u094b\u093d\u092f\u0902 \u092a\u0941\u0930\u093e\u0923\u094b\n\n\u0928 \u0939\u0928\u094d\u092f\u0924\u0947 \u0939\u0928\u094d\u092f\u092e\u093e\u0928\u0947 \u0936\u0930\u0940\u0930\u0947\u0964\u09642.20\u0964\u0964", "r": "na j\u0101yate mriyate v\u0101 kad\u0101chin\nn\u0101ya\u1e41 bh\u016btv\u0101 bhavit\u0101 v\u0101 na bh\u016bya\u1e25\najo nitya\u1e25 \u015bh\u0101\u015bhvato \u2019ya\u1e41 pur\u0101\u1e47o\nna hanyate hanyam\u0101ne \u015bhar\u012bre", "t": "It is not born, nor does it ever die; after having been, it again does not cease to be; unborn, eternal, changeless, and ancient, it is not killed when the body is killed."}, {"c": 2, "v": 21, "s": "\u0935\u0947\u0926\u093e\u0935\u093f\u0928\u093e\u0936\u093f\u0928\u0902 \u0928\u093f\u0924\u094d\u092f\u0902 \u092f \u090f\u0928\u092e\u091c\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\n\n\u0915\u0925\u0902 \u0938 \u092a\u0941\u0930\u0941\u0937\u0903 \u092a\u093e\u0930\u094d\u0925 \u0915\u0902 \u0918\u093e\u0924\u092f\u0924\u093f \u0939\u0928\u094d\u0924\u093f \u0915\u092e\u094d\u0964\u09642.21\u0964\u0964", "r": "ved\u0101vin\u0101\u015bhina\u1e41 nitya\u1e41 ya enam ajam avyayam\nkatha\u1e41 sa puru\u1e63ha\u1e25 p\u0101rtha ka\u1e41 gh\u0101tayati hanti kam", "t": "Whoever knows it to be indestructible, eternal, unborn, and inexhaustible, how can that person slay, O Arjuna, or cause to be slain?"}, {"c": 2, "v": 22, "s": "\u0935\u093e\u0938\u093e\u0902\u0938\u093f \u091c\u0940\u0930\u094d\u0923\u093e\u0928\u093f \u092f\u0925\u093e \u0935\u093f\u0939\u093e\u092f\n\n\u0928\u0935\u093e\u0928\u093f \u0917\u0943\u0939\u094d\u0923\u093e\u0924\u093f \u0928\u0930\u094b\u093d\u092a\u0930\u093e\u0923\u093f\u0964\n\n\u0924\u0925\u093e \u0936\u0930\u0940\u0930\u093e\u0923\u093f \u0935\u093f\u0939\u093e\u092f \u091c\u0940\u0930\u094d\u0923\u093e\n\n\u0928\u094d\u092f\u0928\u094d\u092f\u093e\u0928\u093f \u0938\u0902\u092f\u093e\u0924\u093f \u0928\u0935\u093e\u0928\u093f \u0926\u0947\u0939\u0940\u0964\u09642.22\u0964\u0964", "r": "v\u0101s\u0101nsi j\u012br\u1e47\u0101ni yath\u0101 vih\u0101ya\nnav\u0101ni g\u1e5bih\u1e47\u0101ti naro \u2019par\u0101\u1e47i\ntath\u0101 \u015bhar\u012br\u0101\u1e47i vih\u0101ya j\u012br\u1e47\u0101nya\nny\u0101ni sany\u0101ti nav\u0101ni deh\u012b", "t": "Just as a man casts off worn-out clothes and puts on new ones, so too the embodied Self casts off worn-out bodies and enters others that are new."}, {"c": 2, "v": 23, "s": "\u0928\u0948\u0928\u0902 \u091b\u093f\u0928\u094d\u0926\u0928\u094d\u0924\u093f \u0936\u0938\u094d\u0924\u094d\u0930\u093e\u0923\u093f \u0928\u0948\u0928\u0902 \u0926\u0939\u0924\u093f \u092a\u093e\u0935\u0915\u0903\u0964\n\n\u0928 \u091a\u0948\u0928\u0902 \u0915\u094d\u0932\u0947\u0926\u092f\u0928\u094d\u0924\u094d\u092f\u093e\u092a\u094b \u0928 \u0936\u094b\u0937\u092f\u0924\u093f \u092e\u093e\u0930\u0941\u0924\u0903\u0964\u09642.23\u0964\u0964", "r": "naina\u1e41 chhindanti \u015bhastr\u0101\u1e47i naina\u1e41 dahati p\u0101vaka\u1e25\nna chaina\u1e41 kledayanty\u0101po na \u015bho\u1e63hayati m\u0101ruta\u1e25", "t": "Weapons cannot cut it, fire cannot burn it, water cannot wet it, wind cannot dry it."}, {"c": 2, "v": 24, "s": "\u0905\u091a\u094d\u091b\u0947\u0926\u094d\u092f\u094b\u093d\u092f\u092e\u0926\u093e\u0939\u094d\u092f\u094b\u093d\u092f\u092e\u0915\u094d\u0932\u0947\u0926\u094d\u092f\u094b\u093d\u0936\u094b\u0937\u094d\u092f \u090f\u0935 \u091a\u0964\n\n\u0928\u093f\u0924\u094d\u092f\u0903 \u0938\u0930\u094d\u0935\u0917\u0924\u0903 \u0938\u094d\u0925\u093e\u0923\u0941\u0930\u091a\u0932\u094b\u093d\u092f\u0902 \u0938\u0928\u093e\u0924\u0928\u0903\u0964\u09642.24\u0964\u0964", "r": "achchhedyo \u2019yam ad\u0101hyo \u2019yam akledyo \u2019\u015bho\u1e63hya eva cha\nnitya\u1e25 sarva-gata\u1e25 sth\u0101\u1e47ur achalo \u2019ya\u1e41 san\u0101tana\u1e25", "t": "This Self cannot be cut, burned, wetted, nor dried up; it is eternal, all-pervasive, stable, immovable, and ancient."}, {"c": 2, "v": 25, "s": "\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u094b\u093d\u092f\u092e\u091a\u093f\u0928\u094d\u0924\u094d\u092f\u094b\u093d\u092f\u092e\u0935\u093f\u0915\u093e\u0930\u094d\u092f\u094b\u093d\u092f\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0926\u0947\u0935\u0902 \u0935\u093f\u0926\u093f\u0924\u094d\u0935\u0948\u0928\u0902 \u0928\u093e\u0928\u0941\u0936\u094b\u091a\u093f\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u093f\u0964\u09642.25\u0964\u0964", "r": "avyakto \u2019yam achintyo \u2019yam avik\u0101ryo \u2019yam uchyate\ntasm\u0101deva\u1e41 viditvaina\u1e41 n\u0101nu\u015bhochitum arhasi", "t": "This Self is said to be unmanifested, unthinkable, and unchangeable. Therefore, knowing this to be so, you should not grieve."}, {"c": 2, "v": 26, "s": "\u0905\u0925 \u091a\u0948\u0928\u0902 \u0928\u093f\u0924\u094d\u092f\u091c\u093e\u0924\u0902 \u0928\u093f\u0924\u094d\u092f\u0902 \u0935\u093e \u092e\u0928\u094d\u092f\u0938\u0947 \u092e\u0943\u0924\u092e\u094d\u0964\n\n\u0924\u0925\u093e\u092a\u093f \u0924\u094d\u0935\u0902 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0928\u0948\u0935\u0902 \u0936\u094b\u091a\u093f\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u093f\u0964\u09642.26\u0964\u0964", "r": "atha chaina\u1e41 nitya-j\u0101ta\u1e41 nitya\u1e41 v\u0101 manyase m\u1e5bitam\ntath\u0101pi tva\u1e41 mah\u0101-b\u0101ho naiva\u1e41 \u015bhochitum arhasi", "t": "But even if thou thinkest of It as constantly being born and constantly dying, even then, O mighty-armed one, thou shouldst not grieve."}, {"c": 2, "v": 27, "s": "\u091c\u093e\u0924\u0938\u094d\u092f \u0939\u093f \u0927\u094d\u0930\u0941\u0935\u094b \u092e\u0943\u0924\u094d\u092f\u0941\u0930\u094d\u0927\u094d\u0930\u0941\u0935\u0902 \u091c\u0928\u094d\u092e \u092e\u0943\u0924\u0938\u094d\u092f \u091a\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0926\u092a\u0930\u093f\u0939\u093e\u0930\u094d\u092f\u0947\u093d\u0930\u094d\u0925\u0947 \u0928 \u0924\u094d\u0935\u0902 \u0936\u094b\u091a\u093f\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u093f\u0964\u09642.27\u0964\u0964", "r": "j\u0101tasya hi dhruvo m\u1e5bityur dhruva\u1e41 janma m\u1e5bitasya cha\ntasm\u0101d aparih\u0101ry
