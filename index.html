012b\u015bhvaro \u2019pi san\nprak\u1e5biti\u1e41 sv\u0101m adhi\u1e63h\u1e6dh\u0101ya sambhav\u0101my\u0101tma-m\u0101yay\u0101", "t": "Though I am unborn and of imperishable nature, and though I am the Lord of all beings, yet, governing my own nature, I am born by my own Maya."}, {"c": 4, "v": 7, "s": "\u092f\u0926\u093e \u092f\u0926\u093e \u0939\u093f \u0927\u0930\u094d\u092e\u0938\u094d\u092f \u0917\u094d\u0932\u093e\u0928\u093f\u0930\u094d\u092d\u0935\u0924\u093f \u092d\u093e\u0930\u0924\u0964\n\n\u0905\u092d\u094d\u092f\u0941\u0924\u094d\u0925\u093e\u0928\u092e\u0927\u0930\u094d\u092e\u0938\u094d\u092f \u0924\u0926\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u0938\u0943\u091c\u093e\u092e\u094d\u092f\u0939\u092e\u094d\u0964\u09644.7\u0964\u0964", "r": "yad\u0101 yad\u0101 hi dharmasya gl\u0101nir bhavati bh\u0101rata\nabhyutth\u0101nam adharmasya tad\u0101tm\u0101na\u1e41 s\u1e5bij\u0101myaham", "t": "Whenever there is a decline of righteousness and an increase of unrighteousness, O Arjuna, then I manifest Myself."}, {"c": 4, "v": 8, "s": "\u092a\u0930\u093f\u0924\u094d\u0930\u093e\u0923\u093e\u092f \u0938\u093e\u0927\u0942\u0928\u093e\u0902 \u0935\u093f\u0928\u093e\u0936\u093e\u092f \u091a \u0926\u0941\u0937\u094d\u0915\u0943\u0924\u093e\u092e\u094d\u0964\n\n\u0927\u0930\u094d\u092e\u0938\u0902\u0938\u094d\u0925\u093e\u092a\u0928\u093e\u0930\u094d\u0925\u093e\u092f \u0938\u0902\u092d\u0935\u093e\u092e\u093f \u092f\u0941\u0917\u0947 \u092f\u0941\u0917\u0947\u0964\u09644.8\u0964\u0964", "r": "paritr\u0101\u1e47\u0101ya s\u0101dh\u016bn\u0101\u1e41 vin\u0101\u015bh\u0101ya cha du\u1e63hk\u1e5bit\u0101m\ndharma-sansth\u0101pan\u0101rth\u0101ya sambhav\u0101mi yuge yuge", "t": "For the protection of the good, for the destruction of the wicked, and for the establishment of righteousness, I am born in every age."}, {"c": 4, "v": 9, "s": "\u091c\u0928\u094d\u092e \u0915\u0930\u094d\u092e \u091a \u092e\u0947 \u0926\u093f\u0935\u094d\u092f\u092e\u0947\u0935\u0902 \u092f\u094b \u0935\u0947\u0924\u094d\u0924\u093f \u0924\u0924\u094d\u0924\u094d\u0935\u0924\u0903\u0964\n\n\u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0926\u0947\u0939\u0902 \u092a\u0941\u0928\u0930\u094d\u091c\u0928\u094d\u092e \u0928\u0948\u0924\u093f \u092e\u093e\u092e\u0947\u0924\u093f \u0938\u094b\u093d\u0930\u094d\u091c\u0941\u0928\u0964\u09644.9\u0964\u0964", "r": "janma karma cha me divyam eva\u1e41 yo vetti tattvata\u1e25\ntyaktv\u0101 deha\u1e41 punar janma naiti m\u0101m eti so \u2019rjuna", "t": "He who thus knows, in their true light, My divine birth and actions, having abandoned the body, is not born again; he comes to Me, O Arjuna."}, {"c": 4, "v": 10, "s": "\u0935\u0940\u0924\u0930\u093e\u0917\u092d\u092f\u0915\u094d\u0930\u094b\u0927\u093e \u092e\u0928\u094d\u092e\u092f\u093e \u092e\u093e\u092e\u0941\u092a\u093e\u0936\u094d\u0930\u093f\u0924\u093e\u0903\u0964\n\n\u092c\u0939\u0935\u094b \u091c\u094d\u091e\u093e\u0928\u0924\u092a\u0938\u093e \u092a\u0942\u0924\u093e \u092e\u0926\u094d\u092d\u093e\u0935\u092e\u093e\u0917\u0924\u093e\u0903\u0964\u09644.10\u0964\u0964", "r": "v\u012bta-r\u0101ga-bhaya-krodh\u0101 man-may\u0101 m\u0101m up\u0101\u015bhrit\u0101\u1e25\nbahavo j\u00f1\u0101na-tapas\u0101 p\u016bt\u0101 mad-bh\u0101vam \u0101gat\u0101\u1e25", "t": "Freed from attachment, fear, and anger, absorbed in Me, taking refuge in Me, purified by the fire of knowledge, many have attained My Being."}, {"c": 4, "v": 11, "s": "\u092f\u0947 \u092f\u0925\u093e \u092e\u093e\u0902 \u092a\u094d\u0930\u092a\u0926\u094d\u092f\u0928\u094d\u0924\u0947 \u0924\u093e\u0902\u0938\u094d\u0924\u0925\u0948\u0935 \u092d\u091c\u093e\u092e\u094d\u092f\u0939\u092e\u094d\u0964\n\n\u092e\u092e \u0935\u0930\u094d\u0924\u094d\u092e\u093e\u0928\u0941\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u092e\u0928\u0941\u0937\u094d\u092f\u093e\u0903 \u092a\u093e\u0930\u094d\u0925 \u0938\u0930\u094d\u0935\u0936\u0903\u0964\u09644.11\u0964\u0964", "r": "ye yath\u0101 m\u0101\u1e41 prapadyante t\u0101ns tathaiva bhaj\u0101myaham\nmama vartm\u0101nuvartante manu\u1e63hy\u0101\u1e25 p\u0101rtha sarva\u015bha\u1e25", "t": "In whatever way men approach Me, even so do I reward them; My path do men tread in all ways, O Arjuna."}, {"c": 4, "v": 12, "s": "\u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0928\u094d\u0924\u0903 \u0915\u0930\u094d\u092e\u0923\u093e\u0902 \u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u092f\u091c\u0928\u094d\u0924 \u0907\u0939 \u0926\u0947\u0935\u0924\u093e\u0903\u0964\n\n\u0915\u094d\u0937\u093f\u092a\u094d\u0930\u0902 \u0939\u093f \u092e\u093e\u0928\u0941\u0937\u0947 \u0932\u094b\u0915\u0947 \u0938\u093f\u0926\u094d\u0927\u093f\u0930\u094d\u092d\u0935\u0924\u093f \u0915\u0930\u094d\u092e\u091c\u093e\u0964\u09644.12\u0964\u0964", "r": "k\u0101\u1e45k\u1e63hanta\u1e25 karma\u1e47\u0101\u1e41 siddhi\u1e41 yajanta iha devat\u0101\u1e25\nk\u1e63hipra\u1e41 hi m\u0101nu\u1e63he loke siddhir bhavati karmaj\u0101", "t": "Those who long for success in action in this world sacrifice to the gods; for success is quickly attained by men through action."}, {"c": 4, "v": 13, "s": "\u091a\u093e\u0924\u0941\u0930\u094d\u0935\u0930\u094d\u0923\u094d\u092f\u0902 \u092e\u092f\u093e \u0938\u0943\u0937\u094d\u091f\u0902 \u0917\u0941\u0923\u0915\u0930\u094d\u092e\u0935\u093f\u092d\u093e\u0917\u0936\u0903\u0964\n\n\u0924\u0938\u094d\u092f \u0915\u0930\u094d\u0924\u093e\u0930\u092e\u092a\u093f \u092e\u093e\u0902 \u0935\u093f\u0926\u094d\u0927\u094d\u092f\u0915\u0930\u094d\u0924\u093e\u0930\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u09644.13\u0964\u0964", "r": "ch\u0101tur-var\u1e47ya\u1e41 may\u0101 s\u1e5bi\u1e63h\u1e6da\u1e41 gu\u1e47a-karma-vibh\u0101ga\u015bha\u1e25\ntasya kart\u0101ram api m\u0101\u1e41 viddhyakart\u0101ram avyayam", "t": "The fourfold caste has been created by Me according to the differentiation of Guna and Karma; though I am the author of it, know Me as non-doer and immutable."}, {"c": 4, "v": 14, "s": "\u0928 \u092e\u093e\u0902 \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0932\u093f\u092e\u094d\u092a\u0928\u094d\u0924\u093f \u0928 \u092e\u0947 \u0915\u0930\u094d\u092e\u092b\u0932\u0947 \u0938\u094d\u092a\u0943\u0939\u093e\u0964\n\n\u0907\u0924\u093f \u092e\u093e\u0902 \u092f\u094b\u093d\u092d\u093f\u091c\u093e\u0928\u093e\u0924\u093f \u0915\u0930\u094d\u092e\u092d\u093f\u0930\u094d\u0928 \u0938 \u092c\u0927\u094d\u092f\u0924\u0947\u0964\u09644.14\u0964\u0964", "r": "na m\u0101\u1e41 karm\u0101\u1e47i limpanti na me karma-phale sp\u1e5bih\u0101\niti m\u0101\u1e41 yo \u2019bhij\u0101n\u0101ti karmabhir na sa badhyate", "t": "Actions do not taint Me, nor do I have a desire for the fruit of actions. He who knows Me thus is not bound by actions."}, {"c": 4, "v": 15, "s": "\u090f\u0935\u0902 \u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u0915\u0943\u0924\u0902 \u0915\u0930\u094d\u092e \u092a\u0942\u0930\u094d\u0935\u0948\u0930\u092a\u093f \u092e\u0941\u092e\u0941\u0915\u094d\u0937\u0941\u092d\u093f\u0903\u0964\n\n\u0915\u0941\u0930\u0941 \u0915\u0930\u094d\u092e\u0948\u0935 \u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0924\u094d\u0935\u0902 \u092a\u0942\u0930\u094d\u0935\u0948\u0903 \u092a\u0942\u0930\u094d\u0935\u0924\u0930\u0902 \u0915\u0943\u0924\u092e\u094d\u0964\u09644.15\u0964\u0964", "r": "eva\u1e41 j\u00f1\u0101tv\u0101 k\u1e5bita\u1e41 karma p\u016brvair api mumuk\u1e63hubhi\u1e25\nkuru karmaiva tasm\u0101ttva\u1e41 p\u016brvai\u1e25 p\u016brvatara\u1e41 k\u1e5bitam", "t": "Having known this, the ancient seekers of freedom also performed action; therefore, do thou also perform action, as the ancients did in days of yore."}, {"c": 4, "v": 16, "s": "\u0915\u093f\u0902 \u0915\u0930\u094d\u092e \u0915\u093f\u092e\u0915\u0930\u094d\u092e\u0947\u0924\u093f \u0915\u0935\u092f\u094b\u093d\u092a\u094d\u092f\u0924\u094d\u0930 \u092e\u094b\u0939\u093f\u0924\u093e\u0903\u0964\n\n\u0924\u0924\u094d\u0924\u0947 \u0915\u0930\u094d\u092e \u092a\u094d\u0930\u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u093f \u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u092e\u094b\u0915\u094d\u0937\u094d\u092f\u0938\u0947\u093d\u0936\u0941\u092d\u093e\u0924\u094d\u0964\u09644.16\u0964\u0964", "r": "ki\u1e41 karma kim akarmeti kavayo \u2019pyatra mohit\u0101\u1e25\ntat te karma pravak\u1e63hy\u0101mi yaj j\u00f1\u0101tv\u0101 mok\u1e63hyase \u2019\u015bhubh\u0101t", "t": "What is action? What is inaction? Even the wise are confused about this. Therefore, I shall teach you the nature of action and inaction, by knowing which you will be liberated from the evil of Samsara, the wheel of birth and death."}, {"c": 4, "v": 17, "s": "\u0915\u0930\u094d\u092e\u0923\u094b \u0939\u094d\u092f\u092a\u093f \u092c\u094b\u0926\u094d\u0927\u0935\u094d\u092f\u0902 \u092c\u094b\u0926\u094d\u0927\u0935\u094d\u092f\u0902 \u091a \u0935\u093f\u0915\u0930\u094d\u092e\u0923\u0903\u0964\n\n\u0905\u0915\u0930\u094d\u092e\u0923\u0936\u094d\u091a \u092c\u094b\u0926\u094d\u0927\u0935\u094d\u092f\u0902 \u0917\u0939\u0928\u093e \u0915\u0930\u094d\u092e\u0923\u094b \u0917\u0924\u093f\u0903\u0964\u09644.17\u0964\u0964", "r": "karma\u1e47o hyapi boddhavya\u1e41 boddhavya\u1e41 cha vikarma\u1e47a\u1e25\nakarma\u1e47a\u015bh cha boddhavya\u1e41 gahan\u0101 karma\u1e47o gati\u1e25", "t": "For verily, the true nature of action enjoined by the scriptures should be known, as well as that of forbidden or unlawful action, and of inaction; the nature of action is hard to understand."}, {"c": 4, "v": 18, "s": "\u0915\u0930\u094d\u092e\u0923\u094d\u092f\u0915\u0930\u094d\u092e \u092f\u0903 \u092a\u0936\u094d\u092f\u0947\u0926\u0915\u0930\u094d\u092e\u0923\u093f \u091a \u0915\u0930\u094d\u092e \u092f\u0903\u0964\n\n\u0938 \u092c\u0941\u0926\u094d\u0927\u093f\u092e\u093e\u0928\u094d \u092e\u0928\u0941\u0937\u094d\u092f\u0947\u0937\u0941 \u0938 \u092f\u0941\u0915\u094d\u0924\u0903 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0915\u0930\u094d\u092e\u0915\u0943\u0924\u094d\u0964\u09644.18\u0964\u0964", "r": "karma\u1e47yakarma ya\u1e25 pa\u015bhyed akarma\u1e47i cha karma ya\u1e25\nsa buddhim\u0101n manu\u1e63hye\u1e63hu sa yukta\u1e25 k\u1e5bitsna-karma-k\u1e5bit", "t": "He who sees inaction in action and action in inaction, he is wise among men; he is a yogi and performer of all actions."}, {"c": 4, "v": 19, "s": "\u092f\u0938\u094d\u092f \u0938\u0930\u094d\u0935\u0947 \u0938\u092e\u093e\u0930\u092e\u094d\u092d\u093e\u0903 \u0915\u093e\u092e\u0938\u0919\u094d\u0915\u0932\u094d\u092a\u0935\u0930\u094d\u091c\u093f\u0924\u093e\u0903\u0964\n\n\u091c\u094d\u091e\u093e\u0928\u093e\u0917\u094d\u0928\u093f\u0926\u0917\u094d\u0927\u0915\u0930\u094d\u092e\u093e\u0923\u0902 \u0924\u092e\u093e\u0939\u0941\u0903 \u092a\u0923\u094d\u0921\u093f\u0924\u0902 \u092c\u0941\u0927\u093e\u0903\u0964\u09644.19\u0964\u0964", "r": "yasya sarve sam\u0101rambh\u0101\u1e25 k\u0101ma-sa\u1e45kalpa-varjit\u0101\u1e25\nj\u00f1\u0101n\u0101gni-dagdha-karm\u0101\u1e47a\u1e41 tam \u0101hu\u1e25 pa\u1e47\u1e0dita\u1e41 budh\u0101\u1e25", "t": "He whose undertakings are all devoid of desires and selfish purposes, and whose actions have been burned by the fire of knowledge, the wise call him a sage."}, {"c": 4, "v": 20, "s": "\u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0915\u0930\u094d\u092e\u092b\u0932\u093e\u0938\u0919\u094d\u0917\u0902 \u0928\u093f\u0924\u094d\u092f\u0924\u0943\u092a\u094d\u0924\u094b \u0928\u093f\u0930\u093e\u0936\u094d\u0930\u092f\u0903\u0964\n\n\u0915\u0930\u094d\u092e\u0923\u094d\u092f\u092d\u093f\u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u094b\u093d\u092a\u093f \u0928\u0948\u0935 \u0915\u093f\u091e\u094d\u091a\u093f\u0924\u094d\u0915\u0930\u094b\u0924\u093f \u0938\u0903\u0964\u09644.20\u0964\u0964", "r": "tyaktv\u0101 karma-phal\u0101sa\u1e45ga\u1e41 nitya-t\u1e5bipto nir\u0101\u015bhraya\u1e25\nkarma\u1e47yabhiprav\u1e5bitto \u2019pi naiva ki\u00f1chit karoti sa\u1e25", "t": "Having abandoned attachment to the fruits of the action, ever content, depending on nothing, he does not do anything even while being engaged in activity."}, {"c": 4, "v": 21, "s": "\u0928\u093f\u0930\u093e\u0936\u0940\u0930\u094d\u092f\u0924\u091a\u093f\u0924\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0924\u094d\u092f\u0915\u094d\u0924\u0938\u0930\u094d\u0935\u092a\u0930\u093f\u0917\u094d\u0930\u0939\u0903\u0964\n\n\u0936\u093e\u0930\u0940\u0930\u0902 \u0915\u0947\u0935\u0932\u0902 \u0915\u0930\u094d\u092e \u0915\u0941\u0930\u094d\u0935\u0928\u094d\u0928\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0915\u093f\u0932\u094d\u092c\u093f\u0937\u092e\u094d\u0964\u09644.21\u0964\u0964", "r": "nir\u0101\u015bh\u012br yata-chitt\u0101tm\u0101 tyakta-sarva-parigraha\u1e25\n\u015bh\u0101r\u012bra\u1e41 kevala\u1e41 karma kurvan n\u0101pnoti kilbi\u1e63ham", "t": "Without hope, controlling the mind and the self, having abandoned all covetousness, and performing only bodily actions, one incurs no sin."}, {"c": 4, "v": 22, "s": "\u092f\u0926\u0943\u091a\u094d\u091b\u093e\u0932\u093e\u092d\u0938\u0928\u094d\u0924\u0941\u0937\u094d\u091f\u094b \u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u093e\u0924\u0940\u0924\u094b \u0935\u093f\u092e\u0924\u094d\u0938\u0930\u0903\u0964\n\n\u0938\u092e\u0903 \u0938\u093f\u0926\u094d\u0927\u093e\u0935\u0938\u093f\u0926\u094d\u0927\u094c \u091a \u0915\u0943\u0924\u094d\u0935\u093e\u092a\u093f \u0928 \u0928\u093f\u092c\u0927\u094d\u092f\u0924\u0947\u0964\u09644.22\u0964\u0964", "r": "yad\u1e5bichchh\u0101-l\u0101bha-santu\u1e63h\u1e6do dvandv\u0101t\u012bto vimatsara\u1e25\nsama\u1e25 siddh\u0101vasiddhau cha k\u1e5bitv\u0101pi na nibadhyate", "t": "Content with what comes to him without effort, free from the pairs of opposites and envy, even-minded in success and failure, he acts yet is not bound."}, {"c": 4, "v": 23, "s": "\u0917\u0924\u0938\u0919\u094d\u0917\u0938\u094d\u092f \u092e\u0941\u0915\u094d\u0924\u0938\u094d\u092f \u091c\u094d\u091e\u093e\u0928\u093e\u0935\u0938\u094d\u0925\u093f\u0924\u091a\u0947\u0924\u0938\u0903\u0964\n\n\u092f\u091c\u094d\u091e\u093e\u092f\u093e\u091a\u0930\u0924\u0903 \u0915\u0930\u094d\u092e \u0938\u092e\u0917\u094d\u0930\u0902 \u092a\u094d\u0930\u0935\u093f\u0932\u0940\u092f\u0924\u0947\u0964\u09644.23\u0964\u0964", "r": "gata-sa\u1e45gasya muktasya j\u00f1\u0101n\u0101vasthita-chetasa\u1e25\nyaj\u00f1\u0101y\u0101charata\u1e25 karma samagra\u1e41 pravil\u012byate", "t": "To one who is devoid of attachment, who is liberated, whose mind is established in knowledge, and who works for the sake of sacrifice (for the sake of God), the whole action is dissolved."}, {"c": 4, "v": 24, "s": "\u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0930\u094d\u092a\u0923\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u0939\u0935\u093f\u0930\u094d\u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0917\u094d\u0928\u094c \u092c\u094d\u0930\u0939\u094d\u092e\u0923\u093e \u0939\u0941\u0924\u092e\u094d\u0964\n\n\u092c\u094d\u0930\u0939\u094d\u092e\u0948\u0935 \u0924\u0947\u0928 \u0917\u0928\u094d\u0924\u0935\u094d\u092f\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u0915\u0930\u094d\u092e\u0938\u092e\u093e\u0927\u093f\u0928\u093e\u0964\u09644.24\u0964\u0964", "r": "brahm\u0101rpa\u1e47a\u1e41 brahma havir brahm\u0101gnau brahma\u1e47\u0101 hutam\nbrahmaiva tena gantavya\u1e41 brahma-karma-sam\u0101dhin\u0101", "t": "Brahman is the oblation; Brahman is the melted butter (ghee); by Brahman is the oblation poured into the fire of Brahman; Brahman indeed shall be attained by one who always sees Brahman in action."}, {"c": 4, "v": 25, "s": "\u0926\u0948\u0935\u092e\u0947\u0935\u093e\u092a\u0930\u0947 \u092f\u091c\u094d\u091e\u0902 \u092f\u094b\u0917\u093f\u0928\u0903 \u092a\u0930\u094d\u092f\u0941\u092a\u093e\u0938\u0924\u0947\u0964\n\n\u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0917\u094d\u0928\u093e\u0935\u092a\u0930\u0947 \u092f\u091c\u094d\u091e\u0902 \u092f\u091c\u094d\u091e\u0947\u0928\u0948\u0935\u094b\u092a\u091c\u0941\u0939\u094d\u0935\u0924\u093f\u0964\u09644.25\u0964\u0964", "r": "daivam ev\u0101pare yaj\u00f1a\u1e41 yogina\u1e25 paryup\u0101sate\nbrahm\u0101gn\u0101vapare yaj\u00f1a\u1e41 yaj\u00f1enaivopajuhvati", "t": "Some yogis perform sacrifice to the gods alone; while others, who have realized the Self, offer the Self as sacrifice in the fire of Brahman alone."}, {"c": 4, "v": 26, "s": "\u0936\u094d\u0930\u094b\u0924\u094d\u0930\u093e\u0926\u0940\u0928\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u094d\u092f\u0928\u094d\u092f\u0947 \u0938\u0902\u092f\u092e\u093e\u0917\u094d\u0928\u093f\u0937\u0941 \u091c\u0941\u0939\u094d\u0935\u0924\u093f\u0964\n\n\u0936\u092c\u094d\u0926\u093e\u0926\u0940\u0928\u094d\u0935\u093f\u0937\u092f\u093e\u0928\u0928\u094d\u092f \u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0917\u094d\u0928\u093f\u0937\u0941 \u091c\u0941\u0939\u094d\u0935\u0924\u093f\u0964\u09644.26\u0964\u0964", "r": "\u015bhrotr\u0101d\u012bn\u012bndriy\u0101\u1e47yanye sanyam\u0101gni\u1e63hu juhvati\n\u015bhabd\u0101d\u012bn vi\u1e63hay\u0101nanya indriy\u0101gni\u1e63hu juhvati", "t": "Some again offer the organ of hearing and other senses as a sacrifice in the fire of restraint; others offer sound and other objects of the senses as a sacrifice in the fire of the senses."}, {"c": 4, "v": 27, "s": "\u0938\u0930\u094d\u0935\u093e\u0923\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u092a\u094d\u0930\u093e\u0923\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u091a\u093e\u092a\u0930\u0947\u0964\n\n\u0906\u0924\u094d\u092e\u0938\u0902\u092f\u092e\u092f\u094b\u0917\u093e\u0917\u094d\u0928\u094c \u091c\u0941\u0939\u094d\u0935\u0924\u093f \u091c\u094d\u091e\u093e\u0928\u0926\u0940\u092a\u093f\u0924\u0947\u0964\u09644.27\u0964\u0964", "r": "sarv\u0101\u1e47\u012bndriya-karm\u0101\u1e47i pr\u0101\u1e47a-karm\u0101\u1e47i ch\u0101pare\n\u0101tma-sanyama-yog\u0101gnau juhvati j\u00f1\u0101na-d\u012bpite", "t": "Others again sacrifice all the functions of the senses and those of the breath (vital energy, or Prana) in the fire of the Yoga of self-restraint, kindled by knowledge."}, {"c": 4, "v": 28, "s": "\u0926\u094d\u0930\u0935\u094d\u092f\u092f\u091c\u094d\u091e\u093e\u0938\u094d\u0924\u092a\u094b\u092f\u091c\u094d\u091e\u093e \u092f\u094b\u0917\u092f\u091c\u094d\u091e\u093e\u0938\u094d\u0924\u0925\u093e\u092a\u0930\u0947\u0964\n\n\u0938\u094d\u0935\u093e\u0927\u094d\u092f\u093e\u092f\u091c\u094d\u091e\u093e\u0928\u092f\u091c\u094d\u091e\u093e\u0936\u094d\u091a \u092f\u0924\u092f\u0903 \u0938\u0902\u0936\u093f\u0924\u0935\u094d\u0930\u0924\u093e\u0903\u0964\u09644.28\u0964\u0964", "r": "dravya-yaj\u00f1\u0101s tapo-yaj\u00f1\u0101 yoga-yaj\u00f1\u0101s tath\u0101pare\nsw\u0101dhy\u0101ya-j\u00f1\u0101na-yaj\u00f1\u0101\u015bh cha yataya\u1e25 san\u015bhita-vrat\u0101\u1e25", "t": "Others again offer wealth, austerity, and Yoga as sacrifice, while ascetics of self-restraint and rigid vows offer the study of scriptures and knowledge as sacrifice."}, {"c": 4, "v": 29, "s": "\u0905\u092a\u093e\u0928\u0947 \u091c\u0941\u0939\u094d\u0935\u0924\u093f \u092a\u094d\u0930\u093e\u0923 \u092a\u094d\u0930\u093e\u0923\u0947\u093d\u092a\u093e\u0928\u0902 \u0924\u0925\u093e\u093d\u092a\u0930\u0947\u0964\n\n\u092a\u094d\u0930\u093e\u0923\u093e\u092a\u093e\u0928\u0917\u0924\u0940 \u0930\u0941\u0926\u094d\u0927\u094d\u0935\u093e \u092a\u094d\u0930\u093e\u0923\u093e\u092f\u093e\u092e\u092a\u0930\u093e\u092f\u0923\u093e\u0903\u0964\u09644.29\u0964\u0964", "r": "ap\u0101ne juhvati pr\u0101\u1e47a\u1e41 pr\u0101\u1e47e \u2019p\u0101na\u1e41 tath\u0101pare\npr\u0101\u1e47\u0101p\u0101na-gat\u012b ruddhv\u0101 pr\u0101\u1e47\u0101y\u0101ma-par\u0101ya\u1e47\u0101\u1e25\n apare niyat\u0101h\u0101r\u0101\u1e25 pr\u0101\u1e47\u0101n pr\u0101\u1e47e\u1e63hu juhvati\nsarve \u2019pyete yaj\u00f1a-vido yaj\u00f1a-k\u1e63hapita-kalma\u1e63h\u0101\u1e25", "t": "Others offer as sacrifice the outgoing breath into the incoming, and the incoming into the outgoing, restraining the flow of the outgoing and the incoming breaths, solely absorbed in the restraint of the breath."}, {"c": 4, "v": 30, "s": "\u0905\u092a\u0930\u0947 \u0928\u093f\u092f\u0924\u093e\u0939\u093e\u0930\u093e\u0903 \u092a\u094d\u0930\u093e\u0923\u093e\u0928\u094d\u092a\u094d\u0930\u093e\u0923\u0947\u0937\u0941 \u091c\u0941\u0939\u094d\u0935\u0924\u093f\u0964\n\n\u0938\u0930\u094d\u0935\u0947\u093d\u092a\u094d\u092f\u0947\u0924\u0947 \u092f\u091c\u094d\u091e\u0935\u093f\u0926\u094b \u092f\u091c\u094d\u091e\u0915\u094d\u0937\u092a\u093f\u0924\u0915\u0932\u094d\u092e\u0937\u093e\u0903\u0964\u09644.30\u0964\u0964", "r": "apare niyat\u0101h\u0101r\u0101\u1e25 pr\u0101\u1e47\u0101n pr\u0101\u1e47e\u1e63u juhvati\n\nsarve py 'ete yaj\u00f1a-vido yaj\u00f1a-k\u1e63apita-kalma\u1e63\u0101\u1e25", "t": "Others who regulate their diet offer life-breaths in each life-breath. All these are knowers of sacrifice, whose sins are destroyed through sacrifice."}, {"c": 4, "v": 31, "s": "\u092f\u091c\u094d\u091e\u0936\u093f\u0937\u094d\u091f\u093e\u092e\u0943\u0924\u092d\u0941\u091c\u094b \u092f\u093e\u0928\u094d\u0924\u093f \u092c\u094d\u0930\u0939\u094d\u092e \u0938\u0928\u093e\u0924\u0928\u092e\u094d\u0964\n\n\u0928\u093e\u092f\u0902 \u0932\u094b\u0915\u094b\u093d\u0938\u094d\u0924\u094d\u092f\u092f\u091c\u094d\u091e\u0938\u094d\u092f \u0915\u0941\u0924\u094b\u093c\u093d\u0928\u094d\u092f\u0903 \u0915\u0941\u0930\u0941\u0938\u0924\u094d\u0924\u092e\u0964\u09644.31\u0964\u0964", "r": "yaj\u00f1a-\u015bhi\u1e63h\u1e6d\u0101m\u1e5bita-bhujo y\u0101nti brahma san\u0101tanam\nn\u0101ya\u1e41 loko \u2019styayaj\u00f1asya kuto \u2019nya\u1e25 kuru-sattama", "t": "Those who eat the remnants of the sacrifice, which are like nectar, go to the eternal Brahman. This world is not for the one who does not perform sacrifice; how then can they have the other, O Arjuna?"}, {"c": 4, "v": 32, "s": "\u090f\u0935\u0902 \u092c\u0939\u0941\u0935\u093f\u0927\u093e \u092f\u091c\u094d\u091e\u093e \u0935\u093f\u0924\u0924\u093e \u092c\u094d\u0930\u0939\u094d\u092e\u0923\u094b \u092e\u0941\u0916\u0947\u0964\n\n\u0915\u0930\u094d\u092e\u091c\u093e\u0928\u094d\u0935\u093f\u0926\u094d\u0927\u093f \u0924\u093e\u0928\u094d\u0938\u0930\u094d\u0935\u093e\u0928\u0947\u0935\u0902 \u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u0935\u093f\u092e\u094b\u0915\u094d\u0937\u094d\u092f\u0938\u0947\u0964\u09644.32\u0964\u0964", "r": "eva\u1e41 bahu-vidh\u0101 yaj\u00f1\u0101 vitat\u0101 brahma\u1e47o mukhe\nkarma-j\u0101n viddhi t\u0101n sarv\u0101n eva\u1e41 j\u00f1\u0101tv\u0101 vimok\u1e63hyase", "t": "Thus, manifold sacrifices are spread out before Brahman at the face of Brahman. Know them all to be born of action, and thus knowing, you shall be liberated."}, {"c": 4, "v": 33, "s": "\u0936\u094d\u0930\u0947\u092f\u093e\u0928\u094d\u0926\u094d\u0930\u0935\u094d\u092f\u092e\u092f\u093e\u0926\u094d\u092f\u091c\u094d\u091e\u093e\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u092f\u091c\u094d\u091e\u0903 \u092a\u0930\u0928\u094d\u0924\u092a\u0964\n\n\u0938\u0930\u094d\u0935\u0902 \u0915\u0930\u094d\u092e\u093e\u0916\u093f\u0932\u0902 \u092a\u093e\u0930\u094d\u0925 \u091c\u094d\u091e\u093e\u0928\u0947 \u092a\u0930\u093f\u0938\u092e\u093e\u092a\u094d\u092f\u0924\u0947\u0964\u09644.33\u0964\u0964", "r": "\u015bhrey\u0101n dravya-may\u0101d yaj\u00f1\u0101j j\u00f1\u0101na-yaj\u00f1a\u1e25 parantapa\nsarva\u1e41 karm\u0101khila\u1e41 p\u0101rtha j\u00f1\u0101ne parisam\u0101pyate", "t": "Superior is wisdom-sacrifice to the sacrifice with objects, O Parantapa (scorcher of the foes). All actions in their entirety, O Arjuna, culminate in knowledge."}, {"c": 4, "v": 34, "s": "\u0924\u0926\u094d\u0935\u093f\u0926\u094d\u0927\u093f \u092a\u094d\u0930\u0923\u093f\u092a\u093e\u0924\u0947\u0928 \u092a\u0930\u093f\u092a\u094d\u0930\u0936\u094d\u0928\u0947\u0928 \u0938\u0947\u0935\u092f\u093e\u0964\n\n\u0909\u092a\u0926\u0947\u0915\u094d\u0937\u094d\u092f\u0928\u094d\u0924\u093f \u0924\u0947 \u091c\u094d\u091e\u093e\u0928\u0902 \u091c\u094d\u091e\u093e\u0928\u093f\u0928\u0938\u094d\u0924\u0924\u094d\u0924\u094d\u0935\u0926\u0930\u094d\u0936\u093f\u0928\u0903\u0964\u09644.34\u0964\u0964", "r": "tad viddhi pra\u1e47ip\u0101tena paripra\u015bhnena sevay\u0101\nupadek\u1e63hyanti te j\u00f1\u0101na\u1e41 j\u00f1\u0101ninas tattva-dar\u015bhina\u1e25", "t": "Know that the wise who have realized the truth will instruct thee in that knowledge through long prostration, supplication, and service."}, {"c": 4, "v": 35, "s": "\u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u0928 \u092a\u0941\u0928\u0930\u094d\u092e\u094b\u0939\u092e\u0947\u0935\u0902 \u092f\u093e\u0938\u094d\u092f\u0938\u093f \u092a\u093e\u0923\u094d\u0921\u0935\u0964\n\n\u092f\u0947\u0928 \u092d\u0942\u0924\u093e\u0928\u094d\u092f\u0936\u0947\u0937\u0947\u0923 \u0926\u094d\u0930\u0915\u094d\u0937\u094d\u092f\u0938\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u094d\u092f\u0925\u094b \u092e\u092f\u093f\u0964\u09644.35\u0964\u0964", "r": "yaj j\u00f1\u0101tv\u0101 na punar moham eva\u1e41 y\u0101syasi p\u0101\u1e47\u1e0dava\nyena bh\u016bt\u0101nya\u015bhe\u1e63he\u1e47a drak\u1e63hyasy\u0101tmanyatho mayi", "t": "Knowing that thou shalt not, O Arjuna, again be deluded like this; and by that thou shalt see all beings in thyself and also in me."}, {"c": 4, "v": 36, "s": "\u0905\u092a\u093f \u091a\u0947\u0926\u0938\u093f \u092a\u093e\u092a\u0947\u092d\u094d\u092f\u0903 \u0938\u0930\u094d\u0935\u0947\u092d\u094d\u092f\u0903 \u092a\u093e\u092a\u0915\u0943\u0924\u094d\u0924\u092e\u0903\u0964\n\n\u0938\u0930\u094d\u0935\u0902 \u091c\u094d\u091e\u093e\u0928\u092a\u094d\u0932\u0935\u0947\u0928\u0948\u0935 \u0935\u0943\u091c\u093f\u0928\u0902 \u0938\u0928\u094d\u0924\u0930\u093f\u0937\u094d\u092f\u0938\u093f\u0964\u09644.36\u0964\u0964", "r": "api ched asi p\u0101pebhya\u1e25 sarvebhya\u1e25 p\u0101pa-k\u1e5bit-tama\u1e25\nsarva\u1e41 j\u00f1\u0101na-plavenaiva v\u1e5bijina\u1e41 santari\u1e63hyasi", "t": "Even if thou art the most sinful of all sinners, yet thou shalt surely cross over all sins by the raft of knowledge."}, {"c": 4, "v": 37, "s": "\u092f\u0925\u0948\u0927\u093e\u0902\u0938\u093f \u0938\u092e\u093f\u0926\u094d\u0927\u094b\u093d\u0917\u094d\u0928\u093f\u0930\u094d\u092d\u0938\u094d\u092e\u0938\u093e\u0924\u094d\u0915\u0941\u0930\u0941\u0924\u0947\u093d\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u091c\u094d\u091e\u093e\u0928\u093e\u0917\u094d\u0928\u093f\u0903 \u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u092d\u0938\u094d\u092e\u0938\u093e\u0924\u094d\u0915\u0941\u0930\u0941\u0924\u0947 \u0924\u0925\u093e\u0964\u09644.37\u0964\u0964", "r": "yathaidh\u0101nsi samiddho \u2019gnir bhasma-s\u0101t kurute \u2019rjuna\nj\u00f1\u0101n\u0101gni\u1e25 sarva-karm\u0101\u1e47i bhasma-s\u0101t kurute tath\u0101", "t": "As the blazing fire reduces fuel to ashes, O Arjuna, so does the fire of knowledge reduce all actions to ash."}, {"c": 4, "v": 38, "s": "\u0928 \u0939\u093f \u091c\u094d\u091e\u093e\u0928\u0947\u0928 \u0938\u0926\u0943\u0936\u0902 \u092a\u0935\u093f\u0924\u094d\u0930\u092e\u093f\u0939 \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\n\n\u0924\u0924\u094d\u0938\u094d\u0935\u092f\u0902 \u092f\u094b\u0917\u0938\u0902\u0938\u093f\u0926\u094d\u0927\u0903 \u0915\u093e\u0932\u0947\u0928\u093e\u0924\u094d\u092e\u0928\u093f \u0935\u093f\u0928\u094d\u0926\u0924\u093f\u0964\u09644.38\u0964\u0964", "r": "na hi j\u00f1\u0101nena sad\u1e5bi\u015bha\u1e41 pavitramiha vidyate\ntatsvaya\u1e41 yogasansiddha\u1e25 k\u0101len\u0101tmani vindati", "t": "Verily, there is no purifier in this world like knowledge. He who is perfected in Yoga finds it within the Self in due time."}, {"c": 4, "v": 39, "s": "\u0936\u094d\u0930\u0926\u094d\u0927\u093e\u0935\u093e\u0901\u0932\u094d\u0932\u092d\u0924\u0947 \u091c\u094d\u091e\u093e\u0928\u0902 \u0924\u0924\u094d\u092a\u0930\u0903 \u0938\u0902\u092f\u0924\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0903\u0964\n\n\u091c\u094d\u091e\u093e\u0928\u0902 \u0932\u092c\u094d\u0927\u094d\u0935\u093e \u092a\u0930\u093e\u0902 \u0936\u093e\u0928\u094d\u0924\u093f\u092e\u091a\u093f\u0930\u0947\u0923\u093e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09644.39\u0964\u0964", "r": "\u015bhraddh\u0101v\u0101n labhate j\u00f1\u0101na\u1e41 tat-para\u1e25 sanyatendriya\u1e25\nj\u00f1\u0101na\u1e41 labdhv\u0101 par\u0101\u1e41 \u015bh\u0101ntim achire\u1e47\u0101dhigachchhati", "t": "The one who is full of faith, devoted to it, and has subdued their senses obtains this knowledge; and upon obtaining the knowledge, they attain the supreme peace immediately."}, {"c": 4, "v": 40, "s": "\u0905\u091c\u094d\u091e\u0936\u094d\u091a\u093e\u0936\u094d\u0930\u0926\u094d\u0926\u0927\u093e\u0928\u0936\u094d\u091a \u0938\u0902\u0936\u092f\u093e\u0924\u094d\u092e\u093e \u0935\u093f\u0928\u0936\u094d\u092f\u0924\u093f\u0964\n\n\u0928\u093e\u092f\u0902 \u0932\u094b\u0915\u094b\u093d\u0938\u094d\u0924\u093f \u0928 \u092a\u0930\u094b \u0928 \u0938\u0941\u0916\u0902 \u0938\u0902\u0936\u092f\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u09644.40\u0964\u0964", "r": "aj\u00f1a\u015bh ch\u0101\u015bhraddadh\u0101na\u015bh cha san\u015bhay\u0101tm\u0101 vina\u015bhyati\nn\u0101ya\u1e41 loko \u2019sti na paro na sukha\u1e41 san\u015bhay\u0101tmana\u1e25", "t": "The ignorant, the faithless, and the doubting self go to destruction; there is neither this world nor the other, nor happiness for the doubting one."}, {"c": 4, "v": 41, "s": "\u092f\u094b\u0917\u0938\u0902\u0928\u094d\u092f\u0938\u094d\u0924\u0915\u0930\u094d\u092e\u093e\u0923\u0902 \u091c\u094d\u091e\u093e\u0928\u0938\u0902\u091b\u093f\u0928\u094d\u0928\u0938\u0902\u0936\u092f\u092e\u094d\u0964\n\n\u0906\u0924\u094d\u092e\u0935\u0928\u094d\u0924\u0902 \u0928 \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0928\u093f\u092c\u0927\u094d\u0928\u0928\u094d\u0924\u093f \u0927\u0928\u091e\u094d\u091c\u092f\u0964\u09644.41\u0964\u0964", "r": "yoga-sannyasta-karm\u0101\u1e47a\u1e41 j\u00f1\u0101na-sa\u00f1chhinna-san\u015bhayam\n\u0101tmavanta\u1e41 na karm\u0101\u1e47i nibadhnanti dhana\u00f1jaya", "t": "He who has renounced actions through Yoga, whose doubts have been dispelled by knowledge, and who is self-possessed\u2014such a one is not bound by actions, O Arjuna."}, {"c": 4, "v": 42, "s": "\u0924\u0938\u094d\u092e\u093e\u0926\u091c\u094d\u091e\u093e\u0928\u0938\u0902\u092d\u0942\u0924\u0902 \u0939\u0943\u0924\u094d\u0938\u094d\u0925\u0902 \u091c\u094d\u091e\u093e\u0928\u093e\u0938\u093f\u0928\u093e\u093d\u093d\u0924\u094d\u092e\u0928\u0903\u0964\n\n\u091b\u093f\u0924\u094d\u0924\u094d\u0935\u0948\u0928\u0902 \u0938\u0902\u0936\u092f\u0902 \u092f\u094b\u0917\u092e\u093e\u0924\u093f\u0937\u094d\u0920\u094b\u0924\u094d\u0924\u093f\u0937\u094d\u0920 \u092d\u093e\u0930\u0924\u0964\u09644.42\u0964\u0964", "r": "tasm\u0101d aj\u00f1\u0101na-sambh\u016bta\u1e41 h\u1e5bit-stha\u1e41 j\u00f1\u0101n\u0101sin\u0101tmana\u1e25\nchhittvaina\u1e41 san\u015bhaya\u1e41 yogam \u0101ti\u1e63h\u1e6dhotti\u1e63h\u1e6dha bh\u0101rata", "t": "Therefore, with the sword of knowledge (of the Self), cut asunder the doubt of the self, born of ignorance, residing in your heart, and take refuge in Yoga. Arise, O Arjuna!"}, {"c": 5, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0902 \u0915\u0930\u094d\u092e\u0923\u093e\u0902 \u0915\u0943\u0937\u094d\u0923 \u092a\u0941\u0928\u0930\u094d\u092f\u094b\u0917\u0902 \u091a \u0936\u0902\u0938\u0938\u093f\u0964\n\n\u092f\u091a\u094d\u091b\u094d\u0930\u0947\u092f \u090f\u0924\u092f\u094b\u0930\u0947\u0915\u0902 \u0924\u0928\u094d\u092e\u0947 \u092c\u094d\u0930\u0942\u0939\u093f \u0938\u0941\u0928\u093f\u0936\u094d\u093f\u091a\u0924\u092e\u094d\u0964\u09645.1\u0964\u0964", "r": "arjuna uv\u0101cha\nsanny\u0101sa\u1e41 karma\u1e47\u0101\u1e41 k\u1e5bi\u1e63h\u1e47a punar yoga\u1e41 cha \u015bhansasi\nyach chhreya etayor eka\u1e41 tan me br\u016bhi su-ni\u015bhchitam", "t": "Arjuna said, \"O Krishna, you praise renunciation of actions and also yoga. Please tell me conclusively which is better of the two.\""}, {"c": 5, "v": 2, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0903 \u0915\u0930\u094d\u092e\u092f\u094b\u0917\u0936\u094d\u091a \u0928\u093f\u0903\u0936\u094d\u0930\u0947\u092f\u0938\u0915\u0930\u093e\u0935\u0941\u092d\u094c\u0964\n\n\u0924\u092f\u094b\u0938\u094d\u0924\u0941 \u0915\u0930\u094d\u092e\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u093e\u0924\u094d\u0915\u0930\u094d\u092e\u092f\u094b\u0917\u094b \u0935\u093f\u0936\u093f\u0937\u094d\u092f\u0924\u0947\u0964\u09645.2\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nsanny\u0101sa\u1e25 karma-yoga\u015bh cha ni\u1e25\u015bhreyasa-kar\u0101vubhau\ntayos tu karma-sanny\u0101s\u0101t karma-yogo vi\u015bhi\u1e63hyate", "t": "The Blessed Lord said, \"Renunciation and the Yoga of action both lead to the highest bliss; but of the two, the Yoga of action is superior to the renunciation of action.\""}, {"c": 5, "v": 3, "s": "\u091c\u094d\u091e\u0947\u092f\u0903 \u0938 \u0928\u093f\u0924\u094d\u092f\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0940 \u092f\u094b \u0928 \u0926\u094d\u0935\u0947\u0937\u094d\u091f\u093f \u0928 \u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0924\u093f\u0964\n\n\u0928\u093f\u0930\u094d\u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u094b \u0939\u093f \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0938\u0941\u0916\u0902 \u092c\u0928\u094d\u0927\u093e\u0924\u094d\u092a\u094d\u0930\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u09645.3\u0964\u0964", "r": "j\u00f1eya\u1e25 sa nitya-sanny\u0101s\u012b yo na dve\u1e63h\u1e6di na k\u0101\u1e45k\u1e63hati\nnirdvandvo hi mah\u0101-b\u0101ho sukha\u1e41 bandh\u0101t pramuchyate", "t": "He should be known as a perpetual Sannyasi who neither hates nor desires; for, free from the pairs of opposites, O mighty-armed Arjuna, he is easily freed from bondage."}, {"c": 5, "v": 4, "s": "\u0938\u093e\u0902\u0916\u094d\u092f\u092f\u094b\u0917\u094c \u092a\u0943\u0925\u0917\u094d\u092c\u093e\u0932\u093e\u0903 \u092a\u094d\u0930\u0935\u0926\u0928\u094d\u0924\u093f \u0928 \u092a\u0923\u094d\u0921\u093f\u0924\u093e\u0903\u0964\n\n\u090f\u0915\u092e\u092a\u094d\u092f\u093e\u0938\u094d\u0925\u093f\u0924\u0903 \u0938\u092e\u094d\u092f\u0917\u0941\u092d\u092f\u094b\u0930\u094d\u0935\u093f\u0928\u094d\u0926\u0924\u0947 \u092b\u0932\u092e\u094d\u0964\u09645.4\u0964\u0964", "r": "s\u0101nkhya-yogau p\u1e5bithag b\u0101l\u0101\u1e25 pravadanti na pa\u1e47\u1e0dit\u0101\u1e25\nekamapy\u0101sthita\u1e25 samyag ubhayor vindate phalam", "t": "Children, not the wise, speak of knowledge and the Yoga of action, or the performance of action, as though they are distinct and different; he who is truly established in one, obtains the fruits of both."}, {"c": 5, "v": 5, "s": "\u092f\u0924\u094d\u0938\u093e\u0902\u0916\u094d\u092f\u0948\u0903 \u092a\u094d\u0930\u093e\u092a\u094d\u092f\u0924\u0947 \u0938\u094d\u0925\u093e\u0928\u0902 \u0924\u0926\u094d\u092f\u094b\u0917\u0948\u0930\u092a\u093f \u0917\u092e\u094d\u092f\u0924\u0947\u0964\n\n\u090f\u0915\u0902 \u0938\u093e\u0902\u0916\u094d\u092f\u0902 \u091a \u092f\u094b\u0917\u0902 \u091a \u092f\u0903 \u092a\u0936\u094d\u092f\u0924\u093f \u0938 \u092a\u0936\u094d\u092f\u0924\u093f\u0964\u09645.5\u0964\u0964", "r": "yat s\u0101nkhyai\u1e25 pr\u0101pyate sth\u0101na\u1e41 tad yogair api gamyate\neka\u1e41 s\u0101nkhya\u1e41 cha yoga\u1e41 cha ya\u1e25 pa\u015bhyati sa pa\u015bhyati", "t": "That place which is reached by the Sankhyas or the Jnanis is also reached by the Yogis (Karma Yogis). He who sees knowledge and the performance of action (Karma Yoga) as one, sees truly."}, {"c": 5, "v": 6, "s": "\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0938\u094d\u0924\u0941 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0926\u0941\u0903\u0916\u092e\u093e\u092a\u094d\u0924\u0941\u092e\u092f\u094b\u0917\u0924\u0903\u0964\n\n\u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u094b \u092e\u0941\u0928\u093f\u0930\u094d\u092c\u094d\u0930\u0939\u094d\u092e \u0928\u091a\u093f\u0930\u0947\u0923\u093e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09645.6\u0964\u0964", "r": "sanny\u0101sas tu mah\u0101-b\u0101ho du\u1e25kham \u0101ptum ayogata\u1e25\nyoga-yukto munir brahma na chire\u1e47\u0101dhigachchhati", "t": "But, O mighty-armed Arjuna, renunciation is hard to attain without Yoga; the sage who is in harmony with Yoga quickly goes to Brahman."}, {"c": 5, "v": 7, "s": "\u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u094b \u0935\u093f\u0936\u0941\u0926\u094d\u0927\u093e\u0924\u094d\u092e\u093e \u0935\u093f\u091c\u093f\u0924\u093e\u0924\u094d\u092e\u093e \u091c\u093f\u0924\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0903\u0964\n\n\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0924\u094d\u092e\u092d\u0942\u0924\u093e\u0924\u094d\u092e\u093e \u0915\u0941\u0930\u094d\u0935\u0928\u094d\u0928\u092a\u093f \u0928 \u0932\u093f\u092a\u094d\u092f\u0924\u0947\u0964\u09645.7\u0964\u0964", "r": "yoga-yukto vi\u015bhuddh\u0101tm\u0101 vijit\u0101tm\u0101 jitendriya\u1e25\nsarva-bh\u016bt\u0101tma-bh\u016bt\u0101tm\u0101 kurvann api na lipyate", "t": "He who is devoted to the path of action, whose mind is pure, who has conquered the self, who has subdued his senses, and who realizes his Self as the Self in all beings, though acting, is not tainted."}, {"c": 5, "v": 8, "s": "\u0928\u0948\u0935 \u0915\u093f\u0902\u091a\u093f\u0924\u094d\u0915\u0930\u094b\u092e\u0940\u0924\u093f \u092f\u0941\u0915\u094d\u0924\u094b \u092e\u0928\u094d\u092f\u0947\u0924 \u0924\u0924\u094d\u0924\u094d\u0935\u0935\u093f\u0924\u094d\u0964\n\n\u092a\u0936\u094d\u092f\u0928\u094d \u0936\u094d\u0930\u0943\u0923\u0935\u0928\u094d\u0938\u094d\u092a\u0943\u0936\u091e\u094d\u091c\u093f\u0918\u094d\u0930\u0928\u094d\u0928\u0936\u094d\u0928\u0928\u094d\u0917\u091a\u094d\u091b\u0928\u094d\u0938\u094d\u0935\u092a\u0928\u094d \u0936\u094d\u0935\u0938\u0928\u094d\u0964\u09645.8\u0964\u0964", "r": "naiva ki\u00f1chit karom\u012bti yukto manyeta tattva-vit\npa\u015bhya\u00f1 \u015bh\u1e5bi\u1e47van sp\u1e5bi\u015bha\u00f1jighrann a\u015bhnangachchhan svapa\u00f1\u015bhvasan\n pralapan vis\u1e5bijan g\u1e5bih\u1e47ann unmi\u1e63han nimi\u1e63hann api\nindriy\u0101\u1e47\u012bndriy\u0101rthe\u1e63hu vartanta iti dh\u0101rayan", "t": "I do nothing at all,\" thus would the harmonized knower of Truth think, seeing, hearing, touching, smelling, eating, going, sleeping, and breathing."}, {"c": 5, "v": 9, "s": "\u092a\u094d\u0930\u0932\u092a\u0928\u094d\u0935\u093f\u0938\u0943\u091c\u0928\u094d\u0917\u0943\u0939\u094d\u0923\u0928\u094d\u0928\u0941\u0928\u094d\u092e\u093f\u0937\u0928\u094d\u0928\u093f\u092e\u093f\u0937\u0928\u094d\u0928\u092a\u093f\u0964\n\n\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u094d\u0925\u0947\u0937\u0941 \u0935\u0930\u094d\u0924\u0928\u094d\u0924 \u0907\u0924\u093f \u0927\u093e\u0930\u092f\u0928\u094d\u0964\u09645.9\u0964\u0964", "r": "pralapan vis\u1e5bjan g\u1e5bh\u1e47ann unmi\u1e63an nimi\u1e63ann api indriy\u0101\u1e47\u012bndriy\u0101rthe\u1e63u vartanta iti dh\u0101rayan", "t": "Speaking, letting go, seizing, opening, and closing the eyes, one should be convinced that the senses move among the sense-objects."}, {"c": 5, "v": 10, "s": "\u092c\u094d\u0930\u0939\u094d\u092e\u0923\u094d\u092f\u093e\u0927\u093e\u092f \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0938\u0919\u094d\u0917\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0915\u0930\u094b\u0924\u093f \u092f\u0903\u0964\n\n\u0932\u093f\u092a\u094d\u092f\u0924\u0947 \u0928 \u0938 \u092a\u093e\u092a\u0947\u0928 \u092a\u0926\u094d\u092e\u092a\u0924\u094d\u0930\u092e\u093f\u0935\u093e\u092e\u094d\u092d\u0938\u093e\u0964\u09645.10\u0964\u0964", "r": "brahma\u1e47y\u0101dh\u0101ya karm\u0101\u1e47i sa\u1e45ga\u1e41 tyaktv\u0101 karoti ya\u1e25\nlipyate na sa p\u0101pena padma-patram iv\u0101mbhas\u0101", "t": "He who does actions, offering them to Brahman and abandoning attachment, is not tainted by sin, just as a lotus leaf is not tainted by water."}, {"c": 5, "v": 11, "s": "\u0915\u093e\u092f\u0947\u0928 \u092e\u0928\u0938\u093e \u092c\u0941\u0926\u094d\u0927\u094d\u092f\u093e \u0915\u0947\u0935\u0932\u0948\u0930\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0948\u0930\u092a\u093f\u0964\n\n\u092f\u094b\u0917\u093f\u0928\u0903 \u0915\u0930\u094d\u092e \u0915\u0941\u0930\u094d\u0935\u0928\u094d\u0924\u093f \u0938\u0919\u094d\u0917\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e\u093d\u093d\u0924\u094d\u092e\u0936\u0941\u0926\u094d\u0927\u092f\u0947\u0964\u09645.11\u0964\u0964", "r": "k\u0101yena manas\u0101 buddhy\u0101 kevalair indriyair api\nyogina\u1e25 karma kurvanti sa\u1e45ga\u1e41 tyaktv\u0101tma-\u015bhuddhaye", "t": "Yogis, having abandoned attachment, perform actions only through the body, mind, intellect, and even the senses, for the purification of the self."}, {"c": 5, "v": 12, "s": "\u092f\u0941\u0915\u094d\u0924\u0903 \u0915\u0930\u094d\u092e\u092b\u0932\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0936\u093e\u0928\u094d\u0924\u093f\u092e\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0928\u0948\u0937\u094d\u0920\u093f\u0915\u0940\u092e\u094d\u0964\n\n\u0905\u092f\u0941\u0915\u094d\u0924\u0903 \u0915\u093e\u092e\u0915\u093e\u0930\u0947\u0923 \u092b\u0932\u0947 \u0938\u0915\u094d\u0924\u094b \u0928\u093f\u092c\u0927\u094d\u092f\u0924\u0947\u0964\u09645.12\u0964\u0964", "r": "yukta\u1e25 karma-phala\u1e41 tyaktv\u0101 \u015bh\u0101ntim \u0101pnoti nai\u1e63h\u1e6dhik\u012bm\nayukta\u1e25 k\u0101ma-k\u0101re\u1e47a phale sakto nibadhyate", "t": "The one who is united (the well-poised or harmonized) having abandoned the fruit of action attains eternal peace; whereas the one who is not united (the unsteady or unbalanced), impelled by desire and attached to the fruit, is bound."}, {"c": 5, "v": 13, "s": "\u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u092e\u0928\u0938\u093e \u0938\u0902\u0928\u094d\u092f\u0938\u094d\u092f\u093e\u0938\u094d\u0924\u0947 \u0938\u0941\u0916\u0902 \u0935\u0936\u0940\u0964\n\n\u0928\u0935\u0926\u094d\u0935\u093e\u0930\u0947 \u092a\u0941\u0930\u0947 \u0926\u0947\u0939\u0940 \u0928\u0948\u0935 \u0915\u0941\u0930\u094d\u0935\u0928\u094d\u0928 \u0915\u093e\u0930\u092f\u0928\u094d\u0964\u09645.13\u0964\u0964", "r": "sarva-karm\u0101\u1e47i manas\u0101 sannyasy\u0101ste sukha\u1e41 va\u015bh\u012b\nnava-dv\u0101re pure deh\u012b naiva kurvan na k\u0101rayan", "t": "Mentally renouncing all actions and being self-controlled, the embodied one happily rests in the nine-gated city, neither acting nor causing others (body and senses) to act."}, {"c": 5, "v": 14, "s": "\u0928 \u0915\u0930\u094d\u0924\u0943\u0924\u094d\u0935\u0902 \u0928 \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0932\u094b\u0915\u0938\u094d\u092f \u0938\u0943\u091c\u0924\u093f \u092a\u094d\u0930\u092d\u0941\u0903\u0964\n\n\u0928 \u0915\u0930\u094d\u092e\u092b\u0932\u0938\u0902\u092f\u094b\u0917\u0902 \u0938\u094d\u0935\u092d\u093e\u0935\u0938\u094d\u0924\u0941 \u092a\u094d\u0930\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09645.14\u0964\u0964", "r": "na kart\u1e5bitva\u1e41 na karm\u0101\u1e47i lokasya s\u1e5bijati prabhu\u1e25\nna karma-phala-sa\u1e45yoga\u1e41 svabh\u0101vas tu pravartate", "t": "Neither does the Lord create agency nor actions for the world, nor union with the fruits of actions; rather, it is Nature that acts."}, {"c": 5, "v": 15, "s": "\u0928\u093e\u0926\u0924\u094d\u0924\u0947 \u0915\u0938\u094d\u092f\u091a\u093f\u0924\u094d\u092a\u093e\u092a\u0902 \u0928 \u091a\u0948\u0935 \u0938\u0941\u0915\u0943\u0924\u0902 \u0935\u093f\u092d\u0941\u0903\u0964\n\n\u0905\u091c\u094d\u091e\u093e\u0928\u0947\u0928\u093e\u0935\u0943\u0924\u0902 \u091c\u094d\u091e\u093e\u0928\u0902 \u0924\u0947\u0928 \u092e\u0941\u0939\u094d\u092f\u0928\u094d\u0924\u093f \u091c\u0928\u094d\u0924\u0935\u0903\u0964\u09645.15\u0964\u0964", "r": "n\u0101datte kasyachit p\u0101pa\u1e41 na chaiva suk\u1e5bita\u1e41 vibhu\u1e25\naj\u00f1\u0101nen\u0101v\u1e5bita\u1e41 j\u00f1\u0101na\u1e41 tena muhyanti jantava\u1e25", "t": "The Lord takes neither the demerit nor the merit of any; knowledge is enveloped by ignorance, and beings are deluded."}, {"c": 5, "v": 16, "s": "\u091c\u094d\u091e\u093e\u0928\u0947\u0928 \u0924\u0941 \u0924\u0926\u091c\u094d\u091e\u093e\u0928\u0902 \u092f\u0947\u0937\u093e\u0902 \u0928\u093e\u0936\u093f\u0924\u092e\u093e\u0924\u094d\u092e\u0928\u0903\u0964\n\n\u0924\u0947\u0937\u093e\u092e\u093e\u0926\u093f\u0924\u094d\u092f\u0935\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u0902 \u092a\u094d\u0930\u0915\u093e\u0936\u092f\u0924\u093f \u0924\u0924\u094d\u092a\u0930\u092e\u094d\u0964\u09645.16\u0964\u0964", "r": "j\u00f1\u0101nena tu tad aj\u00f1\u0101na\u1e41 ye\u1e63h\u0101\u1e41 n\u0101\u015bhitam \u0101tmana\u1e25\nte\u1e63h\u0101m \u0101ditya-vaj j\u00f1\u0101na\u1e41 prak\u0101\u015bhayati tat param", "t": "But to those whose ignorance is destroyed by knowledge of the Self, like the sun, knowledge reveals the Supreme Brahman."}, {"c": 5, "v": 17, "s": "\u0924\u0926\u094d\u092c\u0941\u0926\u094d\u0927\u092f\u0938\u094d\u0924\u0926\u093e\u0924\u094d\u092e\u093e\u0928\u0938\u094d\u0924\u0928\u094d\u0928\u093f\u0937\u094d\u0920\u093e\u0938\u094d\u0924\u0924\u094d\u092a\u0930\u093e\u092f\u0923\u093e\u0903\u0964\n\n\u0917\u091a\u094d\u091b\u0928\u094d\u0924\u094d\u092f\u092a\u0941\u0928\u0930\u093e\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091c\u094d\u091e\u093e\u0928\u0928\u093f\u0930\u094d\u0927\u0942\u0924\u0915\u0932\u094d\u092e\u0937\u093e\u0903\u0964\u09645.17\u0964\u0964", "r": "tad-buddhayas tad-\u0101tm\u0101nas tan-ni\u1e63h\u1e6dh\u0101s tat-par\u0101ya\u1e47\u0101\u1e25\ngachchhantyapunar-\u0101v\u1e5bitti\u1e41 j\u00f1\u0101na-nirdh\u016bta-kalma\u1e63h\u0101\u1e25", "t": "Their intellect absorbed in That, their self being That, established in That, with That as their supreme goal, they go whence there is no return, their sins dispelled by knowledge."}, {"c": 5, "v": 18, "s": "\u0935\u093f\u0926\u094d\u092f\u093e\u0935\u093f\u0928\u092f\u0938\u0902\u092a\u0928\u094d\u0928\u0947 \u092c\u094d\u0930\u093e\u0939\u094d\u092e\u0923\u0947 \u0917\u0935\u093f \u0939\u0938\u094d\u0924\u093f\u0928\u093f\u0964\n\n\u0936\u0941\u0928\u093f \u091a\u0948\u0935 \u0936\u094d\u0935\u092a\u093e\u0915\u0947 \u091a \u092a\u0923\u094d\u0921\u093f\u0924\u093e\u0903 \u0938\u092e\u0926\u0930\u094d\u0936\u093f\u0928\u0903\u0964\u09645.18\u0964\u0964", "r": "vidy\u0101-vinaya-sampanne br\u0101hma\u1e47e gavi hastini\n\u015bhuni chaiva \u015bhva-p\u0101ke cha pa\u1e47\u1e0dit\u0101\u1e25 sama-dar\u015bhina\u1e25", "t": "Sages look with an equal eye on a Brahmana endowed with learning and humility, on a cow, an elephant, a dog, and even an outcaste."}, {"c": 5, "v": 19, "s": "\u0907\u0939\u0948\u0935 \u0924\u0948\u0930\u094d\u091c\u093f\u0924\u0903 \u0938\u0930\u094d\u0917\u094b \u092f\u0947\u0937\u093e\u0902 \u0938\u093e\u092e\u094d\u092f\u0947 \u0938\u094d\u0925\u093f\u0924\u0902 \u092e\u0928\u0903\u0964\n\n\u0928\u093f\u0930\u094d\u0926\u094b\u0937\u0902 \u0939\u093f \u0938\u092e\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0924\u0938\u094d\u092e\u093e\u0926\u094d\u092c\u094d\u0930\u0939\u094d\u092e\u0923\u093f \u0924\u0947 \u0938\u094d\u0925\u093f\u0924\u093e\u0903\u0964\u09645.19\u0964\u0964", "r": "ihaiva tair jita\u1e25 sargo ye\u1e63h\u0101\u1e41 s\u0101mye sthita\u1e41 mana\u1e25\nnirdo\u1e63ha\u1e41 hi sama\u1e41 brahma tasm\u0101d brahma\u1e47i te sthit\u0101\u1e25", "t": "Even here in this world, those whose minds rest in reality overcome birth; Brahman is indeed spotless and real; therefore they are established in Brahman."}, {"c": 5, "v": 20, "s": "\u0928 \u092a\u094d\u0930\u0939\u0943\u0937\u094d\u092f\u0947\u0924\u094d\u092a\u094d\u0930\u093f\u092f\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u092f \u0928\u094b\u0926\u094d\u0935\u093f\u091c\u0947\u0924\u094d\u092a\u094d\u0930\u093e\u092a\u094d\u092f \u091a\u093e\u092a\u094d\u0930\u093f\u092f\u092e\u094d\u0964\n\n\u0938\u094d\u0925\u093f\u0930\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u0938\u092e\u094d\u092e\u0942\u0922\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u0935\u093f\u0926\u094d\u092c\u094d\u0930\u0939\u094d\u092e\u0923\u093f \u0938\u094d\u0925\u093f\u0924\u0903\u0964\u09645.20\u0964\u0964", "r": "na prah\u1e5bi\u1e63hyet priya\u1e41 pr\u0101pya nodvijet pr\u0101pya ch\u0101priyam\nsthira-buddhir asamm\u016b\u1e0dho brahma-vid brahma\u1e47i sthita\u1e25", "t": "Resting in Brahman, with a steady intellect and undeluded, the knower of Brahman neither rejoices upon obtaining what is pleasant nor grieves upon obtaining what is unpleasant."}, {"c": 5, "v": 21, "s": "\u092c\u093e\u0939\u094d\u092f\u0938\u094d\u092a\u0930\u094d\u0936\u0947\u0937\u094d\u0935\u0938\u0915\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0935\u093f\u0928\u094d\u0926\u0924\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u093f \u092f\u0924\u094d\u0938\u0941\u0916\u092e\u094d\u0964\n\n\u0938 \u092c\u094d\u0930\u0939\u094d\u092e\u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0938\u0941\u0916\u092e\u0915\u094d\u0937\u092f\u092e\u0936\u094d\u0928\u0941\u0924\u0947\u0964\u09645.21\u0964\u0964", "r": "b\u0101hya-spar\u015bhe\u1e63hvasakt\u0101tm\u0101 vindaty\u0101tmani yat sukham\nsa brahma-yoga-yukt\u0101tm\u0101 sukham ak\u1e63hayam a\u015bhnute", "t": "With the self unattached to external contacts, he finds happiness in the Self; with the self engaged in the meditation of Brahman, he attains endless happiness."}, {"c": 5, "v": 22, "s": "\u092f\u0947 \u0939\u093f \u0938\u0902\u0938\u094d\u092a\u0930\u094d\u0936\u091c\u093e \u092d\u094b\u0917\u093e \u0926\u0941\u0903\u0916\u092f\u094b\u0928\u092f \u090f\u0935 \u0924\u0947\u0964\n\n\u0906\u0926\u094d\u092f\u0928\u094d\u0924\u0935\u0928\u094d\u0924\u0903 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0928 \u0924\u0947\u0937\u0941 \u0930\u092e\u0924\u0947 \u092c\u0941\u0927\u0903\u0964\u09645.22\u0964\u0964", "r": "ye hi sanspar\u015bha-j\u0101 bhog\u0101 du\u1e25kha-yonaya eva te\n\u0101dyantavanta\u1e25 kaunteya na te\u1e63hu ramate budha\u1e25", "t": "The enjoyments that arise from contact are only sources of pain, for they have a beginning and an end, O Arjuna; the wise do not rejoice in them."}, {"c": 5, "v": 23, "s": "\u0936\u0915\u094d\u0928\u094b\u0924\u0940\u0939\u0948\u0935 \u092f\u0903 \u0938\u094b\u0922\u0941\u0902 \u092a\u094d\u0930\u093e\u0915\u094d\u0936\u0930\u0940\u0930\u0935\u093f\u092e\u094b\u0915\u094d\u0937\u0923\u093e\u0924\u094d\u0964\n\n\u0915\u093e\u092e\u0915\u094d\u0930\u094b\u0927\u094b\u0926\u094d\u092d\u0935\u0902 \u0935\u0947\u0917\u0902 \u0938 \u092f\u0941\u0915\u094d\u0924\u0903 \u0938 \u0938\u0941\u0916\u0940 \u0928\u0930\u0903\u0964\u09645.23\u0964\u0964", "r": "\u015bhaknot\u012bhaiva ya\u1e25 so\u1e0dhu\u1e41 pr\u0101k \u015bhar\u012bra-vimok\u1e63ha\u1e47\u0101t\nk\u0101ma-krodhodbhava\u1e41 vega\u1e41 sa yukta\u1e25 sa sukh\u012b nara\u1e25", "t": "He who is able, while still here in this world, to withstand the impulse born out of desire and anger before the liberation from the body, he is a Yogi, and he is a happy man."}, {"c": 5, "v": 24, "s": "\u092f\u094b\u093d\u0928\u094d\u0924\u0903\u0938\u0941\u0916\u094b\u093d\u0928\u094d\u0924\u0930\u093e\u0930\u093e\u092e\u0938\u094d\u0924\u0925\u093e\u0928\u094d\u0924\u0930\u094d\u091c\u094d\u092f\u094b\u0924\u093f\u0930\u0947\u0935 \u092f\u0903\u0964\n\n\u0938 \u092f\u094b\u0917\u0940 \u092c\u094d\u0930\u0939\u094d\u092e\u0928\u093f\u0930\u094d\u0935\u093e\u0923\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u092d\u0942\u0924\u094b\u093d\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09645.24\u0964\u0964", "r": "yo 'nta\u1e25-sukho 'ntar-\u0101r\u0101mas tath\u0101ntar-jyotir eva ya\u1e25\nsa yog\u012b brahma-nirv\u0101\u1e47a\u1e41 brahma-bh\u016bto 'dhigachchhati", "t": "He who is happy within, who rejoices within, and who is illuminated within, that Yogi attains absolute freedom, or Moksha, becoming Brahman himself."}, {"c": 5, "v": 25, "s": "\u0932\u092d\u0928\u094d\u0924\u0947 \u092c\u094d\u0930\u0939\u094d\u092e\u0928\u093f\u0930\u094d\u0935\u093e\u0923\u092e\u0943\u0937\u092f\u0903 \u0915\u094d\u0937\u0940\u0923\u0915\u0932\u094d\u092e\u0937\u093e\u0903\u0964\n\n\u091b\u093f\u0928\u094d\u0928\u0926\u094d\u0935\u0948\u0927\u093e \u092f\u0924\u093e\u0924\u094d\u092e\u093e\u0928\u0903 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0939\u093f\u0924\u0947 \u0930\u0924\u093e\u0903\u0964\u09645.25\u0964\u0964", "r": "labhante brahma-nirv\u0101\u1e47am \u1e5bi\u1e63haya\u1e25 k\u1e63h\u012b\u1e47a-kalma\u1e63h\u0101\u1e25\nchhinna-dvaidh\u0101 yat\u0101tm\u0101na\u1e25 sarva-bh\u016bta-hite rat\u0101\u1e25", "t": "The sages obtain absolute freedom or Moksha when their sins have been destroyed, their dualities have been torn asunder, they are self-controlled, and they are intent on the welfare of all beings."}, {"c": 5, "v": 26, "s": "\u0915\u093e\u092e\u0915\u094d\u0930\u094b\u0927\u0935\u093f\u092f\u0941\u0915\u094d\u0924\u093e\u0928\u093e\u0902 \u092f\u0924\u0940\u0928\u093e\u0902 \u092f\u0924\u091a\u0947\u0924\u0938\u093e\u092e\u094d\u0964\n\n\u0905\u092d\u093f\u0924\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u0928\u093f\u0930\u094d\u0935\u093e\u0923\u0902 \u0935\u0930\u094d\u0924\u0924\u0947 \u0935\u093f\u0926\u093f\u0924\u093e\u0924\u094d\u092e\u0928\u093e\u092e\u094d\u0964\u09645.26\u0964\u0964", "r": "k\u0101ma-krodha-viyukt\u0101n\u0101\u1e41 yat\u012bn\u0101\u1e41 yata-chetas\u0101m\nabhito brahma-nirv\u0101\u1e47a\u1e41 vartate vidit\u0101tman\u0101m", "t": "Absolute freedom exists on all sides for those self-controlled ascetics who are free from desire and anger, who have controlled their thoughts, and who have realized the Self."}, {"c": 5, "v": 27, "s": "\u0938\u094d\u092a\u0930\u094d\u0936\u093e\u0928\u094d\u0915\u0943\u0924\u094d\u0935\u093e \u092c\u0939\u093f\u0930\u094d\u092c\u093e\u0939\u094d\u092f\u093e\u0902\u0936\u094d\u091a\u0915\u094d\u0937\u0941\u0936\u094d\u091a\u0948\u0935\u093e\u0928\u094d\u0924\u0930\u0947 \u092d\u094d\u0930\u0941\u0935\u094b\u0903\u0964\n\n\u092a\u094d\u0930\u093e\u0923\u093e\u092a\u093e\u0928\u094c \u0938\u092e\u094c \u0915\u0943\u0924\u094d\u0935\u093e \u0928\u093e\u0938\u093e\u092d\u094d\u092f\u0928\u094d\u0924\u0930\u091a\u093e\u0930\u093f\u0923\u094c\u0964\u09645.27\u0964\u0964", "r": "spar\u015bh\u0101n k\u1e5bitv\u0101 bahir b\u0101hy\u0101n\u015bh chak\u1e63hu\u015bh chaiv\u0101ntare bhruvo\u1e25\npr\u0101\u1e47\u0101p\u0101nau samau k\u1e5bitv\u0101 n\u0101s\u0101bhyantara-ch\u0101ri\u1e47au\n yatendriya-mano-buddhir munir mok\u1e63ha-par\u0101ya\u1e47a\u1e25\nvigatechchh\u0101-bhaya-krodho ya\u1e25 sad\u0101 mukta eva sa\u1e25", "t": "Shutting out all external contacts and fixing the gaze between the eyebrows, realizing the outgoing and incoming breaths moving within the nostrils."}, {"c": 5, "v": 28, "s": "\u092f\u0924\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u092e\u0928\u094b\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092e\u0941\u0928\u093f\u0930\u094d\u092e\u094b\u0915\u094d\u0937\u092a\u0930\u093e\u092f\u0923\u0903\u0964\n\n\u0935\u093f\u0917\u0924\u0947\u091a\u094d\u091b\u093e\u092d\u092f\u0915\u094d\u0930\u094b\u0927\u094b \u092f\u0903 \u0938\u0926\u093e \u092e\u0941\u0915\u094d\u0924 \u090f\u0935 \u0938\u0903\u0964\u09645.28\u0964\u0964", "r": "yatendriya-mano-buddhir munir mok\u1e63a-par\u0101ya\u1e47a\u1e25 vigatecch\u0101-bhaya-krodho ya\u1e25 sad\u0101 mukta eva sa\u1e25", "t": "With the senses, mind, and intellect ever controlled, having liberation as their supreme goal, free from desire, fear, and anger, the sage is truly liberated forever."}, {"c": 5, "v": 29, "s": "\u092d\u094b\u0915\u094d\u0924\u093e\u0930\u0902 \u092f\u091c\u094d\u091e\u0924\u092a\u0938\u093e\u0902 \u0938\u0930\u094d\u0935\u0932\u094b\u0915\u092e\u0939\u0947\u0936\u094d\u0935\u0930\u092e\u094d\u0964\n\n\u0938\u0941\u0939\u0943\u0926\u0902 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u092e\u093e\u0902 \u0936\u093e\u0928\u094d\u0924\u093f\u092e\u0943\u091a\u094d\u091b\u0924\u093f\u0964\u09645.29\u0964\u0964", "r": "bhokt\u0101ra\u1e41 yaj\u00f1a-tapas\u0101\u1e41 sarva-loka-mahe\u015bhvaram\nsuh\u1e5bida\u1e41 sarva-bh\u016bt\u0101n\u0101\u1e41 j\u00f1\u0101tv\u0101 m\u0101\u1e41 \u015bh\u0101ntim \u1e5bichchhati", "t": "He who knows Me as the enjoyer of sacrifices and austerities, the great Lord of all the worlds, and the friend of all beings, attains peace."}, {"c": 6, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0905\u0928\u093e\u0936\u094d\u0930\u093f\u0924\u0903 \u0915\u0930\u094d\u092e\u092b\u0932\u0902 \u0915\u093e\u0930\u094d\u092f\u0902 \u0915\u0930\u094d\u092e \u0915\u0930\u094b\u0924\u093f \u092f\u0903\u0964\n\n\u0938 \u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0940 \u091a \u092f\u094b\u0917\u0940 \u091a \u0928 \u0928\u093f\u0930\u0917\u094d\u0928\u093f\u0930\u094d\u0928 \u091a\u093e\u0915\u094d\u0930\u093f\u092f\u0903\u0964\u09646.1\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nan\u0101\u015bhrita\u1e25 karma-phala\u1e41 k\u0101rya\u1e41 karma karoti ya\u1e25\nsa sanny\u0101s\u012b cha yog\u012b cha na niragnir na ch\u0101kriya\u1e25", "t": "The Blessed Lord said: He who performs his bounden duty without depending on the fruits of his actions\u2014he is a sannyasi and a yogi, not he who is without fire and without action."}, {"c": 6, "v": 2, "s": "\u092f\u0902 \u0938\u0902\u0928\u094d\u092f\u093e\u0938\u092e\u093f\u0924\u093f \u092a\u094d\u0930\u093e\u0939\u0941\u0930\u094d\u092f\u094b\u0917\u0902 \u0924\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092a\u093e\u0923\u094d\u0921\u0935\u0964\n\n\u0928 \u0939\u094d\u092f\u0938\u0902\u0928\u094d\u092f\u0938\u094d\u0924\u0938\u0919\u094d\u0915\u0932\u094d\u092a\u094b \u092f\u094b\u0917\u0940 \u092d\u0935\u0924\u093f \u0915\u0936\u094d\u091a\u0928\u0964\u09646.2\u0964\u0964", "r": "ya\u1e41 sanny\u0101sam iti pr\u0101hur yoga\u1e41 ta\u1e41 viddhi p\u0101\u1e47\u1e0dava\nna hyasannyasta-sa\u1e45kalpo yog\u012b bhavati ka\u015bhchana", "t": "Do you, O Arjuna, know that Yoga is what they call renunciation; no one indeed becomes a Yogi who has not renounced their thoughts."}, {"c": 6, "v": 3, "s": "\u0906\u0930\u0941\u0930\u0941\u0915\u094d\u0937\u094b\u0930\u094d\u092e\u0941\u0928\u0947\u0930\u094d\u092f\u094b\u0917\u0902 \u0915\u0930\u094d\u092e \u0915\u093e\u0930\u0923\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\n\n\u092f\u094b\u0917\u093e\u0930\u0942\u0922\u0938\u094d\u092f \u0924\u0938\u094d\u092f\u0948\u0935 \u0936\u092e\u0903 \u0915\u093e\u0930\u0923\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u09646.3\u0964\u0964", "r": "\u0101ruruk\u1e63hor muner yoga\u1e41 karma k\u0101ra\u1e47am uchyate\nyog\u0101r\u016b\u1e0dhasya tasyaiva \u015bhama\u1e25 k\u0101ra\u1e47am uchyate", "t": "For a sage who wishes to attain to Yoga, action is said to be the means; for the same sage who has attained Yoga, inaction is said to be the means."}, {"c": 6, "v": 4, "s": "\u092f\u0926\u093e \u0939\u093f \u0928\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u094d\u0925\u0947\u0937\u0941 \u0928 \u0915\u0930\u094d\u092e\u0938\u094d\u0935\u0928\u0941\u0937\u091c\u094d\u091c\u0924\u0947\u0964\n\n\u0938\u0930\u094d\u0935\u0938\u0919\u094d\u0915\u0932\u094d\u092a\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0940 \u092f\u094b\u0917\u093e\u0930\u0942\u0922\u0938\u094d\u0924\u0926\u094b\u091a\u094d\u092f\u0924\u0947\u0964\u09646.4\u0964\u0964", "r": "yad\u0101 hi nendriy\u0101rthe\u1e63hu na karmasv-anu\u1e63hajjate\nsarva-sa\u1e45kalpa-sanny\u0101s\u012b yog\u0101r\u016b\u1e0dhas tadochyate", "t": "When a person is not attached to the sense-objects or to actions, having renounced all thoughts, then they are said to have attained Yoga."}, {"c": 6, "v": 5, "s": "\u0909\u0926\u094d\u0927\u0930\u0947\u0926\u093e\u0924\u094d\u092e\u0928\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u0928\u093e\u0924\u094d\u092e\u093e\u0928\u092e\u0935\u0938\u093e\u0926\u092f\u0947\u0924\u094d\u0964\n\n\u0906\u0924\u094d\u092e\u0948\u0935 \u0939\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u094b \u092c\u0928\u094d\u0927\u0941\u0930\u093e\u0924\u094d\u092e\u0948\u0935 \u0930\u093f\u092a\u0941\u0930\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u09646.5\u0964\u0964", "r": "uddhared \u0101tman\u0101tm\u0101na\u1e41 n\u0101tm\u0101nam avas\u0101dayet\n\u0101tmaiva hy\u0101tmano bandhur \u0101tmaiva ripur \u0101tmana\u1e25", "t": "One should raise oneself by one's own self alone; let not one lower oneself; for the self alone is one's own friend, and the self alone is one's own enemy."}, {"c": 6, "v": 6, "s": "\u092c\u0928\u094d\u0927\u0941\u0930\u093e\u0924\u094d\u092e\u093e\u093d\u093d\u0924\u094d\u092e\u0928\u0938\u094d\u0924\u0938\u094d\u092f \u092f\u0947\u0928\u093e\u0924\u094d\u092e\u0948\u0935\u093e\u0924\u094d\u092e\u0928\u093e \u091c\u093f\u0924\u0903\u0964\n\n\u0905\u0928\u093e\u0924\u094d\u092e\u0928\u0938\u094d\u0924\u0941 \u0936\u0924\u094d\u0930\u0941\u0924\u094d\u0935\u0947 \u0935\u0930\u094d\u0924\u0947\u0924\u093e\u0924\u094d\u092e\u0948\u0935 \u0936\u0924\u094d\u0930\u0941\u0935\u0924\u094d\u0964\u09646.6\u0964\u0964", "r": "bandhur \u0101tm\u0101tmanas tasya yen\u0101tmaiv\u0101tman\u0101 jita\u1e25\nan\u0101tmanas tu \u015bhatrutve vartet\u0101tmaiva \u015bhatru-vat", "t": "The Self is the friend of the self of him by whom the Self has been conquered; but to the unconquered self, this Self stands in the position of an enemy, like an external foe."}, {"c": 6, "v": 7, "s": "\u091c\u093f\u0924\u093e\u0924\u094d\u092e\u0928\u0903 \u092a\u094d\u0930\u0936\u093e\u0928\u094d\u0924\u0938\u094d\u092f \u092a\u0930\u092e\u093e\u0924\u094d\u092e\u093e \u0938\u092e\u093e\u0939\u093f\u0924\u0903\u0964\n\n\u0936\u0940\u0924\u094b\u0937\u094d\u0923\u0938\u0941\u0916\u0926\u0941\u0903\u0916\u0947\u0937\u0941 \u0924\u0925\u093e \u092e\u093e\u0928\u093e\u092a\u092e\u093e\u0928\u092f\u094b\u0903\u0964\u09646.7\u0964\u0964", "r": "jit\u0101tmana\u1e25 pra\u015bh\u0101ntasya param\u0101tm\u0101 sam\u0101hita\u1e25\n\u015bh\u012bto\u1e63h\u1e47a-sukha-du\u1e25khe\u1e63hu tath\u0101 m\u0101n\u0101pam\u0101nayo\u1e25", "t": "The Supreme Self of him who is self-controlled and peaceful remains balanced in cold and heat, pleasure and pain, as well as in honor and dishonor."}, {"c": 6, "v": 8, "s": "\u091c\u094d\u091e\u093e\u0928\u0935\u093f\u091c\u094d\u091e\u093e\u0928\u0924\u0943\u092a\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0915\u0942\u091f\u0938\u094d\u0925\u094b \u0935\u093f\u091c\u093f\u0924\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0903\u0964\n\n\u092f\u0941\u0915\u094d\u0924 \u0907\u0924\u094d\u092f\u0941\u091a\u094d\u092f\u0924\u0947 \u092f\u094b\u0917\u0940 \u0938\u092e\u0932\u094b\u0937\u094d\u091f\u093e\u0936\u094d\u092e\u0915\u093e\u091e\u094d\u091a\u0928\u0903\u0964\u09646.8\u0964\u0964", "r": "j\u00f1\u0101na-vij\u00f1\u0101na-t\u1e5bipt\u0101tm\u0101 k\u016b\u1e6da-stho vijitendriya\u1e25\nyukta ityuchyate yog\u012b sama-lo\u1e63h\u1e6d\u0101\u015bhma-k\u0101\u00f1chana\u1e25", "t": "The Yogi who is satisfied with the knowledge and wisdom of the Self, who has conquered the senses, and to whom a clod of earth, a piece of stone, and gold are all the same, is said to have attained Nirvikalpa Samadhi."}, {"c": 6, "v": 9, "s": "\u0938\u0941\u0939\u0943\u0928\u094d\u092e\u093f\u0924\u094d\u0930\u093e\u0930\u094d\u092f\u0941\u0926\u093e\u0938\u0940\u0928\u092e\u0927\u094d\u092f\u0938\u094d\u0925\u0926\u094d\u0935\u0947\u0937\u094d\u092f\u092c\u0928\u094d\u0927\u0941\u0937\u0941\u0964\n\n\u0938\u093e\u0927\u0941\u0937\u094d\u0935\u092a\u093f \u091a \u092a\u093e\u092a\u0947\u0937\u0941 \u0938\u092e\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u0935\u093f\u0936\u093f\u0937\u094d\u092f\u0924\u0947\u0964\u09646.9\u0964\u0964", "r": "suh\u1e5bin-mitr\u0101ryud\u0101s\u012bna-madhyastha-dve\u1e63hya-bandhu\u1e63hu\ns\u0101dhu\u1e63hvapi cha p\u0101pe\u1e63hu sama-buddhir vi\u015bhi\u1e63hyate", "t": "He who is of the same mind towards the good-hearted, friends, enemies, the indifferent, the neutral, the hateful, the relatives, the righteous, and the unrighteous, excels."}, {"c": 6, "v": 10, "s": "\u092f\u094b\u0917\u0940 \u092f\u0941\u091e\u094d\u091c\u0940\u0924 \u0938\u0924\u0924\u092e\u093e\u0924\u094d\u092e\u093e\u0928\u0902 \u0930\u0939\u0938\u093f \u0938\u094d\u0925\u093f\u0924\u0903\u0964\n\n\u090f\u0915\u093e\u0915\u0940 \u092f\u0924\u091a\u093f\u0924\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0928\u093f\u0930\u093e\u0936\u0940\u0930\u092a\u0930\u093f\u0917\u094d\u0930\u0939\u0903\u0964\u09646.10\u0964\u0964", "r": "yog\u012b yu\u00f1j\u012bta satatam \u0101tm\u0101na\u1e41 rahasi sthita\u1e25\nek\u0101k\u012b yata-chitt\u0101tm\u0101 nir\u0101\u015bh\u012br aparigraha\u1e25", "t": "Let the yogi constantly strive to keep the mind steady, remaining in solitude, alone, with the body and mind controlled, and free from hope and greed."}, {"c": 6, "v": 11, "s": "\u0936\u0941\u091a\u094c \u0926\u0947\u0936\u0947 \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093e\u092a\u094d\u092f \u0938\u094d\u0925\u093f\u0930\u092e\u093e\u0938\u0928\u092e\u093e\u0924\u094d\u092e\u0928\u0903\u0964\n\n\u0928\u093e\u0924\u094d\u092f\u0941\u091a\u094d\u091b\u094d\u0930\u093f\u0924\u0902 \u0928\u093e\u0924\u093f\u0928\u0940\u091a\u0902 \u091a\u0948\u0932\u093e\u091c\u093f\u0928\u0915\u0941\u0936\u094b\u0924\u094d\u0924\u0930\u092e\u094d\u0964\u09646.11\u0964\u0964", "r": "\u015bhuchau de\u015bhe prati\u1e63h\u1e6dh\u0101pya sthiram \u0101sanam \u0101tmana\u1e25\nn\u0101tyuchchhrita\u1e41 n\u0101ti-n\u012bcha\u1e41 chail\u0101jina-ku\u015bhottaram", "t": "In a clean spot, having established a firm seat of his own, neither too high nor too low, made of cloth, skin, and kusha grass layered one over the other."}, {"c": 6, "v": 12, "s": "\u0924\u0924\u094d\u0930\u0948\u0915\u093e\u0917\u094d\u0930\u0902 \u092e\u0928\u0903 \u0915\u0943\u0924\u094d\u0935\u093e \u092f\u0924\u091a\u093f\u0924\u094d\u0924\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0915\u094d\u0930\u093f\u092f\u0903\u0964\n\n\u0909\u092a\u0935\u093f\u0936\u094d\u092f\u093e\u0938\u0928\u0947 \u092f\u0941\u091e\u094d\u091c\u094d\u092f\u093e\u0926\u094d\u092f\u094b\u0917\u092e\u093e\u0924\u094d\u092e\u0935\u093f\u0936\u0941\u0926\u094d\u0927\u092f\u0947\u0964\u09646.12\u0964\u0964", "r": "tatraik\u0101gra\u1e41 mana\u1e25 k\u1e5bitv\u0101 yata-chittendriya-kriya\u1e25\nupavi\u015bhy\u0101sane yu\u00f1jy\u0101d yogam \u0101tma-vi\u015bhuddhaye", "t": "There, having made the mind one-pointed, with the actions of the mind and senses controlled, let him, seated on the seat, practice Yoga for the purification of the self."}, {"c": 6, "v": 13, "s": "\u0938\u092e\u0902 \u0915\u093e\u092f\u0936\u093f\u0930\u094b\u0917\u094d\u0930\u0940\u0935\u0902 \u0927\u093e\u0930\u092f\u0928\u094d\u0928\u091a\u0932\u0902 \u0938\u094d\u0925\u093f\u0930\u0903\u0964\n\n\u0938\u0902\u092a\u094d\u0930\u0947\u0915\u094d\u0937\u094d\u092f \u0928\u093e\u0938\u093f\u0915\u093e\u0917\u094d\u0930\u0902 \u0938\u094d\u0935\u0902 \u0926\u093f\u0936\u0936\u094d\u091a\u093e\u0928\u0935\u0932\u094b\u0915\u092f\u0928\u094d\u0964\u09646.13\u0964\u0964", "r": "sama\u1e41 k\u0101ya-\u015bhiro-gr\u012bva\u1e41 dh\u0101rayann achala\u1e41 sthira\u1e25\nsamprek\u1e63hya n\u0101sik\u0101gra\u1e41 sva\u1e41 di\u015bha\u015bh ch\u0101navalokayan", "t": "Let him firmly hold his body, head, and neck erect and still, gazing at the tip of his nose without looking around."}, {"c": 6, "v": 14, "s": "\u092a\u094d\u0930\u0936\u093e\u0928\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0935\u093f\u0917\u0924\u092d\u0940\u0930\u094d\u092c\u094d\u0930\u0939\u094d\u092e\u091a\u093e\u0930\u093f\u0935\u094d\u0930\u0924\u0947 \u0938\u094d\u0925\u093f\u0924\u0903\u0964\n\n\u092e\u0928\u0903 \u0938\u0902\u092f\u092e\u094d\u092f \u092e\u091a\u094d\u091a\u093f\u0924\u094d\u0924\u094b \u092f\u0941\u0915\u094d\u0924 \u0906\u0938\u0940\u0924 \u092e\u0924\u094d\u092a\u0930\u0903\u0964\u09646.14\u0964\u0964", "r": "pra\u015bh\u0101nt\u0101tm\u0101 vigata-bh\u012br brahmach\u0101ri-vrate sthita\u1e25\nmana\u1e25 sanyamya mach-chitto yukta \u0101s\u012bta mat-para\u1e25", "t": "Serene-minded, fearless, firm in the vow of a Brahmachari, having controlled their mind, thinking of Me and balanced in mind, let them sit, having Me as their supreme goal."}, {"c": 6, "v": 15, "s": "\u092f\u0941\u091e\u094d\u091c\u0928\u094d\u0928\u0947\u0935\u0902 \u0938\u0926\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u092f\u094b\u0917\u0940 \u0928\u093f\u092f\u0924\u092e\u093e\u0928\u0938\u0903\u0964\n\n\u0936\u093e\u0928\u094d\u0924\u093f\u0902 \u0928\u093f\u0930\u094d\u0935\u093e\u0923\u092a\u0930\u092e\u093e\u0902 \u092e\u0924\u094d\u0938\u0902\u0938\u094d\u0925\u093e\u092e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09646.15\u0964\u0964", "r": "yu\u00f1jann eva\u1e41 sad\u0101tm\u0101na\u1e41 yog\u012b niyata-m\u0101nasa\u1e25\n\u015bhanti\u1e41 nirv\u0101\u1e47a-param\u0101\u1e41 mat-sansth\u0101m adhigachchhati", "t": "Thus, always keeping the mind balanced, the yogi, with the mind controlled, attains the peace abiding in Me, culminating in liberation."}, {"c": 6, "v": 16, "s": "\u0928\u093e\u0924\u094d\u092f\u0936\u094d\u0928\u0924\u0938\u094d\u0924\u0941 \u092f\u094b\u0917\u094b\u093d\u0938\u094d\u0924\u093f \u0928 \u091a\u0948\u0915\u093e\u0928\u094d\u0924\u092e\u0928\u0936\u094d\u0928\u0924\u0903\u0964\n\n\u0928 \u091a\u093e\u0924\u093f\u0938\u094d\u0935\u092a\u094d\u0928\u0936\u0940\u0932\u0938\u094d\u092f \u091c\u093e\u0917\u094d\u0930\u0924\u094b \u0928\u0948\u0935 \u091a\u093e\u0930\u094d\u091c\u0941\u0928\u0964\u09646.16\u0964\u0964", "r": "n\u0101tya\u015bhnatastu yogo \u2019sti na chaik\u0101ntam ana\u015bhnata\u1e25\nna ch\u0101ti-svapna-\u015bh\u012blasya j\u0101grato naiva ch\u0101rjuna", "t": "Verily, Yoga is not possible for him who eats too much, nor for him who does not eat at all, nor for him who sleeps too much, nor for him who is always awake, O Arjuna."}, {"c": 6, "v": 17, "s": "\u092f\u0941\u0915\u094d\u0924\u093e\u0939\u093e\u0930\u0935\u093f\u0939\u093e\u0930\u0938\u094d\u092f \u092f\u0941\u0915\u094d\u0924\u091a\u0947\u0937\u094d\u091f\u0938\u094d\u092f \u0915\u0930\u094d\u092e\u0938\u0941\u0964\n\n\u092f\u0941\u0915\u094d\u0924\u0938\u094d\u0935\u092a\u094d\u0928\u093e\u0935\u092c\u094b\u0927\u0938\u094d\u092f \u092f\u094b\u0917\u094b \u092d\u0935\u0924\u093f \u0926\u0941\u0903\u0916\u0939\u093e\u0964\u09646.17\u0964\u0964", "r": "yukt\u0101h\u0101ra-vih\u0101rasya yukta-che\u1e63h\u1e6dasya karmasu\nyukta-svapn\u0101vabodhasya yogo bhavati du\u1e25kha-h\u0101", "t": "Yoga becomes the destroyer of pain for him who is moderate in eating and recreation (such as walking, etc.), who exercises moderation in action, and who is moderate in sleep and wakefulness."}, {"c": 6, "v": 18, "s": "\u092f\u0926\u093e \u0935\u093f\u0928\u093f\u092f\u0924\u0902 \u091a\u093f\u0924\u094d\u0924\u092e\u093e\u0924\u094d\u092e\u0928\u094d\u092f\u0947\u0935\u093e\u0935\u0924\u093f\u0937\u094d\u0920\u0924\u0947\u0964\n\n\u0928\u093f\u0903\u0938\u094d\u092a\u0943\u0939\u0903 \u0938\u0930\u094d\u0935\u0915\u093e\u092e\u0947\u092d\u094d\u092f\u094b \u092f\u0941\u0915\u094d\u0924 \u0907\u0924\u094d\u092f\u0941\u091a\u094d\u092f\u0924\u0947 \u0924\u0926\u093e\u0964\u09646.18\u0964\u0964", "r": "yad\u0101 viniyata\u1e41 chittam \u0101tmanyev\u0101vati\u1e63h\u1e6dhate\nni\u1e25sp\u1e5biha\u1e25 sarva-k\u0101mebhyo yukta ityuchyate tad\u0101", "t": "When the perfectly controlled mind rests in the Self alone, free from longing for any of the objects of desire, then it is said, 'He is united'."}, {"c": 6, "v": 19, "s": "\u092f\u0925\u093e \u0926\u0940\u092a\u094b \u0928\u093f\u0935\u093e\u0924\u0938\u094d\u0925\u094b \u0928\u0947\u0919\u094d\u0917\u0924\u0947 \u0938\u094b\u092a\u092e\u093e \u0938\u094d\u092e\u0943\u0924\u093e\u0964\n\n\u092f\u094b\u0917\u093f\u0928\u094b \u092f\u0924\u091a\u093f\u0924\u094d\u0924\u0938\u094d\u092f \u092f\u0941\u091e\u094d\u091c\u0924\u094b \u092f\u094b\u0917\u092e\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u09646.19\u0964\u0964", "r": "yath\u0101 d\u012bpo niv\u0101ta-stho ne\u1e45gate sopam\u0101 sm\u1e5bit\u0101\nyogino yata-chittasya yu\u00f1jato yogam \u0101tmana\u1e25", "t": "As a lamp placed in a windless spot does not flicker, so is the Yogi of a controlled mind, who practices Yoga in the Self, compared."}, {"c": 6, "v": 20, "s": "\u092f\u0924\u094d\u0930\u094b\u092a\u0930\u092e\u0924\u0947 \u091a\u093f\u0924\u094d\u0924\u0902 \u0928\u093f\u0930\u0941\u0926\u094d\u0927\u0902 \u092f\u094b\u0917\u0938\u0947\u0935\u092f\u093e\u0964\n\n\u092f\u0924\u094d\u0930 \u091a\u0948\u0935\u093e\u0924\u094d\u092e\u0928\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u092a\u0936\u094d\u092f\u0928\u094d\u0928\u093e\u0924\u094d\u092e\u0928\u093f \u0924\u0941\u0937\u094d\u092f\u0924\u093f\u0964\u09646.20\u0964\u0964", "r": "yatroparamate chitta\u1e41 niruddha\u1e41 yoga-sevay\u0101\nyatra chaiv\u0101tman\u0101tm\u0101na\u1e41 pa\u015bhyann \u0101tmani tu\u1e63hyati", "t": "When the mind, restrained by the practice of yoga, attains quietude, and when one sees the Self by the Self, they are satisfied in their own Self."}, {"c": 6, "v": 21, "s": "\u0938\u0941\u0916\u092e\u093e\u0924\u094d\u092f\u0928\u094d\u0924\u093f\u0915\u0902 \u092f\u0924\u094d\u0924\u0926\u094d\u092c\u0941\u0926\u094d\u0927\u093f\u0917\u094d\u0930\u093e\u0939\u094d\u092f\u092e\u0924\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u092e\u094d\u0964\n\n\u0935\u0947\u0924\u094d\u0924\u093f \u092f\u0924\u094d\u0930 \u0928 \u091a\u0948\u0935\u093e\u092f\u0902 \u0938\u094d\u0925\u093f\u0924\u0936\u094d\u091a\u0932\u0924\u093f \u0924\u0924\u094d\u0924\u094d\u0935\u0924\u0903\u0964\u09646.21\u0964\u0964", "r": "sukham \u0101tyantika\u1e41 yat tad buddhi-gr\u0101hyam at\u012bndriyam\nvetti yatra na chaiv\u0101ya\u1e41 sthita\u015bh chalati tattvata\u1e25", "t": "When he (the Yogi) feels that infinite bliss which can be grasped by the pure intellect and which transcends the senses, and is established therein, never moving away from the reality."}, {"c": 6, "v": 22, "s": "\u092f\u0902 \u0932\u092c\u094d\u0927\u094d\u0935\u093e \u091a\u093e\u092a\u0930\u0902 \u0932\u093e\u092d\u0902 \u092e\u0928\u094d\u092f\u0924\u0947 \u0928\u093e\u0927\u093f\u0915\u0902 \u0924\u0924\u0903\u0964\n\n\u092f\u0938\u094d\u092e\u093f\u0928\u094d\u0938\u094d\u0925\u093f\u0924\u094b \u0928 \u0926\u0941\u0903\u0916\u0947\u0928 \u0917\u0941\u0930\u0941\u0923\u093e\u092a\u093f \u0935\u093f\u091a\u093e\u0932\u094d\u092f\u0924\u0947\u0964\u09646.22\u0964\u0964", "r": "ya\u1e41 labdhv\u0101 ch\u0101para\u1e41 l\u0101bha\u1e41 manyate n\u0101dhika\u1e41 tata\u1e25\nyasmin sthito na du\u1e25khena guru\u1e47\u0101pi vich\u0101lyate", "t": "Having obtained it, he thinks there is no other gain superior to it; established in it, he is not moved even by heavy sorrow."}, {"c": 6, "v": 23, "s": "\u0924\u0902 \u0935\u093f\u0926\u094d\u092f\u093e\u0926\u094d \u0926\u0941\u0903\u0916\u0938\u0902\u092f\u094b\u0917\u0935\u093f\u092f\u094b\u0917\u0902 \u092f\u094b\u0917\u0938\u0902\u091c\u094d\u091e\u093f\u0924\u092e\u094d\u0964\n\n\u0938 \u0928\u093f\u0936\u094d\u091a\u092f\u0947\u0928 \u092f\u094b\u0915\u094d\u0924\u0935\u094d\u092f\u094b \u092f\u094b\u0917\u094b\u093d\u0928\u093f\u0930\u094d\u0935\u093f\u0923\u094d\u0923\u091a\u0947\u0924\u0938\u093e\u0964\u09646.23\u0964\u0964", "r": "ta\u1e41 vidy\u0101d du\u1e25kha-sanyoga-viyoga\u1e41 yogasa\u1e45j\u00f1itam\nsa ni\u015bhchayena yoktavyo yogo \u2019nirvi\u1e47\u1e47a-chetas\u0101", "t": "Let this be known by the name of Yoga, the severance from union with pain. This Yoga should be practiced with determination and with an undespairing mind."}, {"c": 6, "v": 24, "s": "\u0938\u0919\u094d\u0915\u0932\u094d\u092a\u092a\u094d\u0930\u092d\u0935\u093e\u0928\u094d\u0915\u093e\u092e\u093e\u0902\u0938\u094d\u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0938\u0930\u094d\u0935\u093e\u0928\u0936\u0947\u0937\u0924\u0903\u0964\n\n\u092e\u0928\u0938\u0948\u0935\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0917\u094d\u0930\u093e\u092e\u0902 \u0935\u093f\u0928\u093f\u092f\u092e\u094d\u092f \u0938\u092e\u0928\u094d\u0924\u0924\u0903\u0964\u09646.24\u0964\u0964", "r": "sa\u1e45kalpa-prabhav\u0101n k\u0101m\u0101ns tyaktv\u0101 sarv\u0101n a\u015bhe\u1e63hata\u1e25\nmanasaivendriya-gr\u0101ma\u1e41 viniyamya samantata\u1e25", "t": "Abandoning unreservedly all desires born of Sankalpa (thought and imagination) and completely restraining the whole group of senses by the mind from all sides."}, {"c": 6, "v": 25, "s": "\u0936\u0928\u0948\u0903 \u0936\u0928\u0948\u0930\u0941\u092a\u0930\u092e\u0947\u0926\u094d \u092c\u0941\u0926\u094d\u0927\u094d\u092f\u093e \u0927\u0943\u0924\u093f\u0917\u0943\u0939\u0940\u0924\u092f\u093e\u0964\n\n\u0906\u0924\u094d\u092e\u0938\u0902\u0938\u094d\u0925\u0902 \u092e\u0928\u0903 \u0915\u0943\u0924\u094d\u0935\u093e \u0928 \u0915\u093f\u091e\u094d\u091a\u093f\u0926\u092a\u093f \u091a\u093f\u0928\u094d\u0924\u092f\u0947\u0924\u094d\u0964\u09646.25\u0964\u0964", "r": "\u015bhanai\u1e25 \u015bhanair uparamed buddhy\u0101 dh\u1e5biti-g\u1e5bih\u012btay\u0101\n\u0101tma-sanstha\u1e41 mana\u1e25 k\u1e5bitv\u0101 na ki\u00f1chid api chintayet", "t": "Little by little, let him attain steadiness of the intellect by holding it firmly; having made the mind establish itself in the Self, let him not think of anything else."}, {"c": 6, "v": 26, "s": "\u092f\u0924\u094b \u092f\u0924\u094b \u0928\u093f\u0936\u094d\u091a\u0930\u0924\u093f \u092e\u0928\u0936\u094d\u091a\u091e\u094d\u091a\u0932\u092e\u0938\u094d\u0925\u093f\u0930\u092e\u094d\u0964\n\n\u0924\u0924\u0938\u094d\u0924\u0924\u094b \u0928\u093f\u092f\u092e\u094d\u092f\u0948\u0924\u0926\u093e\u0924\u094d\u092e\u0928\u094d\u092f\u0947\u0935 \u0935\u0936\u0902 \u0928\u092f\u0947\u0924\u094d\u0964\u09646.26\u0964\u0964", "r": "yato yato ni\u015bhcharati mana\u015bh cha\u00f1chalam asthiram\ntatas tato niyamyaitad \u0101tmanyeva va\u015bha\u1e41 nayet", "t": "From whatever cause the restless and unsteady mind wanders away, let him restrain it from that and bring it under the control of the Self alone."}, {"c": 6, "v": 27, "s": "\u092a\u094d\u0930\u0936\u093e\u0928\u094d\u0924\u092e\u0928\u0938\u0902 \u0939\u094d\u092f\u0947\u0928\u0902 \u092f\u094b\u0917\u093f\u0928\u0902 \u0938\u0941\u0916\u092e\u0941\u0924\u094d\u0924\u092e\u092e\u094d\u0964\n\n\u0909\u092a\u0948\u0924\u093f \u0936\u093e\u0928\u094d\u0924\u0930\u091c\u0938\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u092d\u0942\u0924\u092e\u0915\u0932\u094d\u092e\u0937\u092e\u094d\u0964\u09646.27\u0964\u0964", "r": "pra\u015bh\u0101nta-manasa\u1e41 hyena\u1e41 yogina\u1e41 sukham uttamam\nupaiti \u015bh\u0101nta-rajasa\u1e41 brahma-bh\u016btam akalma\u1e63ham", "t": "Supreme Bliss indeed comes to this Yogi whose mind is made peaceful, whose passion is quelled, who has become Brahman, and who is free from sin."}, {"c": 6, "v": 28, "s": "\u092f\u0941\u091e\u094d\u091c\u0928\u094d\u0928\u0947\u0935\u0902 \u0938\u0926\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u092f\u094b\u0917\u0940 \u0935\u093f\u0917\u0924\u0915\u0932\u094d\u092e\u0937\u0903\u0964\n\n\u0938\u0941\u0916\u0947\u0928 \u092c\u094d\u0930\u0939\u094d\u092e\u0938\u0902\u0938\u094d\u092a\u0930\u094d\u0936\u092e\u0924\u094d\u092f\u0928\u094d\u0924\u0902 \u0938\u0941\u0916\u092e\u0936\u094d\
