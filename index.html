u0928\u0941\u0924\u0947\u0964\u09646.28\u0964\u0964", "r": "yu\u00f1jann eva\u1e41 sad\u0101tm\u0101na\u1e41 yog\u012b vigata-kalma\u1e63ha\u1e25\nsukhena brahma-sanspar\u015bham atyanta\u1e41 sukham a\u015bhnute", "t": "The yogi, always engaging the mind thus (in the practice of yoga), is freed from sins and easily enjoys the infinite bliss of contact with Brahman (the Eternal)."}, {"c": 6, "v": 29, "s": "\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0938\u094d\u0925\u092e\u093e\u0924\u094d\u092e\u093e\u0928\u0902 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093f \u091a\u093e\u0924\u094d\u092e\u0928\u093f\u0964\n\n\u0908\u0915\u094d\u0937\u0924\u0947 \u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0938\u0930\u094d\u0935\u0924\u094d\u0930 \u0938\u092e\u0926\u0930\u094d\u0936\u0928\u0903\u0964\u09646.29\u0964\u0964", "r": "sarva-bh\u016bta-stham \u0101tm\u0101na\u1e41 sarva-bh\u016bt\u0101ni ch\u0101tmani\n\u012bk\u1e63hate yoga-yukt\u0101tm\u0101 sarvatra sama-dar\u015bhana\u1e25", "t": "With the mind harmonized by Yoga, he sees the Self abiding in all beings and all beings in the Self; he sees the same everywhere."}, {"c": 6, "v": 30, "s": "\u092f\u094b \u092e\u093e\u0902 \u092a\u0936\u094d\u092f\u0924\u093f \u0938\u0930\u094d\u0935\u0924\u094d\u0930 \u0938\u0930\u094d\u0935\u0902 \u091a \u092e\u092f\u093f \u092a\u0936\u094d\u092f\u0924\u093f\u0964\n\n\u0924\u0938\u094d\u092f\u093e\u0939\u0902 \u0928 \u092a\u094d\u0930\u0923\u0936\u094d\u092f\u093e\u092e\u093f \u0938 \u091a \u092e\u0947 \u0928 \u092a\u094d\u0930\u0923\u0936\u094d\u092f\u0924\u093f\u0964\u09646.30\u0964\u0964", "r": "yo m\u0101\u1e41 pa\u015bhyati sarvatra sarva\u1e41 cha mayi pa\u015bhyati\ntasy\u0101ha\u1e41 na pra\u1e47a\u015bhy\u0101mi sa cha me na pra\u1e47a\u015bhyati", "t": "He who sees Me everywhere and sees everything in Me, never becomes separated from Me, nor do I from him."}, {"c": 6, "v": 31, "s": "\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0938\u094d\u0925\u093f\u0924\u0902 \u092f\u094b \u092e\u093e\u0902 \u092d\u091c\u0924\u094d\u092f\u0947\u0915\u0924\u094d\u0935\u092e\u093e\u0938\u094d\u0925\u093f\u0924\u0903\u0964\n\n\u0938\u0930\u094d\u0935\u0925\u093e \u0935\u0930\u094d\u0924\u092e\u093e\u0928\u094b\u093d\u092a\u093f \u0938 \u092f\u094b\u0917\u0940 \u092e\u092f\u093f \u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09646.31\u0964\u0964", "r": "sarva-bh\u016bta-sthita\u1e41 yo m\u0101\u1e41 bhajatyekatvam \u0101sthita\u1e25\nsarvath\u0101 vartam\u0101no \u2019pi sa yog\u012b mayi vartate", "t": "He who, being established in unity, worships Me, who dwells in all beings, that yogi abides in Me, whatever their mode of living may be."}, {"c": 6, "v": 32, "s": "\u0906\u0924\u094d\u092e\u094c\u092a\u092e\u094d\u092f\u0947\u0928 \u0938\u0930\u094d\u0935\u0924\u094d\u0930 \u0938\u092e\u0902 \u092a\u0936\u094d\u092f\u0924\u093f \u092f\u094b\u093d\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0938\u0941\u0916\u0902 \u0935\u093e \u092f\u0926\u093f \u0935\u093e \u0926\u0941\u0903\u0916\u0902 \u0938\u0903 \u092f\u094b\u0917\u0940 \u092a\u0930\u092e\u094b \u092e\u0924\u0903\u0964\u09646.32\u0964\u0964", "r": "\u0101tmaupamyena sarvatra sama\u1e41 pa\u015bhyati yo \u2019rjuna\nsukha\u1e41 v\u0101 yadi v\u0101 du\u1e25kha\u1e41 sa yog\u012b paramo mata\u1e25", "t": "He who, through the likeness of the Self, O Arjuna, sees reality everywhere, be it pleasure or pain, is regarded as the highest Yogi."}, {"c": 6, "v": 33, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u092f\u094b\u093d\u092f\u0902 \u092f\u094b\u0917\u0938\u094d\u0924\u094d\u0935\u092f\u093e \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u0903 \u0938\u093e\u092e\u094d\u092f\u0947\u0928 \u092e\u0927\u0941\u0938\u0942\u0926\u0928\u0964\n\n\u090f\u0924\u0938\u094d\u092f\u093e\u0939\u0902 \u0928 \u092a\u0936\u094d\u092f\u093e\u092e\u093f \u091a\u091e\u094d\u091a\u0932\u0924\u094d\u0935\u093e\u0924\u094d \u0938\u094d\u0925\u093f\u0924\u093f\u0902 \u0938\u094d\u0925\u093f\u0930\u093e\u092e\u094d\u0964\u09646.33\u0964\u0964", "r": "arjuna uv\u0101cha\nyo \u2019ya\u1e41 yogas tvay\u0101 prokta\u1e25 s\u0101myena madhus\u016bdana\netasy\u0101ha\u1e41 na pa\u015bhy\u0101mi cha\u00f1chalatv\u0101t sthiti\u1e41 sthir\u0101m", "t": "Arjuna said, \"O Krishna, I do not see how this Yoga of equanimity, which you have taught me, can be maintained steadily, due to the restlessness of the mind.\""}, {"c": 6, "v": 34, "s": "\u091a\u091e\u094d\u091a\u0932\u0902 \u0939\u093f \u092e\u0928\u0903 \u0915\u0943\u0937\u094d\u0923 \u092a\u094d\u0930\u092e\u093e\u0925\u093f \u092c\u0932\u0935\u0926\u094d\u0926\u0943\u0922\u092e\u094d\u0964\n\n\u0924\u0938\u094d\u092f\u093e\u0939\u0902 \u0928\u093f\u0917\u094d\u0930\u0939\u0902 \u092e\u0928\u094d\u092f\u0947 \u0935\u093e\u092f\u094b\u0930\u093f\u0935 \u0938\u0941\u0926\u0941\u0937\u094d\u0915\u0930\u092e\u094d\u0964\u09646.34\u0964\u0964", "r": "cha\u00f1chala\u1e41 hi mana\u1e25 k\u1e5bi\u1e63h\u1e47a pram\u0101thi balavad d\u1e5bi\u1e0dham\ntasy\u0101ha\u1e41 nigraha\u1e41 manye v\u0101yor iva su-du\u1e63hkaram", "t": "The mind is indeed restless, turbulent, strong, and unyielding, O Krishna; I consider it as difficult to control as controlling the wind."}, {"c": 6, "v": 35, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0905\u0938\u0902\u0936\u092f\u0902 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u092e\u0928\u094b \u0926\u0941\u0930\u094d\u0928\u093f\u0917\u094d\u0930\u0939\u0902 \u091a\u0932\u0902\u0964\n\n\u0905\u092d\u094d\u092f\u093e\u0938\u0947\u0928 \u0924\u0941 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0935\u0948\u0930\u093e\u0917\u094d\u092f\u0947\u0923 \u091a \u0917\u0943\u0939\u094d\u092f\u0924\u0947\u0964\u09646.35\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nasan\u015bhaya\u1e41 mah\u0101-b\u0101ho mano durnigraha\u1e41 chalam\nabhy\u0101sena tu kaunteya vair\u0101gye\u1e47a cha g\u1e5bihyate", "t": "The Blessed Lord said, \"Undoubtedly, O mighty-armed Arjuna, the mind is difficult to control and restless; but with practice and dispassion, it can be restrained.\""}, {"c": 6, "v": 36, "s": "\u0905\u0938\u0902\u092f\u0924\u093e\u0924\u094d\u092e\u0928\u093e \u092f\u094b\u0917\u094b \u0926\u0941\u0937\u094d\u092a\u094d\u0930\u093e\u092a \u0907\u0924\u093f \u092e\u0947 \u092e\u0924\u093f\u0903\u0964\n\n\u0935\u0936\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u093e \u0924\u0941 \u092f\u0924\u0924\u093e \u0936\u0915\u094d\u092f\u094b\u093d\u0935\u093e\u092a\u094d\u0924\u0941\u092e\u0941\u092a\u093e\u092f\u0924\u0903\u0964\u09646.36\u0964\u0964", "r": "asa\u1e45yat\u0101tman\u0101 yogo du\u1e63hpr\u0101pa iti me mati\u1e25\nva\u015bhy\u0101tman\u0101 tu yatat\u0101 \u015bhakyo \u2019v\u0101ptum up\u0101yata\u1e25", "t": "I think Yoga is hard to be attained by one with an uncontrolled self, but the self-controlled and striving one can attain it by the appropriate means."}, {"c": 6, "v": 37, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0905\u092f\u0924\u093f\u0903 \u0936\u094d\u0930\u0926\u094d\u0927\u092f\u094b\u092a\u0947\u0924\u094b \u092f\u094b\u0917\u093e\u091a\u094d\u091a\u0932\u093f\u0924\u092e\u093e\u0928\u0938\u0903\u0964\n\n\u0905\u092a\u094d\u0930\u093e\u092a\u094d\u092f \u092f\u094b\u0917\u0938\u0902\u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u0915\u093e\u0902 \u0917\u0924\u093f\u0902 \u0915\u0943\u0937\u094d\u0923 \u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09646.37\u0964\u0964", "r": "arjuna uv\u0101cha\nayati\u1e25 \u015bhraddhayopeto yog\u0101ch chalita-m\u0101nasa\u1e25\napr\u0101pya yoga-sansiddhi\u1e41 k\u0101\u1e45 gati\u1e41 k\u1e5bi\u1e63h\u1e47a gachchhati", "t": "Arjuna said, \"He who is unable to control himself, even though he has faith, and whose mind wanders away from Yoga, what end does he meet, having failed to attain perfection in Yoga, O Krishna?\""}, {"c": 6, "v": 38, "s": "\u0915\u091a\u094d\u091a\u093f\u0928\u094d\u0928\u094b\u092d\u092f\u0935\u093f\u092d\u094d\u0930\u0937\u094d\u091f\u0936\u094d\u091b\u093f\u0928\u094d\u0928\u093e\u092d\u094d\u0930\u092e\u093f\u0935 \u0928\u0936\u094d\u092f\u0924\u093f\u0964\n\n\u0905\u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u094b \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0935\u093f\u092e\u0942\u0922\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u0923\u0903 \u092a\u0925\u093f\u0964\u09646.38\u0964\u0964", "r": "kachchin nobhaya-vibhra\u1e63h\u1e6da\u015bh chhinn\u0101bhram iva na\u015bhyati\naprati\u1e63h\u1e6dho mah\u0101-b\u0101ho vim\u016b\u1e0dho brahma\u1e47a\u1e25 pathi", "t": "Fallen from both, does he not perish like a rent cloud, supportless, O mighty-armed one, deluded on the path of Brahman?"}, {"c": 6, "v": 39, "s": "\u090f\u0924\u0928\u094d\u092e\u0947 \u0938\u0902\u0936\u092f\u0902 \u0915\u0943\u0937\u094d\u0923 \u091b\u0947\u0924\u094d\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u094d\u092f\u0936\u0947\u0937\u0924\u0903\u0964\n\n\u0924\u094d\u0935\u0926\u0928\u094d\u092f\u0903 \u0938\u0902\u0936\u092f\u0938\u094d\u092f\u093e\u0938\u094d\u092f \u091b\u0947\u0924\u094d\u0924\u093e \u0928 \u0939\u094d\u092f\u0941\u092a\u092a\u0926\u094d\u092f\u0924\u0947\u0964\u09646.39\u0964\u0964", "r": "etan me san\u015bhaya\u1e41 k\u1e5bi\u1e63h\u1e47a chhettum arhasya\u015bhe\u1e63hata\u1e25\ntvad-anya\u1e25 san\u015bhayasy\u0101sya chhett\u0101 na hyupapadyate", "t": "O Krishna, please completely dispel this doubt of mine, for it is not possible for anyone but You to do so."}, {"c": 6, "v": 40, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092a\u093e\u0930\u094d\u0925 \u0928\u0948\u0935\u0947\u0939 \u0928\u093e\u092e\u0941\u0924\u094d\u0930 \u0935\u093f\u0928\u093e\u0936\u0938\u094d\u0924\u0938\u094d\u092f \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\n\n\u0928\u0939\u093f \u0915\u0932\u094d\u092f\u093e\u0923\u0915\u0943\u0924\u094d\u0915\u0936\u094d\u093f\u091a\u0926\u094d\u0926\u0941\u0930\u094d\u0917\u0924\u093f\u0902 \u0924\u093e\u0924 \u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09646.40\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\np\u0101rtha naiveha n\u0101mutra vin\u0101\u015bhas tasya vidyate\nna hi kaly\u0101\u1e47a-k\u1e5bit ka\u015bhchid durgati\u1e41 t\u0101ta gachchhati", "t": "The Blessed Lord said, \"O Arjuna, neither in this world nor in the next will there be destruction for him; none, indeed, who does good, O my son, ever comes to grief.\""}, {"c": 6, "v": 41, "s": "\u092a\u094d\u0930\u093e\u092a\u094d\u092f \u092a\u0941\u0923\u094d\u092f\u0915\u0943\u0924\u093e\u0902 \u0932\u094b\u0915\u093e\u0928\u0941\u0937\u093f\u0924\u094d\u0935\u093e \u0936\u093e\u0936\u094d\u0935\u0924\u0940\u0903 \u0938\u092e\u093e\u0903\u0964\n\n\u0936\u0941\u091a\u0940\u0928\u093e\u0902 \u0936\u094d\u0930\u0940\u092e\u0924\u093e\u0902 \u0917\u0947\u0939\u0947 \u092f\u094b\u0917\u092d\u094d\u0930\u0937\u094d\u091f\u094b\u093d\u092d\u093f\u091c\u093e\u092f\u0924\u0947\u0964\u09646.41\u0964\u0964", "r": "pr\u0101pya pu\u1e47ya-k\u1e5bit\u0101\u1e41 lok\u0101n u\u1e63hitv\u0101 \u015bh\u0101\u015bhvat\u012b\u1e25 sam\u0101\u1e25\n\u015bhuch\u012bn\u0101\u1e41 \u015bhr\u012bmat\u0101\u1e41 gehe yoga-bhra\u1e63h\u1e6do\u2019bhij\u0101yate", "t": "Having attained to the worlds of the righteous and having dwelt there for everlasting years, he who fell from Yoga is born in a house of the pure and wealthy."}, {"c": 6, "v": 42, "s": "\u0905\u0925\u0935\u093e \u092f\u094b\u0917\u093f\u0928\u093e\u092e\u0947\u0935 \u0915\u0941\u0932\u0947 \u092d\u0935\u0924\u093f \u0927\u0940\u092e\u0924\u093e\u092e\u094d\u0964\n\n\u090f\u0924\u0926\u094d\u0927\u093f \u0926\u0941\u0930\u094d\u0932\u092d\u0924\u0930\u0902 \u0932\u094b\u0915\u0947 \u091c\u0928\u094d\u092e \u092f\u0926\u0940\u0926\u0943\u0936\u092e\u094d\u0964\u09646.42\u0964\u0964", "r": "atha v\u0101 yogin\u0101m eva kule bhavati dh\u012bmat\u0101m\netad dhi durlabhatara\u1e41 loke janma yad \u012bd\u1e5bi\u015bham", "t": "Or he is born in a family of even the wisest of yogis; verily, such a birth is very difficult to obtain in this world."}, {"c": 6, "v": 43, "s": "\u0924\u0924\u094d\u0930 \u0924\u0902 \u092c\u0941\u0926\u094d\u0927\u093f\u0938\u0902\u092f\u094b\u0917\u0902 \u0932\u092d\u0924\u0947 \u092a\u094c\u0930\u094d\u0935\u0926\u0947\u0939\u093f\u0915\u092e\u094d\u0964\n\n\u092f\u0924\u0924\u0947 \u091a \u0924\u0924\u094b \u092d\u0942\u092f\u0903 \u0938\u0902\u0938\u093f\u0926\u094d\u0927\u094c \u0915\u0941\u0930\u0941\u0928\u0928\u094d\u0926\u0928\u0964\u09646.43\u0964\u0964", "r": "tatra ta\u1e41 buddhi-sanyoga\u1e41 labhate paurva-dehikam\nyatate cha tato bh\u016bya\u1e25 sansiddhau kuru-nandana", "t": "Then he comes into contact with the knowledge acquired in his former body and strives even more for perfection, O Arjuna."}, {"c": 6, "v": 44, "s": "\u092a\u0942\u0930\u094d\u0935\u093e\u092d\u094d\u092f\u093e\u0938\u0947\u0928 \u0924\u0947\u0928\u0948\u0935 \u0939\u094d\u0930\u093f\u092f\u0924\u0947 \u0939\u094d\u092f\u0935\u0936\u094b\u093d\u092a\u093f \u0938\u0903\u0964\n\n\u091c\u093f\u091c\u094d\u091e\u093e\u0938\u0941\u0930\u092a\u093f \u092f\u094b\u0917\u0938\u094d\u092f \u0936\u092c\u094d\u0926\u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0924\u093f\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09646.44\u0964\u0964", "r": "p\u016brv\u0101bhy\u0101sena tenaiva hriyate hyava\u015bho \u2019pi sa\u1e25\njij\u00f1\u0101sur api yogasya \u015bhabda-brahm\u0101tivartate", "t": "By that same former practice, he is borne on in spite of himself. Even he who merely wishes to know Yoga goes beyond the Brahmanic word."}, {"c": 6, "v": 45, "s": "\u092a\u094d\u0930\u092f\u0924\u094d\u0928\u093e\u0926\u094d\u092f\u0924\u092e\u093e\u0928\u0938\u094d\u0924\u0941 \u092f\u094b\u0917\u0940 \u0938\u0902\u0936\u0941\u0926\u094d\u0927\u0915\u093f\u0932\u094d\u092c\u093f\u0937\u0903\u0964\n\n\u0905\u0928\u0947\u0915\u091c\u0928\u094d\u092e\u0938\u0902\u0938\u093f\u0926\u094d\u0927\u0938\u094d\u0924\u0924\u094b \u092f\u093e\u0924\u093f \u092a\u0930\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u09646.45\u0964\u0964", "r": "prayatn\u0101d yatam\u0101nas tu yog\u012b san\u015bhuddha-kilbi\u1e63ha\u1e25\naneka-janma-sansiddhas tato y\u0101ti par\u0101\u1e41 gatim", "t": "But the Yogi who strives assiduously, purified of sins and perfected gradually over many births, reaches the highest goal."}, {"c": 6, "v": 46, "s": "\u0924\u092a\u0938\u094d\u0935\u093f\u092d\u094d\u092f\u094b\u093d\u0927\u093f\u0915\u094b \u092f\u094b\u0917\u0940 \u091c\u094d\u091e\u093e\u0928\u093f\u092d\u094d\u092f\u094b\u093d\u092a\u093f \u092e\u0924\u094b\u093d\u0927\u093f\u0915\u0903\u0964\n\n\u0915\u0930\u094d\u092e\u093f\u092d\u094d\u092f\u0936\u094d\u091a\u093e\u0927\u093f\u0915\u094b \u092f\u094b\u0917\u0940 \u0924\u0938\u094d\u092e\u093e\u0926\u094d\u092f\u094b\u0917\u0940 \u092d\u0935\u093e\u0930\u094d\u091c\u0941\u0928\u0964\u09646.46\u0964\u0964", "r": "tapasvibhyo \u2019dhiko yog\u012b\nj\u00f1\u0101nibhyo \u2019pi mato \u2019dhika\u1e25\nkarmibhya\u015bh ch\u0101dhiko yog\u012b\ntasm\u0101d yog\u012b bhav\u0101rjuna", "t": "The yogi is thought to be superior to the ascetics, even superior to those who have knowledge obtained through the study of scriptures; he is also superior to men of action; therefore, be thou a yogi, O Arjuna."}, {"c": 6, "v": 47, "s": "\u092f\u094b\u0917\u093f\u0928\u093e\u092e\u092a\u093f \u0938\u0930\u094d\u0935\u0947\u0937\u093e\u0902 \u092e\u0926\u094d\u0917\u0924\u0947\u0928\u093e\u0928\u094d\u0924\u0930\u093e\u0924\u094d\u092e\u0928\u093e\u0964\n\n\u0936\u094d\u0930\u0926\u094d\u0927\u093e\u0935\u093e\u0928\u094d\u092d\u091c\u0924\u0947 \u092f\u094b \u092e\u093e\u0902 \u0938 \u092e\u0947 \u092f\u0941\u0915\u094d\u0924\u0924\u092e\u094b \u092e\u0924\u0903\u0964\u09646.47\u0964\u0964", "r": "yogin\u0101m api sarve\u1e63h\u0101\u1e41 mad-gaten\u0101ntar-\u0101tman\u0101\n\u015bhraddh\u0101v\u0101n bhajate yo m\u0101\u1e41 sa me yuktatamo mata\u1e25", "t": "And among all the Yogis, he who, full of faith and with his inner self merged in Me, worships Me is deemed by Me to be the most devoted."}, {"c": 7, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092e\u092f\u094d\u092f\u093e\u0938\u0915\u094d\u0924\u092e\u0928\u093e\u0903 \u092a\u093e\u0930\u094d\u0925 \u092f\u094b\u0917\u0902 \u092f\u0941\u091e\u094d\u091c\u0928\u094d\u092e\u0926\u093e\u0936\u094d\u0930\u092f\u0903\u0964\n\n\u0905\u0938\u0902\u0936\u092f\u0902 \u0938\u092e\u0917\u094d\u0930\u0902 \u092e\u093e\u0902 \u092f\u0925\u093e \u091c\u094d\u091e\u093e\u0938\u094d\u092f\u0938\u093f \u0924\u091a\u094d\u091b\u0943\u0923\u0941\u0964\u09647.1\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nmayy\u0101sakta-man\u0101\u1e25 p\u0101rtha yoga\u1e41 yu\u00f1jan mad-\u0101\u015bhraya\u1e25\nasan\u015bhaya\u1e41 samagra\u1e41 m\u0101\u1e41 yath\u0101 j\u00f1\u0101syasi tach chh\u1e5bi\u1e47u", "t": "The Blessed Lord said, \"O Arjuna, hear how you shall, without doubt, know Me fully, with your mind intent on Me, practicing Yoga and taking refuge in Me.\""}, {"c": 7, "v": 2, "s": "\u091c\u094d\u091e\u093e\u0928\u0902 \u0924\u0947\u093d\u0939\u0902 \u0938\u0935\u093f\u091c\u094d\u091e\u093e\u0928\u092e\u093f\u0926\u0902 \u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u094d\u092f\u0936\u0947\u0937\u0924\u0903\u0964\n\n\u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u0928\u0947\u0939 \u092d\u0942\u092f\u094b\u093d\u0928\u094d\u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u0935\u094d\u092f\u092e\u0935\u0936\u093f\u0937\u094d\u092f\u0924\u0947\u0964\u09647.2\u0964\u0964", "r": "j\u00f1\u0101na\u1e41 te \u2019ha\u1e41 sa-vij\u00f1\u0101nam ida\u1e41 vak\u1e63hy\u0101mya\u015bhe\u1e63hata\u1e25\nyaj j\u00f1\u0101tv\u0101 neha bh\u016byo \u2019nyaj j\u00f1\u0101tavyam-ava\u015bhi\u1e63hyate", "t": "I will declare to you in full this knowledge combined with realization, after knowing which nothing else remains to be known here."}, {"c": 7, "v": 3, "s": "\u092e\u0928\u0941\u0937\u094d\u092f\u093e\u0923\u093e\u0902 \u0938\u0939\u0938\u094d\u0930\u0947\u0937\u0941 \u0915\u0936\u094d\u093f\u091a\u0926\u094d\u092f\u0924\u0924\u093f \u0938\u093f\u0926\u094d\u0927\u092f\u0947\u0964\n\n\u092f\u0924\u0924\u093e\u092e\u092a\u093f \u0938\u093f\u0926\u094d\u0927\u093e\u0928\u093e\u0902 \u0915\u0936\u094d\u093f\u091a\u0928\u094d\u092e\u093e\u0902 \u0935\u0947\u0924\u094d\u0924\u093f \u0924\u0924\u094d\u0924\u094d\u0935\u0924\u0903\u0964\u09647.3\u0964\u0964", "r": "manu\u1e63hy\u0101\u1e47\u0101\u1e41 sahasre\u1e63hu ka\u015bhchid yatati siddhaye\nyatat\u0101m api siddh\u0101n\u0101\u1e41 ka\u015bhchin m\u0101\u1e41 vetti tattvata\u1e25", "t": "Among thousands of men, one may perchance strive for perfection; even among those successful strivers, only one may perchance know Me in essence."}, {"c": 7, "v": 4, "s": "\u092d\u0942\u092e\u093f\u0930\u093e\u092a\u094b\u093d\u0928\u0932\u094b \u0935\u093e\u092f\u0941\u0903 \u0916\u0902 \u092e\u0928\u094b \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u0947\u0935 \u091a\u0964\n\n\u0905\u0939\u0919\u094d\u0915\u093e\u0930 \u0907\u0924\u0940\u092f\u0902 \u092e\u0947 \u092d\u093f\u0928\u094d\u0928\u093e \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0930\u0937\u094d\u091f\u0927\u093e\u0964\u09647.4\u0964\u0964", "r": "bh\u016bmir-\u0101po \u2019nalo v\u0101yu\u1e25 kha\u1e41 mano buddhir eva cha\nahank\u0101ra it\u012bya\u1e41 me bhinn\u0101 prak\u1e5bitir a\u1e63h\u1e6dadh\u0101", "t": "Earth, water, fire, air, ether, mind, intellect, and egoism\u2014thus is My Nature divided eightfold."}, {"c": 7, "v": 5, "s": "\u0905\u092a\u0930\u0947\u092f\u092e\u093f\u0924\u0938\u094d\u0924\u094d\u0935\u0928\u094d\u092f\u093e\u0902 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092e\u0947 \u092a\u0930\u093e\u092e\u094d\u0964\n\n\u091c\u0940\u0935\u092d\u0942\u0924\u093e\u0902 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u092f\u092f\u0947\u0926\u0902 \u0927\u093e\u0930\u094d\u092f\u0924\u0947 \u091c\u0917\u0924\u094d\u0964\u09647.5\u0964\u0964", "r": "apareyam itas tvany\u0101\u1e41 prak\u1e5biti\u1e41 viddhi me par\u0101m\nj\u012bva-bh\u016bt\u0101\u1e41 mah\u0101-b\u0101ho yayeda\u1e41 dh\u0101ryate jagat", "t": "O mighty-armed Arjuna, this is the inferior Prakriti; know it as distinct from My higher Prakriti, the very life-element, by which this world is upheld."}, {"c": 7, "v": 6, "s": "\u090f\u0924\u0926\u094d\u092f\u094b\u0928\u0940\u0928\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0938\u0930\u094d\u0935\u093e\u0923\u0940\u0924\u094d\u092f\u0941\u092a\u0927\u093e\u0930\u092f\u0964\n\n\u0905\u0939\u0902 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0938\u094d\u092f \u091c\u0917\u0924\u0903 \u092a\u094d\u0930\u092d\u0935\u0903 \u092a\u094d\u0930\u0932\u092f\u0938\u094d\u0924\u0925\u093e\u0964\u09647.6\u0964\u0964", "r": "etad-yon\u012bni bh\u016bt\u0101ni sarv\u0101\u1e47\u012btyupadh\u0101raya\naha\u1e41 k\u1e5bitsnasya jagata\u1e25 prabhava\u1e25 pralayas tath\u0101", "t": "Know that these two are the womb of all beings; thus, I am the source and dissolution of the whole universe."}, {"c": 7, "v": 7, "s": "\u092e\u0924\u094d\u0924\u0903 \u092a\u0930\u0924\u0930\u0902 \u0928\u093e\u0928\u094d\u092f\u0924\u094d\u0915\u093f\u091e\u094d\u091a\u093f\u0926\u0938\u094d\u0924\u093f \u0927\u0928\u091e\u094d\u091c\u092f\u0964\n\n\u092e\u092f\u093f \u0938\u0930\u094d\u0935\u092e\u093f\u0926\u0902 \u092a\u094d\u0930\u094b\u0924\u0902 \u0938\u0942\u0924\u094d\u0930\u0947 \u092e\u0923\u093f\u0917\u0923\u093e \u0907\u0935\u0964\u09647.7\u0964\u0964", "r": "matta\u1e25 paratara\u1e41 n\u0101nyat ki\u00f1chid asti dhana\u00f1jaya\nmayi sarvam ida\u1e41 prota\u1e41 s\u016btre ma\u1e47i-ga\u1e47\u0101 iva", "t": "There is nothing higher than Me, O Arjuna. All this is strung on Me, like clusters of gems on a string."}, {"c": 7, "v": 8, "s": "\u0930\u0938\u094b\u093d\u0939\u092e\u092a\u094d\u0938\u0941 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092a\u094d\u0930\u092d\u093e\u0938\u094d\u092e\u093f \u0936\u0936\u093f\u0938\u0942\u0930\u094d\u092f\u092f\u094b\u0903\u0964\n\n\u092a\u094d\u0930\u0923\u0935\u0903 \u0938\u0930\u094d\u0935\u0935\u0947\u0926\u0947\u0937\u0941 \u0936\u092c\u094d\u0926\u0903 \u0916\u0947 \u092a\u094c\u0930\u0941\u0937\u0902 \u0928\u0943\u0937\u0941\u0964\u09647.8\u0964\u0964", "r": "raso \u2019ham apsu kaunteya prabh\u0101smi \u015bha\u015bhi-s\u016bryayo\u1e25\npra\u1e47ava\u1e25 sarva-vede\u1e63hu \u015bhabda\u1e25 khe pauru\u1e63ha\u1e41 n\u1e5bi\u1e63hu", "t": "I am the flavor in water, O Arjuna; I am the light in the moon and the sun; I am the syllable Om in all the Vedas, sound in the ether and virility in men."}, {"c": 7, "v": 9, "s": "\u092a\u0941\u0923\u094d\u092f\u094b \u0917\u0928\u094d\u0927\u0903 \u092a\u0943\u0925\u093f\u0935\u094d\u092f\u093e\u0902 \u091a \u0924\u0947\u091c\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0935\u093f\u092d\u093e\u0935\u0938\u094c\u0964\n\n\u091c\u0940\u0935\u0928\u0902 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0947\u0937\u0941 \u0924\u092a\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0924\u092a\u0938\u094d\u0935\u093f\u0937\u0941\u0964\u09647.9\u0964\u0964", "r": "pu\u1e47yo gandha\u1e25 p\u1e5bithivy\u0101\u1e41 cha teja\u015bh ch\u0101smi vibh\u0101vasau\nj\u012bvana\u1e41 sarva-bh\u016bte\u1e63hu tapa\u015bh ch\u0101smi tapasvi\u1e63hu", "t": "I am the sweet fragrance in the earth and the brilliance in the fire, the life in all beings, and I am the austerity of ascetics."}, {"c": 7, "v": 10, "s": "\u092c\u0940\u091c\u0902 \u092e\u093e\u0902 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092a\u093e\u0930\u094d\u0925 \u0938\u0928\u093e\u0924\u0928\u092e\u094d\u0964\n\n\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092c\u0941\u0926\u094d\u0927\u093f\u092e\u0924\u093e\u092e\u0938\u094d\u092e\u093f \u0924\u0947\u091c\u0938\u094d\u0924\u0947\u091c\u0938\u094d\u0935\u093f\u0928\u093e\u092e\u0939\u092e\u094d\u0964\u09647.10\u0964\u0964", "r": "b\u012bja\u1e41 m\u0101\u1e41 sarva-bh\u016bt\u0101n\u0101\u1e41 viddhi p\u0101rtha san\u0101tanam\nbuddhir buddhimat\u0101m asmi tejas tejasvin\u0101m aham", "t": "Know Me, O Arjuna, as the eternal seed of all beings; I am the intelligence of the intelligent, and the splendour of the splendid objects."}, {"c": 7, "v": 11, "s": "\u092c\u0932\u0902 \u092c\u0932\u0935\u0924\u093e\u0902 \u091a\u093e\u0939\u0902 \u0915\u093e\u092e\u0930\u093e\u0917\u0935\u093f\u0935\u0930\u094d\u091c\u093f\u0924\u092e\u094d\u0964\n\n\u0927\u0930\u094d\u092e\u093e\u0935\u093f\u0930\u0941\u0926\u094d\u0927\u094b \u092d\u0942\u0924\u0947\u0937\u0941 \u0915\u093e\u092e\u094b\u093d\u0938\u094d\u092e\u093f \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\u09647.11\u0964\u0964", "r": "bala\u1e41 balavat\u0101\u1e41 ch\u0101ha\u1e41 k\u0101ma-r\u0101ga-vivarjitam\ndharm\u0101viruddho bh\u016bte\u1e63hu k\u0101mo \u2019smi bharatar\u1e63habha", "t": "Of the strong, I am the strength devoid of desire and attachment, and in all beings, I am the desire in accordance with Dharma, O Arjuna."}, {"c": 7, "v": 12, "s": "\u092f\u0947 \u091a\u0948\u0935 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u093e \u092d\u093e\u0935\u093e \u0930\u093e\u091c\u0938\u093e\u0938\u094d\u0924\u093e\u092e\u0938\u093e\u0936\u094d\u091a \u092f\u0947\u0964\n\n\u092e\u0924\u094d\u0924 \u090f\u0935\u0947\u0924\u093f \u0924\u093e\u0928\u094d\u0935\u093f\u0926\u094d\u0927\u093f \u0928\u0924\u094d\u0935\u0939\u0902 \u0924\u0947\u0937\u0941 \u0924\u0947 \u092e\u092f\u093f\u0964\u09647.12\u0964\u0964", "r": "ye chaiva s\u0101ttvik\u0101 bh\u0101v\u0101 r\u0101jas\u0101s t\u0101mas\u0101\u015bh cha ye\nmatta eveti t\u0101n viddhi na tvaha\u1e41 te\u1e63hu te mayi", "t": "Whatever beings (and objects) that are pure, active, and inert, know that they proceed from Me. They are in Me, yet I am not in them."}, {"c": 7, "v": 13, "s": "\u0924\u094d\u0930\u093f\u092d\u093f\u0930\u094d\u0917\u0941\u0923\u092e\u092f\u0948\u0930\u094d\u092d\u093e\u0935\u0948\u0930\u0947\u092d\u093f\u0903 \u0938\u0930\u094d\u0935\u092e\u093f\u0926\u0902 \u091c\u0917\u0924\u094d\u0964\n\n\u092e\u094b\u0939\u093f\u0924\u0902 \u0928\u093e\u092d\u093f\u091c\u093e\u0928\u093e\u0924\u093f \u092e\u093e\u092e\u0947\u092d\u094d\u092f\u0903 \u092a\u0930\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u09647.13\u0964\u0964", "r": "tribhir gu\u1e47a-mayair bh\u0101vair ebhi\u1e25 sarvam ida\u1e41 jagat\nmohita\u1e41 n\u0101bhij\u0101n\u0101ti m\u0101mebhya\u1e25 param avyayam", "t": "Deluded by these Natures, composed of the three qualities of Nature, all this world does not know Me as distinct from them and immutable."}, {"c": 7, "v": 14, "s": "\u0926\u0948\u0935\u0940 \u0939\u094d\u092f\u0947\u0937\u093e \u0917\u0941\u0923\u092e\u092f\u0940 \u092e\u092e \u092e\u093e\u092f\u093e \u0926\u0941\u0930\u0924\u094d\u092f\u092f\u093e\u0964\n\n\u092e\u093e\u092e\u0947\u0935 \u092f\u0947 \u092a\u094d\u0930\u092a\u0926\u094d\u092f\u0928\u094d\u0924\u0947 \u092e\u093e\u092f\u093e\u092e\u0947\u0924\u093e\u0902 \u0924\u0930\u0928\u094d\u0924\u093f \u0924\u0947\u0964\u09647.14\u0964\u0964", "r": "daiv\u012b hye\u1e63h\u0101 gu\u1e47a-may\u012b mama m\u0101y\u0101 duratyay\u0101\nm\u0101m eva ye prapadyante m\u0101y\u0101m et\u0101\u1e41 taranti te", "t": "Verily, this divine illusion of Mine, composed of the three qualities, is difficult to cross over; those who take refuge in Me alone, can cross over this illusion."}, {"c": 7, "v": 15, "s": "\u0928 \u092e\u093e\u0902 \u0926\u0941\u0937\u094d\u0915\u0943\u0924\u093f\u0928\u094b \u092e\u0942\u0922\u093e\u0903 \u092a\u094d\u0930\u092a\u0926\u094d\u092f\u0928\u094d\u0924\u0947 \u0928\u0930\u093e\u0927\u092e\u093e\u0903\u0964\n\n\u092e\u093e\u092f\u092f\u093e\u092a\u0939\u0943\u0924\u091c\u094d\u091e\u093e\u0928\u093e \u0906\u0938\u0941\u0930\u0902 \u092d\u093e\u0935\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u093e\u0903\u0964\u09647.15\u0964\u0964", "r": "na m\u0101\u1e41 du\u1e63hk\u1e5bitino m\u016b\u1e0dh\u0101\u1e25 prapadyante nar\u0101dham\u0101\u1e25\nm\u0101yay\u0101pah\u1e5bita-j\u00f1\u0101n\u0101 \u0101sura\u1e41 bh\u0101vam \u0101\u015bhrit\u0101\u1e25", "t": "The evil-doers and the deluded, who are the lowest of men, do not seek Me; those whose knowledge is destroyed by illusion follow the ways of demons."}, {"c": 7, "v": 16, "s": "\u091a\u0924\u0941\u0930\u094d\u0935\u093f\u0927\u093e \u092d\u091c\u0928\u094d\u0924\u0947 \u092e\u093e\u0902 \u091c\u0928\u093e\u0903 \u0938\u0941\u0915\u0943\u0924\u093f\u0928\u094b\u093d\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0906\u0930\u094d\u0924\u094b \u091c\u093f\u091c\u094d\u091e\u093e\u0938\u0941\u0930\u0930\u094d\u0925\u093e\u0930\u094d\u0925\u0940 \u091c\u094d\u091e\u093e\u0928\u0940 \u091a \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\u09647.16\u0964\u0964", "r": "chatur-vidh\u0101 bhajante m\u0101\u1e41 jan\u0101\u1e25 suk\u1e5bitino \u2019rjuna\n\u0101rto jij\u00f1\u0101sur arth\u0101rth\u012b j\u00f1\u0101n\u012b cha bharatar\u1e63habha", "t": "Four kinds of virtuous men worship Me, O Arjuna, and they are the distressed, the seekers of knowledge, the seekers of wealth, and the wise, O Lord of the Bharatas."}, {"c": 7, "v": 17, "s": "\u0924\u0947\u0937\u093e\u0902 \u091c\u094d\u091e\u093e\u0928\u0940 \u0928\u093f\u0924\u094d\u092f\u092f\u0941\u0915\u094d\u0924 \u090f\u0915\u092d\u0915\u094d\u093f\u0924\u0930\u094d\u0935\u093f\u0936\u093f\u0937\u094d\u092f\u0924\u0947\u0964\n\n\u092a\u094d\u0930\u093f\u092f\u094b \u0939\u093f \u091c\u094d\u091e\u093e\u0928\u093f\u0928\u094b\u093d\u0924\u094d\u092f\u0930\u094d\u0925\u092e\u0939\u0902 \u0938 \u091a \u092e\u092e \u092a\u094d\u0930\u093f\u092f\u0903\u0964\u09647.17\u0964\u0964", "r": "te\u1e63h\u0101\u1e41 j\u00f1\u0101n\u012b nitya-yukta eka-bhaktir vi\u015bhi\u1e63hyate\npriyo hi j\u00f1\u0101nino \u2019tyartham aha\u1e41 sa cha mama priya\u1e25", "t": "Of them, the wise who are ever steadfast and devoted to the One, excel; for I am exceedingly dear to the wise, and they are dear to Me."}, {"c": 7, "v": 18, "s": "\u0909\u0926\u093e\u0930\u093e\u0903 \u0938\u0930\u094d\u0935 \u090f\u0935\u0948\u0924\u0947 \u091c\u094d\u091e\u093e\u0928\u0940 \u0924\u094d\u0935\u093e\u0924\u094d\u092e\u0948\u0935 \u092e\u0947 \u092e\u0924\u092e\u094d\u0964\n\n\u0906\u0938\u094d\u0925\u093f\u0924\u0903 \u0938 \u0939\u093f \u092f\u0941\u0915\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u092e\u093e\u092e\u0947\u0935\u093e\u0928\u0941\u0924\u094d\u0924\u092e\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u09647.18\u0964\u0964", "r": "ud\u0101r\u0101\u1e25 sarva evaite j\u00f1\u0101n\u012b tv\u0101tmaiva me matam\n\u0101sthita\u1e25 sa hi yukt\u0101tm\u0101 m\u0101m ev\u0101nuttam\u0101\u1e41 gatim", "t": "Indeed, all these are noble; however, I consider the wise man as My very Self; for, he is steadfast in mind and established in Me alone as the supreme goal."}, {"c": 7, "v": 19, "s": "\u092c\u0939\u0942\u0928\u093e\u0902 \u091c\u0928\u094d\u092e\u0928\u093e\u092e\u0928\u094d\u0924\u0947 \u091c\u094d\u091e\u093e\u0928\u0935\u093e\u0928\u094d\u092e\u093e\u0902 \u092a\u094d\u0930\u092a\u0926\u094d\u092f\u0924\u0947\u0964\n\n\u0935\u093e\u0938\u0941\u0926\u0947\u0935\u0903 \u0938\u0930\u094d\u0935\u092e\u093f\u0924\u093f \u0938 \u092e\u0939\u093e\u0924\u094d\u092e\u093e \u0938\u0941\u0926\u0941\u0930\u094d\u0932\u092d\u0903\u0964\u09647.19\u0964\u0964", "r": "bah\u016bn\u0101\u1e41 janman\u0101m ante j\u00f1\u0101nav\u0101n m\u0101\u1e41 prapadyate\nv\u0101sudeva\u1e25 sarvam iti sa mah\u0101tm\u0101 su-durlabha\u1e25", "t": "At the end of many births, the wise man comes to Me, realizing that all this is Vaasudeva (the innermost Self); such a great soul (Mahatma) is very hard to find."}, {"c": 7, "v": 20, "s": "\u0915\u093e\u092e\u0948\u0938\u094d\u0924\u0948\u0938\u094d\u0924\u0948\u0930\u094d\u0939\u0943\u0924\u091c\u094d\u091e\u093e\u0928\u093e\u0903 \u092a\u094d\u0930\u092a\u0926\u094d\u092f\u0928\u094d\u0924\u0947\u093d\u0928\u094d\u092f\u0926\u0947\u0935\u0924\u093e\u0903\u0964\n\n\u0924\u0902 \u0924\u0902 \u0928\u093f\u092f\u092e\u092e\u093e\u0938\u094d\u0925\u093e\u092f \u092a\u094d\u0930\u0915\u0943\u0924\u094d\u092f\u093e \u0928\u093f\u092f\u0924\u093e\u0903 \u0938\u094d\u0935\u092f\u093e\u0964\u09647.20\u0964\u0964", "r": "k\u0101mais tais tair h\u1e5bita-j\u00f1\u0101n\u0101\u1e25 prapadyante \u2019nya-devat\u0101\u1e25\nta\u1e41 ta\u1e41 niyamam \u0101sth\u0101ya prak\u1e5bity\u0101 niyat\u0101\u1e25 svay\u0101", "t": "Those whose wisdom has been taken away by this or that desire, go to other gods, following this or that rite, led by their own nature."}, {"c": 7, "v": 21, "s": "\u092f\u094b \u092f\u094b \u092f\u093e\u0902 \u092f\u093e\u0902 \u0924\u0928\u0941\u0902 \u092d\u0915\u094d\u0924\u0903 \u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e\u0930\u094d\u091a\u093f\u0924\u0941\u092e\u093f\u091a\u094d\u091b\u0924\u093f\u0964\n\n\u0924\u0938\u094d\u092f \u0924\u0938\u094d\u092f\u093e\u091a\u0932\u093e\u0902 \u0936\u094d\u0930\u0926\u094d\u0927\u093e\u0902 \u0924\u093e\u092e\u0947\u0935 \u0935\u093f\u0926\u0927\u093e\u092e\u094d\u092f\u0939\u092e\u094d\u0964\u09647.21\u0964\u0964", "r": "yo yo y\u0101\u1e41 y\u0101\u1e41 tanu\u1e41 bhakta\u1e25 \u015bhraddhay\u0101rchitum ichchhati\ntasya tasy\u0101chal\u0101\u1e41 \u015bhraddh\u0101\u1e41 t\u0101m eva vidadh\u0101myaham", "t": "Whatever form any devotee desires to worship with faith, I make that same faith of his firm and unflinching."}, {"c": 7, "v": 22, "s": "\u0938 \u0924\u092f\u093e \u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e \u092f\u0941\u0915\u094d\u0924\u0938\u094d\u0924\u0938\u094d\u092f\u093e\u0930\u093e\u0927\u0928\u092e\u0940\u0939\u0924\u0947\u0964\n\n\u0932\u092d\u0924\u0947 \u091a \u0924\u0924\u0903 \u0915\u093e\u092e\u093e\u0928\u094d\u092e\u092f\u0948\u0935 \u0935\u093f\u0939\u093f\u0924\u093e\u0928\u094d \u0939\u093f \u0924\u093e\u0928\u094d\u0964\u09647.22\u0964\u0964", "r": "sa tay\u0101 \u015bhraddhay\u0101 yuktas tasy\u0101r\u0101dhanam \u012bhate\nlabhate cha tata\u1e25 k\u0101m\u0101n mayaiva vihit\u0101n hi t\u0101n", "t": "Endowed with that faith, he engages in the worship of that form and obtains his desired outcome, which is ordained by Me alone."}, {"c": 7, "v": 23, "s": "\u0905\u0928\u094d\u0924\u0935\u0924\u094d\u0924\u0941 \u092b\u0932\u0902 \u0924\u0947\u0937\u093e\u0902 \u0924\u0926\u094d\u092d\u0935\u0924\u094d\u092f\u0932\u094d\u092a\u092e\u0947\u0927\u0938\u093e\u092e\u094d\u0964\n\n\u0926\u0947\u0935\u093e\u0928\u094d\u0926\u0947\u0935\u092f\u091c\u094b \u092f\u093e\u0928\u094d\u0924\u093f \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u093e \u092f\u093e\u0928\u094d\u0924\u093f \u092e\u093e\u092e\u092a\u093f\u0964\u09647.23\u0964\u0964", "r": "antavat tu phala\u1e41 te\u1e63h\u0101\u1e41 tad bhavatyalpa-medhas\u0101m\ndev\u0101n deva-yajo y\u0101nti mad-bhakt\u0101 y\u0101nti m\u0101m api", "t": "Verily, the reward (fruit) that accrues to those men of small intelligence is finite. The worshippers of the gods go to them, whereas My devotees come to Me."}, {"c": 7, "v": 24, "s": "\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u0902 \u0935\u094d\u092f\u0915\u094d\u093f\u0924\u092e\u093e\u092a\u0928\u094d\u0928\u0902 \u092e\u0928\u094d\u092f\u0928\u094d\u0924\u0947 \u092e\u093e\u092e\u092c\u0941\u0926\u094d\u0927\u092f\u0903\u0964\n\n\u092a\u0930\u0902 \u092d\u093e\u0935\u092e\u091c\u093e\u0928\u0928\u094d\u0924\u094b \u092e\u092e\u093e\u0935\u094d\u092f\u092f\u092e\u0928\u0941\u0924\u094d\u0924\u092e\u092e\u094d\u0964\u09647.24\u0964\u0964", "r": "avyakta\u1e41 vyaktim \u0101panna\u1e41 manyante m\u0101m abuddhaya\u1e25\npara\u1e41 bh\u0101vam aj\u0101nanto mam\u0101vyayam anuttamam", "t": "The foolish think of Me, the Unmanifest, as having manifestation, not knowing My higher, immutable, and most excellent nature."}, {"c": 7, "v": 25, "s": "\u0928\u093e\u0939\u0902 \u092a\u094d\u0930\u0915\u093e\u0936\u0903 \u0938\u0930\u094d\u0935\u0938\u094d\u092f \u092f\u094b\u0917\u092e\u093e\u092f\u093e\u0938\u092e\u093e\u0935\u0943\u0924\u0903\u0964\n\n\u092e\u0942\u0922\u094b\u093d\u092f\u0902 \u0928\u093e\u092d\u093f\u091c\u093e\u0928\u093e\u0924\u093f \u0932\u094b\u0915\u094b \u092e\u093e\u092e\u091c\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u09647.25\u0964\u0964", "r": "n\u0101ha\u1e41 prak\u0101\u015bha\u1e25 sarvasya yoga-m\u0101y\u0101-sam\u0101v\u1e5bita\u1e25\nm\u016b\u1e0dho \u2019ya\u1e41 n\u0101bhij\u0101n\u0101ti loko m\u0101m ajam avyayam", "t": "I am not manifest to all, veiled as I am by the Yoga-Maya. This deluded world does not know Me, who am unborn and imperishable."}, {"c": 7, "v": 26, "s": "\u0935\u0947\u0926\u093e\u0939\u0902 \u0938\u092e\u0924\u0940\u0924\u093e\u0928\u093f \u0935\u0930\u094d\u0924\u092e\u093e\u0928\u093e\u0928\u093f \u091a\u093e\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u092d\u0935\u093f\u0937\u094d\u092f\u093e\u0923\u093f \u091a \u092d\u0942\u0924\u093e\u0928\u093f \u092e\u093e\u0902 \u0924\u0941 \u0935\u0947\u0926 \u0928 \u0915\u0936\u094d\u091a\u0928\u0964\u09647.26\u0964\u0964", "r": "ved\u0101ha\u1e41 samat\u012bt\u0101ni vartam\u0101n\u0101ni ch\u0101rjuna\nbhavi\u1e63hy\u0101\u1e47i cha bh\u016bt\u0101ni m\u0101\u1e41 tu veda na ka\u015bhchana", "t": "I know, O Arjuna, the beings of the past, the present, and the future; however, no one knows Me."}, {"c": 7, "v": 27, "s": "\u0907\u091a\u094d\u091b\u093e\u0926\u094d\u0935\u0947\u0937\u0938\u092e\u0941\u0924\u094d\u0925\u0947\u0928 \u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u092e\u094b\u0939\u0947\u0928 \u092d\u093e\u0930\u0924\u0964\n\n\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093f \u0938\u0902\u092e\u094b\u0939\u0902 \u0938\u0930\u094d\u0917\u0947 \u092f\u093e\u0928\u094d\u0924\u093f \u092a\u0930\u0928\u094d\u0924\u092a\u0964\u09647.27\u0964\u0964", "r": "ichchh\u0101-dve\u1e63ha-samutthena dvandva-mohena bh\u0101rata\nsarva-bh\u016bt\u0101ni sammoha\u1e41 sarge y\u0101nti parantapa", "t": "O Bharata, all beings are subject to delusion at birth due to the delusion of the pairs of opposites arising from desire and aversion, O Parantapa."}, {"c": 7, "v": 28, "s": "\u092f\u0947\u0937\u093e\u0902 \u0924\u094d\u0935\u0928\u094d\u0924\u0917\u0924\u0902 \u092a\u093e\u092a\u0902 \u091c\u0928\u093e\u0928\u093e\u0902 \u092a\u0941\u0923\u094d\u092f\u0915\u0930\u094d\u092e\u0923\u093e\u092e\u094d\u0964\n\n\u0924\u0947 \u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u092e\u094b\u0939\u0928\u093f\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u093e \u092d\u091c\u0928\u094d\u0924\u0947 \u092e\u093e\u0902 \u0926\u0943\u0922\u0935\u094d\u0930\u0924\u093e\u0903\u0964\u09647.28\u0964\u0964", "r": "ye\u1e63h\u0101\u1e41 tvanta-gata\u1e41 p\u0101pa\u1e41 jan\u0101n\u0101\u1e41 pu\u1e47ya-karma\u1e47\u0101m\nte dvandva-moha-nirmukt\u0101 bhajante m\u0101\u1e41 d\u1e5bi\u1e0dha-vrat\u0101\u1e25", "t": "But those men of virtuous deeds, whose sins have come to an end and who are freed from the delusion of the pairs of opposites, worship Me steadfastly, with their vows."}, {"c": 7, "v": 29, "s": "\u091c\u0930\u093e\u092e\u0930\u0923\u092e\u094b\u0915\u094d\u0937\u093e\u092f \u092e\u093e\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u094d\u092f \u092f\u0924\u0928\u094d\u0924\u093f \u092f\u0947\u0964\n\n\u0924\u0947 \u092c\u094d\u0930\u0939\u094d\u092e \u0924\u0926\u094d\u0935\u093f\u0926\u0941\u0903 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u092e\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u0902 \u0915\u0930\u094d\u092e \u091a\u093e\u0916\u093f\u0932\u092e\u094d\u0964\u09647.29\u0964\u0964", "r": "jar\u0101-mara\u1e47a-mok\u1e63h\u0101ya m\u0101m \u0101\u015bhritya yatanti ye\nte brahma tadvidu\u1e25 k\u1e5bitsnam adhy\u0101tma\u1e41 karma ch\u0101khilam", "t": "Those who strive for liberation from old age and death, taking refuge in Me, realize in full that Brahman, the whole knowledge of the Self, and all action."}, {"c": 7, "v": 30, "s": "\u0938\u093e\u0927\u093f\u092d\u0942\u0924\u093e\u0927\u093f\u0926\u0948\u0935\u0902 \u092e\u093e\u0902 \u0938\u093e\u0927\u093f\u092f\u091c\u094d\u091e\u0902 \u091a \u092f\u0947 \u0935\u093f\u0926\u0941\u0903\u0964\n\n\u092a\u094d\u0930\u092f\u093e\u0923\u0915\u093e\u0932\u0947\u093d\u092a\u093f \u091a \u092e\u093e\u0902 \u0924\u0947 \u0935\u093f\u0926\u0941\u0930\u094d\u092f\u0941\u0915\u094d\u0924\u091a\u0947\u0924\u0938\u0903\u0964\u09647.30\u0964\u0964", "r": "s\u0101dhibh\u016bt\u0101dhidaiva\u1e41 m\u0101\u1e41 s\u0101dhiyaj\u00f1a\u1e41 cha ye vidu\u1e25\npray\u0101\u1e47a-k\u0101le \u2019pi cha m\u0101\u1e41 te vidur yukta-chetasa\u1e25", "t": "Those who know Me with the Adhibhuta (pertaining to the elements), Adhidaiva (pertaining to the gods), and the Adhiyajna (pertaining to the sacrifice) know Me even at the time of death, remaining steadfast in mind."}, {"c": 8, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0915\u093f\u0902 \u0924\u0926\u094d\u092c\u094d\u0930\u0939\u094d\u092e \u0915\u093f\u092e\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u0902 \u0915\u093f\u0902 \u0915\u0930\u094d\u092e \u092a\u0941\u0930\u0941\u0937\u094b\u0924\u094d\u0924\u092e\u0964\n\n\u0905\u0927\u093f\u092d\u0942\u0924\u0902 \u091a \u0915\u093f\u0902 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u092e\u0927\u093f\u0926\u0948\u0935\u0902 \u0915\u093f\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u09648.1\u0964\u0964", "r": "arjuna uv\u0101cha\nki\u1e41 tad brahma kim adhy\u0101tma\u1e41 ki\u1e41 karma puru\u1e63hottama\nadhibh\u016bta\u1e41 cha ki\u1e41 proktam adhidaiva\u1e41 kim uchyate", "t": "Arjuna said, \"What is Brahman? What is Adhyatma? What is action, O best among men? What is Adhibhuta declared to be? And, what is Adhidaiva said to be?\""}, {"c": 8, "v": 2, "s": "\u0905\u0927\u093f\u092f\u091c\u094d\u091e\u0903 \u0915\u0925\u0902 \u0915\u094b\u093d\u0924\u094d\u0930 \u0926\u0947\u0939\u0947\u093d\u0938\u094d\u092e\u093f\u0928\u094d\u092e\u0927\u0941\u0938\u0942\u0926\u0928\u0964\n\n\u092a\u094d\u0930\u092f\u093e\u0923\u0915\u093e\u0932\u0947 \u091a \u0915\u0925\u0902 \u091c\u094d\u091e\u0947\u092f\u094b\u093d\u0938\u093f \u0928\u093f\u092f\u0924\u093e\u0924\u094d\u092e\u092d\u093f\u0903\u0964\u09648.2\u0964\u0964", "r": "adhiyaj\u00f1a\u1e25 katha\u1e41 ko \u2019tra dehe \u2019smin madhus\u016bdana\npray\u0101\u1e47a-k\u0101le cha katha\u1e41 j\u00f1eyo \u2019si niyat\u0101tmabhi\u1e25", "t": "Who and how is Adhiyajna here in this body, O destroyer of Madhu? And how, at the time of death, are You to be known by the self-controlled?"}, {"c": 8, "v": 3, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0905\u0915\u094d\u0937\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u092a\u0930\u092e\u0902 \u0938\u094d\u0935\u092d\u093e\u0935\u094b\u093d\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\n\n\u092d\u0942\u0924\u092d\u093e\u0935\u094b\u0926\u094d\u092d\u0935\u0915\u0930\u094b \u0935\u093f\u0938\u0930\u094d\u0917\u0903 \u0915\u0930\u094d\u092e\u0938\u0902\u091c\u094d\u091e\u093f\u0924\u0903\u0964\u09648.3\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nak\u1e63hara\u1e41 brahma parama\u1e41 svabh\u0101vo \u2019dhy\u0101tmam uchyate\nbh\u016bta-bh\u0101vodbhava-karo visarga\u1e25 karma-sanj\u00f1ita\u1e25", "t": "The Blessed Lord said, \"Brahman is the Imperishable, the Supreme; its essential nature is called Self-knowledge; the offering (to the gods) that causes the existence and manifestation of beings and sustains them is called action.\""}, {"c": 8, "v": 4, "s": "\u0905\u0927\u093f\u092d\u0942\u0924\u0902 \u0915\u094d\u0937\u0930\u094b \u092d\u093e\u0935\u0903 \u092a\u0941\u0930\u0941\u0937\u0936\u094d\u091a\u093e\u0927\u093f\u0926\u0948\u0935\u0924\u092e\u094d\u0964\n\n\u0905\u0927\u093f\u092f\u091c\u094d\u091e\u094b\u093d\u0939\u092e\u0947\u0935\u093e\u0924\u094d\u0930 \u0926\u0947\u0939\u0947 \u0926\u0947\u0939\u092d\u0943\u0924\u093e\u0902 \u0935\u0930\u0964\u09648.4\u0964\u0964", "r": "adhibh\u016bta\u1e41 k\u1e63haro bh\u0101va\u1e25 puru\u1e63ha\u015bh ch\u0101dhidaivatam\nadhiyaj\u00f1o \u2019ham ev\u0101tra dehe deha-bh\u1e5bit\u0101\u1e41 vara", "t": "Adhibhuta\u2014knowledge of the elements\u2014pertains to My perishable nature, and the Purusha, or the Soul, is the Adhidaiva; I alone am the Adhiyajna here in this body, O best among the embodied."}, {"c": 8, "v": 5, "s": "\u0905\u0928\u094d\u0924\u0915\u093e\u0932\u0947 \u091a \u092e\u093e\u092e\u0947\u0935 \u0938\u094d\u092e\u0930\u0928\u094d\u092e\u0941\u0915\u094d\u0924\u094d\u0935\u093e \u0915\u0932\u0947\u0935\u0930\u092e\u094d\u0964\n\n\u092f\u0903 \u092a\u094d\u0930\u092f\u093e\u0924\u093f \u0938 \u092e\u0926\u094d\u092d\u093e\u0935\u0902 \u092f\u093e\u0924\u093f \u0928\u093e\u0938\u094d\u0924\u094d\u092f\u0924\u094d\u0930 \u0938\u0902\u0936\u092f\u0903\u0964\u09648.5\u0964\u0964", "r": "anta-k\u0101le cha m\u0101m eva smaran muktv\u0101 kalevaram\nya\u1e25 pray\u0101ti sa mad-bh\u0101va\u1e41 y\u0101ti n\u0101styatra san\u015bhaya\u1e25", "t": "And whoever, leaving their body, goes forth remembering Me alone at the time of death, they will attain My Being; there is no doubt about this."}, {"c": 8, "v": 6, "s": "\u092f\u0902 \u092f\u0902 \u0935\u093e\u092a\u093f \u0938\u094d\u092e\u0930\u0928\u094d\u092d\u093e\u0935\u0902 \u0924\u094d\u092f\u091c\u0924\u094d\u092f\u0928\u094d\u0924\u0947 \u0915\u0932\u0947\u0935\u0930\u092e\u094d\u0964\n\n\u0924\u0902 \u0924\u092e\u0947\u0935\u0948\u0924\u093f \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0938\u0926\u093e \u0924\u0926\u094d\u092d\u093e\u0935\u092d\u093e\u0935\u093f\u0924\u0903\u0964\u09648.6\u0964\u0964", "r": "ya\u1e41 ya\u1e41 v\u0101pi smaran bh\u0101va\u1e41 tyajatyante kalevaram\nta\u1e41 tam evaiti kaunteya sad\u0101 tad-bh\u0101va-bh\u0101vita\u1e25", "t": "Whoever at the end leaves the body, thinking of any being, to that being only does he go, O son of Kunti (Arjuna), due to his constant thought of that being."}, {"c": 8, "v": 7, "s": "\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u0915\u093e\u0932\u0947\u0937\u0941 \u092e\u093e\u092e\u0928\u0941\u0938\u094d\u092e\u0930 \u092f\u0941\u0927\u094d\u092f \u091a\u0964\n\n\u092e\u092f\u094d\u092f\u0930\u094d\u092a\u093f\u0924\u092e\u0928\u094b\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092e\u093e\u092e\u0947\u0935\u0948\u0937\u094d\u092f\u0938\u094d\u092f\u0938\u0902\u0936\u092f\u092e\u094d\u0964\u09648.7\u0964\u0964", "r": "tasm\u0101t sarve\u1e63hu k\u0101le\u1e63hu m\u0101m anusmara yudhya cha\nmayyarpita-mano-buddhir m\u0101m evai\u1e63hyasyasan\u015bhayam", "t": "Therefore, at all times, remember Me only and fight. With your mind and intellect fixed on Me, you will undoubtedly come to Me alone."}, {"c": 8, "v": 8, "s": "\u0905\u092d\u094d\u092f\u093e\u0938\u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u0947\u0928 \u091a\u0947\u0924\u0938\u093e \u0928\u093e\u0928\u094d\u092f\u0917\u093e\u092e\u093f\u0928\u093e\u0964\n\n\u092a\u0930\u092e\u0902 \u092a\u0941\u0930\u0941\u0937\u0902 \u0926\u093f\u0935\u094d\u092f\u0902 \u092f\u093e\u0924\u093f \u092a\u093e\u0930\u094d\u0925\u093e\u0928\u0941\u091a\u093f\u0928\u094d\u0924\u092f\u0928\u094d\u0964\u09648.8\u0964\u0964", "r": "abhy\u0101sa-yoga-yuktena chetas\u0101 n\u0101nya-g\u0101min\u0101\nparama\u1e41 puru\u1e63ha\u1e41 divya\u1e41 y\u0101ti p\u0101rth\u0101nuchintayan", "t": "With the mind not moving towards any other thing, made steadfast through the practice of habitual meditation, and constantly meditating, one goes to the Supreme Person, the Resplendent, O Arjuna."}, {"c": 8, "v": 9, "s": "\u0915\u0935\u093f\u0902 \u092a\u0941\u0930\u093e\u0923\u092e\u0928\u0941\u0936\u093e\u0938\u093f\u0924\u093e\u0930\n\n\u092e\u0923\u094b\u0930\u0923\u0940\u092f\u093e\u0902\u0938\u092e\u0928\u0941\u0938\u094d\u092e\u0930\u0947\u0926\u094d\u092f\u0903\u0964\n\n\u0938\u0930\u094d\u0935\u0938\u094d\u092f \u0927\u093e\u0924\u093e\u0930\u092e\u091a\u093f\u0928\u094d\u0924\u094d\u092f\u0930\u0942\u092a\n\n\u092e\u093e\u0926\u093f\u0924\u094d\u092f\u0935\u0930\u094d\u0923\u0902 \u0924\u092e\u0938\u0903 \u092a\u0930\u0938\u094d\u0924\u093e\u0924\u094d\u0964\u09648.9\u0964\u0964", "r": "kavi\u1e41 pur\u0101\u1e47am anu\u015bh\u0101sit\u0101ram\na\u1e47or a\u1e47\u012by\u0101nsam anusmared ya\u1e25\nsarvasya dh\u0101t\u0101ram achintya-r\u016bpam\n\u0101ditya-var\u1e47a\u1e41 tamasa\u1e25 parast\u0101t", "t": "Whosoever meditates on the Omniscient, the Ancient, the Ruler of the whole world, minuter than an atom, the supporter of all, of inconceivable form, effulgent like the sun and beyond the darkness of ignorance."}, {"c": 8, "v": 10, "s": "\u092a\u094d\u0930\u092f\u093e\u0923\u0915\u093e\u0932\u0947 \u092e\u0928\u0938\u093e\u093d\u091a\u0932\u0947\u0928\n\n\u092d\u0915\u094d\u0924\u094d\u092f\u093e \u092f\u0941\u0915\u094d\u0924\u094b \u092f\u094b\u0917\u092c\u0932\u0947\u0928 \u091a\u0948\u0935\u0964\n\n\u092d\u094d\u0930\u0941\u0935\u094b\u0930\u094d\u092e\u0927\u094d\u092f\u0947 \u092a\u094d\u0930\u093e\u0923\u092e\u093e\u0935\u0947\u0936\u094d\u092f \u0938\u092e\u094d\u092f\u0915\u094d\n\n\u0938 \u0924\u0902 \u092a\u0930\u0902 \u092a\u0941\u0930\u0941\u0937\u092e\u0941\u092a\u0948\u0924\u093f \u0926\u093f\u0935\u094d\u092f\u092e\u094d\u0964\u09648.10\u0964\u0964", "r": "pray\u0101\u1e47a-k\u0101le manas\u0101chalena\nbhakty\u0101 yukto yoga-balena chaiva\nbhruvor madhye pr\u0101\u1e47am \u0101ve\u015bhya samyak\nsa ta\u1e41 para\u1e41 puru\u1e63ham upaiti divyam", "t": "At the time of death, with an unwavering mind, endowed with devotion, by the power of Yoga, fixing the whole life-breath in the middle of the two eyebrows, he reaches that resplendent Supreme Person."}, {"c": 8, "v": 11, "s": "\u092f\u0926\u0915\u094d\u0937\u0930\u0902 \u0935\u0947\u0926\u0935\u093f\u0926\u094b \u0935\u0926\u0928\u094d\u0924\u093f\n\n\u0935\u093f\u0936\u0928\u094d\u0924\u093f \u092f\u0926\u094d\u092f\u0924\u092f\u094b \u0935\u0940\u0924\u0930\u093e\u0917\u093e\u0903\u0964\n\n\u092f\u0926\u093f\u091a\u094d\u091b\u0928\u094d\u0924\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u091a\u0930\u094d\u092f\u0902 \u091a\u0930\u0928\u094d\u0924\u093f\n\n\u0924\u0924\u094d\u0924\u0947 \u092a\u0926\u0902 \u0938\u0902\u0917\u094d\u0930\u0939\u0947\u0923 \u092a\u094d\u0930\u0935\u0915\u094d\u0937\u094d\u092f\u0947\u0964\u09648.11\u0964\u0964", "r": "yad ak\u1e63hara\u1e41 veda-vido vadanti\nvi\u015bhanti yad yatayo v\u012bta-r\u0101g\u0101\u1e25\nyad ichchhanto brahmacharya\u1e41 charanti\ntat te pada\u1e41 sa\u1e45grahe\u1e47a pravak\u1e63hye", "t": "That which is declared to be Imperishable by those who know the Vedas, that which the self-controlled (ascetics or Sannyasins) and passion-free enter, that goal, desiring which celibacy is practised, I will declare to thee in brief."}, {"c": 8, "v": 12, "s": "\u0938\u0930\u094d\u0935\u0926\u094d\u0935\u093e\u0930\u093e\u0923\u093f \u0938\u0902\u092f\u092e\u094d\u092f \u092e\u0928\u094b \u0939\u0943\u0926\u093f \u0928\u093f\u0930\u0941\u0927\u094d\u092f \u091a\u0964\n\n\u092e\u0942\u0930\u094d\u0927\u094d\u0928\u094d\u092f\u093e\u0927\u093e\u092f\u093e\u0924\u094d\u092e\u0928\u0903 \u092a\u094d\u0930\u093e\u0923\u092e\u093e\u0938\u094d\u0925\u093f\u0924\u094b \u092f\u094b\u0917\u0927\u093e\u0930\u0923\u093e\u092e\u094d\u0964\u09648.12\u0964\u0964", "r": "sarva-dv\u0101r\u0101\u1e47i sanyamya mano h\u1e5bidi nirudhya cha\nm\u016brdhny\u0101dh\u0101y\u0101tmana\u1e25 pr\u0101\u1e47am \u0101sthito yoga-dh\u0101ra\u1e47\u0101m", "t": "Having closed all the gates, confined the mind in the heart, and fixed the life-breath in the head, engage in the practice of concentration."}, {"c": 8, "v": 13, "s": "\u0913\u092e\u093f\u0924\u094d\u092f\u0947\u0915\u093e\u0915\u094d\u0937\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0935\u094d\u092f\u093e\u0939\u0930\u0928\u094d\u092e\u093e\u092e\u0928\u0941\u0938\u094d\u092e\u0930\u0928\u094d\u0964\n\n\u092f\u0903 \u092a\u094d\u0930\u092f\u093e\u0924\u093f \u0924\u094d\u092f\u091c\u0928\u094d\u0926\u0947\u0939\u0902 \u0938 \u092f\u093e\u0924\u093f \u092a\u0930\u092e\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u09648.13\u0964\u0964", "r": "o\u1e41 ityek\u0101k\u1e63hara\u1e41 brahma vy\u0101haran m\u0101m anusmaran\nya\u1e25 pray\u0101ti tyajan deha\u1e41 sa y\u0101ti param\u0101\u1e41 gatim", "t": "Uttering the one-syllabled Om, the Brahman, and remembering Me, he who departs, leaving the body, attains the Supreme Goal."}, {"c": 8, "v": 14, "s": "\u0905\u0928\u0928\u094d\u092f\u091a\u0947\u0924\u093e\u0903 \u0938\u0924\u0924\u0902 \u092f\u094b \u092e\u093e\u0902 \u0938\u094d\u092e\u0930\u0924\u093f \u0928\u093f\u0924\u094d\u092f\u0936\u0903\u0964\n\n\u0924\u0938\u094d\u092f\u093e\u0939\u0902 \u0938\u0941\u0932\u092d\u0903 \u092a\u093e\u0930\u094d\u0925 \u0928\u093f\u0924\u094d\u092f\u092f\u0941\u0915\u094d\u0924\u0938\u094d\u092f \u092f\u094b\u0917\u093f\u0928\u0903\u0964\u09648.14\u0964\u0964", "r": "ananya-chet\u0101\u1e25 satata\u1e41 yo m\u0101\u1e41 smarati nitya\u015bha\u1e25\ntasy\u0101ha\u1e41 sulabha\u1e25 p\u0101rtha nitya-yuktasya yogina\u1e25", "t": "I am easily attainable by that ever-steadfast yogi who constantly and daily remembers me for a long time, not thinking of anything else with a single-minded or one-pointed focus, O Partha."}, {"c": 8, "v": 15, "s": "\u092e\u093e\u092e\u0941\u092a\u0947\u0924\u094d\u092f \u092a\u0941\u0928\u0930\u094d\u091c\u0928\u094d\u092e \u0926\u0941\u0903\u0916\u093e\u0932\u092f\u092e\u0936\u093e\u0936\u094d\u0935\u0924\u092e\u094d\u0964\n\n\u0928\u093e\u092a\u094d\u0928\u0941\u0935\u0928\u094d\u0924\u093f \u092e\u0939\u093e\u0924\u094d\u092e\u093e\u0928\u0903 \u0938\u0902\u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u092a\u0930\u092e\u093e\u0902 \u0917\u0924\u093e\u0903\u0964\u09648.15\u0964\u0964", "r": "m\u0101m upetya punar janma du\u1e25kh\u0101layam a\u015bh\u0101\u015bhvatam\nn\u0101pnuvanti mah\u0101tm\u0101na\u1e25 sansiddhi\u1e41 param\u0101\u1e41 gat\u0101\u1e25", "t": "Having attained Me, these great souls do not take birth again here\u2014a place of pain and impermanence\u2014but have reached the highest perfection of liberation."}, {"c": 8, "v": 16, "s": "\u0906\u092c\u094d\u0930\u0939\u094d\u092e\u092d\u0941\u0935\u0928\u093e\u0932\u094d\u0932\u094b\u0915\u093e\u0903 \u092a\u0941\u0928\u0930\u093e\u0935\u0930\u094d\u0924\u093f\u0928\u094b\u093d\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u092e\u093e\u092e\u0941\u092a\u0947\u0924\u094d\u092f \u0924\u0941 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092a\u0941\u0928\u0930\u094d\u091c\u0928\u094d\u092e \u0928 \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\u09648.16\u0964\u0964", "r": "\u0101-brahma-bhuvan\u0101l lok\u0101\u1e25 punar \u0101vartino \u2019rjuna\nm\u0101m upetya tu kaunteya punar janma na vidyate", "t": "All the worlds, including the world of Brahma, are subject to return again, O Arjuna; but he who reaches Me, O son of Kunti, has no rebirth."}, {"c": 8, "v": 17, "s": "\u0938\u0939\u0938\u094d\u0930\u092f\u0941\u0917\u092a\u0930\u094d\u092f\u0928\u094d\u0924\u092e\u0939\u0930\u094d\u092f\u0926\u094d\u092c\u094d\u0930\u0939\u094d\u092e\u0923\u094b \u0935\u093f\u0926\u0941\u0903\u0964\n\n\u0930\u093e\u0924\u094d\u0930\u093f\u0902 \u092f\u0941\u0917\u0938\u0939\u0938\u094d\u0930\u093e\u0928\u094d\u0924\u093e\u0902 \u0924\u0947\u093d\u0939\u094b\u0930\u093e\u0924\u094d\u0930\u0935\u093f\u0926\u094b \u091c\u0928\u093e\u0903\u0964\u09648.17\u0964\u0964", "r": "sahasra-yuga-paryantam ahar yad brahma\u1e47o vidu\u1e25\nr\u0101tri\u1e41 yuga-sahasr\u0101nt\u0101\u1e41 te \u2019ho-r\u0101tra-vido jan\u0101\u1e25", "t": "Those who know the day of Brahma, which lasts a thousand Yugas, and the night, which also lasts a thousand Yugas, know day and night."}, {"c": 8, "v": 18, "s": "\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u093e\u0926\u094d\u0935\u094d\u092f\u0915\u094d\u0924\u092f\u0903 \u0938\u0930\u094d\u0935\u093e\u0903 \u092a\u094d\u0930\u092d\u0935\u0928\u094d\u0924\u094d\u092f\u0939\u0930\u093e\u0917\u092e\u0947\u0964\n\n\u0930\u093e\u0924\u094d\u0930\u094d\u092f\u093e\u0917\u092e\u0947 \u092a\u094d\u0930\u0932\u0940\u092f\u0928\u094d\u0924\u0947 \u0924\u0924\u094d\u0930\u0948\u0935\u093e\u0935\u094d\u092f\u0915\u094d\u0924\u0938\u0902\u091c\u094d\u091e\u0915\u0947\u0964\u09648.18\u0964\u0964", "r": "avyakt\u0101d vyaktaya\u1e25 sarv\u0101\u1e25 prabhavantyahar-\u0101game\nr\u0101try\u0101game pral\u012byante tatraiv\u0101vyakta-sanj\u00f1ake", "t": "From the Unmanifested, all the manifested worlds proceed upon the arrival of the 'day'; upon the arrival of the 'night', they dissolve indeed into that which is known as the Unmanifested."}, {"c": 8, "v": 19, "s": "\u092d\u0942\u0924\u0917\u094d\u0930\u093e\u092e\u0903 \u0938 \u090f\u0935\u093e\u092f\u0902 \u092d\u0942\u0924\u094d\u0935\u093e \u092d\u0942\u0924\u094d\u0935\u093e \u092a\u094d\u0930\u0932\u0940\u092f\u0924\u0947\u0964\n\n\u0930\u093e\u0924\u094d\u0930\u094d\u092f\u093e\u0917\u092e\u0947\u093d\u0935\u0936\u0903 \u092a\u093e\u0930\u094d\u0925 \u092a\u094d\u0930\u092d\u0935\u0924\u094d\u092f\u0939\u0930\u093e\u0917\u092e\u0947\u0964\u09648.19\u0964\u0964", "r": "bh\u016bta-gr\u0101ma\u1e25 sa ev\u0101ya\u1e41 bh\u016btv\u0101 bh\u016btv\u0101 pral\u012byate\nr\u0101try\u0101game \u2019va\u015bha\u1e25 p\u0101rtha prabhavatyahar-\u0101game", "t": "This same multitude of beings, being born again and again, helplessly dissolves, O Arjuna, into the Unmanifested at the coming of the night and comes forth at the coming of the day."}, {"c": 8, "v": 20, "s": "\u092a\u0930\u0938\u094d\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0924\u0941 \u092d\u093e\u0935\u094b\u093d\u0928\u094d\u092f\u094b\u093d\u0935\u094d\u092f\u0915\u094d\u0924\u094b\u093d\u0935\u094d\u092f\u0915\u094d\u0924\u093e\u0924\u094d\u0938\u0928\u093e\u0924\u0928\u0903\u0964\n\n\u092f\u0903 \u0938 \u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u092d\u0942\u0924\u0947\u0937\u0941 \u0928\u0936\u094d\u092f\u0924\u094d\u0938\u0941 \u0928 \u0935\u093f\u0928\u0936\u094d\u092f\u0924\u093f\u0964\u09648.20\u0964\u0964", "r": "paras tasm\u0101t tu bh\u0101vo \u2019nyo \u2019vyakto \u2019vyakt\u0101t san\u0101tana\u1e25\nya\u1e25 sa sarve\u1e63hu bh\u016bte\u1e63hu na\u015bhyatsu na vina\u015bhyati", "t": "But verily, there exists higher than this Unmanifested, another Unmanifested Eternal, which is not destroyed even when all beings are destroyed."}, {"c": 8, "v": 21, "s": "\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u094b\u093d\u0915\u094d\u0937\u0930 \u0907\u0924\u094d\u092f\u0941\u0915\u094d\u0924\u0938\u094d\u0924\u092e\u093e\u0939\u0941\u0903 \u092a\u0930\u092e\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\n\n\u092f\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u092f \u0928 \u0928\u093f\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u0924\u0926\u094d\u0927\u093e\u092e \u092a\u0930\u092e\u0902 \u092e\u092e\u0964\u09648.21\u0964\u0964", "r": "avyakto \u2019k\u1e63hara ityuktas tam \u0101hu\u1e25 param\u0101\u1e41 gatim\nya\u1e41 pr\u0101pya na nivartante tad dh\u0101ma parama\u1e41 mama", "t": "What is known as the Unmanifested and the Imperishable, That is said to be the highest goal. Those who reach It do not return (to this Samsara). That is My supreme abode (place or state)."}, {"c": 8, "v": 22, "s": "\u092a\u0941\u0930\u0941\u0937\u0903 \u0938 \u092a\u0930\u0903 \u092a\u093e\u0930\u094d\u0925 \u092d\u0915\u094d\u0924\u094d\u092f\u093e \u0932\u092d\u094d\u092f\u0938\u094d\u0924\u094d\u0935\u0928\u0928\u094d\u092f\u092f\u093e\u0964\n\n\u092f\u0938\u094d\u092f\u093e\u0928\u094d\u0924\u0903\u0938\u094d\u0925\u093e\u0928\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u092f\u0947\u0928 \u0938\u0930\u094d\u0935\u092e\u093f\u0926\u0902 \u0924\u0924\u092e\u094d\u0964\u09648.22\u0964\u0964", "r": "puru\u1e63ha\u1e25 sa para\u1e25 p\u0101rtha bhakty\u0101 labhyas tvananyay\u0101\nyasy\u0101nta\u1e25-sth\u0101ni bh\u016bt\u0101ni yena sarvam ida\u1e41 tatam", "t": "That highest Purusha, O Arjuna, is attainable by unswerving devotion to Him alone, within Whom all beings dwell and by Whom all this is pervaded."}, {"c": 8, "v": 23, "s": "\u092f\u0924\u094d\u0930 \u0915\u093e\u0932\u0947 \u0924\u094d\u0935\u0928\u093e\u0935\u0943\u0924\u094d\u0924\u093f\u092e\u093e\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091a\u0948\u0935 \u092f\u094b\u0917\u093f\u0928\u0903\u0964\n\n\u092a\u094d\u0930\u092f\u093e\u0924\u093e \u092f\u093e\u0928\u094d\u0924\u093f \u0924\u0902 \u0915\u093e\u0932\u0902 \u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u093f \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\u09648.23\u0964\u0964", "r": "yatra k\u0101le tvan\u0101v\u1e5bittim \u0101v\u1e5bitti\u1e41 chaiva yogina\u1e25\npray\u0101t\u0101 y\u0101nti ta\u1e41 k\u0101la\u1e41 vak\u1e63hy\u0101mi bharatar\u1e63habha", "t": "Now I will tell you, O chief of the Bharatas, the times of departure at which the Yogis will return or not return."}, {"c": 8, "v": 24, "s": "\u0905\u0917\u094d\u0928\u093f\u0930\u094d\u091c\u094d\u092f\u094b\u0924\u093f\u0930\u0939\u0903 \u0936\u0941\u0915\u094d\u0932\u0903 \u0937\u0923\u094d\u092e\u093e\u0938\u093e \u0909\u0924\u094d\u0924\u0930\u093e\u092f\u0923\u092e\u094d\u0964\n\n\u0924\u0924\u094d\u0930 \u092a\u094d\u0930\u092f\u093e\u0924\u093e \u0917\u091a\u094d\u091b\u0928\u094d\u0924\u093f \u092c\u094d\u0930\u0939\u094d\u092e \u092c\u094d\u0930\u0939\u094d\u092e\u0935\u093f\u0926\u094b \u091c\u0928\u093e\u0903\u0964\u09648.24\u0964\u0964", "r": "agnir jyotir aha\u1e25 \u015bhukla\u1e25 \u1e63ha\u1e47-m\u0101s\u0101 uttar\u0101ya\u1e47am\ntatra pray\u0101t\u0101 gachchhanti brahma brahma-vido jan\u0101\u1e25", "t": "Fire, light, daytime, the bright fortnight, the six months of the northern path of the sun (the northern solstice) departing, then men who know Brahman go to Brahman."}, {"c": 8, "v": 25, "s": "\u0927\u0942\u092e\u094b \u0930\u093e\u0924\u094d\u0930\u093f\u0938\u094d\u0924\u0925\u093e \u0915\u0943\u0937\u094d\u0923\u0903 \u0937\u0923\u094d\u092e\u093e\u0938\u093e \u0926\u0915\u094d\u0937\u093f\u0923\u093e\u092f\u0928\u092e\u094d\u0964\n\n\u0924\u0924\u094d\u0930 \u091a\u093e\u0928\u094d\u0926\u094d\u0930\u092e\u0938\u0902 \u091c\u094d\u092f\u094b\u0924\u093f\u0930\u094d\u092f\u094b\u0917\u0940 \u092a\u094d\u0930\u093e\u092a\u094d\u092f \u0928\u093f\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09648.25\u0964\u0964", "r": "dh\u016bmo r\u0101tris tath\u0101 k\u1e5bi\u1e63h\u1e47a\u1e25 \u1e63ha\u1e47-m\u0101s\u0101 dak\u1e63hi\u1e47\u0101yanam\ntatra ch\u0101ndramasa\u1e41 jyotir yog\u012b pr\u0101pya nivartate", "t": "Attaining the lunar light through smoke, night time, the dark fortnight, and the six months of the southern path of the sun (the southern solstice), the yogi returns."}, {"c": 8, "v": 26, "s": "\u0936\u0941\u0915\u094d\u0932\u0915\u0943\u0937\u094d\u0923\u0947 \u0917\u0924\u0940 \u0939\u094d\u092f\u0947\u0924\u0947 \u091c\u0917\u0924\u0903 \u0936\u093e\u0936\u094d\u0935\u0924\u0947 \u092e\u0924\u0947\u0964\n\n\u090f\u0915\u092f\u093e \u092f\u093e\u0924\u094d\u092f\u0928\u093e\u0935\u0943\u0924\u094d\u0924\u093f\u092e\u0928\u094d\u092f\u092f\u093e\u093d\u093d\u0935\u0930\u094d\u0924\u0924\u0947 \u092a\u0941\u0928\u0903\u0964\u09648.26\u0964\u0964", "r": "\u015bhukla-k\u1e5bi\u1e63h\u1e47e gat\u012b hyete jagata\u1e25 \u015bh\u0101\u015bhvate mate\nekay\u0101 y\u0101tyan\u0101v\u1e5bittim anyay\u0101vartate puna\u1e25", "t": "The bright and dark paths of the world are thought to be eternal; one leads to no return, and the other leads to return."}, {"c": 8, "v": 27, "s": "\u0928\u0948\u0924\u0947 \u0938\u0943\u0924\u0940 \u092a\u093e\u0930\u094d\u0925 \u091c\u093e\u0928\u0928\u094d\u092f\u094b\u0917\u0940 \u092e\u0941\u0939\u094d\u092f\u0924\u093f \u0915\u0936\u094d\u091a\u0928\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u0915\u093e\u0932\u0947\u0937\u0941 \u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u094b \u092d\u0935\u093e\u0930\u094d\u091c\u0941\u0928\u0964\u09648.27\u0964\u0964", "r": "naite s\u1e5bit\u012b p\u0101rtha j\u0101nan yog\u012b muhyati ka\u015bhchana\ntasm\u0101t sarve\u1e63hu k\u0101le\u1e63hu yoga-yukto bhav\u0101rjuna", "t": "Knowing these paths, O Arjuna, no yogi is deluded; therefore, at all times, be steadfast in yoga."}, {"c": 8, "v": 28, "s": "\u0935\u0947\u0926\u0947\u0937\u0941 \u092f\u091c\u094d\u091e\u0947\u0937\u0941 \u0924\u092a\u0903\u0938\u0941 \u091a\u0948\u0935\n\n\u0926\u093e\u0928\u0947\u0937\u0941 \u092f\u0924\u094d\u092a\u0941\u0923\u094d\u092f\u092b\u0932\u0902 \u092a\u094d\u0930\u0926\u093f\u0937\u094d\u091f\u092e\u094d\u0964\n\n\u0905\u0924\u094d\u092f\u0947\u0924\u093f \u0924\u0924\u094d\u0938\u0930\u094d\u0935\u092e\u093f\u0926\u0902 \u0935\u093f\u0926\u093f\u0924\u094d\u0935\u093e\n\n\u092f\u094b\u0917\u0940 \u092a\u0930\u0902 \u0938\u094d\u0925\u093e\u0928\u092e\u0941\u092a\u0948\u0924\u093f \u091a\u093e\u0926\u094d\u092f\u092e\u094d\u0964\u09648.28\u0964\u0964", "r": "vede\u1e63hu yaj\u00f1e\u1e63hu tapa\u1e25su chaiva\nd\u0101ne\u1e63hu yat pu\u1e47ya-phala\u1e41 pradi\u1e63h\u1e6dam\natyeti tat sarvam ida\u1e41 viditv\u0101\nyog\u012b para\u1e41 sth\u0101nam upaiti ch\u0101dyam", "t": "Whatever fruit of merit is declared (in the scriptures) to accrue from (the study of) the Vedas, (the performance of) sacrifices, (the practice of) austerities, and gifts, beyond all this goes the Yogi, having known this; and he attains to the Supreme, Primeval (first or ancient) Abode."}, {"c": 9, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0907\u0926\u0902 \u0924\u0941 \u0924\u0947 \u0917\u0941\u0939\u094d\u092f\u0924\u092e\u0902 \u092a\u094d\u0930\u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u094d\u092f\u0928\u0938\u0942\u092f\u0935\u0947\u0964\n\n\u091c\u094d\u091e\u093e\u0928\u0902 \u0935\u093f\u091c\u094d\u091e\u093e\u0928\u0938\u0939\u093f\u0924\u0902 \u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u092e\u094b\u0915\u094d\u0937\u094d\u092f\u0938\u0947\u093d\u0936\u0941\u092d\u093e\u0924\u094d\u0964\u09649.1\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nida\u1e41 tu te guhyatama\u1e41 pravak\u1e63hy\u0101myanas\u016byave\nj\u00f1\u0101na\u1e41 vij\u00f1\u0101na-sahita\u1e41 yaj j\u00f1\u0101tv\u0101 mok\u1e63hyase \u2019\u015bhubh\u0101t", "t": "The Blessed Lord said, \"I shall now declare to thee, who does not cavil, the greatest secret\u2014the knowledge combined with experience (Self-realisation). Having known this, thou shalt be free from evil.\""}, {"c": 9, "v": 2, "s": "\u0930\u093e\u091c\u0935\u093f\u0926\u094d\u092f\u093e \u0930\u093e\u091c\u0917\u0941\u0939\u094d\u092f\u0902 \u092a\u0935\u093f\u0924\u094d\u0930\u092e\u093f\u0926\u092e\u0941\u0924\u094d\u0924\u092e\u092e\u094d\u0964\n\n\u092a\u094d\u0930\u0924\u094d\u092f\u0915\u094d\u0937\u093e\u0935\u0917\u092e\u0902 \u0927\u0930\u094d\u092e\u094d\u092f\u0902 \u0938\u0941\u0938\u0941\u0916\u0902 \u0915\u0930\u094d\u0924\u0941\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u09649.2\u0964\u0964", "r": "r\u0101ja-vidy\u0101 r\u0101ja-guhya\u1e41 pavitram idam uttamam\npratyak\u1e63h\u0101vagama\u1e41 dharmya\u1e41 su-sukha\u1e41 kartum avyayam", "t": "This is the royal science, the royal secret, the supreme purifier, realizable by direct intuitive knowledge, according to righteousness, very easy to perform and imperishable."}, {"c": 9, "v": 3, "s": "\u0905\u0936\u094d\u0930\u0926\u094d\u0926\u0927\u093e\u0928\u093e\u0903 \u092a\u0941\u0930\u0941\u0937\u093e \u0927\u0930\u094d\u092e\u0938\u094d\u092f\u093e\u0938\u094d\u092f \u092a\u0930\u0928\u094d\u0924\u092a\u0964\n\n\u0905\u092a\u094d\u0930\u093e\u092a\u094d\u092f \u092e\u093e\u0902 \u0928\u093f\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u092e\u0943\u0924\u094d\u092f\u0941\u0938\u0902\u0938\u093e\u0930\u0935\u0930\u094d\u0924\u094d\u092e\u0928\u093f\u0964\u09649.3\u0964\u0964", "r": "a\u015bhraddadh\u0101n\u0101\u1e25 puru\u1e63h\u0101 dharmasy\u0101sya parantapa\napr\u0101pya m\u0101\u1e41 nivartante m\u1e5bityu-sams\u0101ra-vartmani", "t": "Those who have no faith in this Dharma, O Parantapa, return to the path of this world without attaining Me."}, {"c": 9, "v": 4, "s": "\u092e\u092f\u093e \u0924\u0924\u092e\u093f\u0926\u0902 \u0938\u0930\u094d\u0935\u0902 \u091c\u0917\u0926\u0935\u094d\u092f\u0915\u094d\u0924\u092e\u0942\u0930\u094d\u0924\u093f\u0928\u093e\u0964\n\n\u092e\u0924\u094d\u0938\u094d\u0925\u093e\u0928\u093f \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093f \u0928 \u091a\u093e\u0939\u0902 \u0924\u0947\u0937\u094d\u0935\u0935\u0938\u094d\u0925\u093f\u0924\u0903\u0964\u09649.4\u0964\u0964", "r": "may\u0101 tatam ida\u1e41 sarva\u1e41 jagad avyakta-m\u016brtin\u0101\nmat-sth\u0101ni sarva-bh\u016bt\u0101ni na ch\u0101ha\u1e41 te\u1e63hvavasthita\u1e25", "t": "All of this world is pervaded by Me in My unmanifest aspect; all beings exist within Me, but I do not dwell within them."}, {"c": 9, "v": 5, "s": "\u0928 \u091a \u092e\u0924\u094d\u0938\u094d\u0925\u093e\u0928\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u092a\u0936\u094d\u092f \u092e\u0947 \u092f\u094b\u0917\u092e\u0948\u0936\u094d\u0935\u0930\u092e\u094d\u0964\n\n\u092d\u0942\u0924\u092d\u0943\u0928\u094d\u0928 \u091a \u092d\u0942\u0924\u0938\u094d\u0925\u094b \u092e\u092e\u093e\u0924\u094d\u092e\u093e \u092d\u0942\u0924\u092d\u093e\u0935\u0928\u0903\u0964\u09649.5\u0964\u0964", "r": "na cha mat-sth\u0101ni bh\u016bt\u0101ni pa\u015bhya me yogam ai\u015bhwaram\nbh\u016bta-bh\u1e5bin na cha bh\u016bta-stho mam\u0101tm\u0101 bh\u016bta-bh\u0101vana\u1e25", "t": "Nor do beings exist in Me (in reality); behold, My divine Yoga, which supports all beings, but does not dwell in them, is My Self, the efficient cause of beings."}, {"c": 9, "v": 6, "s": "\u092f\u0925\u093e\u093d\u093d\u0915\u093e\u0936\u0938\u094d\u0925\u093f\u0924\u094b \u0928\u093f\u0924\u094d\u092f\u0902 \u0935\u093e\u092f\u0941\u0903 \u0938\u0930\u094d\u0935\u0924\u094d\u0930\u0917\u094b \u092e\u0939\u093e\u0928\u094d\u0964\n\n\u0924\u0925\u093e \u0938\u0930\u094d\u0935\u093e\u0923\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u092e\u0924\u094d\u0938\u094d\u0925\u093e\u0928\u0940\u0924\u094d\u092f\u0941\u092a\u0927\u093e\u0930\u092f\u0964\u09649.6\u0964\u0964", "r": "yath\u0101k\u0101\u015bha-sthito nitya\u1e41 v\u0101yu\u1e25 sarvatra-go mah\u0101n\ntath\u0101 sarv\u0101\u1e47i bh\u016bt\u0101ni mat-sth\u0101n\u012btyupadh\u0101raya", "t": "As the mighty wind, moving everywhere, always rests in the ether, so too, know that all beings rest in Me."}, {"c": 9, "v": 7, "s": "\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093f \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u092f\u093e\u0928\u094d\u0924\u093f \u092e\u093e\u092e\u093f\u0915\u093e\u092e\u094d\u0964\n\n\u0915\u0932\u094d\u092a\u0915\u094d\u0937\u092f\u0947 \u092a\u0941\u0928\u0938\u094d\u0924\u093e\u0928\u093f \u0915\u0932\u094d\u092a\u093e\u0926\u094c \u0935\u093f\u0938\u0943\u091c\u093e\u092e\u094d\u092f\u0939\u092e\u094d\u0964\u09649.7\u0964\u0964", "r": "sarva-bh\u016bt\u0101ni kaunteya prak\u1e5biti\u1e41 y\u0101nti m\u0101mik\u0101m\nkalpa-k\u1e63haye punas t\u0101ni kalp\u0101dau vis\u1e5bij\u0101myaham", "t": "All beings, O Arjuna, go into My Nature at the end of a Kalpa; I send them forth again at the beginning of the next Kalpa."}, {"c": 9, "v": 8, "s": "\u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u0938\u094d\u0935\u093e\u092e\u0935\u0937\u094d\u091f\u092d\u094d\u092f \u0935\u093f\u0938\u0943\u091c\u093e\u092e\u093f \u092a\u0941\u0928\u0903 \u092a\u0941\u0928\u0903\u0964\n\n\u092d\u0942\u0924\u0917\u094d\u0930\u093e\u092e\u092e\u093f\u092e\u0902 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u092e\u0935\u0936\u0902 \u092a\u094d\u0930\u0915\u0943\u0924\u0947\u0930\u094d\u0935\u0936\u093e\u0924\u094d\u0964\u09649.8\u0964\u0964", "r": "prak\u1e5biti\u1e41 sv\u0101m ava\u1e63h\u1e6dabhya vis\u1e5bij\u0101mi puna\u1e25 puna\u1e25\nbh\u016bta-gr\u0101mam ima\u1e41 k\u1e5bitsnam ava\u015bha\u1e41 prak\u1e5biter va\u015bh\u0101t", "t": "Animating My Nature, I again and again send forth all this multitude of beings, helpless under the force of Nature."}, {"c": 9, "v": 9, "s": "\u0928 \u091a \u092e\u093e\u0902 \u0924\u093e\u0928\u093f \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0928\u093f\u092c\u0927\u094d\u0928\u0928\u094d\u0924\u093f \u0927\u0928\u091e\u094d\u091c\u092f\u0964\n\n\u0909\u0926\u093e\u0938\u0940\u0928\u0935\u0926\u093e\u0938\u0940\u0928\u092e\u0938\u0915\u094d\u0924\u0902 \u0924\u0947\u0937\u0941 \u0915\u0930\u094d\u092e\u0938\u0941\u0964\u09649.9\u0964\u0964", "r": "na cha m\u0101\u1e41 t\u0101ni karm\u0101\u1e47i nibadhnanti dhana\u00f1jaya\nud\u0101s\u012bna-vad \u0101s\u012bnam asakta\u1e41 te\u1e63hu karmasu", "t": "These acts do not bind Me, O Arjuna, sitting as one indifferent, unattached to those acts."}, {"c": 9, "v": 10, "s": "\u092e\u092f\u093e\u093d\u0927\u094d\u092f\u0915\u094d\u0937\u0947\u0923 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0903 \u0938\u0942\u092f\u0924\u0947 \u0938\u091a\u0930\u093e\u091a\u0930\u092e\u094d\u0964\n\n\u0939\u0947\u0924\u0941\u0928\u093e\u093d\u0928\u0947\u0928 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u091c\u0917\u0926\u094d\u0935\u093f\u092a\u0930\u093f\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09649.10\u0964\u0964", "r": "may\u0101dhyak\u1e63he\u1e47a prak\u1e5biti\u1e25 s\u016byate sa-char\u0101charam\nhetun\u0101nena kaunteya jagad viparivartate", "t": "Under Me, as supervisor, Nature produces the moving and the unmoving; therefore, O Arjuna, the world revolves."}, {"c": 9, "v": 11, "s": "\u0905\u0935\u091c\u093e\u0928\u0928\u094d\u0924\u093f \u092e\u093e\u0902 \u092e\u0942\u0922\u093e \u092e\u093e\u0928\u0941\u0937\u0940\u0902 \u0924\u0928\u0941\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u092e\u094d\u0964\n\n\u092a\u0930\u0902 \u092d\u093e\u0935\u092e\u091c\u093e\u0928\u0928\u094d\u0924\u094b \u092e\u092e \u092d\u0942\u0924\u092e\u0939\u0947\u0936\u094d\u0935\u0930\u092e\u094d\u0964\u09649.11\u0964\u0964", "r": "avaj\u0101nanti m\u0101\u1e41 m\u016b\u1e0dh\u0101 m\u0101nu\u1e63h\u012b\u1e41 tanum \u0101\u015bhritam\npara\u1e41 bh\u0101vam aj\u0101nanto mama bh\u016bta-mahe\u015bhvaram", "t": "Fools disregard Me, clad in human form, not knowing My higher Being as the great Lord of all beings."}, {"c": 9, "v": 12, "s": "\u092e\u094b\u0918\u093e\u0936\u093e \u092e\u094b\u0918\u0915\u0930\u094d\u092e\u093e\u0923\u094b \u092e\u094b\u0918\u091c\u094d\u091e\u093e\u0928\u093e \u0935\u093f\u091a\u0947\u0924\u0938\u0903\u0964\n\n\u0930\u093e\u0915\u094d\u0937\u0938\u0940\u092e\u093e\u0938\u0941\u0930\u0940\u0902 \u091a\u0948\u0935 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u092e\u094b\u0939\u093f\u0928\u0940\u0902 \u0936\u094d\u0930\u093f\u0924\u093e\u0903\u0964\u09649.12\u0964\u0964", "r": "mogh\u0101\u015bh\u0101 mogha-karm\u0101\u1e47o mogha-j\u00f1\u0101n\u0101 vichetasa\u1e25\nr\u0101k\u1e63has\u012bm \u0101sur\u012b\u1e41 chaiva prak\u1e5biti\u1e41 mohin\u012b\u1e41 \u015bhrit\u0101\u1e25", "t": "They are possessed of the deceitful nature of demons and undivine beings, filled with vain hopes, vain actions, and vain knowledge that is senseless."}, {"c": 9, "v": 13, "s": "\u092e\u0939\u093e\u0924\u094d\u092e\u093e\u0928\u0938\u094d\u0924\u0941 \u092e\u093e\u0902 \u092a\u093e\u0930\u094d\u0925 \u0926\u0948\u0935\u0940\u0902 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u093e\u0903\u0964\n\n\u092d\u091c\u0928\u094d\u0924\u094d\u092f\u0928\u0928\u094d\u092f\u092e\u0928\u0938\u094b \u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u092d\u0942\u0924\u093e\u0926\u093f\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u09649.13\u0964\u0964", "r": "mah\u0101tm\u0101nas tu m\u0101\u1e41 p\u0101rtha daiv\u012b\u1e41 prak\u1e5bitim \u0101\u015bhrit\u0101\u1e25\nbhajantyananya-manaso j\u00f1\u0101tv\u0101 bh\u016bt\u0101dim avyayam", "t": "But the great souls, O Arjuna, partaking of My divine nature, worship Me with a single-minded devotion, knowing Me as the imperishable source of all beings."}, {"c": 9, "v": 14, "s": "\u0938\u0924\u0924\u0902 \u0915\u0940\u0930\u094d\u0924\u092f\u0928\u094d\u0924\u094b \u092e\u093e\u0902 \u092f\u0924\u0928\u094d\u0924\u0936\u094d\u091a \u0926\u0943\u0922\u0935\u094d\u0930\u0924\u093e\u0903\u0964\n\n\u0928\u092e\u0938\u094d\u092f\u0928\u094d\u0924\u0936\u094d\u091a \u092e\u093e\u0902 \u092d\u0915\u094d\u0924\u094d\u092f\u093e \u0928\u093f\u0924\u094d\u092f\u092f\u0941\u0915\u094d\u0924\u093e \u0909\u092a\u093e\u0938\u0924\u0947\u0964\u09649.14\u0964\u0964", "r": "satata\u1e41 k\u012brtayanto m\u0101\u1e41 yatanta\u015bh cha d\u1e5bi\u1e0dha-vrat\u0101\u1e25\nnamasyanta\u015bh cha m\u0101\u1e41 bhakty\u0101 nitya-yukt\u0101 up\u0101sate", "t": "Always glorifying Me, striving, firm in their vows, prostrating themselves before Me, they worship Me with steadfast devotion."}, {"c": 9, "v": 15, "s": "\u091c\u094d\u091e\u093e\u0928\u092f\u091c\u094d\u091e\u0947\u0928 \u091a\u093e\u092a\u094d\u092f\u0928\u094d\u092f\u0947 \u092f\u091c\u0928\u094d\u0924\u094b \u092e\u093e\u092e\u0941\u092a\u093e\u0938\u0924\u0947\u0964\n\n\u090f\u0915\u0924\u094d\u0935\u0947\u0928 \u092a\u0943\u0925\u0915\u094d\u0924\u094d\u0935\u0947\u0928 \u092c\u0939\u0941\u0927\u093e \u0935\u093f\u0936\u094d\u0935\u0924\u094b\u092e\u0941\u0916\u092e\u094d\u0964\u09649.15\u0964\u0964", "r": "j\u00f1\u0101na-yaj\u00f1ena ch\u0101pyanye yajanto m\u0101m up\u0101sate\nekatvena p\u1e5bithaktvena bahudh\u0101 vi\u015bhvato-mukham", "t": "Others also, sacrificing with the wisdom-sacrifice, worship Me, the All-Faced, as one, distinct, and manifold."}, {"c": 9, "v": 16, "s": "\u0905\u0939\u0902 \u0915\u094d\u0930\u0924\u0941\u0930\u0939\u0902 \u092f\u091c\u094d\u091e\u0903 \u0938\u094d\u0935\u0927\u093e\u093d\u0939\u092e\u0939\u092e\u094c\u0937\u0927\u092e\u094d\u0964\n\n\u092e\u0902\u0924\u094d\u0930\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u091c\u094d\u092f\u092e\u0939\u092e\u0917\u094d\u0928\u093f\u0930\u0939\u0902 \u0939\u0941\u0924\u092e\u094d\u0964\u09649.16\u0964\u0964", "r": "aha\u1e41 kratur aha\u1e41 yaj\u00f1a\u1e25 svadh\u0101ham aham au\u1e63hadham\nmantro \u2019ham aham ev\u0101jyam aham agnir aha\u1e41 hutam", "t": "I am Kratu; I am Yajna; I am the offering to the manes; I am the medicinal herbs and all plants; I am the Mantra; I am also the ghee or melted butter; I am the fire; I am the oblation."}, {"c": 9, "v": 17, "s": "\u092a\u093f\u0924\u093e\u093d\u0939\u092e\u0938\u094d\u092f \u091c\u0917\u0924\u094b \u092e\u093e\u0924\u093e \u0927\u093e\u0924\u093e \u092a\u093f\u0924\u093e\u092e\u0939\u0903\u0964\n\n\u0935\u0947\u0926\u094d\u092f\u0902 \u092a\u0935\u093f\u0924\u094d\u0930\u092e\u094b\u0902\u0915\u093e\u0930 \u090b\u0915\u094d \u0938\u093e\u092e \u092f\u091c\u0941\u0930\u0947\u0935 \u091a\u0964\u09649.17\u0964\u0964", "r": "pit\u0101ham asya jagato m\u0101t\u0101 dh\u0101t\u0101 pit\u0101maha\u1e25\nvedya\u1e41 pavitram o\u1e41k\u0101ra \u1e5bik s\u0101ma yajur eva cha", "t": "I am the father of this world, the mother, the dispenser of the fruits of actions, and the grandfather; the one thing to be known, the purifier, the sacred monosyllable (Om), and also the Rik, Sama, and Yajur Vedas."}, {"c": 9, "v": 18, "s": "\u0917\u0924\u093f\u0930\u094d\u092d\u0930\u094d\u0924\u093e \u092a\u094d\u0930\u092d\u0941\u0903 \u0938\u093e\u0915\u094d\u0937\u0940 \u0928\u093f\u0935\u093e\u0938\u0903 \u0936\u0930\u0923\u0902 \u0938\u0941\u0939\u0943\u0924\u094d\u0964\n\n\u092a\u094d\u0930\u092d\u0935\u0903 \u092a\u094d\u0930\u0932\u092f\u0903 \u0938\u094d\u0925\u093e\u0928\u0902 \u0928\u093f\u0927\u093e\u0928\u0902 \u09
