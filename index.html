e \u2019rthe na tva\u1e41 \u015bhochitum arhasi", "t": "For the born, death is certain, and for the dead, birth is certain; therefore, you should not grieve over the inevitable."}, {"c": 2, "v": 28, "s": "\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u093e\u0926\u0940\u0928\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0935\u094d\u092f\u0915\u094d\u0924\u092e\u0927\u094d\u092f\u093e\u0928\u093f \u092d\u093e\u0930\u0924\u0964\n\n\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u0928\u093f\u0927\u0928\u093e\u0928\u094d\u092f\u0947\u0935 \u0924\u0924\u094d\u0930 \u0915\u093e \u092a\u0930\u093f\u0926\u0947\u0935\u0928\u093e\u0964\u09642.28\u0964\u0964", "r": "avyakt\u0101d\u012bni bh\u016bt\u0101ni vyakta-madhy\u0101ni bh\u0101rata\navyakta-nidhan\u0101nyeva tatra k\u0101 paridevan\u0101", "t": "Beings are unmanifest in their beginning, manifest in their middle state, O Arjuna, and unmanifest again in their end. What is there to grieve about?"}, {"c": 2, "v": 29, "s": "\u0906\u0936\u094d\u091a\u0930\u094d\u092f\u0935\u0924\u094d\u092a\u0936\u094d\u092f\u0924\u093f \u0915\u0936\u094d\u091a\u093f\u0926\u0947\u0928\n\n\u092e\u093e\u0936\u094d\u091a\u0930\u094d\u092f\u0935\u0926\u094d\u0935\u0926\u0924\u093f \u0924\u0925\u0948\u0935 \u091a\u093e\u0928\u094d\u092f\u0903\u0964\n\n\u0906\u0936\u094d\u091a\u0930\u094d\u092f\u0935\u091a\u094d\u091a\u0948\u0928\u092e\u0928\u094d\u092f\u0903 \u0936\u094d\u0930\u0943\u0923\u094b\u0924\u093f\n\n\u0936\u094d\u0930\u0941\u0924\u094d\u0935\u093e\u092a\u094d\u092f\u0947\u0928\u0902 \u0935\u0947\u0926 \u0928 \u091a\u0948\u0935 \u0915\u0936\u094d\u091a\u093f\u0924\u094d\u0964\u09642.29\u0964\u0964", "r": "\u0101\u015bhcharya-vat pa\u015bhyati ka\u015bhchid enan\n\u0101\u015bhcharya-vad vadati tathaiva ch\u0101nya\u1e25\n\u0101\u015bhcharya-vach chainam anya\u1e25 \u015bh\u1e5bi\u1e47oti\n\u015bhrutv\u0101pyena\u1e41 veda na chaiva ka\u015bhchit", "t": "One sees this (the Self) as a wonder; another speaks of it as a wonder; another hears of it as a wonder; yet, having heard, none understands it at all."}, {"c": 2, "v": 30, "s": "\u0926\u0947\u0939\u0940 \u0928\u093f\u0924\u094d\u092f\u092e\u0935\u0927\u094d\u092f\u094b\u093d\u092f\u0902 \u0926\u0947\u0939\u0947 \u0938\u0930\u094d\u0935\u0938\u094d\u092f \u092d\u093e\u0930\u0924\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0938\u0930\u094d\u0935\u093e\u0923\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0928 \u0924\u094d\u0935\u0902 \u0936\u094b\u091a\u093f\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u093f\u0964\u09642.30\u0964\u0964", "r": "deh\u012b nityam avadhyo \u2019ya\u1e41 dehe sarvasya bh\u0101rata\ntasm\u0101t sarv\u0101\u1e47i bh\u016bt\u0101ni na tva\u1e41 \u015bhochitum arhasi", "t": "This indweller in the body of everyone is ever indestructible, O Arjuna; therefore, you should not grieve for any creature."}, {"c": 2, "v": 31, "s": "\u0938\u094d\u0935\u0927\u0930\u094d\u092e\u092e\u092a\u093f \u091a\u093e\u0935\u0947\u0915\u094d\u0937\u094d\u092f \u0928 \u0935\u093f\u0915\u092e\u094d\u092a\u093f\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u093f\u0964\n\n\u0927\u0930\u094d\u092e\u094d\u092f\u093e\u0926\u094d\u0927\u093f \u092f\u0941\u0926\u094d\u0927\u093e\u091b\u094d\u0930\u0947\u092f\u094b\u093d\u0928\u094d\u092f\u0924\u094d\u0915\u094d\u0937\u0924\u094d\u0930\u093f\u092f\u0938\u094d\u092f \u0928 \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\u09642.31\u0964\u0964", "r": "swa-dharmam api ch\u0101vek\u1e63hya na vikampitum arhasi\ndharmy\u0101ddhi yuddh\u0101ch chhreyo \u2019nyat k\u1e63hatriyasya na vidyate", "t": "Further, having regard to your duty, you should not waver, for there is nothing higher for a Kshatriya than a righteous war."}, {"c": 2, "v": 32, "s": "\u092f\u0926\u0943\u091a\u094d\u091b\u092f\u093e \u091a\u094b\u092a\u092a\u0928\u094d\u0928\u0902 \u0938\u094d\u0935\u0930\u094d\u0917\u0926\u094d\u0935\u093e\u0930\u092e\u092a\u093e\u0935\u0943\u0924\u092e\u094d\u0964\n\n\u0938\u0941\u0916\u093f\u0928\u0903 \u0915\u094d\u0937\u0924\u094d\u0930\u093f\u092f\u093e\u0903 \u092a\u093e\u0930\u094d\u0925 \u0932\u092d\u0928\u094d\u0924\u0947 \u092f\u0941\u0926\u094d\u0927\u092e\u0940\u0926\u0943\u0936\u092e\u094d\u0964\u09642.32\u0964\u0964", "r": "yad\u1e5bichchhay\u0101 chopapanna\u1e41 swarga-dv\u0101ram ap\u0101v\u1e5bitam\nsukhina\u1e25 k\u1e63hatriy\u0101\u1e25 p\u0101rtha labhante yuddham \u012bd\u1e5bi\u015bham", "t": "Happy are the Kshatriyas, O Arjuna! who are called to fight in such a battle that comes of its own accord as an open door to heaven."}, {"c": 2, "v": 33, "s": "\u0905\u0925 \u091a\u0948\u0924\u094d\u0924\u094d\u0935\u092e\u093f\u092e\u0902 \u0927\u0930\u094d\u092e\u094d\u092f\u0902 \u0938\u0902\u0917\u094d\u0930\u093e\u092e\u0902 \u0928 \u0915\u0930\u093f\u0937\u094d\u092f\u0938\u093f\u0964\n\n\u0924\u0924\u0903 \u0938\u094d\u0935\u0927\u0930\u094d\u092e\u0902 \u0915\u0940\u0930\u094d\u0924\u093f\u0902 \u091a \u0939\u093f\u0924\u094d\u0935\u093e \u092a\u093e\u092a\u092e\u0935\u093e\u092a\u094d\u0938\u094d\u092f\u0938\u093f\u0964\u09642.33\u0964\u0964", "r": "atha chet tvam ima\u1e41 dharmya\u1e41 sa\u1e45gr\u0101ma\u1e41 na kari\u1e63hyasi\ntata\u1e25 sva-dharma\u1e41 k\u012brti\u1e41 cha hitv\u0101 p\u0101pam av\u0101psyasi", "t": "But if you will not fight this righteous war, then having abandoned your own duty and reputation, you will incur sin."}, {"c": 2, "v": 34, "s": "\u0905\u0915\u0940\u0930\u094d\u0924\u093f\u0902 \u091a\u093e\u092a\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0915\u0925\u092f\u093f\u0937\u094d\u092f\u0928\u094d\u0924\u093f \u0924\u0947\u093d\u0935\u094d\u092f\u092f\u093e\u092e\u094d\u0964\n\n\u0938\u0902\u092d\u093e\u0935\u093f\u0924\u0938\u094d\u092f \u091a\u093e\u0915\u0940\u0930\u094d\u0924\u093f\u0930\u094d\u092e\u0930\u0923\u093e\u0926\u0924\u093f\u0930\u093f\u091a\u094d\u092f\u0924\u0947\u0964\u09642.34\u0964\u0964", "r": "ak\u012brti\u1e41 ch\u0101pi bh\u016bt\u0101ni\nkathayi\u1e63hyanti te \u2019vyay\u0101m\nsambh\u0101vitasya ch\u0101k\u012brtir\nmara\u1e47\u0101d atirichyate", "t": "People will also recount your everlasting dishonor; and for one who has been honored, dishonor is worse than death."}, {"c": 2, "v": 35, "s": "\u092d\u092f\u093e\u0926\u094d\u0930\u0923\u093e\u0926\u0941\u092a\u0930\u0924\u0902 \u092e\u0902\u0938\u094d\u092f\u0928\u094d\u0924\u0947 \u0924\u094d\u0935\u093e\u0902 \u092e\u0939\u093e\u0930\u0925\u093e\u0903\u0964\n\n\u092f\u0947\u0937\u093e\u0902 \u091a \u0924\u094d\u0935\u0902 \u092c\u0939\u0941\u092e\u0924\u094b \u092d\u0942\u0924\u094d\u0935\u093e \u092f\u093e\u0938\u094d\u092f\u0938\u093f \u0932\u093e\u0918\u0935\u092e\u094d\u0964\u09642.35\u0964\u0964", "r": "bhay\u0101d ra\u1e47\u0101d uparata\u1e41 mansyante tv\u0101\u1e41 mah\u0101-rath\u0101\u1e25\nye\u1e63h\u0101\u1e41 cha tva\u1e41 bahu-mato bh\u016btv\u0101 y\u0101syasi l\u0101ghavam", "t": "The great chariot-warriors will think that you have withdrawn from the battle out of fear, and you will be held in low esteem by those who have held you in high regard."}, {"c": 2, "v": 36, "s": "\u0905\u0935\u093e\u091a\u094d\u092f\u0935\u093e\u0926\u093e\u0902\u0936\u094d\u091a \u092c\u0939\u0942\u0928\u094d \u0935\u0926\u093f\u0937\u094d\u092f\u0928\u094d\u0924\u093f \u0924\u0935\u093e\u0939\u093f\u0924\u093e\u0903\u0964\n\n\u0928\u093f\u0928\u094d\u0926\u0928\u094d\u0924\u0938\u094d\u0924\u0935 \u0938\u093e\u092e\u0930\u094d\u0925\u094d\u092f\u0902 \u0924\u0924\u094b \u0926\u0941\u0903\u0916\u0924\u0930\u0902 \u0928\u0941 \u0915\u093f\u092e\u094d\u0964\u09642.36\u0964\u0964", "r": "av\u0101chya-v\u0101d\u0101n\u015bh cha bah\u016bn vadi\u1e63hyanti tav\u0101hit\u0101\u1e25\nnindantastava s\u0101marthya\u1e41 tato du\u1e25khatara\u1e41 nu kim", "t": "Your enemies, scoffing at your power, will speak many abusive words\u2014what could be more painful than this?"}, {"c": 2, "v": 37, "s": "\u0939\u0924\u094b \u0935\u093e \u092a\u094d\u0930\u093e\u092a\u094d\u0938\u094d\u092f\u0938\u093f \u0938\u094d\u0935\u0930\u094d\u0917\u0902 \u091c\u093f\u0924\u094d\u0935\u093e \u0935\u093e \u092d\u094b\u0915\u094d\u0937\u094d\u092f\u0938\u0947 \u092e\u0939\u0940\u092e\u094d\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0926\u0941\u0924\u094d\u0924\u093f\u0937\u094d\u0920 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092f\u0941\u0926\u094d\u0927\u093e\u092f \u0915\u0943\u0924\u0928\u093f\u0936\u094d\u091a\u092f\u0903\u0964\u09642.37\u0964\u0964", "r": "hato v\u0101 pr\u0101psyasi swarga\u1e41 jitv\u0101 v\u0101 bhok\u1e63hyase mah\u012bm\ntasm\u0101d utti\u1e63h\u1e6dha kaunteya yuddh\u0101ya k\u1e5bita-ni\u015bhchaya\u1e25", "t": "Slain, you will obtain heaven; victorious, you will enjoy the earth; therefore, stand up, O son of Kunti, resolved to fight."}, {"c": 2, "v": 38, "s": "\u0938\u0941\u0916\u0926\u0941\u0903\u0916\u0947 \u0938\u092e\u0947 \u0915\u0943\u0924\u094d\u0935\u093e \u0932\u093e\u092d\u093e\u0932\u093e\u092d\u094c \u091c\u092f\u093e\u091c\u092f\u094c\u0964\n\n\u0924\u0924\u094b \u092f\u0941\u0926\u094d\u0927\u093e\u092f \u092f\u0941\u091c\u094d\u092f\u0938\u094d\u0935 \u0928\u0948\u0935\u0902 \u092a\u093e\u092a\u092e\u0935\u093e\u092a\u094d\u0938\u094d\u092f\u0938\u093f\u0964\u09642.38\u0964\u0964", "r": "sukha-du\u1e25khe same k\u1e5bitv\u0101 l\u0101bh\u0101l\u0101bhau jay\u0101jayau\ntato yuddh\u0101ya yujyasva naiva\u1e41 p\u0101pam av\u0101psyasi", "t": "Having made pleasure and pain, gain and loss, victory and defeat equal, engage in battle for the sake of battle; thus, you shall not incur sin."}, {"c": 2, "v": 39, "s": "\u090f\u0937\u093e \u0924\u0947\u093d\u092d\u093f\u0939\u093f\u0924\u093e \u0938\u093e\u0902\u0916\u094d\u092f\u0947 \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092f\u094b\u0917\u0947 \u0924\u094d\u0935\u093f\u092e\u093e\u0902 \u0936\u094d\u0930\u0943\u0923\u0941\u0964\n\n\u092c\u0941\u0926\u094d\u0927\u094d\u092f\u093e\u092f\u0941\u0915\u094d\u0924\u094b \u092f\u092f\u093e \u092a\u093e\u0930\u094d\u0925 \u0915\u0930\u094d\u092e\u092c\u0928\u094d\u0927\u0902 \u092a\u094d\u0930\u0939\u093e\u0938\u094d\u092f\u0938\u093f\u0964\u09642.39\u0964\u0964", "r": "e\u1e63h\u0101 te \u2019bhihit\u0101 s\u0101nkhye\nbuddhir yoge tvim\u0101\u1e41 \u015bh\u1e5bi\u1e47u\nbuddhy\u0101 yukto yay\u0101 p\u0101rtha\nkarma-bandha\u1e41 prah\u0101syasi", "t": "This, which has been taught to you, is wisdom concerning Sankhya. Now listen to wisdom concerning Yoga, endowed with which, O Arjuna, you shall cast off the bonds of action."}, {"c": 2, "v": 40, "s": "\u0928\u0947\u0939\u093e\u092d\u093f\u0915\u094d\u0930\u092e\u0928\u093e\u0936\u094b\u093d\u0938\u094d\u0924\u093f \u092a\u094d\u0930\u0924\u094d\u092f\u0935\u093e\u092f\u094b \u0928 \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\n\n\u0938\u094d\u0935\u0932\u094d\u092a\u092e\u092a\u094d\u092f\u0938\u094d\u092f \u0927\u0930\u094d\u092e\u0938\u094d\u092f \u0924\u094d\u0930\u093e\u092f\u0924\u0947 \u092e\u0939\u0924\u094b \u092d\u092f\u093e\u0924\u094d\u0964\u09642.40\u0964\u0964", "r": "neh\u0101bhikrama-n\u0101\u015bho \u2019sti pratyav\u0101yo na vidyate\nsvalpam apyasya dharmasya tr\u0101yate mahato bhay\u0101t", "t": "In this, there is no loss of effort, nor is there any harm produced, nor any transgression. Even a little of this knowledge protects one from great fear."}, {"c": 2, "v": 41, "s": "\u0935\u094d\u092f\u0935\u0938\u093e\u092f\u093e\u0924\u094d\u092e\u093f\u0915\u093e \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u0947\u0915\u0947\u0939 \u0915\u0941\u0930\u0941\u0928\u0928\u094d\u0926\u0928\u0964\n\n\u092c\u0939\u0941\u0936\u093e\u0916\u093e \u0939\u094d\u092f\u0928\u0928\u094d\u0924\u093e\u0936\u094d\u091a \u092c\u0941\u0926\u094d\u0927\u092f\u094b\u093d\u0935\u094d\u092f\u0935\u0938\u093e\u092f\u093f\u0928\u093e\u092e\u094d\u0964\u09642.41\u0964\u0964", "r": "vyavas\u0101y\u0101tmik\u0101 buddhir ekeha kuru-nandana\nbahu-\u015bh\u0101kh\u0101 hyanant\u0101\u015bh cha buddhayo \u2019vyavas\u0101yin\u0101m", "t": "Here, O joy of the Kurus, there is only one single-pointed determination; many-branched and endless are the thoughts of the indecisive."}, {"c": 2, "v": 42, "s": "\u092f\u093e\u092e\u093f\u092e\u093e\u0902 \u092a\u0941\u0937\u094d\u092a\u093f\u0924\u093e\u0902 \u0935\u093e\u091a\u0902 \u092a\u094d\u0930\u0935\u0926\u0928\u094d\u0924\u094d\u092f\u0935\u093f\u092a\u0936\u094d\u091a\u093f\u0924\u0903\u0964\n\n\u0935\u0947\u0926\u0935\u093e\u0926\u0930\u0924\u093e\u0903 \u092a\u093e\u0930\u094d\u0925 \u0928\u093e\u0928\u094d\u092f\u0926\u0938\u094d\u0924\u0940\u0924\u093f \u0935\u093e\u0926\u093f\u0928\u0903\u0964\u09642.42\u0964\u0964", "r": "y\u0101mim\u0101\u1e41 pu\u1e63hpit\u0101\u1e41 v\u0101cha\u1e41 pravadanty-avipa\u015bhchita\u1e25\nveda-v\u0101da-rat\u0101\u1e25 p\u0101rtha n\u0101nyad ast\u012bti v\u0101dina\u1e25\n k\u0101m\u0101tm\u0101na\u1e25 swarga-par\u0101 janma-karma-phala-prad\u0101m\nkriy\u0101-vi\u015bhe\u1e63ha-bahul\u0101\u1e41 bhogai\u015bhwarya-gati\u1e41 prati", "t": "The unwise, taking pleasure in the eulogizing words of the Vedas, utter flowery speech, saying, \"There is nothing else,\" O Arjuna."}, {"c": 2, "v": 43, "s": "\u0915\u093e\u092e\u093e\u0924\u094d\u092e\u093e\u0928\u0903 \u0938\u094d\u0935\u0930\u094d\u0917\u092a\u0930\u093e \u091c\u0928\u094d\u092e\u0915\u0930\u094d\u092e\u092b\u0932\u092a\u094d\u0930\u0926\u093e\u092e\u094d\u0964\n\n\u0915\u094d\u0930\u093f\u092f\u093e\u0935\u093f\u0936\u0947\u0937\u092c\u0939\u0941\u0932\u093e\u0902 \u092d\u094b\u0917\u0948\u0936\u094d\u0935\u0930\u094d\u092f\u0917\u0924\u093f\u0902 \u092a\u094d\u0930\u0924\u093f\u0964\u09642.43\u0964\u0964", "r": "k\u0101m\u0101tm\u0101na\u1e25 svarga-par\u0101 \n\n janma-karma-phala-prad\u0101m\n\n kriy\u0101-vi\u015be\u1e63a-bahul\u0101\u1e41\n\n bhogai\u015bvarya-gati\u1e41 prati", "t": "Full of desires, with heaven as their goal, (they speak words that are directed to ends) leading to new births as the result of their works, and prescribe various methods abounding in specific actions, for the attainment of pleasure and power."}, {"c": 2, "v": 44, "s": "\u092d\u094b\u0917\u0948\u0936\u094d\u0935\u0930\u094d\u092f\u092a\u094d\u0930\u0938\u0915\u094d\u0924\u093e\u0928\u093e\u0902 \u0924\u092f\u093e\u092a\u0939\u0943\u0924\u091a\u0947\u0924\u0938\u093e\u092e\u094d\u0964\n\n\u0935\u094d\u092f\u0935\u0938\u093e\u092f\u093e\u0924\u094d\u092e\u093f\u0915\u093e \u092c\u0941\u0926\u094d\u0927\u093f\u0903 \u0938\u092e\u093e\u0927\u094c \u0928 \u0935\u093f\u0927\u0940\u092f\u0924\u0947\u0964\u09642.44\u0964\u0964", "r": "bhogai\u015bwvarya-prasakt\u0101n\u0101\u1e41 tay\u0101pah\u1e5bita-chetas\u0101m\nvyavas\u0101y\u0101tmik\u0101 buddhi\u1e25 sam\u0101dhau na vidh\u012byate", "t": "For those who are attached to pleasure and power, whose minds are drawn away by such teachings, their determinate reason is not formed which is steadily bent on meditation and Samadhi (superconscious state)."}, {"c": 2, "v": 45, "s": "\u0924\u094d\u0930\u0948\u0917\u0941\u0923\u094d\u092f\u0935\u093f\u0937\u092f\u093e \u0935\u0947\u0926\u093e \u0928\u093f\u0938\u094d\u0924\u094d\u0930\u0948\u0917\u0941\u0923\u094d\u092f\u094b \u092d\u0935\u093e\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0928\u093f\u0930\u094d\u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u094b \u0928\u093f\u0924\u094d\u092f\u0938\u0924\u094d\u0924\u094d\u0935\u0938\u094d\u0925\u094b \u0928\u093f\u0930\u094d\u092f\u094b\u0917\u0915\u094d\u0937\u0947\u092e \u0906\u0924\u094d\u092e\u0935\u093e\u0928\u094d\u0964\u09642.45\u0964\u0964", "r": "trai-gu\u1e47ya-vi\u1e63hay\u0101 ved\u0101 nistrai-gu\u1e47yo bhav\u0101rjuna\nnirdvandvo nitya-sattva-stho niryoga-k\u1e63hema \u0101tmav\u0101n", "t": "The Vedas deal with the three attributes; be thou above these three attributes. O Arjuna, free yourself from the pairs of opposites and ever remain in the quality of Sattva, freed from acquisition and preservation, and be established in the Self."}, {"c": 2, "v": 46, "s": "\u092f\u093e\u0935\u093e\u0928\u0930\u094d\u0925 \u0909\u0926\u092a\u093e\u0928\u0947 \u0938\u0930\u094d\u0935\u0924\u0903 \u0938\u0902\u092a\u094d\u0932\u0941\u0924\u094b\u0926\u0915\u0947\u0964\n\n\u0924\u093e\u0935\u093e\u0928\u094d\u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u0935\u0947\u0926\u0947\u0937\u0941 \u092c\u094d\u0930\u093e\u0939\u094d\u092e\u0923\u0938\u094d\u092f \u0935\u093f\u091c\u093e\u0928\u0924\u0903\u0964\u09642.46\u0964\u0964", "r": "y\u0101v\u0101n artha udap\u0101ne sarvata\u1e25 samplutodake\nt\u0101v\u0101nsarve\u1e63hu vede\u1e63hu br\u0101hma\u1e47asya vij\u0101nata\u1e25", "t": "To the Brahmana who has known the Self, all the Vedas are of as much use as a reservoir of water would be in a place where there is a flood."}, {"c": 2, "v": 47, "s": "\u0915\u0930\u094d\u092e\u0923\u094d\u092f\u0947\u0935\u093e\u0927\u093f\u0915\u093e\u0930\u0938\u094d\u0924\u0947 \u092e\u093e \u092b\u0932\u0947\u0937\u0941 \u0915\u0926\u093e\u091a\u0928\u0964\n\n\u092e\u093e \u0915\u0930\u094d\u092e\u092b\u0932\u0939\u0947\u0924\u0941\u0930\u094d\u092d\u0942\u0930\u094d\u092e\u093e \u0924\u0947 \u0938\u0919\u094d\u0917\u094b\u093d\u0938\u094d\u0924\u094d\u0935\u0915\u0930\u094d\u092e\u0923\u093f\u0964\u09642.47\u0964\u0964", "r": "karma\u1e47y-ev\u0101dhik\u0101ras te m\u0101 phale\u1e63hu kad\u0101chana\nm\u0101 karma-phala-hetur bh\u016br m\u0101 te sa\u1e45go \u2019stvakarma\u1e47i", "t": "Your right is only to work, but not to its results; do not let the results of action be your motive, nor let your attachment be to inaction."}, {"c": 2, "v": 48, "s": "\u092f\u094b\u0917\u0938\u094d\u0925\u0903 \u0915\u0941\u0930\u0941 \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0938\u0919\u094d\u0917\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0927\u0928\u091e\u094d\u091c\u092f\u0964\n\n\u0938\u093f\u0926\u094d\u0927\u094d\u092f\u0938\u093f\u0926\u094d\u0927\u094d\u092f\u094b\u0903 \u0938\u092e\u094b \u092d\u0942\u0924\u094d\u0935\u093e \u0938\u092e\u0924\u094d\u0935\u0902 \u092f\u094b\u0917 \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u09642.48\u0964\u0964", "r": "yoga-stha\u1e25 kuru karm\u0101\u1e47i sa\u1e45ga\u1e41 tyaktv\u0101 dhana\u00f1jaya\nsiddhy-asiddhyo\u1e25 samo bh\u016btv\u0101 samatva\u1e41 yoga uchyate", "t": "Perform action, O Arjuna, being steadfast in Yoga, abandoning attachment and balanced in success and failure; evenness of mind is called Yoga."}, {"c": 2, "v": 49, "s": "\u0926\u0942\u0930\u0947\u0923 \u0939\u094d\u092f\u0935\u0930\u0902 \u0915\u0930\u094d\u092e \u092c\u0941\u0926\u094d\u0927\u093f\u092f\u094b\u0917\u093e\u0926\u094d\u0927\u0928\u091e\u094d\u091c\u092f\u0964\n\n\u092c\u0941\u0926\u094d\u0927\u094c \u0936\u0930\u0923\u092e\u0928\u094d\u0935\u093f\u091a\u094d\u091b \u0915\u0943\u092a\u0923\u093e\u0903 \u092b\u0932\u0939\u0947\u0924\u0935\u0903\u0964\u09642.49\u0964\u0964", "r": "d\u016bre\u1e47a hy-avara\u1e41 karma buddhi-yog\u0101d dhana\u00f1jaya\nbuddhau \u015bhara\u1e47am anvichchha k\u1e5bipa\u1e47\u0101\u1e25 phala-hetava\u1e25", "t": "Far lower than the Yoga of wisdom is action, O Arjuna. Seek thou refuge in wisdom; wretched are those whose motive is the fruit."}, {"c": 2, "v": 50, "s": "\u092c\u0941\u0926\u094d\u0927\u093f\u092f\u0941\u0915\u094d\u0924\u094b \u091c\u0939\u093e\u0924\u0940\u0939 \u0909\u092d\u0947 \u0938\u0941\u0915\u0943\u0924\u0926\u0941\u0937\u094d\u0915\u0943\u0924\u0947\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0926\u094d\u092f\u094b\u0917\u093e\u092f \u092f\u0941\u091c\u094d\u092f\u0938\u094d\u0935 \u092f\u094b\u0917\u0903 \u0915\u0930\u094d\u092e\u0938\u0941 \u0915\u094c\u0936\u0932\u092e\u094d\u0964\u09642.50\u0964\u0964", "r": "buddhi-yukto jah\u0101t\u012bha ubhe suk\u1e5bita-du\u1e63hk\u1e5bite\ntasm\u0101d yog\u0101ya yujyasva yoga\u1e25 karmasu kau\u015bhalam", "t": "Endowed with wisdom and evenness of mind, one casts off in this life both good and evil deeds; therefore, devote yourself to Yoga; Yoga is skill in action."}, {"c": 2, "v": 51, "s": "\u0915\u0930\u094d\u092e\u091c\u0902 \u092c\u0941\u0926\u094d\u0927\u093f\u092f\u0941\u0915\u094d\u0924\u093e \u0939\u093f \u092b\u0932\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u092e\u0928\u0940\u0937\u093f\u0923\u0903\u0964\n\n\u091c\u0928\u094d\u092e\u092c\u0928\u094d\u0927\u0935\u093f\u0928\u093f\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u093e\u0903 \u092a\u0926\u0902 \u0917\u091a\u094d\u091b\u0928\u094d\u0924\u094d\u092f\u0928\u093e\u092e\u092f\u092e\u094d\u0964\u09642.51\u0964\u0964", "r": "karma-ja\u1e41 buddhi-yukt\u0101 hi phala\u1e41 tyaktv\u0101 man\u012b\u1e63hi\u1e47a\u1e25\njanma-bandha-vinirmukt\u0101\u1e25 pada\u1e41 gachchhanty-an\u0101mayam", "t": "The wise, possessing knowledge, having abandoned the fruits of their actions, and being freed from the bonds of birth, go to the place which is beyond all evil."}, {"c": 2, "v": 52, "s": "\u092f\u0926\u093e \u0924\u0947 \u092e\u094b\u0939\u0915\u0932\u093f\u0932\u0902 \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u0935\u094d\u092f\u0924\u093f\u0924\u0930\u093f\u0937\u094d\u092f\u0924\u093f\u0964\n\n\u0924\u0926\u093e \u0917\u0928\u094d\u0924\u093e\u0938\u093f \u0928\u093f\u0930\u094d\u0935\u0947\u0926\u0902 \u0936\u094d\u0930\u094b\u0924\u0935\u094d\u092f\u0938\u094d\u092f \u0936\u094d\u0930\u0941\u0924\u0938\u094d\u092f \u091a\u0964\u09642.52\u0964\u0964", "r": "yad\u0101 te moha-kalila\u1e41 buddhir vyatitari\u1e63hyati\ntad\u0101 gant\u0101si nirveda\u1e41 \u015bhrotavyasya \u015bhrutasya cha", "t": "When your intellect passes beyond the mire of delusion, then you will attain indifference to what has been heard and what has yet to be heard."}, {"c": 2, "v": 53, "s": "\u0936\u094d\u0930\u0941\u0924\u093f\u0935\u093f\u092a\u094d\u0930\u0924\u093f\u092a\u0928\u094d\u0928\u093e \u0924\u0947 \u092f\u0926\u093e \u0938\u094d\u0925\u093e\u0938\u094d\u092f\u0924\u093f \u0928\u093f\u0936\u094d\u091a\u0932\u093e\u0964\n\n\u0938\u092e\u093e\u0927\u093e\u0935\u091a\u0932\u093e \u092c\u0941\u0926\u094d\u0927\u093f\u0938\u094d\u0924\u0926\u093e \u092f\u094b\u0917\u092e\u0935\u093e\u092a\u094d\u0938\u094d\u092f\u0938\u093f\u0964\u09642.53\u0964\u0964", "r": "\u015bhruti-vipratipann\u0101 te yad\u0101 sth\u0101syati ni\u015bhchal\u0101\nsam\u0101dh\u0101v-achal\u0101 buddhis tad\u0101 yogam av\u0101psyasi", "t": "When your intellect, which is perplexed by the Vedic texts you have read, stands immovable and steady in the Self, then you will attain Self-realization."}, {"c": 2, "v": 54, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0938\u094d\u0925\u093f\u0924\u092a\u094d\u0930\u091c\u094d\u091e\u0938\u094d\u092f \u0915\u093e \u092d\u093e\u0937\u093e \u0938\u092e\u093e\u0927\u093f\u0938\u094d\u0925\u0938\u094d\u092f \u0915\u0947\u0936\u0935\u0964\n\n\u0938\u094d\u0925\u093f\u0924\u0927\u0940\u0903 \u0915\u093f\u0902 \u092a\u094d\u0930\u092d\u093e\u0937\u0947\u0924 \u0915\u093f\u092e\u093e\u0938\u0940\u0924 \u0935\u094d\u0930\u091c\u0947\u0924 \u0915\u093f\u092e\u094d\u0964\u09642.54\u0964\u0964", "r": "arjuna uv\u0101cha\nsthita-praj\u00f1asya k\u0101 bh\u0101\u1e63h\u0101 sam\u0101dhi-sthasya ke\u015bhava\nsthita-dh\u012b\u1e25 ki\u1e41 prabh\u0101\u1e63heta kim \u0101s\u012bta vrajeta kim", "t": "Arjuna said, \"O Krishna, what is the description of one who has steady wisdom and is merged in the superconscious state? How does one of steady wisdom speak, how do they sit, and how do they walk?\""}, {"c": 2, "v": 55, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092a\u094d\u0930\u091c\u0939\u093e\u0924\u093f \u092f\u0926\u093e \u0915\u093e\u092e\u093e\u0928\u094d \u0938\u0930\u094d\u0935\u093e\u0928\u094d \u092a\u093e\u0930\u094d\u0925 \u092e\u0928\u094b\u0917\u0924\u093e\u0928\u094d\u0964\n\n\u0906\u0924\u094d\u092e\u0928\u094d\u092f\u0947\u0935\u093e\u0924\u094d\u092e\u0928\u093e \u0924\u0941\u0937\u094d\u091f\u0903 \u0938\u094d\u0925\u093f\u0924\u092a\u094d\u0930\u091c\u094d\u091e\u0938\u094d\u0924\u0926\u094b\u091a\u094d\u092f\u0924\u0947\u0964\u09642.55\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nprajah\u0101ti yad\u0101 k\u0101m\u0101n sarv\u0101n p\u0101rtha mano-gat\u0101n\n\u0101tmany-ev\u0101tman\u0101 tu\u1e63h\u1e6da\u1e25 sthita-praj\u00f1as tadochyate", "t": "The Blessed Lord said, \"When a man completely casts off, O Arjuna, all the desires of the mind and is satisfied in the Self by the Self, then he is said to be one of steady wisdom.\""}, {"c": 2, "v": 56, "s": "\u0926\u0941\u0903\u0916\u0947\u0937\u094d\u0935\u0928\u0941\u0926\u094d\u0935\u093f\u0917\u094d\u0928\u092e\u0928\u093e\u0903 \u0938\u0941\u0916\u0947\u0937\u0941 \u0935\u093f\u0917\u0924\u0938\u094d\u092a\u0943\u0939\u0903\u0964\n\n\u0935\u0940\u0924\u0930\u093e\u0917\u092d\u092f\u0915\u094d\u0930\u094b\u0927\u0903 \u0938\u094d\u0925\u093f\u0924\u0927\u0940\u0930\u094d\u092e\u0941\u0928\u093f\u0930\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u09642.56\u0964\u0964", "r": "du\u1e25khe\u1e63hv-anudvigna-man\u0101\u1e25 sukhe\u1e63hu vigata-sp\u1e5biha\u1e25\nv\u012bta-r\u0101ga-bhaya-krodha\u1e25 sthita-dh\u012br munir uchyate", "t": "He whose mind is not shaken by adversity, who does not long for pleasures, and is free from attachment, fear, and anger, is called a sage of steady wisdom."}, {"c": 2, "v": 57, "s": "\u092f\u0903 \u0938\u0930\u094d\u0935\u0924\u094d\u0930\u093e\u0928\u092d\u093f\u0938\u094d\u0928\u0947\u0939\u0938\u094d\u0924\u0924\u094d\u0924\u0924\u094d\u092a\u094d\u0930\u093e\u092a\u094d\u092f \u0936\u0941\u092d\u093e\u0936\u0941\u092d\u092e\u094d\u0964\n\n\u0928\u093e\u092d\u093f\u0928\u0928\u094d\u0926\u0924\u093f \u0928 \u0926\u094d\u0935\u0947\u0937\u094d\u091f\u093f \u0924\u0938\u094d\u092f \u092a\u094d\u0930\u091c\u094d\u091e\u093e \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093f\u0924\u093e\u0964\u09642.57\u0964\u0964", "r": "ya\u1e25 sarvatr\u0101nabhisnehas tat tat pr\u0101pya \u015bhubh\u0101\u015bhubham\nn\u0101bhinandati na dve\u1e63h\u1e6di tasya praj\u00f1\u0101 prati\u1e63h\u1e6dhit\u0101", "t": "He who is everywhere without attachment, upon encountering anything good or bad, neither rejoices nor hastens; his wisdom is firm."}, {"c": 2, "v": 58, "s": "\u092f\u0926\u093e \u0938\u0902\u0939\u0930\u0924\u0947 \u091a\u093e\u092f\u0902 \u0915\u0942\u0930\u094d\u092e\u094b\u093d\u0919\u094d\u0917\u093e\u0928\u0940\u0935 \u0938\u0930\u094d\u0935\u0936\u0903\u0964\n\n\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u094d\u0925\u0947\u092d\u094d\u092f\u0938\u094d\u0924\u0938\u094d\u092f \u092a\u094d\u0930\u091c\u094d\u091e\u093e \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093f\u0924\u093e\u0964\u09642.58\u0964\u0964", "r": "yad\u0101 sanharate ch\u0101ya\u1e41 k\u016brmo \u2019\u1e45g\u0101n\u012bva sarva\u015bha\u1e25\nindriy\u0101\u1e47\u012bndriy\u0101rthebhyas tasya praj\u00f1\u0101 prati\u1e63h\u1e6dhit\u0101", "t": "When, like the tortoise which withdraws all its limbs on all sides, he withdraws his senses from the sense-objects, then his wisdom becomes steady."}, {"c": 2, "v": 59, "s": "\u0935\u093f\u0937\u092f\u093e \u0935\u093f\u0928\u093f\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u0928\u093f\u0930\u093e\u0939\u093e\u0930\u0938\u094d\u092f \u0926\u0947\u0939\u093f\u0928\u0903\u0964\n\n\u0930\u0938\u0935\u0930\u094d\u091c\u0902 \u0930\u0938\u094b\u093d\u092a\u094d\u092f\u0938\u094d\u092f \u092a\u0930\u0902 \u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u0928\u093f\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09642.59\u0964\u0964", "r": "vi\u1e63hay\u0101 vinivartante nir\u0101h\u0101rasya dehina\u1e25\nrasa-varja\u1e41 raso \u2019pyasya para\u1e41 d\u1e5bi\u1e63h\u1e6dv\u0101 nivartate", "t": "The objects of the senses turn away from the abstinent man, leaving the longing behind; but his longing also turns away upon seeing the Supreme."}, {"c": 2, "v": 60, "s": "\u092f\u0924\u0924\u094b \u0939\u094d\u092f\u092a\u093f \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092a\u0941\u0930\u0941\u0937\u0938\u094d\u092f \u0935\u093f\u092a\u0936\u094d\u091a\u093f\u0924\u0903\u0964\n\n\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u092a\u094d\u0930\u092e\u093e\u0925\u0940\u0928\u093f \u0939\u0930\u0928\u094d\u0924\u093f \u092a\u094d\u0930\u0938\u092d\u0902 \u092e\u0928\u0903\u0964\u09642.60\u0964\u0964", "r": "yatato hyapi kaunteya puru\u1e63hasya vipa\u015bhchita\u1e25\nindriy\u0101\u1e47i pram\u0101th\u012bni haranti prasabha\u1e41 mana\u1e25", "t": "The turbulent senses, O Arjuna, can violently carry away the mind of a wise person, even though they are striving to control them."}, {"c": 2, "v": 61, "s": "\u0924\u093e\u0928\u093f \u0938\u0930\u094d\u0935\u093e\u0923\u093f \u0938\u0902\u092f\u092e\u094d\u092f \u092f\u0941\u0915\u094d\u0924 \u0906\u0938\u0940\u0924 \u092e\u0924\u094d\u092a\u0930\u0903\u0964\n\n\u0935\u0936\u0947 \u0939\u093f \u092f\u0938\u094d\u092f\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u0924\u0938\u094d\u092f \u092a\u094d\u0930\u091c\u094d\u091e\u093e \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093f\u0924\u093e\u0964\u09642.61\u0964\u0964", "r": "t\u0101ni sarv\u0101\u1e47i sanyamya yukta \u0101s\u012bta mat-para\u1e25\nva\u015bhe hi yasyendriy\u0101\u1e47i tasya praj\u00f1\u0101 prati\u1e63h\u1e6dhit\u0101", "t": "Having restrained them all, he should sit steadfast, intent on Me; his wisdom is steady whose senses are under control."}, {"c": 2, "v": 62, "s": "\u0927\u094d\u092f\u093e\u092f\u0924\u094b \u0935\u093f\u0937\u092f\u093e\u0928\u094d\u092a\u0941\u0902\u0938\u0903 \u0938\u0919\u094d\u0917\u0938\u094d\u0924\u0947\u0937\u0942\u092a\u091c\u093e\u092f\u0924\u0947\u0964\n\n\u0938\u0919\u094d\u0917\u093e\u0924\u094d \u0938\u0902\u091c\u093e\u092f\u0924\u0947 \u0915\u093e\u092e\u0903 \u0915\u093e\u092e\u093e\u0924\u094d\u0915\u094d\u0930\u094b\u0927\u094b\u093d\u092d\u093f\u091c\u093e\u092f\u0924\u0947\u0964\u09642.62\u0964\u0964", "r": "dhy\u0101yato vi\u1e63hay\u0101n pu\u1e41sa\u1e25 sa\u1e45gas te\u1e63h\u016bpaj\u0101yate\nsa\u1e45g\u0101t sa\u00f1j\u0101yate k\u0101ma\u1e25 k\u0101m\u0101t krodho \u2019bhij\u0101yate", "t": "When one thinks of objects, attachment to them arises; from attachment, desire is born; from desire, anger arises."}, {"c": 2, "v": 63, "s": "\u0915\u094d\u0930\u094b\u0927\u093e\u0926\u094d\u092d\u0935\u0924\u093f \u0938\u0902\u092e\u094b\u0939\u0903 \u0938\u0902\u092e\u094b\u0939\u093e\u0924\u094d\u0938\u094d\u092e\u0943\u0924\u093f\u0935\u093f\u092d\u094d\u0930\u092e\u0903\u0964\n\n\u0938\u094d\u092e\u0943\u0924\u093f\u092d\u094d\u0930\u0902\u0936\u093e\u0926\u094d \u092c\u0941\u0926\u094d\u0927\u093f\u0928\u093e\u0936\u094b \u092c\u0941\u0926\u094d\u0927\u093f\u0928\u093e\u0936\u093e\u0924\u094d\u092a\u094d\u0930\u0923\u0936\u094d\u092f\u0924\u093f\u0964\u09642.63\u0964\u0964", "r": "krodh\u0101d bhavati sammoha\u1e25 sammoh\u0101t sm\u1e5biti-vibhrama\u1e25\nsm\u1e5biti-bhran\u015bh\u0101d buddhi-n\u0101\u015bho buddhi-n\u0101\u015bh\u0101t pra\u1e47a\u015bhyati", "t": "Anger leads to delusion, which causes loss of memory; this, in turn, leads to the destruction of discrimination, resulting in destruction."}, {"c": 2, "v": 64, "s": "\u0930\u093e\u0917\u0926\u094d\u0935\u0947\u0937\u0935\u093f\u092f\u0941\u0915\u094d\u0924\u0948\u0938\u094d\u0924\u0941 \u0935\u093f\u0937\u092f\u093e\u0928\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0948\u0936\u094d\u091a\u0930\u0928\u094d\u0964\n\n\u0906\u0924\u094d\u092e\u0935\u0936\u094d\u092f\u0948\u0930\u094d\u0935\u093f\u0927\u0947\u092f\u093e\u0924\u094d\u092e\u093e \u092a\u094d\u0930\u0938\u093e\u0926\u092e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09642.64\u0964\u0964", "r": "r\u0101ga-dve\u1e63ha-viyuktais tu vi\u1e63hay\u0101n indriyai\u015bh charan\n\u0101tma-va\u015bhyair-vidhey\u0101tm\u0101 pras\u0101dam adhigachchhati", "t": "But the self-controlled man, moving among objects with the senses restrained and free from attraction and repulsion, attains peace."}, {"c": 2, "v": 65, "s": "\u092a\u094d\u0930\u0938\u093e\u0926\u0947 \u0938\u0930\u094d\u0935\u0926\u0941\u0903\u0916\u093e\u0928\u093e\u0902 \u0939\u093e\u0928\u093f\u0930\u0938\u094d\u092f\u094b\u092a\u091c\u093e\u092f\u0924\u0947\u0964\n\n\u092a\u094d\u0930\u0938\u0928\u094d\u0928\u091a\u0947\u0924\u0938\u094b \u0939\u094d\u092f\u093e\u0936\u0941 \u092c\u0941\u0926\u094d\u0927\u093f\u0903 \u092a\u0930\u094d\u092f\u0935\u0924\u093f\u0937\u094d\u0920\u0924\u0947\u0964\u09642.65\u0964\u0964", "r": "pras\u0101de sarva-du\u1e25kh\u0101n\u0101\u1e41 h\u0101nir asyopaj\u0101yate\nprasanna-chetaso hy\u0101\u015bhu buddhi\u1e25 paryavati\u1e63h\u1e6dhate", "t": "In that peace, all pains are destroyed; for the intellect of the tranquil-minded soon becomes steady."}, {"c": 2, "v": 66, "s": "\u0928\u093e\u0938\u094d\u0924\u093f \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u092f\u0941\u0915\u094d\u0924\u0938\u094d\u092f \u0928 \u091a\u093e\u092f\u0941\u0915\u094d\u0924\u0938\u094d\u092f \u092d\u093e\u0935\u0928\u093e\u0964\n\n\u0928 \u091a\u093e\u092d\u093e\u0935\u092f\u0924\u0903 \u0936\u093e\u0928\u094d\u0924\u093f\u0930\u0936\u093e\u0928\u094d\u0924\u0938\u094d\u092f \u0915\u0941\u0924\u0903 \u0938\u0941\u0916\u092e\u094d\u0964\u09642.66\u0964\u0964", "r": "n\u0101sti buddhir-ayuktasya na ch\u0101yuktasya bh\u0101van\u0101\nna ch\u0101bh\u0101vayata\u1e25 \u015bh\u0101ntir a\u015bh\u0101ntasya kuta\u1e25 sukham", "t": "There is no knowledge of the Self for the unsteady, and no meditation is possible for the unsteady, and no peace for the unmeditative, and how can there be happiness for one who has no peace?"}, {"c": 2, "v": 67, "s": "\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093e\u0902 \u0939\u093f \u091a\u0930\u0924\u093e\u0902 \u092f\u0928\u094d\u092e\u0928\u094b\u093d\u0928\u0941\u0935\u093f\u0927\u0940\u092f\u0924\u0947\u0964\n\n\u0924\u0926\u0938\u094d\u092f \u0939\u0930\u0924\u093f \u092a\u094d\u0930\u091c\u094d\u091e\u093e\u0902 \u0935\u093e\u092f\u0941\u0930\u094d\u0928\u093e\u0935\u092e\u093f\u0935\u093e\u092e\u094d\u092d\u0938\u093f\u0964\u09642.67\u0964\u0964", "r": "indriy\u0101\u1e47\u0101\u1e41 hi charat\u0101\u1e41 yan mano \u2019nuvidh\u012byate\ntadasya harati praj\u00f1\u0101\u1e41 v\u0101yur n\u0101vam iv\u0101mbhasi", "t": "For the mind, which follows in the wake of the wandering senses, carries away his discrimination, as the wind carries away a boat on the waters."}, {"c": 2, "v": 68, "s": "\u0924\u0938\u094d\u092e\u093e\u0926\u094d\u092f\u0938\u094d\u092f \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0928\u093f\u0917\u0943\u0939\u0940\u0924\u093e\u0928\u093f \u0938\u0930\u094d\u0935\u0936\u0903\u0964\n\n\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u094d\u0925\u0947\u092d\u094d\u092f\u0938\u094d\u0924\u0938\u094d\u092f \u092a\u094d\u0930\u091c\u094d\u091e\u093e \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093f\u0924\u093e\u0964\u09642.68\u0964\u0964", "r": "tasm\u0101d yasya mah\u0101-b\u0101ho nig\u1e5bih\u012bt\u0101ni sarva\u015bha\u1e25\nindriy\u0101\u1e47\u012bndriy\u0101rthebhyas tasya praj\u00f1\u0101 prati\u1e63h\u1e6dhit\u0101", "t": "Therefore, O mighty-armed Arjuna, his knowledge is steady whose senses are completely restrained from sense objects."}, {"c": 2, "v": 69, "s": "\u092f\u093e \u0928\u093f\u0936\u093e \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u0924\u0938\u094d\u092f\u093e\u0902 \u091c\u093e\u0917\u0930\u094d\u0924\u093f \u0938\u0902\u092f\u092e\u0940\u0964\n\n\u092f\u0938\u094d\u092f\u093e\u0902 \u091c\u093e\u0917\u094d\u0930\u0924\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0938\u093e \u0928\u093f\u0936\u093e \u092a\u0936\u094d\u092f\u0924\u094b \u092e\u0941\u0928\u0947\u0903\u0964\u09642.69\u0964\u0964", "r": "y\u0101 ni\u015bh\u0101 sarva-bh\u016bt\u0101n\u0101\u1e41 tasy\u0101\u1e41 j\u0101garti sanyam\u012b\nyasy\u0101\u1e41 j\u0101grati bh\u016bt\u0101ni s\u0101 ni\u015bh\u0101 pa\u015bhyato mune\u1e25", "t": "That which is night to all beings, in that the self-controlled man is awake; when all beings are awake, that is night for the sage who sees."}, {"c": 2, "v": 70, "s": "\u0906\u092a\u0942\u0930\u094d\u092f\u092e\u093e\u0923\u092e\u091a\u0932\u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u0902\n\n\u0938\u092e\u0941\u0926\u094d\u0930\u092e\u093e\u092a\u0903 \u092a\u094d\u0930\u0935\u093f\u0936\u0928\u094d\u0924\u093f \u092f\u0926\u094d\u0935\u0924\u094d\u0964\n\n\u0924\u0926\u094d\u0935\u0924\u094d\u0915\u093e\u092e\u093e \u092f\u0902 \u092a\u094d\u0930\u0935\u093f\u0936\u0928\u094d\u0924\u093f \u0938\u0930\u094d\u0935\u0947\n\n\u0938 \u0936\u093e\u0928\u094d\u0924\u093f\u092e\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0928 \u0915\u093e\u092e\u0915\u093e\u092e\u0940\u0964\u09642.70\u0964\u0964", "r": "\u0101p\u016bryam\u0101\u1e47am achala-prati\u1e63h\u1e6dha\u1e41\nsamudram \u0101pa\u1e25 pravi\u015bhanti yadvat\ntadvat k\u0101m\u0101 ya\u1e41 pravi\u015bhanti sarve\nsa \u015bh\u0101ntim \u0101pnoti na k\u0101ma-k\u0101m\u012b", "t": "He attains peace into whom all desires enter, just as waters enter the ocean which, filled from all sides, remains unmoved; but not the man who is full of desires."}, {"c": 2, "v": 71, "s": "\u0935\u093f\u0939\u093e\u092f \u0915\u093e\u092e\u093e\u0928\u094d\u092f\u0903 \u0938\u0930\u094d\u0935\u093e\u0928\u094d\u092a\u0941\u092e\u093e\u0902\u0936\u094d\u091a\u0930\u0924\u093f \u0928\u093f\u0903\u0938\u094d\u092a\u0943\u0939\u0903\u0964\n\n\u0928\u093f\u0930\u094d\u092e\u092e\u094b \u0928\u093f\u0930\u0939\u0902\u0915\u093e\u0930\u0903 \u0938 \u0936\u093e\u0902\u0924\u093f\u092e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09642.71\u0964\u0964", "r": "vih\u0101ya k\u0101m\u0101n ya\u1e25 sarv\u0101n pum\u0101n\u015bh charati ni\u1e25sp\u1e5biha\u1e25\nnirmamo nirahank\u0101ra\u1e25 sa \u015bh\u0101ntim adhigachchhati", "t": "That person attains peace who, abandoning all desires, moves about without longing, without the sense of ownership, and without egoism."}, {"c": 2, "v": 72, "s": "\u090f\u0937\u093e \u092c\u094d\u0930\u093e\u0939\u094d\u092e\u0940 \u0938\u094d\u0925\u093f\u0924\u093f\u0903 \u092a\u093e\u0930\u094d\u0925 \u0928\u0948\u0928\u093e\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u092f \u0935\u093f\u092e\u0941\u0939\u094d\u092f\u0924\u093f\u0964\n\n\u0938\u094d\u0925\u093f\u0924\u094d\u0935\u093e\u093d\u0938\u094d\u092f\u093e\u092e\u0928\u094d\u0924\u0915\u093e\u0932\u0947\u093d\u092a\u093f \u092c\u094d\u0930\u0939\u094d\u092e\u0928\u093f\u0930\u094d\u0935\u093e\u0923\u092e\u0943\u091a\u094d\u091b\u0924\u093f\u0964\u09642.72\u0964\u0964", "r": "e\u1e63h\u0101 br\u0101hm\u012b sthiti\u1e25 p\u0101rtha nain\u0101\u1e41 pr\u0101pya vimuhyati\nsthitv\u0101sy\u0101m anta-k\u0101le \u2019pi brahma-nirv\u0101\u1e47am \u1e5bichchhati", "t": "O son of Pritha, this is the eternal state, the Brahmic seat. Attaining this, one is not deluded. Being established in it, one attains oneness with Brahman even at the end of life."}, {"c": 3, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u091c\u094d\u092f\u093e\u092f\u0938\u0940 \u091a\u0947\u0924\u094d\u0915\u0930\u094d\u092e\u0923\u0938\u094d\u0924\u0947 \u092e\u0924\u093e \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u091c\u0928\u093e\u0930\u094d\u0926\u0928\u0964\n\n\u0924\u0924\u094d\u0915\u093f\u0902 \u0915\u0930\u094d\u092e\u0923\u093f \u0918\u094b\u0930\u0947 \u092e\u093e\u0902 \u0928\u093f\u092f\u094b\u091c\u092f\u0938\u093f \u0915\u0947\u0936\u0935\u0964\u09643.1\u0964\u0964", "r": "arjuna uv\u0101cha\njy\u0101yas\u012b chet karma\u1e47as te mat\u0101 buddhir jan\u0101rdana\ntat ki\u1e41 karma\u1e47i ghore m\u0101\u1e41 niyojayasi ke\u015bhava", "t": "Arjuna said: If Thou thinkest that knowledge is superior to action, O Krishna, why then, O Kesava, doest Thou ask me to engage in this terrible action?"}, {"c": 3, "v": 2, "s": "\u0935\u094d\u092f\u093e\u092e\u093f\u0936\u094d\u0930\u0947\u0923\u0947\u0935 \u0935\u093e\u0915\u094d\u092f\u0947\u0928 \u092c\u0941\u0926\u094d\u0927\u093f\u0902 \u092e\u094b\u0939\u092f\u0938\u0940\u0935 \u092e\u0947\u0964\n\n\u0924\u0926\u0947\u0915\u0902 \u0935\u0926 \u0928\u093f\u0936\u094d\u093f\u091a\u0924\u094d\u092f \u092f\u0947\u0928 \u0936\u094d\u0930\u0947\u092f\u094b\u093d\u0939\u092e\u093e\u092a\u094d\u0928\u0941\u092f\u093e\u092e\u094d\u0964\u09643.2\u0964\u0964", "r": "vy\u0101mi\u015bhre\u1e47eva v\u0101kyena buddhi\u1e41 mohayas\u012bva me\ntad eka\u1e41 vada ni\u015bhchitya yena \u015bhreyo \u2019ham \u0101pnuy\u0101m", "t": "With this seemingly perplexing speech, you seem to be confusing my understanding; therefore, tell me one certain way by which I may attain bliss."}, {"c": 3, "v": 3, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0932\u094b\u0915\u0947\u093d\u0938\u094d\u092e\u093f\u0928\u094d\u0926\u094d\u0935\u093f\u0935\u093f\u0927\u093e \u0928\u093f\u0937\u094d\u0920\u093e \u092a\u0941\u0930\u093e \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u093e \u092e\u092f\u093e\u0928\u0918\u0964\n\n\u091c\u094d\u091e\u093e\u0928\u092f\u094b\u0917\u0947\u0928 \u0938\u093e\u0902\u0916\u094d\u092f\u093e\u0928\u093e\u0902 \u0915\u0930\u094d\u092e\u092f\u094b\u0917\u0947\u0928 \u092f\u094b\u0917\u093f\u0928\u093e\u092e\u094d\u0964\u09643.3\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nloke\u2019smin dvi-vidh\u0101 ni\u1e63h\u1e6dh\u0101 pur\u0101 prokt\u0101 may\u0101nagha\nj\u00f1\u0101na-yogena s\u0101\u1e45khy\u0101n\u0101\u1e41 karma-yogena yogin\u0101m", "t": "The Blessed Lord said, \"In this world, there is a twofold path, as I said before, O sinless one: the path of knowledge of the Sankhyas and the path of action of the Yogins.\""}, {"c": 3, "v": 4, "s": "\u0928 \u0915\u0930\u094d\u092e\u0923\u093e\u092e\u0928\u093e\u0930\u092e\u094d\u092d\u093e\u0928\u094d\u0928\u0948\u0937\u094d\u0915\u0930\u094d\u092e\u094d\u092f\u0902 \u092a\u0941\u0930\u0941\u0937\u094b\u093d\u0936\u094d\u0928\u0941\u0924\u0947\u0964\n\n\u0928 \u091a \u0938\u0902\u0928\u094d\u092f\u0938\u0928\u093e\u0926\u0947\u0935 \u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u0938\u092e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u09643.4\u0964\u0964", "r": "na karma\u1e47\u0101m an\u0101rambh\u0101n nai\u1e63hkarmya\u1e41 puru\u1e63ho \u2019\u015bhnute\nna cha sannyasan\u0101d eva siddhi\u1e41 samadhigachchhati", "t": "Man does not reach actionlessness by not performing actions; nor does he attain perfection by mere renunciation."}, {"c": 3, "v": 5, "s": "\u0928 \u0939\u093f \u0915\u0936\u094d\u093f\u091a\u0924\u094d\u0915\u094d\u0937\u0923\u092e\u092a\u093f \u091c\u093e\u0924\u0941 \u0924\u093f\u0937\u094d\u0920\u0924\u094d\u092f\u0915\u0930\u094d\u092e\u0915\u0943\u0924\u094d\u0964\n\n\u0915\u093e\u0930\u094d\u092f\u0924\u0947 \u0939\u094d\u092f\u0935\u0936\u0903 \u0915\u0930\u094d\u092e \u0938\u0930\u094d\u0935\u0903 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u091c\u0948\u0930\u094d\u0917\u0941\u0923\u0948\u0903\u0964\u09643.5\u0964\u0964", "r": "na hi ka\u015bhchit k\u1e63ha\u1e47am api j\u0101tu ti\u1e63h\u1e6dhatyakarma-k\u1e5bit\nk\u0101ryate hyava\u015bha\u1e25 karma sarva\u1e25 prak\u1e5biti-jair gu\u1e47ai\u1e25", "t": "Verily, no one can remain for even a moment without performing action; for everyone is made to act helplessly, indeed, by the qualities born of Nature."}, {"c": 3, "v": 6, "s": "\u0915\u0930\u094d\u092e\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u0938\u0902\u092f\u092e\u094d\u092f \u092f \u0906\u0938\u094d\u0924\u0947 \u092e\u0928\u0938\u093e \u0938\u094d\u092e\u0930\u0928\u094d\u0964\n\n\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u094d\u0925\u093e\u0928\u094d\u0935\u093f\u092e\u0942\u0922\u093e\u0924\u094d\u092e\u093e \u092e\u093f\u0925\u094d\u092f\u093e\u091a\u093e\u0930\u0903 \u0938 \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u09643.6\u0964\u0964", "r": "karmendriy\u0101\u1e47i sanyamya ya \u0101ste manas\u0101 smaran\nindriy\u0101rth\u0101n vim\u016b\u1e0dh\u0101tm\u0101 mithy\u0101ch\u0101ra\u1e25 sa uchyate", "t": "He who, restraining the organs of action, sits thinking of the sense-objects in his mind, he of deluded understanding is called a hypocrite."}, {"c": 3, "v": 7, "s": "\u092f\u0938\u094d\u0924\u094d\u0935\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u092e\u0928\u0938\u093e \u0928\u093f\u092f\u092e\u094d\u092f\u093e\u0930\u092d\u0924\u0947\u093d\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0915\u0930\u094d\u092e\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0948\u0903 \u0915\u0930\u094d\u092e\u092f\u094b\u0917\u092e\u0938\u0915\u094d\u0924\u0903 \u0938 \u0935\u093f\u0936\u093f\u0937\u094d\u092f\u0924\u0947\u0964\u09643.7\u0964\u0964", "r": "yas tvindriy\u0101\u1e47i manas\u0101 niyamy\u0101rabhate \u2019rjuna\nkarmendriyai\u1e25 karma-yogam asakta\u1e25 sa vi\u015bhi\u1e63hyate", "t": "But whoever, controlling the senses by the mind, O Arjuna, engages himself in Karma Yoga with the organs of action, without attachment, he excels."}, {"c": 3, "v": 8, "s": "\u0928\u093f\u092f\u0924\u0902 \u0915\u0941\u0930\u0941 \u0915\u0930\u094d\u092e \u0924\u094d\u0935\u0902 \u0915\u0930\u094d\u092e \u091c\u094d\u092f\u093e\u092f\u094b \u0939\u094d\u092f\u0915\u0930\u094d\u092e\u0923\u0903\u0964\n\n\u0936\u0930\u0940\u0930\u092f\u093e\u0924\u094d\u0930\u093e\u092a\u093f \u091a \u0924\u0947 \u0928 \u092a\u094d\u0930\u0938\u093f\u0926\u094d\u0927\u094d\u092f\u0947\u0926\u0915\u0930\u094d\u092e\u0923\u0903\u0964\u09643.8\u0964\u0964", "r": "niyata\u1e41 kuru karma tva\u1e41 karma jy\u0101yo hyakarma\u1e47a\u1e25\n\u015bhar\u012bra-y\u0101tr\u0101pi cha te na prasiddhyed akarma\u1e47a\u1e25", "t": "Perform your bounden duty, for action is superior to inaction, and even the maintenance of the body would not be possible for you through inaction."}, {"c": 3, "v": 9, "s": "\u092f\u091c\u094d\u091e\u093e\u0930\u094d\u0925\u093e\u0924\u094d\u0915\u0930\u094d\u092e\u0923\u094b\u093d\u0928\u094d\u092f\u0924\u094d\u0930 \u0932\u094b\u0915\u094b\u093d\u092f\u0902 \u0915\u0930\u094d\u092e\u092c\u0928\u094d\u0927\u0928\u0903\u0964\n\n\u0924\u0926\u0930\u094d\u0925\u0902 \u0915\u0930\u094d\u092e \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092e\u0941\u0915\u094d\u0924\u0938\u0902\u0917\u0903 \u0938\u092e\u093e\u091a\u0930\u0964\u09643.9\u0964\u0964", "r": "yaj\u00f1\u0101rth\u0101t karma\u1e47o \u2019nyatra loko \u2019ya\u1e41 karma-bandhana\u1e25\ntad-artha\u1e41 karma kaunteya mukta-sa\u1e45ga\u1e25 sam\u0101chara", "t": "The world is bound by actions other than those performed for the sake of sacrifice; do thou, therefore, O son of Kunti (Arjuna), perform actions for that sake alone, free from attachment."}, {"c": 3, "v": 10, "s": "\u0938\u0939\u092f\u091c\u094d\u091e\u093e\u0903 \u092a\u094d\u0930\u091c\u093e\u0903 \u0938\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u092a\u0941\u0930\u094b\u0935\u093e\u091a \u092a\u094d\u0930\u091c\u093e\u092a\u0924\u093f\u0903\u0964\n\n\u0905\u0928\u0947\u0928 \u092a\u094d\u0930\u0938\u0935\u093f\u0937\u094d\u092f\u0927\u094d\u0935\u092e\u0947\u0937 \u0935\u094b\u093d\u0938\u094d\u0924\u094d\u0935\u093f\u0937\u094d\u091f\u0915\u093e\u092e\u0927\u0941\u0915\u094d\u0964\u09643.10\u0964\u0964", "r": "saha-yaj\u00f1\u0101\u1e25 praj\u0101\u1e25 s\u1e5bi\u1e63h\u1e6dv\u0101 purov\u0101cha praj\u0101pati\u1e25\nanena prasavi\u1e63hyadhvam e\u1e63ha vo \u2019stvi\u1e63h\u1e6da-k\u0101ma-dhuk", "t": "The Creator, having in the beginning created mankind together with sacrifice, said, \"By this shall you propagate; let this be the milch cow of your desires\u2014the cow that yields all the desired objects.\""}, {"c": 3, "v": 11, "s": "\u0926\u0947\u0935\u093e\u0928\u094d\u092d\u093e\u0935\u092f\u0924\u093e\u0928\u0947\u0928 \u0924\u0947 \u0926\u0947\u0935\u093e \u092d\u093e\u0935\u092f\u0928\u094d\u0924\u0941 \u0935\u0903\u0964\n\n\u092a\u0930\u0938\u094d\u092a\u0930\u0902 \u092d\u093e\u0935\u092f\u0928\u094d\u0924\u0903 \u0936\u094d\u0930\u0947\u092f\u0903 \u092a\u0930\u092e\u0935\u093e\u092a\u094d\u0938\u094d\u092f\u0925\u0964\u09643.11\u0964\u0964", "r": "dev\u0101n bh\u0101vayat\u0101nena te dev\u0101 bh\u0101vayantu va\u1e25\nparaspara\u1e41 bh\u0101vayanta\u1e25 \u015bhreya\u1e25 param av\u0101psyatha", "t": "With this, nourish the gods, and may the gods nourish you; thus, nourishing each other, you shall attain the highest good."}, {"c": 3, "v": 12, "s": "\u0907\u0937\u094d\u091f\u093e\u0928\u094d\u092d\u094b\u0917\u093e\u0928\u094d\u0939\u093f \u0935\u094b \u0926\u0947\u0935\u093e \u0926\u093e\u0938\u094d\u092f\u0928\u094d\u0924\u0947 \u092f\u091c\u094d\u091e\u092d\u093e\u0935\u093f\u0924\u093e\u0903\u0964\n\n\u0924\u0948\u0930\u094d\u0926\u0924\u094d\u0924\u093e\u0928\u092a\u094d\u0930\u0926\u093e\u092f\u0948\u092d\u094d\u092f\u094b \u092f\u094b \u092d\u0941\u0919\u094d\u0915\u094d\u0924\u0947 \u0938\u094d\u0924\u0947\u0928 \u090f\u0935 \u0938\u0903\u0964\u09643.12\u0964\u0964", "r": "i\u1e63h\u1e6d\u0101n bhog\u0101n hi vo dev\u0101 d\u0101syante yaj\u00f1a-bh\u0101vit\u0101\u1e25\ntair datt\u0101n aprad\u0101yaibhyo yo bhu\u1e45kte stena eva sa\u1e25", "t": "The gods, nourished by the sacrifice, will give you the desired objects. So, he who enjoys the objects given by the gods without offering anything in return is indeed a thief."}, {"c": 3, "v": 13, "s": "\u092f\u091c\u094d\u091e\u0936\u093f\u0937\u094d\u091f\u093e\u0936\u093f\u0928\u0903 \u0938\u0928\u094d\u0924\u094b \u092e\u0941\u091a\u094d\u092f\u0928\u094d\u0924\u0947 \u0938\u0930\u094d\u0935\u0915\u093f\u0932\u094d\u092c\u093f\u0937\u0948\u0903\u0964\n\n\u092d\u0941\u091e\u094d\u091c\u0924\u0947 \u0924\u0947 \u0924\u094d\u0935\u0918\u0902 \u092a\u093e\u092a\u093e \u092f\u0947 \u092a\u091a\u0928\u094d\u0924\u094d\u092f\u093e\u0924\u094d\u092e\u0915\u093e\u0930\u0923\u093e\u0924\u094d\u0964\u09643.13\u0964\u0964", "r": "yaj\u00f1a-\u015bhi\u1e63h\u1e6d\u0101\u015bhina\u1e25 santo muchyante sarva-kilbi\u1e63hai\u1e25\nbhu\u00f1jate te tvagha\u1e41 p\u0101p\u0101 ye pachanty\u0101tma-k\u0101ra\u1e47\u0101t", "t": "The righteous who eat the remnants of the sacrifice are freed from all sins; but those sinful ones who cook food solely for their own sake indeed consume sin."}, {"c": 3, "v": 14, "s": "\u0905\u0928\u094d\u0928\u093e\u0926\u094d\u092d\u0935\u0928\u094d\u0924\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u092a\u0930\u094d\u091c\u0928\u094d\u092f\u093e\u0926\u0928\u094d\u0928\u0938\u092e\u094d\u092d\u0935\u0903\u0964\n\n\u092f\u091c\u094d\u091e\u093e\u0926\u094d\u092d\u0935\u0924\u093f \u092a\u0930\u094d\u091c\u0928\u094d\u092f\u094b \u092f\u091c\u094d\u091e\u0903 \u0915\u0930\u094d\u092e\u0938\u092e\u0941\u0926\u094d\u092d\u0935\u0903\u0964\u09643.14\u0964\u0964", "r": "ann\u0101d bhavanti bh\u016bt\u0101ni parjany\u0101d anna-sambhava\u1e25\nyaj\u00f1\u0101d bhavati parjanyo yaj\u00f1a\u1e25 karma-samudbhava\u1e25", "t": "From food come forth beings; from rain, food is produced; from sacrifice arises rain, and sacrifice is born of action."}, {"c": 3, "v": 15, "s": "\u0915\u0930\u094d\u092e \u092c\u094d\u0930\u0939\u094d\u092e\u094b\u0926\u094d\u092d\u0935\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0915\u094d\u0937\u0930\u0938\u092e\u0941\u0926\u094d\u092d\u0935\u092e\u094d\u0964\n\n\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0938\u0930\u094d\u0935\u0917\u0924\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0928\u093f\u0924\u094d\u092f\u0902 \u092f\u091c\u094d\u091e\u0947 \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093f\u0924\u092e\u094d\u0964\u09643.15\u0964\u0964", "r": "karma brahmodbhava\u1e41 viddhi brahm\u0101k\u1e63hara-samudbhavam\ntasm\u0101t sarva-gata\u1e41 brahma nitya\u1e41 yaj\u00f1e prati\u1e63h\u1e6dhitam", "t": "Know that action comes from Brahma, and Brahma comes from the Imperishable. Therefore, the all-pervasive Brahma ever rests in sacrifice."}, {"c": 3, "v": 16, "s": "\u090f\u0935\u0902 \u092a\u094d\u0930\u0935\u0930\u094d\u0924\u093f\u0924\u0902 \u091a\u0915\u094d\u0930\u0902 \u0928\u093e\u0928\u0941\u0935\u0930\u094d\u0924\u092f\u0924\u0940\u0939 \u092f\u0903\u0964\n\n\u0905\u0918\u093e\u092f\u0941\u0930\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u093e\u092e\u094b \u092e\u094b\u0918\u0902 \u092a\u093e\u0930\u094d\u0925 \u0938 \u091c\u0940\u0935\u0924\u093f\u0964\u09643.16\u0964\u0964", "r": "eva\u1e41 pravartita\u1e41 chakra\u1e41 n\u0101nuvartayat\u012bha ya\u1e25\nagh\u0101yur indriy\u0101r\u0101mo mogha\u1e41 p\u0101rtha sa j\u012bvati", "t": "He who does not follow the wheel thus set in motion, who is of sinful life, rejoicing in the senses, lives in vain, O Arjuna."}, {"c": 3, "v": 17, "s": "\u092f\u0938\u094d\u0924\u094d\u0935\u093e\u0924\u094d\u092e\u0930\u0924\u093f\u0930\u0947\u0935 \u0938\u094d\u092f\u093e\u0926\u093e\u0924\u094d\u092e\u0924\u0943\u092a\u094d\u0924\u0936\u094d\u091a \u092e\u093e\u0928\u0935\u0903\u0964\n\n\u0906\u0924\u094d\u092e\u0928\u094d\u092f\u0947\u0935 \u091a \u0938\u0928\u094d\u0924\u0941\u0937\u094d\u091f\u0938\u094d\u0924\u0938\u094d\u092f \u0915\u093e\u0930\u094d\u092f\u0902 \u0928 \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\u09643.17\u0964\u0964", "r": "yas tv\u0101tma-ratir eva sy\u0101d \u0101tma-t\u1e5bipta\u015bh cha m\u0101nava\u1e25\n\u0101tmanyeva cha santu\u1e63h\u1e6das tasya k\u0101rya\u1e41 na vidyate", "t": "But for that man who rejoices only in the Self, who is satisfied with the Self and is content in the Self alone, indeed there is nothing to do."}, {"c": 3, "v": 18, "s": "\u0928\u0948\u0935 \u0924\u0938\u094d\u092f \u0915\u0943\u0924\u0947\u0928\u093e\u0930\u094d\u0925\u094b \u0928\u093e\u0915\u0943\u0924\u0947\u0928\u0947\u0939 \u0915\u0936\u094d\u091a\u0928\u0964\n\n\u0928 \u091a\u093e\u0938\u094d\u092f \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0947\u0937\u0941 \u0915\u0936\u094d\u093f\u091a\u0926\u0930\u094d\u0925\u0935\u094d\u092f\u092a\u093e\u0936\u094d\u0930\u092f\u0903\u0964\u09643.18\u0964\u0964", "r": "naiva tasya k\u1e5biten\u0101rtho n\u0101k\u1e5biteneha ka\u015bhchana\nna ch\u0101sya sarva-bh\u016bte\u1e63hu ka\u015bhchid artha-vyap\u0101\u015bhraya\u1e25", "t": "For him, there is no interest whatsoever in what is done or not done; nor does he depend on any being for any purpose."}, {"c": 3, "v": 19, "s": "\u0924\u0938\u094d\u092e\u093e\u0926\u0938\u0915\u094d\u0924\u0903 \u0938\u0924\u0924\u0902 \u0915\u093e\u0930\u094d\u092f\u0902 \u0915\u0930\u094d\u092e \u0938\u092e\u093e\u091a\u0930\u0964\n\n\u0905\u0938\u0915\u094d\u0924\u094b \u0939\u094d\u092f\u093e\u091a\u0930\u0928\u094d\u0915\u0930\u094d\u092e \u092a\u0930\u092e\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u092a\u0942\u0930\u0941\u0937\u0903\u0964\u09643.19\u0964\u0964", "r": "tasm\u0101d asakta\u1e25 satata\u1e41 k\u0101rya\u1e41 karma sam\u0101chara\nasakto hy\u0101charan karma param \u0101pnoti p\u016bru\u1e63ha\u1e25", "t": "Therefore, without attachment, always perform the actions that should be done; for by performing actions without attachment, one reaches the Supreme."}, {"c": 3, "v": 20, "s": "\u0915\u0930\u094d\u092e\u0923\u0948\u0935 \u0939\u093f \u0938\u0902\u0938\u093f\u0926\u094d\u0927\u093f\u092e\u093e\u0938\u094d\u0925\u093f\u0924\u093e \u091c\u0928\u0915\u093e\u0926\u092f\u0903\u0964\n\n\u0932\u094b\u0915\u0938\u0902\u0917\u094d\u0930\u0939\u092e\u0947\u0935\u093e\u092a\u093f \u0938\u0902\u092a\u0936\u094d\u092f\u0928\u094d\u0915\u0930\u094d\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u093f\u0964\u09643.20\u0964\u0964", "r": "karma\u1e47aiva hi sansiddhim \u0101sthit\u0101 janak\u0101daya\u1e25\nloka-sa\u1e45graham ev\u0101pi sampa\u015bhyan kartum arhasi", "t": "Janaka and others attained perfection indeed through action alone; even with the intention of protecting the masses, you should perform action."}, {"c": 3, "v": 21, "s": "\u092f\u0926\u094d\u092f\u0926\u093e\u091a\u0930\u0924\u093f \u0936\u094d\u0930\u0947\u0937\u094d\u0920\u0938\u094d\u0924\u0924\u094d\u0924\u0926\u0947\u0935\u0947\u0924\u0930\u094b \u091c\u0928\u0903\u0964\n\n\u0938 \u092f\u0924\u094d\u092a\u094d\u0930\u092e\u093e\u0923\u0902 \u0915\u0941\u0930\u0941\u0924\u0947 \u0932\u094b\u0915\u0938\u094d\u0924\u0926\u0928\u0941\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u09643.21\u0964\u0964", "r": "yad yad \u0101charati \u015bhre\u1e63h\u1e6dhas tat tad evetaro jana\u1e25\nsa yat pram\u0101\u1e47a\u1e41 kurute lokas tad anuvartate", "t": "Whatever a great man does, others also do; whatever he establishes as the standard, the world follows."}, {"c": 3, "v": 22, "s": "\u0928 \u092e\u0947 \u092a\u093e\u0930\u094d\u0925\u093e\u0938\u094d\u0924\u093f \u0915\u0930\u094d\u0924\u0935\u094d\u092f\u0902 \u0924\u094d\u0930\u093f\u0937\u0941 \u0932\u094b\u0915\u0947\u0937\u0941 \u0915\u093f\u091e\u094d\u091a\u0928\u0964\n\n\u0928\u093e\u0928\u0935\u093e\u092a\u094d\u0924\u092e\u0935\u093e\u092a\u094d\u0924\u0935\u094d\u092f\u0902 \u0935\u0930\u094d\u0924 \u090f\u0935 \u091a \u0915\u0930\u094d\u092e\u0923\u093f\u0964\u09643.22\u0964\u0964", "r": "na me p\u0101rth\u0101sti kartavya\u1e41 tri\u1e63hu loke\u1e63hu ki\u00f1chana\nn\u0101nav\u0101ptam av\u0101ptavya\u1e41 varta eva cha karma\u1e47i", "t": "There is nothing in the three worlds, O Arjuna, that needs to be done by Me, nor is there anything unattained that needs to be attained; yet I engage Myself in action."}, {"c": 3, "v": 23, "s": "\u092f\u0926\u093f \u0939\u094d\u092f\u0939\u0902 \u0928 \u0935\u0930\u094d\u0924\u0947\u092f\u0902 \u091c\u093e\u0924\u0941 \u0915\u0930\u094d\u092e\u0923\u094d\u092f\u0924\u0928\u094d\u0926\u094d\u0930\u093f\u0924\u0903\u0964\n\n\u092e\u092e \u0935\u0930\u094d\u0924\u094d\u092e\u093e\u0928\u0941\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u092e\u0928\u0941\u0937\u094d\u092f\u093e\u0903 \u092a\u093e\u0930\u094d\u0925 \u0938\u0930\u094d\u0935\u0936\u0903\u0964\u09643.23\u0964\u0964", "r": "yadi hyaha\u1e41 na varteya\u1e41 j\u0101tu karma\u1e47yatandrita\u1e25\nmama vartm\u0101nuvartante manu\u1e63hy\u0101\u1e25 p\u0101rtha sarva\u015bha\u1e25", "t": "For, should I not ever engage myself in action, unwearied, people would in every way follow my path, O Arjuna."}, {"c": 3, "v": 24, "s": "\u0909\u0924\u094d\u0938\u0940\u0926\u0947\u092f\u0941\u0930\u093f\u092e\u0947 \u0932\u094b\u0915\u093e \u0928 \u0915\u0941\u0930\u094d\u092f\u093e\u0902 \u0915\u0930\u094d\u092e \u091a\u0947\u0926\u0939\u092e\u094d\u0964\n\n\u0938\u0919\u094d\u0915\u0930\u0938\u094d\u092f \u091a \u0915\u0930\u094d\u0924\u093e \u0938\u094d\u092f\u093e\u092e\u0941\u092a\u0939\u0928\u094d\u092f\u093e\u092e\u093f\u092e\u093e\u0903 \u092a\u094d\u0930\u091c\u093e\u0903\u0964\u09643.24\u0964\u0964", "r": "uts\u012bdeyur ime lok\u0101 na kury\u0101\u1e41 karma ched aham\nsankarasya cha kart\u0101 sy\u0101m upahany\u0101m im\u0101\u1e25 praj\u0101\u1e25", "t": "These worlds would perish if I did not perform action; I would be the author of confusion of castes and destruction of these beings."}, {"c": 3, "v": 25, "s": "\u0938\u0915\u094d\u0924\u093e\u0903 \u0915\u0930\u094d\u092e\u0923\u094d\u092f\u0935\u093f\u0926\u094d\u0935\u093e\u0902\u0938\u094b \u092f\u0925\u093e \u0915\u0941\u0930\u094d\u0935\u0928\u094d\u0924\u093f \u092d\u093e\u0930\u0924\u0964\n\n\u0915\u0941\u0930\u094d\u092f\u093e\u0926\u094d\u0935\u093f\u0926\u094d\u0935\u093e\u0902\u0938\u094d\u0924\u0925\u093e\u0938\u0915\u094d\u0924\u0936\u094d\u093f\u091a\u0915\u0940\u0930\u094d\u0937\u0941\u0930\u094d\u0932\u094b\u0915\u0938\u0902\u0917\u094d\u0930\u0939\u092e\u094d\u0964\u09643.25\u0964\u0964", "r": "sakt\u0101\u1e25 karma\u1e47yavidv\u0101nso yath\u0101 kurvanti bh\u0101rata\nkury\u0101d vidv\u0101ns tath\u0101sakta\u015bh chik\u012br\u1e63hur loka-sa\u1e45graham", "t": "As the ignorant act out of attachment to action, O Bharata, so should the wise act without attachment, wishing for the welfare of the world."}, {"c": 3, "v": 26, "s": "\u0928 \u092c\u0941\u0926\u094d\u0927\u093f\u092d\u0947\u0926\u0902 \u091c\u0928\u092f\u0947\u0926\u091c\u094d\u091e\u093e\u0928\u093e\u0902 \u0915\u0930\u094d\u092e\u0938\u0919\u094d\u0917\u093f\u0928\u093e\u092e\u094d\u0964\n\n\u091c\u094b\u0937\u092f\u0947\u0924\u094d\u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0935\u093f\u0926\u094d\u0935\u093e\u0928\u094d \u092f\u0941\u0915\u094d\u0924\u0903 \u0938\u092e\u093e\u091a\u0930\u0928\u094d\u0964\u09643.26\u0964\u0964", "r": "na buddhi-bheda\u1e41 janayed aj\u00f1\u0101n\u0101\u1e41 karma-sa\u1e45gin\u0101m\njo\u1e63hayet sarva-karm\u0101\u1e47i vidv\u0101n yukta\u1e25 sam\u0101charan", "t": "Let no wise man unsettle the minds of ignorant people who are attached to action; he should engage them in all actions, himself fulfilling them with devotion."}, {"c": 3, "v": 27, "s": "\u092a\u094d\u0930\u0915\u0943\u0924\u0947\u0903 \u0915\u094d\u0930\u093f\u092f\u092e\u093e\u0923\u093e\u0928\u093f \u0917\u0941\u0923\u0948\u0903 \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0938\u0930\u094d\u0935\u0936\u0903\u0964\n\n\u0905\u0939\u0919\u094d\u0915\u093e\u0930\u0935\u093f\u092e\u0942\u0922\u093e\u0924\u094d\u092e\u093e \u0915\u0930\u094d\u0924\u093e\u093d\u0939\u092e\u093f\u0924\u093f \u092e\u0928\u094d\u092f\u0924\u0947\u0964\u09643.27\u0964\u0964", "r": "prak\u1e5bite\u1e25 kriyam\u0101\u1e47\u0101ni gu\u1e47ai\u1e25 karm\u0101\u1e47i sarva\u015bha\u1e25\nahank\u0101ra-vim\u016b\u1e0dh\u0101tm\u0101 kart\u0101ham iti manyate", "t": "All actions are wrought in all cases by the qualities of Nature alone. He whose mind is deluded by egoism thinks, \"I am the doer.\""}, {"c": 3, "v": 28, "s": "\u0924\u0924\u094d\u0924\u094d\u0935\u0935\u093f\u0924\u094d\u0924\u0941 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0917\u0941\u0923\u0915\u0930\u094d\u092e\u0935\u093f\u092d\u093e\u0917\u092f\u094b\u0903\u0964\n\n\u0917\u0941\u0923\u093e \u0917\u0941\u0923\u0947\u0937\u0941 \u0935\u0930\u094d\u0924\u0928\u094d\u0924 \u0907\u0924\u093f \u092e\u0924\u094d\u0935\u093e \u0928 \u0938\u091c\u094d\u091c\u0924\u0947\u0964\u09643.28\u0964\u0964", "r": "tattva-vit tu mah\u0101-b\u0101ho gu\u1e47a-karma-vibh\u0101gayo\u1e25\ngu\u1e47\u0101 gu\u1e47e\u1e63hu vartanta iti matv\u0101 na sajjate", "t": "But he who knows the Truth, O mighty-armed Arjuna, about the divisions of the qualities and their functions, knowing that the Gunas, as senses, move amidst the Gunas, as the sense-objects, is not attached."}, {"c": 3, "v": 29, "s": "\u092a\u094d\u0930\u0915\u0943\u0924\u0947\u0930\u094d\u0917\u0941\u0923\u0938\u092e\u094d\u092e\u0942\u0922\u093e\u0903 \u0938\u091c\u094d\u091c\u0928\u094d\u0924\u0947 \u0917\u0941\u0923\u0915\u0930\u094d\u092e\u0938\u0941\u0964\n\n\u0924\u093e\u0928\u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0935\u093f\u0926\u094b \u092e\u0928\u094d\u0926\u093e\u0928\u094d\u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0935\u093f\u0928\u094d\u0928 \u0935\u093f\u091a\u093e\u0932\u092f\u0947\u0924\u094d\u0964\u09643.29\u0964\u0964", "r": "prak\u1e5biter gu\u1e47a-samm\u016b\u1e0dh\u0101\u1e25 sajjante gu\u1e47a-karmasu\nt\u0101n ak\u1e5bitsna-vido mand\u0101n k\u1e5bitsna-vin na vich\u0101layet", "t": "Those deluded by the qualities of Nature are attached to the functions of the qualities. The man of perfect knowledge should not unsettle the foolish one who is of imperfect knowledge."}, {"c": 3, "v": 30, "s": "\u092e\u092f\u093f \u0938\u0930\u094d\u0935\u093e\u0923\u093f \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0938\u0902\u0928\u094d\u092f\u0938\u094d\u092f\u093e\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u091a\u0947\u0924\u0938\u093e\u0964\n\n\u0928\u093f\u0930\u093e\u0936\u0940\u0930\u094d\u0928\u093f\u0930\u094d\u092e\u092e\u094b \u092d\u0942\u0924\u094d\u0935\u093e \u092f\u0941\u0927\u094d\u092f\u0938\u094d\u0935 \u0935\u093f\u0917\u0924\u091c\u094d\u0935\u0930\u0903\u0964\u09643.30\u0964\u0964", "r": "mayi sarv\u0101\u1e47i karm\u0101\u1e47i sannyasy\u0101dhy\u0101tma-chetas\u0101\nnir\u0101\u015bh\u012br nirmamo bh\u016btv\u0101 yudhyasva vigata-jvara\u1e25", "t": "Renouncing all actions in Me, with the mind centered on the Self, free from hope and egoism, and from mental fever, fight thou."}, {"c": 3, "v": 31, "s": "\u092f\u0947 \u092e\u0947 \u092e\u0924\u092e\u093f\u0926\u0902 \u0928\u093f\u0924\u094d\u092f\u092e\u0928\u0941\u0924\u093f\u0937\u094d\u0920\u0928\u094d\u0924\u093f \u092e\u093e\u0928\u0935\u093e\u0903\u0964\n\n\u0936\u094d\u0930\u0926\u094d\u0927\u093e\u0935\u0928\u094d\u0924\u094b\u093d\u0928\u0938\u0942\u092f\u0928\u094d\u0924\u094b \u092e\u0941\u091a\u094d\u092f\u0928\u094d\u0924\u0947 \u0924\u0947\u093d\u092a\u093f \u0915\u0930\u094d\u092e\u092d\u093f\u0903\u0964\u09643.31\u0964\u0964", "r": "ye me matam ida\u1e41 nityam anuti\u1e63h\u1e6dhanti m\u0101nav\u0101\u1e25\n\u015bhraddh\u0101vanto \u2019nas\u016byanto muchyante te \u2019pi karmabhi\u1e25", "t": "Those who constantly practice this teaching of Mine with faith and without caviling, they too are freed from actions."}, {"c": 3, "v": 32, "s": "\u092f\u0947 \u0924\u094d\u0935\u0947\u0924\u0926\u092d\u094d\u092f\u0938\u0942\u092f\u0928\u094d\u0924\u094b \u0928\u093e\u0928\u0941\u0924\u093f\u0937\u094d\u0920\u0928\u094d\u0924\u093f \u092e\u0947 \u092e\u0924\u092e\u094d\u0964\n\n\u0938\u0930\u094d\u0935\u091c\u094d\u091e\u093e\u0928\u0935\u093f\u092e\u0942\u0922\u093e\u0902\u0938\u094d\u0924\u093e\u0928\u094d\u0935\u093f\u0926\u094d\u0927\u093f \u0928\u0937\u094d\u091f\u093e\u0928\u091a\u0947\u0924\u0938\u0903\u0964\u09643.32\u0964\u0964", "r": "ye tvetad abhyas\u016byanto n\u0101nuti\u1e63h\u1e6dhanti me matam\nsarva-j\u00f1\u0101na-vim\u016b\u1e0dh\u0101ns t\u0101n viddhi na\u1e63h\u1e6d\u0101n achetasa\u1e25", "t": "But those who criticize My teaching and do not practice it, deprived of all knowledge and lacking discernment, know them to be doomed to destruction."}, {"c": 3, "v": 33, "s": "\u0938\u0926\u0943\u0936\u0902 \u091a\u0947\u0937\u094d\u091f\u0924\u0947 \u0938\u094d\u0935\u0938\u094d\u092f\u093e\u0903 \u092a\u094d\u0930\u0915\u0943\u0924\u0947\u0930\u094d\u091c\u094d\u091e\u093e\u0928\u0935\u093e\u0928\u092a\u093f\u0964\n\n\u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u092f\u093e\u0928\u094d\u0924\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0928\u093f\u0917\u094d\u0930\u0939\u0903 \u0915\u093f\u0902 \u0915\u0930\u093f\u0937\u094d\u092f\u0924\u093f\u0964\u09643.33\u0964\u0964", "r": "sad\u1e5bi\u015bha\u1e41 che\u1e63h\u1e6date svasy\u0101\u1e25 prak\u1e5biter j\u00f1\u0101nav\u0101n api\nprak\u1e5biti\u1e41 y\u0101nti bh\u016bt\u0101ni nigraha\u1e25 ki\u1e41 kari\u1e63hyati", "t": "Even a wise man acts in accordance with his own nature; beings will follow their nature; what can restraint do?"}, {"c": 3, "v": 34, "s": "\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0938\u094d\u092f\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0938\u094d\u092f\u093e\u0930\u094d\u0925\u0947 \u0930\u093e\u0917\u0926\u094d\u0935\u0947\u0937\u094c \u0935\u094d\u092f\u0935\u0938\u094d\u0925\u093f\u0924\u094c\u0964\n\n\u0924\u092f\u094b\u0930\u094d\u0928 \u0935\u0936\u092e\u093e\u0917\u091a\u094d\u091b\u0947\u0924\u094d\u0924\u094c \u0939\u094d\u092f\u0938\u094d\u092f \u092a\u0930\u093f\u092a\u0928\u094d\u0925\u093f\u0928\u094c\u0964\u09643.34\u0964\u0964", "r": "indriyasyendriyasy\u0101rthe r\u0101ga-dve\u1e63hau vyavasthitau\ntayor na va\u015bham \u0101gachchhet tau hyasya paripanthinau", "t": "Attachment and aversion for the objects of the senses abide in the senses; let no one come under their sway; for, they are his enemies."}, {"c": 3, "v": 35, "s": "\u0936\u094d\u0930\u0947\u092f\u093e\u0928\u094d\u0938\u094d\u0935\u0927\u0930\u094d\u092e\u094b \u0935\u093f\u0917\u0941\u0923\u0903 \u092a\u0930\u0927\u0930\u094d\u092e\u093e\u0924\u094d\u0938\u094d\u0935\u0928\u0941\u0937\u094d\u0920\u093f\u0924\u093e\u0924\u094d\u0964\n\n\u0938\u094d\u0935\u0927\u0930\u094d\u092e\u0947 \u0928\u093f\u0927\u0928\u0902 \u0936\u094d\u0930\u0947\u092f\u0903 \u092a\u0930\u0927\u0930\u094d\u092e\u094b \u092d\u092f\u093e\u0935\u0939\u0903\u0964\u09643.35\u0964\u0964", "r": "\u015bhrey\u0101n swa-dharmo vigu\u1e47a\u1e25 para-dharm\u0101t sv-anu\u1e63h\u1e6dhit\u0101t\nswa-dharme nidhana\u1e41 \u015bhreya\u1e25 para-dharmo bhay\u0101vaha\u1e25", "t": "Better is one's own duty, though devoid of merit, than the duty of another well discharged. Better is death in one's own duty; the duty of another is fraught with fear."}, {"c": 3, "v": 36, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0905\u0925 \u0915\u0947\u0928 \u092a\u094d\u0930\u092f\u0941\u0915\u094d\u0924\u094b\u093d\u092f\u0902 \u092a\u093e\u092a\u0902 \u091a\u0930\u0924\u093f \u092a\u0942\u0930\u0941\u0937\u0903\u0964\n\n\u0905\u0928\u093f\u091a\u094d\u091b\u0928\u094d\u0928\u092a\u093f \u0935\u093e\u0930\u094d\u0937\u094d\u0923\u0947\u092f \u092c\u0932\u093e\u0926\u093f\u0935 \u0928\u093f\u092f\u094b\u091c\u093f\u0924\u0903\u0964\u09643.36\u0964\u0964", "r": "arjuna uv\u0101cha\natha kena prayukto \u2019ya\u1e41 p\u0101pa\u1e41 charati p\u016bru\u1e63ha\u1e25\nanichchhann api v\u0101r\u1e63h\u1e47eya bal\u0101d iva niyojita\u1e25", "t": "Arjuna said, \"But what compels man to commit sin, even against his wishes, O Varshneya (Krishna), as if constrained by force?\""}, {"c": 3, "v": 37, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0915\u093e\u092e \u090f\u0937 \u0915\u094d\u0930\u094b\u0927 \u090f\u0937 \u0930\u091c\u094b\u0917\u0941\u0923\u0938\u092e\u0941\u0926\u094d\u092d\u0935\u0903\u0964\n\n\u092e\u0939\u093e\u0936\u0928\u094b \u092e\u0939\u093e\u092a\u093e\u092a\u094d\u092e\u093e \u0935\u093f\u0926\u094d\u0927\u094d\u092f\u0947\u0928\u092e\u093f\u0939 \u0935\u0948\u0930\u093f\u0923\u092e\u094d\u0964\u09643.37\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nk\u0101ma e\u1e63ha krodha e\u1e63ha rajo-gu\u1e47a-samudbhava\u1e25\nmah\u0101\u015bhano mah\u0101-p\u0101pm\u0101 viddhyenam iha vairi\u1e47am", "t": "The Blessed Lord said, \"It is desire and it is anger, both of the quality of Rajas, all-devouring and all-sinful; know this as the foe here in this world.\""}, {"c": 3, "v": 38, "s": "\u0927\u0942\u092e\u0947\u0928\u093e\u0935\u094d\u0930\u093f\u092f\u0924\u0947 \u0935\u0939\u094d\u0928\u093f\u0930\u094d\u092f\u0925\u093e\u093d\u093d\u0926\u0930\u094d\u0936\u094b \u092e\u0932\u0947\u0928 \u091a\u0964\n\n\u092f\u0925\u094b\u0932\u094d\u092c\u0947\u0928\u093e\u0935\u0943\u0924\u094b \u0917\u0930\u094d\u092d\u0938\u094d\u0924\u0925\u093e \u0924\u0947\u0928\u0947\u0926\u092e\u093e\u0935\u0943\u0924\u092e\u094d\u0964\u09643.38\u0964\u0964", "r": "dh\u016bmen\u0101vriyate vahnir yath\u0101dar\u015bho malena cha\nyatholben\u0101v\u1e5bito garbhas tath\u0101 tenedam \u0101v\u1e5bitam", "t": "As fire is enveloped by smoke, as a mirror is covered by dust, and as an embryo is surrounded by the amniotic sac, so is this enveloped by that."}, {"c": 3, "v": 39, "s": "\u0906\u0935\u0943\u0924\u0902 \u091c\u094d\u091e\u093e\u0928\u092e\u0947\u0924\u0947\u0928 \u091c\u094d\u091e\u093e\u0928\u093f\u0928\u094b \u0928\u093f\u0924\u094d\u092f\u0935\u0948\u0930\u093f\u0923\u093e\u0964\n\n\u0915\u093e\u092e\u0930\u0942\u092a\u0947\u0923 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0926\u0941\u0937\u094d\u092a\u0942\u0930\u0947\u0923\u093e\u0928\u0932\u0947\u0928 \u091a\u0964\u09643.39\u0964\u0964", "r": "\u0101v\u1e5bita\u1e41 j\u00f1\u0101nam etena j\u00f1\u0101nino nitya-vairi\u1e47\u0101\nk\u0101ma-r\u016bpe\u1e47a kaunteya du\u1e63hp\u016bre\u1e47\u0101nalena cha", "t": "O Arjuna, wisdom is enveloped by this constant enemy of the wise, in the form of desire, which is insatiable like fire."}, {"c": 3, "v": 40, "s": "\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u092e\u0928\u094b \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u0938\u094d\u092f\u093e\u0927\u093f\u0937\u094d\u0920\u093e\u0928\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\n\n\u090f\u0924\u0948\u0930\u094d\u0935\u093f\u092e\u094b\u0939\u092f\u0924\u094d\u092f\u0947\u0937 \u091c\u094d\u091e\u093e\u0928\u092e\u093e\u0935\u0943\u0924\u094d\u092f \u0926\u0947\u0939\u093f\u0928\u092e\u094d\u0964\u09643.40\u0964\u0964", "r": "indriy\u0101\u1e47i mano buddhir asy\u0101dhi\u1e63h\u1e6dh\u0101nam uchyate\netair vimohayatye\u1e63ha j\u00f1\u0101nam \u0101v\u1e5bitya dehinam", "t": "The senses, the mind, and the intellect are said to be its seat; through these, it deludes the embodied one, veiling their wisdom."}, {"c": 3, "v": 41, "s": "\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0924\u094d\u0935\u092e\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u094d\u092f\u093e\u0926\u094c \u0928\u093f\u092f\u092e\u094d\u092f \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\n\n\u092a\u093e\u092a\u094d\u092e\u093e\u0928\u0902 \u092a\u094d\u0930\u091c\u0939\u093f \u0939\u094d\u092f\u0947\u0928\u0902 \u091c\u094d\u091e\u093e\u0928\u0935\u093f\u091c\u094d\u091e\u093e\u0928\u0928\u093e\u0936\u0928\u092e\u094d\u0964\u09643.41\u0964\u0964", "r": "tasm\u0101t tvam indriy\u0101\u1e47y\u0101dau niyamya bharatar\u1e63habha\np\u0101pm\u0101na\u1e41 prajahi hyena\u1e41 j\u00f1\u0101na-vij\u00f1\u0101na-n\u0101\u015bhanam", "t": "Therefore, O best of the Bharatas, control your senses first and then kill this sinful thing, which destroys knowledge and realization."}, {"c": 3, "v": 42, "s": "\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u092a\u0930\u093e\u0923\u094d\u092f\u093e\u0939\u0941\u0930\u093f\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0947\u092d\u094d\u092f\u0903 \u092a\u0930\u0902 \u092e\u0928\u0903\u0964\n\n\u092e\u0928\u0938\u0938\u094d\u0924\u0941 \u092a\u0930\u093e \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092f\u094b \u092c\u0941\u0926\u094d\u0927\u0947\u0903 \u092a\u0930\u0924\u0938\u094d\u0924\u0941 \u0938\u0903\u0964\u09643.42\u0964\u0964", "r": "indriy\u0101\u1e47i par\u0101\u1e47y\u0101hur indriyebhya\u1e25 para\u1e41 mana\u1e25\nmanasas tu par\u0101 buddhir yo buddhe\u1e25 paratas tu sa\u1e25", "t": "They say that the senses are superior to the body; the mind is superior to the senses; the intellect is superior to the mind; and He (the Self) is superior even to the intellect."}, {"c": 3, "v": 43, "s": "\u090f\u0935\u0902 \u092c\u0941\u0926\u094d\u0927\u0947\u0903 \u092a\u0930\u0902 \u092c\u0941\u0926\u094d\u0927\u094d\u0935\u093e \u0938\u0902\u0938\u094d\u0924\u092d\u094d\u092f\u093e\u0924\u094d\u092e\u093e\u0928\u092e\u093e\u0924\u094d\u092e\u0928\u093e\u0964\n\n\u091c\u0939\u093f \u0936\u0924\u094d\u0930\u0941\u0902 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0915\u093e\u092e\u0930\u0942\u092a\u0902 \u0926\u0941\u0930\u093e\u0938\u0926\u092e\u094d\u0964\u09643.43\u0964\u0964", "r": "eva\u1e41 buddhe\u1e25 para\u1e41 buddhv\u0101 sanstabhy\u0101tm\u0101nam \u0101tman\u0101\njahi \u015bhatru\u1e41 mah\u0101-b\u0101ho k\u0101ma-r\u016bpa\u1e41 dur\u0101sadam", "t": "Thus, knowing Him who is superior to the intellect and restraining the self by the Self, slay thou, O mighty-armed Arjuna, the enemy in the form of desire, hard to conquer."}, {"c": 4, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0907\u092e\u0902 \u0935\u093f\u0935\u0938\u094d\u0935\u0924\u0947 \u092f\u094b\u0917\u0902 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u0935\u093e\u0928\u0939\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\n\n\u0935\u093f\u0935\u0938\u094d\u0935\u093e\u0928\u094d \u092e\u0928\u0935\u0947 \u092a\u094d\u0930\u093e\u0939 \u092e\u0928\u0941\u0930\u093f\u0915\u094d\u0937\u094d\u0935\u093e\u0915\u0935\u0947\u093d\u092c\u094d\u0930\u0935\u0940\u0924\u094d\u0964\u09644.1\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nima\u1e41 vivasvate yoga\u1e41 proktav\u0101n aham avyayam\nvivasv\u0101n manave pr\u0101ha manur ik\u1e63hv\u0101kave \u2019brav\u012bt", "t": "The Blessed Lord said, \"I taught this imperishable Yoga to Vivasvan; he then told it to Manu; Manu proclaimed it to Ikshvaku."}, {"c": 4, "v": 2, "s": "\u090f\u0935\u0902 \u092a\u0930\u092e\u094d\u092a\u0930\u093e\u092a\u094d\u0930\u093e\u092a\u094d\u0924\u092e\u093f\u092e\u0902 \u0930\u093e\u091c\u0930\u094d\u0937\u092f\u094b \u0935\u093f\u0926\u0941\u0903\u0964\n\n\u0938 \u0915\u093e\u0932\u0947\u0928\u0947\u0939 \u092e\u0939\u0924\u093e \u092f\u094b\u0917\u094b \u0928\u0937\u094d\u091f\u0903 \u092a\u0930\u0928\u094d\u0924\u092a\u0964\u09644.2\u0964\u0964", "r": "eva\u1e41 parampar\u0101-pr\u0101ptam ima\u1e41 r\u0101jar\u1e63hayo vidu\u1e25\nsa k\u0101leneha mahat\u0101 yogo na\u1e63h\u1e6da\u1e25 parantapa", "t": "This, handed down in regular succession by the royal sages, was known. This Yoga, however, has been lost here over time, O Parantapa (burner of the foes)."}, {"c": 4, "v": 3, "s": "\u0938 \u090f\u0935\u093e\u092f\u0902 \u092e\u092f\u093e \u0924\u0947\u093d\u0926\u094d\u092f \u092f\u094b\u0917\u0903 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u0903 \u092a\u0941\u0930\u093e\u0924\u0928\u0903\u0964\n\n\u092d\u0915\u094d\u0924\u094b\u093d\u0938\u093f \u092e\u0947 \u0938\u0916\u093e \u091a\u0947\u0924\u093f \u0930\u0939\u0938\u094d\u092f\u0902 \u0939\u094d\u092f\u0947\u0924\u0926\u0941\u0924\u094d\u0924\u092e\u092e\u094d\u0964\u09644.3\u0964\u0964", "r": "sa ev\u0101ya\u1e41 may\u0101 te \u2019dya yoga\u1e25 prokta\u1e25 pur\u0101tana\u1e25\nbhakto \u2019si me sakh\u0101 cheti rahasya\u1e41 hyetad uttamam", "t": "That same ancient yoga has been today taught to you by me, for you are my devotee and my friend; it is the supreme secret."}, {"c": 4, "v": 4, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0905\u092a\u0930\u0902 \u092d\u0935\u0924\u094b \u091c\u0928\u094d\u092e \u092a\u0930\u0902 \u091c\u0928\u094d\u092e \u0935\u093f\u0935\u0938\u094d\u0935\u0924\u0903\u0964\n\n\u0915\u0925\u092e\u0947\u0924\u0926\u094d\u0935\u093f\u091c\u093e\u0928\u0940\u092f\u093e\u0902 \u0924\u094d\u0935\u092e\u093e\u0926\u094c \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u0935\u093e\u0928\u093f\u0924\u093f\u0964\u09644.4\u0964\u0964", "r": "arjuna uv\u0101cha\napara\u1e41 bhavato janma para\u1e41 janma vivasvata\u1e25\nkatham etad vij\u0101n\u012by\u0101\u1e41 tvam \u0101dau proktav\u0101n iti", "t": "Arjuna said, \"Later was Thy birth, and prior to it was the birth of Vivasvan (the Sun); how am I to understand that Thou hast taught this Yoga from the beginning?\""}, {"c": 4, "v": 5, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092c\u0939\u0942\u0928\u093f \u092e\u0947 \u0935\u094d\u092f\u0924\u0940\u0924\u093e\u0928\u093f \u091c\u0928\u094d\u092e\u093e\u0928\u093f \u0924\u0935 \u091a\u093e\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0924\u093e\u0928\u094d\u092f\u0939\u0902 \u0935\u0947\u0926 \u0938\u0930\u094d\u0935\u093e\u0923\u093f \u0928 \u0924\u094d\u0935\u0902 \u0935\u0947\u0924\u094d\u0925 \u092a\u0930\u0928\u094d\u0924\u092a\u0964\u09644.5\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nbah\u016bni me vyat\u012bt\u0101ni janm\u0101ni tava ch\u0101rjuna\nt\u0101nyaha\u1e41 veda sarv\u0101\u1e47i na tva\u1e41 vettha parantapa", "t": "The Blessed Lord said, \"Many births of Mine have passed, as well as of thine, O Arjuna; I know them all, but thou knowest not, O Parantapa (scorcher of foes).\""}, {"c": 4, "v": 6, "s": "\u0905\u091c\u094b\u093d\u092a\u093f \u0938\u0928\u094d\u0928\u0935\u094d\u092f\u092f\u093e\u0924\u094d\u092e\u093e \u092d\u0942\u0924\u093e\u0928\u093e\u092e\u0940\u0936\u094d\u0935\u0930\u094b\u093d\u092a\u093f \u0938\u0928\u094d\u0964\n\n\u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u0938\u094d\u0935\u093e\u092e\u0927\u093f\u0937\u094d\u0920\u093e\u092f \u0938\u0902\u092d\u0935\u093e\u092e\u094d\u092f\u093e\u0924\u094d\u092e\u092e\u093e\u092f\u092f\u093e\u0964\u09644.6\u0964\u0964", "r": "ajo \u2019pi sannavyay\u0101tm\u0101 bh\u016bt\u0101n\u0101m \u
