2c\u0940\u091c\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u09649.18\u0964\u0964", "r": "gatir bhart\u0101 prabhu\u1e25 s\u0101k\u1e63h\u012b niv\u0101sa\u1e25 \u015bhara\u1e47a\u1e41 suh\u1e5bit\nprabhava\u1e25 pralaya\u1e25 sth\u0101na\u1e41 nidh\u0101na\u1e41 b\u012bjam avyayam", "t": "I am the goal, the supporter, the Lord, the witness, the abode, the shelter, the friend, the origin, the dissolution, the foundation, the treasure-house, and the imperishable seed."}, {"c": 9, "v": 19, "s": "\u0924\u092a\u093e\u092e\u094d\u092f\u0939\u092e\u0939\u0902 \u0935\u0930\u094d\u0937\u0902 \u0928\u093f\u0917\u0943\u0939\u094d\u0923\u093e\u092e\u094d\u092f\u0941\u0924\u094d\u0938\u0943\u091c\u093e\u092e\u093f \u091a\u0964\n\n\u0905\u092e\u0943\u0924\u0902 \u091a\u0948\u0935 \u092e\u0943\u0924\u094d\u092f\u0941\u0936\u094d\u091a \u0938\u0926\u0938\u091a\u094d\u091a\u093e\u0939\u092e\u0930\u094d\u091c\u0941\u0928\u0964\u09649.19\u0964\u0964", "r": "tap\u0101myaham aha\u1e41 var\u1e63ha\u1e41 nig\u1e5bih\u1e47\u0101myuts\u1e5bij\u0101mi cha\nam\u1e5bita\u1e41 chaiva m\u1e5bityu\u015bh cha sad asach ch\u0101ham arjuna", "t": "As the sun, I give heat; I withhold and send forth the rain; I am immortality and also death, existence and non-existence, O Arjuna."}, {"c": 9, "v": 20, "s": "\u0924\u094d\u0930\u0948\u0935\u093f\u0926\u094d\u092f\u093e \u092e\u093e\u0902 \u0938\u094b\u092e\u092a\u093e\u0903 \u092a\u0942\u0924\u092a\u093e\u092a\u093e\n\n\u092f\u091c\u094d\u091e\u0948\u0930\u093f\u0937\u094d\u091f\u094d\u0935\u093e \u0938\u094d\u0935\u0930\u094d\u0917\u0924\u093f\u0902 \u092a\u094d\u0930\u093e\u0930\u094d\u0925\u092f\u0928\u094d\u0924\u0947\u0964\n\n\u0924\u0947 \u092a\u0941\u0923\u094d\u092f\u092e\u093e\u0938\u093e\u0926\u094d\u092f \u0938\u0941\u0930\u0947\u0928\u094d\u0926\u094d\u0930\u0932\u094b\u0915\n\n\u092e\u0936\u094d\u0928\u0928\u094d\u0924\u093f \u0926\u093f\u0935\u094d\u092f\u093e\u0928\u094d\u0926\u093f\u0935\u093f \u0926\u0947\u0935\u092d\u094b\u0917\u093e\u0928\u094d\u0964\u09649.20\u0964\u0964", "r": "trai-vidy\u0101 m\u0101\u1e41 soma-p\u0101\u1e25 p\u016bta-p\u0101p\u0101\nyaj\u00f1air i\u1e63h\u1e6dv\u0101 svar-gati\u1e41 pr\u0101rthayante\nte pu\u1e47yam \u0101s\u0101dya surendra-lokam\na\u015bhnanti divy\u0101n divi deva-bhog\u0101n", "t": "The knowers of the three Vedas, the drinkers of Soma, purified of all sins, worshipping Me through sacrifices, pray for the way to heaven; they reach the holy world of the Lord of the gods and enjoy the divine pleasures of the gods in heaven."}, {"c": 9, "v": 21, "s": "\u0924\u0947 \u0924\u0902 \u092d\u0941\u0915\u094d\u0924\u094d\u0935\u093e \u0938\u094d\u0935\u0930\u094d\u0917\u0932\u094b\u0915\u0902 \u0935\u093f\u0936\u093e\u0932\u0902\n\n\u0915\u094d\u0937\u0940\u0923\u0947 \u092a\u0941\u0923\u094d\u092f\u0947 \u092e\u0930\u094d\u0924\u094d\u092f\u0932\u094b\u0915\u0902 \u0935\u093f\u0936\u0928\u094d\u0924\u093f\u0964\n\n\u090f\u0935 \u0924\u094d\u0930\u092f\u0940\u0927\u0930\u094d\u092e\u092e\u0928\u0941\u092a\u094d\u0930\u092a\u0928\u094d\u0928\u093e\n\n\u0917\u0924\u093e\u0917\u0924\u0902 \u0915\u093e\u092e\u0915\u093e\u092e\u093e \u0932\u092d\u0928\u094d\u0924\u0947\u0964\u09649.21\u0964\u0964", "r": "te ta\u1e41 bhuktv\u0101 swarga-loka\u1e41 vi\u015bh\u0101la\u1e41\nk\u1e63h\u012b\u1e47e pu\u1e47ye martya-loka\u1e41 vi\u015bhanti\neva\u1e41 tray\u012b-dharmam anuprapann\u0101\ngat\u0101gata\u1e41 k\u0101ma-k\u0101m\u0101 labhante", "t": "They, having enjoyed the vast heaven, enter the world of mortals when their merit is exhausted; thus abiding by the injunctions of the three (Vedas) and desiring objects of desires, they attain to the state of coming and going."}, {"c": 9, "v": 22, "s": "\u0905\u0928\u0928\u094d\u092f\u093e\u0936\u094d\u091a\u093f\u0928\u094d\u0924\u092f\u0928\u094d\u0924\u094b \u092e\u093e\u0902 \u092f\u0947 \u091c\u0928\u093e\u0903 \u092a\u0930\u094d\u092f\u0941\u092a\u093e\u0938\u0924\u0947\u0964\n\n\u0924\u0947\u0937\u093e\u0902 \u0928\u093f\u0924\u094d\u092f\u093e\u092d\u093f\u092f\u0941\u0915\u094d\u0924\u093e\u0928\u093e\u0902 \u092f\u094b\u0917\u0915\u094d\u0937\u0947\u092e\u0902 \u0935\u0939\u093e\u092e\u094d\u092f\u0939\u092e\u094d\u0964\u09649.22\u0964\u0964", "r": "anany\u0101\u015bh chintayanto m\u0101\u1e41 ye jan\u0101\u1e25 paryup\u0101sate\nte\u1e63h\u0101\u1e41 nity\u0101bhiyukt\u0101n\u0101\u1e41 yoga-k\u1e63hema\u1e41 vah\u0101myaham", "t": "For those men who worship Me alone, thinking of no one else, for those ever-united, I secure what they have not already possessed and preserve what they already possess."}, {"c": 9, "v": 23, "s": "\u092f\u0947\u093d\u092a\u094d\u092f\u0928\u094d\u092f\u0926\u0947\u0935\u0924\u093e \u092d\u0915\u094d\u0924\u093e \u092f\u091c\u0928\u094d\u0924\u0947 \u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e\u093d\u0928\u094d\u0935\u093f\u0924\u093e\u0903\u0964\n\n\u0924\u0947\u093d\u092a\u093f \u092e\u093e\u092e\u0947\u0935 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092f\u091c\u0928\u094d\u0924\u094d\u092f\u0935\u093f\u0927\u093f\u092a\u0942\u0930\u094d\u0935\u0915\u092e\u094d\u0964\u09649.23\u0964\u0964", "r": "ye \u2019pyanya-devat\u0101-bhakt\u0101 yajante \u015bhraddhay\u0101nvit\u0101\u1e25\nte \u2019pi m\u0101m eva kaunteya yajantyavidhi-p\u016brvakam", "t": "Even those devotees who, endowed with faith, worship other gods, worship Me alone, O Arjuna, but by the wrong method."}, {"c": 9, "v": 24, "s": "\u0905\u0939\u0902 \u0939\u093f \u0938\u0930\u094d\u0935\u092f\u091c\u094d\u091e\u093e\u0928\u093e\u0902 \u092d\u094b\u0915\u094d\u0924\u093e \u091a \u092a\u094d\u0930\u092d\u0941\u0930\u0947\u0935 \u091a\u0964\n\n\u0928 \u0924\u0941 \u092e\u093e\u092e\u092d\u093f\u091c\u093e\u0928\u0928\u094d\u0924\u093f \u0924\u0924\u094d\u0924\u094d\u0935\u0947\u0928\u093e\u0924\u0936\u094d\u091a\u094d\u092f\u0935\u0928\u094d\u0924\u093f \u0924\u0947\u0964\u09649.24\u0964\u0964", "r": "aha\u1e41 hi sarva-yaj\u00f1\u0101n\u0101\u1e41 bhokt\u0101 cha prabhureva cha\nna tu m\u0101m abhij\u0101nanti tattven\u0101ta\u015bh chyavanti te", "t": "For I alone am the enjoyer and Lord of all sacrifices; but they do not know Me in reality, and thus they return to this mortal world."}, {"c": 9, "v": 25, "s": "\u092f\u093e\u0928\u094d\u0924\u093f \u0926\u0947\u0935\u0935\u094d\u0930\u0924\u093e \u0926\u0947\u0935\u093e\u0928\u094d \u092a\u093f\u0924\u0943\u093c\u0928\u094d\u092f\u093e\u0928\u094d\u0924\u093f \u092a\u093f\u0924\u0943\u0935\u094d\u0930\u0924\u093e\u0903\u0964\n\n\u092d\u0942\u0924\u093e\u0928\u093f \u092f\u093e\u0928\u094d\u0924\u093f \u092d\u0942\u0924\u0947\u091c\u094d\u092f\u093e \u092f\u093e\u0928\u094d\u0924\u093f \u092e\u0926\u094d\u092f\u093e\u091c\u093f\u0928\u094b\u093d\u092a\u093f \u092e\u093e\u092e\u094d\u0964\u09649.25\u0964\u0964", "r": "y\u0101nti deva-vrat\u0101 dev\u0101n pit\u1e5d\u012bn y\u0101nti pit\u1e5bi-vrat\u0101\u1e25\nbh\u016bt\u0101ni y\u0101nti bh\u016btejy\u0101 y\u0101nti mad-y\u0101jino \u2019pi m\u0101m", "t": "The worshippers of the gods go to them; the ancestor-worshippers go to the manes; the worshippers of the deities who preside over the elements go to them; but My devotees come to Me."}, {"c": 9, "v": 26, "s": "\u092a\u0924\u094d\u0930\u0902 \u092a\u0941\u0937\u094d\u092a\u0902 \u092b\u0932\u0902 \u0924\u094b\u092f\u0902 \u092f\u094b \u092e\u0947 \u092d\u0915\u094d\u0924\u094d\u092f\u093e \u092a\u094d\u0930\u092f\u091a\u094d\u091b\u0924\u093f\u0964\n\n\u0924\u0926\u0939\u0902 \u092d\u0915\u094d\u0924\u094d\u092f\u0941\u092a\u0939\u0943\u0924\u092e\u0936\u094d\u0928\u093e\u092e\u093f \u092a\u094d\u0930\u092f\u0924\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u09649.26\u0964\u0964", "r": "patra\u1e41 pu\u1e63hpa\u1e41 phala\u1e41 toya\u1e41 yo me bhakty\u0101 prayachchhati\ntadaha\u1e41 bhaktyupah\u1e5bitam a\u015bhn\u0101mi prayat\u0101tmana\u1e25", "t": "Whoever offers Me with devotion a leaf, a flower, a fruit, or a little water, that, so offered devotedly by the pure-minded, I accept."}, {"c": 9, "v": 27, "s": "\u092f\u0924\u094d\u0915\u0930\u094b\u0937\u093f \u092f\u0926\u0936\u094d\u0928\u093e\u0938\u093f \u092f\u091c\u094d\u091c\u0941\u0939\u094b\u0937\u093f \u0926\u0926\u093e\u0938\u093f \u092f\u0924\u094d\u0964\n\n\u092f\u0924\u094d\u0924\u092a\u0938\u094d\u092f\u0938\u093f \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0924\u0924\u094d\u0915\u0941\u0930\u0941\u0937\u094d\u0935 \u092e\u0926\u0930\u094d\u092a\u0923\u092e\u094d\u0964\u09649.27\u0964\u0964", "r": "yat karo\u1e63hi yad a\u015bhn\u0101si yaj juho\u1e63hi dad\u0101si yat\nyat tapasyasi kaunteya tat kuru\u1e63hva mad-arpa\u1e47am", "t": "Whatever you do, whatever you eat, whatever you offer in sacrifice, whatever you give, whatever austerity you practice, O Arjuna, do it as an offering to Me."}, {"c": 9, "v": 28, "s": "\u0936\u0941\u092d\u093e\u0936\u0941\u092d\u092b\u0932\u0948\u0930\u0947\u0935\u0902 \u092e\u094b\u0915\u094d\u0937\u094d\u092f\u0938\u0947 \u0915\u0930\u094d\u092e\u092c\u0928\u094d\u0927\u0928\u0948\u0903\u0964\n\n\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u092f\u094b\u0917\u092f\u0941\u0915\u094d\u0924\u093e\u0924\u094d\u092e\u093e \u0935\u093f\u092e\u0941\u0915\u094d\u0924\u094b \u092e\u093e\u092e\u0941\u092a\u0948\u0937\u094d\u092f\u0938\u093f\u0964\u09649.28\u0964\u0964", "r": "\u015bhubh\u0101\u015bhubha-phalair eva\u1e41 mok\u1e63hyase karma-bandhanai\u1e25\nsanny\u0101sa-yoga-yukt\u0101tm\u0101 vimukto m\u0101m upai\u1e63hyasi", "t": "Thus, you shall be freed from the bonds of actions yielding good and evil fruits; with the mind steadfast in the Yoga of renunciation, and liberated, you shall come to Me."}, {"c": 9, "v": 29, "s": "\u0938\u092e\u094b\u093d\u0939\u0902 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0947\u0937\u0941 \u0928 \u092e\u0947 \u0926\u094d\u0935\u0947\u0937\u094d\u092f\u094b\u093d\u0938\u094d\u0924\u093f \u0928 \u092a\u094d\u0930\u093f\u092f\u0903\u0964\n\n\u092f\u0947 \u092d\u091c\u0928\u094d\u0924\u093f \u0924\u0941 \u092e\u093e\u0902 \u092d\u0915\u094d\u0924\u094d\u092f\u093e \u092e\u092f\u093f \u0924\u0947 \u0924\u0947\u0937\u0941 \u091a\u093e\u092a\u094d\u092f\u0939\u092e\u094d\u0964\u09649.29\u0964\u0964", "r": "samo \u2019ha\u1e41 sarva-bh\u016bte\u1e63hu na me dve\u1e63hyo \u2019sti na priya\u1e25\nye bhajanti tu m\u0101\u1e41 bhakty\u0101 mayi te te\u1e63hu ch\u0101pyaham", "t": "I am the same to all beings; there is none hateful or dear to Me; but those who worship Me with devotion are in Me, and I am also in them."}, {"c": 9, "v": 30, "s": "\u0905\u092a\u093f \u091a\u0947\u0924\u094d\u0938\u0941\u0926\u0941\u0930\u093e\u091a\u093e\u0930\u094b \u092d\u091c\u0924\u0947 \u092e\u093e\u092e\u0928\u0928\u094d\u092f\u092d\u093e\u0915\u094d\u0964\n\n\u0938\u093e\u0927\u0941\u0930\u0947\u0935 \u0938 \u092e\u0928\u094d\u0924\u0935\u094d\u092f\u0903 \u0938\u092e\u094d\u092f\u0917\u094d\u0935\u094d\u092f\u0935\u0938\u093f\u0924\u094b \u0939\u093f \u0938\u0903\u0964\u09649.30\u0964\u0964", "r": "api chet su-dur\u0101ch\u0101ro bhajate m\u0101m ananya-bh\u0101k\ns\u0101dhur eva sa mantavya\u1e25 samyag vyavasito hi sa\u1e25", "t": "Even if the most sinful worships Me, with devotion to no one else, he should indeed be regarded as righteous, for he has rightly resolved."}, {"c": 9, "v": 31, "s": "\u0915\u094d\u0937\u093f\u092a\u094d\u0930\u0902 \u092d\u0935\u0924\u093f \u0927\u0930\u094d\u092e\u093e\u0924\u094d\u092e\u093e \u0936\u0936\u094d\u0935\u091a\u094d\u091b\u093e\u0928\u094d\u0924\u093f\u0902 \u0928\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\n\n\u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092a\u094d\u0930\u0924\u093f\u091c\u093e\u0928\u0940\u0939\u093f \u0928 \u092e\u0947 \u092d\u0915\u094d\u0924\u0903 \u092a\u094d\u0930\u0923\u0936\u094d\u092f\u0924\u093f\u0964\u09649.31\u0964\u0964", "r": "k\u1e63hipra\u1e41 bhavati dharm\u0101tm\u0101 \u015bha\u015bhvach-chh\u0101nti\u1e41 nigachchhati\nkaunteya pratij\u0101n\u012bhi na me bhakta\u1e25 pra\u1e47a\u015bhyati", "t": "Soon he becomes righteous and attains eternal peace; O Arjuna, proclaim thou for certain that My devotee never perishes."}, {"c": 9, "v": 32, "s": "\u092e\u093e\u0902 \u0939\u093f \u092a\u093e\u0930\u094d\u0925 \u0935\u094d\u092f\u092a\u093e\u0936\u094d\u0930\u093f\u0924\u094d\u092f \u092f\u0947\u093d\u092a\u093f \u0938\u094d\u092f\u0941\u0903 \u092a\u093e\u092a\u092f\u094b\u0928\u092f\u0903\u0964\n\n\u0938\u094d\u0924\u094d\u0930\u093f\u092f\u094b \u0935\u0948\u0936\u094d\u092f\u093e\u0938\u094d\u0925\u093e \u0936\u0942\u0926\u094d\u0930\u093e\u0938\u094d\u0924\u0947\u093d\u092a\u093f \u092f\u093e\u0928\u094d\u0924\u093f \u092a\u0930\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u09649.32\u0964\u0964", "r": "m\u0101\u1e41 hi p\u0101rtha vyap\u0101\u015bhritya ye \u2019pi syu\u1e25 p\u0101pa-yonaya\u1e25\nstriyo vai\u015bhy\u0101s tath\u0101 \u015bh\u016bdr\u0101s te \u2019pi y\u0101nti par\u0101\u1e41 gatim", "t": "O Arjuna, by taking refuge in Me, even those of sinful birth, as well as women, Vaishyas, and Shudras, all attain the Supreme Goal."}, {"c": 9, "v": 33, "s": "\u0915\u093f\u0902 \u092a\u0941\u0928\u0930\u094d\u092c\u094d\u0930\u093e\u0939\u094d\u092e\u0923\u093e\u0903 \u092a\u0941\u0923\u094d\u092f\u093e \u092d\u0915\u094d\u0924\u093e \u0930\u093e\u091c\u0930\u094d\u0937\u092f\u0938\u094d\u0924\u0925\u093e\u0964\n\n\u0905\u0928\u093f\u0924\u094d\u092f\u092e\u0938\u0941\u0916\u0902 \u0932\u094b\u0915\u092e\u093f\u092e\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u092f \u092d\u091c\u0938\u094d\u0935 \u092e\u093e\u092e\u094d\u0964\u09649.33\u0964\u0964", "r": "ki\u1e41 punar br\u0101hma\u1e47\u0101\u1e25 pu\u1e47y\u0101 bhakt\u0101 r\u0101jar\u1e63hayas tath\u0101\nanityam asukha\u1e41 lokam ima\u1e41 pr\u0101pya bhajasva m\u0101m", "t": "How much more easily, then, do Brahmins and devoted royal saints attain the goal? Having come to this impermanent and unhappy world, do thou worship Me."}, {"c": 9, "v": 34, "s": "\u092e\u0928\u094d\u092e\u0928\u093e \u092d\u0935 \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u094b \u092e\u0926\u094d\u092f\u093e\u091c\u0940 \u092e\u093e\u0902 \u0928\u092e\u0938\u094d\u0915\u0941\u0930\u0941\u0964\n\n\u092e\u093e\u092e\u0947\u0935\u0948\u0937\u094d\u092f\u0938\u093f \u092f\u0941\u0915\u094d\u0924\u094d\u0935\u0948\u0935\u092e\u093e\u0924\u094d\u092e\u093e\u0928\u0902 \u092e\u0924\u094d\u092a\u0930\u093e\u092f\u0923\u0903\u0964\u09649.34\u0964\u0964", "r": "man-man\u0101 bhava mad-bhakto mad-y\u0101j\u012b m\u0101\u1e41 namaskuru\nm\u0101m evai\u1e63hyasi yuktvaivam \u0101tm\u0101na\u1e41 mat-par\u0101ya\u1e47a\u1e25", "t": "Fix your mind on Me; be devoted to Me; sacrifice to Me; bow down to Me; having thus united your whole self to Me, taking Me as the supreme goal, you will come to Me."}, {"c": 10, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092d\u0942\u092f \u090f\u0935 \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0936\u094d\u0930\u0943\u0923\u0941 \u092e\u0947 \u092a\u0930\u092e\u0902 \u0935\u091a\u0903\u0964\n\n\u092f\u0924\u094d\u0924\u0947\u093d\u0939\u0902 \u092a\u094d\u0930\u0940\u092f\u092e\u093e\u0923\u093e\u092f \u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u093f \u0939\u093f\u0924\u0915\u093e\u092e\u094d\u092f\u092f\u093e\u0964\u096410.1\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nbh\u016bya eva mah\u0101-b\u0101ho \u015bh\u1e5bi\u1e47u me parama\u1e41 vacha\u1e25\nyatte \u2019ha\u1e41 pr\u012byam\u0101\u1e47\u0101ya vak\u1e63hy\u0101mi hita-k\u0101myay\u0101", "t": "The Blessed Lord said, Again, O mighty-armed Arjuna, listen to my supreme word which I will declare to you, who are beloved, for your welfare."}, {"c": 10, "v": 2, "s": "\u0928 \u092e\u0947 \u0935\u093f\u0926\u0941\u0903 \u0938\u0941\u0930\u0917\u0923\u093e\u0903 \u092a\u094d\u0930\u092d\u0935\u0902 \u0928 \u092e\u0939\u0930\u094d\u0937\u092f\u0903\u0964\n\n\u0905\u0939\u092e\u093e\u0926\u093f\u0930\u094d\u0939\u093f \u0926\u0947\u0935\u093e\u0928\u093e\u0902 \u092e\u0939\u0930\u094d\u0937\u0940\u0923\u093e\u0902 \u091a \u0938\u0930\u094d\u0935\u0936\u0903\u0964\u096410.2\u0964\u0964", "r": "na me vidu\u1e25 sura-ga\u1e47\u0101\u1e25 prabhava\u1e41 na mahar\u1e63haya\u1e25\naham \u0101dir hi dev\u0101n\u0101\u1e41 mahar\u1e63h\u012b\u1e47\u0101\u1e41 cha sarva\u015bha\u1e25", "t": "Neither the hosts of the gods nor the great sages know My origin; for I am the source of all the gods and the great sages in every way."}, {"c": 10, "v": 3, "s": "\u092f\u094b \u092e\u093e\u092e\u091c\u092e\u0928\u093e\u0926\u093f\u0902 \u091a \u0935\u0947\u0924\u094d\u0924\u093f \u0932\u094b\u0915\u092e\u0939\u0947\u0936\u094d\u0935\u0930\u092e\u094d\u0964\n\n\u0905\u0938\u092e\u094d\u092e\u0942\u0922\u0903 \u0938 \u092e\u0930\u094d\u0924\u094d\u092f\u0947\u0937\u0941 \u0938\u0930\u094d\u0935\u092a\u093e\u092a\u0948\u0903 \u092a\u094d\u0930\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u096410.3\u0964\u0964", "r": "yo m\u0101majam an\u0101di\u1e41 cha vetti loka-mahe\u015bhvaram\nasamm\u016b\u1e0dha\u1e25 sa martye\u1e63hu sarva-p\u0101pai\u1e25 pramuchyate", "t": "He who knows Me as unborn and beginningless, as the great Lord of the worlds, he among mortals is undeluded and is liberated from all sins."}, {"c": 10, "v": 4, "s": "\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u091c\u094d\u091e\u093e\u0928\u092e\u0938\u0902\u092e\u094b\u0939\u0903 \u0915\u094d\u0937\u092e\u093e \u0938\u0924\u094d\u092f\u0902 \u0926\u092e\u0903 \u0936\u092e\u0903\u0964\n\n\u0938\u0941\u0916\u0902 \u0926\u0941\u0903\u0916\u0902 \u092d\u0935\u094b\u093d\u092d\u093e\u0935\u094b \u092d\u092f\u0902 \u091a\u093e\u092d\u092f\u092e\u0947\u0935 \u091a\u0964\u096410.4\u0964\u0964", "r": "buddhir j\u00f1\u0101nam asammoha\u1e25 k\u1e63ham\u0101 satya\u1e41 dama\u1e25 \u015bhama\u1e25\nsukha\u1e41 du\u1e25kha\u1e41 bhavo \u2019bh\u0101vo bhaya\u1e41 ch\u0101bhayameva cha", "t": "Intellect, wisdom, non-delusion, forgiveness, truth, self-restraint, calmness, happiness, pain, existence or birth, non-existence or death, fear, and also fearlessness."}, {"c": 10, "v": 5, "s": "\u0905\u0939\u093f\u0902\u0938\u093e \u0938\u092e\u0924\u093e \u0924\u0941\u0937\u094d\u091f\u093f\u0938\u094d\u0924\u092a\u094b \u0926\u093e\u0928\u0902 \u092f\u0936\u094b\u093d\u092f\u0936\u0903\u0964\n\n\u092d\u0935\u0928\u094d\u0924\u093f \u092d\u093e\u0935\u093e \u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u092e\u0924\u094d\u0924 \u090f\u0935 \u092a\u0943\u0925\u0917\u094d\u0935\u093f\u0927\u093e\u0903\u0964\u096410.5\u0964\u0964", "r": "ahi\u1e41s\u0101 samat\u0101 tu\u1e63\u1e6dis tapo d\u0101na\u1e41 ya\u015bo 'ya\u015ba\u1e25 bhavanti bh\u0101v\u0101 bh\u016bt\u0101n\u0101\u1e41 matta eva p\u1e5bthag-vidh\u0101\u1e25", "t": "Non-injury, equanimity, contentment, austerity, beneficence, fame, and ill-fame\u2014these different qualities of beings arise from Me alone."}, {"c": 10, "v": 6, "s": "\u092e\u0939\u0930\u094d\u0937\u092f\u0903 \u0938\u092a\u094d\u0924 \u092a\u0942\u0930\u094d\u0935\u0947 \u091a\u0924\u094d\u0935\u093e\u0930\u094b \u092e\u0928\u0935\u0938\u094d\u0924\u0925\u093e\u0964\n\n\u092e\u0926\u094d\u092d\u093e\u0935\u093e \u092e\u093e\u0928\u0938\u093e \u091c\u093e\u0924\u093e \u092f\u0947\u0937\u093e\u0902 \u0932\u094b\u0915 \u0907\u092e\u093e\u0903 \u092a\u094d\u0930\u091c\u093e\u0903\u0964\u096410.6\u0964\u0964", "r": "mahar\u1e63haya\u1e25 sapta p\u016brve chatv\u0101ro manavas tath\u0101\nmad-bh\u0101v\u0101 m\u0101nas\u0101 j\u0101t\u0101 ye\u1e63h\u0101\u1e41 loka im\u0101\u1e25 praj\u0101\u1e25", "t": "The seven great sages, the ancient four, and the Manus, possessing powers like Mine (due to their minds being fixed on Me), were born from My mind; from them, these creatures have been born in this world."}, {"c": 10, "v": 7, "s": "\u090f\u0924\u093e\u0902 \u0935\u093f\u092d\u0942\u0924\u093f\u0902 \u092f\u094b\u0917\u0902 \u091a \u092e\u092e \u092f\u094b \u0935\u0947\u0924\u094d\u0924\u093f \u0924\u0924\u094d\u0924\u094d\u0935\u0924\u0903\u0964\n\n\u0938\u094b\u093d\u0935\u093f\u0915\u092e\u094d\u092a\u0947\u0928 \u092f\u094b\u0917\u0947\u0928 \u092f\u0941\u091c\u094d\u092f\u0924\u0947 \u0928\u093e\u0924\u094d\u0930 \u0938\u0902\u0936\u092f\u0903\u0964\u096410.7\u0964\u0964", "r": "et\u0101\u1e41 vibh\u016bti\u1e41 yoga\u1e41 cha mama yo vetti tattvata\u1e25\nso \u2019vikampena yogena yujyate n\u0101tra san\u015bhaya\u1e25", "t": "He who truly knows these manifold manifestations of My Being and this Yoga-power of Mine, becomes established in unshakable Yoga; there is no doubt about it."}, {"c": 10, "v": 8, "s": "\u0905\u0939\u0902 \u0938\u0930\u094d\u0935\u0938\u094d\u092f \u092a\u094d\u0930\u092d\u0935\u094b \u092e\u0924\u094d\u0924\u0903 \u0938\u0930\u094d\u0935\u0902 \u092a\u094d\u0930\u0935\u0930\u094d\u0924\u0924\u0947\u0964\n\n\u0907\u0924\u093f \u092e\u0924\u094d\u0935\u093e \u092d\u091c\u0928\u094d\u0924\u0947 \u092e\u093e\u0902 \u092c\u0941\u0927\u093e \u092d\u093e\u0935\u0938\u092e\u0928\u094d\u0935\u093f\u0924\u093e\u0903\u0964\u096410.8\u0964\u0964", "r": "aha\u1e41 sarvasya prabhavo matta\u1e25 sarva\u1e41 pravartate\niti matv\u0101 bhajante m\u0101\u1e41 budh\u0101 bh\u0101va-samanvit\u0101\u1e25", "t": "I am the source of all; from me everything evolves; Understanding this, the wise, endowed with meditation, worship me."}, {"c": 10, "v": 9, "s": "\u092e\u091a\u094d\u091a\u093f\u0924\u094d\u0924\u093e \u092e\u0926\u094d\u0917\u0924\u092a\u094d\u0930\u093e\u0923\u093e \u092c\u094b\u0927\u092f\u0928\u094d\u0924\u0903 \u092a\u0930\u0938\u094d\u092a\u0930\u092e\u094d\u0964\n\n\u0915\u0925\u092f\u0928\u094d\u0924\u0936\u094d\u091a \u092e\u093e\u0902 \u0928\u093f\u0924\u094d\u092f\u0902 \u0924\u0941\u0937\u094d\u092f\u0928\u094d\u0924\u093f \u091a \u0930\u092e\u0928\u094d\u0924\u093f \u091a\u0964\u096410.9\u0964\u0964", "r": "mach-chitt\u0101 mad-gata-pr\u0101\u1e47\u0101 bodhayanta\u1e25 parasparam\nkathayanta\u015bh cha m\u0101\u1e41 nitya\u1e41 tu\u1e63hyanti cha ramanti cha", "t": "With their minds and lives wholly absorbed in Me, they enlighten each other and ever speak of Me, being satisfied and delighted."}, {"c": 10, "v": 10, "s": "\u0924\u0947\u0937\u093e\u0902 \u0938\u0924\u0924\u092f\u0941\u0915\u094d\u0924\u093e\u0928\u093e\u0902 \u092d\u091c\u0924\u093e\u0902 \u092a\u094d\u0930\u0940\u0924\u093f\u092a\u0942\u0930\u094d\u0935\u0915\u092e\u094d\u0964\n\n\u0926\u0926\u093e\u092e\u093f \u092c\u0941\u0926\u094d\u0927\u093f\u092f\u094b\u0917\u0902 \u0924\u0902 \u092f\u0947\u0928 \u092e\u093e\u092e\u0941\u092a\u092f\u093e\u0928\u094d\u0924\u093f \u0924\u0947\u0964\u096410.10\u0964\u0964", "r": "te\u1e63h\u0101\u1e41 satata-yukt\u0101n\u0101\u1e41 bhajat\u0101\u1e41 pr\u012bti-p\u016brvakam\ndad\u0101mi buddhi-yoga\u1e41 ta\u1e41 yena m\u0101m upay\u0101nti te", "t": "To those who are ever steadfast, worshipping me with love, I give the yoga of discrimination, by which they come to me."}, {"c": 10, "v": 11, "s": "\u0924\u0947\u0937\u093e\u092e\u0947\u0935\u093e\u0928\u0941\u0915\u092e\u094d\u092a\u093e\u0930\u094d\u0925\u092e\u0939\u092e\u091c\u094d\u091e\u093e\u0928\u091c\u0902 \u0924\u092e\u0903\u0964\n\n\u0928\u093e\u0936\u092f\u093e\u092e\u094d\u092f\u093e\u0924\u094d\u092e\u092d\u093e\u0935\u0938\u094d\u0925\u094b \u091c\u094d\u091e\u093e\u0928\u0926\u0940\u092a\u0947\u0928 \u092d\u093e\u0938\u094d\u0935\u0924\u093e\u0964\u096410.11\u0964\u0964", "r": "te\u1e63h\u0101m ev\u0101nukamp\u0101rtham aham aj\u00f1\u0101na-ja\u1e41 tama\u1e25\nn\u0101\u015bhay\u0101my\u0101tma-bh\u0101va-stho j\u00f1\u0101na-d\u012bpena bh\u0101svat\u0101", "t": "Out of mere compassion for them, I, dwelling within their selves, destroy the darkness born of ignorance with the luminous lamp of knowledge."}, {"c": 10, "v": 12, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u092a\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u092a\u0930\u0902 \u0927\u093e\u092e \u092a\u0935\u093f\u0924\u094d\u0930\u0902 \u092a\u0930\u092e\u0902 \u092d\u0935\u093e\u0928\u094d\u0964\n\n\u092a\u0941\u0930\u0941\u0937\u0902 \u0936\u093e\u0936\u094d\u0935\u0924\u0902 \u0926\u093f\u0935\u094d\u092f\u092e\u093e\u0926\u093f\u0926\u0947\u0935\u092e\u091c\u0902 \u0935\u093f\u092d\u0941\u092e\u094d\u0964\u096410.12\u0964\u0964", "r": "arjuna uv\u0101cha\npara\u1e41 brahma para\u1e41 dh\u0101ma pavitra\u1e41 parama\u1e41 bhav\u0101n\npuru\u1e63ha\u1e41 \u015bh\u0101\u015bhvata\u1e41 divyam \u0101di-devam aja\u1e41 vibhum", "t": "Arjuna said, \"You are the Supreme Brahman, the supreme abode, the supreme purifier, eternal, divine Person, the primeval God, unborn, and omnipresent.\""}, {"c": 10, "v": 13, "s": "\u0906\u0939\u0941\u0938\u094d\u0924\u094d\u0935\u093e\u092e\u0943\u0937\u092f\u0903 \u0938\u0930\u094d\u0935\u0947 \u0926\u0947\u0935\u0930\u094d\u0937\u093f\u0930\u094d\u0928\u093e\u0930\u0926\u0938\u094d\u0924\u0925\u093e\u0964\n\n\u0905\u0938\u093f\u0924\u094b \u0926\u0947\u0935\u0932\u094b \u0935\u094d\u092f\u093e\u0938\u0903 \u0938\u094d\u0935\u092f\u0902 \u091a\u0948\u0935 \u092c\u094d\u0930\u0935\u0940\u0937\u093f \u092e\u0947\u0964\u096410.13\u0964\u0964", "r": "\u0101hus tv\u0101m \u1e5bi\u1e63haya\u1e25 sarve devar\u1e63hir n\u0101radas tath\u0101\nasito devalo vy\u0101sa\u1e25 svaya\u1e41 chaiva brav\u012b\u1e63hi me", "t": "All the sages have thus declared Thee, as also the divine sage Narada; so also Asita, Devala, and Vyasa; and now Thou Thyself dost say so to me."}, {"c": 10, "v": 14, "s": "\u0938\u0930\u094d\u0935\u092e\u0947\u0924\u0926\u0943\u0924\u0902 \u092e\u0928\u094d\u092f\u0947 \u092f\u0928\u094d\u092e\u093e\u0902 \u0935\u0926\u0938\u093f \u0915\u0947\u0936\u0935\u0964\n\n\u0928 \u0939\u093f \u0924\u0947 \u092d\u0917\u0935\u0928\u094d \u0935\u094d\u092f\u0915\u094d\u093f\u0924\u0902 \u0935\u093f\u0926\u0941\u0930\u094d\u0926\u0947\u0935\u093e \u0928 \u0926\u093e\u0928\u0935\u093e\u0903\u0964\u096410.14\u0964\u0964", "r": "sarvam etad \u1e5bita\u1e41 manye yan m\u0101\u1e41 vadasi ke\u015bhava\nna hi te bhagavan vyakti\u1e41 vidur dev\u0101 na d\u0101nav\u0101\u1e25", "t": "I believe all that You have said to me to be true, O Krishna; indeed, O blessed Lord! Neither the gods nor the demons know Your manifestation (origin)."}, {"c": 10, "v": 15, "s": "\u0938\u094d\u0935\u092f\u092e\u0947\u0935\u093e\u0924\u094d\u092e\u0928\u093e\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u0935\u0947\u0924\u094d\u0925 \u0924\u094d\u0935\u0902 \u092a\u0941\u0930\u0941\u0937\u094b\u0924\u094d\u0924\u092e\u0964\n\n\u092d\u0942\u0924\u092d\u093e\u0935\u0928 \u092d\u0942\u0924\u0947\u0936 \u0926\u0947\u0935\u0926\u0947\u0935 \u091c\u0917\u0924\u094d\u092a\u0924\u0947\u0964\u096410.15\u0964\u0964", "r": "swayam ev\u0101tman\u0101tm\u0101na\u1e41 vettha tva\u1e41 puru\u1e63hottama\nbh\u016bta-bh\u0101vana bh\u016bte\u015bha deva-deva jagat-pate", "t": "Verily, Thou Thyself knowest Thyself by Thyself, O Supreme Person, O source and Lord of all beings, O God of gods, O ruler of the world!"}, {"c": 10, "v": 16, "s": "\u0935\u0915\u094d\u0924\u0941\u092e\u0930\u094d\u0939\u0938\u094d\u092f\u0936\u0947\u0937\u0947\u0923 \u0926\u093f\u0935\u094d\u092f\u093e \u0939\u094d\u092f\u093e\u0924\u094d\u092e\u0935\u093f\u092d\u0942\u0924\u092f\u0903\u0964\n\n\u092f\u093e\u092d\u093f\u0930\u094d\u0935\u093f\u092d\u0942\u0924\u093f\u092d\u093f\u0930\u094d\u0932\u094b\u0915\u093e\u0928\u093f\u092e\u093e\u0902\u0938\u094d\u0924\u094d\u0935\u0902 \u0935\u094d\u092f\u093e\u092a\u094d\u092f \u0924\u093f\u0937\u094d\u0920\u0938\u093f\u0964\u096410.16\u0964\u0964", "r": "vaktum arhasya\u015bhe\u1e63he\u1e47a divy\u0101 hy\u0101tma-vibh\u016btaya\u1e25\ny\u0101bhir vibh\u016btibhir lok\u0101n im\u0101\u1e41s tva\u1e41 vy\u0101pya ti\u1e63h\u1e6dhasi", "t": "You should indeed tell, without reserve, of your divine glories by which you exist, pervading all these worlds. (No one else can do so.)"}, {"c": 10, "v": 17, "s": "\u0915\u0925\u0902 \u0935\u093f\u0926\u094d\u092f\u093e\u092e\u0939\u0902 \u092f\u094b\u0917\u093f\u0902\u0938\u094d\u0924\u094d\u0935\u093e\u0902 \u0938\u0926\u093e \u092a\u0930\u093f\u091a\u093f\u0928\u094d\u0924\u092f\u0928\u094d\u0964\n\n\u0915\u0947\u0937\u0941 \u0915\u0947\u0937\u0941 \u091a \u092d\u093e\u0935\u0947\u0937\u0941 \u091a\u093f\u0928\u094d\u0924\u094d\u092f\u094b\u093d\u0938\u093f \u092d\u0917\u0935\u0928\u094d\u092e\u092f\u093e\u0964\u096410.17\u0964\u0964", "r": "katha\u1e41 vidy\u0101m aha\u1e41 yogins tv\u0101\u1e41 sad\u0101 parichintayan\nke\u1e63hu ke\u1e63hu cha bh\u0101ve\u1e63hu chintyo \u2019si bhagavan may\u0101", "t": "How shall I, ever meditating, know you, O Yogin? In what aspects or things, O blessed Lord, should I think of you?"}, {"c": 10, "v": 18, "s": "\u0935\u093f\u0938\u094d\u0924\u0930\u0947\u0923\u093e\u0924\u094d\u092e\u0928\u094b \u092f\u094b\u0917\u0902 \u0935\u093f\u092d\u0942\u0924\u093f\u0902 \u091a \u091c\u0928\u093e\u0930\u094d\u0926\u0928\u0964\n\n\u092d\u0942\u092f\u0903 \u0915\u0925\u092f \u0924\u0943\u092a\u094d\u0924\u093f\u0930\u094d\u0939\u093f \u0936\u094d\u0930\u0943\u0923\u094d\u0935\u0924\u094b \u0928\u093e\u0938\u094d\u0924\u093f \u092e\u0947\u093d\u092e\u0943\u0924\u092e\u094d\u0964\u096410.18\u0964\u0964", "r": "vistare\u1e47\u0101tmano yoga\u1e41 vibh\u016bti\u1e41 cha jan\u0101rdana\nbh\u016bya\u1e25 kathaya t\u1e5biptir hi \u015bh\u1e5bi\u1e47vato n\u0101sti me \u2019m\u1e5bitam", "t": "Tell me again in detail, O Krishna, of your yogic power and glory; for I am not satiated with what I have heard of your life-giving and nectar-like speech."}, {"c": 10, "v": 19, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0939\u0928\u094d\u0924 \u0924\u0947 \u0915\u0925\u092f\u093f\u0937\u094d\u092f\u093e\u092e\u093f \u0926\u093f\u0935\u094d\u092f\u093e \u0939\u094d\u092f\u093e\u0924\u094d\u092e\u0935\u093f\u092d\u0942\u0924\u092f\u0903\u0964\n\n\u092a\u094d\u0930\u093e\u0927\u093e\u0928\u094d\u092f\u0924\u0903 \u0915\u0941\u0930\u0941\u0936\u094d\u0930\u0947\u0937\u094d\u0920 \u0928\u093e\u0938\u094d\u0924\u094d\u092f\u0928\u094d\u0924\u094b \u0935\u093f\u0938\u094d\u0924\u0930\u0938\u094d\u092f \u092e\u0947\u0964\u096410.19\u0964\u0964", "r": "\u015bhr\u012b bhagav\u0101n uv\u0101cha\nhanta te kathayi\u1e63hy\u0101mi divy\u0101 hy\u0101tma-vibh\u016btaya\u1e25\npr\u0101dh\u0101nyata\u1e25 kuru-\u015bhre\u1e63h\u1e6dha n\u0101styanto vistarasya me", "t": "The Blessed Lord said, \"Very well! Now I will declare to you My divine glories in their prominence, O Arjuna; there is no end to their detailed description.\""}, {"c": 10, "v": 20, "s": "\u0905\u0939\u092e\u093e\u0924\u094d\u092e\u093e \u0917\u0941\u0921\u093e\u0915\u0947\u0936 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0936\u092f\u0938\u094d\u0925\u093f\u0924\u0903\u0964\n\n\u0905\u0939\u092e\u093e\u0926\u093f\u0936\u094d\u091a \u092e\u0927\u094d\u092f\u0902 \u091a \u092d\u0942\u0924\u093e\u0928\u093e\u092e\u0928\u094d\u0924 \u090f\u0935 \u091a\u0964\u096410.20\u0964\u0964", "r": "aham \u0101tm\u0101 gu\u1e0d\u0101ke\u015bha sarva-bh\u016bt\u0101\u015bhaya-sthita\u1e25\naham \u0101di\u015bh cha madhya\u1e41 cha bh\u016bt\u0101n\u0101m anta eva cha", "t": "I am the Self, O Gudakesa, seated in the hearts of all beings; I am the beginning, the middle, and the end of all beings."}, {"c": 10, "v": 21, "s": "\u0906\u0926\u093f\u0924\u094d\u092f\u093e\u0928\u093e\u092e\u0939\u0902 \u0935\u093f\u0937\u094d\u0923\u0941\u0930\u094d\u091c\u094d\u092f\u094b\u0924\u093f\u0937\u093e\u0902 \u0930\u0935\u093f\u0930\u0902\u0936\u0941\u092e\u093e\u0928\u094d\u0964\n\n\u092e\u0930\u0940\u091a\u093f\u0930\u094d\u092e\u0930\u0941\u0924\u093e\u092e\u0938\u094d\u092e\u093f \u0928\u0915\u094d\u0937\u0924\u094d\u0930\u093e\u0923\u093e\u092e\u0939\u0902 \u0936\u0936\u0940\u0964\u096410.21\u0964\u0964", "r": "\u0101dity\u0101n\u0101m aha\u1e41 vi\u1e63h\u1e47ur jyoti\u1e63h\u0101\u1e41 ravir an\u015bhum\u0101n\nmar\u012bchir marut\u0101m asmi nak\u1e63hatr\u0101\u1e47\u0101m aha\u1e41 \u015bha\u015bh\u012b", "t": "Among the twelve Adityas, I am Vishnu; among luminaries, the radiant sun; among the seven or forty-nine Maruts, I am Marichi; among stars, I am the moon."}, {"c": 10, "v": 22, "s": "\u0935\u0947\u0926\u093e\u0928\u093e\u0902 \u0938\u093e\u092e\u0935\u0947\u0926\u094b\u093d\u0938\u094d\u092e\u093f \u0926\u0947\u0935\u093e\u0928\u093e\u092e\u0938\u094d\u092e\u093f \u0935\u093e\u0938\u0935\u0903\u0964\n\n\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093e\u0902 \u092e\u0928\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u092d\u0942\u0924\u093e\u0928\u093e\u092e\u0938\u094d\u092e\u093f \u091a\u0947\u0924\u0928\u093e\u0964\u096410.22\u0964\u0964", "r": "ved\u0101n\u0101\u1e41 s\u0101ma-vedo \u2019smi dev\u0101n\u0101m asmi v\u0101sava\u1e25\nindriy\u0101\u1e47\u0101\u1e41 mana\u015bh ch\u0101smi bh\u016bt\u0101n\u0101m asmi chetan\u0101", "t": "Among the Vedas, I am the Sama-Veda; among the gods, I am Vasava; among the senses, I am the mind; and among living beings, I am intelligence."}, {"c": 10, "v": 23, "s": "\u0930\u0941\u0926\u094d\u0930\u093e\u0923\u093e\u0902 \u0936\u0919\u094d\u0915\u0930\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0935\u093f\u0924\u094d\u0924\u0947\u0936\u094b \u092f\u0915\u094d\u0937\u0930\u0915\u094d\u0937\u0938\u093e\u092e\u094d\u0964\n\n\u0935\u0938\u0942\u0928\u093e\u0902 \u092a\u093e\u0935\u0915\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u092e\u0947\u0930\u0941\u0903 \u0936\u093f\u0916\u0930\u093f\u0923\u093e\u092e\u0939\u092e\u094d\u0964\u096410.23\u0964\u0964", "r": "rudr\u0101\u1e47\u0101\u1e41 \u015bha\u1e45kara\u015bh ch\u0101smi vitte\u015bho yak\u1e63ha-rak\u1e63has\u0101m\nvas\u016bn\u0101\u1e41 p\u0101vaka\u015bh ch\u0101smi meru\u1e25 \u015bhikhari\u1e47\u0101m aham", "t": "And among the Rudras, I am Sankara; among the Yakshas and Rakshasas, the Lord of Wealth (Kubera); among the Vasus, I am Pavaka (Fire); and among the seven mountains, I am Meru."}, {"c": 10, "v": 24, "s": "\u092a\u0941\u0930\u094b\u0927\u0938\u093e\u0902 \u091a \u092e\u0941\u0916\u094d\u092f\u0902 \u092e\u093e\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092a\u093e\u0930\u094d\u0925 \u092c\u0943\u0939\u0938\u094d\u092a\u0924\u093f\u092e\u094d\u0964\n\n\u0938\u0947\u0928\u093e\u0928\u0940\u0928\u093e\u092e\u0939\u0902 \u0938\u094d\u0915\u0928\u094d\u0926\u0903 \u0938\u0930\u0938\u093e\u092e\u0938\u094d\u092e\u093f \u0938\u093e\u0917\u0930\u0903\u0964\u096410.24\u0964\u0964", "r": "purodhas\u0101\u1e41 cha mukhya\u1e41 m\u0101\u1e41 viddhi p\u0101rtha b\u1e5bihaspatim\nsen\u0101n\u012bn\u0101m aha\u1e41 skanda\u1e25 saras\u0101m asmi s\u0101gara\u1e25", "t": "And, among the household priests of kings, O Arjuna, know Me to be the chief, Brihaspati; among the army generals, I am Skanda; among lakes, I am the ocean."}, {"c": 10, "v": 25, "s": "\u092e\u0939\u0930\u094d\u0937\u0940\u0923\u093e\u0902 \u092d\u0943\u0917\u0941\u0930\u0939\u0902 \u0917\u093f\u0930\u093e\u092e\u0938\u094d\u092e\u094d\u092f\u0947\u0915\u092e\u0915\u094d\u0937\u0930\u092e\u094d\u0964\n\n\u092f\u091c\u094d\u091e\u093e\u0928\u093e\u0902 \u091c\u092a\u092f\u091c\u094d\u091e\u094b\u093d\u0938\u094d\u092e\u093f \u0938\u094d\u0925\u093e\u0935\u0930\u093e\u0923\u093e\u0902 \u0939\u093f\u092e\u093e\u0932\u092f\u0903\u0964\u096410.25\u0964\u0964", "r": "mahar\u1e63h\u012b\u1e47\u0101\u1e41 bh\u1e5bigur aha\u1e41 gir\u0101m asmyekam ak\u1e63haram\nyaj\u00f1\u0101n\u0101\u1e41 japa-yaj\u00f1o \u2019smi sth\u0101var\u0101\u1e47\u0101\u1e41 him\u0101laya\u1e25", "t": "Among the great sages, I am Bhrigu; among words, I am the one syllable (Om); among sacrifices, I am the sacrifice of silent repetition; among the immovable things, I am the Himalayas."}, {"c": 10, "v": 26, "s": "\u0905\u0936\u094d\u0935\u0924\u094d\u0925\u0903 \u0938\u0930\u094d\u0935\u0935\u0943\u0915\u094d\u0937\u093e\u0923\u093e\u0902 \u0926\u0947\u0935\u0930\u094d\u0937\u0940\u0923\u093e\u0902 \u091a \u0928\u093e\u0930\u0926\u0903\u0964\n\n\u0917\u0928\u094d\u0927\u0930\u094d\u0935\u093e\u0923\u093e\u0902 \u091a\u093f\u0924\u094d\u0930\u0930\u0925\u0903 \u0938\u093f\u0926\u094d\u0927\u093e\u0928\u093e\u0902 \u0915\u092a\u093f\u0932\u094b \u092e\u0941\u0928\u093f\u0903\u0964\u096410.26\u0964\u0964", "r": "a\u015bhvattha\u1e25 sarva-v\u1e5bik\u1e63h\u0101\u1e47\u0101\u1e41 devar\u1e63h\u012b\u1e47\u0101\u1e41 cha n\u0101rada\u1e25\ngandharv\u0101\u1e47\u0101\u1e41 chitraratha\u1e25 siddh\u0101n\u0101\u1e41 kapilo muni\u1e25", "t": "Among all the trees, I am the Peepul; among the divine sages, I am Narada; among the Gandharvas, I am Chitraratha; among the perfected, I am the sage Kapila."}, {"c": 10, "v": 27, "s": "\u0909\u091a\u094d\u091a\u0948\u0903\u0936\u094d\u0930\u0935\u0938\u092e\u0936\u094d\u0935\u093e\u0928\u093e\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092e\u093e\u092e\u092e\u0943\u0924\u094b\u0926\u094d\u092d\u0935\u092e\u094d\u0964\n\n\u0910\u0930\u093e\u0935\u0924\u0902 \u0917\u091c\u0947\u0928\u094d\u0926\u094d\u0930\u093e\u0923\u093e\u0902 \u0928\u0930\u093e\u0923\u093e\u0902 \u091a \u0928\u0930\u093e\u0927\u093f\u092a\u092e\u094d\u0964\u096410.27\u0964\u0964", "r": "uchchai\u1e25\u015bhravasam a\u015bhv\u0101n\u0101\u1e41 viddhi m\u0101m am\u1e5bitodbhavam\nair\u0101vata\u1e41 gajendr\u0101\u1e47\u0101\u1e41 nar\u0101\u1e47\u0101\u1e41 cha nar\u0101dhipam", "t": "Know Me as Ucchaisravas, born of nectar, among horses; Airavata among lordly elephants; and the king among men."}, {"c": 10, "v": 28, "s": "\u0906\u092f\u0941\u0927\u093e\u0928\u093e\u092e\u0939\u0902 \u0935\u091c\u094d\u0930\u0902 \u0927\u0947\u0928\u0942\u0928\u093e\u092e\u0938\u094d\u092e\u093f \u0915\u093e\u092e\u0927\u0941\u0915\u094d\u0964\n\n\u092a\u094d\u0930\u091c\u0928\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0915\u0928\u094d\u0926\u0930\u094d\u092a\u0903 \u0938\u0930\u094d\u092a\u093e\u0923\u093e\u092e\u0938\u094d\u092e\u093f \u0935\u093e\u0938\u0941\u0915\u093f\u0903\u0964\u096410.28\u0964\u0964", "r": "\u0101yudh\u0101n\u0101m aha\u1e41 vajra\u1e41 dhen\u016bn\u0101m asmi k\u0101madhuk\nprajana\u015bh ch\u0101smi kandarpa\u1e25 sarp\u0101\u1e47\u0101m asmi v\u0101suki\u1e25", "t": "Among weapons, I am the thunderbolt; among cows, I am the wish-fulfilling cow called Kamadhenu; I am the progenitor, the god of love; among serpents, I am Vasuki."}, {"c": 10, "v": 29, "s": "\u0905\u0928\u0928\u094d\u0924\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0928\u093e\u0917\u093e\u0928\u093e\u0902 \u0935\u0930\u0941\u0923\u094b \u092f\u093e\u0926\u0938\u093e\u092e\u0939\u092e\u094d\u0964\n\n\u092a\u093f\u0924\u0943\u093c\u0923\u093e\u092e\u0930\u094d\u092f\u092e\u093e \u091a\u093e\u0938\u094d\u092e\u093f \u092f\u092e\u0903 \u0938\u0902\u092f\u092e\u0924\u093e\u092e\u0939\u092e\u094d\u0964\u096410.29\u0964\u0964", "r": "ananta\u015bh ch\u0101smi n\u0101g\u0101n\u0101\u1e41 varu\u1e47o y\u0101das\u0101m aham\npit\u1e5d\u012b\u1e47\u0101m aryam\u0101 ch\u0101smi yama\u1e25 sanyamat\u0101m aham", "t": "I am Ananta among the Nagas; I am Varuna among water-deities; Aryaman among the Manes; I am Yama among the governors."}, {"c": 10, "v": 30, "s": "\u092a\u094d\u0930\u0939\u094d\u0932\u093e\u0926\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0926\u0948\u0924\u094d\u092f\u093e\u0928\u093e\u0902 \u0915\u093e\u0932\u0903 \u0915\u0932\u092f\u0924\u093e\u092e\u0939\u092e\u094d\u0964\n\n\u092e\u0943\u0917\u093e\u0923\u093e\u0902 \u091a \u092e\u0943\u0917\u0947\u0928\u094d\u0926\u094d\u0930\u094b\u093d\u0939\u0902 \u0935\u0948\u0928\u0924\u0947\u092f\u0936\u094d\u091a \u092a\u0915\u094d\u0937\u093f\u0923\u093e\u092e\u094d\u0964\u096410.30\u0964\u0964", "r": "prahl\u0101da\u015bh ch\u0101smi daity\u0101n\u0101\u1e41 k\u0101la\u1e25 kalayat\u0101m aham\nm\u1e5big\u0101\u1e47\u0101\u1e41 cha m\u1e5bigendro \u2019ha\u1e41 vainateya\u015bh cha pak\u1e63hi\u1e47\u0101m", "t": "And I am Prahlada among the demons, I am Time among reckoners, I am the lion among beasts, and Vainateya (Garuda) among birds."}, {"c": 10, "v": 31, "s": "\u092a\u0935\u0928\u0903 \u092a\u0935\u0924\u093e\u092e\u0938\u094d\u092e\u093f \u0930\u093e\u092e\u0903 \u0936\u0938\u094d\u0924\u094d\u0930\u092d\u0943\u0924\u093e\u092e\u0939\u092e\u094d\u0964\n\n\u091d\u0937\u093e\u0923\u093e\u0902 \u092e\u0915\u0930\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0938\u094d\u0930\u094b\u0924\u0938\u093e\u092e\u0938\u094d\u092e\u093f \u091c\u093e\u0939\u094d\u0928\u0935\u0940\u0964\u096410.31\u0964\u0964", "r": "pavana\u1e25 pavat\u0101m asmi r\u0101ma\u1e25 \u015bhastra-bh\u1e5bit\u0101m aham\njha\u1e63h\u0101\u1e47\u0101\u1e41 makara\u015bh ch\u0101smi srotas\u0101m asmi j\u0101hnav\u012b", "t": "Among the purifiers, I am the wind; among the warriors, I am Rama; among the fishes, I am the shark; among the streams, I am the Ganga."}, {"c": 10, "v": 32, "s": "\u0938\u0930\u094d\u0917\u093e\u0923\u093e\u092e\u093e\u0926\u093f\u0930\u0928\u094d\u0924\u0936\u094d\u091a \u092e\u0927\u094d\u092f\u0902 \u091a\u0948\u0935\u093e\u0939\u092e\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0905\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u0935\u093f\u0926\u094d\u092f\u093e \u0935\u093f\u0926\u094d\u092f\u093e\u0928\u093e\u0902 \u0935\u093e\u0926\u0903 \u092a\u094d\u0930\u0935\u0926\u0924\u093e\u092e\u0939\u092e\u094d\u0964\u096410.32\u0964\u0964", "r": "sarg\u0101\u1e47\u0101m \u0101dir anta\u015bh cha madhya\u1e41 chaiv\u0101ham arjuna\nadhy\u0101tma-vidy\u0101 vidy\u0101n\u0101\u1e41 v\u0101da\u1e25 pravadat\u0101m aham", "t": "Among creations I am the beginning, the middle, and the end, O Arjuna; among the sciences, I am the science of the Self; and I am the logic among controversialists."}, {"c": 10, "v": 33, "s": "\u0905\u0915\u094d\u0937\u0930\u093e\u0923\u093e\u092e\u0915\u093e\u0930\u094b\u093d\u0938\u094d\u092e\u093f \u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u0903 \u0938\u093e\u092e\u093e\u0938\u093f\u0915\u0938\u094d\u092f \u091a\u0964\n\n\u0905\u0939\u092e\u0947\u0935\u093e\u0915\u094d\u0937\u092f\u0903 \u0915\u093e\u0932\u094b \u0927\u093e\u0924\u093e\u093d\u0939\u0902 \u0935\u093f\u0936\u094d\u0935\u0924\u094b\u092e\u0941\u0916\u0903\u0964\u096410.33\u0964\u0964", "r": "\u0905\u0939\u092e\u0947\u0935\u093e\u0915\u094d\u0937\u092f: \u0915\u093e\u0932\u094b \u0927\u093e\u0924\u093e\u0939\u0902 \u0935\u093f\u0936\u094d\u0935\u0924\u094b\u092e\u0941\u0916: || 33||\n\nak\u1e63har\u0101\u1e47\u0101m a-k\u0101ro \u2019smi dvandva\u1e25 s\u0101m\u0101sikasya cha\naham ev\u0101k\u1e63haya\u1e25 k\u0101lo dh\u0101t\u0101ha\u1e41 vi\u015bhvato-mukha\u1e25", "t": "Among the letters of the alphabet, I am the letter 'A' and the dual among compounds. I am verily the inexhaustible and everlasting time; I am the dispenser of the fruits of actions, having faces in all directions."}, {"c": 10, "v": 34, "s": "\u092e\u0943\u0924\u094d\u092f\u0941\u0903 \u0938\u0930\u094d\u0935\u0939\u0930\u0936\u094d\u091a\u093e\u0939\u092e\u0941\u0926\u094d\u092d\u0935\u0936\u094d\u091a \u092d\u0935\u093f\u0937\u094d\u092f\u0924\u093e\u092e\u094d\u0964\n\n\u0915\u0940\u0930\u094d\u0924\u093f\u0903 \u0936\u094d\u0930\u0940\u0930\u094d\u0935\u093e\u0915\u094d\u091a \u0928\u093e\u0930\u0940\u0923\u093e\u0902 \u0938\u094d\u092e\u0943\u0924\u093f\u0930\u094d\u092e\u0947\u0927\u093e \u0927\u0943\u0924\u093f\u0903 \u0915\u094d\u0937\u092e\u093e\u0964\u096410.34\u0964\u0964", "r": "m\u1e5bityu\u1e25 sarva-hara\u015bh ch\u0101ham udbhava\u015bh cha bhavi\u1e63hyat\u0101m\nk\u012brti\u1e25 \u015bhr\u012br v\u0101k cha n\u0101r\u012b\u1e47\u0101\u1e41 sm\u1e5bitir medh\u0101 dh\u1e5biti\u1e25 k\u1e63ham\u0101", "t": "And I am the all-devouring Death, and the source of prosperity for those who are to be prosperous; among the feminine qualities, I am fame, prosperity, speech, memory, intelligence, firmness, and forgiveness."}, {"c": 10, "v": 35, "s": "\u092c\u0943\u0939\u0924\u094d\u0938\u093e\u092e \u0924\u0925\u093e \u0938\u093e\u092e\u094d\u0928\u093e\u0902 \u0917\u093e\u092f\u0924\u094d\u0930\u0940 \u091b\u0928\u094d\u0926\u0938\u093e\u092e\u0939\u092e\u094d\u0964\n\n\u092e\u093e\u0938\u093e\u0928\u093e\u0902 \u092e\u093e\u0930\u094d\u0917\u0936\u0940\u0930\u094d\u0937\u094b\u093d\u0939\u092e\u0943\u0924\u0942\u0928\u093e\u0902 \u0915\u0941\u0938\u0941\u092e\u093e\u0915\u0930\u0903\u0964\u096410.35\u0964\u0964", "r": "b\u1e5bihat-s\u0101ma tath\u0101 s\u0101mn\u0101\u1e41 g\u0101yatr\u012b chhandas\u0101m aham\nm\u0101s\u0101n\u0101\u1e41 m\u0101rga-\u015bh\u012br\u1e63ho \u2019ham \u1e5bit\u016bn\u0101\u1e41 kusum\u0101kara\u1e25", "t": "Among the hymns, I am the Brihatsaman; among meters, I am Gayatri; among months, I am Margasirsha; among seasons, I am the flowery season."}, {"c": 10, "v": 36, "s": "\u0926\u094d\u092f\u0942\u0924\u0902 \u091b\u0932\u092f\u0924\u093e\u092e\u0938\u094d\u092e\u093f \u0924\u0947\u091c\u0938\u094d\u0924\u0947\u091c\u0938\u094d\u0935\u093f\u0928\u093e\u092e\u0939\u092e\u094d\u0964\n\n\u091c\u092f\u094b\u093d\u0938\u094d\u092e\u093f \u0935\u094d\u092f\u0935\u0938\u093e\u092f\u094b\u093d\u0938\u094d\u092e\u093f \u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0938\u0924\u094d\u0924\u094d\u0935\u0935\u0924\u093e\u092e\u0939\u092e\u094d\u0964\u096410.36\u0964\u0964", "r": "dy\u016bta\u1e41 chhalayat\u0101m asmi tejas tejasvin\u0101m aham\njayo \u2019smi vyavas\u0101yo \u2019smi sattva\u1e41 sattvavat\u0101m aham", "t": "I am the gambling of the deceitful; I am the splendor of the splendid; I am victory; I am the resolve of the resolute; I am the goodness of the good."}, {"c": 10, "v": 37, "s": "\u0935\u0943\u0937\u094d\u0923\u0940\u0928\u093e\u0902 \u0935\u093e\u0938\u0941\u0926\u0947\u0935\u094b\u093d\u0938\u094d\u092e\u093f \u092a\u093e\u0923\u094d\u0921\u0935\u093e\u0928\u093e\u0902 \u0927\u0928\u0902\u091c\u092f\u0903\u0964\n\n\u092e\u0941\u0928\u0940\u0928\u093e\u092e\u092a\u094d\u092f\u0939\u0902 \u0935\u094d\u092f\u093e\u0938\u0903 \u0915\u0935\u0940\u0928\u093e\u092e\u0941\u0936\u0928\u093e \u0915\u0935\u093f\u0903\u0964\u096410.37\u0964\u0964", "r": "v\u1e5bi\u1e63h\u1e47\u012bn\u0101\u1e41 v\u0101sudevo \u2019smi p\u0101\u1e47\u1e0dav\u0101n\u0101\u1e41 dhana\u00f1jaya\u1e25\nmun\u012bn\u0101m apyaha\u1e41 vy\u0101sa\u1e25 kav\u012bn\u0101m u\u015bhan\u0101 kavi\u1e25", "t": "Among the Vrishnis, I am Vaasudeva; among the Pandavas, I am Arjuna; among the sages, I am Vyasa; among the poets, I am Usanas, the poet."}, {"c": 10, "v": 38, "s": "\u0926\u0923\u094d\u0921\u094b \u0926\u092e\u092f\u0924\u093e\u092e\u0938\u094d\u092e\u093f \u0928\u0940\u0924\u093f\u0930\u0938\u094d\u092e\u093f \u091c\u093f\u0917\u0940\u0937\u0924\u093e\u092e\u094d\u0964\n\n\u092e\u094c\u0928\u0902 \u091a\u0948\u0935\u093e\u0938\u094d\u092e\u093f \u0917\u0941\u0939\u094d\u092f\u093e\u0928\u093e\u0902 \u091c\u094d\u091e\u093e\u0928\u0902 \u091c\u094d\u091e\u093e\u0928\u0935\u0924\u093e\u092e\u0939\u092e\u094d\u0964\u096410.38\u0964\u0964", "r": "da\u1e47\u1e0do damayat\u0101m asmi n\u012btir asmi jig\u012b\u1e63hat\u0101m\nmauna\u1e41 chaiv\u0101smi guhy\u0101n\u0101\u1e41 j\u00f1\u0101na\u1e41 j\u00f1\u0101navat\u0101m aham", "t": "Of those who punish, I am the scepter; among those who seek victory, I am statesmanship; and among secrets, I am silence; I am knowledge among knowers."}, {"c": 10, "v": 39, "s": "\u092f\u091a\u094d\u091a\u093e\u092a\u093f \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u092c\u0940\u091c\u0902 \u0924\u0926\u0939\u092e\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0928 \u0924\u0926\u0938\u094d\u0924\u093f \u0935\u093f\u0928\u093e \u092f\u0924\u094d\u0938\u094d\u092f\u093e\u0928\u094d\u092e\u092f\u093e \u092d\u0942\u0924\u0902 \u091a\u0930\u093e\u091a\u0930\u092e\u094d\u0964\u096410.39\u0964\u0964", "r": "yach ch\u0101pi sarva-bh\u016bt\u0101n\u0101\u1e41 b\u012bja\u1e41 tad aham arjuna\nna tad asti vin\u0101 yat sy\u0101n may\u0101 bh\u016bta\u1e41 char\u0101charam", "t": "And whatever is the seed of all beings, that too am I, O Arjuna; there is no being, be it moving or unmoving, that can exist without Me."}, {"c": 10, "v": 40, "s": "\u0928\u093e\u0928\u094d\u0924\u094b\u093d\u0938\u094d\u0924\u093f \u092e\u092e \u0926\u093f\u0935\u094d\u092f\u093e\u0928\u093e\u0902 \u0935\u093f\u092d\u0942\u0924\u0940\u0928\u093e\u0902 \u092a\u0930\u0902\u0924\u092a\u0964\n\n\u090f\u0937 \u0924\u0942\u0926\u094d\u0926\u0947\u0936\u0924\u0903 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u094b \u0935\u093f\u092d\u0942\u0924\u0947\u0930\u094d\u0935\u093f\u0938\u094d\u0924\u0930\u094b \u092e\u092f\u093e\u0964\u096410.40\u0964\u0964", "r": "n\u0101nto \u2019sti mama divy\u0101n\u0101\u1e41 vibh\u016bt\u012bn\u0101\u1e41 parantapa\ne\u1e63ha t\u016bdde\u015bhata\u1e25 prokto vibh\u016bter vistaro may\u0101", "t": "There is no end to My divine glories, O Arjuna, but this is a brief statement by Me of the particulars of My divine glory."}, {"c": 10, "v": 41, "s": "\u092f\u0926\u094d\u092f\u0926\u094d\u0935\u093f\u092d\u0942\u0924\u093f\u092e\u0924\u094d\u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0936\u094d\u0930\u0940\u092e\u0926\u0942\u0930\u094d\u091c\u093f\u0924\u092e\u0947\u0935 \u0935\u093e\u0964\n\n\u0924\u0924\u094d\u0924\u0926\u0947\u0935\u093e\u0935\u0917\u091a\u094d\u091b \u0924\u094d\u0935\u0902 \u092e\u092e \u0924\u0947\u091c\u094b\u0902\u093d\u0936\u0938\u0902\u092d\u0935\u092e\u094d\u0964\u096410.41\u0964\u0964", "r": "yad yad vibh\u016btimat sattva\u1e41 \u015bhr\u012bmad \u016brjitam eva v\u0101\ntat tad ev\u0101vagachchha tva\u1e41 mama tejo \u2019n\u015bha-sambhavam", "t": "Whatever being there is glorious, prosperous, or powerful, know that to be a manifestation of a part of My splendor."}, {"c": 10, "v": 42, "s": "\u0905\u0925\u0935\u093e \u092c\u0939\u0941\u0928\u0948\u0924\u0947\u0928 \u0915\u093f\u0902 \u091c\u094d\u091e\u093e\u0924\u0947\u0928 \u0924\u0935\u093e\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u0935\u093f\u0937\u094d\u091f\u092d\u094d\u092f\u093e\u0939\u092e\u093f\u0926\u0902 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u092e\u0947\u0915\u093e\u0902\u0936\u0947\u0928 \u0938\u094d\u0925\u093f\u0924\u094b \u091c\u0917\u0924\u094d\u0964\u096410.42\u0964\u0964", "r": "atha v\u0101 bahunaitena ki\u1e41 j\u00f1\u0101tena tav\u0101rjuna\nvi\u1e63h\u1e6dabhy\u0101ham ida\u1e41 k\u1e5bitsnam ek\u0101n\u015bhena sthito jagat", "t": "But, of what avail is the knowledge of all these details to you, O Arjuna? I exist, supporting this whole world with one part of Myself."}, {"c": 11, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u092e\u0926\u0928\u0941\u0917\u094d\u0930\u0939\u093e\u092f \u092a\u0930\u092e\u0902 \u0917\u0941\u0939\u094d\u092f\u092e\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u0938\u0902\u091c\u094d\u091e\u093f\u0924\u092e\u094d\u0964\n\n\u092f\u0924\u094d\u0924\u094d\u0935\u092f\u094b\u0915\u094d\u0924\u0902 \u0935\u091a\u0938\u094d\u0924\u0947\u0928 \u092e\u094b\u0939\u094b\u093d\u092f\u0902 \u0935\u093f\u0917\u0924\u094b \u092e\u092e\u0964\u096411.1\u0964\u0964", "r": "arjuna uv\u0101cha\nmad-anugrah\u0101ya parama\u1e41 guhyam adhy\u0101tma-sanj\u00f1itam\nyat tvayokta\u1e41 vachas tena moho \u2019ya\u1e41 vigato mama", "t": "Arjuna said, By this explanation of the highest secret concerning the Self which Thou hast spoken, for the sake of blessing me, my delusion has been dispelled."}, {"c": 11, "v": 2, "s": "\u092d\u0935\u093e\u092a\u094d\u092f\u092f\u094c \u0939\u093f \u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u0936\u094d\u0930\u0941\u0924\u094c \u0935\u093f\u0938\u094d\u0924\u0930\u0936\u094b \u092e\u092f\u093e\u0964\n\n\u0924\u094d\u0935\u0924\u094d\u0924\u0903 \u0915\u092e\u0932\u092a\u0924\u094d\u0930\u093e\u0915\u094d\u0937 \u092e\u093e\u0939\u093e\u0924\u094d\u092e\u094d\u092f\u092e\u092a\u093f \u091a\u093e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u096411.2\u0964\u0964", "r": "bhav\u0101pyayau hi bh\u016bt\u0101n\u0101\u1e41 \u015bhrutau vistara\u015bho may\u0101\ntvatta\u1e25 kamala-patr\u0101k\u1e63ha m\u0101h\u0101tmyam api ch\u0101vyayam", "t": "The origin and destruction of beings have been heard in detail from You, O lotus-eyed Lord, and also Your inexhaustible greatness."}, {"c": 11, "v": 3, "s": "\u090f\u0935\u092e\u0947\u0924\u0926\u094d\u092f\u0925\u093e\u0924\u094d\u0925 \u0924\u094d\u0935\u092e\u093e\u0924\u094d\u092e\u093e\u0928\u0902 \u092a\u0930\u092e\u0947\u0936\u094d\u0935\u0930\u0964\n\n\u0926\u094d\u0930\u0937\u094d\u091f\u0941\u092e\u093f\u091a\u094d\u091b\u093e\u092e\u093f \u0924\u0947 \u0930\u0942\u092a\u092e\u0948\u0936\u094d\u0935\u0930\u0902 \u092a\u0941\u0930\u0941\u0937\u094b\u0924\u094d\u0924\u092e\u0964\u096411.3\u0964\u0964", "r": "evam etad yath\u0101ttha tvam \u0101tm\u0101na\u1e41 parame\u015bhvara\ndra\u1e63h\u1e6dum ichchh\u0101mi te r\u016bpam ai\u015bhwara\u1e41 puru\u1e63hottama", "t": "Now, O Supreme Lord, as Thou hast thus described Thyself, O Supreme Person, I wish to behold Thy divine form."}, {"c": 11, "v": 4, "s": "\u092e\u0928\u094d\u092f\u0938\u0947 \u092f\u0926\u093f \u0924\u091a\u094d\u091b\u0915\u094d\u092f\u0902 \u092e\u092f\u093e \u0926\u094d\u0930\u0937\u094d\u091f\u0941\u092e\u093f\u0924\u093f \u092a\u094d\u0930\u092d\u094b\u0964\n\n\u092f\u094b\u0917\u0947\u0936\u094d\u0935\u0930 \u0924\u0924\u094b \u092e\u0947 \u0924\u094d\u0935\u0902 \u0926\u0930\u094d\u0936\u092f\u093e\u093d\u0924\u094d\u092e\u093e\u0928\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u096411.4\u0964\u0964", "r": "manyase yadi tach chhakya\u1e41 may\u0101 dra\u1e63h\u1e6dum iti prabho\nyoge\u015bhvara tato me tva\u1e41 dar\u015bhay\u0101tm\u0101nam avyayam", "t": "If Thou, O Lord, thinkest it possible for me to see it, do Thou, then, O Lord of the Yogis, show me Thy imperishable Self."}, {"c": 11, "v": 5, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092a\u0936\u094d\u092f \u092e\u0947 \u092a\u093e\u0930\u094d\u0925 \u0930\u0942\u092a\u093e\u0923\u093f \u0936\u0924\u0936\u094b\u093d\u0925 \u0938\u0939\u0938\u094d\u0930\u0936\u0903\u0964\n\n\u0928\u093e\u0928\u093e\u0935\u093f\u0927\u093e\u0928\u093f \u0926\u093f\u0935\u094d\u092f\u093e\u0928\u093f \u0928\u093e\u0928\u093e\u0935\u0930\u094d\u0923\u093e\u0915\u0943\u0924\u0940\u0928\u093f \u091a\u0964\u096411.5\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\npa\u015bhya me p\u0101rtha r\u016bp\u0101\u1e47i \u015bhata\u015bho \u2019tha sahasra\u015bha\u1e25\nn\u0101n\u0101-vidh\u0101ni divy\u0101ni n\u0101n\u0101-var\u1e47\u0101k\u1e5bit\u012bni cha", "t": "The Blessed Lord said, \"Behold, O Arjuna, forms of Mine, by the hundreds and thousands, of different sorts, divine, and of various colors and shapes.\""}, {"c": 11, "v": 6, "s": "\u092a\u0936\u094d\u092f\u093e\u0926\u093f\u0924\u094d\u092f\u093e\u0928\u094d\u0935\u0938\u0942\u0928\u094d\u0930\u0941\u0926\u094d\u0930\u093e\u0928\u0936\u094d\u093f\u0935\u0928\u094c \u092e\u0930\u0941\u0924\u0938\u094d\u0924\u0925\u093e\u0964\n\n\u092c\u0939\u0942\u0928\u094d\u092f\u0926\u0943\u0937\u094d\u091f\u092a\u0942\u0930\u094d\u0935\u093e\u0923\u093f \u092a\u0936\u094d\u092f\u093e\u093d\u0936\u094d\u091a\u0930\u094d\u092f\u093e\u0923\u093f \u092d\u093e\u0930\u0924\u0964\u096411.6\u0964\u0964", "r": "pa\u015bhy\u0101dity\u0101n vas\u016bn rudr\u0101n a\u015bhvinau marutas tath\u0101\nbah\u016bny ad\u1e5bi\u1e63h\u1e6da-p\u016brv\u0101\u1e47i pa\u015bhy\u0101\u015bhchary\u0101\u1e47i bh\u0101rata", "t": "Behold the Adityas, the Vasus, the Rudras, the two Asvins, and the Maruts; behold many wonders never before seen, O Arjuna."}, {"c": 11, "v": 7, "s": "\u0907\u0939\u0948\u0915\u0938\u094d\u0925\u0902 \u091c\u0917\u0924\u094d\u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0902 \u092a\u0936\u094d\u092f\u093e\u0926\u094d\u092f \u0938\u091a\u0930\u093e\u091a\u0930\u092e\u094d\u0964\n\n\u092e\u092e \u0926\u0947\u0939\u0947 \u0917\u0941\u0921\u093e\u0915\u0947\u0936 \u092f\u091a\u094d\u091a\u093e\u0928\u094d\u092f\u0926\u094d\u0926\u094d\u0930\u0937\u094d\u091f\u0941\u092e\u093f\u091a\u094d\u091b\u0938\u093f\u0964\u096411.7\u0964\u0964", "r": "ihaika-stha\u1e41 jagat k\u1e5bitsna\u1e41 pa\u015bhy\u0101dya sa-char\u0101charam\nmama dehe gu\u1e0d\u0101ke\u015bha yach ch\u0101nyad dra\u1e63h\u1e6dum ichchhasi", "t": "Now, behold, O Arjuna, in this My body, the entire universe centered in one, including the moving and the unmoving, and whatever else you desire to see."}, {"c": 11, "v": 8, "s": "\u0928 \u0924\u0941 \u092e\u093e\u0902 \u0936\u0915\u094d\u092f\u0938\u0947 \u0926\u094d\u0930\u0937\u094d\u091f\u0941\u092e\u0928\u0947\u0928\u0948\u0935 \u0938\u094d\u0935\u091a\u0915\u094d\u0937\u0941\u0937\u093e\u0964\n\n\u0926\u093f\u0935\u094d\u092f\u0902 \u0926\u0926\u093e\u092e\u093f \u0924\u0947 \u091a\u0915\u094d\u0937\u0941\u0903 \u092a\u0936\u094d\u092f \u092e\u0947 \u092f\u094b\u0917\u092e\u0948\u0936\u094d\u0935\u0930\u092e\u094d\u0964\u096411.8\u0964\u0964", "r": "na tu m\u0101\u1e41 \u015bhakyase dra\u1e63h\u1e6dum anenaiva sva-chak\u1e63hu\u1e63h\u0101\ndivya\u1e41 dad\u0101mi te chak\u1e63hu\u1e25 pa\u015bhya me yogam ai\u015bhwaram", "t": "But you are not able to behold Me with these your own eyes; I give you the divine eye; behold My lordly Yoga."}, {"c": 11, "v": 9, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u090f\u0935\u092e\u0941\u0915\u094d\u0924\u094d\u0935\u093e \u0924\u0924\u094b \u0930\u093e\u091c\u0928\u094d\u092e\u0939\u093e\u092f\u094b\u0917\u0947\u0936\u094d\u0935\u0930\u094b \u0939\u0930\u093f\u0903\u0964\n\n\u0926\u0930\u094d\u0936\u092f\u093e\u092e\u093e\u0938 \u092a\u093e\u0930\u094d\u0925\u093e\u092f \u092a\u0930\u092e\u0902 \u0930\u0942\u092a\u092e\u0948\u0936\u094d\u0935\u0930\u092e\u094d\u0964\u096411.9\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nevam uktv\u0101 tato r\u0101jan mah\u0101-yoge\u015bhvaro hari\u1e25\ndar\u015bhay\u0101m \u0101sa p\u0101rth\u0101ya parama\u1e41 r\u016bpam ai\u015bhwaram", "t": "Sanjaya said, Having thus spoken, O king, the great Lord of Yoga, Hari (Krishna), showed Arjuna His supreme form as the Lord."}, {"c": 11, "v": 10, "s": "\u0905\u0928\u0947\u0915\u0935\u0915\u094d\u0924\u094d\u0930\u0928\u092f\u0928\u092e\u0928\u0947\u0915\u093e\u0926\u094d\u092d\u0941\u0924\u0926\u0930\u094d\u0936\u0928\u092e\u094d\u0964\n\n\u0905\u0928\u0947\u0915\u0926\u093f\u0935\u094d\u092f\u093e\u092d\u0930\u0923\u0902 \u0926\u093f\u0935\u094d\u092f\u093e\u0928\u0947\u0915\u094b\u0926\u094d\u092f\u0924\u093e\u092f\u0941\u0927\u092e\u094d\u0964\u096411.10\u0964\u0964", "r": "aneka-vaktra-nayanam anek\u0101dbhuta-dar\u015bhanam\naneka-divy\u0101bhara\u1e47a\u1e41 divy\u0101nekodyat\u0101yudham", "t": "With numerous mouths and eyes, with numerous wondrous sights, with numerous divine adornments, with numerous divine weapons uplifted, such a form He showed."}, {"c": 11, "v": 11, "s": "\u0926\u093f\u0935\u094d\u092f\u092e\u093e\u0932\u094d\u092f\u093e\u092e\u094d\u092c\u0930\u0927\u0930\u0902 \u0926\u093f\u0935\u094d\u092f\u0917\u0928\u094d\u0927\u093e\u0928\u0941\u0932\u0947\u092a\u0928\u092e\u094d\u0964\n\n\u0938\u0930\u094d\u0935\u093e\u0936\u094d\u091a\u0930\u094d\u092f\u092e\u092f\u0902 \u0926\u0947\u0935\u092e\u0928\u0928\u094d\u0924\u0902 \u0935\u093f\u0936\u094d\u0935\u0924\u094b\u092e\u0941\u0916\u092e\u094d\u0964\u096411.11\u0964\u0964", "r": "divya-m\u0101ly\u0101mbara-dhara\u1e41 divya-gandh\u0101nulepanam\nsarv\u0101\u015bhcharya-maya\u1e41 devam ananta\u1e41 vi\u015bhvato-mukham", "t": "Wearing divine garlands and apparel, anointed with divine unguents, the all-wonderful, resplendent Being is endless with faces on all sides."}, {"c": 11, "v": 12, "s": "\u0926\u093f\u0935\u093f \u0938\u0942\u0930\u094d\u092f\u0938\u0939\u0938\u094d\u0930\u0938\u094d\u092f \u092d\u0935\u0947\u0926\u094d\u092f\u0941\u0917\u092a\u0926\u0941\u0924\u094d\u0925\u093f\u0924\u093e\u0964\n\n\u092f\u0926\u093f \u092d\u093e\u0903 \u0938\u0926\u0943\u0936\u0940 \u0938\u093e \u0938\u094d\u092f\u093e\u0926\u094d\u092d\u093e\u0938\u0938\u094d\u0924\u0938\u094d\u092f \u092e\u0939\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u096411.12\u0964\u0964", "r": "divi s\u016brya-sahasrasya bhaved yugapad utthit\u0101\nyadi bh\u0101\u1e25 sad\u1e5bi\u015bh\u012b s\u0101 sy\u0101d bh\u0101sas tasya mah\u0101tmana\u1e25", "t": "If the splendour of a thousand suns were to blaze out simultaneously in the sky, that would be the splendour of that mighty being."}, {"c": 11, "v": 13, "s": "\u0924\u0924\u094d\u0930\u0948\u0915\u0938\u094d\u0925\u0902 \u091c\u0917\u0924\u094d\u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0902 \u092a\u094d\u0930\u0935\u093f\u092d\u0915\u094d\u0924\u092e\u0928\u0947\u0915\u0927\u093e\u0964\n\n\u0905\u092a\u0936\u094d\u092f\u0926\u094d\u0926\u0947\u0935\u0926\u0947\u0935\u0938\u094d\u092f \u0936\u0930\u0940\u0930\u0947 \u092a\u093e\u0923\u094d\u0921\u0935\u0938\u094d\u0924\u0926\u093e\u0964\u096411.13\u0964\u0964", "r": "tatraika-stha\u1e41 jagat k\u1e5bitsna\u1e41 pravibhaktam anekadh\u0101\napa\u015bhyad deva-devasya \u015bhar\u012bre p\u0101\u1e47\u1e0davas tad\u0101", "t": "There, in the body of the God of gods, Arjuna then saw the entire universe resting in one, with its myriad of divisions."}, {"c": 11, "v": 14, "s": "\u0924\u0924\u0903 \u0938 \u0935\u093f\u0938\u094d\u092e\u092f\u093e\u0935\u093f\u0937\u094d\u091f\u094b \u0939\u0943\u0937\u094d\u091f\u0930\u094b\u092e\u093e \u0927\u0928\u091e\u094d\u091c\u092f\u0903\u0964\n\n\u092a\u094d\u0930\u0923\u092e\u094d\u092f \u0936\u093f\u0930\u0938\u093e \u0926\u0947\u0935\u0902 \u0915\u0943\u0924\u093e\u091e\u094d\u091c\u0932\u093f\u0930\u092d\u093e\u0937\u0924\u0964\u096411.14\u0964\u0964", "r": "tata\u1e25 sa vismay\u0101vi\u1e63h\u1e6do h\u1e5bi\u1e63h\u1e6da-rom\u0101 dhana\u00f1jaya\u1e25\npra\u1e47amya \u015bhiras\u0101 deva\u1e41 k\u1e5bit\u0101\u00f1jalir abh\u0101\u1e63hata", "t": "Then, Arjuna, filled with wonder and his hair standing on end, bowed his head to the God and spoke with palms joined."}, {"c": 11, "v": 15, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0926\u0947\u0935\u093e\u0902\u0938\u094d\u0924\u0935 \u0926\u0947\u0935 \u0926\u0947\u0939\u0947\n\n\u0938\u0930\u094d\u0935\u093e\u0902\u0938\u094d\u0924\u0925\u093e \u092d\u0942\u0924\u0935\u093f\u0936\u0947\u0937\u0938\u0919\u094d\u0918\u093e\u0928\u094d\u0964\n\n\u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0923\u092e\u0940\u0936\u0902 \u0915\u092e\u0932\u093e\u0938\u0928\u0938\u094d\u0925\n\n\u092e\u0943\u0937\u0940\u0902\u0936\u094d\u091a \u0938\u0930\u094d\u0935\u093e\u0928\u0941\u0930\u0917\u093e\u0902\u0936\u094d\u091a \u0926\u093f\u0935\u094d\u092f\u093e\u0928\u094d\u0964\u096411.15\u0964\u0964", "r": "arjuna uv\u0101cha\npa\u015bhy\u0101mi dev\u0101ns tava deva dehe\nsarv\u0101ns tath\u0101 bh\u016bta-vi\u015bhe\u1e63ha-sa\u1e45gh\u0101n\nbrahm\u0101\u1e47am \u012b\u015bha\u1e41 kamal\u0101sana-stham\n\u1e5bi\u1e63h\u012bn\u015bh cha sarv\u0101n urag\u0101n\u015bh cha divy\u0101n", "t": "Arjuna said, \"O God, I see all the gods in Your body, as well as hosts of various classes of beings, Brahma the Lord seated on the lotus, all the sages, and the celestial serpents.\""}, {"c": 11, "v": 16, "s": "\u0905\u0928\u0947\u0915\u092c\u093e\u0939\u0942\u0926\u0930\u0935\u0915\u094d\u0924\u094d\u0930\u0928\u0947\u0924\u094d\u0930\u0902\n\n\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0924\u094d\u0935\u093e\u0902 \u0938\u0930\u094d\u0935\u0924\u094b\u093d\u0928\u0928\u094d\u0924\u0930\u0942\u092a\u092e\u094d\u0964\n\n\u0928\u093e\u0928\u094d\u0924\u0902 \u0928 \u092e\u0927\u094d\u092f\u0902 \u0928 \u092a\u0941\u0928\u0938\u094d\u0924\u0935\u093e\u0926\u093f\u0902\n\n\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0935\u093f\u0936\u094d\u0935\u0947\u0936\u094d\u0935\u0930 \u0935\u093f\u0936\u094d\u0935\u0930\u0942\u092a\u0964\u096411.16\u0964\u0964", "r": "aneka-b\u0101h\u016bdara-vaktra-netra\u1e41\npa\u015bhy\u0101mi tv\u0101\u1e41 sarvato \u2019nanta-r\u016bpam\nn\u0101nta\u1e41 na madhya\u1e41 na punas tav\u0101di\u1e41\npa\u015bhy\u0101mi vi\u015bhve\u015bhvara vi\u015bhva-r\u016bpa", "t": "I see You with boundless form on every side, with many arms, stomachs, mouths, and eyes; neither the end nor the middle nor the beginning do I see, O Lord of the Universe, O Cosmic Form."}, {"c": 11, "v": 17, "s": "\u0915\u093f\u0930\u0940\u091f\u093f\u0928\u0902 \u0917\u0926\u093f\u0928\u0902 \u091a\u0915\u094d\u0930\u093f\u0923\u0902 \u091a\n\n\u0924\u0947\u091c\u094b\u0930\u093e\u0936\u093f\u0902 \u0938\u0930\u094d\u0935\u0924\u094b\u0926\u0940\u092a\u094d\u0924\u093f\u092e\u0928\u094d\u0924\u092e\u094d\u0964\n\n\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0924\u094d\u0935\u093e\u0902 \u0926\u0941\u0930\u094d\u0928\u093f\u0930\u0940\u0915\u094d\u0937\u094d\u092f\u0902 \u0938\u092e\u0928\u094d\u0924\u093e\n\n\u0926\u094d\u0926\u0940\u092a\u094d\u0924\u093e\u0928\u0932\u093e\u0930\u094d\u0915\u0926\u094d\u092f\u0941\u0924\u093f\u092e\u092a\u094d\u0930\u092e\u0947\u092f\u092e\u094d\u0964\u096411.17\u0964\u0964", "r": "kir\u012b\u1e6dina\u1e41 gadina\u1e41 chakri\u1e47a\u1e41 cha\ntejo-r\u0101\u015bhi\u1e41 sarvato d\u012bptimantam\npa\u015bhy\u0101mi tv\u0101\u1e41 durnir\u012bk\u1e63hya\u1e41 samant\u0101d\nd\u012bpt\u0101nal\u0101rka-dyutim aprameyam", "t": "I see You with the diadem, club, and discus, a mass of radiance shining everywhere, very hard to look at, blazing all around like a burning fire and the sun, and immeasurable."}, {"c": 11, "v": 18, "s": "\u0924\u094d\u0935\u092e\u0915\u094d\u0937\u0930\u0902 \u092a\u0930\u092e\u0902 \u0935\u0947\u0926\u093f\u0924\u0935\u094d\u092f\u0902\n\n\u0924\u094d\u0935\u092e\u0938\u094d\u092f \u0935\u093f\u0936\u094d\u0935\u0938\u094d\u092f \u092a\u0930\u0902 \u0928\u093f\u0927\u093e\u0928\u092e\u094d\u0964\n\n\u0924\u094d\u0935\u092e\u0935\u094d\u092f\u092f\u0903 \u0936\u093e\u0936\u094d\u0935\u0924\u0927\u0930\u094d\u092e\u0917\u094b\u092a\u094d\u0924\u093e\n\n\u0938\u0928\u093e\u0924\u0928\u0938\u094d\u0924\u094d\u0935\u0902 \u092a\u0941\u0930\u0941\u0937\u094b \u092e\u0924\u094b \u092e\u0947\u0964\u096411.18\u0964\u0964", "r": "tvam ak\u1e63hara\u1e41 parama\u1e41 veditavya\u1e41\ntvam asya vi\u015bhvasya para\u1e41 nidh\u0101nam\ntvam avyaya\u1e25 \u015bh\u0101\u015bhvata-dharma-gopt\u0101\nsan\u0101tanas tva\u1e41 puru\u1e63ho mato me", "t": "You are the Imperishable, the Supreme Being, worthy of being known. You are the great treasure-house of this universe; You are the imperishable protector of the eternal Dharma; You are the Primal Person, I believe."}, {"c": 11, "v": 19, "s": "\u0905\u0928\u093e\u0926\u093f\u092e\u0927\u094d\u092f\u093e\u0928\u094d\u0924\u092e\u0928\u0928\u094d\u0924\u0935\u0940\u0930\u094d\u092f\n\n\u092e\u0928\u0928\u094d\u0924\u092c\u093e\u0939\u0941\u0902 \u0936\u0936\u093f\u0938\u0942\u0930\u094d\u092f\u0928\u0947\u0924\u094d\u0930\u092e\u094d\u0964\n\n\u092a\u0936\u094d\u092f\u093e\u092e\u093f \u0924\u094d\u0935\u093e\u0902 \u0926\u0940\u092a\u094d\u0924\u0939\u0941\u0924\u093e\u0936\u0935\u0915\u094d\u0924\u094d\u0930\u092e\u094d\n\n\u0938\u094d\u0935\u0924\u0947\u091c\u0938\u093e \u0935\u093f\u0936\u094d\u0935\u092e\u093f\u0926\u0902 \u0924\u092a\u0928\u094d\u0924\u092e\u094d\u0964\u096411.19\u0964\u0964", "r": "\u0938\u094d\u0935\u0924\u0947\u091c\u0938\u093e \u0935\u093f\u0936\u094d\u0935\u092e\u093f\u0926\u0902 \u0924\u092a\u0928\u094d\u0924\u092e\u094d || 19||", "t": "I see You without beginning, middle, or end, infinite in power, with endless arms, the sun and moon as Your eyes, the burning fire Your mouth, heating the entire universe with Your radiance."}, {"c": 11, "v": 20, "s": "\u0926\u094d\u092f\u093e\u0935\u093e\u092a\u0943\u0925\u093f\u0935\u094d\u092f\u094b\u0930\u093f\u0926\u092e\u0928\u094d\u0924\u0930\u0902 \u0939\u093f\n\n\u0935\u094d\u092f\u093e\u092a\u094d\u0924\u0902 \u0924\u094d\u0935\u092f\u0948\u0915\u0947\u0928 \u0926\u093f\u0936\u0936\u094d\u091a \u0938\u0930\u094d\u0935\u093e\u0903\u0964\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e\u093d\u0926\u094d\u092d\u0941\u0924\u0902 \u0930\u0942\u092a\u092e\u0941\u0917\u094d\u0930\u0902 \u0924\u0935\u0947\u0926\u0902\n\n\u0932\u094b\u0915\u0924\u094d\u0930\u092f\u0902 \u092a\u094d\u0930\u0935\u094d\u092f\u0925\u093f\u0924\u0902 \u092e\u0939\u093e\u0924\u094d\u092e\u0928\u094d\u0964\u096411.20\u0964\u0964", "r": "dy\u0101v \u0101-p\u1e5bithivyor idam antara\u1e41 hi\nvy\u0101pta\u1e41 tvayaikena di\u015bha\u015bh cha sarv\u0101\u1e25\nd\u1e5bi\u1e63h\u1e6dv\u0101dbhuta\u1e41 r\u016bpam ugra\u1e41 taveda\u1e41\nloka-traya\u1e41 pravyathita\u1e41 mah\u0101tman", "t": "This space between the earth and the heavens, and all the quarters, is filled by You alone; having seen this, Your wonderful and terrible form, the three worlds are trembling with fear, O great-souled Being."}, {"c": 11, "v": 21, "s": "\u0905\u092e\u0940 \u0939\u093f \u0924\u094d\u0935\u093e\u0902 \u0938\u0941\u0930\u0938\u0919\u094d\u0918\u093e\u0903 \u0935\u093f\u0936\u0928\u094d\u0924\u093f\n\n\u0915\u0947\u091a\u093f\u0926\u094d\u092d\u0940\u0924\u093e\u0903 \u092a\u094d\u0930\u093e\u091e\u094d\u091c\u0932\u092f\u094b \u0917\u0943\u0923\u0928\u094d\u0924\u093f\u0964\n\n\u0938\u094d\u0935\u0938\u094d\u0924\u0940\u0924\u094d\u092f\u0941\u0915\u094d\u0924\u094d\u0935\u093e \u092e\u0939\u0930\u094d\u0937\u093f\u0938\u093f\u0926\u094d\u0927\u0938\u0919\u094d\u0918\u093e\u0903\n\n\u0938\u094d\u0924\u0941\u0935\u0928\u094d\u0924\u093f \u0924\u094d\u0935\u093e\u0902 \u0938\u094d\u0924\u0941\u0924\u093f\u092d\u093f\u0903 \u092a\u0941\u0937\u094d\u0915\u0932\u093e\u092d\u093f\u0903\u0964\u096411.21\u0964\u0964", "r": "am\u012b hi tv\u0101\u1e41 sura-sa\u1e45gh\u0101 vi\u015bhanti\nkechid bh\u012bt\u0101\u1e25 pr\u0101\u00f1jalayo g\u1e5bi\u1e47anti\nsvast\u012bty uktv\u0101 mahar\u1e63hi-siddha-sa\u1e45gh\u0101\u1e25\nstuvanti tv\u0101\u1e41 stutibhi\u1e25 pu\u1e63hkal\u0101bhi\u1e25", "t": "Verily, these hosts of gods enter into Thee; some extol Thee with joined palms in fear, saying, 'May it be well!' Bands of great sages and perfected ones praise Thee with complete hymns."}, {"c": 11, "v": 22, "s": "\u0930\u0941\u0926\u094d\u0930\u093e\u0926\u093f\u0924\u094d\u092f\u093e \u0935\u0938\u0935\u094b \u092f\u0947 \u091a \u0938\u093e\u0927\u094d\u092f\u093e\n\n\u0935\u093f\u0936\u094d\u0935\u0947\u093d\u0936\u094d\u093f\u0935\u0928\u094c \u092e\u0930\u0941\u0924\u0936\u094d\u091a\u094b\u0937\u094d\u092e\u092a\u093e\u0936\u094d\u091a\u0964\n\n\u0917\u0928\u094d\u0927\u0930\u094d\u0935\u092f\u0915\u094d\u0937\u093e\u0938\u0941\u0930\u0938\u093f\u0926\u094d\u0927\u0938\u0919\u094d\u0918\u093e\n\n\u0935\u0940\u0915\u094d\u0937\u0928\u094d\u0924\u0947 \u0924\u094d\u0935\u093e\u0902 \u0935\u093f\u0938\u094d\u092e\u093f\u0924\u093e\u0936\u094d\u091a\u0948\u0935 \u0938\u0930\u094d\u0935\u0947\u0964\u096411.22\u0964\u0964", "r": "rudr\u0101dity\u0101 vasavo ye cha s\u0101dhy\u0101\nvi\u015bhve \u2019\u015bhvinau maruta\u015bh cho\u1e63hmap\u0101\u015bh cha\ngandharva-yak\u1e63h\u0101sura-siddha-sa\u1e45gh\u0101\nv\u012bk\u1e63hante tv\u0101\u1e41 vismit\u0101\u015bh chaiva sarve", "t": "The Rudras, Adityas, Vasus, Sadhyas, Visvedevas, the two Asvins, Maruts, the Manus, and the hosts of celestial singers, Yakshas, demons, and the perfected ones, all look upon Thee with great amazement."}, {"c": 11, "v": 23, "s": "\u0930\u0942\u092a\u0902 \u092e\u0939\u0924\u094d\u0924\u0947 \u092c\u0939\u0941\u0935\u0915\u094d\u0924\u094d\u0930\u0928\u0947\u0924\u094d\u0930\u0902\n\n\u092e\u0939\u093e\u092c\u093e\u0939\u094b \u092c\u0939\u0941\u092c\u093e\u0939\u0942\u0930\u0941\u092a\u093e\u0926\u092e\u094d\u0964\n\n\u092c\u0939\u0942\u0926\u0930\u0902 \u092c\u0939\u0941\u0926\u0902\u0937\u094d\u091f\u094d\u0930\u093e\u0915\u0930\u093e\u0932\u0902\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u0932\u094b\u0915\u093e\u0903 \u092a\u094d\u0930\u0935\u094d\u092f\u0925\u093f\u0924\u093e\u0938\u094d\u0924\u0925\u093e\u093d\u0939\u092e\u094d\u0964\u096411.23\u0964\u0964", "r": "r\u016bpa\u1e41 mahat te bahu-vaktra-netra\u1e41\nmah\u0101-b\u0101ho bahu-b\u0101h\u016bru-p\u0101dam\nbah\u016bdara\u1e41 bahu-dan\u1e63h\u1e6dr\u0101-kar\u0101la\u1e41\nd\u1e5bi\u1e63h\u1e6dv\u0101 lok\u0101\u1e25 pravyathit\u0101s tath\u0101ham", "t": "Having seen Your immeasurable form with many mouths and eyes, O mighty-armed one, with many arms, thighs, and feet, with many stomachs and fearsome with many teeth, the worlds are terrified, and so am I."}, {"c": 11, "v": 24, "s": "\u0928\u092d\u0903\u0938\u094d\u092a\u0943\u0936\u0902 \u0926\u0940\u092a\u094d\u0924\u092e\u0928\u0947\u0915\u0935\u0930\u094d\u0923\u0902\n\n\u0935\u094d\u092f\u093e\u0924\u094d\u0924\u093e\u0928\u0928\u0902 \u0926\u0940\u092a\u094d\u0924\u0935\u093f\u0936\u093e\u0932\u0928\u0947\u0924\u094d\u0930\u092e\u094d\u0964\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u0939\u093f \u0924\u094d\u0935\u093e\u0902 \u092a\u094d\u0930\u0935\u094d\u092f\u0925\u093f\u0924\u093e\u0928\u094d\u0924\u0930\u093e\u0924\u094d\u092e\u093e\n\n\u0927\u0943\u0924\u093f\u0902 \u0928 \u0935\u093f\u0928\u094d\u0926\u093e\u092e\u093f \u0936\u092e\u0902 \u091a \u0935\u093f\u0937\u094d\u0923\u094b\u0964\u096411.24\u0964\u0964", "r": "nabha\u1e25-sp\u1e5bi\u015bha\u1e41 d\u012bptam aneka-var\u1e47a\u1e41\nvy\u0101tt\u0101nana\u1e41 d\u012bpta-vi\u015bh\u0101la-netram\nd\u1e5bi\u1e63h\u1e6dv\u0101 hi tv\u0101\u1e41 pravyathit\u0101ntar-\u0101tm\u0101\ndh\u1e5biti\u1e41 na vind\u0101mi \u015bhama\u1e41 cha vi\u1e63h\u1e47o", "t": "On seeing Thee, touching the sky, shining in many colors, with mouths wide open, with large fiery eyes, I am terrified at heart and find neither courage nor peace, O Vishnu."}, {"c": 11, "v": 25, "s": "\u0926\u0902\u0937\u094d\u091f\u094d\u0930\u093e\u0915\u0930\u093e\u0932\u093e\u0928\u093f \u091a \u0924\u0947 \u092e\u0941\u0916\u093e\u0928\u093f\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u0948\u0935 \u0915\u093e\u0932\u093e\u0928\u0932\u0938\u0928\u094d\u0928\u093f\u092d\u093e\u0928\u093f\u0964\n\n\u0926\u093f\u0936\u094b \u0928 \u091c\u093e\u0928\u0947 \u0928 \u0932\u092d\u0947 \u091a \u0936\u0930\u094d\u092e\n\n\u092a\u094d\u0930\u0938\u0940\u0926 \u0926\u0947\u0935\u0947\u0936 \u091c\u0917\u0928\u094d\u0928\u093f\u0935\u093e\u0938\u0964\u096411.25\u0964\u0964", "r": "dan\u1e63h\u1e6dr\u0101-kar\u0101l\u0101ni cha te mukh\u0101ni\nd\u1e5bi\u1e63h\u1e6dvaiva k\u0101l\u0101nala-sannibh\u0101ni\ndi\u015bho na j\u0101ne na labhe cha \u015bharma\npras\u012bda deve\u015bha jagan-niv\u0101sa", "t": "Having seen Thy mouths fearful with teeth blazing like the fires of cosmic dissolution, I know not the four quarters, nor do I find peace. Have mercy, O Lord of the gods, O abode of the universe."}, {"c": 11, "v": 26, "s": "\u0905\u092e\u0940 \u091a \u0924\u094d\u0935\u093e\u0902 \u0927\u0943\u0924\u0930\u093e\u0937\u094d\u091f\u094d\u0930\u0938\u094d\u092f \u092a\u0941\u0924\u094d\u0930\u093e\u0903\n\n\u0938\u0930\u094d\u0935\u0947 \u0938\u0939\u0948\u0935\u093e\u0935\u0928\u093f\u092a\u093e\u0932\u0938\u0919\u094d\u0918\u0948\u0903\u0964\n\n\u092d\u0940\u0937\u094d\u092e\u094b \u0926\u094d\u0930\u094b\u0923\u0903 \u0938\u0942\u0924\u092a\u0941\u0924\u094d\u0930\u0938\u094d\u0924\u0925\u093e\u093d\u0938\u094c\n\n\u0938\u0939\u093e\u0938\u094d\u092e\u0926\u0940\u092f\u0948\u0930\u092a\u093f \u092f\u094b\u0927\u092e\u0941\u0916\u094d\u092f\u0948\u0903\u0964\u096411.26\u0964\u0964", "r": "am\u012b cha tv\u0101\u1e41 dh\u1e5bitar\u0101\u015bhtrasya putr\u0101\u1e25\nsarve sahaiv\u0101vani-p\u0101la-sa\u1e45ghai\u1e25\nbh\u012b\u1e63hmo dro\u1e47a\u1e25 s\u016bta-putras tath\u0101sau\nsah\u0101smad\u012byair api yodha-mukhyai\u1e25\n vaktr\u0101\u1e47i te tvaram\u0101\u1e47\u0101 vi\u015bhanti\ndan\u1e63h\u1e6dr\u0101-kar\u0101l\u0101ni bhay\u0101nak\u0101ni\nkechid vilagn\u0101 da\u015bhan\u0101ntare\u1e63hu\nsand\u1e5bi\u015bhyante ch\u016br\u1e47itair uttam\u0101\u1e45gai\u1e25", "t": "All the sons of Dhritarashtra, along with the hosts of kings of the earth, Bhishma, Drona, and Karna, as well as the chief among our warriors."}, {"c": 11, "v": 27, "s": "\u0935\u0915\u094d\u0924\u094d\u0930\u093e\u0923\u093f \u0924\u0947 \u0924\u094d\u0935\u0930\u092e\u093e\u0923\u093e \u0935\u093f\u0936\u0928\u094d\u0924\u093f\n\n\u0926\u0902\u0937\u094d\u091f\u094d\u0930\u093e\u0915\u0930\u093e\u0932\u093e\u0928\u093f \u092d\u092f\u093e\u0928\u0915\u093e\u0928\u093f\u0964\n\n\u0915\u0947\u091a\u093f\u0926\u094d\u0935\u093f\u0932\u0917\u094d\u0928\u093e \u0926\u0936\u0928\u093e\u0928\u094d\u0924\u0930\u0947\u0937\u0941\n\n\u0938\u0902\u0926\u0943\u0936\u094d\u092f\u0928\u094d\u0924\u0947 \u091a\u0942\u0930\u094d\u0923\u093f\u0924\u0948\u0930\u0941\u0924\u094d\u0924\u092e\u093e\u0919\u094d\u0917\u0948\u0903\u0964\u096411.27\u0964\u0964", "r": "vaktr\u0101\u1e47i te tvaram\u0101\u1e47\u0101 vi\u015banti da\u1e41\u1e63\u1e6dr\u0101-kar\u0101l\u0101ni bhay\u0101nak\u0101ni kecid vilagn\u0101 da\u015ban\u0101ntare\u1e63u sand\u1e5b\u015byante c\u016br\u1e47itair uttam\u0101\u1e45gai\u1e25", "t": "Some hurry into Your mouths with their terrible teeth, fearful to behold. Some are found stuck in the gaps between the teeth, their heads crushed to powder."}, {"c": 11, "v": 28, "s": "\u092f\u0925\u093e \u0928\u0926\u0940\u0928\u093e\u0902 \u092c\u0939\u0935\u094b\u093d\u092e\u094d\u092c\u0941\u0935\u0947\u0917\u093e\u0903\n\n\u0938\u092e\u0941\u0926\u094d\u0930\u092e\u0947\u0935\u093e\u092d\u093f\u092e\u0941\u0916\u093e\u0903 \u0926\u094d\u0930\u0935\u0928\u094d\u0924\u093f\u0964\n\n\u0924\u0925\u093e \u0924\u0935\u093e\u092e\u0940 \u0928\u0930\u0932\u094b\u0915\u0935\u0940\u0930\u093e\n\n\u0935\u093f\u0936\u0928\u094d\u0924\u093f \u0935\u0915\u094d\u0924\u094d\u0930\u093e\u0923\u094d\u092f\u092d\u093f\u0935\u093f\u091c\u094d\u0935\u0932\u0928\u094d\u0924\u093f\u0964\u096411.28\u0964\u0964", "r": "yath\u0101 nad\u012bn\u0101\u1e41 bahavo \u2019mbu-veg\u0101\u1e25\nsamudram ev\u0101bhimukh\u0101 dravanti\ntath\u0101 tav\u0101m\u012b nara-loka-v\u012br\u0101\nvi\u015bhanti vaktr\u0101\u1e47y abhivijvalanti", "t": "Verily, just as many torrents of rivers flow towards the ocean, so too these heroes in the world of men enter Thy flaming mouths."}, {"c": 11, "v": 29, "s": "\u092f\u0925\u093e \u092a\u094d\u0930\u0926\u0940\u092a\u094d\u0924\u0902 \u091c\u094d\u0935\u0932\u0928\u0902 \u092a\u0924\u0919\u094d\u0917\u093e\n\n\u0935\u093f\u0936\u0928\u094d\u0924\u093f \u0928\u093e\u0936\u093e\u092f \u0938\u092e\u0943\u0926\u094d\u0927\u0935\u0947\u0917\u093e\u0903\u0964\n\n\u0924\u0925\u0948\u0935 \u0928\u093e\u0936\u093e\u092f \u0935\u093f\u0936\u0928\u094d\u0924\u093f \u0932\u094b\u0915\u093e\n\n\u0938\u094d\u0924\u0935\u093e\u092a\u093f \u0935\u0915\u094d\u0924\u094d\u0930\u093e\u0923\u093f \u0938\u092e\u0943\u0926\u094d\u0927\u0935\u0947\u0917\u093e\u0903\u0964\u096411.29\u0964\u0964", "r": "yath\u0101 prad\u012bpta\u1e41 jvalana\u1e41 pata\u1e45g\u0101\nvi\u015bhanti n\u0101\u015bh\u0101ya sam\u1e5biddha-veg\u0101\u1e25\ntathaiva n\u0101\u015bh\u0101ya vi\u015bhanti lok\u0101s\ntav\u0101pi vaktr\u0101\u1e47i sam\u1e5biddha-veg\u0101\u1e25", "t": "As moths hurriedly rush into a blazing fire, leading to their own destruction, so too these creatures hurry into Your mouths, leading to their own destruction."}, {"c": 11, "v": 30, "s": "\u0932\u0947\u0932\u093f\u0939\u094d\u092f\u0938\u0947 \u0917\u094d\u0930\u0938\u092e\u093e\u0928\u0903 \u0938\u092e\u0928\u094d\u0924\u093e\n\n\u0932\u094d\u0932\u094b\u0915\u093e\u0928\u094d\u0938\u092e\u0917\u094d\u0930\u093e\u0928\u094d\u0935\u0926\u0928\u0948\u0930\u094d\u091c\u094d\u0935\u0932\u0926\u094d\u092d\u093f\u0903\u0964\n\n\u0924\u0947\u091c\u094b\u092d\u093f\u0930\u093e\u092a\u0942\u0930\u094d\u092f \u091c\u0917\u0924\u094d\u0938\u092e\u0917\u094d\u0930\u0902\n\n\u092d\u093e\u0938\u0938\u094d\u0924\u0935\u094b\u0917\u094d\u0930\u093e\u0903 \u092a\u094d\u0930\u0924\u092a\u0928\u094d\u0924\u093f \u0935\u093f\u0937\u094d\u0923\u094b\u0964\u096411.30\u0964\u0964", "r": "lelihyase grasam\u0101na\u1e25 sa
