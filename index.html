092a\u094d\u0930\u092e\u093e\u0926\u0947 \u0938\u091e\u094d\u091c\u092f\u0924\u094d\u092f\u0941\u0924\u0964\u096414.9\u0964\u0964", "r": "sattva\u1e41 sukhe sa\u00f1jayati raja\u1e25 karma\u1e47i bh\u0101rata\nj\u00f1\u0101nam \u0101v\u1e5bitya tu tama\u1e25 pram\u0101de sa\u00f1jayaty uta", "t": "Sattva attaches to happiness, Rajas to action, O Arjuna, while Tamas, verily shrouding knowledge, attaches to heedlessness."}, {"c": 14, "v": 10, "s": "\u0930\u091c\u0938\u094d\u0924\u092e\u0936\u094d\u091a\u093e\u092d\u093f\u092d\u0942\u092f \u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u092d\u0935\u0924\u093f \u092d\u093e\u0930\u0924\u0964\u0930\u091c\u0903 \u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0924\u092e\u0936\u094d\u091a\u0948\u0935 \u0924\u092e\u0903 \u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0930\u091c\u0938\u094d\u0924\u0925\u093e\u0964\u096414.10\u0964\u0964", "r": "rajas tama\u015bh ch\u0101bhibh\u016bya sattva\u1e41 bhavati bh\u0101rata\nraja\u1e25 sattva\u1e41 tama\u015bh chaiva tama\u1e25 sattva\u1e41 rajas tath\u0101", "t": "Now, O Arjuna, Sattva prevails, having overpowered Rajas and Tamas; then Rajas, having overpowered Sattva and Tamas; and then Tamas, having overpowered Sattva and Rajas."}, {"c": 14, "v": 11, "s": "\u0938\u0930\u094d\u0935\u0926\u094d\u0935\u093e\u0930\u0947\u0937\u0941 \u0926\u0947\u0939\u0947\u093d\u0938\u094d\u092e\u093f\u0928\u094d\u092a\u094d\u0930\u0915\u093e\u0936 \u0909\u092a\u091c\u093e\u092f\u0924\u0947\u0964\u091c\u094d\u091e\u093e\u0928\u0902 \u092f\u0926\u093e \u0924\u0926\u093e \u0935\u093f\u0926\u094d\u092f\u093e\u0926\u094d\u0935\u093f\u0935\u0943\u0926\u094d\u0927\u0902 \u0938\u0924\u094d\u0924\u094d\u0935\u092e\u093f\u0924\u094d\u092f\u0941\u0924\u0964\u096414.11\u0964\u0964", "r": "sarva-dv\u0101re\u1e63hu dehe \u2019smin prak\u0101\u015bha upaj\u0101yate\nj\u00f1\u0101na\u1e41 yad\u0101 tad\u0101 vidy\u0101d viv\u1e5biddha\u1e41 sattvam ity uta", "t": "When the wisdom-light shines through every gate of this body, then it may be known that Sattva is predominant."}, {"c": 14, "v": 12, "s": "\u0932\u094b\u092d\u0903 \u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0930\u093e\u0930\u092e\u094d\u092d\u0903 \u0915\u0930\u094d\u092e\u0923\u093e\u092e\u0936\u092e\u0903 \u0938\u094d\u092a\u0943\u0939\u093e\u0964\u0930\u091c\u0938\u094d\u092f\u0947\u0924\u093e\u0928\u093f \u091c\u093e\u092f\u0928\u094d\u0924\u0947 \u0935\u093f\u0935\u0943\u0926\u094d\u0927\u0947 \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\u096414.12\u0964\u0964", "r": "lobha\u1e25 prav\u1e5bittir \u0101rambha\u1e25 karma\u1e47\u0101m a\u015bhama\u1e25 sp\u1e5bih\u0101\nrajasy et\u0101ni j\u0101yante viv\u1e5biddhe bharatar\u1e63habha", "t": "Greed, activity, the undertaking of actions, restlessness, and longing\u2014these arise when Rajas is predominant, O Arjuna."}, {"c": 14, "v": 13, "s": "\u0905\u092a\u094d\u0930\u0915\u093e\u0936\u094b\u093d\u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0936\u094d\u091a \u092a\u094d\u0930\u092e\u093e\u0926\u094b \u092e\u094b\u0939 \u090f\u0935 \u091a\u0964\u0924\u092e\u0938\u094d\u092f\u0947\u0924\u093e\u0928\u093f \u091c\u093e\u092f\u0928\u094d\u0924\u0947 \u0935\u093f\u0935\u0943\u0926\u094d\u0927\u0947 \u0915\u0941\u0930\u0941\u0928\u0928\u094d\u0926\u0928\u0964\u096414.13\u0964\u0964", "r": "aprak\u0101\u015bho \u2019prav\u1e5bitti\u015bh cha pram\u0101do moha eva cha\ntamasy et\u0101ni j\u0101yante viv\u1e5biddhe kuru-nandana", "t": "Darkness, inertia, carelessness, and delusion\u2014these arise when Tamas is predominant, O Arjuna."}, {"c": 14, "v": 14, "s": "\u092f\u0926\u093e \u0938\u0924\u094d\u0924\u094d\u0935\u0947 \u092a\u094d\u0930\u0935\u0943\u0926\u094d\u0927\u0947 \u0924\u0941 \u092a\u094d\u0930\u0932\u092f\u0902 \u092f\u093e\u0924\u093f \u0926\u0947\u0939\u092d\u0943\u0924\u094d\u0964\u0924\u0926\u094b\u0924\u094d\u0924\u092e\u0935\u093f\u0926\u093e\u0902 \u0932\u094b\u0915\u093e\u0928\u092e\u0932\u093e\u0928\u094d\u092a\u094d\u0930\u0924\u093f\u092a\u0926\u094d\u092f\u0924\u0947\u0964\u096414.14\u0964\u0964", "r": "yad\u0101 sattve prav\u1e5biddhe tu pralaya\u1e41 y\u0101ti deha-bh\u1e5bit\ntadottama-vid\u0101\u1e41 lok\u0101n amal\u0101n pratipadyate", "t": "If the embodied one meets death when Sattva is predominant, then they attain the spotless worlds of the knowers of the Highest."}, {"c": 14, "v": 15, "s": "\u0930\u091c\u0938\u093f \u092a\u094d\u0930\u0932\u092f\u0902 \u0917\u0924\u094d\u0935\u093e \u0915\u0930\u094d\u092e\u0938\u0919\u094d\u0917\u093f\u0937\u0941 \u091c\u093e\u092f\u0924\u0947\u0964\u0924\u0925\u093e \u092a\u094d\u0930\u0932\u0940\u0928\u0938\u094d\u0924\u092e\u0938\u093f \u092e\u0942\u0922\u092f\u094b\u0928\u093f\u0937\u0941 \u091c\u093e\u092f\u0924\u0947\u0964\u096414.15\u0964\u0964", "r": "rajasi pralaya\u1e41 gatv\u0101 karma-sa\u1e45gi\u1e63hu j\u0101yate\ntath\u0101 pral\u012bnas tamasi m\u016b\u1e0dha-yoni\u1e63hu j\u0101yate", "t": "Meeting death in Rajas, he is born among those who are attached to action; and dying in Tamas, he is born in the womb of the thoughtless."}, {"c": 14, "v": 16, "s": "\u0915\u0930\u094d\u092e\u0923\u0903 \u0938\u0941\u0915\u0943\u0924\u0938\u094d\u092f\u093e\u0939\u0941\u0903 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0902 \u0928\u093f\u0930\u094d\u092e\u0932\u0902 \u092b\u0932\u092e\u094d\u0964\u0930\u091c\u0938\u0938\u094d\u0924\u0941 \u092b\u0932\u0902 \u0926\u0941\u0903\u0916\u092e\u091c\u094d\u091e\u093e\u0928\u0902 \u0924\u092e\u0938\u0903 \u092b\u0932\u092e\u094d\u0964\u096414.16\u0964\u0964", "r": "karma\u1e47a\u1e25 suk\u1e5bitasy\u0101hu\u1e25 s\u0101ttvika\u1e41 nirmala\u1e41 phalam\nrajasas tu phala\u1e41 du\u1e25kham aj\u00f1\u0101na\u1e41 tamasa\u1e25 phalam", "t": "They say that the fruit of good action is Sattvic and pure; indeed, the fruit of Rajas is pain, and the fruit of Tamas is ignorance."}, {"c": 14, "v": 17, "s": "\u0938\u0924\u094d\u0924\u094d\u0935\u093e\u0924\u094d\u0938\u091e\u094d\u091c\u093e\u092f\u0924\u0947 \u091c\u094d\u091e\u093e\u0928\u0902 \u0930\u091c\u0938\u094b \u0932\u094b\u092d \u090f\u0935 \u091a\u0964\u092a\u094d\u0930\u092e\u093e\u0926\u092e\u094b\u0939\u094c \u0924\u092e\u0938\u094b \u092d\u0935\u0924\u094b\u093d\u091c\u094d\u091e\u093e\u0928\u092e\u0947\u0935 \u091a\u0964\u096414.17\u0964\u0964", "r": "sattv\u0101t sa\u00f1j\u0101yate j\u00f1\u0101na\u1e41 rajaso lobha eva cha\npram\u0101da-mohau tamaso bhavato \u2019j\u00f1\u0101nam eva cha", "t": "From Sattva arises knowledge, and greed from Rajas; heedlessness and delusion arise from Tamas, and also ignorance."}, {"c": 14, "v": 18, "s": "\u090a\u0930\u094d\u0927\u094d\u0935\u0902 \u0917\u091a\u094d\u091b\u0928\u094d\u0924\u093f \u0938\u0924\u094d\u0924\u094d\u0935\u0938\u094d\u0925\u093e \u092e\u0927\u094d\u092f\u0947 \u0924\u093f\u0937\u094d\u0920\u0928\u094d\u0924\u093f \u0930\u093e\u091c\u0938\u093e\u0903\u0964\u091c\u0918\u0928\u094d\u092f\u0917\u0941\u0923\u0935\u0943\u0924\u094d\u0924\u093f\u0938\u094d\u0925\u093e \u0905\u0927\u094b \u0917\u091a\u094d\u091b\u0928\u094d\u0924\u093f \u0924\u093e\u092e\u0938\u093e\u0903\u0964\u096414.18\u0964\u0964", "r": "\u016brdhva\u1e41 gachchhanti sattva-sth\u0101 madhye ti\u1e63h\u1e6dhanti r\u0101jas\u0101\u1e25\njaghanya-gu\u1e47a-v\u1e5bitti-sth\u0101 adho gachchhanti t\u0101mas\u0101\u1e25", "t": "Those seated in Sattva ascend; those of Rajasic nature dwell in the middle; and those of Tamasic nature, abiding in the function of the lowest Guna, descend."}, {"c": 14, "v": 19, "s": "\u0928\u093e\u0928\u094d\u092f\u0902 \u0917\u0941\u0923\u0947\u092d\u094d\u092f\u0903 \u0915\u0930\u094d\u0924\u093e\u0930\u0902 \u092f\u0926\u093e \u0926\u094d\u0930\u0937\u094d\u091f\u093e\u0928\u0941\u092a\u0936\u094d\u092f\u0924\u093f\u0964\u0917\u0941\u0923\u0947\u092d\u094d\u092f\u0936\u094d\u091a \u092a\u0930\u0902 \u0935\u0947\u0924\u094d\u0924\u093f \u092e\u0926\u094d\u092d\u093e\u0935\u0902 \u0938\u094b\u093d\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u096414.19\u0964\u0964", "r": "n\u0101nya\u1e41 gu\u1e47ebhya\u1e25 kart\u0101ra\u1e41 yad\u0101 dra\u1e63h\u1e6d\u0101nupa\u015bhyati\ngu\u1e47ebhya\u015bh cha para\u1e41 vetti mad-bh\u0101va\u1e41 so \u2019dhigachchhati", "t": "When the seer beholds no agent other than the Gunas and knows that which is higher than them, he attains to My Being."}, {"c": 14, "v": 20, "s": "\u0917\u0941\u0923\u093e\u0928\u0947\u0924\u093e\u0928\u0924\u0940\u0924\u094d\u092f \u0924\u094d\u0930\u0940\u0928\u094d\u0926\u0947\u0939\u0940 \u0926\u0947\u0939\u0938\u092e\u0941\u0926\u094d\u092d\u0935\u093e\u0928\u094d\u0964\u091c\u0928\u094d\u092e\u092e\u0943\u0924\u094d\u092f\u0941\u091c\u0930\u093e\u0926\u0941\u0903\u0916\u0948\u0930\u094d\u0935\u093f\u092e\u0941\u0915\u094d\u0924\u094b\u093d\u092e\u0943\u0924\u092e\u0936\u094d\u0928\u0941\u0924\u0947\u0964\u096414.20\u0964\u0964", "r": "gu\u1e47\u0101n et\u0101n at\u012btya tr\u012bn deh\u012b deha-samudbhav\u0101n\njanma-m\u1e5bityu-jar\u0101-du\u1e25khair vimukto \u2019m\u1e5bitam a\u015bhnute", "t": "The embodied one, having crossed beyond these three Gunas from which the body is evolved, is freed from birth, death, decay, and pain, and attains immortality."}, {"c": 14, "v": 21, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\u0915\u0948\u0930\u094d\u0932\u093f\u0902\u0917\u0948\u0938\u094d\u0924\u094d\u0930\u0940\u0928\u094d\u0917\u0941\u0923\u093e\u0928\u0947\u0924\u093e\u0928\u0924\u0940\u0924\u094b \u092d\u0935\u0924\u093f \u092a\u094d\u0930\u092d\u094b\u0964\u0915\u093f\u092e\u093e\u091a\u093e\u0930\u0903 \u0915\u0925\u0902 \u091a\u0948\u0924\u093e\u0902\u0938\u094d\u0924\u094d\u0930\u0940\u0928\u094d\u0917\u0941\u0923\u093e\u0928\u0924\u093f\u0935\u0930\u094d\u0924\u0924\u0947\u0964\u096414.21\u0964\u0964", "r": "arjuna uv\u0101cha\nkair li\u1e45gais tr\u012bn gu\u1e47\u0101n et\u0101n at\u012bto bhavati prabho\nkim \u0101ch\u0101ra\u1e25 katha\u1e41 chait\u0101ns tr\u012bn gu\u1e47\u0101n ativartate", "t": "Arjuna said, \"What are the marks of one who has transcended the three qualities, O Lord? What is their conduct, and how do they go beyond these three qualities?\""}, {"c": 14, "v": 22, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\u092a\u094d\u0930\u0915\u093e\u0936\u0902 \u091a \u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091a \u092e\u094b\u0939\u092e\u0947\u0935 \u091a \u092a\u093e\u0923\u094d\u0921\u0935\u0964\u0928 \u0926\u094d\u0935\u0947\u0937\u094d\u091f\u093f \u0938\u092e\u094d\u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093e\u0928\u093f \u0928 \u0928\u093f\u0935\u0943\u0924\u094d\u0924\u093e\u0928\u093f \u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0924\u093f\u0964\u096414.22\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nprak\u0101\u015bha\u1e41 cha prav\u1e5bitti\u1e41 cha moham eva cha p\u0101\u1e47\u1e0dava\nna dve\u1e63h\u1e6di samprav\u1e5bitt\u0101ni na niv\u1e5bitt\u0101ni k\u0101\u1e45k\u1e63hati", "t": "The Blessed Lord said, \"When light, activity, and delusion are present, he does not hate them, nor does he long for them when they are absent."}, {"c": 14, "v": 23, "s": "\u0909\u0926\u093e\u0938\u0940\u0928\u0935\u0926\u093e\u0938\u0940\u0928\u094b \u0917\u0941\u0923\u0948\u0930\u094d\u092f\u094b \u0928 \u0935\u093f\u091a\u093e\u0932\u094d\u092f\u0924\u0947\u0964\u0917\u0941\u0923\u093e \u0935\u0930\u094d\u0924\u0928\u094d\u0924 \u0907\u0924\u094d\u092f\u0947\u0935 \u092f\u094b\u093d\u0935\u0924\u093f\u0937\u094d\u0920\u0924\u093f \u0928\u0947\u0919\u094d\u0917\u0924\u0947\u0964\u096414.23\u0964\u0964", "r": "ud\u0101s\u012bna-vad \u0101s\u012bno gu\u1e47air yo na vich\u0101lyate\ngu\u1e47\u0101 vartanta ity eva\u1e41 yo \u2019vati\u1e63h\u1e6dhati ne\u1e45gate", "t": "He who, seated like one unconcerned, is not moved by the dualities, and who, knowing that the dualities are active, is self-centered and does not move."}, {"c": 14, "v": 24, "s": "\u0938\u092e\u0926\u0941\u0903\u0916\u0938\u0941\u0916\u0903 \u0938\u094d\u0935\u0938\u094d\u0925\u0903 \u0938\u092e\u0932\u094b\u0937\u094d\u091f\u093e\u0936\u094d\u092e\u0915\u093e\u091e\u094d\u091a\u0928\u0903\u0964\u0924\u0941\u0932\u094d\u092f\u092a\u094d\u0930\u093f\u092f\u093e\u092a\u094d\u0930\u093f\u092f\u094b \u0927\u0940\u0930\u0938\u094d\u0924\u0941\u0932\u094d\u092f\u0928\u093f\u0928\u094d\u0926\u093e\u0924\u094d\u092e\u0938\u0902\u0938\u094d\u0924\u0941\u0924\u093f\u0903\u0964\u096414.24\u0964\u0964", "r": "sama-du\u1e25kha-sukha\u1e25 sva-stha\u1e25 sama-lo\u1e63h\u1e6d\u0101\u015bhma-k\u0101\u00f1chana\u1e25\ntulya-priy\u0101priyo dh\u012bras tulya-nind\u0101tma-sanstuti\u1e25", "t": "Who is the same in pleasure and pain, who dwells in the Self, to whom a clod of earth, a stone, and gold are all alike, who is the same to the dear and the unfriendly, who is firm, and to whom censure and praise are one and the same."}, {"c": 14, "v": 25, "s": "\u092e\u093e\u0928\u093e\u092a\u092e\u093e\u0928\u092f\u094b\u0938\u094d\u0924\u0941\u0932\u094d\u092f\u0938\u094d\u0924\u0941\u0932\u094d\u092f\u094b \u092e\u093f\u0924\u094d\u0930\u093e\u0930\u093f\u092a\u0915\u094d\u0937\u092f\u094b\u0903\u0964\u0938\u0930\u094d\u0935\u093e\u0930\u092e\u094d\u092d\u092a\u0930\u093f\u0924\u094d\u092f\u093e\u0917\u0940 \u0917\u0941\u0923\u093e\u0924\u0940\u0924\u0903 \u0938 \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u096414.25\u0964\u0964", "r": "m\u0101n\u0101pam\u0101nayos tulyas tulyo mitr\u0101ri-pak\u1e63hayo\u1e25\nsarv\u0101rambha-parity\u0101g\u012b gu\u1e47\u0101t\u012bta\u1e25 sa uchyate", "t": "Who is the same in honor and dishonor, the same to friend and foe, abandoning all undertakings, he is said to have transcended the dualities."}, {"c": 14, "v": 26, "s": "\u092e\u093e\u0902 \u091a \u092f\u094b\u093d\u0935\u094d\u092f\u092d\u093f\u091a\u093e\u0930\u0947\u0923 \u092d\u0915\u094d\u093f\u0924\u092f\u094b\u0917\u0947\u0928 \u0938\u0947\u0935\u0924\u0947\u0964\u0938 \u0917\u0941\u0923\u093e\u0928\u094d\u0938\u092e\u0924\u0940\u0924\u094d\u092f\u0948\u0924\u093e\u0928\u094d \u092c\u094d\u0930\u0939\u094d\u092e\u092d\u0942\u092f\u093e\u092f \u0915\u0932\u094d\u092a\u0924\u0947\u0964\u096414.26\u0964\u0964", "r": "m\u0101\u1e41 cha yo \u2019vyabhich\u0101re\u1e47a bhakti-yogena sevate\nsa gu\u1e47\u0101n samat\u012btyait\u0101n brahma-bh\u016by\u0101ya kalpate", "t": "And he who serves Me with unwavering devotion, he, crossing beyond the dualities, is fit for becoming Brahman."}, {"c": 14, "v": 27, "s": "\u092c\u094d\u0930\u0939\u094d\u092e\u0923\u094b \u0939\u093f \u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093e\u093d\u0939\u092e\u092e\u0943\u0924\u0938\u094d\u092f\u093e\u0935\u094d\u092f\u092f\u0938\u094d\u092f \u091a\u0964\u0936\u093e\u0936\u094d\u0935\u0924\u0938\u094d\u092f \u091a \u0927\u0930\u094d\u092e\u0938\u094d\u092f \u0938\u0941\u0916\u0938\u094d\u092f\u0948\u0915\u093e\u0928\u094d\u0924\u093f\u0915\u0938\u094d\u092f \u091a\u0964\u096414.27\u0964\u0964", "r": "brahma\u1e47o hi prati\u1e63h\u1e6dh\u0101ham am\u1e5bitasy\u0101vyayasya cha\n\u015bh\u0101\u015bhvatasya cha dharmasya sukhasyaik\u0101ntikasya cha", "t": "For I am the abode of Brahman, the immortal, immutable, and everlasting Dharma, and absolute bliss."}, {"c": 15, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\u090a\u0930\u094d\u0927\u094d\u0935\u092e\u0942\u0932\u092e\u0927\u0903\u0936\u093e\u0916\u092e\u0936\u094d\u0935\u0924\u094d\u0925\u0902 \u092a\u094d\u0930\u093e\u0939\u0941\u0930\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u091b\u0928\u094d\u0926\u093e\u0902\u0938\u093f \u092f\u0938\u094d\u092f \u092a\u0930\u094d\u0923\u093e\u0928\u093f \u092f\u0938\u094d\u0924\u0902 \u0935\u0947\u0926 \u0938 \u0935\u0947\u0926\u0935\u093f\u0924\u094d\u0964\u096415.1\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\n\u016brdhva-m\u016blam adha\u1e25-\u015bh\u0101kham a\u015bhvattha\u1e41 pr\u0101hur avyayam\nchhand\u0101nsi yasya par\u1e47\u0101ni yas ta\u1e41 veda sa veda-vit", "t": "The Blessed Lord said: They (the wise) speak of the indestructible peepul tree, with its roots above and branches below, whose leaves are the meters or hymns; he who knows it is a knower of the Vedas."}, {"c": 15, "v": 2, "s": "\u0905\u0927\u0936\u094d\u091a\u094b\u0930\u094d\u0927\u094d\u0935\u0902 \u092a\u094d\u0930\u0938\u0943\u0924\u093e\u0938\u094d\u0924\u0938\u094d\u092f \u0936\u093e\u0916\u093e \u0917\u0941\u0923\u092a\u094d\u0930\u0935\u0943\u0926\u094d\u0927\u093e \u0935\u093f\u0937\u092f\u092a\u094d\u0930\u0935\u093e\u0932\u093e\u0903\u0964\u0905\u0927\u0936\u094d\u091a \u092e\u0942\u0932\u093e\u0928\u094d\u092f\u0928\u0941\u0938\u0928\u094d\u0924\u0924\u093e\u0928\u093f \u0915\u0930\u094d\u092e\u093e\u0928\u0941\u092c\u0928\u094d\u0927\u0940\u0928\u093f \u092e\u0928\u0941\u0937\u094d\u092f\u0932\u094b\u0915\u0947\u0964\u096415.2\u0964\u0964", "r": "adha\u015bh chordhva\u1e41 pras\u1e5bit\u0101s tasya \u015bh\u0101kh\u0101\ngu\u1e47a-prav\u1e5biddh\u0101 vi\u1e63haya-prav\u0101l\u0101\u1e25\nadha\u015bh cha m\u016bl\u0101ny anusantat\u0101ni\nkarm\u0101nubandh\u012bni manu\u1e63hya-loke", "t": "Its branches spread below and above, nourished by the Gunas; its buds are sense-objects, and its roots stretch forth below in the world of men, originating action."}, {"c": 15, "v": 3, "s": "\u0928 \u0930\u0942\u092a\u092e\u0938\u094d\u092f\u0947\u0939 \u0924\u0925\u094b\u092a\u0932\u092d\u094d\u092f\u0924\u0947 \u0928\u093e\u0928\u094d\u0924\u094b \u0928 \u091a\u093e\u0926\u093f\u0930\u094d\u0928 \u091a \u0938\u0902\u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u093e\u0964\u0905\u0936\u094d\u0935\u0924\u094d\u0925\u092e\u0947\u0928\u0902 \u0938\u0941\u0935\u093f\u0930\u0942\u0922\u092e\u0942\u0932 \u092e\u0938\u0919\u094d\u0917\u0936\u0938\u094d\u0924\u094d\u0930\u0947\u0923 \u0926\u0943\u0922\u0947\u0928 \u091b\u093f\u0924\u094d\u0924\u094d\u0935\u093e\u0964\u096415.3\u0964\u0964", "r": "na r\u016bpam asyeha tathopalabhyate\nn\u0101nto na ch\u0101dir na cha samprati\u1e63h\u1e6dh\u0101\na\u015bhvattham ena\u1e41 su-vir\u016b\u1e0dha-m\u016blam\nasa\u1e45ga-\u015bhastre\u1e47a d\u1e5bi\u1e0dhena chhittv\u0101", "t": "Its form is not perceived here as such, nor its end, origin, foundation, or resting place; having cut asunder this firmly rooted peepul tree with the strong axe of non-attachment."}, {"c": 15, "v": 4, "s": "\u0924\u0924\u0903 \u092a\u0926\u0902 \u0924\u0924\u094d\u092a\u0930\u093f\u092e\u093e\u0930\u094d\u0917\u093f\u0924\u0935\u094d\u092f \u092f\u0938\u094d\u092e\u093f\u0928\u094d\u0917\u0924\u093e \u0928 \u0928\u093f\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u093f \u092d\u0942\u092f\u0903\u0964\u0924\u092e\u0947\u0935 \u091a\u093e\u0926\u094d\u092f\u0902 \u092a\u0941\u0930\u0941\u0937\u0902 \u092a\u094d\u0930\u092a\u0926\u094d\u092f\u0947 \u092f\u0924\u0903 \u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0903 \u092a\u094d\u0930\u0938\u0943\u0924\u093e \u092a\u0941\u0930\u093e\u0923\u0940\u0964\u096415.4\u0964\u0964", "r": "tata\u1e25 pada\u1e41 tat parim\u0101rgitavya\u1e41\nyasmin gat\u0101 na nivartanti bh\u016bya\u1e25\ntam eva ch\u0101dya\u1e41 puru\u1e63ha\u1e41 prapadye\nyata\u1e25 prav\u1e5bitti\u1e25 pras\u1e5bit\u0101 pur\u0101\u1e47\u012b", "t": "Then, that goal should be sought for, to which, having gone, none returns again. I seek refuge in that Primeval Purusha, from whence streamed forth the ancient activity or energy."}, {"c": 15, "v": 5, "s": "\u0928\u093f\u0930\u094d\u092e\u093e\u0928\u092e\u094b\u0939\u093e \u091c\u093f\u0924\u0938\u0919\u094d\u0917\u0926\u094b\u0937\u093e \u0905\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u093f\u0924\u094d\u092f\u093e \u0935\u093f\u0928\u093f\u0935\u0943\u0924\u094d\u0924\u0915\u093e\u092e\u093e\u0903\u0964\u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u0948\u0930\u094d\u0935\u093f\u092e\u0941\u0915\u094d\u0924\u093e\u0903 \u0938\u0941\u0916\u0926\u0941\u0903\u0916\u0938\u0902\u091c\u094d\u091e\u0948 \u0930\u094d\u0917\u091a\u094d\u091b\u0928\u094d\u0924\u094d\u092f\u092e\u0942\u0922\u093e\u0903 \u092a\u0926\u092e\u0935\u094d\u092f\u092f\u0902 \u0924\u0924\u094d\u0964\u096415.5\u0964\u0964", "r": "nirm\u0101na-moh\u0101 jita-sa\u1e45ga-do\u1e63h\u0101\nadhy\u0101tma-nity\u0101 viniv\u1e5bitta-k\u0101m\u0101\u1e25\ndvandvair vimukt\u0101\u1e25 sukha-du\u1e25kha-sanj\u00f1air\ngachchhanty am\u016b\u1e0dh\u0101\u1e25 padam avyaya\u1e41 tat", "t": "Free from pride and delusion, victorious over the evil of attachment, dwelling constantly in the Self, their desires having completely turned away, freed from the pairs of opposites known as pleasure and pain, they, the undeluded, reach the eternal goal."}, {"c": 15, "v": 6, "s": "\u0928 \u0924\u0926\u094d\u092d\u093e\u0938\u092f\u0924\u0947 \u0938\u0942\u0930\u094d\u092f\u094b \u0928 \u0936\u0936\u093e\u0919\u094d\u0915\u094b \u0928 \u092a\u093e\u0935\u0915\u0903\u0964\u092f\u0926\u094d\u0917\u0924\u094d\u0935\u093e \u0928 \u0928\u093f\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u0924\u0926\u094d\u0927\u093e\u092e \u092a\u0930\u092e\u0902 \u092e\u092e\u0964\u096415.6\u0964\u0964", "r": "na tad bh\u0101sayate s\u016bryo na \u015bha\u015bh\u0101\u1e45ko na p\u0101vaka\u1e25\nyad gatv\u0101 na nivartante tad dh\u0101ma parama\u1e41 mama", "t": "Neither does the sun illuminate there, nor the moon, nor the fire; having gone there, they do not return; that is My supreme abode."}, {"c": 15, "v": 7, "s": "\u092e\u092e\u0948\u0935\u093e\u0902\u0936\u094b \u091c\u0940\u0935\u0932\u094b\u0915\u0947 \u091c\u0940\u0935\u092d\u0942\u0924\u0903 \u0938\u0928\u093e\u0924\u0928\u0903\u0964\u092e\u0928\u0903\u0937\u0937\u094d\u0920\u093e\u0928\u0940\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0938\u094d\u0925\u093e\u0928\u093f \u0915\u0930\u094d\u0937\u0924\u093f\u0964\u096415.7\u0964\u0964", "r": "mamaiv\u0101n\u015bho j\u012bva-loke j\u012bva-bh\u016bta\u1e25 san\u0101tana\u1e25\nmana\u1e25-\u1e63ha\u1e63h\u1e6dh\u0101n\u012bndriy\u0101\u1e47i prak\u1e5biti-sth\u0101ni kar\u1e63hati", "t": "An eternal portion of Myself having become a living soul in the world of life, draws to itself the five senses, with the mind as the sixth, abiding in Nature."}, {"c": 15, "v": 8, "s": "\u0936\u0930\u0940\u0930\u0902 \u092f\u0926\u0935\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u092f\u091a\u094d\u091a\u093e\u092a\u094d\u092f\u0941\u0924\u094d\u0915\u094d\u0930\u093e\u092e\u0924\u0940\u0936\u094d\u0935\u0930\u0903\u0964\u0917\u0943\u0939\u0940\u0924\u094d\u0935\u0948\u0924\u093e\u0928\u093f \u0938\u0902\u092f\u093e\u0924\u093f \u0935\u093e\u092f\u0941\u0930\u094d\u0917\u0928\u094d\u0927\u093e\u0928\u093f\u0935\u093e\u0936\u092f\u093e\u0924\u094d\u0964\u096415.8\u0964\u0964", "r": "\u015bhar\u012bra\u1e41 yad av\u0101pnoti yach ch\u0101py utkr\u0101mat\u012b\u015bhvara\u1e25\ng\u1e5bih\u012btvait\u0101ni sany\u0101ti v\u0101yur gandh\u0101n iv\u0101\u015bhay\u0101t", "t": "When the Lord, as the individual soul, obtains a body and when He leaves it, He takes these with Him, just as the wind takes the scents from their seats (flowers, etc.)."}, {"c": 15, "v": 9, "s": "\u0936\u094d\u0930\u094b\u0924\u094d\u0930\u0902 \u091a\u0915\u094d\u0937\u0941\u0903 \u0938\u094d\u092a\u0930\u094d\u0936\u0928\u0902 \u091a \u0930\u0938\u0928\u0902 \u0918\u094d\u0930\u093e\u0923\u092e\u0947\u0935 \u091a\u0964\u0905\u0927\u093f\u0937\u094d\u0920\u093e\u092f \u092e\u0928\u0936\u094d\u091a\u093e\u092f\u0902 \u0935\u093f\u0937\u092f\u093e\u0928\u0941\u092a\u0938\u0947\u0935\u0924\u0947\u0964\u096415.9\u0964\u0964", "r": "\u015bhrotra\u1e41 chak\u1e63hu\u1e25 spar\u015bhana\u1e41 cha rasana\u1e41 ghr\u0101\u1e47am eva cha\nadhi\u1e63h\u1e6dh\u0101ya mana\u015bh ch\u0101ya\u1e41 vi\u1e63hay\u0101n upasevate", "t": "Presiding over the ears, eyes, touch, taste, smell, and mind, it enjoys the objects of the senses."}, {"c": 15, "v": 10, "s": "\u0909\u0924\u094d\u0915\u094d\u0930\u093e\u092e\u0928\u094d\u0924\u0902 \u0938\u094d\u0925\u093f\u0924\u0902 \u0935\u093e\u092a\u093f \u092d\u0941\u091e\u094d\u091c\u093e\u0928\u0902 \u0935\u093e \u0917\u0941\u0923\u093e\u0928\u094d\u0935\u093f\u0924\u092e\u094d\u0964\u0935\u093f\u092e\u0942\u0922\u093e \u0928\u093e\u0928\u0941\u092a\u0936\u094d\u092f\u0928\u094d\u0924\u093f \u092a\u0936\u094d\u092f\u0928\u094d\u0924\u093f \u091c\u094d\u091e\u093e\u0928\u091a\u0915\u094d\u0937\u0941\u0937\u0903\u0964\u096415.10\u0964\u0964", "r": "utkr\u0101manta\u1e41 sthita\u1e41 v\u0101pi bhu\u00f1j\u0101na\u1e41 v\u0101 gu\u1e47\u0101nvitam\nvim\u016b\u1e0dh\u0101 n\u0101nupa\u015bhyanti pa\u015bhyanti j\u00f1\u0101na-chak\u1e63hu\u1e63ha\u1e25", "t": "The deluded do not see Him who departs, stays, and enjoys; but those who possess the eye of knowledge behold Him."}, {"c": 15, "v": 11, "s": "\u092f\u0924\u0928\u094d\u0924\u094b \u092f\u094b\u0917\u093f\u0928\u0936\u094d\u091a\u0948\u0928\u0902 \u092a\u0936\u094d\u092f\u0928\u094d\u0924\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u094d\u092f\u0935\u0938\u094d\u0925\u093f\u0924\u092e\u094d\u0964\u092f\u0924\u0928\u094d\u0924\u094b\u093d\u092a\u094d\u092f\u0915\u0943\u0924\u093e\u0924\u094d\u092e\u093e\u0928\u094b \u0928\u0948\u0928\u0902 \u092a\u0936\u094d\u092f\u0928\u094d\u0924\u094d\u092f\u091a\u0947\u0924\u0938\u0903\u0964\u096415.11\u0964\u0964", "r": "yatanto yogina\u015bh chaina\u1e41 pa\u015bhyanty \u0101tmany avasthitam\nyatanto \u2018py ak\u1e5bit\u0101tm\u0101no naina\u1e41 pa\u015bhyanty achetasa\u1e25", "t": "The yogis striving for perfection behold Him dwelling in the Self; but, the unrefined and unintelligent, even though striving, do not see Him."}, {"c": 15, "v": 12, "s": "\u092f\u0926\u093e\u0926\u093f\u0924\u094d\u092f\u0917\u0924\u0902 \u0924\u0947\u091c\u094b \u091c\u0917\u0926\u094d\u092d\u093e\u0938\u092f\u0924\u0947\u093d\u0916\u093f\u0932\u092e\u094d\u0964\u092f\u091a\u094d\u091a\u0928\u094d\u0926\u094d\u0930\u092e\u0938\u093f \u092f\u091a\u094d\u091a\u093e\u0917\u094d\u0928\u094c \u0924\u0924\u094d\u0924\u0947\u091c\u094b \u0935\u093f\u0926\u094d\u0927\u093f \u092e\u093e\u092e\u0915\u092e\u094d\u0964\u096415.12\u0964\u0964", "r": "yad \u0101ditya-gata\u1e41 tejo jagad bh\u0101sayate \u2019khilam\nyach chandramasi yach ch\u0101gnau tat tejo viddhi m\u0101makam", "t": "That light which resides in the sun, illuminating the whole world; that which is in the moon and in the fire\u2014know that light to be Mine."}, {"c": 15, "v": 13, "s": "\u0917\u093e\u092e\u093e\u0935\u093f\u0936\u094d\u092f \u091a \u092d\u0942\u0924\u093e\u0928\u093f \u0927\u093e\u0930\u092f\u093e\u092e\u094d\u092f\u0939\u092e\u094b\u091c\u0938\u093e\u0964\u092a\u0941\u0937\u094d\u0923\u093e\u092e\u093f \u091a\u094c\u0937\u0927\u0940\u0903 \u0938\u0930\u094d\u0935\u093e\u0903 \u0938\u094b\u092e\u094b \u092d\u0942\u0924\u094d\u0935\u093e \u0930\u0938\u093e\u0924\u094d\u092e\u0915\u0903\u0964\u096415.13\u0964\u0964", "r": "g\u0101m \u0101vi\u015bhya cha bh\u016bt\u0101ni dh\u0101ray\u0101my aham ojas\u0101\npu\u1e63h\u1e47\u0101mi chau\u1e63hadh\u012b\u1e25 sarv\u0101\u1e25 somo bh\u016btv\u0101 ras\u0101tmaka\u1e25", "t": "Permeating the earth, I support all beings with My energy; and having become the watery moon, I nourish all herbs."}, {"c": 15, "v": 14, "s": "\u0905\u0939\u0902 \u0935\u0948\u0936\u094d\u0935\u093e\u0928\u0930\u094b \u092d\u0942\u0924\u094d\u0935\u093e \u092a\u094d\u0930\u093e\u0923\u093f\u0928\u093e\u0902 \u0926\u0947\u0939\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u0903\u0964\u092a\u094d\u0930\u093e\u0923\u093e\u092a\u093e\u0928\u0938\u092e\u093e\u092f\u0941\u0915\u094d\u0924\u0903 \u092a\u091a\u093e\u092e\u094d\u092f\u0928\u094d\u0928\u0902 \u091a\u0924\u0941\u0930\u094d\u0935\u093f\u0927\u092e\u094d\u0964\u096415.14\u0964\u0964", "r": "aha\u1e41 vai\u015bhv\u0101naro bh\u016btv\u0101 pr\u0101\u1e47in\u0101\u1e41 deham \u0101\u015bhrita\u1e25\npr\u0101\u1e47\u0101p\u0101na-sam\u0101yukta\u1e25 pach\u0101my anna\u1e41 chatur-vidham", "t": "Having become the fire Vaisvanara, I abide in the bodies of living beings and, associated with the Prana and the Apana, digest the fourfold food."}, {"c": 15, "v": 15, "s": "\u0938\u0930\u094d\u0935\u0938\u094d\u092f \u091a\u093e\u0939\u0902 \u0939\u0943\u0926\u093f \u0938\u0928\u094d\u0928\u093f\u0935\u093f\u0937\u094d\u091f\u094b \u092e\u0924\u094d\u0924\u0903 \u0938\u094d\u092e\u0943\u0924\u093f\u0930\u094d\u091c\u094d\u091e\u093e\u0928\u092e\u092a\u094b\u0939\u0928\u0902 \u091a\u0964\u0935\u0947\u0926\u0948\u0936\u094d\u091a \u0938\u0930\u094d\u0935\u0948\u0930\u0939\u092e\u0947\u0935 \u0935\u0947\u0926\u094d\u092f\u094b \u0935\u0947\u0926\u093e\u0928\u094d\u0924\u0915\u0943\u0926\u094d\u0935\u0947\u0926\u0935\u093f\u0926\u0947\u0935 \u091a\u093e\u0939\u092e\u094d\u0964\u096415.15\u0964\u0964", "r": "sarvasya ch\u0101ha\u1e41 h\u1e5bidi sannivi\u1e63h\u1e6do\nmatta\u1e25 sm\u1e5bitir j\u00f1\u0101nam apohana\u1e41 cha\nvedai\u015bh cha sarvair aham eva vedyo\nved\u0101nta-k\u1e5bid veda-vid eva ch\u0101ham", "t": "And I am seated in the hearts of all; from Me come memory and knowledge, as well as their absence. I am verily That which has to be known by all the Vedas; I am indeed the author of the Vedanta and the knower of the Vedas."}, {"c": 15, "v": 16, "s": "\u0926\u094d\u0935\u093e\u0935\u093f\u092e\u094c \u092a\u0941\u0930\u0941\u0937\u094c \u0932\u094b\u0915\u0947 \u0915\u094d\u0937\u0930\u0936\u094d\u091a\u093e\u0915\u094d\u0937\u0930 \u090f\u0935 \u091a\u0964\u0915\u094d\u0937\u0930\u0903 \u0938\u0930\u094d\u0935\u093e\u0923\u093f \u092d\u0942\u0924\u093e\u0928\u093f \u0915\u0942\u091f\u0938\u094d\u0925\u094b\u093d\u0915\u094d\u0937\u0930 \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u096415.16\u0964\u0964", "r": "dv\u0101v imau puru\u1e63hau loke k\u1e63hara\u015bh ch\u0101k\u1e63hara eva cha\nk\u1e63hara\u1e25 sarv\u0101\u1e47i bh\u016bt\u0101ni k\u016b\u1e6da-stho \u2019k\u1e63hara uchyate", "t": "Two Purushas there are in this world: the perishable and the imperishable. All beings are perishable, and the Kutastha\u2014the unchanging\u2014is called the imperishable."}, {"c": 15, "v": 17, "s": "\u0909\u0924\u094d\u0924\u092e\u0903 \u092a\u0941\u0930\u0941\u0937\u0938\u094d\u0924\u094d\u0935\u0928\u094d\u092f\u0903 \u092a\u0930\u092e\u093e\u0924\u094d\u092e\u0947\u0924\u094d\u092f\u0941\u0926\u093e\u0939\u0943\u0924\u0903\u0964\u092f\u094b \u0932\u094b\u0915\u0924\u094d\u0930\u092f\u092e\u093e\u0935\u093f\u0936\u094d\u092f \u092c\u093f\u092d\u0930\u094d\u0924\u094d\u092f\u0935\u094d\u092f\u092f \u0908\u0936\u094d\u0935\u0930\u0903\u0964\u096415.17\u0964\u0964", "r": "uttama\u1e25 puru\u1e63has tv anya\u1e25 param\u0101tmety ud\u0101h\u1e5bita\u1e25\nyo loka-trayam \u0101vi\u015bhya bibharty avyaya \u012b\u015bhvara\u1e25", "t": "But distinct is the Supreme Purusha, called the highest Self, indestructible and Lord, who pervades the three worlds and sustains them."}, {"c": 15, "v": 18, "s": "\u092f\u0938\u094d\u092e\u093e\u0924\u094d\u0915\u094d\u0937\u0930\u092e\u0924\u0940\u0924\u094b\u093d\u0939\u092e\u0915\u094d\u0937\u0930\u093e\u0926\u092a\u093f \u091a\u094b\u0924\u094d\u0924\u092e\u0903\u0964\u0905\u0924\u094b\u093d\u0938\u094d\u092e\u093f \u0932\u094b\u0915\u0947 \u0935\u0947\u0926\u0947 \u091a \u092a\u094d\u0930\u0925\u093f\u0924\u0903 \u092a\u0941\u0930\u0941\u0937\u094b\u0924\u094d\u0924\u092e\u0903\u0964\u096415.18\u0964\u0964", "r": "yasm\u0101t k\u1e63haram at\u012bto \u2019ham ak\u1e63har\u0101d api chottama\u1e25\nato \u2019smi loke vede cha prathita\u1e25 puru\u1e63hottama\u1e25", "t": "As I transcend the perishable and am even higher than the imperishable, I am declared to be the highest Purusha in the world and in the Vedas."}, {"c": 15, "v": 19, "s": "\u092f\u094b \u092e\u093e\u092e\u0947\u0935\u092e\u0938\u092e\u094d\u092e\u0942\u0922\u094b \u091c\u093e\u0928\u093e\u0924\u093f \u092a\u0941\u0930\u0941\u0937\u094b\u0924\u094d\u0924\u092e\u092e\u094d\u0964\u0938 \u0938\u0930\u094d\u0935\u0935\u093f\u0926\u094d\u092d\u091c\u0924\u093f \u092e\u093e\u0902 \u0938\u0930\u094d\u0935\u092d\u093e\u0935\u0947\u0928 \u092d\u093e\u0930\u0924\u0964\u096415.19\u0964\u0964", "r": "yo m\u0101m evam asamm\u016b\u1e0dho j\u0101n\u0101ti puru\u1e63hottamam\nsa sarva-vid bhajati m\u0101\u1e41 sarva-bh\u0101vena bh\u0101rata", "t": "He who, undeluded, knows Me as the highest Purusha, he, knowing all, worships Me with his whole being (heart), O Arjuna."}, {"c": 15, "v": 20, "s": "\u0907\u0924\u093f \u0917\u0941\u0939\u094d\u092f\u0924\u092e\u0902 \u0936\u093e\u0938\u094d\u0924\u094d\u0930\u092e\u093f\u0926\u092e\u0941\u0915\u094d\u0924\u0902 \u092e\u092f\u093e\u093d\u0928\u0918\u0964\u090f\u0924\u0926\u094d\u092c\u0941\u0926\u094d\u0927\u094d\u0935\u093e \u092c\u0941\u0926\u094d\u0927\u093f\u092e\u093e\u0928\u094d\u0938\u094d\u092f\u093e\u0924\u094d\u0915\u0943\u0924\u0915\u0943\u0924\u094d\u092f\u0936\u094d\u091a \u092d\u093e\u0930\u0924\u0964\u096415.20\u0964\u0964", "r": "iti guhyatama\u1e41 \u015bh\u0101stram idam ukta\u1e41 may\u0101nagha\netad buddhv\u0101 buddhim\u0101n sy\u0101t k\u1e5bita-k\u1e5bitya\u015bh cha bh\u0101rata", "t": "Thus, I have imparted to you this most secret science, O sinless one; by knowing this, one becomes wise, and all their duties are accomplished, O Arjuna."}, {"c": 16, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0905\u092d\u092f\u0902 \u0938\u0924\u094d\u0924\u094d\u0935\u0938\u0902\u0936\u0941\u0926\u094d\u0927\u093f\u0903 \u091c\u094d\u091e\u093e\u0928\u092f\u094b\u0917\u0935\u094d\u092f\u0935\u0938\u094d\u0925\u093f\u0924\u093f\u0903\u0964\n\n\u0926\u093e\u0928\u0902 \u0926\u092e\u0936\u094d\u091a \u092f\u091c\u094d\u091e\u0936\u094d\u091a \u0938\u094d\u0935\u093e\u0927\u094d\u092f\u093e\u092f\u0938\u094d\u0924\u092a \u0906\u0930\u094d\u091c\u0935\u092e\u094d\u0964\u096416.1\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nabhaya\u1e41 sattva-san\u015bhuddhir j\u00f1\u0101na-yoga-vyavasthiti\u1e25\nd\u0101na\u1e41 dama\u015bh cha yaj\u00f1a\u015bh cha sv\u0101dhy\u0101yas tapa \u0101rjavam", "t": "The Blessed Lord said: Fearlessness, purity of heart, steadfastness in knowledge and yoga, almsgiving, control of the senses, sacrifice, study of scriptures, austerity, and straightforwardness."}, {"c": 16, "v": 2, "s": "\u0905\u0939\u093f\u0902\u0938\u093e \u0938\u0924\u094d\u092f\u092e\u0915\u094d\u0930\u094b\u0927\u0938\u094d\u0924\u094d\u092f\u093e\u0917\u0903 \u0936\u093e\u0928\u094d\u0924\u093f\u0930\u092a\u0948\u0936\u0941\u0928\u092e\u094d\u0964\u0926\u092f\u093e \u092d\u0942\u0924\u0947\u0937\u094d\u0935\u0932\u094b\u0932\u0941\u092a\u094d\u0924\u094d\u0935\u0902 \u092e\u093e\u0930\u094d\u0926\u0935\u0902 \u0939\u094d\u0930\u0940\u0930\u091a\u093e\u092a\u0932\u092e\u094d\u0964\u096416.2\u0964\u0964", "r": "ahins\u0101 satyam akrodhas ty\u0101ga\u1e25 \u015bh\u0101ntir apai\u015bhunam\nday\u0101 bh\u016bte\u1e63hv aloluptva\u1e41 m\u0101rdava\u1e41 hr\u012br ach\u0101palam", "t": "Harmlessness, truth, absence of anger, renunciation, peacefulness, absence of crookedness, compassion for beings, non-covetousness, gentleness, modesty, and absence of fickleness."}, {"c": 16, "v": 3, "s": "\u0924\u0947\u091c\u0903 \u0915\u094d\u0937\u092e\u093e \u0927\u0943\u0924\u093f\u0903 \u0936\u094c\u091a\u092e\u0926\u094d\u0930\u094b\u0939\u094b \u0928\u093e\u0924\u093f\u092e\u093e\u0928\u093f\u0924\u093e\u0964\n\n\u092d\u0935\u0928\u094d\u0924\u093f \u0938\u092e\u094d\u092a\u0926\u0902 \u0926\u0948\u0935\u0940\u092e\u092d\u093f\u091c\u093e\u0924\u0938\u094d\u092f \u092d\u093e\u0930\u0924\u0964\u096416.3\u0964\u0964", "r": "teja\u1e25 k\u1e63ham\u0101 dh\u1e5biti\u1e25 \u015bhaucham adroho n\u0101ti-m\u0101nit\u0101\nbhavanti sampada\u1e41 daiv\u012bm abhij\u0101tasya bh\u0101rata", "t": "Vigor, forgiveness, fortitude, purity, absence of hatred, absence of pride\u2014these belong to one born for a divine state, O Arjuna."}, {"c": 16, "v": 4, "s": "\u0926\u092e\u094d\u092d\u094b \u0926\u0930\u094d\u092a\u094b\u093d\u092d\u093f\u092e\u093e\u0928\u0936\u094d\u091a \u0915\u094d\u0930\u094b\u0927\u0903 \u092a\u093e\u0930\u0941\u0937\u094d\u092f\u092e\u0947\u0935 \u091a\u0964\u0905\u091c\u094d\u091e\u093e\u0928\u0902 \u091a\u093e\u092d\u093f\u091c\u093e\u0924\u0938\u094d\u092f \u092a\u093e\u0930\u094d\u0925 \u0938\u092e\u094d\u092a\u0926\u092e\u093e\u0938\u0941\u0930\u0940\u092e\u094d\u0964\u096416.4\u0964\u0964", "r": "dambho darpo \u2019bhim\u0101na\u015bh cha krodha\u1e25 p\u0101ru\u1e63hyam eva cha\naj\u00f1\u0101na\u1e41 ch\u0101bhij\u0101tasya p\u0101rtha sampadam \u0101sur\u012bm", "t": "Hypocrisy, arrogance, and self-conceit, anger, harshness, and ignorance\u2014these belong to one who is born for a demoniacal state, O Partha."}, {"c": 16, "v": 5, "s": "\u0926\u0948\u0935\u0940 \u0938\u092e\u094d\u092a\u0926\u094d\u0935\u093f\u092e\u094b\u0915\u094d\u0937\u093e\u092f \u0928\u093f\u092c\u0928\u094d\u0927\u093e\u092f\u093e\u0938\u0941\u0930\u0940 \u092e\u0924\u093e\u0964\u092e\u093e \u0936\u0941\u091a\u0903 \u0938\u092e\u094d\u092a\u0926\u0902 \u0926\u0948\u0935\u0940\u092e\u092d\u093f\u091c\u093e\u0924\u094b\u093d\u0938\u093f \u092a\u093e\u0923\u094d\u0921\u0935\u0964\u096416.5\u0964\u0964", "r": "daiv\u012b sampad vimok\u1e63h\u0101ya nibandh\u0101y\u0101sur\u012b mat\u0101\nm\u0101 \u015bhucha\u1e25 sampada\u1e41 daiv\u012bm abhij\u0101to \u2019si p\u0101\u1e47\u1e0dava", "t": "The divine nature is deemed conducive to liberation, and the demonic to bondage. Grieve not, O Arjuna, for you are born with divine endowments."}, {"c": 16, "v": 6, "s": "\u0926\u094d\u0935\u094c \u092d\u0942\u0924\u0938\u0930\u094d\u0917\u094c \u0932\u094b\u0915\u0947\u093d\u0938\u094d\u092e\u093f\u0928\u094d \u0926\u0948\u0935 \u0906\u0938\u0941\u0930 \u090f\u0935 \u091a\u0964\u0926\u0948\u0935\u094b \u0935\u093f\u0938\u094d\u0924\u0930\u0936\u0903 \u092a\u094d\u0930\u094b\u0915\u094d\u0924 \u0906\u0938\u0941\u0930\u0902 \u092a\u093e\u0930\u094d\u0925 \u092e\u0947 \u0936\u094d\u0930\u0943\u0923\u0941\u0964\u096416.6\u0964\u0964", "r": "dvau bh\u016bta-sargau loke \u2019smin daiva \u0101sura eva cha\ndaivo vistara\u015bha\u1e25 prokta \u0101sura\u1e41 p\u0101rtha me \u015bh\u1e5bi\u1e47u", "t": "There are two types of beings in this world: the divine and the demoniacal. The divine has been described at length; hear from Me, O Arjuna, about the demoniacal."}, {"c": 16, "v": 7, "s": "\u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091a \u0928\u093f\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091a \u091c\u0928\u093e \u0928 \u0935\u093f\u0926\u0941\u0930\u093e\u0938\u0941\u0930\u093e\u0903\u0964\u0928 \u0936\u094c\u091a\u0902 \u0928\u093e\u092a\u093f \u091a\u093e\u091a\u093e\u0930\u094b \u0928 \u0938\u0924\u094d\u092f\u0902 \u0924\u0947\u0937\u0941 \u0935\u093f\u0926\u094d\u092f\u0924\u0947\u0964\u096416.7\u0964\u0964", "r": "prav\u1e5bitti\u1e41 cha niv\u1e5bitti\u1e41 cha jan\u0101 na vidur \u0101sur\u0101\u1e25\nna \u015bhaucha\u1e41 n\u0101pi ch\u0101ch\u0101ro na satya\u1e41 te\u1e63hu vidyate", "t": "The demoniacal do not know what to do and what to refrain from; they have neither purity, nor right conduct, nor truth."}, {"c": 16, "v": 8, "s": "\u0905\u0938\u0924\u094d\u092f\u092e\u092a\u094d\u0930\u0924\u093f\u0937\u094d\u0920\u0902 \u0924\u0947 \u091c\u0917\u0926\u093e\u0939\u0941\u0930\u0928\u0940\u0936\u094d\u0935\u0930\u092e\u094d\u0964\u0905\u092a\u0930\u0938\u094d\u092a\u0930\u0938\u092e\u094d\u092d\u0942\u0924\u0902 \u0915\u093f\u092e\u0928\u094d\u092f\u0924\u094d\u0915\u093e\u092e\u0939\u0948\u0924\u0941\u0915\u092e\u094d\u0964\u096416.8\u0964\u0964", "r": "asatyam aprati\u1e63h\u1e6dha\u1e41 te jagad \u0101hur an\u012b\u015bhvaram\naparaspara-sambh\u016bta\u1e41 kim anyat k\u0101ma-haitukam", "t": "They say, \"This universe is without truth, without a moral basis, without a God, brought about by mutual union, with lust as its cause; what else?\""}, {"c": 16, "v": 9, "s": "\u090f\u0924\u093e\u0902 \u0926\u0943\u0937\u094d\u091f\u093f\u092e\u0935\u0937\u094d\u091f\u092d\u094d\u092f \u0928\u0937\u094d\u091f\u093e\u0924\u094d\u092e\u093e\u0928\u094b\u093d\u0932\u094d\u092a\u092c\u0941\u0926\u094d\u0927\u092f\u0903\u0964\u092a\u094d\u0930\u092d\u0935\u0928\u094d\u0924\u094d\u092f\u0941\u0917\u094d\u0930\u0915\u0930\u094d\u092e\u093e\u0923\u0903 \u0915\u094d\u0937\u092f\u093e\u092f \u091c\u0917\u0924\u094b\u093d\u0939\u093f\u0924\u093e\u0903\u0964\u096416.9\u0964\u0964", "r": "et\u0101\u1e41 d\u1e5bi\u1e63h\u1e6dim ava\u1e63h\u1e6dabhya na\u1e63h\u1e6d\u0101tm\u0101no \u2019lpa-buddhaya\u1e25\nprabhavanty ugra-karm\u0101\u1e47a\u1e25 k\u1e63hay\u0101ya jagato \u2019hit\u0101\u1e25", "t": "Holding this view, these ruined souls of small intellect and fierce deeds come forth as enemies of the world, intent on its destruction."}, {"c": 16, "v": 10, "s": "\u0915\u093e\u092e\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u094d\u092f \u0926\u0941\u0937\u094d\u092a\u0942\u0930\u0902 \u0926\u092e\u094d\u092d\u092e\u093e\u0928\u092e\u0926\u093e\u0928\u094d\u0935\u093f\u0924\u093e\u0903\u0964\u092e\u094b\u0939\u093e\u0926\u094d\u0917\u0943\u0939\u0940\u0924\u094d\u0935\u093e\u0938\u0926\u094d\u0917\u094d\u0930\u093e\u0939\u093e\u0928\u094d\u092a\u094d\u0930\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947\u093d\u0936\u0941\u091a\u093f\u0935\u094d\u0930\u0924\u093e\u0903\u0964\u096416.10\u0964\u0964", "r": "k\u0101mam \u0101\u015bhritya du\u1e63hp\u016bra\u1e41 dambha-m\u0101na-mad\u0101nvit\u0101\u1e25\nmoh\u0101d g\u1e5bih\u012btv\u0101sad-gr\u0101h\u0101n pravartante \u2019\u015bhuchi-vrat\u0101\u1e25", "t": "Filled with insatiable desires, full of hypocrisy, pride, and arrogance, holding evil ideas due to delusion, they work with impure intentions."}, {"c": 16, "v": 11, "s": "\u091a\u093f\u0928\u094d\u0924\u093e\u092e\u092a\u0930\u093f\u092e\u0947\u092f\u093e\u0902 \u091a \u092a\u094d\u0930\u0932\u092f\u093e\u0928\u094d\u0924\u093e\u092e\u0941\u092a\u093e\u0936\u094d\u0930\u093f\u0924\u093e\u0903\u0964\u0915\u093e\u092e\u094b\u092a\u092d\u094b\u0917\u092a\u0930\u092e\u093e \u090f\u0924\u093e\u0935\u0926\u093f\u0924\u093f \u0928\u093f\u0936\u094d\u093f\u091a\u0924\u093e\u0903\u0964\u096416.11\u0964\u0964", "r": "chint\u0101m aparimey\u0101\u1e41 cha pralay\u0101nt\u0101m up\u0101\u015bhrit\u0101\u1e25\nk\u0101mopabhoga-param\u0101 et\u0101vad iti ni\u015bhchit\u0101\u1e25", "t": "Giving themselves over to immeasurable cares that end only with death, regarding the gratification of lust as their highest aim, and feeling sure that that is all."}, {"c": 16, "v": 12, "s": "\u0906\u0936\u093e\u092a\u093e\u0936\u0936\u0924\u0948\u0930\u094d\u092c\u0926\u094d\u0927\u093e\u0903 \u0915\u093e\u092e\u0915\u094d\u0930\u094b\u0927\u092a\u0930\u093e\u092f\u0923\u093e\u0903\u0964\u0908\u0939\u0928\u094d\u0924\u0947 \u0915\u093e\u092e\u092d\u094b\u0917\u093e\u0930\u094d\u0925\u092e\u0928\u094d\u092f\u093e\u092f\u0947\u0928\u093e\u0930\u094d\u0925\u0938\u091e\u094d\u091a\u092f\u093e\u0928\u094d\u0964\u096416.12\u0964\u0964", "r": "\u0101\u015bh\u0101-p\u0101\u015bha-\u015bhatair baddh\u0101\u1e25 k\u0101ma-krodha-par\u0101ya\u1e47\u0101\u1e25\n\u012bhante k\u0101ma-bhog\u0101rtham any\u0101yen\u0101rtha-sa\u00f1chay\u0101n", "t": "Bound by a hundred ties of hope, given over to lust and anger, they strive to obtain hoards of wealth by unlawful means for sensual enjoyment."}, {"c": 16, "v": 13, "s": "\u0907\u0926\u092e\u0926\u094d\u092f \u092e\u092f\u093e \u0932\u092c\u094d\u0927\u092e\u093f\u092e\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u0938\u094d\u092f\u0947 \u092e\u0928\u094b\u0930\u0925\u092e\u094d\u0964\u0907\u0926\u092e\u0938\u094d\u0924\u0940\u0926\u092e\u092a\u093f \u092e\u0947 \u092d\u0935\u093f\u0937\u094d\u092f\u0924\u093f \u092a\u0941\u0928\u0930\u094d\u0927\u0928\u092e\u094d\u0964\u096416.13\u0964\u0964", "r": "idam adya may\u0101 labdham ima\u1e41 pr\u0101psye manoratham\nidam ast\u012bdam api me bhavi\u1e63hyati punar dhanam", "t": "\"I have gained this today; I will fulfill this desire of mine; this is mine, and this wealth will be mine in the future.\""}, {"c": 16, "v": 14, "s": "\u0905\u0938\u094c \u092e\u092f\u093e \u0939\u0924\u0903 \u0936\u0924\u094d\u0930\u0941\u0930\u094d\u0939\u0928\u093f\u0937\u094d\u092f\u0947 \u091a\u093e\u092a\u0930\u093e\u0928\u092a\u093f\u0964\u0908\u0936\u094d\u0935\u0930\u094b\u093d\u0939\u092e\u0939\u0902 \u092d\u094b\u0917\u0940 \u0938\u093f\u0926\u094d\u0927\u094b\u093d\u0939\u0902 \u092c\u0932\u0935\u093e\u0928\u094d\u0938\u0941\u0916\u0940\u0964\u096416.14\u0964\u0964", "r": "asau may\u0101 hata\u1e25 \u015bhatrur hani\u1e63hye ch\u0101par\u0101n api\n\u012b\u015bhvaro \u2019ham aha\u1e41 bhog\u012b siddho \u2019ha\u1e41 balav\u0101n sukh\u012b", "t": "\"I have slain that enemy, and I shall slay others too. I am the Lord; I enjoy, I am perfect, powerful, and happy.\""}, {"c": 16, "v": 15, "s": "\u0906\u0922\u094d\u092f\u094b\u093d\u092d\u093f\u091c\u0928\u0935\u093e\u0928\u0938\u094d\u092e\u093f \u0915\u094b\u093d\u0928\u094d\u092f\u094b\u093d\u0938\u094d\u0924\u093f \u0938\u0926\u0943\u0936\u094b \u092e\u092f\u093e\u0964\u092f\u0915\u094d\u0937\u094d\u092f\u0947 \u0926\u093e\u0938\u094d\u092f\u093e\u092e\u093f \u092e\u094b\u0926\u093f\u0937\u094d\u092f \u0907\u0924\u094d\u092f\u091c\u094d\u091e\u093e\u0928\u0935\u093f\u092e\u094b\u0939\u093f\u0924\u093e\u0903\u0964\u096416.15\u0964\u0964", "r": "\u0101\u1e0dhyo \u2019bhijanav\u0101n asmi ko \u2019nyo \u2019sti sad\u1e5bi\u015bho may\u0101\nyak\u1e63hye d\u0101sy\u0101mi modi\u1e63hya ity aj\u00f1\u0101na-vimohit\u0101\u1e25\n aneka-chitta-vibhr\u0101nt\u0101 moha-j\u0101la-sam\u0101v\u1e5bit\u0101\u1e25\nprasakt\u0101\u1e25 k\u0101ma-bhoge\u1e63hu patanti narake \u2019\u015bhuchau", "t": "\"I am wealthy and born into a noble family. Who is my equal? I shall perform sacrifices, give charity, and rejoice,\" thus deluded by ignorance."}, {"c": 16, "v": 16, "s": "\u0905\u0928\u0947\u0915\u091a\u093f\u0924\u094d\u0924\u0935\u093f\u092d\u094d\u0930\u093e\u0928\u094d\u0924\u093e \u092e\u094b\u0939\u091c\u093e\u0932\u0938\u092e\u093e\u0935\u0943\u0924\u093e\u0903\u0964\u092a\u094d\u0930\u0938\u0915\u094d\u0924\u093e\u0903 \u0915\u093e\u092e\u092d\u094b\u0917\u0947\u0937\u0941 \u092a\u0924\u0928\u094d\u0924\u093f \u0928\u0930\u0915\u0947\u093d\u0936\u0941\u091a\u094c\u0964\u096416.16\u0964\u0964", "r": "aneka-citta-vibhr\u0101nt\u0101 moha-j\u0101la-sam\u0101v\u1e5bt\u0101\u1e25 prasakt\u0101\u1e25 k\u0101ma-bhoge\u1e63u patanti narake '\u015bucau", "t": "Bewildered by many fancies, entangled in the snare of delusion, addicted to the gratification of lust, they fall into a foul hell."}, {"c": 16, "v": 17, "s": "\u0906\u0924\u094d\u092e\u0938\u092e\u094d\u092d\u093e\u0935\u093f\u0924\u093e\u0903 \u0938\u094d\u0924\u092c\u094d\u0927\u093e \u0927\u0928\u092e\u093e\u0928\u092e\u0926\u093e\u0928\u094d\u0935\u093f\u0924\u093e\u0903\u0964\u092f\u091c\u0928\u094d\u0924\u0947 \u0928\u093e\u092e\u092f\u091c\u094d\u091e\u0948\u0938\u094d\u0924\u0947 \u0926\u092e\u094d\u092d\u0947\u0928\u093e\u0935\u093f\u0927\u093f\u092a\u0942\u0930\u094d\u0935\u0915\u092e\u094d\u0964\u096416.17\u0964\u0964", "r": "\u0101tma-sambh\u0101vit\u0101\u1e25 stabdh\u0101 dhana-m\u0101na-mad\u0101nvit\u0101\u1e25\nyajante n\u0101ma-yaj\u00f1ais te dambhen\u0101vidhi-p\u016brvakam", "t": "Self-conceited, stubborn, filled with pride and intoxication of wealth, they perform sacrifices in name only for ostentation, contrary to scriptural ordinances."}, {"c": 16, "v": 18, "s": "\u0905\u0939\u0919\u094d\u0915\u093e\u0930\u0902 \u092c\u0932\u0902 \u0926\u0930\u094d\u092a\u0902 \u0915\u093e\u092e\u0902 \u0915\u094d\u0930\u094b\u0927\u0902 \u091a \u0938\u0902\u0936\u094d\u0930\u093f\u0924\u093e\u0903\u0964\u092e\u093e\u092e\u093e\u0924\u094d\u092e\u092a\u0930\u0926\u0947\u0939\u0947\u0937\u0941 \u092a\u094d\u0930\u0926\u094d\u0935\u093f\u0937\u0928\u094d\u0924\u094b\u093d\u092d\u094d\u092f\u0938\u0942\u092f\u0915\u093e\u0903\u0964\u096416.18\u0964\u0964", "r": "ahank\u0101ra\u1e41 bala\u1e41 darpa\u1e41 k\u0101ma\u1e41 krodha\u1e41 cha san\u015bhrit\u0101\u1e25\nm\u0101m \u0101tma-para-dehe\u1e63hu pradvi\u1e63hanto \u2019bhyas\u016byak\u0101\u1e25", "t": "Given over to egoism, power, haughtiness, lust, and anger, these malicious people hate Me in their own bodies and in the bodies of others."}, {"c": 16, "v": 19, "s": "\u0924\u093e\u0928\u0939\u0902 \u0926\u094d\u0935\u093f\u0937\u0924\u0903 \u0915\u094d\u0930\u0942\u0930\u093e\u0928\u094d\u0938\u0902\u0938\u093e\u0930\u0947\u0937\u0941 \u0928\u0930\u093e\u0927\u092e\u093e\u0928\u094d\u0964\u0915\u094d\u0937\u093f\u092a\u093e\u092e\u094d\u092f\u091c\u0938\u094d\u0930\u092e\u0936\u0941\u092d\u093e\u0928\u093e\u0938\u0941\u0930\u0940\u0937\u094d\u0935\u0947\u0935 \u092f\u094b\u0928\u093f\u0937\u0941\u0964\u096416.19\u0964\u0964", "r": "t\u0101n aha\u1e41 dvi\u1e63hata\u1e25 kr\u016br\u0101n sans\u0101re\u1e63hu nar\u0101dham\u0101n\nk\u1e63hip\u0101my ajasram a\u015bhubh\u0101n \u0101sur\u012b\u1e63hv eva yoni\u1e63hu", "t": "Those cruel haters, the worst among men in the world, I hurl those evil-doers into the wombs of demons only."}, {"c": 16, "v": 20, "s": "\u0905\u0938\u0941\u0930\u0940\u0902 \u092f\u094b\u0928\u093f\u092e\u093e\u092a\u0928\u094d\u0928\u093e \u092e\u0942\u0922\u093e \u091c\u0928\u094d\u092e\u0928\u093f \u091c\u0928\u094d\u092e\u0928\u093f\u0964\u092e\u093e\u092e\u092a\u094d\u0930\u093e\u092a\u094d\u092f\u0948\u0935 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0924\u0924\u094b \u092f\u093e\u0928\u094d\u0924\u094d\u092f\u0927\u092e\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u096416.20\u0964\u0964", "r": "\u0101sur\u012b\u1e41 yonim \u0101pann\u0101 m\u016b\u1e0dh\u0101 janmani janmani\nm\u0101m apr\u0101pyaiva kaunteya tato y\u0101nty adham\u0101\u1e41 gatim", "t": "Entering into demoniacal wombs and deluded, birth after birth, they do not attain Me, thus falling, O Arjuna, into a condition still lower than that."}, {"c": 16, "v": 21, "s": "\u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0902 \u0928\u0930\u0915\u0938\u094d\u092f\u0947\u0926\u0902 \u0926\u094d\u0935\u093e\u0930\u0902 \u0928\u093e\u0936\u0928\u092e\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u0915\u093e\u092e\u0903 \u0915\u094d\u0930\u094b\u0927\u0938\u094d\u0924\u0925\u093e \u0932\u094b\u092d\u0938\u094d\u0924\u0938\u094d\u092e\u093e\u0926\u0947\u0924\u0924\u094d\u0924\u094d\u0930\u092f\u0902 \u0924\u094d\u092f\u091c\u0947\u0924\u094d\u0964\u096416.21\u0964\u0964", "r": "tri-vidha\u1e41 narakasyeda\u1e41 dv\u0101ra\u1e41 n\u0101\u015bhanam \u0101tmana\u1e25\nk\u0101ma\u1e25 krodhas tath\u0101 lobhas tasm\u0101d etat traya\u1e41 tyajet", "t": "There are three gates to this hell, destructive of the self: lust, anger, and greed; therefore, one should abandon these three."}, {"c": 16, "v": 22, "s": "\u090f\u0924\u0948\u0930\u094d\u0935\u093f\u092e\u0941\u0915\u094d\u0924\u0903 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0924\u092e\u094b\u0926\u094d\u0935\u093e\u0930\u0948\u0938\u094d\u0924\u094d\u0930\u093f\u092d\u093f\u0930\u094d\u0928\u0930\u0903\u0964\u0906\u091a\u0930\u0924\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u0903 \u0936\u094d\u0930\u0947\u092f\u0938\u094d\u0924\u0924\u094b \u092f\u093e\u0924\u093f \u092a\u0930\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u096416.22\u0964\u0964", "r": "etair vimukta\u1e25 kaunteya tamo-dv\u0101rais tribhir nara\u1e25\n\u0101charaty \u0101tmana\u1e25 \u015bhreyas tato y\u0101ti par\u0101\u1e41 gatim", "t": "A person who is liberated from these three gates of darkness, O Arjuna, practices what is beneficial for them and thus goes to the Supreme Goal."}, {"c": 16, "v": 23, "s": "\u092f\u0903 \u0936\u093e\u0938\u094d\u0924\u094d\u0930\u0935\u093f\u0927\u093f\u092e\u0941\u0924\u094d\u0938\u0943\u091c\u094d\u092f \u0935\u0930\u094d\u0924\u0924\u0947 \u0915\u093e\u092e\u0915\u093e\u0930\u0924\u0903\u0964\u0928 \u0938 \u0938\u093f\u0926\u094d\u0927\u093f\u092e\u0935\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0928 \u0938\u0941\u0916\u0902 \u0928 \u092a\u0930\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u096416.23\u0964\u0964", "r": "ya\u1e25 \u015bh\u0101stra-vidhim uts\u1e5bijya vartate k\u0101ma-k\u0101rata\u1e25\nna sa siddhim av\u0101pnoti na sukha\u1e41 na par\u0101\u1e41 gatim", "t": "He who, having cast aside the ordinances of the scriptures, acts under the impulse of desire, does not attain perfection, nor happiness, nor the Supreme Goal."}, {"c": 16, "v": 24, "s": "\u0924\u0938\u094d\u092e\u093e\u091a\u094d\u091b\u093e\u0938\u094d\u0924\u094d\u0930\u0902 \u092a\u094d\u0930\u092e\u093e\u0923\u0902 \u0924\u0947 \u0915\u093e\u0930\u094d\u092f\u093e\u0915\u093e\u0930\u094d\u092f\u0935\u094d\u092f\u0935\u0938\u094d\u0925\u093f\u0924\u094c\u0964\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u0936\u093e\u0938\u094d\u0924\u094d\u0930\u0935\u093f\u0927\u093e\u0928\u094b\u0915\u094d\u0924\u0902 \u0915\u0930\u094d\u092e \u0915\u0930\u094d\u0924\u0941\u092e\u093f\u0939\u093e\u0930\u094d\u0939\u0938\u093f\u0964\u096416.24\u0964\u0964", "r": "tasm\u0101ch chh\u0101stra\u1e41 pram\u0101\u1e47a\u1e41 te k\u0101ry\u0101k\u0101rya-vyavasthitau\nj\u00f1\u0101tv\u0101 \u015bh\u0101stra-vidh\u0101nokta\u1e41 karma kartum ih\u0101rhasi", "t": "Therefore, let the scripture be thy authority in determining what ought to be done and what ought not to be done. Having known what is said in the ordinance of the scriptures, thou shouldst act in this world."}, {"c": 17, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\u092f\u0947 \u0936\u093e\u0938\u094d\u0924\u094d\u0930\u0935\u093f\u0927\u093f\u092e\u0941\u0924\u094d\u0938\u0943\u091c\u094d\u092f \u092f\u091c\u0928\u094d\u0924\u0947 \u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e\u093d\u0928\u094d\u0935\u093f\u0924\u093e\u0903\u0964\u0924\u0947\u0937\u093e\u0902 \u0928\u093f\u0937\u094d\u0920\u093e \u0924\u0941 \u0915\u093e \u0915\u0943\u0937\u094d\u0923 \u0938\u0924\u094d\u0924\u094d\u0935\u092e\u093e\u0939\u094b \u0930\u091c\u0938\u094d\u0924\u092e\u0903\u0964\u096417.1\u0964\u0964", "r": "arjuna uv\u0101cha\nye \u015bh\u0101stra-vidhim uts\u1e5bijya yajante \u015bhraddhay\u0101nvit\u0101\u1e25\nte\u1e63h\u0101\u1e41 ni\u1e63h\u1e6dh\u0101 tu k\u0101 k\u1e5bi\u1e63h\u1e47a sattvam \u0101ho rajas tama\u1e25", "t": "Arjuna said, \"What is the condition of those who, disregarding the injunctions of the scriptures, perform sacrifice with faith\u2014is it Sattva, Rajas, or Tamas, O Krishna?\""}, {"c": 17, "v": 2, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\u0924\u094d\u0930\u093f\u0935\u093f\u0927\u093e \u092d\u0935\u0924\u093f \u0936\u094d\u0930\u0926\u094d\u0927\u093e \u0926\u0947\u0939\u093f\u0928\u093e\u0902 \u0938\u093e \u0938\u094d\u0935\u092d\u093e\u0935\u091c\u093e\u0964\u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0940 \u0930\u093e\u091c\u0938\u0940 \u091a\u0948\u0935 \u0924\u093e\u092e\u0938\u0940 \u091a\u0947\u0924\u093f \u0924\u093e\u0902 \u0936\u094d\u0930\u0943\u0923\u0941\u0964\u096417.2\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\ntri-vidh\u0101 bhavati \u015bhraddh\u0101 dehin\u0101\u1e41 s\u0101 svabh\u0101va-j\u0101\ns\u0101ttvik\u012b r\u0101jas\u012b chaiva t\u0101mas\u012b cheti t\u0101\u1e41 \u015bh\u1e5bi\u1e47u", "t": "The Blessed Lord said, \"There are threefold faiths inherent in the nature of the embodied: the sattvic (pure), the rajasic (passionate), and the tamasic (dark). Hear of them.\""}, {"c": 17, "v": 3, "s": "\u0938\u0924\u094d\u0924\u094d\u0935\u093e\u0928\u0941\u0930\u0942\u092a\u093e \u0938\u0930\u094d\u0935\u0938\u094d\u092f \u0936\u094d\u0930\u0926\u094d\u0927\u093e \u092d\u0935\u0924\u093f \u092d\u093e\u0930\u0924\u0964\u0936\u094d\u0930\u0926\u094d\u0927\u093e\u092e\u092f\u094b\u093d\u092f\u0902 \u092a\u0941\u0930\u0941\u0937\u094b \u092f\u094b \u092f\u091a\u094d\u091b\u094d\u0930\u0926\u094d\u0927\u0903 \u0938 \u090f\u0935 \u0938\u0903\u0964\u096417.3\u0964\u0964", "r": "sattv\u0101nur\u016bp\u0101 sarvasya \u015bhraddh\u0101 bhavati bh\u0101rata\n\u015bhraddh\u0101-mayo \u2018ya\u1e41 puru\u1e63ho yo yach-chhraddha\u1e25 sa eva sa\u1e25", "t": "The faith of each is in accordance with their nature, O Arjuna. People consist of their faith; as a person's faith is, so are they."}, {"c": 17, "v": 4, "s": "\u092f\u091c\u0928\u094d\u0924\u0947 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u093e \u0926\u0947\u0935\u093e\u0928\u094d\u092f\u0915\u094d\u0937\u0930\u0915\u094d\u0937\u093e\u0902\u0938\u093f \u0930\u093e\u091c\u0938\u093e\u0903\u0964\u092a\u094d\u0930\u0947\u0924\u093e\u0928\u094d\u092d\u0942\u0924\u0917\u0923\u093e\u0902\u0936\u094d\u091a\u093e\u0928\u094d\u092f\u0947 \u092f\u091c\u0928\u094d\u0924\u0947 \u0924\u093e\u092e\u0938\u093e \u091c\u0928\u093e\u0903\u0964\u096417.4\u0964\u0964", "r": "yajante s\u0101ttvik\u0101 dev\u0101n yak\u1e63ha-rak\u1e63h\u0101nsi r\u0101jas\u0101\u1e25\npret\u0101n bh\u016bta-ga\u1e47\u0101n\u015bh ch\u0101nye yajante t\u0101mas\u0101 jan\u0101\u1e25", "t": "The sattvic, or pure, men worship the gods; the rajasic, or passionate, worship the yakshas and rakshasas; the others, the tamasic or deluded people, worship ghosts and hosts of nature-spirits."}, {"c": 17, "v": 5, "s": "\u0905\u0936\u093e\u0938\u094d\u0924\u094d\u0930\u0935\u093f\u0939\u093f\u0924\u0902 \u0918\u094b\u0930\u0902 \u0924\u092a\u094d\u092f\u0928\u094d\u0924\u0947 \u092f\u0947 \u0924\u092a\u094b \u091c\u0928\u093e\u0903\u0964\u0926\u092e\u094d\u092d\u093e\u0939\u0919\u094d\u0915\u093e\u0930\u0938\u0902\u092f\u0941\u0915\u094d\u0924\u093e\u0903 \u0915\u093e\u092e\u0930\u093e\u0917\u092c\u0932\u093e\u0928\u094d\u0935\u093f\u0924\u093e\u0903\u0964\u096417.5\u0964\u0964", "r": "a\u015bh\u0101stra-vihita\u1e41 ghora\u1e41 tapyante ye tapo jan\u0101\u1e25\ndambh\u0101hank\u0101ra-sanyukt\u0101\u1e25 k\u0101ma-r\u0101ga-bal\u0101nvit\u0101\u1e25", "t": "Those men who practice terrific austerities not prescribed by the scriptures, given to hypocrisy and egoism, driven by the force of lust and attachment."}, {"c": 17, "v": 6, "s": "\u0915\u0930\u094d\u0937\u092f\u0928\u094d\u0924\u0903 \u0936\u0930\u0940\u0930\u0938\u094d\u0925\u0902 \u092d\u0942\u0924\u0917\u094d\u0930\u093e\u092e\u092e\u091a\u0947\u0924\u0938\u0903\u0964\u092e\u093e\u0902 \u091a\u0948\u0935\u093e\u0928\u094d\u0924\u0903\u0936\u0930\u0940\u0930\u0938\u094d\u0925\u0902 \u0924\u093e\u0928\u094d\u0935\u093f\u0926\u094d\u0927\u094d\u092f\u093e\u0938\u0941\u0930\u0928\u093f\u0936\u094d\u091a\u092f\u093e\u0928\u094d\u0964\u096417.6\u0964\u0964", "r": "kar\u1e63hayanta\u1e25 \u015bhar\u012bra-stha\u1e41 bh\u016bta-gr\u0101mam achetasa\u1e25\nm\u0101\u1e41 chaiv\u0101nta\u1e25 \u015bhar\u012bra-stha\u1e41 t\u0101n viddhy \u0101sura-ni\u015bhchay\u0101n", "t": "Know thou these to be of demonical resolves, senselessly torturing all the elements in the body and Me who dwell in the body."}, {"c": 17, "v": 7, "s": "\u0906\u0939\u093e\u0930\u0938\u094d\u0924\u094d\u0935\u092a\u093f \u0938\u0930\u094d\u0935\u0938\u094d\u092f \u0924\u094d\u0930\u093f\u0935\u093f\u0927\u094b \u092d\u0935\u0924\u093f \u092a\u094d\u0930\u093f\u092f\u0903\u0964\u092f\u091c\u094d\u091e\u0938\u094d\u0924\u092a\u0938\u094d\u0924\u0925\u093e \u0926\u093e\u0928\u0902 \u0924\u0947\u0937\u093e\u0902 \u092d\u0947\u0926\u092e\u093f\u092e\u0902 \u0936\u094d\u0930\u0943\u0923\u0941\u0964\u096417.7\u0964\u0964", "r": "\u0101h\u0101ras tv api sarvasya tri-vidho bhavati priya\u1e25\nyaj\u00f1as tapas tath\u0101 d\u0101na\u1e41 te\u1e63h\u0101\u1e41 bhedam ima\u1e41 \u015bh\u1e5bi\u1e47u", "t": "The food that is dear to each is threefold, as well as sacrifice, austerity, and almsgiving. Hear the distinction of these."}, {"c": 17, "v": 8, "s": "\u0906\u092f\u0941\u0903\u0938\u0924\u094d\u0924\u094d\u0935\u092c\u0932\u093e\u0930\u094b\u0917\u094d\u092f\u0938\u0941\u0916\u092a\u094d\u0930\u0940\u0924\u093f\u0935\u093f\u0935\u0930\u094d\u0927\u0928\u093e\u0903\u0964\u0930\u0938\u094d\u092f\u093e\u0903 \u0938\u094d\u0928\u093f\u0917\u094d\u0927\u093e\u0903 \u0938\u094d\u0925\u093f\u0930\u093e \u0939\u0943\u0926\u094d\u092f\u093e \u0906\u0939\u093e\u0930\u093e\u0903 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u092a\u094d\u0930\u093f\u092f\u093e\u0903\u0964\u096417.8\u0964\u0964", "r": "\u0101yu\u1e25-sattva-bal\u0101rogya-sukha-pr\u012bti-vivardhan\u0101\u1e25\nrasy\u0101\u1e25 snigdh\u0101\u1e25 sthir\u0101 h\u1e5bidy\u0101 \u0101h\u0101r\u0101\u1e25 s\u0101ttvika-priy\u0101\u1e25", "t": "The foods that increase life, purity, strength, health, joy, and cheerfulness (good appetite), which are savory, oily, substantial, and agreeable, are dear to the Sattvic (pure) people."}, {"c": 17, "v": 9, "s": "\u0915\u091f\u094d\u0935\u092e\u094d\u0932\u0932\u0935\u0923\u093e\u0924\u094d\u092f\u0941\u0937\u094d\u0923\u0924\u0940\u0915\u094d\u0937\u094d\u0923\u0930\u0942\u0915\u094d\u0937\u0935\u093f\u0926\u093e\u0939\u093f\u0928\u0903\u0964\u0906\u0939\u093e\u0930\u093e \u0930\u093e\u091c\u0938\u0938\u094d\u092f\u0947\u0937\u094d\u091f\u093e \u0926\u0941\u0903\u0916\u0936\u094b\u0915\u093e\u092e\u092f\u092a\u094d\u0930\u0926\u093e\u0903\u0964\u096417.9\u0964\u0964", "r": "ka\u1e6dv-amla-lava\u1e47\u0101ty-u\u1e63h\u1e47a- t\u012bk\u1e63h\u1e47a-r\u016bk\u1e63ha-vid\u0101hina\u1e25\n\u0101h\u0101r\u0101 r\u0101jasasye\u1e63h\u1e6d\u0101 du\u1e25kha-\u015bhok\u0101maya-prad\u0101\u1e25", "t": "The foods that are bitter, sour, salty, overly hot, pungent, dry, and burning are liked by the Rajasic and are productive of pain, grief, and disease."}, {"c": 17, "v": 10, "s": "\u092f\u093e\u0924\u092f\u093e\u092e\u0902 \u0917\u0924\u0930\u0938\u0902 \u092a\u0942\u0924\u093f \u092a\u0930\u094d\u092f\u0941\u0937\u093f\u0924\u0902 \u091a \u092f\u0924\u094d\u0964\u0909\u091a\u094d\u091b\u093f\u0937\u094d\u091f\u092e\u092a\u093f \u091a\u093e\u092e\u0947\u0927\u094d\u092f\u0902 \u092d\u094b\u091c\u0928\u0902 \u0924\u093e\u092e\u0938\u092a\u094d\u0930\u093f\u092f\u092e\u094d\u0964\u096417.10\u0964\u0964", "r": "y\u0101ta-y\u0101ma\u1e41 gata-rasa\u1e41 p\u016bti paryu\u1e63hita\u1e41 cha yat\nuchchhi\u1e63h\u1e6dam api ch\u0101medhya\u1e41 bhojana\u1e41 t\u0101masa-priyam", "t": "That which is stale, tasteless, putrid, rotten, rejected, and impure is the food liked by the Tamasic."}, {"c": 17, "v": 11, "s": "\u0905\u092b\u0932\u093e\u0915\u093e\u0919\u094d\u0915\u094d\u0937\u093f\u092d\u093f\u0930\u094d\u092f\u091c\u094d\u091e\u094b \u0935\u093f\u0927\u093f\u0926\u0943\u0937\u094d\u091f\u094b \u092f \u0907\u091c\u094d\u092f\u0924\u0947\u0964\u092f\u0937\u094d\u091f\u0935\u094d\u092f\u092e\u0947\u0935\u0947\u0924\u093f \u092e\u0928\u0903 \u0938\u092e\u093e\u0927\u093e\u092f \u0938 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0903\u0964\u096417.11\u0964\u0964", "r": "aphal\u0101k\u0101\u1e45k\u1e63hibhir yaj\u00f1o vidhi-dri\u1e63h\u1e6do ya ijyate\nya\u1e63h\u1e6davyam eveti mana\u1e25 sam\u0101dh\u0101ya sa s\u0101ttvika\u1e25", "t": "That sacrifice which is offered by men without desire for reward, as enjoined by the ordinance (scripture), with a firm faith that doing so is their duty, is Sattvic or pure."}, {"c": 17, "v": 12, "s": "\u0905\u092d\u093f\u0938\u0902\u0927\u093e\u092f \u0924\u0941 \u092b\u0932\u0902 \u0926\u092e\u094d\u092d\u093e\u0930\u094d\u0925\u092e\u092a\u093f \u091a\u0948\u0935 \u092f\u0924\u094d\u0964\u0907\u091c\u094d\u092f\u0924\u0947 \u092d\u0930\u0924\u0936\u094d\u0930\u0947\u0937\u094d\u0920 \u0924\u0902 \u092f\u091c\u094d\u091e\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u0930\u093e\u091c\u0938\u092e\u094d\u0964\u096417.12\u0964\u0964", "r": "abhisandh\u0101ya tu phala\u1e41 dambh\u0101rtham api chaiva yat\nijyate bharata-\u015bhre\u1e63h\u1e6dha ta\u1e41 yaj\u00f1a\u1e41 viddhi r\u0101jasam", "t": "The sacrifice that is offered, O Arjuna, seeking a reward and for show, know that to be a Rajasic Yajna."}, {"c": 17, "v": 13, "s": "\u0935\u093f\u0927\u093f\u0939\u0940\u0928\u092e\u0938\u0943\u0937\u094d\u091f\u093e\u0928\u094d\u0928\u0902 \u092e\u0928\u094d\u0924\u094d\u0930\u0939\u0940\u0928\u092e\u0926\u0915\u094d\u0937\u093f\u0923\u092e\u094d\u0964\u0936\u094d\u0930\u0926\u094d\u0927\u093e\u0935\u093f\u0930\u0939\u093f\u0924\u0902 \u092f\u091c\u094d\u091e\u0902 \u0924\u093e\u092e\u0938\u0902 \u092a\u0930\u093f\u091a\u0915\u094d\u0937\u0924\u0947\u0964\u096417.13\u0964\u0964", "r": "vidhi-h\u012bnam as\u1e5bi\u1e63h\u1e6d\u0101nna\u1e41 mantra-h\u012bnam adak\u1e63hi\u1e47am\n\u015bhraddh\u0101-virahita\u1e41 yaj\u00f1a\u1e41 t\u0101masa\u1e41 parichak\u1e63hate", "t": "They declare that sacrifice to be Tamasic which is contrary to the ordinances of the scriptures, in which no food is distributed, and which is devoid of mantras, gifts, and faith."}, {"c": 17, "v": 14, "s": "\u0926\u0947\u0935\u0926\u094d\u0935\u093f\u091c\u0917\u0941\u0930\u0941\u092a\u094d\u0930\u093e\u091c\u094d\u091e\u092a\u0942\u091c\u0928\u0902 \u0936\u094c\u091a\u092e\u093e\u0930\u094d\u091c\u0935\u092e\u094d\u0964\u092c\u094d\u0930\u0939\u094d\u092e\u091a\u0930\u094d\u092f\u092e\u0939\u093f\u0902\u0938\u093e \u091a \u0936\u093e\u0930\u0940\u0930\u0902 \u0924\u092a \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u096417.14\u0964\u0964", "r": "deva-dwija-guru-pr\u0101j\u00f1a- p\u016bjana\u1e41 \u015bhaucham \u0101rjavam\nbrahmacharyam ahins\u0101 cha \u015bh\u0101r\u012bra\u1e41 tapa uchyate", "t": "Worship of the gods, the twice-born, the teachers, and the wise; purity, straightforwardness, celibacy, and non-injury are all called the austerities of the body."}, {"c": 17, "v": 15, "s": "\u0905\u0928\u0941\u0926\u094d\u0935\u0947\u0917\u0915\u0930\u0902 \u0935\u093e\u0915\u094d\u092f\u0902 \u0938\u0924\u094d\u092f\u0902 \u092a\u094d\u0930\u093f\u092f\u0939\u093f\u0924\u0902 \u091a \u092f\u0924\u094d\u0964\u0938\u094d\u0935\u093e\u0927\u094d\u092f\u093e\u092f\u093e\u092d\u094d\u092f\u0938\u0928\u0902 \u091a\u0948\u0935 \u0935\u093e\u0919\u094d\u092e\u092f\u0902 \u0924\u092a \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u096417.15\u0964\u0964", "r": "anudvega-kara\u1e41 v\u0101kya\u1e41 satya\u1e41 priya-hita\u1e41 cha yat\nsv\u0101dhy\u0101y\u0101bhyasana\u1e41 chaiva v\u0101\u1e45-maya\u1e41 tapa uchyate", "t": "Speech that causes no excitement, is truthful, pleasant, and beneficial; the practice of studying the Vedas is called austerity of speech."}, {"c": 17, "v": 16, "s": "\u092e\u0928\u0903\u092a\u094d\u0930\u0938\u093e\u0926\u0903 \u0938\u094c\u092e\u094d\u092f\u0924\u094d\u0935\u0902 \u092e\u094c\u0928\u092e\u093e\u0924\u094d\u092e\u0935\u093f\u0928\u093f\u0917\u094d\u0930\u0939\u0903\u0964\u092d\u093e\u0935\u0938\u0902\u0936\u0941\u0926\u094d\u0927\u093f\u0930\u093f\u0924\u094d\u092f\u0947\u0924\u0924\u094d\u0924\u092a\u094b \u092e\u093e\u0928\u0938\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u096417.16\u0964\u0964", "r": "mana\u1e25-pras\u0101da\u1e25 saumyatva\u1e41 maunam \u0101tma-vinigraha\u1e25\nbh\u0101va-san\u015bhuddhir ity etat tapo m\u0101nasam uchyate", "t": "Serenity of mind, good-heartedness, self-control, and purity of nature\u2014this is called mental austerity."}, {"c": 17, "v": 17, "s": "\u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e \u092a\u0930\u092f\u093e \u0924\u092a\u094d\u0924\u0902 \u0924\u092a\u0938\u094d\u0924\u0924\u094d\u093f\u0924\u094d\u0930\u0935\u093f\u0927\u0902 \u0928\u0930\u0948\u0903\u0964\u0905\u092b\u0932\u093e\u0915\u093e\u0919\u094d\u0915\u094d\u0937\u093f\u092d\u093f\u0930\u094d\u092f\u0941\u0915\u094d\u0924\u0948\u0903 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0902 \u092a\u0930\u093f\u091a\u0915\u094d\u0937\u0924\u0947\u0964\u096417.17\u0964\u0964", "r": "\u015bhraddhay\u0101 paray\u0101 tapta\u1e41 tapas tat tri-vidha\u1e41 narai\u1e25\naphal\u0101k\u0101\u1e45k\u1e63hibhir yuktai\u1e25 s\u0101ttvika\u1e41 parichak\u1e63hate", "t": "This threefold austerity, practiced by steadfast men, with the utmost faith, desiring no reward, is called Sattvic."}, {"c": 17, "v": 18, "s": "\u0938\u0924\u094d\u0915\u093e\u0930\u092e\u093e\u0928\u092a\u0942\u091c\u093e\u0930\u094d\u0925\u0902 \u0924\u092a\u094b \u0926\u092e\u094d\u092d\u0947\u0928 \u091a\u0948\u0935 \u092f\u0924\u094d\u0964\u0915\u094d\u0930\u093f\u092f\u0924\u0947 \u0924\u0926\u093f\u0939 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u0902 \u0930\u093e\u091c\u0938\u0902 \u091a\u0932\u092e\u0927\u094d\u0930\u0941\u0935\u092e\u094d\u0964\u096417.18\u0964\u0964", "r": "satk\u0101ra-m\u0101na-p\u016bj\u0101rtha\u1e41 tapo dambhena chaiva yat\nkriyate tad iha prokta\u1e41 r\u0101jasa\u1e41 chalam adhruvam", "t": "The austerity that is practiced with the aim of gaining good reception, honor, and worship, and with hypocrisy, is said to be Rajasic, unstable, and transient."}, {"c": 17, "v": 19, "s": "\u092e\u0942\u0922\u0917\u094d\u0930\u093e\u0939\u0947\u0923\u093e\u0924\u094d\u092e\u0928\u094b \u092f\u0924\u094d\u092a\u0940\u0921\u092f\u093e \u0915\u094d\u0930\u093f\u092f\u0924\u0947 \u0924\u092a\u0903\u0964\u092a\u0930\u0938\u094d\u092f\u094b\u0924\u094d\u0938\u093e\u0926\u0928\u093e\u0930\u094d\u0925\u0902 \u0935\u093e \u0924\u0924\u094d\u0924\u093e\u092e\u0938\u092e\u0941\u0926\u093e\u0939\u0943\u0924\u092e\u094d\u0964\u096417.19\u0964\u0964", "r": "m\u016b\u1e0dha-gr\u0101he\u1e47\u0101tmano yat p\u012b\u1e0day\u0101 kriyate tapa\u1e25\nparasyots\u0101dan\u0101rtha\u1e41 v\u0101 tat t\u0101masam ud\u0101h\u1e5bitam", "t": "That austerity which is practised out of a foolish notion, with self-torture, or for the purpose of destroying another, is declared to be of the Tamasic nature."}, {"c": 17, "v": 20, "s": "\u0926\u093e\u0924\u0935\u094d\u092f\u092e\u093f\u0924\u093f \u092f\u0926\u094d\u0926\u093e\u0928\u0902 \u0926\u0940\u092f\u0924\u0947\u093d\u0928\u0941\u092a\u0915\u093e\u0930\u093f\u0923\u0947\u0964\u0926\u0947\u0936\u0947 \u0915\u093e\u0932\u0947 \u091a \u092a\u093e\u0924\u094d\u0930\u0947 \u091a \u0924\u0926\u094d\u0926\u093e\u0928\u0902 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0902 \u0938\u094d\u092e\u0943\u0924\u092e\u094d\u0964\u096417.20\u0964\u0964", "r": "d\u0101tavyam iti yad d\u0101na\u1e41 d\u012byate \u2018nupak\u0101ri\u1e47e\nde\u015bhe k\u0101le cha p\u0101tre cha tad d\u0101na\u1e41 s\u0101ttvika\u1e41 sm\u1e5bitam", "t": "That gift which is given to one who does nothing in return, knowing it to be a duty to give in a suitable place and time to a worthy person, is held to be Sattvic."}, {"c": 17, "v": 21, "s": "\u092f\u0924\u094d\u0924\u0941 \u092a\u094d\u0930\u0924\u094d\u092f\u0941\u092a\u0915\u093e\u0930\u093e\u0930\u094d\u0925\u0902 \u092b\u0932\u092e\u0941\u0926\u094d\u0926\u093f\u0936\u094d\u092f \u0935\u093e \u092a\u0941\u0928\u0903\u0964\u0926\u0940\u092f\u0924\u0947 \u091a \u092a\u0930\u093f\u0915\u094d\u0932\u093f\u0937\u094d\u091f\u0902 \u0924\u0926\u094d\u0926\u093e\u0928\u0902 \u0930\u093e\u091c\u0938\u0902 \u0938\u094d\u092e\u0943\u0924\u092e\u094d\u0964\u096417.21\u0964\u0964", "r": "yat tu pratyupak\u0101r\u0101rtha\u1e41 phalam uddi\u015bhya v\u0101 puna\u1e25\nd\u012byate cha parikli\u1e63h\u1e6da\u1e41 tad d\u0101na\u1e41 r\u0101jasa\u1e41 sm\u1e5bitam", "t": "And, that gift which is given with the intention of receiving something in return, or expecting a reward, or begrudgingly, is considered to be Rajasic."}, {"c": 17, "v": 22, "s": "\u0905\u0926\u0947\u0936\u0915\u093e\u0932\u0947 \u092f\u0926\u094d\u0926\u093e\u0928\u092e\u092a\u093e\u0924\u094d\u0930\u0947\u092d\u094d\u092f\u0936\u094d\u091a \u0926\u0940\u092f\u0924\u0947\u0964\u0905\u0938\u0924\u094d\u0915\u0943\u0924\u092e\u0935\u091c\u094d\u091e\u093e\u0924\u0902 \u0924\u0924\u094d\u0924\u093e\u092e\u0938\u092e\u0941\u0926\u093e\u0939\u0943\u0924\u092e\u094d\u0964\u096417.22\u0964\u0964", "r": "ade\u015bha-k\u0101le yad d\u0101nam ap\u0101trebhya\u015bh cha d\u012byate\nasat-k\u1e5bitam avaj\u00f1\u0101ta\u1e41 tat t\u0101masam ud\u0101h\u1e5bitam", "t": "The gift that is given in the wrong place and at the wrong time, to unworthy persons, without respect or with insult, is declared to be of a Tamasic nature."}, {"c": 17, "v": 23, "s": "\u0924\u0924\u094d\u0938\u0926\u093f\u0924\u093f \u0928\u093f\u0930\u094d\u0926\u0947\u0936\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u0923\u0938\u094d\u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0903 \u0938\u094d\u092e\u0943\u0924\u0903\u0964\u092c\u094d\u0930\u093e\u0939\u094d\u092e\u0923\u093e\u0938\u094d\u0924\u0947\u0928 \u0935\u0947\u0926\u093e\u0936\u094d\u091a \u092f\u091c\u094d\u091e\u093e\u0936\u094d\u091a \u0935\u093f\u0939\u093f\u0924\u093e\u0903 \u092a\u0941\u0930\u093e\u0964\u096417.23\u0964\u0964", "r": "o\u1e41 tat sad iti nirde\u015bho brahma\u1e47as tri-vidha\u1e25 sm\u1e5bita\u1e25\nbr\u0101hma\u1e47\u0101s tena ved\u0101\u015bh cha yaj\u00f1\u0101\u015bh cha vihit\u0101\u1e25 pur\u0101", "t": "\"Om Tat Sat\": This has been declared to be the triple designation of Brahman. By that, the Brahmanas, the Vedas, and the sacrifices were created formerly."}, {"c": 17, "v": 24, "s": "\u0924\u0938\u094d\u092e\u093e\u0926\u094b\u092e\u093f\u0924\u094d\u092f\u0941\u0926\u093e\u0939\u0943\u0924\u094d\u092f \u092f\u091c\u094d\u091e\u0926\u093e\u0928\u0924\u092a\u0903\u0915\u094d\u0930\u093f\u092f\u093e\u0903\u0964\u092a\u094d\u0930\u0935\u0930\u094d\u0924\u0928\u094d\u0924\u0947 \u0935\u093f\u0927\u093e\u0928\u094b\u0915\u094d\u0924\u093e\u0903 \u0938\u0924\u0924\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u0935\u093e\u0926\u093f\u0928\u093e\u092e\u094d\u0964\u096417.24\u0964\u0964", "r": "tasm\u0101d o\u1e41 ity ud\u0101h\u1e5bitya yaj\u00f1a-d\u0101na-tapa\u1e25-kriy\u0101\u1e25\npravartante vidh\u0101nokt\u0101\u1e25 satata\u1e41 brahma-v\u0101din\u0101m", "t": "Therefore, with the utterance of \"Om,\" the acts of sacrifice, gift, and austerity, as enjoined in the scriptures, are always begun by the students of Brahman."}, {"c": 17, "v": 25, "s": "\u0924\u0926\u093f\u0924\u094d\u092f\u0928\u092d\u093f\u0938\u0928\u094d\u0927\u093e\u092f \u092b\u0932\u0902 \u092f\u091c\u094d\u091e\u0924\u092a\u0903\u0915\u094d\u0930\u093f\u092f\u093e\u0903\u0964\u0926\u093e\u0928\u0915\u094d\u0930\u093f\u092f\u093e\u0936\u094d\u091a \u0935\u093f\u0935\u093f\u0927\u093e\u0903 \u0915\u094d\u0930\u093f\u092f\u0928\u094d\u0924\u0947 \u092e\u094b\u0915\u094d\u0937\u0915\u093e\u0919\u094d\u0915\u094d\u0937\u093f\u0964\u096417.25\u0964\u0964", "r": "tad ity anabhisandh\u0101ya phala\u1e41 yaj\u00f1a-tapa\u1e25-kriy\u0101\u1e25\nd\u0101na-kriy\u0101\u015bh cha vividh\u0101\u1e25 kriyante mok\u1e63ha-k\u0101\u1e45k\u1e63hibhi\u1e25", "t": "Uttering \"Tat,\" without aiming for the fruits, are the acts of sacrifice, austerity, and the various acts of gifts performed by those seeking liberation."}, {"c": 17, "v": 26, "s": "\u0938\u0926\u094d\u092d\u093e\u0935\u0947 \u0938\u093e\u0927\u0941\u092d\u093e\u0935\u0947 \u091a \u0938\u0926\u093f\u0924\u094d\u092f\u0947\u0924\u0924\u094d\u092a\u094d\u0930\u092f\u0941\u091c\u094d\u092f\u0924\u0947\u0964\u092a\u094d\u0930\u0936\u0938\u094d\u0924\u0947 \u0915\u0930\u094d\u092e\u0923\u093f \u0924\u0925\u093e \u0938\u091a\u094d\u091b\u092c\u094d\u0926\u0903 \u092a\u093e\u0930\u094d\u0925 \u092f\u0941\u091c\u094d\u092f\u0924\u0947\u0964\u096417.26\u0964\u0964", "r": "sad-bh\u0101ve s\u0101dhu-bh\u0101ve cha sad ity etat prayujyate\npra\u015bhaste karma\u1e47i tath\u0101 sach-chhabda\u1e25 p\u0101rtha yujyate", "t": "The word \"Sat\" is used to refer to reality and goodness; likewise, O Arjuna, the word \"Sat\" is used to refer to an auspicious act."}, {"c": 17, "v": 27, "s": "\u092f\u091c\u094d\u091e\u0947 \u0924\u092a\u0938\u093f \u0926\u093e\u0928\u0947 \u091a \u0938\u094d\u0925\u093f\u0924\u093f\u0903 \u0938\u0926\u093f\u0924\u093f \u091a\u094b\u091a\u094d\u092f\u0924\u0947\u0964\u0915\u0930\u094d\u092e \u091a\u0948\u0935 \u0924\u0926\u0930\u094d\u0925\u0940\u092f\u0902 \u0938\u0926\u093f\u0924\u094d\u092f\u0947\u0935\u093e\u092d\u093f\u0927\u0940\u092f\u0924\u0947\u0964\u096417.27\u0964\u0964", "r": "yaj\u00f1e tapasi d\u0101ne cha sthiti\u1e25 sad iti chochyate\nkarma chaiva tad-arth\u012bya\u1e41 sad ity ev\u0101bhidh\u012byate", "t": "Steadfastness in sacrifice, austerity, and gift is also called 'Sat', and action in connection with these, or for the sake of the Supreme, is also called 'Sat'."}, {"c": 17, "v": 28, "s": "\u0905\u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e \u0939\u0941\u0924\u0902 \u0926\u0924\u094d\u0924\u0902 \u0924\u092a\u0938\u094d\u0924\u092a\u094d\u0924\u0902 \u0915\u0943\u0924\u0902 \u091a \u092f\u0924\u094d\u0964\u0905\u0938\u0926\u093f\u0924\u094d\u092f\u0941\u091a\u094d\u092f\u0924\u0947 \u092a\u093e\u0930\u094d\u0925 \u0928 \u091a \u0924\u0924\u094d\u092a\u094d\u0930\u0947\u0924\u094d\u092f \u0928\u094b \u0907\u0939\u0964\u096417.28\u0964\u0964", "r": "a\u015bhraddhay\u0101 huta\u1e41 datta\u1e41 tapas tapta\u1e41 k\u1e5bita\u1e41 cha yat\nasad ity uchyate p\u0101rtha na cha tat pretya no iha", "t": "Whatever is sacrificed, given, or performed, and whatever austerity is practiced without faith, it is called 'Asat', O Arjuna; it is of no value here or hereafter (after death)."}, {"c": 18, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0938\u094d\u092f \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0924\u0924\u094d\u0924\u094d\u0935\u092e\u093f\u091a\u094d\u091b\u093e\u092e\u093f \u0935\u0947\u0926\u093f\u0924\u0941\u092e\u094d\u0964\n\n\u0924\u094d\u092f\u093e\u0917\u0938\u094d\u092f \u091a \u0939\u0943\u0937\u0940\u0915\u0947\u0936 \u092a\u0943\u0925\u0915\u094d\u0915\u0947\u0936\u093f\u0928\u093f\u0937\u0942\u0926\u0928\u0964\u096418.1\u0964\u0964", "r": "arjuna uv\u0101cha\nsanny\u0101sasya mah\u0101-b\u0101ho tattvam ichchh\u0101mi veditum\nty\u0101gasya cha h\u1e5bi\u1e63h\u012bke\u015bha p\u1e5bithak ke\u015bhi-ni\u1e63h\u016bdana", "t": "Arjuna said, \"O mighty-armed Hrishikesa, I desire to know the essence or truth of renunciation and abandonment severally, O slayer of Kesi.\""}, {"c": 18, "v": 2, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0915\u093e\u092e\u094d\u092f\u093e\u0928\u093e\u0902 \u0915\u0930\u094d\u092e\u0923\u093e\u0902 \u0928\u094d\u092f\u093e\u0938\u0902 \u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0902 \u0915\u0935\u092f\u094b \u0935\u093f\u0926\u0941\u0903\u0964\n\n\u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u092b\u0932\u0924\u094d\u092f\u093e\u0917\u0902 \u092a\u094d\u0930\u093e\u0939\u0941\u0938\u094d\u0924\u094d\u092f\u093e\u0917\u0902 \u0935\u093f\u091a\u0915\u094d\u0937\u0923\u093e\u0903\u0964\u096418.2\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nk\u0101my\u0101n\u0101\u1e41 karma\u1e47\u0101\u1e41 ny\u0101sa\u1e41 sanny\u0101sa\u1e41 kavayo vidu\u1e25\nsarva-karma-phala-ty\u0101ga\u1e41 pr\u0101hus ty\u0101ga\u1e41 vichak\u1e63ha\u1e47\u0101\u1e25", "t": "The Blessed Lord said, \"The sages understand sannyasa to be the renunciation of action with desire; the wise declare the abandonment of the fruits of all actions to be tyaga.\""}, {"c": 18, "v": 3, "s": "\u0924\u094d\u092f\u093e\u091c\u094d\u092f\u0902 \u0926\u094b\u0937\u0935\u0926\u093f\u0924\u094d\u092f\u0947\u0915\u0947 \u0915\u0930\u094d\u092e \u092a\u094d\u0930\u093e\u0939\u0941\u0930\u094d\u092e\u0928\u0940\u0937\u093f\u0923\u0903\u0964\n\n\u092f\u091c\u094d\u091e\u0926\u093e\u0928\u0924\u092a\u0903\u0915\u0930\u094d\u092e \u0928 \u0924\u094d\u092f\u093e\u091c\u094d\u092f\u092e\u093f\u0924\u093f \u091a\u093e\u092a\u0930\u0947\u0964\u096418.3\u0964\u0964", "r": "ty\u0101jya\u1e41 do\u1e63ha-vad ity eke karma pr\u0101hur man\u012b\u1e63hi\u1e47a\u1e25\nyaj\u00f1a-d\u0101na-tapa\u1e25-karma na ty\u0101jyam iti ch\u0101pare", "t": "Some philosophers declare that actions should be abandoned as evil; while others declare that acts of sacrifice, gift, and auste
