mant\u0101l\nlok\u0101n samagr\u0101n vadanair jvaladbhi\u1e25\ntejobhir \u0101p\u016brya jagat samagra\u1e41\nbh\u0101sas tavogr\u0101\u1e25 pratapanti vi\u1e63h\u1e47o", "t": "Thou lickest up, devouring all the worlds on every side with Thy flaming mouths. Thy fierce rays, filling the whole world with radiance, burn, O Vishnu!"}, {"c": 11, "v": 31, "s": "\u0906\u0916\u094d\u092f\u093e\u0939\u093f \u092e\u0947 \u0915\u094b \u092d\u0935\u093e\u0928\u0941\u0917\u094d\u0930\u0930\u0942\u092a\u094b\n\n\u0928\u092e\u094b\u093d\u0938\u094d\u0924\u0941 \u0924\u0947 \u0926\u0947\u0935\u0935\u0930 \u092a\u094d\u0930\u0938\u0940\u0926\u0964\n\n\u0935\u093f\u091c\u094d\u091e\u093e\u0924\u0941\u092e\u093f\u091a\u094d\u091b\u093e\u092e\u093f \u092d\u0935\u0928\u094d\u0924\u092e\u093e\u0926\u094d\u092f\u0902\n\n\u0928 \u0939\u093f \u092a\u094d\u0930\u091c\u093e\u0928\u093e\u092e\u093f \u0924\u0935 \u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u092e\u094d\u0964\u096411.31\u0964\u0964", "r": "\u0101khy\u0101hi me ko bhav\u0101n ugra-r\u016bpo\nnamo \u2019stu te deva-vara pras\u012bda\nvij\u00f1\u0101tum ichchh\u0101mi bhavantam \u0101dya\u1e41\nna hi praj\u0101n\u0101mi tava prav\u1e5bittim", "t": "Tell me, who you are, so fierce of form. I offer my salutations to you, O God Supreme; have mercy on me. I desire to know you, the original Being. I do not indeed know your workings."}, {"c": 11, "v": 32, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0915\u093e\u0932\u094b\u093d\u0938\u094d\u092e\u093f \u0932\u094b\u0915\u0915\u094d\u0937\u092f\u0915\u0943\u0924\u094d\u092a\u094d\u0930\u0935\u0943\u0926\u094d\u0927\u094b\n\n\u0932\u094b\u0915\u093e\u0928\u094d\u0938\u092e\u093e\u0939\u0930\u094d\u0924\u0941\u092e\u093f\u0939 \u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u0903\u0964\n\n\u090b\u0924\u0947\u093d\u092a\u093f \u0924\u094d\u0935\u093e\u0902 \u0928 \u092d\u0935\u093f\u0937\u094d\u092f\u0928\u094d\u0924\u093f \u0938\u0930\u094d\u0935\u0947\n\n\u092f\u0947\u093d\u0935\u0938\u094d\u0925\u093f\u0924\u093e\u0903 \u092a\u094d\u0930\u0924\u094d\u092f\u0928\u0940\u0915\u0947\u0937\u0941 \u092f\u094b\u0927\u093e\u0903\u0964\u096411.32\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nk\u0101lo \u2019smi loka-k\u1e63haya-k\u1e5bit prav\u1e5biddho\nlok\u0101n sam\u0101hartum iha prav\u1e5bitta\u1e25\n\u1e5bite \u2019pi tv\u0101\u1e41 na bhavi\u1e63hyanti sarve\nye \u2019vasthit\u0101\u1e25 pratyan\u012bke\u1e63hu yodh\u0101\u1e25", "t": "The Blessed Lord said, \"I am the full-grown, world-destroying Time, now engaged in destroying the worlds. Even without you, none of the warriors arrayed in the hostile armies will live.\""}, {"c": 11, "v": 33, "s": "\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u0924\u094d\u0935\u092e\u0941\u0924\u094d\u0924\u093f\u0937\u094d\u0920 \u092f\u0936\u094b \u0932\u092d\u0938\u094d\u0935\n\n\u091c\u093f\u0924\u094d\u0935\u093e \u0936\u0924\u094d\u0930\u0942\u0928\u094d \u092d\u0941\u0919\u094d\u0915\u094d\u0937\u094d\u0935 \u0930\u093e\u091c\u094d\u092f\u0902 \u0938\u092e\u0943\u0926\u094d\u0927\u092e\u094d\u0964\n\n\u092e\u092f\u0948\u0935\u0948\u0924\u0947 \u0928\u093f\u0939\u0924\u093e\u0903 \u092a\u0942\u0930\u094d\u0935\u092e\u0947\u0935\n\n\u0928\u093f\u092e\u093f\u0924\u094d\u0924\u092e\u093e\u0924\u094d\u0930\u0902 \u092d\u0935 \u0938\u0935\u094d\u092f\u0938\u093e\u091a\u093f\u0928\u094d\u0964\u096411.33\u0964\u0964", "r": "tasm\u0101t tvam utti\u1e63h\u1e6dha ya\u015bho labhasva\njitv\u0101 \u015bhatr\u016bn bhu\u1e45k\u1e63hva r\u0101jya\u1e41 sam\u1e5biddham\nmayaivaite nihat\u0101\u1e25 p\u016brvam eva\nnimitta-m\u0101tra\u1e41 bhava savya-s\u0101chin", "t": "Therefore, stand up and obtain fame. Conquer the enemies and enjoy the unparalleled kingdom. Verily, by Me they have already been slain; be thou a mere instrument, O Arjuna."}, {"c": 11, "v": 34, "s": "\u0926\u094d\u0930\u094b\u0923\u0902 \u091a \u092d\u0940\u0937\u094d\u092e\u0902 \u091a \u091c\u092f\u0926\u094d\u0930\u0925\u0902 \u091a\n\n\u0915\u0930\u094d\u0923\u0902 \u0924\u0925\u093e\u093d\u0928\u094d\u092f\u093e\u0928\u092a\u093f \u092f\u094b\u0927\u0935\u0940\u0930\u093e\u0928\u094d\u0964\n\n\u092e\u092f\u093e \u0939\u0924\u093e\u0902\u0938\u094d\u0924\u094d\u0935\u0902 \u091c\u0939\u093f \u092e\u093e \u0935\u094d\u092f\u0925\u093f\u0937\u094d\u0920\u093e\n\n\u092f\u0941\u0927\u094d\u092f\u0938\u094d\u0935 \u091c\u0947\u0924\u093e\u0938\u093f \u0930\u0923\u0947 \u0938\u092a\u0924\u094d\u0928\u093e\u0928\u094d\u0964\u096411.34\u0964\u0964", "r": "dro\u1e47a\u1e41 cha bh\u012b\u1e63hma\u1e41 cha jayadratha\u1e41 cha\nkar\u1e47a\u1e41 tath\u0101ny\u0101n api yodha-v\u012br\u0101n\nmay\u0101 hat\u0101\u1e41s tva\u1e41 jahi m\u0101 vyathi\u1e63h\u1e6dh\u0101\nyudhyasva jet\u0101si ra\u1e47e sapatn\u0101n", "t": "Drona, Bhishma, Jayadratha, Karna, and other brave warriors have already been slain by Me; do not be distressed with fear; fight and you shall conquer your enemies in battle."}, {"c": 11, "v": 35, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u090f\u0924\u091a\u094d\u091b\u094d\u0930\u0941\u0924\u094d\u0935\u093e \u0935\u091a\u0928\u0902 \u0915\u0947\u0936\u0935\u0938\u094d\u092f\n\n\u0915\u0943\u0924\u093e\u091e\u094d\u091c\u0932\u093f\u0930\u094d\u0935\u0947\u092a\u092e\u093e\u0928\u0903 \u0915\u093f\u0930\u0940\u091f\u0940\u0964\n\n\u0928\u092e\u0938\u094d\u0915\u0943\u0924\u094d\u0935\u093e \u092d\u0942\u092f \u090f\u0935\u093e\u0939 \u0915\u0943\u0937\u094d\u0923\u0902\n\n\u0938\u0917\u0926\u094d\u0917\u0926\u0902 \u092d\u0940\u0924\u092d\u0940\u0924\u0903 \u092a\u094d\u0930\u0923\u092e\u094d\u092f\u0964\u096411.35\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\netach chhrutv\u0101 vachana\u1e41 ke\u015bhavasya\nk\u1e5bit\u0101\u00f1jalir vepam\u0101na\u1e25 kir\u012b\u1e6d\u012b\nnamask\u1e5bitv\u0101 bh\u016bya ev\u0101ha k\u1e5bi\u1e63h\u1e47a\u1e41\nsa-gadgada\u1e41 bh\u012bta-bh\u012bta\u1e25 pra\u1e47amya", "t": "Sanjaya said, Having heard that speech of Lord Krishna, Arjuna, with joined palms, trembling, prostrated himself, again addressing Krishna in a choked voice, bowing down, overwhelmed with fear."}, {"c": 11, "v": 36, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0938\u094d\u0925\u093e\u0928\u0947 \u0939\u0943\u0937\u0940\u0915\u0947\u0936 \u0924\u0935 \u092a\u094d\u0930\u0915\u0940\u0930\u094d\u0924\u094d\u092f\u093e\n\n\u091c\u0917\u0924\u094d \u092a\u094d\u0930\u0939\u0943\u0937\u094d\u092f\u0924\u094d\u092f\u0928\u0941\u0930\u091c\u094d\u092f\u0924\u0947 \u091a\u0964\n\n\u0930\u0915\u094d\u0937\u093e\u0902\u0938\u093f \u092d\u0940\u0924\u093e\u0928\u093f \u0926\u093f\u0936\u094b \u0926\u094d\u0930\u0935\u0928\u094d\u0924\u093f\n\n\u0938\u0930\u094d\u0935\u0947 \u0928\u092e\u0938\u094d\u092f\u0928\u094d\u0924\u093f \u091a \u0938\u093f\u0926\u094d\u0927\u0938\u0919\u094d\u0918\u093e\u0903\u0964\u096411.36\u0964\u0964", "r": "arjuna uv\u0101cha\nsth\u0101ne h\u1e5bi\u1e63h\u012bke\u015bha tava prak\u012brty\u0101\njagat prah\u1e5bi\u1e63hyaty anurajyate cha\nrak\u1e63h\u0101nsi bh\u012bt\u0101ni di\u015bho dravanti\nsarve namasyanti cha siddha-sa\u1e45gh\u0101\u1e25", "t": "Arjuna said, \"It is fitting, O Krishna, that the world delights and rejoices in Your praise; demons fly in fear in all directions and the hosts of the perfected ones bow to You.\""}, {"c": 11, "v": 37, "s": "\u0915\u0938\u094d\u092e\u093e\u091a\u094d\u091a \u0924\u0947 \u0928 \u0928\u092e\u0947\u0930\u0928\u094d\u092e\u0939\u093e\u0924\u094d\u092e\u0928\u094d\n\n\u0917\u0930\u0940\u092f\u0938\u0947 \u092c\u094d\u0930\u0939\u094d\u092e\u0923\u094b\u093d\u092a\u094d\u092f\u093e\u0926\u093f\u0915\u0930\u094d\u0924\u094d\u0930\u0947\u0964\n\n\u0905\u0928\u0928\u094d\u0924 \u0926\u0947\u0935\u0947\u0936 \u091c\u0917\u0928\u094d\u0928\u093f\u0935\u093e\u0938\n\n\u0924\u094d\u0935\u092e\u0915\u094d\u0937\u0930\u0902 \u0938\u0926\u0938\u0924\u094d\u0924\u0924\u094d\u092a\u0930\u0902 \u092f\u0924\u094d\u0964\u096411.37\u0964\u0964", "r": "kasm\u0101ch cha te na nameran mah\u0101tman\ngar\u012byase brahma\u1e47o \u2019py \u0101di-kartre\nananta deve\u015bha jagan-niv\u0101sa\ntvam ak\u1e63hara\u1e41 sad-asat tat para\u1e41 yat", "t": "And why should they not, O great Soul, bow to Thee Who art greater than all else, the primal cause even of the Creator (Brahma), O Infinite Being, O Lord of the gods, O Abode of the universe; Thou art the imperishable, the Being, the non-being, and That which is supreme\u2014that which is beyond the Being and the non-being."}, {"c": 11, "v": 38, "s": "\u0924\u094d\u0935\u092e\u093e\u0926\u093f\u0926\u0947\u0935\u0903 \u092a\u0941\u0930\u0941\u0937\u0903 \u092a\u0941\u0930\u093e\u0923\n\n\u0938\u094d\u0924\u094d\u0935\u092e\u0938\u094d\u092f \u0935\u093f\u0936\u094d\u0935\u0938\u094d\u092f \u092a\u0930\u0902 \u0928\u093f\u0927\u093e\u0928\u092e\u094d\u0964\n\n\u0935\u0947\u0924\u094d\u0924\u093e\u0938\u093f \u0935\u0947\u0926\u094d\u092f\u0902 \u091a \u092a\u0930\u0902 \u091a \u0927\u093e\u092e\n\n\u0924\u094d\u0935\u092f\u093e \u0924\u0924\u0902 \u0935\u093f\u0936\u094d\u0935\u092e\u0928\u0928\u094d\u0924\u0930\u0942\u092a\u0964\u096411.38\u0964\u0964", "r": "tvam \u0101di-deva\u1e25 puru\u1e63ha\u1e25 pur\u0101\u1e47as\ntvam asya vi\u015bhvasya para\u1e41 nidh\u0101nam\nvett\u0101si vedya\u1e41 cha para\u1e41 cha dh\u0101ma\ntvay\u0101 tata\u1e41 vi\u015bhvam ananta-r\u016bpa", "t": "You are the primal God, the ancient Purusha, the supreme refuge of this universe, the knower, the knowable, and the supreme Abode. Through You, the universe is pervaded, O Being of infinite forms."}, {"c": 11, "v": 39, "s": "\u0935\u093e\u092f\u0941\u0930\u094d\u092f\u092e\u094b\u093d\u0917\u094d\u0928\u093f\u0930\u094d\u0935\u0930\u0941\u0923\u0903 \u0936\u0936\u093e\u0919\u094d\u0915\u0903\n\n\u092a\u094d\u0930\u091c\u093e\u092a\u0924\u093f\u0938\u094d\u0924\u094d\u0935\u0902 \u092a\u094d\u0930\u092a\u093f\u0924\u093e\u092e\u0939\u0936\u094d\u091a\u0964\n\n\u0928\u092e\u094b \u0928\u092e\u0938\u094d\u0924\u0947\u093d\u0938\u094d\u0924\u0941 \u0938\u0939\u0938\u094d\u0930\u0915\u0943\u0924\u094d\u0935\u0903\n\n\u092a\u0941\u0928\u0936\u094d\u091a \u092d\u0942\u092f\u094b\u093d\u092a\u093f \u0928\u092e\u094b \u0928\u092e\u0938\u094d\u0924\u0947\u0964\u096411.39\u0964\u0964", "r": "v\u0101yur yamo \u2019gnir varu\u1e47a\u1e25 \u015bha\u015bh\u0101\u1e45ka\u1e25\npraj\u0101patis tva\u1e41 prapit\u0101maha\u015bh cha\nnamo namas te \u2019stu sahasra-k\u1e5bitva\u1e25\npuna\u015bh cha bh\u016byo \u2019pi namo namas te", "t": "You are Vayu, Yama, Agni, Varuna, the moon, the Creator, and the great-grandfather. I offer my salutations to You a thousand times, and again I offer my salutations to You."}, {"c": 11, "v": 40, "s": "\u0928\u092e\u0903 \u092a\u0941\u0930\u0938\u094d\u0924\u093e\u0926\u0925 \u092a\u0943\u0937\u094d\u0920\u0924\u0938\u094d\u0924\u0947\n\n\u0928\u092e\u094b\u093d\u0938\u094d\u0924\u0941 \u0924\u0947 \u0938\u0930\u094d\u0935\u0924 \u090f\u0935 \u0938\u0930\u094d\u0935\u0964\n\n\u0905\u0928\u0928\u094d\u0924\u0935\u0940\u0930\u094d\u092f\u093e\u092e\u093f\u0924\u0935\u093f\u0915\u094d\u0930\u092e\u0938\u094d\u0924\u094d\u0935\u0902\n\n\u0938\u0930\u094d\u0935\u0902 \u0938\u092e\u093e\u092a\u094d\u0928\u094b\u0937\u093f \u0924\u0924\u094b\u093d\u0938\u093f \u0938\u0930\u094d\u0935\u0903\u0964\u096411.40\u0964\u0964", "r": "nama\u1e25 purast\u0101d atha p\u1e5bi\u1e63h\u1e6dhatas te\nnamo \u2019stu te sarvata eva sarva\nananta-v\u012bry\u0101mita-vikramas tva\u1e41\nsarva\u1e41 sam\u0101pno\u1e63hi tato \u2019si sarva\u1e25", "t": "Salutations to You in front and behind! Salutations to You on every side! O All! You, infinite in power and prowess, pervade all; therefore You are all."}, {"c": 11, "v": 41, "s": "\u0938\u0916\u0947\u0924\u093f \u092e\u0924\u094d\u0935\u093e \u092a\u094d\u0930\u0938\u092d\u0902 \u092f\u0926\u0941\u0915\u094d\u0924\u0902\n\n\u0939\u0947 \u0915\u0943\u0937\u094d\u0923 \u0939\u0947 \u092f\u093e\u0926\u0935 \u0939\u0947 \u0938\u0916\u0947\u0924\u093f\u0964\n\n\u0905\u091c\u093e\u0928\u0924\u093e \u092e\u0939\u093f\u092e\u093e\u0928\u0902 \u0924\u0935\u0947\u0926\u0902\n\n\u092e\u092f\u093e \u092a\u094d\u0930\u092e\u093e\u0926\u093e\u0924\u094d\u092a\u094d\u0930\u0923\u092f\u0947\u0928 \u0935\u093e\u092a\u093f\u0964\u096411.41\u0964\u0964", "r": "sakheti matv\u0101 prasabha\u1e41 yad ukta\u1e41\nhe k\u1e5bi\u1e63h\u1e47a he y\u0101dava he sakheti\naj\u0101nat\u0101 mahim\u0101na\u1e41 taveda\u1e41\nmay\u0101 pram\u0101d\u0101t pra\u1e47ayena v\u0101pi", "t": "Whatever I have presumptuously said from carelessness or love, addressing You as O Krishna! O Yadava! O Friend! regarding You merely as a friend, unknowing of Your greatness."}, {"c": 11, "v": 42, "s": "\u092f\u091a\u094d\u091a\u093e\u0935\u0939\u093e\u0938\u093e\u0930\u094d\u0925\u092e\u0938\u0924\u094d\u0915\u0943\u0924\u094b\u093d\u0938\u093f\n\n\u0935\u093f\u0939\u093e\u0930\u0936\u092f\u094d\u092f\u093e\u0938\u0928\u092d\u094b\u091c\u0928\u0947\u0937\u0941\u0964\n\n\u090f\u0915\u094b\u093d\u0925\u0935\u093e\u092a\u094d\u092f\u091a\u094d\u092f\u0941\u0924 \u0924\u0924\u094d\u0938\u092e\u0915\u094d\u0937\u0902\n\n\u0924\u0924\u094d\u0915\u094d\u0937\u093e\u092e\u092f\u0947 \u0924\u094d\u0935\u093e\u092e\u0939\u092e\u092a\u094d\u0930\u092e\u0947\u092f\u092e\u094d\u0964\u096411.42\u0964\u0964", "r": "yach ch\u0101vah\u0101s\u0101rtham asat-k\u1e5bito \u2019si\nvih\u0101ra-\u015bhayy\u0101sana-bhojane\u1e63hu\neko \u2019tha v\u0101py achyuta tat-samak\u1e63ha\u1e41\ntat k\u1e63h\u0101maye tv\u0101m aham aprameyam", "t": "In whatever way I may have insulted You for the sake of fun, while at play, reposing, sitting, or at meals, when alone (with You), O Krishna, or in company, that I implore You, immeasurable one, to forgive."}, {"c": 11, "v": 43, "s": "\u092a\u093f\u0924\u093e\u0938\u093f \u0932\u094b\u0915\u0938\u094d\u092f \u091a\u0930\u093e\u091a\u0930\u0938\u094d\u092f\n\n\u0924\u094d\u0935\u092e\u0938\u094d\u092f \u092a\u0942\u091c\u094d\u092f\u0936\u094d\u091a \u0917\u0941\u0930\u0941\u0930\u094d\u0917\u0930\u0940\u092f\u093e\u0928\u094d\u0964\n\n\u0928 \u0924\u094d\u0935\u0924\u094d\u0938\u092e\u094b\u093d\u0938\u094d\u0924\u094d\u092f\u092d\u094d\u092f\u0927\u093f\u0915\u0903 \u0915\u0941\u0924\u094b\u093d\u0928\u094d\u092f\u094b\n\n\u0932\u094b\u0915\u0924\u094d\u0930\u092f\u0947\u093d\u092a\u094d\u092f\u092a\u094d\u0930\u0924\u093f\u092e\u092a\u094d\u0930\u092d\u093e\u0935\u0964\u096411.43\u0964\u0964", "r": "pit\u0101si lokasya char\u0101charasya\ntvam asya p\u016bjya\u015bh cha gurur gar\u012by\u0101n\nna tvat-samo \u2019sty abhyadhika\u1e25 kuto \u2019nyo\nloka-traye \u2019py apratima-prabh\u0101va", "t": "Thou art the Father of this world, both moving and unmoving. Thou art to be adored by this world; Thou, the greatest Guru; for none exists who is equal to Thee; how then could there be another superior to Thee in the three worlds, O Being of unrivaled power?"}, {"c": 11, "v": 44, "s": "\u0924\u0938\u094d\u092e\u093e\u0924\u094d\u092a\u094d\u0930\u0923\u092e\u094d\u092f \u092a\u094d\u0930\u0923\u093f\u0927\u093e\u092f \u0915\u093e\u092f\u0902\n\n\u092a\u094d\u0930\u0938\u093e\u0926\u092f\u0947 \u0924\u094d\u0935\u093e\u092e\u0939\u092e\u0940\u0936\u092e\u0940\u0921\u094d\u092f\u092e\u094d\u0964\n\n\u092a\u093f\u0924\u0947\u0935 \u092a\u0941\u0924\u094d\u0930\u0938\u094d\u092f \u0938\u0916\u0947\u0935 \u0938\u0916\u094d\u092f\u0941\u0903\n\n\u092a\u094d\u0930\u093f\u092f\u0903 \u092a\u094d\u0930\u093f\u092f\u093e\u092f\u093e\u0930\u094d\u0939\u0938\u093f \u0926\u0947\u0935 \u0938\u094b\u0922\u0941\u092e\u094d\u0964\u096411.44\u0964\u0964", "r": "tasm\u0101t pra\u1e47amya pra\u1e47idh\u0101ya k\u0101ya\u1e41\npras\u0101daye tv\u0101m aham \u012b\u015bham \u012b\u1e0dyam\npiteva putrasya sakheva sakhyu\u1e25\npriya\u1e25 priy\u0101y\u0101rhasi deva so\u1e0dhum", "t": "Therefore, bowing down and prostrating my body, I crave Thy forgiveness, O adorable Lord. As a father forgives his son, a friend his dear friend, a lover his beloved, even so may Thou forgive me, O God."}, {"c": 11, "v": 45, "s": "\u0905\u0926\u0943\u0937\u094d\u091f\u092a\u0942\u0930\u094d\u0935\u0902 \u0939\u0943\u0937\u093f\u0924\u094b\u093d\u0938\u094d\u092e\u093f \u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e\n\n\u092d\u092f\u0947\u0928 \u091a \u092a\u094d\u0930\u0935\u094d\u092f\u0925\u093f\u0924\u0902 \u092e\u0928\u094b \u092e\u0947\u0964\n\n\u0924\u0926\u0947\u0935 \u092e\u0947 \u0926\u0930\u094d\u0936\u092f \u0926\u0947\u0935 \u0930\u0942\u092a\u0902\n\n\u092a\u094d\u0930\u0938\u0940\u0926 \u0926\u0947\u0935\u0947\u0936 \u091c\u0917\u0928\u094d\u0928\u093f\u0935\u093e\u0938\u0964\u096411.45\u0964\u0964", "r": "ad\u1e5bi\u1e63h\u1e6da-p\u016brva\u1e41 h\u1e5bi\u1e63hito \u2019smi d\u1e5bi\u1e63h\u1e6dv\u0101\nbhayena cha pravyathita\u1e41 mano me\ntad eva me dar\u015bhaya deva r\u016bpa\u1e41\npras\u012bda deve\u015bha jagan-niv\u0101sa", "t": "I am delighted, having seen something never seen before; yet my mind is distressed with fear. Show me that form only, O God; have mercy, O God of gods, O Abode of the universe."}, {"c": 11, "v": 46, "s": "\u0915\u093f\u0930\u0940\u091f\u093f\u0928\u0902 \u0917\u0926\u093f\u0928\u0902 \u091a\u0915\u094d\u0930\u0939\u0938\u094d\u0924\n\n\u092e\u093f\u091a\u094d\u091b\u093e\u092e\u093f \u0924\u094d\u0935\u093e\u0902 \u0926\u094d\u0930\u0937\u094d\u091f\u0941\u092e\u0939\u0902 \u0924\u0925\u0948\u0935\u0964\n\n\u0924\u0947\u0928\u0948\u0935 \u0930\u0942\u092a\u0947\u0923 \u091a\u0924\u0941\u0930\u094d\u092d\u0941\u091c\u0947\u0928\n\n\u0938\u0939\u0938\u094d\u0930\u092c\u093e\u0939\u094b \u092d\u0935 \u0935\u093f\u0936\u094d\u0935\u092e\u0942\u0930\u094d\u0924\u0947\u0964\u096411.46\u0964\u0964", "r": "kir\u012b\u1e6dina\u1e41 gadina\u1e41 chakra-hastam\nichchh\u0101mi tv\u0101\u1e41 dra\u1e63h\u1e6dum aha\u1e41 tathaiva\ntenaiva r\u016bpe\u1e47a chatur-bhujena\nsahasra-b\u0101ho bhava vi\u015bhva-m\u016brte", "t": "I desire to see You as before, crowned, bearing a mace, with the discus in hand, in Your former form only, having four arms, O thousand-armed, Cosmic Being."}, {"c": 11, "v": 47, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u092e\u092f\u093e \u092a\u094d\u0930\u0938\u0928\u094d\u0928\u0947\u0928 \u0924\u0935\u093e\u0930\u094d\u091c\u0941\u0928\u0947\u0926\u0902\n\n\u0930\u0942\u092a\u0902 \u092a\u0930\u0902 \u0926\u0930\u094d\u0936\u093f\u0924\u092e\u093e\u0924\u094d\u092e\u092f\u094b\u0917\u093e\u0924\u094d\u0964\n\n\u0924\u0947\u091c\u094b\u092e\u092f\u0902 \u0935\u093f\u0936\u094d\u0935\u092e\u0928\u0928\u094d\u0924\u092e\u093e\u0926\u094d\u092f\u0902\n\n\u092f\u0928\u094d\u092e\u0947 \u0924\u094d\u0935\u0926\u0928\u094d\u092f\u0947\u0928 \u0928 \u0926\u0943\u0937\u094d\u091f\u092a\u0942\u0930\u094d\u0935\u092e\u094d\u0964\u096411.47\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nmay\u0101 prasannena tav\u0101rjuneda\u1e41\nr\u016bpa\u1e41 para\u1e41 dar\u015bhitam \u0101tma-yog\u0101t\ntejo-maya\u1e41 vi\u015bhvam anantam \u0101dya\u1e41\nyan me tvad anyena na d\u1e5bi\u1e63h\u1e6da-p\u016brvam", "t": "The Blessed Lord said, \"O Arjuna, this Cosmic Form has graciously been shown to you by Me through My own Yogic power. It is full of splendour, primeval, and infinite; this Cosmic Form of Mine has never been seen before by anyone other than you.\""}, {"c": 11, "v": 48, "s": "\u0928 \u0935\u0947\u0926\u092f\u091c\u094d\u091e\u093e\u0927\u094d\u092f\u092f\u0928\u0948\u0930\u094d\u0928 \u0926\u093e\u0928\u0948\n\n\u0930\u094d\u0928 \u091a \u0915\u094d\u0930\u093f\u092f\u093e\u092d\u093f\u0930\u094d\u0928 \u0924\u092a\u094b\u092d\u093f\u0930\u0941\u0917\u094d\u0930\u0948\u0903\u0964\n\n\u090f\u0935\u0902\u0930\u0942\u092a\u0903 \u0936\u0915\u094d\u092f \u0905\u0939\u0902 \u0928\u0943\u0932\u094b\u0915\u0947\n\n\u0926\u094d\u0930\u0937\u094d\u091f\u0941\u0902 \u0924\u094d\u0935\u0926\u0928\u094d\u092f\u0947\u0928 \u0915\u0941\u0930\u0941\u092a\u094d\u0930\u0935\u0940\u0930\u0964\u096411.48\u0964\u0964", "r": "na veda-yaj\u00f1\u0101dhyayanair na d\u0101nair\nna cha kriy\u0101bhir na tapobhir ugrai\u1e25\neva\u1e41-r\u016bpa\u1e25 \u015bhakya aha\u1e41 n\u1e5bi-loke\ndra\u1e63h\u1e6du\u1e41 tvad anyena kuru-prav\u012bra", "t": "Neither by the study of the Vedas, nor by gifts, nor by sacrifices, nor by severe austerities, can I be seen in this form in the world of men by any other than yourself, O great hero of the Kurus (Arjuna)."}, {"c": 11, "v": 49, "s": "\u092e\u093e \u0924\u0947 \u0935\u094d\u092f\u0925\u093e \u092e\u093e \u091a \u0935\u093f\u092e\u0942\u0922\u092d\u093e\u0935\u094b\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u093e \u0930\u0942\u092a\u0902 \u0918\u094b\u0930\u092e\u0940\u0926\u0943\u0919\u094d\u092e\u092e\u0947\u0926\u092e\u094d\u0964\n\n\u0935\u094d\u092f\u092a\u0947\u0924\u092d\u0940\u0903 \u092a\u094d\u0930\u0940\u0924\u092e\u0928\u093e\u0903 \u092a\u0941\u0928\u0938\u094d\u0924\u094d\u0935\u0902\n\n\u0924\u0926\u0947\u0935 \u092e\u0947 \u0930\u0942\u092a\u092e\u093f\u0926\u0902 \u092a\u094d\u0930\u092a\u0936\u094d\u092f\u0964\u096411.49\u0964\u0964", "r": "m\u0101 te vyath\u0101 m\u0101 cha vim\u016b\u1e0dha-bh\u0101vo\nd\u1e5bi\u1e63h\u1e6dv\u0101 r\u016bpa\u1e41 ghoram \u012bd\u1e5bi\u1e45 mamedam\nvyapeta-bh\u012b\u1e25 pr\u012bta-man\u0101\u1e25 punas tva\u1e41\ntad eva me r\u016bpam ida\u1e41 prapa\u015bhya", "t": "Do not be afraid, nor be bewildered on seeing such a terrible form of Mine; with your fear dispelled and with a gladdened heart, now behold again this former form of Mine."}, {"c": 11, "v": 50, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\n\n\u0907\u0924\u094d\u092f\u0930\u094d\u091c\u0941\u0928\u0902 \u0935\u093e\u0938\u0941\u0926\u0947\u0935\u0938\u094d\u0924\u0925\u094b\u0915\u094d\u0924\u094d\u0935\u093e\n\n\u0938\u094d\u0935\u0915\u0902 \u0930\u0942\u092a\u0902 \u0926\u0930\u094d\u0936\u092f\u093e\u092e\u093e\u0938 \u092d\u0942\u092f\u0903\u0964\n\n\u0906\u0936\u094d\u0935\u093e\u0938\u092f\u093e\u092e\u093e\u0938 \u091a \u092d\u0940\u0924\u092e\u0947\u0928\u0902\n\n\u092d\u0942\u0924\u094d\u0935\u093e \u092a\u0941\u0928\u0903 \u0938\u094c\u092e\u094d\u092f\u0935\u092a\u0941\u0930\u094d\u092e\u0939\u093e\u0924\u094d\u092e\u093e\u0964\u096411.50\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nity arjuna\u1e41 v\u0101sudevas tathoktv\u0101\nsvaka\u1e41 r\u016bpa\u1e41 dar\u015bhay\u0101m \u0101sa bh\u016bya\u1e25\n\u0101\u015bhv\u0101say\u0101m \u0101sa cha bh\u012btam ena\u1e41\nbh\u016btv\u0101 puna\u1e25 saumya-vapur mah\u0101tm\u0101", "t": "Sanjaya said, Having thus spoken to Arjuna, Krishna again showed His own form. The great Soul, assuming His gentle form, then consoled Arjuna, who was terrified."}, {"c": 11, "v": 51, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u0926\u0943\u0937\u094d\u091f\u094d\u0935\u0947\u0926\u0902 \u092e\u093e\u0928\u0941\u0937\u0902 \u0930\u0942\u092a\u0902 \u0924\u0935\u0938\u094c\u092e\u094d\u092f\u0902 \u091c\u0928\u093e\u0930\u094d\u0926\u0928\u0964\n\n\u0907\u0926\u093e\u0928\u0940\u092e\u0938\u094d\u092e\u093f \u0938\u0902\u0935\u0943\u0924\u094d\u0924\u0903 \u0938\u091a\u0947\u0924\u093e\u0903 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u0917\u0924\u0903\u0964\u096411.51\u0964\u0964", "r": "arjuna uv\u0101cha\nd\u1e5bi\u1e63h\u1e6dveda\u1e41 m\u0101nu\u1e63ha\u1e41 r\u016bpa\u1e41 tava saumya\u1e41 jan\u0101rdana\nid\u0101n\u012bm asmi sa\u1e41v\u1e5bitta\u1e25 sa-chet\u0101\u1e25 prak\u1e5biti\u1e41 gata\u1e25", "t": "Arjuna said, \"Having seen this Thy gentle human form, O Krishna, now I am composed and have been restored to my own nature.\""}, {"c": 11, "v": 52, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\n\n\u0938\u0941\u0926\u0941\u0930\u094d\u0926\u0930\u094d\u0936\u092e\u093f\u0926\u0902 \u0930\u0942\u092a\u0902 \u0926\u0943\u0937\u094d\u091f\u0935\u093e\u0928\u0938\u093f \u092f\u0928\u094d\u092e\u092e\u0964\n\n\u0926\u0947\u0935\u093e \u0905\u092a\u094d\u092f\u0938\u094d\u092f \u0930\u0942\u092a\u0938\u094d\u092f \u0928\u093f\u0924\u094d\u092f\u0902 \u0926\u0930\u094d\u0936\u0928\u0915\u093e\u0919\u094d\u0915\u094d\u0937\u093f\u0923\u0903\u0964\u096411.52\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nsu-durdar\u015bham ida\u1e41 r\u016bpa\u1e41 d\u1e5bi\u1e63h\u1e6dav\u0101n asi yan mama\ndev\u0101 apy asya r\u016bpasya nitya\u1e41 dar\u015bhana-k\u0101\u1e45k\u1e63hi\u1e47a\u1e25", "t": "The Blessed Lord said, \"It is very hard indeed to see this form of Mine which thou hast seen; even the gods are ever longing to behold it.\""}, {"c": 11, "v": 53, "s": "\u0928\u093e\u0939\u0902 \u0935\u0947\u0926\u0948\u0930\u094d\u0928 \u0924\u092a\u0938\u093e \u0928 \u0926\u093e\u0928\u0947\u0928 \u0928 \u091a\u0947\u091c\u094d\u092f\u092f\u093e\u0964\n\n\u0936\u0915\u094d\u092f \u090f\u0935\u0902\u0935\u093f\u0927\u094b \u0926\u094d\u0930\u0937\u094d\u091f\u0941\u0902 \u0926\u0943\u0937\u094d\u091f\u0935\u093e\u0928\u0938\u093f \u092e\u093e\u0902 \u092f\u0925\u093e\u0964\u096411.53\u0964\u0964", "r": "n\u0101ha\u1e41 vedair na tapas\u0101 na d\u0101nena na chejyay\u0101\n\u015bhakya eva\u1e41-vidho dra\u1e63h\u1e6du\u1e41 d\u1e5bi\u1e63h\u1e6dav\u0101n asi m\u0101\u1e41 yath\u0101", "t": "Neither by the Vedas, nor by austerity, nor by gift, nor by sacrifice can I be seen in this form as thou hast seen Me so easily."}, {"c": 11, "v": 54, "s": "\u092d\u0915\u094d\u0924\u094d\u092f\u093e \u0924\u094d\u0935\u0928\u0928\u094d\u092f\u092f\u093e \u0936\u0915\u094d\u092f\u092e\u0939\u092e\u0947\u0935\u0902\u0935\u093f\u0927\u094b\u093d\u0930\u094d\u091c\u0941\u0928\u0964\n\n\u091c\u094d\u091e\u093e\u0924\u0941\u0902 \u0926\u0943\u0937\u094d\u091f\u0941\u0902 \u091a \u0924\u0924\u094d\u0924\u094d\u0935\u0947\u0928 \u092a\u094d\u0930\u0935\u0947\u0937\u094d\u091f\u0941\u0902 \u091a \u092a\u0930\u0902\u0924\u092a\u0964\u096411.54\u0964\u0964", "r": "bhakty\u0101 tv ananyay\u0101 \u015bhakya aham eva\u1e41-vidho \u2019rjuna\nj\u00f1\u0101tu\u1e41 dra\u1e63h\u1e6du\u1e41 cha tattvena prave\u1e63h\u1e6du\u1e41 cha parantapa", "t": "But by single-minded devotion, I can be known, seen, and entered into in reality, O Arjuna."}, {"c": 11, "v": 55, "s": "\u092e\u0924\u094d\u0915\u0930\u094d\u092e\u0915\u0943\u0928\u094d\u092e\u0924\u094d\u092a\u0930\u092e\u094b \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u0903 \u0938\u0919\u094d\u0917\u0935\u0930\u094d\u091c\u093f\u0924\u0903\u0964\n\n\u0928\u093f\u0930\u094d\u0935\u0948\u0930\u0903 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0947\u0937\u0941 \u092f\u0903 \u0938 \u092e\u093e\u092e\u0947\u0924\u093f \u092a\u093e\u0923\u094d\u0921\u0935\u0964\u096411.55\u0964\u0964", "r": "mat-karma-k\u1e5bin mat-paramo mad-bhakta\u1e25 sa\u1e45ga-varjita\u1e25\nnirvaira\u1e25 sarva-bh\u016bte\u1e63hu ya\u1e25 sa m\u0101m eti p\u0101\u1e47\u1e0dava", "t": "He who does all actions for Me, who regards Me as the Supreme, who is devoted to Me, who is free from attachment, who bears no enmity towards any creature, he comes to Me, O Arjuna."}, {"c": 12, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\u090f\u0935\u0902 \u0938\u0924\u0924\u092f\u0941\u0915\u094d\u0924\u093e \u092f\u0947 \u092d\u0915\u094d\u0924\u093e\u0938\u094d\u0924\u094d\u0935\u093e\u0902 \u092a\u0930\u094d\u092f\u0941\u092a\u093e\u0938\u0924\u0947\u0964\u092f\u0947\u091a\u093e\u092a\u094d\u092f\u0915\u094d\u0937\u0930\u092e\u0935\u094d\u092f\u0915\u094d\u0924\u0902 \u0924\u0947\u0937\u093e\u0902 \u0915\u0947 \u092f\u094b\u0917\u0935\u093f\u0924\u094d\u0924\u092e\u093e\u0903\u0964\u096412.1\u0964\u0964", "r": "arjuna uv\u0101cha\neva\u1e41 satata-yukt\u0101 ye bhakt\u0101s tv\u0101\u1e41 paryup\u0101sate\nye ch\u0101py ak\u1e63haram avyakta\u1e41 te\u1e63h\u0101\u1e41 ke yoga-vittam\u0101\u1e25", "t": "Arjuna said, \"Which of them are better versed in Yoga\u2014those who steadfastly worship You, or those who worship the imperishable and the unmanifested?\""}, {"c": 12, "v": 2, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\u092e\u092f\u094d\u092f\u093e\u0935\u0947\u0936\u094d\u092f \u092e\u0928\u094b \u092f\u0947 \u092e\u093e\u0902 \u0928\u093f\u0924\u094d\u092f\u092f\u0941\u0915\u094d\u0924\u093e \u0909\u092a\u093e\u0938\u0924\u0947\u0964\u0936\u094d\u0930\u0926\u094d\u0927\u092f\u093e \u092a\u0930\u092f\u094b\u092a\u0947\u0924\u093e\u0938\u094d\u0924\u0947 \u092e\u0947 \u092f\u0941\u0915\u094d\u0924\u0924\u092e\u093e \u092e\u0924\u093e\u0903\u0964\u096412.2\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nmayy \u0101ve\u015bhya mano ye m\u0101\u1e41 nitya-yukt\u0101 up\u0101sate\n\u015bhraddhay\u0101 parayopet\u0101s te me yuktatam\u0101 mat\u0101\u1e25", "t": "The Blessed Lord said, \"In My opinion, those who fix their minds on Me, worship Me ever steadfastly, and are endowed with supreme faith, are the best in Yoga.\""}, {"c": 12, "v": 3, "s": "\u092f\u0947 \u0924\u094d\u0935\u0915\u094d\u0937\u0930\u092e\u0928\u093f\u0930\u094d\u0926\u0947\u0936\u094d\u092f\u092e\u0935\u094d\u092f\u0915\u094d\u0924\u0902 \u092a\u0930\u094d\u092f\u0941\u092a\u093e\u0938\u0924\u0947\u0964\u0938\u0930\u094d\u0935\u0924\u094d\u0930\u0917\u092e\u091a\u093f\u0928\u094d\u0924\u094d\u092f\u0902 \u091a \u0915\u0942\u091f\u0938\u094d\u0925\u092e\u091a\u0932\u0902 \u0927\u094d\u0930\u0941\u0935\u092e\u094d\u0964\u096412.3\u0964\u0964", "r": "ye tv ak\u1e63haram anirde\u015bhyam avyakta\u1e41 paryup\u0101sate\nsarvatra-gam achintya\u00f1cha k\u016b\u1e6da-stham achalandhruvam\n sanniyamyendriya-gr\u0101ma\u1e41 sarvatra sama-buddhaya\u1e25\nte pr\u0101pnuvanti m\u0101m eva sarva-bh\u016bta-hite rat\u0101\u1e25", "t": "Those who worship the imperishable, the indefinable, the unmanifest, the omnipresent, the unthinkable, the immovable, and the eternal."}, {"c": 12, "v": 4, "s": "\u0938\u0902\u0928\u093f\u092f\u092e\u094d\u092f\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0917\u094d\u0930\u093e\u092e\u0902 \u0938\u0930\u094d\u0935\u0924\u094d\u0930 \u0938\u092e\u092c\u0941\u0926\u094d\u0927\u092f\u0903\u0964\u0924\u0947 \u092a\u094d\u0930\u093e\u092a\u094d\u0928\u0941\u0935\u0928\u094d\u0924\u093f \u092e\u093e\u092e\u0947\u0935 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0939\u093f\u0924\u0947 \u0930\u0924\u093e\u0903\u0964\u096412.4\u0964\u0964", "r": "sanniyamyendriya-gr\u0101ma\u1e41 sarvatra sama-buddhaya\u1e25 te pr\u0101pnuvanti m\u0101m eva sarva-bh\u016bta-hite rat\u0101\u1e25", "t": "Having restrained all the senses, being even-minded everywhere, and intent on the welfare of all beings, they verily come unto Me."}, {"c": 12, "v": 5, "s": "\u0915\u094d\u0932\u0947\u0936\u094b\u093d\u0927\u093f\u0915\u0924\u0930\u0938\u094d\u0924\u0947\u0937\u093e\u092e\u0935\u094d\u092f\u0915\u094d\u0924\u093e\u0938\u0915\u094d\u0924\u091a\u0947\u0924\u0938\u093e\u092e\u094d\u0964\n\n\u0905\u0935\u094d\u092f\u0915\u094d\u0924\u093e \u0939\u093f \u0917\u0924\u093f\u0930\u094d\u0926\u0941\u0903\u0916\u0902 \u0926\u0947\u0939\u0935\u0926\u094d\u092d\u093f\u0930\u0935\u093e\u092a\u094d\u092f\u0924\u0947\u0964\u096412.5\u0964\u0964", "r": "kle\u015bho \u2019dhikataras te\u1e63h\u0101m avyakt\u0101sakta-chetas\u0101m\navyakt\u0101 hi gatir du\u1e25kha\u1e41 dehavadbhir av\u0101pyate", "t": "Greater is their trouble whose minds are set on the unmanifested, for the goal of the unmanifested is very hard for the embodied to reach."}, {"c": 12, "v": 6, "s": "\u092f\u0947 \u0924\u0941 \u0938\u0930\u094d\u0935\u093e\u0923\u093f \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u092e\u092f\u093f \u0938\u0902\u0928\u094d\u092f\u0938\u094d\u092f \u092e\u0924\u094d\u092a\u0930\u093e\u0903\u0964\u0905\u0928\u0928\u094d\u092f\u0947\u0928\u0948\u0935 \u092f\u094b\u0917\u0947\u0928 \u092e\u093e\u0902 \u0927\u094d\u092f\u093e\u092f\u0928\u094d\u0924 \u0909\u092a\u093e\u0938\u0924\u0947\u0964\u096412.6\u0964\u0964", "r": "ye tu sarv\u0101\u1e47i karm\u0101\u1e47i mayi sannyasya mat-para\u1e25\nananyenaiva yogena m\u0101\u1e41 dhy\u0101yanta up\u0101sate", "t": "But to those who worship Me, renouncing all actions in Me, regarding Me as the supreme goal, meditating on Me with single-minded yoga."}, {"c": 12, "v": 7, "s": "\u0924\u0947\u0937\u093e\u092e\u0939\u0902 \u0938\u092e\u0941\u0926\u094d\u0927\u0930\u094d\u0924\u093e \u092e\u0943\u0924\u094d\u092f\u0941\u0938\u0902\u0938\u093e\u0930\u0938\u093e\u0917\u0930\u093e\u0924\u094d\u0964\u092d\u0935\u093e\u092e\u093f \u0928\u091a\u093f\u0930\u093e\u0924\u094d\u092a\u093e\u0930\u094d\u0925 \u092e\u092f\u094d\u092f\u093e\u0935\u0947\u0936\u093f\u0924\u091a\u0947\u0924\u0938\u093e\u092e\u094d\u0964\u096412.7\u0964\u0964", "r": "te\u1e63h\u0101m aha\u1e41 samuddhart\u0101 m\u1e5bityu-sa\u1e41s\u0101ra-s\u0101gar\u0101t\nbhav\u0101mi na chir\u0101t p\u0101rtha mayy \u0101ve\u015bhita-chetas\u0101m", "t": "To those whose minds are set on Me, O Arjuna, verily I soon become the savior out of the ocean of Samsara."}, {"c": 12, "v": 8, "s": "\u092e\u092f\u094d\u092f\u0947\u0935 \u092e\u0928 \u0906\u0927\u0924\u094d\u0938\u094d\u0935 \u092e\u092f\u093f \u092c\u0941\u0926\u094d\u0927\u093f\u0902 \u0928\u093f\u0935\u0947\u0936\u092f\u0964\u0928\u093f\u0935\u0938\u093f\u0937\u094d\u092f\u0938\u093f \u092e\u092f\u094d\u092f\u0947\u0935 \u0905\u0924 \u090a\u0930\u094d\u0927\u094d\u0935\u0902 \u0928 \u0938\u0902\u0936\u092f\u0903\u0964\u096412.8\u0964\u0964", "r": "mayy eva mana \u0101dhatsva mayi buddhi\u1e41 nive\u015bhaya\nnivasi\u1e63hyasi mayy eva ata \u016brdhva\u1e41 na san\u015bhaya\u1e25", "t": "Fix your mind on Me, and your intellect in Me. Then you will certainly live in Me alone hereafter."}, {"c": 12, "v": 9, "s": "\u0905\u0925 \u091a\u093f\u0924\u094d\u0924\u0902 \u0938\u092e\u093e\u0927\u093e\u0924\u0941\u0902 \u0928 \u0936\u0915\u094d\u0928\u094b\u0937\u093f \u092e\u092f\u093f \u0938\u094d\u0925\u093f\u0930\u092e\u094d\u0964\u0905\u092d\u094d\u092f\u093e\u0938\u092f\u094b\u0917\u0947\u0928 \u0924\u0924\u094b \u092e\u093e\u092e\u093f\u091a\u094d\u091b\u093e\u092a\u094d\u0924\u0941\u0902 \u0927\u0928\u091e\u094d\u091c\u092f\u0964\u096412.9\u0964\u0964", "r": "atha chitta\u1e41 sam\u0101dh\u0101tu\u1e41 na \u015bhakno\u1e63hi mayi sthiram\nabhy\u0101sa-yogena tato m\u0101m ichchh\u0101ptu\u1e41 dhana\u00f1jaya", "t": "If you are unable to fix your mind steadily on Me, then seek to reach Me through the yoga of constant practice, O Arjuna."}, {"c": 12, "v": 10, "s": "\u0905\u092d\u094d\u092f\u093e\u0938\u0947\u093d\u092a\u094d\u092f\u0938\u092e\u0930\u094d\u0925\u094b\u093d\u0938\u093f \u092e\u0924\u094d\u0915\u0930\u094d\u092e\u092a\u0930\u092e\u094b \u092d\u0935\u0964\u092e\u0926\u0930\u094d\u0925\u092e\u092a\u093f \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0915\u0941\u0930\u094d\u0935\u0928\u094d \u0938\u093f\u0926\u094d\u0927\u093f\u092e\u0935\u093e\u092a\u094d\u0938\u094d\u092f\u0938\u093f\u0964\u096412.10\u0964\u0964", "r": "abhy\u0101se \u2019py asamartho \u2019si mat-karma-paramo bhava\nmad-artham api karm\u0101\u1e47i kurvan siddhim av\u0101psyasi", "t": "If you are unable to practice even this Abhyasa Yoga, be intent on doing actions for My sake; even by doing actions for My sake, you will attain perfection."}, {"c": 12, "v": 11, "s": "\u0905\u0925\u0948\u0924\u0926\u092a\u094d\u092f\u0936\u0915\u094d\u0924\u094b\u093d\u0938\u093f \u0915\u0930\u094d\u0924\u0941\u0902 \u092e\u0926\u094d\u092f\u094b\u0917\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u0903\u0964\u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u092b\u0932\u0924\u094d\u092f\u093e\u0917\u0902 \u0924\u0924\u0903 \u0915\u0941\u0930\u0941 \u092f\u0924\u093e\u0924\u094d\u092e\u0935\u093e\u0928\u094d\u0964\u096412.11\u0964\u0964", "r": "athaitad apy a\u015bhakto \u2019si kartu\u1e41 mad-yogam \u0101\u015bhrita\u1e25\nsarva-karma-phala-ty\u0101ga\u1e41 tata\u1e25 kuru yat\u0101tmav\u0101n", "t": "If you are unable to do even this, then, resort to union with Me and renounce the fruits of all actions with self-control."}, {"c": 12, "v": 12, "s": "\u0936\u094d\u0930\u0947\u092f\u094b \u0939\u093f \u091c\u094d\u091e\u093e\u0928\u092e\u092d\u094d\u092f\u093e\u0938\u093e\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u093e\u0926\u094d\u0927\u094d\u092f\u093e\u0928\u0902 \u0935\u093f\u0936\u093f\u0937\u094d\u092f\u0924\u0947\u0964\u0927\u094d\u092f\u093e\u0928\u093e\u0924\u094d\u0915\u0930\u094d\u092e\u092b\u0932\u0924\u094d\u092f\u093e\u0917\u0938\u094d\u0924\u094d\u092f\u093e\u0917\u093e\u091a\u094d\u091b\u093e\u0928\u094d\u0924\u093f\u0930\u0928\u0928\u094d\u0924\u0930\u092e\u094d\u0964\u096412.12\u0964\u0964", "r": "\u015bhreyo hi j\u00f1\u0101nam abhy\u0101s\u0101j j\u00f1\u0101n\u0101d dhy\u0101na\u1e41 vi\u015bhi\u1e63hyate\ndhy\u0101n\u0101t karma-phala-ty\u0101gas ty\u0101g\u0101ch chh\u0101ntir anantaram", "t": "Better indeed is knowledge than practice; better than knowledge is meditation; better than meditation is the renunciation of the fruits of actions: peace immediately follows renunciation."}, {"c": 12, "v": 13, "s": "\u0905\u0926\u094d\u0935\u0947\u0937\u094d\u091f\u093e \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u092e\u0948\u0924\u094d\u0930\u0903 \u0915\u0930\u0941\u0923 \u090f\u0935 \u091a\u0964\u0928\u093f\u0930\u094d\u092e\u092e\u094b \u0928\u093f\u0930\u0939\u0919\u094d\u0915\u093e\u0930\u0903 \u0938\u092e\u0926\u0941\u0903\u0916\u0938\u0941\u0916\u0903 \u0915\u094d\u0937\u092e\u0940\u0964\u096412.13\u0964\u0964", "r": "adve\u1e63h\u1e6d\u0101 sarva-bh\u016bt\u0101n\u0101\u1e41 maitra\u1e25 karu\u1e47a eva cha\nnirmamo nirahank\u0101ra\u1e25 sama-du\u1e25kha-sukha\u1e25 k\u1e63ham\u012b", "t": "He who hates no creature, is friendly and compassionate to all, is free from attachment and egoism, is balanced in pleasure and pain, and is forgiving."}, {"c": 12, "v": 14, "s": "\u0938\u0928\u094d\u0924\u0941\u0937\u094d\u091f\u0903 \u0938\u0924\u0924\u0902 \u092f\u094b\u0917\u0940 \u092f\u0924\u093e\u0924\u094d\u092e\u093e \u0926\u0943\u0922\u0928\u093f\u0936\u094d\u091a\u092f\u0903\u0964\u092e\u092f\u094d\u092f\u0930\u094d\u092a\u093f\u0924\u092e\u0928\u094b\u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092f\u094b \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u0903 \u0938 \u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u0903\u0964\u096412.14\u0964\u0964", "r": "santu\u1e63h\u1e6da\u1e25 satata\u1e41 yog\u012b yat\u0101tm\u0101 d\u1e5bi\u1e0dha-ni\u015bhchaya\u1e25\nmayy arpita-mano-buddhir yo mad-bhakta\u1e25 sa me priya\u1e25", "t": "Ever content, steady in meditation, self-controlled, possessing firm conviction, with the mind and intellect dedicated to Me, he, My devotee, is dear to Me."}, {"c": 12, "v": 15, "s": "\u092f\u0938\u094d\u092e\u093e\u0928\u094d\u0928\u094b\u0926\u094d\u0935\u093f\u091c\u0924\u0947 \u0932\u094b\u0915\u094b \u0932\u094b\u0915\u093e\u0928\u094d\u0928\u094b\u0926\u094d\u0935\u093f\u091c\u0924\u0947 \u091a \u092f\u0903\u0964\u0939\u0930\u094d\u0937\u093e\u092e\u0930\u094d\u0937\u092d\u092f\u094b\u0926\u094d\u0935\u0947\u0917\u0948\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u094b \u092f\u0903 \u0938 \u091a \u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u0903\u0964\u096412.15\u0964\u0964", "r": "yasm\u0101n nodvijate loko lok\u0101n nodvijate cha ya\u1e25\nhar\u1e63h\u0101mar\u1e63ha-bhayodvegair mukto ya\u1e25 sa cha me priya\u1e25", "t": "He whom the world does not agitate, and who cannot be agitated by the world, and who is freed from joy, anger, fear, and anxiety\u2014he is dear to Me."}, {"c": 12, "v": 16, "s": "\u0905\u0928\u092a\u0947\u0915\u094d\u0937\u0903 \u0936\u0941\u091a\u093f\u0930\u094d\u0926\u0915\u094d\u0937 \u0909\u0926\u093e\u0938\u0940\u0928\u094b \u0917\u0924\u0935\u094d\u092f\u0925\u0903\u0964\u0938\u0930\u094d\u0935\u093e\u0930\u092e\u094d\u092d\u092a\u0930\u093f\u0924\u094d\u092f\u093e\u0917\u0940 \u092f\u094b \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u0903 \u0938 \u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u0903\u0964\u096412.16\u0964\u0964", "r": "anapek\u1e63ha\u1e25 \u015bhuchir dak\u1e63ha ud\u0101s\u012bno gata-vyatha\u1e25\nsarv\u0101rambha-parity\u0101g\u012b yo mad-bhakta\u1e25 sa me priya\u1e25", "t": "He who is free from wants, pure, expert, unconcerned, and free from pain, renouncing all undertakings and commencements, he who is devoted to Me is dear to Me."}, {"c": 12, "v": 17, "s": "\u092f\u094b \u0928 \u0939\u0943\u0937\u094d\u092f\u0924\u093f \u0928 \u0926\u094d\u0935\u0947\u0937\u094d\u091f\u093f \u0928 \u0936\u094b\u091a\u0924\u093f \u0928 \u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0924\u093f\u0964\u0936\u0941\u092d\u093e\u0936\u0941\u092d\u092a\u0930\u093f\u0924\u094d\u092f\u093e\u0917\u0940 \u092d\u0915\u094d\u093f\u0924\u092e\u093e\u0928\u094d\u092f\u0903 \u0938 \u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u0903\u0964\u096412.17\u0964\u0964", "r": "yo na h\u1e5bi\u1e63hyati na dve\u1e63h\u1e6di na \u015bhochati na k\u0101\u1e45k\u1e63hati\n\u015bhubh\u0101\u015bhubha-parity\u0101g\u012b bhaktim\u0101n ya\u1e25 sa me priya\u1e25", "t": "He who neither rejoices nor hates, nor grieves nor desires, renouncing both good and evil, and who is full of devotion, is dear to Me."}, {"c": 12, "v": 18, "s": "\u0938\u092e\u0903 \u0936\u0924\u094d\u0930\u094c \u091a \u092e\u093f\u0924\u094d\u0930\u0947 \u091a \u0924\u0925\u093e \u092e\u093e\u0928\u093e\u092a\u092e\u093e\u0928\u092f\u094b\u0903\u0964\u0936\u0940\u0924\u094b\u0937\u094d\u0923\u0938\u0941\u0916\u0926\u0941\u0903\u0916\u0947\u0937\u0941 \u0938\u092e\u0903 \u0938\u0919\u094d\u0917\u0935\u093f\u0935\u0930\u094d\u091c\u093f\u0924\u0903\u0964\u096412.18\u0964\u0964", "r": "sama\u1e25 \u015bhatrau cha mitre cha tath\u0101 m\u0101n\u0101pam\u0101nayo\u1e25\n\u015bh\u012bto\u1e63h\u1e47a-sukha-du\u1e25khe\u1e63hu sama\u1e25 sa\u1e45ga-vivarjita\u1e25", "t": "He who is the same to foe and friend, and also in honor and dishonor, who is the same in cold and heat, in pleasure and pain, and who is free from attachment."}, {"c": 12, "v": 19, "s": "\u0924\u0941\u0932\u094d\u092f\u0928\u093f\u0928\u094d\u0926\u093e\u0938\u094d\u0924\u0941\u0924\u093f\u0930\u094d\u092e\u094c\u0928\u0940 \u0938\u0928\u094d\u0924\u0941\u0937\u094d\u091f\u094b \u092f\u0947\u0928\u0915\u0947\u0928\u091a\u093f\u0924\u094d\u0964\u0905\u0928\u093f\u0915\u0947\u0924\u0903 \u0938\u094d\u0925\u093f\u0930\u092e\u0924\u093f\u0930\u094d\u092d\u0915\u094d\u093f\u0924\u092e\u093e\u0928\u094d\u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u094b \u0928\u0930\u0903\u0964\u096412.19\u0964\u0964", "r": "tulya-nind\u0101-stutir maun\u012b santu\u1e63h\u1e6do yena kenachit\naniketa\u1e25 sthira-matir bhaktim\u0101n me priyo nara\u1e25", "t": "He to whom censure and praise are equal, who is silent, content with anything, homeless, of a steady mind, and full of devotion; that man is dear to me."}, {"c": 12, "v": 20, "s": "\u092f\u0947 \u0924\u0941 \u0927\u0930\u094d\u092e\u094d\u092f\u093e\u092e\u0943\u0924\u092e\u093f\u0926\u0902 \u092f\u0925\u094b\u0915\u094d\u0924\u0902 \u092a\u0930\u094d\u092f\u0941\u092a\u093e\u0938\u0924\u0947\u0964\u0936\u094d\u0930\u0926\u094d\u0926\u0927\u093e\u0928\u093e \u092e\u0924\u094d\u092a\u0930\u092e\u093e \u092d\u0915\u094d\u0924\u093e\u0938\u094d\u0924\u0947\u093d\u0924\u0940\u0935 \u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u093e\u0903\u0964\u096412.20\u0964\u0964", "r": "ye tu dharmy\u0101m\u1e5bitam ida\u1e41 yathokta\u1e41 paryup\u0101sate\n\u015bhraddadh\u0101n\u0101 mat-param\u0101 bhakt\u0101s te \u2019t\u012bva me priy\u0101\u1e25", "t": "They who follow this immortal Dharma, endowed with faith and regarding Me as their supreme goal, are exceedingly dear to Me."}, {"c": 13, "v": 1, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\n\n\u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u092a\u0941\u0930\u0941\u0937\u0902 \u091a\u0948\u0935 \u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0902 \u0915\u094d\u0937\u0947\u0924\u094d\u0930\u091c\u094d\u091e\u092e\u0947\u0935 \u091a\u0964\n\n\u090f\u0924\u0926\u094d\u0935\u0947\u0926\u093f\u0924\u0941\u092e\u093f\u091a\u094d\u091b\u093e\u092e\u093f \u091c\u094d\u091e\u093e\u0928\u0902 \u091c\u094d\u091e\u0947\u092f\u0902 \u091a \u0915\u0947\u0936\u0935\u0964\u096413.1\u0964\u0964", "r": "arjuna uv\u0101cha\nprak\u1e5biti\u1e41 puru\u1e63ha\u1e41 chaiva k\u1e63hetra\u1e41 k\u1e63hetra-j\u00f1am eva cha\netad veditum ichchh\u0101mi j\u00f1\u0101na\u1e41 j\u00f1eya\u1e41 cha ke\u015bhava", "t": "Arjuna said, \"I wish to learn about Nature and the Spirit, the field and the knower of the field, knowledge and that which ought to be known, O Kesava.\""}, {"c": 13, "v": 2, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\u0907\u0926\u0902 \u0936\u0930\u0940\u0930\u0902 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0915\u094d\u0937\u0947\u0924\u094d\u0930\u092e\u093f\u0924\u094d\u092f\u092d\u093f\u0927\u0940\u092f\u0924\u0947\u0964\u090f\u0924\u0926\u094d\u092f\u094b \u0935\u0947\u0924\u094d\u0924\u093f \u0924\u0902 \u092a\u094d\u0930\u093e\u0939\u0941\u0903 \u0915\u094d\u0937\u0947\u0924\u094d\u0930\u091c\u094d\u091e \u0907\u0924\u093f \u0924\u0926\u094d\u0935\u093f\u0926\u0903\u0964\u096413.2\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\nida\u1e41 \u015bhar\u012bra\u1e41 kaunteya k\u1e63hetram ity abhidh\u012byate\netad yo vetti ta\u1e41 pr\u0101hu\u1e25 k\u1e63hetra-j\u00f1a iti tad-vida\u1e25", "t": "The Blessed Lord said, \"O Arjuna, this body is called the field; he who knows it is called the knower of the field by those who know them.\""}, {"c": 13, "v": 3, "s": "\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u091c\u094d\u091e\u0902 \u091a\u093e\u092a\u093f \u092e\u093e\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u0938\u0930\u094d\u0935\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0947\u0937\u0941 \u092d\u093e\u0930\u0924\u0964\n\n\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u091c\u094d\u091e\u092f\u094b\u0930\u094d\u091c\u094d\u091e\u093e\u0928\u0902 \u092f\u0924\u094d\u0924\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u0902 \u092e\u0924\u0902 \u092e\u092e\u0964\u096413.3\u0964\u0964", "r": "k\u1e63hetra-j\u00f1a\u1e41 ch\u0101pi m\u0101\u1e41 viddhi sarva-k\u1e63hetre\u1e63hu bh\u0101rata\nk\u1e63hetra-k\u1e63hetraj\u00f1ayor j\u00f1\u0101na\u1e41 yat taj j\u00f1\u0101na\u1e41 mata\u1e41 mama", "t": "Do thou also know Me as the knower of the field in all fields, O Arjuna. Knowledge of both the field and the knower of the field is considered by Me to be the knowledge."}, {"c": 13, "v": 4, "s": "\u0924\u0924\u094d\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0902 \u092f\u091a\u094d\u091a \u092f\u093e\u0926\u0943\u0915\u094d \u091a \u092f\u0926\u094d\u0935\u093f\u0915\u093e\u0930\u093f \u092f\u0924\u0936\u094d\u091a \u092f\u0924\u094d\u0964\u0938 \u091a \u092f\u094b \u092f\u0924\u094d\u092a\u094d\u0930\u092d\u093e\u0935\u0936\u094d\u091a \u0924\u0924\u094d\u0938\u092e\u093e\u0938\u0947\u0928 \u092e\u0947 \u0936\u094d\u0930\u0943\u0923\u0941\u0964\u096413.4\u0964\u0964", "r": "tat k\u1e63hetra\u1e41 yach cha y\u0101d\u1e5bik cha yad-vik\u0101ri yata\u015bh cha yat\nsa cha yo yat-prabh\u0101va\u015bh cha tat sam\u0101sena me \u015bh\u1e5bi\u1e47u", "t": "Hear from Me in brief what the field is, of what nature it is, what its modifications are, whence it is, who He is, and what His powers are."}, {"c": 13, "v": 5, "s": "\u090b\u0937\u093f\u092d\u093f\u0930\u094d\u092c\u0939\u0941\u0927\u093e \u0917\u0940\u0924\u0902 \u091b\u0928\u094d\u0926\u094b\u092d\u093f\u0930\u094d\u0935\u093f\u0935\u093f\u0927\u0948\u0903 \u092a\u0943\u0925\u0915\u094d\u0964\u092c\u094d\u0930\u0939\u094d\u092e\u0938\u0942\u0924\u094d\u0930\u092a\u0926\u0948\u0936\u094d\u091a\u0948\u0935 \u0939\u0947\u0924\u0941\u092e\u0926\u094d\u092d\u093f\u0930\u094d\u0935\u093f\u0928\u093f\u0936\u094d\u093f\u091a\u0924\u0948\u0903\u0964\u096413.5\u0964\u0964", "r": "\u1e5bi\u1e63hibhir bahudh\u0101 g\u012bta\u1e41 chhandobhir vividhai\u1e25 p\u1e5bithak\nbrahma-s\u016btra-padai\u015bh chaiva hetumadbhir vini\u015bhchitai\u1e25", "t": "Sages have sung in many ways, with various distinctive chants and also with suggestive words indicative of the Absolute, full of reasoning and decisive."}, {"c": 13, "v": 6, "s": "\u092e\u0939\u093e\u092d\u0942\u0924\u093e\u0928\u094d\u092f\u0939\u0919\u094d\u0915\u093e\u0930\u094b \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u0935\u094d\u092f\u0915\u094d\u0924\u092e\u0947\u0935 \u091a\u0964\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0923\u093f \u0926\u0936\u0948\u0915\u0902 \u091a \u092a\u091e\u094d\u091a \u091a\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0917\u094b\u091a\u0930\u093e\u0903\u0964\u096413.6\u0964\u0964", "r": "mah\u0101-bh\u016bt\u0101ny ahank\u0101ro buddhir avyaktam eva cha\nindriy\u0101\u1e47i da\u015bhaika\u1e41 cha pa\u00f1cha chendriya-gochar\u0101\u1e25", "t": "The great elements, egoism, intellect, and also the Unmanifested Nature, the ten senses, and one mind, and the five objects of the senses."}, {"c": 13, "v": 7, "s": "\u0907\u091a\u094d\u091b\u093e \u0926\u094d\u0935\u0947\u0937\u0903 \u0938\u0941\u0916\u0902 \u0926\u0941\u0903\u0916\u0902 \u0938\u0919\u094d\u0918\u093e\u0924\u0936\u094d\u091a\u0947\u0924\u0928\u093e\u0927\u0943\u0924\u093f\u0903\u0964\u090f\u0924\u0924\u094d\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0902 \u0938\u092e\u093e\u0938\u0947\u0928 \u0938\u0935\u093f\u0915\u093e\u0930\u092e\u0941\u0926\u093e\u0939\u0943\u0924\u092e\u094d\u0964\u096413.7\u0964\u0964", "r": "ichchh\u0101 dve\u1e63ha\u1e25 sukha\u1e41 du\u1e25kha\u1e41 sa\u1e45gh\u0101ta\u015bh chetan\u0101 dh\u1e5biti\u1e25\netat k\u1e63hetra\u1e41 sam\u0101sena sa-vik\u0101ram ud\u0101h\u1e5bitam", "t": "Desire, hatred, pleasure, pain, the aggregate (body), intelligence, and fortitude\u2014the field has thus been briefly described with its modifications."}, {"c": 13, "v": 8, "s": "\u0905\u092e\u093e\u0928\u093f\u0924\u094d\u0935\u092e\u0926\u092e\u094d\u092d\u093f\u0924\u094d\u0935\u092e\u0939\u093f\u0902\u0938\u093e \u0915\u094d\u0937\u093e\u0928\u094d\u0924\u093f\u0930\u093e\u0930\u094d\u091c\u0935\u092e\u094d\u0964\u0906\u091a\u093e\u0930\u094d\u092f\u094b\u092a\u093e\u0938\u0928\u0902 \u0936\u094c\u091a\u0902 \u0938\u094d\u0925\u0948\u0930\u094d\u092f\u092e\u093e\u0924\u094d\u092e\u0935\u093f\u0928\u093f\u0917\u094d\u0930\u0939\u0903\u0964\u096413.8\u0964\u0964", "r": "am\u0101nitvam adambhitvam ahins\u0101 k\u1e63h\u0101ntir \u0101rjavam\n\u0101ch\u0101ryop\u0101sana\u1e41 \u015bhaucha\u1e41 sthairyam \u0101tma-vinigraha\u1e25", "t": "Humility, unpretentiousness, non-injury, forgiveness, uprightness, service to the teacher, purity, steadfastness, and self-control."}, {"c": 13, "v": 9, "s": "\u0907\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u093e\u0930\u094d\u0925\u0947\u0937\u0941 \u0935\u0948\u0930\u093e\u0917\u094d\u092f\u092e\u0928\u0939\u0919\u094d\u0915\u093e\u0930 \u090f\u0935 \u091a\u0964\u091c\u0928\u094d\u092e\u092e\u0943\u0924\u094d\u092f\u0941\u091c\u0930\u093e\u0935\u094d\u092f\u093e\u0927\u093f\u0926\u0941\u0903\u0916\u0926\u094b\u0937\u093e\u0928\u0941\u0926\u0930\u094d\u0936\u0928\u092e\u094d\u0964\u096413.9\u0964\u0964", "r": "indriy\u0101rthe\u1e63hu vair\u0101gyam anahank\u0101ra eva cha\njanma-m\u1e5bityu-jar\u0101-vy\u0101dhi-du\u1e25kha-do\u1e63h\u0101nudar\u015bhanam", "t": "Indifference to the objects of the senses and also absence of egoism; perceiving the evil in birth, death, old age, sickness, and pain."}, {"c": 13, "v": 10, "s": "\u0905\u0938\u0915\u094d\u093f\u0924\u0930\u0928\u092d\u093f\u0937\u094d\u0935\u0919\u094d\u0917\u0903 \u092a\u0941\u0924\u094d\u0930\u0926\u093e\u0930\u0917\u0943\u0939\u093e\u0926\u093f\u0937\u0941\u0964\u0928\u093f\u0924\u094d\u092f\u0902 \u091a \u0938\u092e\u091a\u093f\u0924\u094d\u0924\u0924\u094d\u0935\u092e\u093f\u0937\u094d\u091f\u093e\u0928\u093f\u0937\u094d\u091f\u094b\u092a\u092a\u0924\u094d\u0924\u093f\u0937\u0941\u0964\u096413.10\u0964\u0964", "r": "asaktir anabhi\u1e63hva\u1e45ga\u1e25 putra-d\u0101ra-g\u1e5bih\u0101di\u1e63hu\nnitya\u1e41 cha sama-chittatvam i\u1e63h\u1e6d\u0101ni\u1e63h\u1e6dopapatti\u1e63hu", "t": "Non-attachment, non-identification of the Self with son, wife, home, and the rest, and constant even-mindedness in the face of the attainment of both desirable and undesirable."}, {"c": 13, "v": 11, "s": "\u092e\u092f\u093f \u091a\u093e\u0928\u0928\u094d\u092f\u092f\u094b\u0917\u0947\u0928 \u092d\u0915\u094d\u093f\u0924\u0930\u0935\u094d\u092f\u092d\u093f\u091a\u093e\u0930\u093f\u0923\u0940\u0964\u0935\u093f\u0935\u093f\u0915\u094d\u0924\u0926\u0947\u0936\u0938\u0947\u0935\u093f\u0924\u094d\u0935\u092e\u0930\u0924\u093f\u0930\u094d\u091c\u0928\u0938\u0902\u0938\u0926\u093f\u0964\u096413.11\u0964\u0964", "r": "mayi ch\u0101nanya-yogena bhaktir avyabhich\u0101ri\u1e47\u012b\nvivikta-de\u015bha-sevitvam aratir jana-sansadi", "t": "Unswerving devotion to Me through the Yoga of non-separation, resorting to solitary places, and a distaste for the company of people."}, {"c": 13, "v": 12, "s": "\u0905\u0927\u094d\u092f\u093e\u0924\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u0928\u093f\u0924\u094d\u092f\u0924\u094d\u0935\u0902 \u0924\u0924\u094d\u0924\u094d\u0935\u091c\u094d\u091e\u093e\u0928\u093e\u0930\u094d\u0925\u0926\u0930\u094d\u0936\u0928\u092e\u094d\u0964\u090f\u0924\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u092e\u093f\u0924\u093f \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u092e\u091c\u094d\u091e\u093e\u0928\u0902 \u092f\u0926\u0924\u094b\u0928\u094d\u092f\u0925\u093e\u0964\u096413.12\u0964\u0964", "r": "adhy\u0101tma-j\u00f1\u0101na-nityatva\u1e41 tattva-j\u00f1\u0101n\u0101rtha-dar\u015bhanam\netaj j\u00f1\u0101nam iti proktam aj\u00f1\u0101na\u1e41 yad ato \u2019nyath\u0101", "t": "Constancy in Self-knowledge, the perception of the end of true knowledge\u2014this is declared to be knowledge, and what is opposed to it is ignorance."}, {"c": 13, "v": 13, "s": "\u091c\u094d\u091e\u0947\u092f\u0902 \u092f\u0924\u094d\u0924\u0924\u094d\u092a\u094d\u0930\u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u093f \u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e\u093d\u092e\u0943\u0924\u092e\u0936\u094d\u0928\u0941\u0924\u0947\u0964\u0905\u0928\u093e\u0926\u093f\u092e\u0924\u094d\u092a\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0928 \u0938\u0924\u094d\u0924\u0928\u094d\u0928\u093e\u0938\u0926\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u096413.13\u0964\u0964", "r": "j\u00f1eya\u1e41 yat tat pravak\u1e63hy\u0101mi yaj j\u00f1\u0101tv\u0101m\u1e5bitam a\u015bhnute\nan\u0101di mat-para\u1e41 brahma na sat tan n\u0101sad uchyate", "t": "I will declare that which is to be known, knowing which one attains immortality; the beginningless Supreme Brahman, which is neither being nor non-being."}, {"c": 13, "v": 14, "s": "\u0938\u0930\u094d\u0935\u0924\u0903 \u092a\u093e\u0923\u093f\u092a\u093e\u0926\u0902 \u0924\u0924\u094d\u0938\u0930\u094d\u0935\u0924\u094b\u093d\u0915\u094d\u0937\u093f\u0936\u093f\u0930\u094b\u092e\u0941\u0916\u092e\u094d\u0964\u0938\u0930\u094d\u0935\u0924\u0903 \u0936\u094d\u0930\u0941\u0924\u093f\u092e\u0932\u094d\u0932\u094b\u0915\u0947 \u0938\u0930\u094d\u0935\u092e\u093e\u0935\u0943\u0924\u094d\u092f \u0924\u093f\u0937\u094d\u0920\u0924\u093f\u0964\u096413.14\u0964\u0964", "r": "sarvata\u1e25 p\u0101\u1e47i-p\u0101da\u1e41 tat sarvato \u2019k\u1e63hi-\u015bhiro-mukham\nsarvata\u1e25 \u015bhrutimal loke sarvam \u0101v\u1e5bitya ti\u1e63h\u1e6dhati", "t": "With hands and feet everywhere, with eyes, heads, and mouths everywhere, with ears everywhere, He exists in the worlds, enveloping all."}, {"c": 13, "v": 15, "s": "\u0938\u0930\u094d\u0935\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0917\u0941\u0923\u093e\u092d\u093e\u0938\u0902 \u0938\u0930\u094d\u0935\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0935\u093f\u0935\u0930\u094d\u091c\u093f\u0924\u092e\u094d\u0964\u0905\u0938\u0915\u094d\u0924\u0902 \u0938\u0930\u094d\u0935\u092d\u0943\u091a\u094d\u091a\u0948\u0935 \u0928\u093f\u0930\u094d\u0917\u0941\u0923\u0902 \u0917\u0941\u0923\u092d\u094b\u0915\u094d\u0924\u0943 \u091a\u0964\u096413.15\u0964\u0964", "r": "sarvendriya-gu\u1e47\u0101bh\u0101sa\u1e41 sarvendriya-vivarjitam\nasakta\u1e41 sarva-bh\u1e5bich chaiva nirgu\u1e47a\u1e41 gu\u1e47a-bhokt\u1e5bi cha", "t": "Shining by the functions of all the senses, yet without being attached to them; unattached, yet supporting all; devoid of qualities, yet the experiencer of them."}, {"c": 13, "v": 16, "s": "\u092c\u0939\u093f\u0930\u0928\u094d\u0924\u0936\u094d\u091a \u092d\u0942\u0924\u093e\u0928\u093e\u092e\u091a\u0930\u0902 \u091a\u0930\u092e\u0947\u0935 \u091a\u0964\u0938\u0942\u0915\u094d\u0937\u094d\u092e\u0924\u094d\u0935\u093e\u0924\u094d\u0924\u0926\u0935\u093f\u091c\u094d\u091e\u0947\u092f\u0902 \u0926\u0942\u0930\u0938\u094d\u0925\u0902 \u091a\u093e\u0928\u094d\u0924\u093f\u0915\u0947 \u091a \u0924\u0924\u094d\u0964\u096413.16\u0964\u0964", "r": "bahir anta\u015bh cha bh\u016bt\u0101n\u0101m achara\u1e41 charam eva cha\ns\u016bk\u1e63hmatv\u0101t tad avij\u00f1eya\u1e41 d\u016bra-stha\u1e41 ch\u0101ntike cha tat", "t": "It is within and without all beings, both the unmoving and the moving; It is subtle and unknowable, and It is near and far away."}, {"c": 13, "v": 17, "s": "\u0905\u0935\u093f\u092d\u0915\u094d\u0924\u0902 \u091a \u092d\u0942\u0924\u0947\u0937\u0941 \u0935\u093f\u092d\u0915\u094d\u0924\u092e\u093f\u0935 \u091a \u0938\u094d\u0925\u093f\u0924\u092e\u094d\u0964\u092d\u0942\u0924\u092d\u0930\u094d\u0924\u0943 \u091a \u0924\u091c\u094d\u091c\u094d\u091e\u0947\u092f\u0902 \u0917\u094d\u0930\u0938\u093f\u0937\u094d\u0923\u0941 \u092a\u094d\u0930\u092d\u0935\u093f\u0937\u094d\u0923\u0941 \u091a\u0964\u096413.17\u0964\u0964", "r": "avibhakta\u1e41 cha bh\u016bte\u1e63hu vibhaktam iva cha sthitam\nbh\u016bta-bhart\u1e5bi cha taj j\u00f1eya\u1e41 grasi\u1e63h\u1e47u prabhavi\u1e63h\u1e47u cha", "t": "Undivided yet, It exists as if divided in beings; It is to be known as the supporter of beings; It devours and It generates."}, {"c": 13, "v": 18, "s": "\u091c\u094d\u092f\u094b\u0924\u093f\u0937\u093e\u092e\u092a\u093f \u0924\u091c\u094d\u091c\u094d\u092f\u094b\u0924\u093f\u0938\u094d\u0924\u092e\u0938\u0903 \u092a\u0930\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u091c\u094d\u091e\u093e\u0928\u0902 \u091c\u094d\u091e\u0947\u092f\u0902 \u091c\u094d\u091e\u093e\u0928\u0917\u092e\u094d\u092f\u0902 \u0939\u0943\u0926\u093f \u0938\u0930\u094d\u0935\u0938\u094d\u092f \u0935\u093f\u0937\u094d\u0920\u093f\u0924\u092e\u094d\u0964\u096413.18\u0964\u0964", "r": "jyoti\u1e63h\u0101m api taj jyotis tamasa\u1e25 param uchyate\nj\u00f1\u0101na\u1e41 j\u00f1eya\u1e41 j\u00f1\u0101na-gamya\u1e41 h\u1e5bidi sarvasya vi\u1e63h\u1e6dhitam", "t": "That Light of all lights is said to be beyond darkness: knowledge, the knowable, and the goal of knowledge, seated in the hearts of all."}, {"c": 13, "v": 19, "s": "\u0907\u0924\u093f \u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0902 \u0924\u0925\u093e \u091c\u094d\u091e\u093e\u0928\u0902 \u091c\u094d\u091e\u0947\u092f\u0902 \u091a\u094b\u0915\u094d\u0924\u0902 \u0938\u092e\u093e\u0938\u0924\u0903\u0964\u092e\u0926\u094d\u092d\u0915\u094d\u0924 \u090f\u0924\u0926\u094d\u0935\u093f\u091c\u094d\u091e\u093e\u092f \u092e\u0926\u094d\u092d\u093e\u0935\u093e\u092f\u094b\u092a\u092a\u0926\u094d\u092f\u0924\u0947\u0964\u096413.19\u0964\u0964", "r": "iti k\u1e63hetra\u1e41 tath\u0101 j\u00f1\u0101na\u1e41 j\u00f1eya\u1e41 chokta\u1e41 sam\u0101sata\u1e25\nmad-bhakta etad vij\u00f1\u0101ya mad-bh\u0101v\u0101yopapadyate", "t": "Thus, the field, as well as knowledge and the knowable, have been briefly stated. My devotee, knowing this, enters into My being."}, {"c": 13, "v": 20, "s": "\u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u092a\u0941\u0930\u0941\u0937\u0902 \u091a\u0948\u0935 \u0935\u093f\u0926\u094d\u0927\u094d\u092f\u0928\u093e\u0926\u0940 \u0909\u092d\u093e\u0935\u092a\u093f\u0964\u0935\u093f\u0915\u093e\u0930\u093e\u0902\u0936\u094d\u091a \u0917\u0941\u0923\u093e\u0902\u0936\u094d\u091a\u0948\u0935 \u0935\u093f\u0926\u094d\u0927\u093f \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0938\u0902\u092d\u0935\u093e\u0928\u094d\u0964\u096413.20\u0964\u0964", "r": "prak\u1e5biti\u1e41 puru\u1e63ha\u1e41 chaiva viddhy an\u0101d\u012b ubh\u0101v api\nvik\u0101r\u0101n\u015bh cha gu\u1e47\u0101n\u015bh chaiva viddhi prak\u1e5biti-sambhav\u0101n", "t": "Know that Nature (matter) and the Spirit are both beginningless, and know also that all modifications and qualities are born from Nature."}, {"c": 13, "v": 21, "s": "\u0915\u093e\u0930\u094d\u092f\u0915\u093e\u0930\u0923\u0915\u0930\u094d\u0924\u0943\u0924\u094d\u0935\u0947 \u0939\u0947\u0924\u0941\u0903 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0930\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u092a\u0941\u0930\u0941\u0937\u0903 \u0938\u0941\u0916\u0926\u0941\u0903\u0916\u093e\u0928\u093e\u0902 \u092d\u094b\u0915\u094d\u0924\u0943\u0924\u094d\u0935\u0947 \u0939\u0947\u0924\u0941\u0930\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u096413.21\u0964\u0964", "r": "k\u0101rya-k\u0101ra\u1e47a-kart\u1e5bitve hetu\u1e25 prak\u1e5bitir uchyate\npuru\u1e63ha\u1e25 sukha-du\u1e25kh\u0101n\u0101\u1e41 bhokt\u1e5bitve hetur uchyate", "t": "In the production of the effect and the cause, Nature (matter) is said to be the cause; in the experience of pleasure and pain, the soul is said to be the one responsible."}, {"c": 13, "v": 22, "s": "\u092a\u0941\u0930\u0941\u0937\u0903 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0938\u094d\u0925\u094b \u0939\u093f \u092d\u0941\u0919\u094d\u0915\u094d\u0924\u0947 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u091c\u093e\u0928\u094d\u0917\u0941\u0923\u093e\u0928\u094d\u0964\u0915\u093e\u0930\u0923\u0902 \u0917\u0941\u0923\u0938\u0919\u094d\u0917\u094b\u093d\u0938\u094d\u092f \u0938\u0926\u0938\u0926\u094d\u092f\u094b\u0928\u093f\u091c\u0928\u094d\u092e\u0938\u0941\u0964\u096413.22\u0964\u0964", "r": "puru\u1e63ha\u1e25 prak\u1e5biti-stho hi bhu\u1e45kte prak\u1e5biti-j\u0101n gu\u1e47\u0101n\nk\u0101ra\u1e47a\u1e41 gu\u1e47a-sa\u1e45go \u2019sya sad-asad-yoni-janmasu", "t": "The soul seated in Nature experiences the qualities born of Nature; attachment to the qualities is the cause of its birth in good and evil wombs."}, {"c": 13, "v": 23, "s": "\u0909\u092a\u0926\u094d\u0930\u0937\u094d\u091f\u093e\u093d\u0928\u0941\u092e\u0928\u094d\u0924\u093e \u091a \u092d\u0930\u094d\u0924\u093e \u092d\u094b\u0915\u094d\u0924\u093e \u092e\u0939\u0947\u0936\u094d\u0935\u0930\u0903\u0964\u092a\u0930\u092e\u093e\u0924\u094d\u092e\u0947\u0924\u093f \u091a\u093e\u092a\u094d\u092f\u0941\u0915\u094d\u0924\u094b \u0926\u0947\u0939\u0947\u093d\u0938\u094d\u092e\u093f\u0928\u094d\u092a\u0941\u0930\u0941\u0937\u0903 \u092a\u0930\u0903\u0964\u096413.23\u0964\u0964", "r": "upadra\u1e63h\u1e6d\u0101numant\u0101 cha bhart\u0101 bhokt\u0101 mahe\u015bhvara\u1e25\nparam\u0101tmeti ch\u0101py ukto dehe \u2019smin puru\u1e63ha\u1e25 para\u1e25", "t": "The Supreme Soul in this body is also called the observer, the permitter, the sustainer, the enjoyer, the great Lord, and the Supreme Self."}, {"c": 13, "v": 24, "s": "\u092f \u090f\u0935\u0902 \u0935\u0947\u0924\u094d\u0924\u093f \u092a\u0941\u0930\u0941\u0937\u0902 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0902 \u091a \u0917\u0941\u0923\u0948\u0903\u0938\u0939\u0964\u0938\u0930\u094d\u0935\u0925\u093e \u0935\u0930\u094d\u0924\u092e\u093e\u0928\u094b\u093d\u092a\u093f \u0928 \u0938 \u092d\u0942\u092f\u094b\u093d\u092d\u093f\u091c\u093e\u092f\u0924\u0947\u0964\u096413.24\u0964\u0964", "r": "ya eva\u1e41 vetti puru\u1e63ha\u1e41 prak\u1e5biti\u1e41 cha gu\u1e47ai\u1e25 saha\nsarvath\u0101 vartam\u0101no \u2019pi na sa bh\u016byo \u2019bhij\u0101yate", "t": "He who thus knows the Spirit and Matter together with their qualities, in whatever condition he may be, he is not reborn."}, {"c": 13, "v": 25, "s": "\u0927\u094d\u092f\u093e\u0928\u0947\u0928\u093e\u0924\u094d\u092e\u0928\u093f \u092a\u0936\u094d\u092f\u0928\u094d\u0924\u093f \u0915\u0947\u091a\u093f\u0926\u093e\u0924\u094d\u092e\u093e\u0928\u092e\u093e\u0924\u094d\u092e\u0928\u093e\u0964\u0905\u0928\u094d\u092f\u0947 \u0938\u093e\u0902\u0916\u094d\u092f\u0947\u0928 \u092f\u094b\u0917\u0947\u0928 \u0915\u0930\u094d\u092e\u092f\u094b\u0917\u0947\u0928 \u091a\u093e\u092a\u0930\u0947\u0964\u096413.25\u0964\u0964", "r": "dhy\u0101nen\u0101tmani pa\u015bhyanti kechid \u0101tm\u0101nam \u0101tman\u0101\nanye s\u0101nkhyena yogena karma-yogena ch\u0101pare", "t": "Some behold the Self within themselves through meditation, others through the Yoga of knowledge, and still others through the Yoga of action."}, {"c": 13, "v": 26, "s": "\u0905\u0928\u094d\u092f\u0947 \u0924\u094d\u0935\u0947\u0935\u092e\u091c\u093e\u0928\u0928\u094d\u0924\u0903 \u0936\u094d\u0930\u0941\u0924\u094d\u0935\u093e\u093d\u0928\u094d\u092f\u0947\u092d\u094d\u092f \u0909\u092a\u093e\u0938\u0924\u0947\u0964\u0924\u0947\u093d\u092a\u093f \u091a\u093e\u0924\u093f\u0924\u0930\u0928\u094d\u0924\u094d\u092f\u0947\u0935 \u092e\u0943\u0924\u094d\u092f\u0941\u0902 \u0936\u094d\u0930\u0941\u0924\u093f\u092a\u0930\u093e\u092f\u0923\u093e\u0903\u0964\u096413.26\u0964\u0964", "r": "anye tv evam aj\u0101nanta\u1e25 \u015bhrutv\u0101nyebhya up\u0101sate\nte \u2019pi ch\u0101titaranty eva m\u1e5bityu\u1e41 \u015bhruti-par\u0101ya\u1e47\u0101\u1e25", "t": "Others, too, who do not know thus, worship, having heard of It from others; they, too, cross beyond death, regarding what they have heard as the supreme refuge."}, {"c": 13, "v": 27, "s": "\u092f\u093e\u0935\u0924\u094d\u0938\u091e\u094d\u091c\u093e\u092f\u0924\u0947 \u0915\u093f\u091e\u094d\u091a\u093f\u0924\u094d\u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0938\u094d\u0925\u093e\u0935\u0930\u091c\u0919\u094d\u0917\u092e\u092e\u094d\u0964\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u091c\u094d\u091e\u0938\u0902\u092f\u094b\u0917\u093e\u0924\u094d\u0924\u0926\u094d\u0935\u093f\u0926\u094d\u0927\u093f \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\u096413.27\u0964\u0964", "r": "y\u0101vat sa\u00f1j\u0101yate ki\u00f1chit sattva\u1e41 sth\u0101vara-ja\u1e45gamam\nk\u1e63hetra-k\u1e63hetraj\u00f1a-sanyog\u0101t tad viddhi bharatar\u1e63habha", "t": "Wherever a being is born, whether unmoving or moving, know thou, O best of the Bharatas (Arjuna), that it is from the union of the field and its knower."}, {"c": 13, "v": 28, "s": "\u0938\u092e\u0902 \u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u092d\u0942\u0924\u0947\u0937\u0941 \u0924\u093f\u0937\u094d\u0920\u0928\u094d\u0924\u0902 \u092a\u0930\u092e\u0947\u0936\u094d\u0935\u0930\u092e\u094d\u0964\u0935\u093f\u0928\u0936\u094d\u092f\u0924\u094d\u0938\u094d\u0935\u0935\u093f\u0928\u0936\u094d\u092f\u0928\u094d\u0924\u0902 \u092f\u0903 \u092a\u0936\u094d\u092f\u0924\u093f \u0938 \u092a\u0936\u094d\u092f\u0924\u093f\u0964\u096413.28\u0964\u0964", "r": "sama\u1e41 sarve\u1e63hu bh\u016bte\u1e63hu ti\u1e63h\u1e6dhanta\u1e41 parame\u015bhvaram\nvina\u015bhyatsv avina\u015bhyanta\u1e41 ya\u1e25 pa\u015bhyati sa pa\u015bhyati", "t": "He who sees the Supreme Lord existing truly in all beings, the imperishable within the perishable, sees indeed."}, {"c": 13, "v": 29, "s": "\u0938\u092e\u0902 \u092a\u0936\u094d\u092f\u0928\u094d\u0939\u093f \u0938\u0930\u094d\u0935\u0924\u094d\u0930 \u0938\u092e\u0935\u0938\u094d\u0925\u093f\u0924\u092e\u0940\u0936\u094d\u0935\u0930\u092e\u094d\u0964\u0928 \u0939\u093f\u0928\u0938\u094d\u0924\u094d\u092f\u093e\u0924\u094d\u092e\u0928\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u0924\u0924\u094b \u092f\u093e\u0924\u093f \u092a\u0930\u093e\u0902 \u0917\u0924\u093f\u092e\u094d\u0964\u096413.29\u0964\u0964", "r": "sama\u1e41 pa\u015bhyan hi sarvatra samavasthitam \u012b\u015bhvaram\nna hinasty \u0101tman\u0101tm\u0101na\u1e41 tato y\u0101ti par\u0101\u1e41 gatim", "t": "For he who truly sees the same Lord dwelling everywhere does not destroy the Self by the self; rather, he attains the highest goal."}, {"c": 13, "v": 30, "s": "\u092a\u094d\u0930\u0915\u0943\u0924\u094d\u092f\u0948\u0935 \u091a \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0915\u094d\u0930\u093f\u092f\u092e\u093e\u0923\u093e\u0928\u093f \u0938\u0930\u094d\u0935\u0936\u0903\u0964\u092f\u0903 \u092a\u0936\u094d\u092f\u0924\u093f \u0924\u0925\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u092e\u0915\u0930\u094d\u0924\u093e\u0930\u0902 \u0938 \u092a\u0936\u094d\u092f\u0924\u093f\u0964\u096413.30\u0964\u0964", "r": "prak\u1e5bityaiva cha karm\u0101\u1e47i kriyam\u0101\u1e47\u0101ni sarva\u015bha\u1e25\nya\u1e25 pa\u015bhyati tath\u0101tm\u0101nam akart\u0101ra\u1e41 sa pa\u015bhyati", "t": "He sees, who sees that all actions are performed solely by Nature and that the Self is without action."}, {"c": 13, "v": 31, "s": "\u092f\u0926\u093e \u092d\u0942\u0924\u092a\u0943\u0925\u0917\u094d\u092d\u093e\u0935\u092e\u0947\u0915\u0938\u094d\u0925\u092e\u0928\u0941\u092a\u0936\u094d\u092f\u0924\u093f\u0964\u0924\u0924 \u090f\u0935 \u091a \u0935\u093f\u0938\u094d\u0924\u093e\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0938\u092e\u094d\u092a\u0926\u094d\u092f\u0924\u0947 \u0924\u0926\u093e\u0964\u096413.31\u0964\u0964", "r": "yad\u0101 bh\u016bta-p\u1e5bithag-bh\u0101vam eka-stham anupa\u015bhyati\ntata eva cha vist\u0101ra\u1e41 brahma sampadyate tad\u0101", "t": "When a person sees all beings as resting in the One and emanating from the One alone, they then become Brahman."}, {"c": 13, "v": 32, "s": "\u0905\u0928\u093e\u0926\u093f\u0924\u094d\u0935\u093e\u0928\u094d\u0928\u093f\u0930\u094d\u0917\u0941\u0923\u0924\u094d\u0935\u093e\u0924\u094d\u092a\u0930\u092e\u093e\u0924\u094d\u092e\u093e\u092f\u092e\u0935\u094d\u092f\u092f\u0903\u0964\u0936\u0930\u0940\u0930\u0938\u094d\u0925\u094b\u093d\u092a\u093f \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0928 \u0915\u0930\u094b\u0924\u093f \u0928 \u0932\u093f\u092a\u094d\u092f\u0924\u0947\u0964\u096413.32\u0964\u0964", "r": "an\u0101ditv\u0101n nirgu\u1e47atv\u0101t param\u0101tm\u0101yam avyaya\u1e25\n\u015bhar\u012bra-stho \u2019pi kaunteya na karoti na lipyate", "t": "Being without beginning, devoid of any qualities, the Supreme Self, imperishable, though dwelling in the body, O Arjuna, neither acts nor is tainted."}, {"c": 13, "v": 33, "s": "\u092f\u0925\u093e \u0938\u0930\u094d\u0935\u0917\u0924\u0902 \u0938\u094c\u0915\u094d\u0937\u094d\u092e\u094d\u092f\u093e\u0926\u093e\u0915\u093e\u0936\u0902 \u0928\u094b\u092a\u0932\u093f\u092a\u094d\u092f\u0924\u0947\u0964\u0938\u0930\u094d\u0935\u0924\u094d\u0930\u093e\u0935\u0938\u094d\u0925\u093f\u0924\u094b \u0926\u0947\u0939\u0947 \u0924\u0925\u093e\u093d\u093d\u0924\u094d\u092e\u093e \u0928\u094b\u092a\u0932\u093f\u092a\u094d\u092f\u0924\u0947\u0964\u096413.33\u0964\u0964", "r": "yath\u0101 sarva-gata\u1e41 sauk\u1e63hmy\u0101d \u0101k\u0101\u015bha\u1e41 nopalipyate\nsarvatr\u0101vasthito dehe tath\u0101tm\u0101 nopalipyate", "t": "As the all-pervading ether is not tainted, due to its subtlety, so the Self seated everywhere in the body is not tainted either."}, {"c": 13, "v": 34, "s": "\u092f\u0925\u093e \u092a\u094d\u0930\u0915\u093e\u0936\u092f\u0924\u094d\u092f\u0947\u0915\u0903 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0902 \u0932\u094b\u0915\u092e\u093f\u092e\u0902 \u0930\u0935\u093f\u0903\u0964\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0902 \u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0940 \u0924\u0925\u093e \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0902 \u092a\u094d\u0930\u0915\u093e\u0936\u092f\u0924\u093f \u092d\u093e\u0930\u0924\u0964\u096413.34\u0964\u0964", "r": "yath\u0101 prak\u0101\u015bhayaty eka\u1e25 k\u1e5bitsna\u1e41 lokam ima\u1e41 ravi\u1e25\nk\u1e63hetra\u1e41 k\u1e63hetr\u012b tath\u0101 k\u1e5bitsna\u1e41 prak\u0101\u015bhayati bh\u0101rata", "t": "Just as the one sun illuminates the entire world, so too does the Lord of the field (Supreme Self) illuminate the entire field, O Arjuna."}, {"c": 13, "v": 35, "s": "\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u0915\u094d\u0937\u0947\u0924\u094d\u0930\u091c\u094d\u091e\u092f\u094b\u0930\u0947\u0935\u092e\u0928\u094d\u0924\u0930\u0902 \u091c\u094d\u091e\u093e\u0928\u091a\u0915\u094d\u0937\u0941\u0937\u093e\u0964\u092d\u0942\u0924\u092a\u094d\u0930\u0915\u0943\u0924\u093f\u092e\u094b\u0915\u094d\u0937\u0902 \u091a \u092f\u0947 \u0935\u093f\u0926\u0941\u0930\u094d\u092f\u093e\u0928\u094d\u0924\u093f \u0924\u0947 \u092a\u0930\u092e\u094d\u0964\u096413.35\u0964\u0964", "r": "k\u1e63hetra-k\u1e63hetraj\u00f1ayor evam antara\u1e41 j\u00f1\u0101na-chak\u1e63hu\u1e63h\u0101\nbh\u016bta-prak\u1e5biti-mok\u1e63ha\u1e41 cha ye vidur y\u0101nti te param", "t": "They who, by the eye of knowledge, perceive the distinction between the field and its knower, as well as the liberation from the Nature of being, go to the Supreme."}, {"c": 14, "v": 1, "s": "\u0936\u094d\u0930\u0940 \u092d\u0917\u0935\u093e\u0928\u0941\u0935\u093e\u091a\u092a\u0930\u0902 \u092d\u0942\u092f\u0903 \u092a\u094d\u0930\u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u093f \u091c\u094d\u091e\u093e\u0928\u093e\u0928\u093e\u0902 \u091c\u094d\u091e\u093e\u0928\u092e\u0941\u0924\u094d\u0924\u092e\u092e\u094d\u0964\u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u092e\u0941\u0928\u092f\u0903 \u0938\u0930\u094d\u0935\u0947 \u092a\u0930\u093e\u0902 \u0938\u093f\u0926\u094d\u0927\u093f\u092e\u093f\u0924\u094b \u0917\u0924\u093e\u0903\u0964\u096414.1\u0964\u0964", "r": "\u015bhr\u012b-bhagav\u0101n uv\u0101cha\npara\u1e41 bh\u016bya\u1e25 pravak\u1e63hy\u0101mi j\u00f1\u0101n\u0101n\u0101\u1e41 j\u00f1\u0101nam uttamam\nyaj j\u00f1\u0101tv\u0101 munaya\u1e25 sarve par\u0101\u1e41 siddhim ito gat\u0101\u1e25", "t": "The Blessed Lord said, \"I will again declare to thee that supreme knowledge, the best of all knowledge, having known which all the sages have gone to supreme perfection after this life.\""}, {"c": 14, "v": 2, "s": "\u0907\u0926\u0902 \u091c\u094d\u091e\u093e\u0928\u092e\u0941\u092a\u093e\u0936\u094d\u0930\u093f\u0924\u094d\u092f \u092e\u092e \u0938\u093e\u0927\u0930\u094d\u092e\u094d\u092f\u092e\u093e\u0917\u0924\u093e\u0903\u0964\u0938\u0930\u094d\u0917\u0947\u093d\u092a\u093f \u0928\u094b\u092a\u091c\u093e\u092f\u0928\u094d\u0924\u0947 \u092a\u094d\u0930\u0932\u092f\u0947 \u0928 \u0935\u094d\u092f\u0925\u0928\u094d\u0924\u093f \u091a\u0964\u096414.2\u0964\u0964", "r": "ida\u1e41 j\u00f1\u0101nam up\u0101\u015bhritya mama s\u0101dharmyam \u0101gat\u0101\u1e25\nsarge \u2019pi nopaj\u0101yante pralaye na vyathanti cha", "t": "Those who, having taken refuge in this knowledge, have attained unity with Me, are neither born at the time of creation nor disturbed at the time of dissolution."}, {"c": 14, "v": 3, "s": "\u092e\u092e \u092f\u094b\u0928\u093f\u0930\u094d\u092e\u0939\u0926\u094d\u092c\u094d\u0930\u0939\u094d\u092e \u0924\u0938\u094d\u092e\u093f\u0928\u094d \u0917\u0930\u094d\u092d\u0902 \u0926\u0927\u093e\u092e\u094d\u092f\u0939\u092e\u094d\u0964\u0938\u0902\u092d\u0935\u0903 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u0924\u0924\u094b \u092d\u0935\u0924\u093f \u092d\u093e\u0930\u0924\u0964\u096414.3\u0964\u0964", "r": "mama yonir mahad brahma tasmin garbha\u1e41 dadh\u0101my aham\nsambhava\u1e25 sarva-bh\u016bt\u0101n\u0101\u1e41 tato bhavati bh\u0101rata", "t": "My womb is the great Brahma; in it I place the germ; thence, O Arjuna, is the birth of all beings."}, {"c": 14, "v": 4, "s": "\u0938\u0930\u094d\u0935\u092f\u094b\u0928\u093f\u0937\u0941 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u092e\u0942\u0930\u094d\u0924\u092f\u0903 \u0938\u092e\u094d\u092d\u0935\u0928\u094d\u0924\u093f \u092f\u093e\u0903\u0964\u0924\u093e\u0938\u093e\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u092e\u0939\u0926\u094d\u092f\u094b\u0928\u093f\u0930\u0939\u0902 \u092c\u0940\u091c\u092a\u094d\u0930\u0926\u0903 \u092a\u093f\u0924\u093e\u0964\u096414.4\u0964\u0964", "r": "sarva-yoni\u1e63hu kaunteya m\u016brtaya\u1e25 sambhavanti y\u0101\u1e25\nt\u0101s\u0101\u1e41 brahma mahad yonir aha\u1e41 b\u012bja-prada\u1e25 pit\u0101", "t": "Whatever forms are produced, O Arjuna, in any womb whatsoever, the great Brahma is their womb, and I am the seed-giving father."}, {"c": 14, "v": 5, "s": "\u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0930\u091c\u0938\u094d\u0924\u092e \u0907\u0924\u093f \u0917\u0941\u0923\u093e\u0903 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0938\u0902\u092d\u0935\u093e\u0903\u0964\u0928\u093f\u092c\u0927\u094d\u0928\u0928\u094d\u0924\u093f \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0926\u0947\u0939\u0947 \u0926\u0947\u0939\u093f\u0928\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u096414.5\u0964\u0964", "r": "sattva\u1e41 rajas tama iti gu\u1e47\u0101\u1e25 prak\u1e5biti-sambhav\u0101\u1e25\nnibadhnanti mah\u0101-b\u0101ho dehe dehinam avyayam", "t": "These qualities, O Arjuna, born of Nature, bind fast in the body of the embodied, the indestructible: purity, passion, and inertia."}, {"c": 14, "v": 6, "s": "\u0924\u0924\u094d\u0930 \u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0928\u093f\u0930\u094d\u092e\u0932\u0924\u094d\u0935\u093e\u0924\u094d\u092a\u094d\u0930\u0915\u093e\u0936\u0915\u092e\u0928\u093e\u092e\u092f\u092e\u094d\u0964\u0938\u0941\u0916\u0938\u0919\u094d\u0917\u0947\u0928 \u092c\u0927\u094d\u0928\u093e\u0924\u093f \u091c\u094d\u091e\u093e\u0928\u0938\u0919\u094d\u0917\u0947\u0928 \u091a\u093e\u0928\u0918\u0964\u096414.6\u0964\u0964", "r": "tatra sattva\u1e41 nirmalatv\u0101t prak\u0101\u015bhakam an\u0101mayam\nsukha-sa\u1e45gena badhn\u0101ti j\u00f1\u0101na-sa\u1e45gena ch\u0101nagha", "t": "Of these, sattva, which is luminous and healthy due to its stainlessness, binds one by attachment to happiness and knowledge, O sinless one."}, {"c": 14, "v": 7, "s": "\u0930\u091c\u094b \u0930\u093e\u0917\u093e\u0924\u094d\u092e\u0915\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u0924\u0943\u0937\u094d\u0923\u093e\u0938\u0919\u094d\u0917\u0938\u092e\u0941\u0926\u094d\u092d\u0935\u092e\u094d\u0964\u0924\u0928\u094d\u0928\u093f\u092c\u0927\u094d\u0928\u093e\u0924\u093f \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0915\u0930\u094d\u092e\u0938\u0919\u094d\u0917\u0947\u0928 \u0926\u0947\u0939\u093f\u0928\u092e\u094d\u0964\u096414.7\u0964\u0964", "r": "rajo r\u0101g\u0101tmaka\u1e41 viddhi t\u1e5bi\u1e63h\u1e47\u0101-sa\u1e45ga-samudbhavam\ntan nibadhn\u0101ti kaunteya karma-sa\u1e45gena dehinam", "t": "Know, O Arjuna, that Rajas is of the nature of passion, the source of thirst and attachment; it binds fast the embodied one by attachment to action."}, {"c": 14, "v": 8, "s": "\u0924\u092e\u0938\u094d\u0924\u094d\u0935\u091c\u094d\u091e\u093e\u0928\u091c\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u092e\u094b\u0939\u0928\u0902 \u0938\u0930\u094d\u0935\u0926\u0947\u0939\u093f\u0928\u093e\u092e\u094d\u0964\u092a\u094d\u0930\u092e\u093e\u0926\u093e\u0932\u0938\u094d\u092f\u0928\u093f\u0926\u094d\u0930\u093e\u092d\u093f\u0938\u094d\u0924\u0928\u094d\u0928\u093f\u092c\u0927\u094d\u0928\u093e\u0924\u093f \u092d\u093e\u0930\u0924\u0964\u096414.8\u0964\u0964", "r": "tamas tv aj\u00f1\u0101na-ja\u1e41 viddhi mohana\u1e41 sarva-dehin\u0101m\npram\u0101d\u0101lasya-nidr\u0101bhis tan nibadhn\u0101ti bh\u0101rata", "t": "But know thou Tamas to be born of ignorance, deluding all embodied beings; it binds fast, O Arjuna, through heedlessness, indolence, and sleep."}, {"c": 14, "v": 9, "s": "\u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u0938\u0941\u0916\u0947 \u0938\u091e\u094d\u091c\u092f\u0924\u093f \u0930\u091c\u0903 \u0915\u0930\u094d\u092e\u0923\u093f \u092d\u093e\u0930\u0924\u0964\u091c\u094d\u091e\u093e\u0928\u092e\u093e\u0935\u0943\u0924\u094d\u092f \u0924\u0941 \u0924\u092e\u0903 \u
