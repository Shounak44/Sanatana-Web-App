rity should not be relinquished."}, {"c": 18, "v": 4, "s": "\u0928\u093f\u0936\u094d\u091a\u092f\u0902 \u0936\u094d\u0930\u0943\u0923\u0941 \u092e\u0947 \u0924\u0924\u094d\u0930 \u0924\u094d\u092f\u093e\u0917\u0947 \u092d\u0930\u0924\u0938\u0924\u094d\u0924\u092e\u0964\u0924\u094d\u092f\u093e\u0917\u094b \u0939\u093f \u092a\u0941\u0930\u0941\u0937\u0935\u094d\u092f\u093e\u0918\u094d\u0930 \u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0903 \u0938\u0902\u092a\u094d\u0930\u0915\u0940\u0930\u094d\u0924\u093f\u0924\u0903\u0964\u096418.4\u0964\u0964", "r": "ni\u015bhchaya\u1e41 \u015bh\u1e5bi\u1e47u me tatra ty\u0101ge bharata-sattama\nty\u0101go hi puru\u1e63ha-vy\u0101ghra tri-vidha\u1e25 samprak\u012brtita\u1e25", "t": "Hear from Me the conclusion or the final truth about this abandonment, O best of the Bharatas; abandonment, indeed, O best of men, has been declared to be of three kinds."}, {"c": 18, "v": 5, "s": "\u092f\u091c\u094d\u091e\u0926\u093e\u0928\u0924\u092a\u0903\u0915\u0930\u094d\u092e \u0928 \u0924\u094d\u092f\u093e\u091c\u094d\u092f\u0902 \u0915\u093e\u0930\u094d\u092f\u092e\u0947\u0935 \u0924\u0924\u094d\u0964\u092f\u091c\u094d\u091e\u094b \u0926\u093e\u0928\u0902 \u0924\u092a\u0936\u094d\u091a\u0948\u0935 \u092a\u093e\u0935\u0928\u093e\u0928\u093f \u092e\u0928\u0940\u0937\u093f\u0923\u093e\u092e\u094d\u0964\u096418.5\u0964\u0964", "r": "yaj\u00f1a-d\u0101na-tapa\u1e25-karma na ty\u0101jya\u1e41 k\u0101ryam eva tat\nyaj\u00f1o d\u0101na\u1e41 tapa\u015bh chaiva p\u0101van\u0101ni man\u012b\u1e63hi\u1e47\u0101m", "t": "Acts of sacrifice, gift, and austerity should not be abandoned, but should be performed; for sacrifice, gift, and austerity are the purifiers of the wise."}, {"c": 18, "v": 6, "s": "\u090f\u0924\u093e\u0928\u094d\u092f\u092a\u093f \u0924\u0941 \u0915\u0930\u094d\u092e\u093e\u0923\u093f \u0938\u0919\u094d\u0917\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u092b\u0932\u093e\u0928\u093f \u091a\u0964\u0915\u0930\u094d\u0924\u0935\u094d\u092f\u093e\u0928\u0940\u0924\u093f \u092e\u0947 \u092a\u093e\u0930\u094d\u0925 \u0928\u093f\u0936\u094d\u093f\u091a\u0924\u0902 \u092e\u0924\u092e\u0941\u0924\u094d\u0924\u092e\u092e\u094d\u0964\u096418.6\u0964\u0964", "r": "et\u0101ny api tu karm\u0101\u1e47i sa\u1e45ga\u1e41 tyaktv\u0101 phal\u0101ni cha\nkartavy\u0101n\u012bti me p\u0101rtha ni\u015bhchita\u1e41 matam uttamam", "t": "But even these actions should be performed, leaving aside attachment and the desire for rewards, O Arjuna; this is my certain and most assured conviction."}, {"c": 18, "v": 7, "s": "\u0928\u093f\u092f\u0924\u0938\u094d\u092f \u0924\u0941 \u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0903 \u0915\u0930\u094d\u092e\u0923\u094b \u0928\u094b\u092a\u092a\u0926\u094d\u092f\u0924\u0947\u0964\u092e\u094b\u0939\u093e\u0924\u094d\u0924\u0938\u094d\u092f \u092a\u0930\u093f\u0924\u094d\u092f\u093e\u0917\u0938\u094d\u0924\u093e\u092e\u0938\u0903 \u092a\u0930\u093f\u0915\u0940\u0930\u094d\u0924\u093f\u0924\u0903\u0964\u096418.7\u0964\u0964", "r": "niyatasya tu sanny\u0101sa\u1e25 karma\u1e47o nopapadyate\nmoh\u0101t tasya parity\u0101gas t\u0101masa\u1e25 parik\u012brtita\u1e25", "t": "Verily, the renunciation of obligatory action is not proper; the abandonment of the same out of delusion is declared to be Tamasic."}, {"c": 18, "v": 8, "s": "\u0926\u0941\u0903\u0916\u092e\u093f\u0924\u094d\u092f\u0947\u0935 \u092f\u0924\u094d\u0915\u0930\u094d\u092e \u0915\u093e\u092f\u0915\u094d\u0932\u0947\u0936\u092d\u092f\u093e\u0924\u094d\u0924\u094d\u092f\u091c\u0947\u0924\u094d\u0964\u0938 \u0915\u0943\u0924\u094d\u0935\u093e \u0930\u093e\u091c\u0938\u0902 \u0924\u094d\u092f\u093e\u0917\u0902 \u0928\u0948\u0935 \u0924\u094d\u092f\u093e\u0917\u092b\u0932\u0902 \u0932\u092d\u0947\u0924\u094d\u0964\u096418.8\u0964\u0964", "r": "du\u1e25kham ity eva yat karma k\u0101ya-kle\u015bha-bhay\u0101t tyajet\nsa k\u1e5bitv\u0101 r\u0101jasa\u1e41 ty\u0101ga\u1e41 naiva ty\u0101ga-phala\u1e41 labhet", "t": "He who abandons action out of fear of bodily trouble (because it is painful), does not obtain the merit of renunciation by performing such Rajasic renunciation."}, {"c": 18, "v": 9, "s": "\u0915\u093e\u0930\u094d\u092f\u092e\u093f\u0924\u094d\u092f\u0947\u0935 \u092f\u0924\u094d\u0915\u0930\u094d\u092e \u0928\u093f\u092f\u0924\u0902 \u0915\u094d\u0930\u093f\u092f\u0924\u0947\u093d\u0930\u094d\u091c\u0941\u0928\u0964\u0938\u0919\u094d\u0917\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u092b\u0932\u0902 \u091a\u0948\u0935 \u0938 \u0924\u094d\u092f\u093e\u0917\u0903 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u094b \u092e\u0924\u0903\u0964\u096418.9\u0964\u0964", "r": "k\u0101ryam ity eva yat karma niyata\u1e41 kriyate \u2018rjuna\nsa\u1e45ga\u1e41 tyaktv\u0101 phala\u1e41 chaiva sa ty\u0101ga\u1e25 s\u0101ttviko mata\u1e25", "t": "Whatever obligatory action is done, O Arjuna, merely because it ought to be done, abandoning attachment and also the desire for reward, that renunciation is regarded as sattvic (pure)."}, {"c": 18, "v": 10, "s": "\u0928 \u0926\u094d\u0935\u0947\u0937\u094d\u091f\u094d\u092f\u0915\u0941\u0936\u0932\u0902 \u0915\u0930\u094d\u092e \u0915\u0941\u0936\u0932\u0947 \u0928\u093e\u0928\u0941\u0937\u091c\u094d\u091c\u0924\u0947\u0964\u0924\u094d\u092f\u093e\u0917\u0940 \u0938\u0924\u094d\u0924\u094d\u0935\u0938\u092e\u093e\u0935\u093f\u0937\u094d\u091f\u094b \u092e\u0947\u0927\u093e\u0935\u0940 \u091b\u093f\u0928\u094d\u0928\u0938\u0902\u0936\u092f\u0903\u0964\u096418.10\u0964\u0964", "r": "na dve\u1e63h\u1e6dy aku\u015bhala\u1e41 karma ku\u015bhale n\u0101nu\u1e63hajjate\nty\u0101g\u012b sattva-sam\u0101vi\u1e63h\u1e6do medh\u0101v\u012b chhinna-san\u015bhaya\u1e25", "t": "The man of renunciation, pervaded by purity, intelligent, and with his doubts cut asunder, does not hate an unpleasant task nor is he attached to a pleasant one."}, {"c": 18, "v": 11, "s": "\u0928 \u0939\u093f \u0926\u0947\u0939\u092d\u0943\u0924\u093e \u0936\u0915\u094d\u092f\u0902 \u0924\u094d\u092f\u0915\u094d\u0924\u0941\u0902 \u0915\u0930\u094d\u092e\u093e\u0923\u094d\u092f\u0936\u0947\u0937\u0924\u0903\u0964\u092f\u0938\u094d\u0924\u0941 \u0915\u0930\u094d\u092e\u092b\u0932\u0924\u094d\u092f\u093e\u0917\u0940 \u0938 \u0924\u094d\u092f\u093e\u0917\u0940\u0924\u094d\u092f\u092d\u093f\u0927\u0940\u092f\u0924\u0947\u0964\u096418.11\u0964\u0964", "r": "na hi deha-bh\u1e5bit\u0101 \u015bhakya\u1e41 tyaktu\u1e41 karm\u0101\u1e47y a\u015bhe\u1e63hata\u1e25\nyas tu karma-phala-ty\u0101g\u012b sa ty\u0101g\u012bty abhidh\u012byate", "t": "Indeed, it is not possible for an embodied being to completely abandon actions; however, he who relinquishes the rewards of actions is truly called a man of renunciation."}, {"c": 18, "v": 12, "s": "\u0905\u0928\u093f\u0937\u094d\u091f\u092e\u093f\u0937\u094d\u091f\u0902 \u092e\u093f\u0936\u094d\u0930\u0902 \u091a \u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0902 \u0915\u0930\u094d\u092e\u0923\u0903 \u092b\u0932\u092e\u094d\u0964\u092d\u0935\u0924\u094d\u092f\u0924\u094d\u092f\u093e\u0917\u093f\u0928\u093e\u0902 \u092a\u094d\u0930\u0947\u0924\u094d\u092f \u0928 \u0924\u0941 \u0938\u0902\u0928\u094d\u092f\u093e\u0938\u093f\u0928\u093e\u0902 \u0915\u094d\u0935\u091a\u093f\u0924\u094d\u0964\u096418.12\u0964\u0964", "r": "ani\u1e63h\u1e6dam i\u1e63h\u1e6da\u1e41 mi\u015bhra\u1e41 cha tri-vidha\u1e41 karma\u1e47a\u1e25 phalam\nbhavaty aty\u0101gin\u0101\u1e41 pretya na tu sanny\u0101sin\u0101\u1e41 kvachit", "t": "The threefold fruit of action (evil, good, and mixed) accrues after death to those who do not abandon it, but never to those who do."}, {"c": 18, "v": 13, "s": "\u092a\u091e\u094d\u091a\u0948\u0924\u093e\u0928\u093f \u092e\u0939\u093e\u092c\u093e\u0939\u094b \u0915\u093e\u0930\u0923\u093e\u0928\u093f \u0928\u093f\u092c\u094b\u0927 \u092e\u0947\u0964\u0938\u093e\u0902\u0916\u094d\u092f\u0947 \u0915\u0943\u0924\u093e\u0928\u094d\u0924\u0947 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u093e\u0928\u093f \u0938\u093f\u0926\u094d\u0927\u092f\u0947 \u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u0923\u093e\u092e\u094d\u0964\u096418.13\u0964\u0964", "r": "pa\u00f1chait\u0101ni mah\u0101-b\u0101ho k\u0101ra\u1e47\u0101ni nibodha me\ns\u0101nkhye k\u1e5bit\u0101nte prokt\u0101ni siddhaye sarva-karma\u1e47\u0101m", "t": "Learn from Me, O mighty-armed Arjuna, these five causes, as declared in the Sankhya system, for the accomplishment of all actions."}, {"c": 18, "v": 14, "s": "\u0905\u0927\u093f\u0937\u094d\u0920\u093e\u0928\u0902 \u0924\u0925\u093e \u0915\u0930\u094d\u0924\u093e \u0915\u0930\u0923\u0902 \u091a \u092a\u0943\u0925\u0917\u094d\u0935\u093f\u0927\u092e\u094d\u0964\u0935\u093f\u0935\u093f\u0927\u093e\u0936\u094d\u091a \u092a\u0943\u0925\u0915\u094d\u091a\u0947\u0937\u094d\u091f\u093e \u0926\u0948\u0935\u0902 \u091a\u0948\u0935\u093e\u0924\u094d\u0930 \u092a\u091e\u094d\u091a\u092e\u092e\u094d\u0964\u096418.14\u0964\u0964", "r": "adhi\u1e63h\u1e6dh\u0101na\u1e41 tath\u0101 kart\u0101 kara\u1e47a\u1e41 cha p\u1e5bithag-vidham\nvividh\u0101\u015bh cha p\u1e5bithak che\u1e63h\u1e6d\u0101 daiva\u1e41 chaiv\u0101tra pa\u00f1chamam", "t": "The body, the doer, the various senses, the different functions of various kinds, and the presiding deity\u2014the fifth."}, {"c": 18, "v": 15, "s": "\u0936\u0930\u0940\u0930\u0935\u093e\u0919\u094d\u092e\u0928\u094b\u092d\u093f\u0930\u094d\u092f\u0924\u094d\u0915\u0930\u094d\u092e \u092a\u094d\u0930\u093e\u0930\u092d\u0924\u0947 \u0928\u0930\u0903\u0964\u0928\u094d\u092f\u093e\u092f\u094d\u092f\u0902 \u0935\u093e \u0935\u093f\u092a\u0930\u0940\u0924\u0902 \u0935\u093e \u092a\u091e\u094d\u091a\u0948\u0924\u0947 \u0924\u0938\u094d\u092f \u0939\u0947\u0924\u0935\u0903\u0964\u096418.15\u0964\u0964", "r": "\u015bhar\u012bra-v\u0101\u1e45-manobhir yat karma pr\u0101rabhate nara\u1e25\nny\u0101yya\u1e41 v\u0101 vipar\u012bta\u1e41 v\u0101 pa\u00f1chaite tasya hetava\u1e25", "t": "Whatever action a person performs with their body, speech, and mind, whether right or wrong, these five are its causes."}, {"c": 18, "v": 16, "s": "\u0924\u0924\u094d\u0930\u0948\u0935\u0902 \u0938\u0924\u093f \u0915\u0930\u094d\u0924\u093e\u0930\u092e\u093e\u0924\u094d\u092e\u093e\u0928\u0902 \u0915\u0947\u0935\u0932\u0902 \u0924\u0941 \u092f\u0903\u0964\u092a\u0936\u094d\u092f\u0924\u094d\u092f\u0915\u0943\u0924\u092c\u0941\u0926\u094d\u0927\u093f\u0924\u094d\u0935\u093e\u0928\u094d\u0928 \u0938 \u092a\u0936\u094d\u092f\u0924\u093f \u0926\u0941\u0930\u094d\u092e\u0924\u093f\u0903\u0964\u096418.16\u0964\u0964", "r": "tatraiva\u1e41 sati kart\u0101ram \u0101tm\u0101na\u1e41 kevala\u1e41 tu ya\u1e25\npa\u015bhyaty ak\u1e5bita-buddhitv\u0101n na sa pa\u015bhyati durmati\u1e25", "t": "Now, such being the case, verily he who, owing to an untrained understanding, looks upon his Self, which is isolated, as the agent, he of perverted intelligence does not see."}, {"c": 18, "v": 17, "s": "\u092f\u0938\u094d\u092f \u0928\u093e\u0939\u0902\u0915\u0943\u0924\u094b \u092d\u093e\u0935\u094b \u092c\u0941\u0926\u094d\u0927\u093f\u0930\u094d\u092f\u0938\u094d\u092f \u0928 \u0932\u093f\u092a\u094d\u092f\u0924\u0947\u0964\u0939\u0924\u094d\u0935\u093e\u092a\u093f \u0938 \u0907\u092e\u093e\u0901\u0932\u094d\u0932\u094b\u0915\u093e\u0928\u094d\u0928 \u0939\u0928\u094d\u0924\u093f \u0928 \u0928\u093f\u092c\u0927\u094d\u092f\u0924\u0947\u0964\u096418.17\u0964\u0964", "r": "yasya n\u0101hank\u1e5bito bh\u0101vo buddhir yasya na lipyate\nhatv\u0101 \u2018pi sa im\u0101l lok\u0101n na hanti na nibadhyate", "t": "He who is free from the egoistic notion, whose intelligence is not tainted by good or evil, though he slays these people, he does not slay, nor is he bound by the action."}, {"c": 18, "v": 18, "s": "\u091c\u094d\u091e\u093e\u0928\u0902 \u091c\u094d\u091e\u0947\u092f\u0902 \u092a\u0930\u093f\u091c\u094d\u091e\u093e\u0924\u093e \u0924\u094d\u0930\u093f\u0935\u093f\u0927\u093e \u0915\u0930\u094d\u092e\u091a\u094b\u0926\u0928\u093e\u0964\u0915\u0930\u0923\u0902 \u0915\u0930\u094d\u092e \u0915\u0930\u094d\u0924\u0947\u0924\u093f \u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0903 \u0915\u0930\u094d\u092e\u0938\u0902\u0917\u094d\u0930\u0939\u0903\u0964\u096418.18\u0964\u0964", "r": "j\u00f1\u0101na\u1e41 j\u00f1eya\u1e41 parij\u00f1\u0101t\u0101 tri-vidh\u0101 karma-chodan\u0101\nkara\u1e47a\u1e41 karma karteti tri-vidha\u1e25 karma-sa\u1e45graha\u1e25", "t": "Knowledge, the knowable, and the knower form the threefold impulse for action; the organ, the action, and the agent form the threefold basis of action."}, {"c": 18, "v": 19, "s": "\u091c\u094d\u091e\u093e\u0928\u0902 \u0915\u0930\u094d\u092e \u091a \u0915\u0930\u094d\u0924\u093e \u091a \u0924\u094d\u0930\u093f\u0927\u0948\u0935 \u0917\u0941\u0923\u092d\u0947\u0926\u0924\u0903\u0964\u092a\u094d\u0930\u094b\u091a\u094d\u092f\u0924\u0947 \u0917\u0941\u0923\u0938\u0902\u0916\u094d\u092f\u093e\u0928\u0947 \u092f\u0925\u093e\u0935\u091a\u094d\u091b\u0943\u0923\u0941 \u0924\u093e\u0928\u094d\u092f\u092a\u093f\u0964\u096418.19\u0964\u0964", "r": "j\u00f1\u0101na\u1e41 karma cha kart\u0101 cha tridhaiva gu\u1e47a-bhedata\u1e25\nprochyate gu\u1e47a-sa\u1e45khy\u0101ne yath\u0101vach chh\u1e5bi\u1e47u t\u0101ny api", "t": "Knowledge, action, and actor are declared in the science of the Gunas (Sankhya philosophy) to be of three kinds only, according to the distinction of the Gunas. Of these, hear duly."}, {"c": 18, "v": 20, "s": "\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u0947\u0937\u0941 \u092f\u0947\u0928\u0948\u0915\u0902 \u092d\u093e\u0935\u092e\u0935\u094d\u092f\u092f\u092e\u0940\u0915\u094d\u0937\u0924\u0947\u0964\u0905\u0935\u093f\u092d\u0915\u094d\u0924\u0902 \u0935\u093f\u092d\u0915\u094d\u0924\u0947\u0937\u0941 \u0924\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u092e\u094d\u0964\u096418.20\u0964\u0964", "r": "sarva-bh\u016bte\u1e63hu yenaika\u1e41 bh\u0101vam avyayam \u012bk\u1e63hate\navibhakta\u1e41 vibhakte\u1e63hu taj j\u00f1\u0101na\u1e41 viddhi s\u0101ttvikam", "t": "That by which one sees the indestructible Reality in all beings, not separate in any of them\u2014know that knowledge to be Sattvic."}, {"c": 18, "v": 21, "s": "\u092a\u0943\u0925\u0915\u094d\u0924\u094d\u0935\u0947\u0928 \u0924\u0941 \u092f\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u0902 \u0928\u093e\u0928\u093e\u092d\u093e\u0935\u093e\u0928\u094d\u092a\u0943\u0925\u0917\u094d\u0935\u093f\u0927\u093e\u0928\u094d\u0964\u0935\u0947\u0924\u094d\u0924\u093f \u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u092d\u0942\u0924\u0947\u0937\u0941 \u0924\u091c\u094d\u091c\u094d\u091e\u093e\u0928\u0902 \u0935\u093f\u0926\u094d\u0927\u093f \u0930\u093e\u091c\u0938\u092e\u094d\u0964\u096418.21\u0964\u0964", "r": "p\u1e5bithaktvena tu yaj j\u00f1\u0101na\u1e41 n\u0101n\u0101-bh\u0101v\u0101n p\u1e5bithag-vidh\u0101n\nvetti sarve\u1e63hu bh\u016bte\u1e63hu taj j\u00f1\u0101na\u1e41 viddhi r\u0101jasam", "t": "But that knowledge which sees in all beings various entities of distinct kinds as being distinct from one another, know thou that knowledge to be Rajasic."}, {"c": 18, "v": 22, "s": "\u092f\u0924\u094d\u0924\u0941 \u0915\u0943\u0924\u094d\u0938\u094d\u0928\u0935\u0926\u0947\u0915\u0938\u094d\u092e\u093f\u0928\u094d\u0915\u093e\u0930\u094d\u092f\u0947 \u0938\u0915\u094d\u0924\u092e\u0939\u0948\u0924\u0941\u0915\u092e\u094d\u0964\u0905\u0924\u0924\u094d\u0924\u094d\u0935\u093e\u0930\u094d\u0925\u0935\u0926\u0932\u094d\u092a\u0902 \u091a \u0924\u0924\u094d\u0924\u093e\u092e\u0938\u092e\u0941\u0926\u093e\u0939\u0943\u0924\u092e\u094d\u0964\u096418.22\u0964\u0964", "r": "yat tu k\u1e5bitsna-vad ekasmin k\u0101rye saktam ahaitukam\natattv\u0101rtha-vad alpa\u1e41 cha tat t\u0101masam ud\u0101h\u1e5bitam", "t": "But that which clings to one single effect as if it were the whole, without reason, without any foundation in Truth, and is trivial\u2014that is declared to be Tamasic."}, {"c": 18, "v": 23, "s": "\u0928\u093f\u092f\u0924\u0902 \u0938\u0919\u094d\u0917\u0930\u0939\u093f\u0924\u092e\u0930\u093e\u0917\u0926\u094d\u0935\u0947\u0937\u0924\u0903 \u0915\u0943\u0924\u092e\u094d\u0964\u0905\u092b\u0932\u092a\u094d\u0930\u0947\u092a\u094d\u0938\u0941\u0928\u093e \u0915\u0930\u094d\u092e \u092f\u0924\u094d\u0924\u0924\u094d\u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u096418.23\u0964\u0964", "r": "niyata\u1e41 sa\u1e45ga-rahitam ar\u0101ga-dve\u1e63hata\u1e25 k\u1e5bitam\naphala-prepsun\u0101 karma yat tat s\u0101ttvikam uchyate", "t": "An action that is ordained, free from attachment, done without love or hatred, and without desire for reward is declared to be Sattvic."}, {"c": 18, "v": 24, "s": "\u092f\u0924\u094d\u0924\u0941 \u0915\u093e\u092e\u0947\u092a\u094d\u0938\u0941\u0928\u093e \u0915\u0930\u094d\u092e \u0938\u093e\u0939\u0919\u094d\u0915\u093e\u0930\u0947\u0923 \u0935\u093e \u092a\u0941\u0928\u0903\u0964\u0915\u094d\u0930\u093f\u092f\u0924\u0947 \u092c\u0939\u0941\u0932\u093e\u092f\u093e\u0938\u0902 \u0924\u0926\u094d\u0930\u093e\u091c\u0938\u092e\u0941\u0926\u093e\u0939\u0943\u0924\u092e\u094d\u0964\u096418.24\u0964\u0964", "r": "yat tu k\u0101mepsun\u0101 karma s\u0101hank\u0101re\u1e47a v\u0101 puna\u1e25\nkriyate bahul\u0101y\u0101sa\u1e41 tad r\u0101jasam ud\u0101h\u1e5bitam", "t": "But that action which is done by one longing for the fulfillment of desires or gain with egotism or with much effort is declared to be Rajasic (passionate)."}, {"c": 18, "v": 25, "s": "\u0905\u0928\u0941\u092c\u0928\u094d\u0927\u0902 \u0915\u094d\u0937\u092f\u0902 \u0939\u093f\u0902\u0938\u093e\u092e\u0928\u092a\u0947\u0915\u094d\u0937\u094d\u092f \u091a \u092a\u094c\u0930\u0941\u0937\u092e\u094d\u0964\u092e\u094b\u0939\u093e\u0926\u093e\u0930\u092d\u094d\u092f\u0924\u0947 \u0915\u0930\u094d\u092e \u092f\u0924\u094d\u0924\u0924\u094d\u0924\u093e\u092e\u0938\u092e\u0941\u091a\u094d\u092f\u0924\u0947\u0964\u096418.25\u0964\u0964", "r": "anubandha\u1e41 k\u1e63haya\u1e41 hins\u0101m anapek\u1e63hya cha pauru\u1e63ham\nmoh\u0101d \u0101rabhyate karma yat tat t\u0101masam uchyate", "t": "That action which is undertaken from delusion, without regard for the consequences, loss, injury, and one's own ability, is declared to be Tamasic (dark)."}, {"c": 18, "v": 26, "s": "\u092e\u0941\u0915\u094d\u0924\u0938\u0919\u094d\u0917\u094b\u093d\u0928\u0939\u0902\u0935\u093e\u0926\u0940 \u0927\u0943\u0924\u094d\u092f\u0941\u0924\u094d\u0938\u093e\u0939\u0938\u092e\u0928\u094d\u0935\u093f\u0924\u0903\u0964\u0938\u093f\u0926\u094d\u0927\u094d\u092f\u0938\u093f\u0926\u094d\u0927\u094d\u092f\u094b\u0930\u094d\u0928\u093f\u0930\u094d\u0935\u093f\u0915\u093e\u0930\u0903 \u0915\u0930\u094d\u0924\u093e \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915 \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u096418.26\u0964\u0964", "r": "mukta-sa\u1e45go \u2018naha\u1e41-v\u0101d\u012b dh\u1e5bity-uts\u0101ha-samanvita\u1e25\nsiddhy-asiddhyor nirvik\u0101ra\u1e25 kart\u0101 s\u0101ttvika uchyate", "t": "An agent who is free from attachment, non-egoistic, endowed with firmness and enthusiasm, and unaffected by success or failure, is considered to be of a Sattvic (pure) nature."}, {"c": 18, "v": 27, "s": "\u0930\u093e\u0917\u0940 \u0915\u0930\u094d\u092e\u092b\u0932\u092a\u094d\u0930\u0947\u092a\u094d\u0938\u0941\u0930\u094d\u0932\u0941\u092c\u094d\u0927\u094b \u0939\u093f\u0902\u0938\u093e\u0924\u094d\u092e\u0915\u094b\u093d\u0936\u0941\u091a\u093f\u0903\u0964\u0939\u0930\u094d\u0937\u0936\u094b\u0915\u093e\u0928\u094d\u0935\u093f\u0924\u0903 \u0915\u0930\u094d\u0924\u093e \u0930\u093e\u091c\u0938\u0903 \u092a\u0930\u093f\u0915\u0940\u0930\u094d\u0924\u093f\u0924\u0903\u0964\u096418.27\u0964\u0964", "r": "r\u0101g\u012b karma-phala-prepsur lubdho hins\u0101tmako \u2018\u015bhuchi\u1e25\nhar\u1e63ha-\u015bhok\u0101nvita\u1e25 kart\u0101 r\u0101jasa\u1e25 parik\u012brtita\u1e25", "t": "Passionate, desiring to obtain the reward of their actions, greedy, cruel, impure, moved by joy and sorrow, such an agent is said to be Rajasic."}, {"c": 18, "v": 28, "s": "\u0905\u092f\u0941\u0915\u094d\u0924\u0903 \u092a\u094d\u0930\u093e\u0915\u0943\u0924\u0903 \u0938\u094d\u0924\u092c\u094d\u0927\u0903 \u0936\u0920\u094b \u0928\u0948\u0937\u094d\u0915\u0943\u0924\u093f\u0915\u094b\u093d\u0932\u0938\u0903\u0964\u0935\u093f\u0937\u093e\u0926\u0940 \u0926\u0940\u0930\u094d\u0918\u0938\u0942\u0924\u094d\u0930\u0940 \u091a \u0915\u0930\u094d\u0924\u093e \u0924\u093e\u092e\u0938 \u0909\u091a\u094d\u092f\u0924\u0947\u0964\u096418.28\u0964\u0964", "r": "ayukta\u1e25 pr\u0101k\u1e5bita\u1e25 stabdha\u1e25 \u015bha\u1e6dho nai\u1e63hk\u1e5bitiko \u2018lasa\u1e25\nvi\u1e63h\u0101d\u012b d\u012brgha-s\u016btr\u012b cha kart\u0101 t\u0101masa uchyate", "t": "Unsteady, vulgar, inflexible, deceitful, malicious, lazy, despondent, and procrastinating\u2014such an agent is called Tamasic."}, {"c": 18, "v": 29, "s": "\u092c\u0941\u0926\u094d\u0927\u0947\u0930\u094d\u092d\u0947\u0926\u0902 \u0927\u0943\u0924\u0947\u0936\u094d\u091a\u0948\u0935 \u0917\u0941\u0923\u0924\u0938\u094d\u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0902 \u0936\u094d\u0930\u0943\u0923\u0941\u0964\u092a\u094d\u0930\u094b\u091a\u094d\u092f\u092e\u093e\u0928\u092e\u0936\u0947\u0937\u0947\u0923 \u092a\u0943\u0925\u0915\u094d\u0924\u094d\u0935\u0947\u0928 \u0927\u0928\u091e\u094d\u091c\u092f\u0964\u096418.29\u0964\u0964", "r": "buddher bheda\u1e41 dh\u1e5bite\u015bh chaiva gu\u1e47atas tri-vidha\u1e41 \u015bh\u1e5bi\u1e47u\nprochyam\u0101nam a\u015bhe\u1e63he\u1e47a p\u1e5bithaktvena dhana\u00f1jaya", "t": "Hear thou the threefold division of intellect and firmness, according to the Gunas, as I declare them fully and distinctly, O Arjuna."}, {"c": 18, "v": 30, "s": "\u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091a \u0928\u093f\u0935\u0943\u0924\u094d\u0924\u093f\u0902 \u091a \u0915\u093e\u0930\u094d\u092f\u093e\u0915\u093e\u0930\u094d\u092f\u0947 \u092d\u092f\u093e\u092d\u092f\u0947\u0964\u092c\u0928\u094d\u0927\u0902 \u092e\u094b\u0915\u094d\u0937\u0902 \u091a \u092f\u093e \u0935\u0947\u0924\u094d\u0924\u093f \u092c\u0941\u0926\u094d\u0927\u093f\u0903 \u0938\u093e \u092a\u093e\u0930\u094d\u0925 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0940\u0964\u096418.30\u0964\u0964", "r": "prav\u1e5bitti\u1e41 cha niv\u1e5bitti\u1e41 cha k\u0101ry\u0101k\u0101rye bhay\u0101bhaye\nbandha\u1e41 mok\u1e63ha\u1e41 cha y\u0101 vetti buddhi\u1e25 s\u0101 p\u0101rtha s\u0101ttvik\u012b", "t": "The intellect which knows the path of work and renunciation, what should be done and what should not be done, fear and fearlessness, bondage and liberation\u2014that intellect is Sattvic (pure), O Arjuna."}, {"c": 18, "v": 31, "s": "\u092f\u092f\u093e \u0927\u0930\u094d\u092e\u092e\u0927\u0930\u094d\u092e\u0902 \u091a \u0915\u093e\u0930\u094d\u092f\u0902 \u091a\u093e\u0915\u093e\u0930\u094d\u092f\u092e\u0947\u0935 \u091a\u0964\u0905\u092f\u0925\u093e\u0935\u0924\u094d\u092a\u094d\u0930\u091c\u093e\u0928\u093e\u0924\u093f \u092c\u0941\u0926\u094d\u0927\u093f\u0903 \u0938\u093e \u092a\u093e\u0930\u094d\u0925 \u0930\u093e\u091c\u0938\u0940\u0964\u096418.31\u0964\u0964", "r": "yay\u0101 dharmam adharma\u1e41 cha k\u0101rya\u1e41 ch\u0101k\u0101ryam eva cha\nayath\u0101vat praj\u0101n\u0101ti buddhi\u1e25 s\u0101 p\u0101rtha r\u0101jas\u012b", "t": "That by which one wrongly understands dharma and adharma, and also what ought to be done and what ought not to be done\u2014that intellect, O Arjuna, is rajasic (passionate)."}, {"c": 18, "v": 32, "s": "\u0905\u0927\u0930\u094d\u092e\u0902 \u0927\u0930\u094d\u092e\u092e\u093f\u0924\u093f \u092f\u093e \u092e\u0928\u094d\u092f\u0924\u0947 \u0924\u092e\u0938\u093e\u093d\u093d\u0935\u0943\u0924\u093e\u0964\u0938\u0930\u094d\u0935\u093e\u0930\u094d\u0925\u093e\u0928\u094d\u0935\u093f\u092a\u0930\u0940\u0924\u093e\u0902\u0936\u094d\u091a \u092c\u0941\u0926\u094d\u0927\u093f\u0903 \u0938\u093e \u092a\u093e\u0930\u094d\u0925 \u0924\u093e\u092e\u0938\u0940\u0964\u096418.32\u0964\u0964", "r": "adharma\u1e41 dharmam iti y\u0101 manyate tamas\u0101v\u1e5bit\u0101\nsarv\u0101rth\u0101n vipar\u012bt\u0101n\u015bh cha buddhi\u1e25 s\u0101 p\u0101rtha t\u0101mas\u012b", "t": "That intellect, O Arjuna, which is enveloped in darkness and sees Adharma as Dharma and all things perverted, is Tamasic (dark)."}, {"c": 18, "v": 33, "s": "\u0927\u0943\u0924\u094d\u092f\u093e \u092f\u092f\u093e \u0927\u093e\u0930\u092f\u0924\u0947 \u092e\u0928\u0903\u092a\u094d\u0930\u093e\u0923\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0915\u094d\u0930\u093f\u092f\u093e\u0903\u0964\u092f\u094b\u0917\u0947\u0928\u093e\u0935\u094d\u092f\u092d\u093f\u091a\u093e\u0930\u093f\u0923\u094d\u092f\u093e \u0927\u0943\u0924\u093f\u0903 \u0938\u093e \u092a\u093e\u0930\u094d\u0925 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0940\u0964\u096418.33\u0964\u0964", "r": "dh\u1e5bity\u0101 yay\u0101 dh\u0101rayate mana\u1e25-pr\u0101\u1e47endriya-kriy\u0101\u1e25\nyogen\u0101vyabhich\u0101ri\u1e47y\u0101 dh\u1e5biti\u1e25 s\u0101 p\u0101rtha s\u0101ttvik\u012b", "t": "The unwavering firmness, through which Yoga restrains the functions of the mind, life-force, and senses\u2014that firmness, O Arjuna, is Sattvic (pure)."}, {"c": 18, "v": 34, "s": "\u092f\u092f\u093e \u0924\u0941 \u0927\u0930\u094d\u092e\u0915\u093e\u092e\u093e\u0930\u094d\u0925\u093e\u0928\u094d \u0927\u0943\u0924\u094d\u092f\u093e \u0927\u093e\u0930\u092f\u0924\u0947\u093d\u0930\u094d\u091c\u0941\u0928\u0964\u092a\u094d\u0930\u0938\u0919\u094d\u0917\u0947\u0928 \u092b\u0932\u093e\u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0940 \u0927\u0943\u0924\u093f\u0903 \u0938\u093e \u092a\u093e\u0930\u094d\u0925 \u0930\u093e\u091c\u0938\u0940\u0964\u096418.34\u0964\u0964", "r": "yay\u0101 tu dharma-k\u0101m\u0101rth\u0101n dh\u1e5bity\u0101 dh\u0101rayate \u2018rjuna\nprasa\u1e45gena phal\u0101k\u0101\u1e45k\u1e63h\u012b dh\u1e5biti\u1e25 s\u0101 p\u0101rtha r\u0101jas\u012b", "t": "But that, O Arjuna, by which one holds fast to Dharma (duty), enjoyment of pleasures, and earning of wealth, on account of attachment and desire for reward\u2014that firmness, O Arjuna, is Rajasic (passionate)."}, {"c": 18, "v": 35, "s": "\u092f\u092f\u093e \u0938\u094d\u0935\u092a\u094d\u0928\u0902 \u092d\u092f\u0902 \u0936\u094b\u0915\u0902 \u0935\u093f\u0937\u093e\u0926\u0902 \u092e\u0926\u092e\u0947\u0935 \u091a\u0964\u0928 \u0935\u093f\u092e\u0941\u091e\u094d\u091a\u0924\u093f \u0926\u0941\u0930\u094d\u092e\u0947\u0927\u093e \u0927\u0943\u0924\u093f\u0903 \u0938\u093e \u092a\u093e\u0930\u094d\u0925 \u0924\u093e\u092e\u0938\u0940\u0964\u096418.35\u0964\u0964", "r": "yay\u0101 svapna\u1e41 bhaya\u1e41 \u015bhoka\u1e41 vi\u1e63h\u0101da\u1e41 madam eva cha\nna vimu\u00f1chati durmedh\u0101 dh\u1e5biti\u1e25 s\u0101 p\u0101rtha t\u0101mas\u012b", "t": "That firmness, O Arjuna, by which a stupid man does not abandon sleep, fear, grief, despair, and conceit, is Tamasic."}, {"c": 18, "v": 36, "s": "\u0938\u0941\u0916\u0902 \u0924\u094d\u0935\u093f\u0926\u093e\u0928\u0940\u0902 \u0924\u094d\u0930\u093f\u0935\u093f\u0927\u0902 \u0936\u094d\u0930\u0943\u0923\u0941 \u092e\u0947 \u092d\u0930\u0924\u0930\u094d\u0937\u092d\u0964\u0905\u092d\u094d\u092f\u093e\u0938\u093e\u0926\u094d\u0930\u092e\u0924\u0947 \u092f\u0924\u094d\u0930 \u0926\u0941\u0903\u0916\u093e\u0928\u094d\u0924\u0902 \u091a \u0928\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u096418.36\u0964\u0964", "r": "sukha\u1e41 tv id\u0101n\u012b\u1e41 tri-vidha\u1e41 \u015bh\u1e5bi\u1e47u me bharatar\u1e63habha\nabhy\u0101s\u0101d ramate yatra du\u1e25kh\u0101nta\u1e41 cha nigachchhati\n yat tad agre vi\u1e63ham iva pari\u1e47\u0101me \u2018m\u1e5bitopamam\ntat sukha\u1e41 s\u0101ttvika\u1e41 proktam \u0101tma-buddhi-pras\u0101da-jam", "t": "And now, O Arjuna, hear from Me of the threefold pleasure, in which one rejoices through practice and surely comes to the end of pain."}, {"c": 18, "v": 37, "s": "\u092f\u0924\u094d\u0924\u0926\u0917\u094d\u0930\u0947 \u0935\u093f\u0937\u092e\u093f\u0935 \u092a\u0930\u093f\u0923\u093e\u092e\u0947\u093d\u092e\u0943\u0924\u094b\u092a\u092e\u092e\u094d\u0964\u0924\u0924\u094d\u0938\u0941\u0916\u0902 \u0938\u093e\u0924\u094d\u0924\u094d\u0935\u093f\u0915\u0902 \u092a\u094d\u0930\u094b\u0915\u094d\u0924\u092e\u093e\u0924\u094d\u092e\u092c\u0941\u0926\u094d\u0927\u093f\u092a\u094d\u0930\u0938\u093e\u0926\u091c\u092e\u094d\u0964\u096418.37\u0964\u0964", "r": "yat tad agre vi\u1e63am iva pari\u1e47\u0101me 'm\u1e5btopamam tat sukha\u1e41 s\u0101ttvika\u1e41 proktam \u0101tma-buddhi-pras\u0101da-jam", "t": "That which is like poison at first but in the end like nectar\u2014that happiness is declared to be sattvic, born of the purity of one's own mind due to self-realization."}, {"c": 18, "v": 38, "s": "\u0935\u093f\u0937\u092f\u0947\u0928\u094d\u0926\u094d\u0930\u093f\u092f\u0938\u0902\u092f\u094b\u0917\u093e\u0926\u094d\u092f\u0924\u094d\u0924\u0926\u0917\u094d\u0930\u0947\u093d\u092e\u0943\u0924\u094b\u092a\u092e\u092e\u094d\u0964\u092a\u0930\u093f\u0923\u093e\u092e\u0947 \u0935\u093f\u0937\u092e\u093f\u0935 \u0924\u0924\u094d\u0938\u0941\u0916\u0902 \u0930\u093e\u091c\u0938\u0902 \u0938\u094d\u092e\u0943\u0924\u092e\u094d\u0964\u096418.38\u0964\u0964", "r": "vi\u1e63hayendriya-sanyog\u0101d yat tad agre \u2019m\u1e5bitopamam\npari\u1e47\u0101me vi\u1e63ham iva tat sukha\u1e41 r\u0101jasa\u1e41 sm\u1e5bitam", "t": "That happiness which arises from the contact of the senses with the objects, which is initially like nectar but eventually like poison, is said to be Rajasic."}, {"c": 18, "v": 39, "s": "\u092f\u0926\u0917\u094d\u0930\u0947 \u091a\u093e\u0928\u0941\u092c\u0928\u094d\u0927\u0947 \u091a \u0938\u0941\u0916\u0902 \u092e\u094b\u0939\u0928\u092e\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u0928\u093f\u0926\u094d\u0930\u093e\u0932\u0938\u094d\u092f\u092a\u094d\u0930\u092e\u093e\u0926\u094b\u0924\u094d\u0925\u0902 \u0924\u0924\u094d\u0924\u093e\u092e\u0938\u092e\u0941\u0926\u093e\u0939\u0943\u0924\u092e\u094d\u0964\u096418.39\u0964\u0964", "r": "yad agre ch\u0101nubandhe cha sukha\u1e41 mohanam \u0101tmana\u1e25\nnidr\u0101lasya-pram\u0101dottha\u1e41 tat t\u0101masam ud\u0101h\u1e5bitam", "t": "That happiness which at first, as well as in the end, deludes the self, and which arises from sleep, indolence, and heedlessness\u2014that is declared to be Tamasic."}, {"c": 18, "v": 40, "s": "\u0928 \u0924\u0926\u0938\u094d\u0924\u093f \u092a\u0943\u0925\u093f\u0935\u094d\u092f\u093e\u0902 \u0935\u093e \u0926\u093f\u0935\u093f \u0926\u0947\u0935\u0947\u0937\u0941 \u0935\u093e \u092a\u0941\u0928\u0903\u0964\u0938\u0924\u094d\u0924\u094d\u0935\u0902 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u091c\u0948\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u0902 \u092f\u0926\u0947\u092d\u093f\u0903 \u0938\u094d\u092f\u093e\u0924\u094d\u093f\u0924\u094d\u0930\u092d\u093f\u0930\u094d\u0917\u0941\u0923\u0948\u0903\u0964\u096418.40\u0964\u0964", "r": "na tad asti p\u1e5bithivy\u0101\u1e41 v\u0101 divi deve\u1e63hu v\u0101 puna\u1e25\nsattva\u1e41 prak\u1e5biti-jair mukta\u1e41 yad ebhi\u1e25 sy\u0101t tribhir gu\u1e47ai\u1e25", "t": "There is no being on earth or in heaven among the gods that is liberated from the three qualities born of Nature."}, {"c": 18, "v": 41, "s": "\u092c\u094d\u0930\u093e\u0939\u094d\u092e\u0923\u0915\u094d\u0937\u0924\u094d\u0930\u093f\u092f\u0935\u093f\u0936\u093e\u0902 \u0936\u0942\u0926\u094d\u0930\u093e\u0923\u093e\u0902 \u091a \u092a\u0930\u0902\u0924\u092a\u0964\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u092a\u094d\u0930\u0935\u093f\u092d\u0915\u094d\u0924\u093e\u0928\u093f \u0938\u094d\u0935\u092d\u093e\u0935\u092a\u094d\u0930\u092d\u0935\u0948\u0930\u094d\u0917\u0941\u0923\u0948\u0903\u0964\u096418.41\u0964\u0964", "r": "br\u0101hma\u1e47a-k\u1e63hatriya-vi\u015bh\u0101\u1e41 \u015bh\u016bdr\u0101\u1e47\u0101\u1e41 cha parantapa\nkarm\u0101\u1e47i pravibhakt\u0101ni svabh\u0101va-prabhavair gu\u1e47ai\u1e25", "t": "Of Brahmanas, Kshatriyas, Vaisyas, and Sudras, O Arjuna, the duties are distributed according to the qualities born of their own nature."}, {"c": 18, "v": 42, "s": "\u0936\u092e\u094b \u0926\u092e\u0938\u094d\u0924\u092a\u0903 \u0936\u094c\u091a\u0902 \u0915\u094d\u0937\u093e\u0928\u094d\u0924\u093f\u0930\u093e\u0930\u094d\u091c\u0935\u092e\u0947\u0935 \u091a\u0964\u091c\u094d\u091e\u093e\u0928\u0902 \u0935\u093f\u091c\u094d\u091e\u093e\u0928\u092e\u093e\u0938\u094d\u0924\u093f\u0915\u094d\u092f\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u0915\u0930\u094d\u092e \u0938\u094d\u0935\u092d\u093e\u0935\u091c\u092e\u094d\u0964\u096418.42\u0964\u0964", "r": "\u015bhamo damas tapa\u1e25 \u015bhaucha\u1e41 k\u1e63h\u0101ntir \u0101rjavam eva cha\nj\u00f1\u0101na\u1e41 vij\u00f1\u0101nam \u0101stikya\u1e41 brahma-karma svabh\u0101va-jam", "t": "Serenity, self-restraint, austerity, purity, forgiveness, and uprightness, as well as knowledge, realization, and belief in God, are the duties of Brahmanas, born of their own nature."}, {"c": 18, "v": 43, "s": "\u0936\u094c\u0930\u094d\u092f\u0902 \u0924\u0947\u091c\u094b \u0927\u0943\u0924\u093f\u0930\u094d\u0926\u093e\u0915\u094d\u0937\u094d\u092f\u0902 \u092f\u0941\u0926\u094d\u0927\u0947 \u091a\u093e\u092a\u094d\u092f\u092a\u0932\u093e\u092f\u0928\u092e\u094d\u0964\u0926\u093e\u0928\u092e\u0940\u0936\u094d\u0935\u0930\u092d\u093e\u0935\u0936\u094d\u091a \u0915\u094d\u0937\u093e\u0924\u094d\u0930\u0902 \u0915\u0930\u094d\u092e \u0938\u094d\u0935\u092d\u093e\u0935\u091c\u092e\u094d\u0964\u096418.43\u0964\u0964", "r": "\u015bhaurya\u1e41 tejo dh\u1e5bitir d\u0101k\u1e63hya\u1e41 yuddhe ch\u0101py apal\u0101yanam\nd\u0101nam \u012b\u015bhvara-bh\u0101va\u015bh cha k\u1e63h\u0101tra\u1e41 karma svabh\u0101va-jam", "t": "Prowess, splendor, firmness, dexterity, and not fleeing from battle, generosity, and lordliness are the duties of the Kshatriyas, born of their own nature."}, {"c": 18, "v": 44, "s": "\u0915\u0943\u0937\u093f\u0917\u094c\u0930\u0915\u094d\u0937\u094d\u092f\u0935\u093e\u0923\u093f\u091c\u094d\u092f\u0902 \u0935\u0948\u0936\u094d\u092f\u0915\u0930\u094d\u092e \u0938\u094d\u0935\u092d\u093e\u0935\u091c\u092e\u094d\u0964\u092a\u0930\u093f\u091a\u0930\u094d\u092f\u093e\u0924\u094d\u092e\u0915\u0902 \u0915\u0930\u094d\u092e \u0936\u0942\u0926\u094d\u0930\u0938\u094d\u092f\u093e\u092a\u093f \u0938\u094d\u0935\u092d\u093e\u0935\u091c\u092e\u094d\u0964\u096418.44\u0964\u0964", "r": "k\u1e5bi\u1e63hi-gau-rak\u1e63hya-v\u0101\u1e47ijya\u1e41 vai\u015bhya-karma svabh\u0101va-jam\nparichary\u0101tmaka\u1e41 karma \u015bh\u016bdrasy\u0101pi svabh\u0101va-jam", "t": "Agriculture, cattle-rearing, and trade are the duties of the Vaisya (merchant), born of their own nature; and service is the duty of the Sudra (servant-class), born of their own nature."}, {"c": 18, "v": 45, "s": "\u0938\u094d\u0935\u0947 \u0938\u094d\u0935\u0947 \u0915\u0930\u094d\u092e\u0923\u094d\u092f\u092d\u093f\u0930\u0924\u0903 \u0938\u0902\u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u0932\u092d\u0924\u0947 \u0928\u0930\u0903\u0964\u0938\u094d\u0935\u0915\u0930\u094d\u092e\u0928\u093f\u0930\u0924\u0903 \u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u092f\u0925\u093e \u0935\u093f\u0928\u094d\u0926\u0924\u093f \u0924\u091a\u094d\u091b\u0943\u0923\u0941\u0964\u096418.45\u0964\u0964", "r": "sve sve karma\u1e47y abhirata\u1e25 sansiddhi\u1e41 labhate nara\u1e25\nsva-karma-nirata\u1e25 siddhi\u1e41 yath\u0101 vindati tach chh\u1e5bi\u1e47u", "t": "Each person devoted to their own duty attains perfection. How they attain perfection while being engaged in their own duty, hear now."}, {"c": 18, "v": 46, "s": "\u092f\u0924\u0903 \u092a\u094d\u0930\u0935\u0943\u0924\u094d\u0924\u093f\u0930\u094d\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u092f\u0947\u0928 \u0938\u0930\u094d\u0935\u092e\u093f\u0926\u0902 \u0924\u0924\u092e\u094d\u0964\u0938\u094d\u0935\u0915\u0930\u094d\u092e\u0923\u093e \u0924\u092e\u092d\u094d\u092f\u0930\u094d\u091a\u094d\u092f \u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u0935\u093f\u0928\u094d\u0926\u0924\u093f \u092e\u093e\u0928\u0935\u0903\u0964\u096418.46\u0964\u0964", "r": "yata\u1e25 prav\u1e5bittir bh\u016bt\u0101n\u0101\u1e41 yena sarvam ida\u1e41 tatam\nsva-karma\u1e47\u0101 tam abhyarchya siddhi\u1e41 vindati m\u0101nava\u1e25", "t": "He from whom all the beings have evolved and by whom all this is pervaded, worshipping Him with his own duty, one attains perfection."}, {"c": 18, "v": 47, "s": "\u0936\u094d\u0930\u0947\u092f\u093e\u0928\u094d\u0938\u094d\u0935\u0927\u0930\u094d\u092e\u094b \u0935\u093f\u0917\u0941\u0923\u0903 \u092a\u0930\u0927\u0930\u094d\u092e\u093e\u0924\u094d\u0938\u094d\u0935\u0928\u0941\u0937\u094d\u0920\u093f\u0924\u093e\u0924\u094d\u0964\u0938\u094d\u0935\u092d\u093e\u0935\u0928\u093f\u092f\u0924\u0902 \u0915\u0930\u094d\u092e \u0915\u0941\u0930\u094d\u0935\u0928\u094d\u0928\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0915\u093f\u0932\u094d\u092c\u093f\u0937\u092e\u094d\u0964\u096418.47\u0964\u0964", "r": "\u015bhrey\u0101n swa-dharmo vigu\u1e47a\u1e25 para-dharm\u0101t sv-anu\u1e63h\u1e6dhit\u0101t\nsvabh\u0101va-niyata\u1e41 karma kurvan n\u0101pnoti kilbi\u1e63ham", "t": "Better is one's own duty, even if it is destitute of merits, than the duty of another well performed. He who does the duty ordained by his own nature incurs no sin."}, {"c": 18, "v": 48, "s": "\u0938\u0939\u091c\u0902 \u0915\u0930\u094d\u092e \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0938\u0926\u094b\u0937\u092e\u092a\u093f \u0928 \u0924\u094d\u092f\u091c\u0947\u0924\u094d\u0964\u0938\u0930\u094d\u0935\u093e\u0930\u092e\u094d\u092d\u093e \u0939\u093f \u0926\u094b\u0937\u0947\u0923 \u0927\u0942\u092e\u0947\u0928\u093e\u0917\u094d\u0928\u093f\u0930\u093f\u0935\u093e\u0935\u0943\u0924\u093e\u0903\u0964\u096418.48\u0964\u0964", "r": "saha-ja\u1e41 karma kaunteya sa-do\u1e63ham api na tyajet\nsarv\u0101rambh\u0101 hi do\u1e63he\u1e47a dh\u016bmen\u0101gnir iv\u0101v\u1e5bit\u0101\u1e25", "t": "One should not, O Arjuna, abandon the duty to which one is born, though it may be faulty; for, all undertakings are enveloped by evil, just as fire is by smoke."}, {"c": 18, "v": 49, "s": "\u0905\u0938\u0915\u094d\u0924\u092c\u0941\u0926\u094d\u0927\u093f\u0903 \u0938\u0930\u094d\u0935\u0924\u094d\u0930 \u091c\u093f\u0924\u093e\u0924\u094d\u092e\u093e \u0935\u093f\u0917\u0924\u0938\u094d\u092a\u0943\u0939\u0903\u0964\u0928\u0948\u0937\u094d\u0915\u0930\u094d\u092e\u094d\u092f\u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u092a\u0930\u092e\u093e\u0902 \u0938\u0902\u0928\u094d\u092f\u093e\u0938\u0947\u0928\u093e\u0927\u093f\u0917\u091a\u094d\u091b\u0924\u093f\u0964\u096418.49\u0964\u0964", "r": "asakta-buddhi\u1e25 sarvatra jit\u0101tm\u0101 vigata-sp\u1e5biha\u1e25\nnai\u1e63hkarmya-siddhi\u1e41 param\u0101\u1e41 sanny\u0101sen\u0101dhigachchhati", "t": "He whose intellect is unattached everywhere, who has subdued his self, from whom desire has fled, he attains the supreme state of freedom from action through renunciation."}, {"c": 18, "v": 50, "s": "\u0938\u093f\u0926\u094d\u0927\u093f\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u0924\u094b \u092f\u0925\u093e \u092c\u094d\u0930\u0939\u094d\u092e \u0924\u0925\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0928\u093f\u092c\u094b\u0927 \u092e\u0947\u0964\u0938\u092e\u093e\u0938\u0947\u0928\u0948\u0935 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0928\u093f\u0937\u094d\u0920\u093e \u091c\u094d\u091e\u093e\u0928\u0938\u094d\u092f \u092f\u093e \u092a\u0930\u093e\u0964\u096418.50\u0964\u0964", "r": "siddhi\u1e41 pr\u0101pto yath\u0101 brahma tath\u0101pnoti nibodha me\nsam\u0101senaiva kaunteya ni\u1e63h\u1e6dh\u0101 j\u00f1\u0101nasya y\u0101 par\u0101", "t": "Learn from Me, O Arjuna, in brief how one who has attained perfection reaches Brahman\u2014the Eternal, that supreme state of knowledge."}, {"c": 18, "v": 51, "s": "\u092c\u0941\u0926\u094d\u0927\u094d\u092f\u093e \u0935\u093f\u0936\u0941\u0926\u094d\u0927\u092f\u093e \u092f\u0941\u0915\u094d\u0924\u094b \u0927\u0943\u0924\u094d\u092f\u093e\u093d\u093d\u0924\u094d\u092e\u093e\u0928\u0902 \u0928\u093f\u092f\u092e\u094d\u092f \u091a\u0964\u0936\u092c\u094d\u0926\u093e\u0926\u0940\u0928\u094d \u0935\u093f\u0937\u092f\u093e\u0902\u0938\u094d\u0924\u094d\u092f\u0915\u094d\u0924\u094d\u0935\u093e \u0930\u093e\u0917\u0926\u094d\u0935\u0947\u0937\u094c \u0935\u094d\u092f\u0941\u0926\u0938\u094d\u092f \u091a\u0964\u096418.51\u0964\u0964", "r": "buddhy\u0101 vi\u015bhuddhay\u0101 yukto dh\u1e5bity\u0101tm\u0101na\u1e41 niyamya cha\n\u015bhabd\u0101d\u012bn vi\u1e63hay\u0101ns tyaktv\u0101 r\u0101ga-dve\u1e63hau vyudasya cha", "t": "Endowed with a pure intellect, controlling the self through firmness, relinquishing sound and other objects and abandoning attraction and hatred."}, {"c": 18, "v": 52, "s": "\u0935\u093f\u0935\u093f\u0915\u094d\u0924\u0938\u0947\u0935\u0940 \u0932\u0918\u094d\u0935\u093e\u0936\u0940 \u092f\u0924\u0935\u093e\u0915\u094d\u0915\u093e\u092f\u092e\u093e\u0928\u0938\u0903\u0964\u0927\u094d\u092f\u093e\u0928\u092f\u094b\u0917\u092a\u0930\u094b \u0928\u093f\u0924\u094d\u092f\u0902 \u0935\u0948\u0930\u093e\u0917\u094d\u092f\u0902 \u0938\u092e\u0941\u092a\u093e\u0936\u094d\u0930\u093f\u0924\u0903\u0964\u096418.52\u0964\u0964", "r": "vivikta-sev\u012b laghv-\u0101\u015bh\u012b yata-v\u0101k-k\u0101ya-m\u0101nasa\u1e25\ndhy\u0101na-yoga-paro nitya\u1e41 vair\u0101gya\u1e41 samup\u0101\u015bhrita\u1e25", "t": "Dwelling in solitude, eating sparingly, with speech, body, and mind subdued, always engaged in meditation and concentration, and resorting to dispassion."}, {"c": 18, "v": 53, "s": "\u0905\u0939\u0919\u094d\u0915\u093e\u0930\u0902 \u092c\u0932\u0902 \u0926\u0930\u094d\u092a\u0902 \u0915\u093e\u092e\u0902 \u0915\u094d\u0930\u094b\u0927\u0902 \u092a\u0930\u093f\u0917\u094d\u0930\u0939\u092e\u094d\u0964\u0935\u093f\u092e\u0941\u091a\u094d\u092f \u0928\u093f\u0930\u094d\u092e\u092e\u0903 \u0936\u093e\u0928\u094d\u0924\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u092d\u0942\u092f\u093e\u092f \u0915\u0932\u094d\u092a\u0924\u0947\u0964\u096418.53\u0964\u0964", "r": "ahank\u0101ra\u1e41 bala\u1e41 darpa\u1e41 k\u0101ma\u1e41 krodha\u1e41 parigraham\nvimuchya nirmama\u1e25 \u015bh\u0101nto brahma-bh\u016by\u0101ya kalpate", "t": "Having abandoned egoism, strength, arrogance, desire, anger, and covetousness, and being free from the notion of 'mine' and peaceful, he is fit for becoming Brahman."}, {"c": 18, "v": 54, "s": "\u092c\u094d\u0930\u0939\u094d\u092e\u092d\u0942\u0924\u0903 \u092a\u094d\u0930\u0938\u0928\u094d\u0928\u093e\u0924\u094d\u092e\u093e \u0928 \u0936\u094b\u091a\u0924\u093f \u0928 \u0915\u093e\u0919\u094d\u0915\u094d\u0937\u0924\u093f\u0964\u0938\u092e\u0903 \u0938\u0930\u094d\u0935\u0947\u0937\u0941 \u092d\u0942\u0924\u0947\u0937\u0941 \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u093f\u0902 \u0932\u092d\u0924\u0947 \u092a\u0930\u093e\u092e\u094d\u0964\u096418.54\u0964\u0964", "r": "brahma-bh\u016bta\u1e25 prasann\u0101tm\u0101 na \u015bhochati na k\u0101\u1e45k\u1e63hati\nsama\u1e25 sarve\u1e63hu bh\u016bte\u1e63hu mad-bhakti\u1e41 labhate par\u0101m", "t": "Becoming Brahman, serene in the Self, he neither grieves nor desires; he is the same to all beings, and obtains supreme devotion to Me."}, {"c": 18, "v": 55, "s": "\u092d\u0915\u094d\u0924\u094d\u092f\u093e \u092e\u093e\u092e\u092d\u093f\u091c\u093e\u0928\u093e\u0924\u093f \u092f\u093e\u0935\u093e\u0928\u094d\u092f\u0936\u094d\u091a\u093e\u0938\u094d\u092e\u093f \u0924\u0924\u094d\u0924\u094d\u0935\u0924\u0903\u0964\u0924\u0924\u094b \u092e\u093e\u0902 \u0924\u0924\u094d\u0924\u094d\u0935\u0924\u094b \u091c\u094d\u091e\u093e\u0924\u094d\u0935\u093e \u0935\u093f\u0936\u0924\u0947 \u0924\u0926\u0928\u0928\u094d\u0924\u0930\u092e\u094d\u0964\u096418.55\u0964\u0964", "r": "bhakty\u0101 m\u0101m abhij\u0101n\u0101ti y\u0101v\u0101n ya\u015bh ch\u0101smi tattvata\u1e25\ntato m\u0101\u1e41 tattvato j\u00f1\u0101tv\u0101 vi\u015bhate tad-anantaram", "t": "By devotion, he knows Me in truth, who and what I am; then, having known Me in truth, he immediately enters into the Supreme."}, {"c": 18, "v": 56, "s": "\u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u093e\u0923\u094d\u092f\u092a\u093f \u0938\u0926\u093e \u0915\u0941\u0930\u094d\u0935\u093e\u0923\u094b \u092e\u0926\u094d\u0935\u094d\u092f\u092a\u093e\u0936\u094d\u0930\u092f\u0903\u0964\u092e\u0924\u094d\u092a\u094d\u0930\u0938\u093e\u0926\u093e\u0926\u0935\u093e\u092a\u094d\u0928\u094b\u0924\u093f \u0936\u093e\u0936\u094d\u0935\u0924\u0902 \u092a\u0926\u092e\u0935\u094d\u092f\u092f\u092e\u094d\u0964\u096418.56\u0964\u0964", "r": "sarva-karm\u0101\u1e47y api sad\u0101 kurv\u0101\u1e47o mad-vyap\u0101\u015bhraya\u1e25\nmat-pras\u0101d\u0101d av\u0101pnoti \u015bh\u0101\u015bhvata\u1e41 padam avyayam", "t": "Having taken refuge in Me and doing all actions, by My grace he obtains the eternal, indestructible state of being."}, {"c": 18, "v": 57, "s": "\u091a\u0947\u0924\u0938\u093e \u0938\u0930\u094d\u0935\u0915\u0930\u094d\u092e\u093e\u0923\u093f \u092e\u092f\u093f \u0938\u0902\u0928\u094d\u092f\u0938\u094d\u092f \u092e\u0924\u094d\u092a\u0930\u0903\u0964\u092c\u0941\u0926\u094d\u0927\u093f\u092f\u094b\u0917\u092e\u0941\u092a\u093e\u0936\u094d\u0930\u093f\u0924\u094d\u092f \u092e\u091a\u094d\u091a\u093f\u0924\u094d\u0924\u0903 \u0938\u0924\u0924\u0902 \u092d\u0935\u0964\u096418.57\u0964\u0964", "r": "chetas\u0101 sarva-karm\u0101\u1e47i mayi sannyasya mat-para\u1e25\nbuddhi-yogam up\u0101\u015bhritya mach-chitta\u1e25 satata\u1e41 bhava", "t": "Mentally renouncing all actions in Me, having Me as the highest goal, and resorting to the yoga of discrimination, do thou ever fix thy mind on Me."}, {"c": 18, "v": 58, "s": "\u092e\u091a\u094d\u091a\u093f\u0924\u094d\u0924\u0903 \u0938\u0930\u094d\u0935\u0926\u0941\u0930\u094d\u0917\u093e\u0923\u093f \u092e\u0924\u094d\u092a\u094d\u0930\u0938\u093e\u0926\u093e\u0924\u094d\u0924\u0930\u093f\u0937\u094d\u092f\u0938\u093f\u0964\u0905\u0925 \u091a\u0947\u0924\u094d\u0924\u094d\u0935\u092e\u0939\u0919\u094d\u0915\u093e\u0930\u093e\u0928\u094d\u0928 \u0936\u094d\u0930\u094b\u0937\u094d\u092f\u0938\u093f \u0935\u093f\u0928\u0919\u094d\u0915\u094d\u0937\u094d\u092f\u0938\u093f\u0964\u096418.58\u0964\u0964", "r": "mach-chitta\u1e25 sarva-durg\u0101\u1e47i mat-pras\u0101d\u0101t tari\u1e63hyasi\natha chet tvam ahank\u0101r\u0101n na \u015bhro\u1e63hyasi vina\u1e45k\u1e63hyasi", "t": "Fixing your mind on Me, you shall, by My grace, overcome all obstacles; but if you will not hear Me due to egoism, you shall perish."}, {"c": 18, "v": 59, "s": "\u092f\u0926\u0939\u0919\u094d\u0915\u093e\u0930\u092e\u093e\u0936\u094d\u0930\u093f\u0924\u094d\u092f \u0928 \u092f\u094b\u0924\u094d\u0938\u094d\u092f \u0907\u0924\u093f \u092e\u0928\u094d\u092f\u0938\u0947\u0964\u092e\u093f\u0925\u094d\u092f\u0948\u0937 \u0935\u094d\u092f\u0935\u0938\u093e\u092f\u0938\u094d\u0924\u0947 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\u0938\u094d\u0924\u094d\u0935\u093e\u0902 \u0928\u093f\u092f\u094b\u0915\u094d\u0937\u094d\u092f\u0924\u093f\u0964\u096418.59\u0964\u0964", "r": "yad ahank\u0101ram \u0101\u015bhritya na yotsya iti manyase\nmithyai\u1e63ha vyavas\u0101yas te prak\u1e5bitis tv\u0101\u1e41 niyok\u1e63hyati", "t": "If, filled with egoism, thou thinkest, \"I will not fight,\" then thy resolve is vain; nature will compel thee."}, {"c": 18, "v": 60, "s": "\u0938\u094d\u0935\u092d\u093e\u0935\u091c\u0947\u0928 \u0915\u094c\u0928\u094d\u0924\u0947\u092f \u0928\u093f\u092c\u0926\u094d\u0927\u0903 \u0938\u094d\u0935\u0947\u0928 \u0915\u0930\u094d\u092e\u0923\u093e\u0964\u0915\u0930\u094d\u0924\u0941\u0902 \u0928\u0947\u091a\u094d\u091b\u0938\u093f \u092f\u0928\u094d\u092e\u094b\u0939\u093e\u0924\u094d\u0915\u0930\u093f\u0937\u094d\u092f\u0938\u094d\u092f\u0935\u0936\u094b\u093d\u092a\u093f \u0924\u0924\u094d\u0964\u096418.60\u0964\u0964", "r": "swbh\u0101va-jena kaunteya nibaddha\u1e25 svena karma\u1e47\u0101\nkartu\u1e41 nechchhasi yan moh\u0101t kari\u1e63hyasy ava\u015bho \u2019pi tat", "t": "O Arjuna, bound by your own Karma (action) born of your own nature, that which from delusion you wish not to do, even that you shall do helplessly."}, {"c": 18, "v": 61, "s": "\u0908\u0936\u094d\u0935\u0930\u0903 \u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093e\u0902 \u0939\u0943\u0926\u094d\u0926\u0947\u0936\u0947\u093d\u0930\u094d\u091c\u0941\u0928 \u0924\u093f\u0937\u094d\u0920\u0924\u093f\u0964\u092d\u094d\u0930\u093e\u092e\u092f\u0928\u094d\u0938\u0930\u094d\u0935\u092d\u0942\u0924\u093e\u0928\u093f \u092f\u0928\u094d\u0924\u094d\u0930\u093e\u0930\u0942\u0922\u093e\u0928\u093f \u092e\u093e\u092f\u092f\u093e\u0964\u096418.61\u0964\u0964", "r": "\u012b\u015bhvara\u1e25 sarva-bh\u016bt\u0101n\u0101\u1e41 h\u1e5bid-de\u015bhe \u2018rjuna ti\u1e63h\u1e6dhati\nbhr\u0101mayan sarva-bh\u016bt\u0101ni yantr\u0101r\u016b\u1e0dh\u0101ni m\u0101yay\u0101", "t": "The Lord dwells in the hearts of all beings, O Arjuna, causing all beings, by His illusory power, to revolve as if mounted on a machine."}, {"c": 18, "v": 62, "s": "\u0924\u092e\u0947\u0935 \u0936\u0930\u0923\u0902 \u0917\u091a\u094d\u091b \u0938\u0930\u094d\u0935\u092d\u093e\u0935\u0947\u0928 \u092d\u093e\u0930\u0924\u0964\u0924\u0924\u094d\u092a\u094d\u0930\u0938\u093e\u0926\u093e\u0924\u094d\u092a\u0930\u093e\u0902 \u0936\u093e\u0928\u094d\u0924\u093f\u0902 \u0938\u094d\u0925\u093e\u0928\u0902 \u092a\u094d\u0930\u093e\u092a\u094d\u0938\u094d\u092f\u0938\u093f \u0936\u093e\u0936\u094d\u0935\u0924\u092e\u094d\u0964\u096418.62\u0964\u0964", "r": "tam eva \u015bhara\u1e47a\u1e41 gachchha sarva-bh\u0101vena bh\u0101rata\ntat-pras\u0101d\u0101t par\u0101\u1e41 \u015bh\u0101nti\u1e41 sth\u0101na\u1e41 pr\u0101psyasi \u015bh\u0101\u015bhvatam", "t": "Fly to Him for refuge with all your being, O Arjuna; by His grace you will obtain supreme peace and the eternal abode."}, {"c": 18, "v": 63, "s": "\u0907\u0924\u093f \u0924\u0947 \u091c\u094d\u091e\u093e\u0928\u092e\u093e\u0916\u094d\u092f\u093e\u0924\u0902 \u0917\u0941\u0939\u094d\u092f\u093e\u0926\u094d\u0917\u0941\u0939\u094d\u092f\u0924\u0930\u0902 \u092e\u092f\u093e\u0964\u0935\u093f\u092e\u0943\u0936\u094d\u092f\u0948\u0924\u0926\u0936\u0947\u0937\u0947\u0923 \u092f\u0925\u0947\u091a\u094d\u091b\u0938\u093f \u0924\u0925\u093e \u0915\u0941\u0930\u0941\u0964\u096418.63\u0964\u0964", "r": "iti te j\u00f1\u0101nam \u0101khy\u0101ta\u1e41 guhy\u0101d guhyatara\u1e41 may\u0101\nvim\u1e5bi\u015bhyaitad a\u015bhe\u1e63he\u1e47a yathechchhasi tath\u0101 kuru", "t": "Thus, wisdom more secret than secrecy itself has been declared to you by me. Reflect on it fully, then act as you wish."}, {"c": 18, "v": 64, "s": "\u0938\u0930\u094d\u0935\u0917\u0941\u0939\u094d\u092f\u0924\u092e\u0902 \u092d\u0942\u092f\u0903 \u0936\u094d\u0930\u0943\u0923\u0941 \u092e\u0947 \u092a\u0930\u092e\u0902 \u0935\u091a\u0903\u0964\u0907\u0937\u094d\u091f\u094b\u093d\u0938\u093f \u092e\u0947 \u0926\u0943\u0922\u092e\u093f\u0924\u093f \u0924\u0924\u094b \u0935\u0915\u094d\u0937\u094d\u092f\u093e\u092e\u093f \u0924\u0947 \u0939\u093f\u0924\u092e\u094d\u0964\u096418.64\u0964\u0964", "r": "sarva-guhyatama\u1e41 bh\u016bya\u1e25 \u015bh\u1e5bi\u1e47u me parama\u1e41 vacha\u1e25\ni\u1e63h\u1e6do \u2018si me d\u1e5bi\u1e0dham iti tato vak\u1e63hy\u0101mi te hitam", "t": "Hear again My supreme word, most secret of all; for you are dearly beloved of Me, I will tell you what is good."}, {"c": 18, "v": 65, "s": "\u092e\u0928\u094d\u092e\u0928\u093e \u092d\u0935 \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u094b \u092e\u0926\u094d\u092f\u093e\u091c\u0940 \u092e\u093e\u0902 \u0928\u092e\u0938\u094d\u0915\u0941\u0930\u0941\u0964\u092e\u093e\u092e\u0947\u0935\u0948\u0937\u094d\u092f\u0938\u093f \u0938\u0924\u094d\u092f\u0902 \u0924\u0947 \u092a\u094d\u0930\u0924\u093f\u091c\u093e\u0928\u0947 \u092a\u094d\u0930\u093f\u092f\u094b\u093d\u0938\u093f \u092e\u0947\u0964\u096418.65\u0964\u0964", "r": "man-man\u0101 bhava mad-bhakto mad-y\u0101j\u012b m\u0101\u1e41 namaskuru\nm\u0101m evai\u1e63hyasi satya\u1e41 te pratij\u0101ne priyo \u2018si me", "t": "Fix your mind on Me, be devoted to Me, sacrifice to Me, bow down to Me. You will come to Me; I truly promise you this, for you are dear to Me."}, {"c": 18, "v": 66, "s": "\u0938\u0930\u094d\u0935\u0927\u0930\u094d\u092e\u093e\u0928\u094d\u092a\u0930\u093f\u0924\u094d\u092f\u091c\u094d\u092f \u092e\u093e\u092e\u0947\u0915\u0902 \u0936\u0930\u0923\u0902 \u0935\u094d\u0930\u091c\u0964\u0905\u0939\u0902 \u0924\u094d\u0935\u093e \u0938\u0930\u094d\u0935\u092a\u093e\u092a\u0947\u092d\u094d\u092f\u094b \u092e\u094b\u0915\u094d\u0937\u092f\u093f\u0937\u094d\u092f\u093e\u092e\u093f \u092e\u093e \u0936\u0941\u091a\u0903\u0964\u096418.66\u0964\u0964", "r": "sarva-dharm\u0101n parityajya m\u0101m eka\u1e41 \u015bhara\u1e47a\u1e41 vraja\naha\u1e41 tv\u0101\u1e41 sarva-p\u0101pebhyo mok\u1e63hayi\u1e63hy\u0101mi m\u0101 \u015bhucha\u1e25", "t": "Abandon all duties and take refuge in Me alone; I will liberate you from all sins; do not grieve."}, {"c": 18, "v": 67, "s": "\u0907\u0926\u0902 \u0924\u0947 \u0928\u093e\u0924\u092a\u0938\u094d\u0915\u093e\u092f \u0928\u093e\u092d\u0915\u094d\u0924\u093e\u092f \u0915\u0926\u093e\u091a\u0928\u0964\u0928 \u091a\u093e\u0936\u0941\u0936\u094d\u0930\u0942\u0937\u0935\u0947 \u0935\u093e\u091a\u094d\u092f\u0902 \u0928 \u091a \u092e\u093e\u0902 \u092f\u094b\u093d\u092d\u094d\u092f\u0938\u0942\u092f\u0924\u093f\u0964\u096418.67\u0964\u0964", "r": "ida\u1e41 te n\u0101tapasky\u0101ya n\u0101bhakt\u0101ya kad\u0101chana\nna ch\u0101\u015bhu\u015bhru\u1e63have v\u0101chya\u1e41 na cha m\u0101\u1e41 yo \u2018bhyas\u016btayi", "t": "Never speak this to one who is devoid of austerities or devotion, who does not render service, who does not desire to listen, or who cavils at Me."}, {"c": 18, "v": 68, "s": "\u092f \u0907\u092e\u0902 \u092a\u0930\u092e\u0902 \u0917\u0941\u0939\u094d\u092f\u0902 \u092e\u0926\u094d\u092d\u0915\u094d\u0924\u0947\u0937\u094d\u0935\u092d\u093f\u0927\u093e\u0938\u094d\u092f\u0924\u093f\u0964\u092d\u0915\u094d\u093f\u0924\u0902 \u092e\u092f\u093f \u092a\u0930\u093e\u0902 \u0915\u0943\u0924\u094d\u0935\u093e \u092e\u093e\u092e\u0947\u0935\u0948\u0937\u094d\u092f\u0924\u094d\u092f\u0938\u0902\u0936\u092f\u0903\u0964\u096418.68\u0964\u0964", "r": "ya ida\u1e41 parama\u1e41 guhya\u1e41 mad-bhakte\u1e63hv abhidh\u0101syati\nbhakti\u1e41 mayi par\u0101\u1e41 k\u1e5bitv\u0101 m\u0101m evai\u1e63hyaty asan\u015bhaya\u1e25", "t": "He who, with supreme devotion to Me, teaches this supreme secret to My devotees, shall undoubtedly come to Me."}, {"c": 18, "v": 69, "s": "\u0928 \u091a \u0924\u0938\u094d\u092e\u093e\u0928\u094d\u092e\u0928\u0941\u0937\u094d\u092f\u0947\u0937\u0941 \u0915\u0936\u094d\u093f\u091a\u0928\u094d\u092e\u0947 \u092a\u094d\u0930\u093f\u092f\u0915\u0943\u0924\u094d\u0924\u092e\u0903\u0964\u092d\u0935\u093f\u0924\u093e \u0928 \u091a \u092e\u0947 \u0924\u0938\u094d\u092e\u093e\u0926\u0928\u094d\u092f\u0903 \u092a\u094d\u0930\u093f\u092f\u0924\u0930\u094b \u092d\u0941\u0935\u093f\u0964\u096418.69\u0964\u0964", "r": "na cha tasm\u0101n manu\u1e63hye\u1e63hu ka\u015bhchin me priya-k\u1e5bittama\u1e25\nbhavit\u0101 na cha me tasm\u0101d anya\u1e25 priyataro bhuvi", "t": "There is no one among men who does service dearer to Me, nor shall there be anyone on earth dearer to Me than him."}, {"c": 18, "v": 70, "s": "\u0905\u0927\u094d\u092f\u0947\u0937\u094d\u092f\u0924\u0947 \u091a \u092f \u0907\u092e\u0902 \u0927\u0930\u094d\u092e\u094d\u092f\u0902 \u0938\u0902\u0935\u093e\u0926\u092e\u093e\u0935\u092f\u094b\u0903\u0964\u091c\u094d\u091e\u093e\u0928\u092f\u091c\u094d\u091e\u0947\u0928 \u0924\u0947\u0928\u093e\u0939\u092e\u093f\u0937\u094d\u091f\u0903 \u0938\u094d\u092f\u093e\u092e\u093f\u0924\u093f \u092e\u0947 \u092e\u0924\u093f\u0903\u0964\u096418.70\u0964\u0964", "r": "adhye\u1e63hyate cha ya ima\u1e41 dharmya\u1e41 sa\u1e41v\u0101dam \u0101vayo\u1e25\nj\u00f1\u0101na-yaj\u00f1ena ten\u0101ham i\u1e63h\u1e6da\u1e25 sy\u0101m iti me mati\u1e25", "t": "And he who studies this sacred dialogue of ours, by him I shall have been worshipped through the sacrifice of wisdom; such is my conviction."}, {"c": 18, "v": 71, "s": "\u0936\u094d\u0930\u0926\u094d\u0927\u093e\u0935\u093e\u0928\u0928\u0938\u0942\u092f\u0936\u094d\u091a \u0936\u094d\u0930\u0943\u0923\u0941\u092f\u093e\u0926\u092a\u093f \u092f\u094b \u0928\u0930\u0903\u0964\u0938\u094b\u093d\u092a\u093f \u092e\u0941\u0915\u094d\u0924\u0903 \u0936\u0941\u092d\u093e\u0901\u0932\u094d\u0932\u094b\u0915\u093e\u0928\u094d\u092a\u094d\u0930\u093e\u092a\u094d\u0928\u0941\u092f\u093e\u0924\u094d\u092a\u0941\u0923\u094d\u092f\u0915\u0930\u094d\u092e\u0923\u093e\u092e\u094d\u0964\u096418.71\u0964\u0964", "r": "\u015bhraddh\u0101v\u0101n anas\u016bya\u015bh cha \u015bh\u1e5bi\u1e47uy\u0101d api yo nara\u1e25\nso \u2018pi mukta\u1e25 \u015bhubh\u0101l lok\u0101n pr\u0101pnuy\u0101t pu\u1e47ya-karma\u1e47\u0101m", "t": "Also, the man who hears this, full of faith and free from malice, shall attain to the happy worlds of those of righteous deeds, and be liberated."}, {"c": 18, "v": 72, "s": "\u0915\u091a\u094d\u091a\u093f\u0926\u0947\u0924\u091a\u094d\u091b\u094d\u0930\u0941\u0924\u0902 \u092a\u093e\u0930\u094d\u0925 \u0924\u094d\u0935\u092f\u0948\u0915\u093e\u0917\u094d\u0930\u0947\u0923 \u091a\u0947\u0924\u0938\u093e\u0964\u0915\u091a\u094d\u091a\u093f\u0926\u091c\u094d\u091e\u093e\u0928\u0938\u0902\u092e\u094b\u0939\u0903 \u092a\u094d\u0930\u0928\u0937\u094d\u091f\u0938\u094d\u0924\u0947 \u0927\u0928\u091e\u094d\u091c\u092f\u0964\u096418.72\u0964\u0964", "r": "kachchid etach chhruta\u1e41 p\u0101rtha tvayaik\u0101gre\u1e47a chetas\u0101\nkachchid aj\u00f1\u0101na-sammoha\u1e25 prana\u1e63h\u1e6das te dhana\u00f1jaya", "t": "Has this been heard, O Arjuna, with one-pointed focus? Has the delusion of your ignorance been destroyed, O Dhananjaya?"}, {"c": 18, "v": 73, "s": "\u0905\u0930\u094d\u091c\u0941\u0928 \u0909\u0935\u093e\u091a\u0928\u0937\u094d\u091f\u094b \u092e\u094b\u0939\u0903 \u0938\u094d\u092e\u0943\u0924\u093f\u0930\u094d\u0932\u092c\u094d\u0927\u093e \u0924\u094d\u0935\u0924\u094d\u092a\u094d\u0930\u0938\u093e\u0926\u093e\u0928\u094d\u092e\u092f\u093e\u091a\u094d\u092f\u0941\u0924\u0964\u0938\u094d\u0925\u093f\u0924\u094b\u093d\u0938\u094d\u092e\u093f \u0917\u0924\u0938\u0928\u094d\u0926\u0947\u0939\u0903 \u0915\u0930\u093f\u0937\u094d\u092f\u0947 \u0935\u091a\u0928\u0902 \u0924\u0935\u0964\u096418.73\u0964\u0964", "r": "arjuna uv\u0101cha\nna\u1e63h\u1e6do moha\u1e25 sm\u1e5bitir labdh\u0101 tvat-pras\u0101d\u0101n may\u0101chyuta\nsthito \u2018smi gata-sandeha\u1e25 kari\u1e63hye vachana\u1e41 tava", "t": "Arjuna said, \"My delusion has been destroyed, for I have gained my knowledge (memory) through Your grace, O Krishna. I am now free from doubts. I will act according to Your word.\""}, {"c": 18, "v": 74, "s": "\u0938\u091e\u094d\u091c\u092f \u0909\u0935\u093e\u091a\u0907\u0924\u094d\u092f\u0939\u0902 \u0935\u093e\u0938\u0941\u0926\u0947\u0935\u0938\u094d\u092f \u092a\u093e\u0930\u094d\u0925\u0938\u094d\u092f \u091a \u092e\u0939\u093e\u0924\u094d\u092e\u0928\u0903\u0964\u0938\u0902\u0935\u093e\u0926\u092e\u093f\u092e\u092e\u0936\u094d\u0930\u094c\u0937\u092e\u0926\u094d\u092d\u0941\u0924\u0902 \u0930\u094b\u092e\u0939\u0930\u094d\u0937\u0923\u092e\u094d\u0964\u096418.74\u0964\u0964", "r": "sa\u00f1jaya uv\u0101cha\nity aha\u1e41 v\u0101sudevasya p\u0101rthasya cha mah\u0101tmana\u1e25\nsa\u1e41v\u0101dam imam a\u015bhrau\u1e63ham adbhuta\u1e41 roma-har\u1e63ha\u1e47am", "t": "Sanjaya said, Thus, I have heard this wonderful dialogue between Krishna and the high-souled Arjuna, which causes one's hair to stand on end."}, {"c": 18, "v {"v":1,"s":"ॐ ईशा वास्यमिदं सर्वं यत्किञ्च जगत्यां जगत्।\nतेन त्यक्तेन भुञ्जीथा मा गृधः कस्यस्विद्धनम्॥","r":"īśhā vāsyam idaṁ sarvaṁ yat kiñcha jagatyāṁ jagat\ntena tyaktena bhuñjīthā mā gṛidhaḥ kasya svid dhanam","t":"All this—whatever exists in this changing universe—is pervaded by the Lord. Enjoy it through renunciation. Do not covet, for whose is wealth?"},
{"v":2,"s":"कुर्वन्नेवेह कर्माणि जिजीविषेच्छतं समाः।\nएवं त्वयि नान्यथेतोऽस्ति न कर्म लिप्यते नरे॥","r":"kurvann eveha karmāṇi jijīviṣhet śhataṁ samāḥ\nevaṁ tvayi nānyatheto’sti na karma lipyate nare","t":"Performing actions here, one should wish to live a hundred years. Thus, and not otherwise, action will not cling to you—this is the only way."},
{"v":3,"s":"असुर्या नाम ते लोका अन्धेन तमसाऽऽवृताः।\nतांस्ते प्रेत्याभिगच्छन्ति ये के चात्महनो जनाः॥","r":"asuryā nāma te lokā andhena tamasā’vṛitāḥ\ntāns te pretyābhigacchanti ye ke chātma-hano janāḥ","t":"Demoniac, indeed, are those worlds enveloped in blinding darkness; to them go after death those people who are slayers of the Self."},
{"v":4,"s":"अनेजदेकं मनसो जवीयो नैनद्देवा आप्नुवन्पूर्वमर्षत्।\nतद्धावतोऽन्यानत्येति तिष्ठत्तस्मिन्नपो मातरिश्वा दधाति॥","r":"anejad ekaṁ manaso javīyo nainad devā āpnuvan pūrvam arṣhat\ntad dhāvato’nyān atyeti tiṣhṭhat tasminn apo mātariśhvā dadhāti","t":"The Self is one, unmoving, yet swifter than the mind; the senses cannot reach It, for It moves ever ahead. Standing still, It outruns all that runs. In It the cosmic life-force sustains all activity."},
{"v":5,"s":"तदेजति तन्नैजति तद्दूरे तद्वन्तिके।\nतदन्तरस्य सर्वस्य तदु सर्वस्यास्य बाह्यतः॥","r":"tad ejati tan naijati tad dūre tad v antike\ntad antar asya sarvasya tad u sarvasyāsya bāhyataḥ","t":"It moves and It moves not; It is far and It is near; It is within all this, and It is also outside all this."},
{"v":6,"s":"यस्तु सर्वाणि भूतान्यात्मन्येवानुपश्यति।\nसर्वभूतेषु चात्मानं ततो न विजुगुप्सते॥","r":"yas tu sarvāṇi bhūtāny ātmany evānupaśhyati\nsarva-bhūteṣhu chātmānaṁ tato na vijugupsate","t":"He who sees all beings in the Self alone, and the Self in all beings, feels no hatred by virtue of that realization."},
{"v":7,"s":"यस्मिन्सर्वाणि भूतान्यात्मैवाभूद्विजानतः।\nतत्र को मोहः कः शोक एकत्वमनुपश्यतः॥","r":"yasmin sarvāṇi bhūtāny ātmaivābhūd vijānataḥ\ntatra ko mohaḥ kaḥ śhoka ekatvam anupaśhyataḥ","t":"When, to the knower, all beings have become one with his own Self, what delusion, what sorrow can there be for him who beholds that oneness?"},
{"v":8,"s":"स पर्यगाच्छुक्रमकायमव्रणमस्नाविरं शुद्धमपापविद्धम्।\nकविर्मनीषी परिभूः स्वयम्भूर्याथातथ्यतोऽर्थान् व्यदधाच्छाश्वतीभ्यः समाभ्यः॥","r":"sa paryagāch chhukram akāyam avraṇam asnāviraṁ śhuddham apāpa-viddham\nkavir manīṣhī paribhūḥ svayambhūr yāthātathyato’rthān vyadadhāch chhāśhvatībhyaḥ samābhyaḥ","t":"He, the Self, is all-pervading, pure, bodiless, without wound, without sinews, untouched by evil. He is the seer, the wise one, transcendent, self-existent, who has duly assigned all things for everlasting time."},

{"v":10,"s":"अन्यदेवाहुर्विद्ययाऽन्यदाहुरविद्यया।\nइति शुश्रुम धीराणां ये नस्तद्विचचक्षिरे॥","r":"anyad evāhur vidyayānyad āhur avidyayā\niti śhuśhruma dhīrāṇāṁ ye nas tad vichachakṣhire","t":"One result, they say, comes from knowledge; another, they say, from ignorance. Thus we have heard from the wise who explained it to us."},
{"v":11,"s":"विद्यां चाविद्यां च यस्तद्वेदोभयं सह।\nअविद्यया मृत्युं तीर्त्वा विद्ययाऽमृतमश्नुते॥","r":"vidyāṁ chāvidyāṁ cha yas tad vedobhayaṁ saha\navidyayā mṛityuṁ tīrtvā vidyayāmṛitam aśhnute","t":"He who knows both knowledge and ignorance together, crosses over death through ignorance (action) and attains immortality through knowledge."},
{"v":12,"s":"अन्धं तमः प्रविशन्ति येऽसम्भूतिमुपासते।\nततो भूय इव ते तमो य उ सम्भूत्यां रताः॥","r":"andhaṁ tamaḥ praviśhanti ye’sambhūtim upāsate\ntato bhūya iva te tamo ya u sambhūtyāṁ ratāḥ","t":"Into blinding darkness enter those who worship the unmanifested; into greater darkness, as it were, those who delight in the manifested."},
{"v":13,"s":"अन्यदेवाहुः सम्भवादन्यदाहुरसम्भवात्।\nइति शुश्रुम धीराणां ये नस्तद्विचचक्षिरे॥","r":"anyad evāhuḥ sambhavād anyad āhur asambhavāt\niti śhuśhruma dhīrāṇāṁ ye nas tad vichachakṣhire","t":"One result, they say, comes from worship of the manifested; another, they say, from the unmanifested. Thus we have heard from the wise who explained it to us."},
{"v":14,"s":"सम्भूतिं च विनाशं च यस्तद्वेदोभयं सह।\nविनाशेन मृत्युं तीर्त्वा सम्भूत्याऽमृतमश्नुते॥","r":"sambhūtiṁ cha vināśhaṁ cha yas tad vedobhayaṁ saha\nvināśhena mṛityuṁ tīrtvā sambhūtyāmṛitam aśhnute","t":"He who knows both the manifested and the unmanifested (destruction) together, crosses over death through the perishable and attains immortality through the imperishable."},

{"v":16,"s":"पूषन्नेकर्षे यम सूर्य प्राजापत्य व्यूह रश्मीन् समूह तेजः।\nयत्ते रूपं कल्याणतमं तत्ते पश्यामि योऽसावसौ पुरुषः सोऽहमस्मि॥","r":"pūṣhann ekarṣhe yama sūrya prājāpatya vyūha raśhmīn samūha tejaḥ\nyat te rūpaṁ kalyāṇatamaṁ tat te paśhyāmi yo’sāv asau puruṣhaḥ so’ham asmi","t":"O Pushan, sole seer, Controller, Sun, offspring of Prajapati, gather your rays and withdraw your light. May I behold your most blessed form. That Person who is there—I am He."},

function showTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab==='daily'?0:1].classList.add('active');
  if(tab==='browse') backToCategories();
}

/* ---- LEVEL 0: Library categories ---- */
function renderCategories(){
  let html='';
  LIBRARY.forEach(g=>{
    html += `<div class="cat-group"><div class="cat-group-title">${g.group}</div>`;
    g.items.forEach(it=>{
      const live = it.status==='live';
      html += `<div class="cat-card ${live?'':'locked'}" ${live?`onclick="openCategory('${it.id}')"`:''}>
        <div class="cat-glyph">${it.glyph}</div>
        <div class="cat-body">
          <div class="cat-name">${it.name}</div>
          <div class="cat-desc">${it.desc}</div>
        </div>
        ${live?`<div class="cat-status live">OPEN →</div>`:`<div class="soon-badge">COMING SOON</div>`}
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('category-list').innerHTML = html;
}
function backToCategories(){
  document.getElementById('browse-categories').style.display='block';
  document.getElementById('browse-chapters').style.display='none';
  document.getElementById('browse-verses').style.display='none';
}

    document.getElementById('cat-header-sub').textContent='18 CHAPTERS · 701 VERSES';
    sw.style.display='block';
    renderGitaChapters();
  } else if(id==='upanishads'){
    document.getElementById('cat-header-title').textContent='Upanishads';
    document.getElementById('cat-header-sub').textContent='DAŚHOPANIṢHAD · THE TEN PRINCIPAL';
    sw.style.display='none';
    renderUpanishadList();
  }
}

/* ---- GITA chapters grid ---- */
function renderGitaChapters(){
  const counts={};
  VERSES.forEach(v=>counts[v.c]=(counts[v.c]||0)+1);
  let html='';
  for(let c=1;c<=18;c++){
    html+=`<div class="chapter-card" data-num="${c}" onclick="openGitaChapter(${c})">
      <div class="chapter-num">CHAPTER ${c}</div>
      <div class="chapter-name">${GITA_CHAPTERS[c]}</div>
      <div class="chapter-info">
        <span class="chapter-count">${counts[c]||0} verses</span>
      </div>
    </div>`;
  }
  document.getElementById('chapter-grid').innerHTML=html;
}

/* ---- UPANISHAD list ---- */
function renderUpanishadList(){
  let html='';

  UPANISHADS.forEach(u=>{
    const live=u.status==='live';

    html+=`<div class="chapter-card"
      data-num="${u.num}"
      ${live
        ? `onclick="${
            u.id==='isha'
            ? 'openIsha()'
            : u.id==='kena'
            ? 'openKena()'
            : ''
          }"`
        : ''
      }
      style="${live?'':'opacity:.55;cursor:default'}">

      <div class="chapter-num">
        ${String(u.num).padStart(2,'0')} · ${u.veda.split(' ')[0].toUpperCase()}
      </div>

      <div class="chapter-name">
        ${u.name} Upaniṣhad
      </div>

      <div class="chapter-info">
        ${live
          ? `<span class="chapter-count">${u.count} verses</span>`
          : `<span class="soon-badge">SOON</span>`
        }
      </div>

    </div>`;
  });

  document.getElementById('chapter-grid').innerHTML=html;
}

/* =====================================================================
   LEVEL 2: VERSES
   ===================================================================== */
function verseCardHTML(numLabel, idPrefix, skt, rom, mng){
  return `<div class="verse-card" onclick="toggleVerse(this)">
    <div class="verse-card-header">
      <div class="verse-num">${numLabel}</div>
      <div class="verse-arrow">▾</div>
    </div>
    <div class="verse-preview">${mng}</div>
    <div class="verse-detail">
      <div class="verse-block"><div class="block-label label-skt">SANSKRIT</div>
        <p class="verse-sanskrit">${skt}</p></div>
      <div class="divider-line"></div>
      <div class="verse-block"><div class="block-label label-trn">TRANSLITERATION</div>
        <p class="verse-roman">${rom}</p></div>
      <div class="divider-line"></div>
      <div class="verse-block"><div class="block-label label-mng">MEANING</div>
        <p class="verse-meaning">${mng}</p></div>
    </div>
  </div>`;
}
function toggleVerse(card){
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.verse-card.open').forEach(c=>c.classList.remove('open'));
  if(!wasOpen) card.classList.add('open');
}

function openGitaChapter(c){
  document.getElementById('browse-chapters').style.display='none';
  document.getElementById('browse-verses').style.display='block';
  document.getElementById('verses-back-btn').textContent='← BHAGAVAD GITA';
  document.getElementById('verses-back-btn').onclick=()=>openCategory('gita');
  document.getElementById('chapter-header').innerHTML=
    `<h2 class="section-title">Chapter ${c}</h2><p class="section-sub">${GITA_CHAPTERS[c].toUpperCase()}</p>`;
  const list=VERSES.filter(v=>v.c===c);
  let html='';
  list.forEach((v,i)=>{ html+=verseCardHTML(`${v.c}.${v.v}`,`g-${c}-${v.v}`,v.s,v.r,v.t); });
  const wrap=document.getElementById('verses-list'); wrap.innerHTML=html;
  window.scrollTo(0,0);
}

function openIsha(){
  document.getElementById('browse-chapters').style.display='none';
  document.getElementById('browse-verses').style.display='block';
  document.getElementById('verses-back-btn').textContent='← UPANISHADS';
  document.getElementById('verses-back-btn').onclick=()=>openCategory('upanishads');
  document.getElementById('chapter-header').innerHTML=
    `<h2 class="section-title">Īśha Upaniṣhad</h2><p class="section-sub">SHUKLA YAJURVEDA · 18 VERSES</p>`;
  let html='';
  ISHA.forEach(v=>{ html+=verseCardHTML(`Īśha ${v.v}`,`u-isha-${v.v}`,v.s,v.r,v.t); });
  document.getElementById('verses-list').innerHTML=html;
  window.scrollTo(0,0);
}

function openKena(){
  document.getElementById('browse-chapters').style.display='none';
  document.getElementById('browse-verses').style.display='block';

  document.getElementById('verses-back-btn').textContent='← UPANISHADS';
  document.getElementById('verses-back-btn').onclick=()=>openCategory('upanishads');

  document.getElementById('chapter-header').innerHTML=
    `<h2 class="section-title">Kena Upaniṣhad</h2>
     <p class="section-sub">SAMAVEDA · ${KENA.length} VERSES</p>`;

  let html='';

  KENA.forEach(v=>{
    html+=verseCardHTML(
      `Kena ${v.v}`,
      `u-kena-${v.v}`,
      v.s,
      v.r,
      v.t
    );
  });

  document.getElementById('verses-list').innerHTML=html;
  window.scrollTo(0,0);
}

/* =====================================================================
   SEARCH (Gita only for now)
   ===================================================================== */
function doSearch(q){
  q=q.trim().toLowerCase();
  const sr=document.getElementById('search-results');
  const cl=document.getElementById('chapter-list-wrap');
  if(!q){ sr.style.display='none'; cl.style.display='block'; return; }
  cl.style.display='none'; sr.style.display='block';
  const hits=VERSES.filter(v=>v.t.toLowerCase().includes(q)||v.r.toLowerCase().includes(q)).slice(0,40);
  if(!hits.length){ sr.innerHTML=`<p class="daily-note" style="margin-top:30px">No verses found ✦</p>`; return; }
  let html=`<p class="section-sub">${hits.length} RESULT${hits.length>1?'S':''}</p>`;
  hits.forEach(v=>{ html+=verseCardHTML(`Gita ${v.c}.${v.v}`,`s-${v.c}-${v.v}`,v.s,v.r,v.t); });
  sr.innerHTML=html;
}

/* =====================================================================
   DAILY VERSE 
   ===================================================================== */
function initDaily(){
  const pool=[];

  VERSES.forEach(v =>
    pool.push({
      ref:`GITA ${v.c}.${v.v}`,
      ch:GITA_CHAPTERS[v.c],
      s:v.s,
      r:v.r,
      t:v.t
    })
  );

  ISHA.forEach(v =>
    pool.push({
      ref:`ĪŚHA UPANIṢHAD ${v.v}`,
      ch:'Shukla Yajurveda',
      s:v.s,
      r:v.r,
      t:v.t
    })
  );

  KENA.forEach(v =>
    pool.push({
      ref:`KENA UPANIṢHAD ${v.v}`,
      ch:'Samaveda',
      s:v.s,
      r:v.r,
      t:v.t
    })
  );

  const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  const dayOfYear=Math.floor((now-start)/86400000);

  const pick=pool[dayOfYear % pool.length];

  const opts={
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  };

  document.getElementById('daily-date-label').textContent=
    now.toLocaleDateString('en-US',opts).toUpperCase();

  document.getElementById('daily-badge').textContent=
    now.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  document.getElementById('daily-ref').textContent=pick.ref;
  document.getElementById('daily-ch').textContent=pick.ch;
  document.getElementById('daily-skt').textContent=pick.s;
  document.getElementById('daily-roman').textContent=pick.r;
  document.getElementById('daily-meaning').textContent=pick.t;
}

/* =====================================================================
   INIT
   ===================================================================== */
renderCategories();
initDaily();
showTab('daily');
</script>
